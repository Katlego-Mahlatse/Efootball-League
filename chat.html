<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>eFootball 412 · Team Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      color: #f5f0ff;
      min-height: 100vh;
    }

    /* Navbar (identical to home page) */
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-icon-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
      text-decoration: none;
    }
    .nav-icon-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .home-svg {
      width: 20px;
      height: 20px;
      display: block;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }
    .modal-content {
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 2rem;
      padding: 1.5rem;
      max-width: 350px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .modal-content h3 {
      color: #f5d742;
      margin-bottom: 1rem;
    }
    .modal-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }
    .modal-btn {
      background: #6a3bb5;
      border: 1px solid #f5d742;
      color: #f5d742;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: bold;
    }
    .modal-btn:hover {
      background: #7e4acf;
    }
    .passcode-input {
      background: rgba(30, 15, 55, 0.8);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      color: white;
      width: 100%;
      margin: 1rem 0;
      text-align: center;
    }
    .error-text {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }

    /* Team selection screen */
    .team-selector {
      max-width: 900px;
      margin: 3rem auto;
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      padding: 2rem;
      text-align: center;
    }
    .team-selector h2 {
      color: #f5d742;
      margin-bottom: 1rem;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .team-card {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .team-card:hover {
      background: rgba(106, 59, 181, 0.8);
      transform: scale(1.02);
    }
    .team-icon {
      width: 60px;
      height: 60px;
      object-fit: contain;
      margin-bottom: 0.5rem;
    }
    .team-name {
      font-size: 0.8rem;
      font-weight: bold;
    }

    /* Chat layout */
    .chat-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .users-panel {
      flex: 1;
      min-width: 250px;
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      padding: 1rem;
      height: fit-content;
      max-height: 70vh;
      overflow-y: auto;
    }
    .chat-panel {
      flex: 2;
      min-width: 300px;
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      display: flex;
      flex-direction: column;
      height: 70vh;
    }
    .panel-title {
      padding: 1rem;
      border-bottom: 1px solid rgba(245, 215, 66, 0.3);
      font-size: 1.2rem;
      font-weight: bold;
      color: #f5d742;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .user-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .user-item {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .user-item:hover {
      background: rgba(106, 59, 181, 0.8);
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      background: #f5d742;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2d1b4e;
      font-weight: bold;
    }
    .user-name {
      font-weight: 500;
    }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .message {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 0.5rem 1rem;
      max-width: 80%;
      align-self: flex-start;
    }
    .message.own {
      align-self: flex-end;
      background: #6a3bb5;
    }
    .message-sender {
      font-size: 0.7rem;
      color: #f5d742;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .message-text {
      font-size: 0.9rem;
      word-wrap: break-word;
    }
    .message-time {
      font-size: 0.6rem;
      color: #c4b0ff;
      text-align: right;
      margin-top: 0.2rem;
    }
    .input-area {
      padding: 1rem;
      border-top: 1px solid rgba(245, 215, 66, 0.3);
      display: flex;
      gap: 0.5rem;
    }
    .input-area input {
      flex: 1;
      background: rgba(30, 15, 55, 0.8);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      color: white;
      outline: none;
    }
    .input-area button {
      background: #6a3bb5;
      border: none;
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-area button:hover {
      background: #7e4acf;
    }

    @media (max-width: 780px) {
      .chat-container { flex-direction: column; }
      .users-panel { max-height: 40vh; }
      .team-icon { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <a href="index.html" class="nav-icon-btn">
    <svg class="home-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 12L12 3L21 12L19 14M5 10V19H19V10L12 5L5 10Z" stroke="#F5D742" stroke-width="2" fill="none"/>
      <path d="M12 15V19M8 19H16" stroke="#F5D742" stroke-width="2"/>
    </svg>
  </a>
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<!-- Tournament Modal (same as home) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <h3>TOURNAMENTS</h3>
    <div style="display: flex; flex-direction: column; gap: 0.6rem;">
      <a href="fifa-club-world-cup.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">FIFA CLUB WORLD CUP</a>
      <a href="uefa-champions-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA CHAMPIONS LEAGUE</a>
      <a href="uefa-europa-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA EUROPA LEAGUE</a>
      <a href="uefa-super-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA SUPER LEAGUE</a>
      <a href="uefa-conference-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA CONFERENCE LEAGUE</a>
      <a href="player-titles.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">PLAYER TITLES</a>
      <a href="rules.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">RULES</a>
      <a href="calendar.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">CALENDAR</a>
    </div>
    <button class="modal-btn" id="closeModalBtn" style="margin-top:1rem;">CLOSE</button>
  </div>
</div>

<!-- Passcode Modal -->
<div id="passcodeModal" class="modal-overlay" style="z-index: 300;">
  <div class="modal-content">
    <h3>🔐 Enter Passcode for <span id="passcodeTeamName"></span></h3>
    <input type="password" id="passcodeInput" class="passcode-input" placeholder="Enter passcode" autocomplete="off">
    <div id="passcodeError" class="error-text"></div>
    <div class="modal-buttons">
      <button id="passcodeSubmitBtn" class="modal-btn">Submit</button>
      <button id="passcodeCancelBtn" class="modal-btn">Cancel</button>
    </div>
  </div>
</div>

<!-- Team selection screen -->
<div id="teamSelector" class="team-selector">
  <h2>⚽ Select Your Team</h2>
  <div id="teamGrid" class="team-grid"></div>
</div>

<!-- Chat UI (hidden until team selected) -->
<div id="chatApp" style="display: none;">
  <div class="chat-container">
    <div class="users-panel">
      <div class="panel-title">👥 Teams</div>
      <div id="userList" class="user-list">Loading...</div>
    </div>
    <div class="chat-panel">
      <div class="panel-title" id="chatHeader">Select a team to start chatting</div>
      <div id="messagesArea" class="messages-area"></div>
      <div class="input-area" id="inputArea" style="display: none;">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Continue as dialog -->
<div id="continueDialog" class="modal-overlay" style="z-index: 300;">
  <div class="modal-content">
    <h3>Welcome back!</h3>
    <p id="continueMessage"></p>
    <div class="modal-buttons">
      <button id="continueYesBtn" class="modal-btn">Continue</button>
      <button id="continueNoBtn" class="modal-btn">Switch team</button>
    </div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, signInAnonymously } from "firebase/auth";
  import { getDatabase, ref, push, onChildAdded, query, limitToLast, set } from "firebase/database";

  // Firebase config (same as before)
  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8",
    measurementId: "G-KHY86ZMPZH",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // List of all teams with display names, icons, and hardcoded passcodes
  const teams = [
    { name: "Real Madrid", icon: "21259ea4-042f-48ff-902f-1e776d27fe58.jpeg", passcode: "realmadrid123" },
    { name: "Liverpool", icon: "269acb36-d189-45ea-860d-ea8f1cf05f05.jpeg", passcode: "liverpool456" },
    { name: "Dortmund", icon: "01cf2986-d9d6-4a33-830d-5d12de4e21b2.jpeg", passcode: "dortmund789" },
    { name: "Man City", icon: "9e92a100-327b-48fc-96d4-e4c89f69d7ef.jpeg", passcode: "mancity101" },
    { name: "Barcelona", icon: "IMG_20260421_085117.jpg", passcode: "barca2026" },
    { name: "Arsenal", icon: "b688ae57-b21a-4ee9-ba6c-5027a09cc9c5.png", passcode: "arsenal5673" },
    { name: "PSG", icon: "4dea795d-a516-46ae-bd34-07a784693d80.png", passcode: "psg2024" },
    { name: "AC Milan", icon: "44e0f58a-e5db-445b-9896-db22ea99b936.png", passcode: "acmilan777" },
    { name: "Chelsea", icon: "IMG_20260421_100354.jpg", passcode: "chelsea888" },
    { name: "Napoli", icon: "IMG_20260421_100318.jpg", passcode: "napoli999" },
    { name: "Atletico", icon: "IMG_20260421_093024.png", passcode: "atletico111" },
    { name: "Juventus", icon: "IMG_20260421_151224.jpg", passcode: "juventus222" },
    { name: "Newcastle", icon: "IMG_20260421_093046.png", passcode: "newcastle333" },
    { name: "Inter Milan", icon: "IMG_20260421_092951.png", passcode: "inter444" }
  ];

  // DOM elements
  const teamSelectorDiv = document.getElementById("teamSelector");
  const chatAppDiv = document.getElementById("chatApp");
  const continueDialog = document.getElementById("continueDialog");
  const continueMessage = document.getElementById("continueMessage");
  const continueYesBtn = document.getElementById("continueYesBtn");
  const continueNoBtn = document.getElementById("continueNoBtn");
  const teamGrid = document.getElementById("teamGrid");
  const userListDiv = document.getElementById("userList");
  const chatHeader = document.getElementById("chatHeader");
  const messagesArea = document.getElementById("messagesArea");
  const inputArea = document.getElementById("inputArea");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");

  // Passcode modal elements
  const passcodeModal = document.getElementById("passcodeModal");
  const passcodeTeamNameSpan = document.getElementById("passcodeTeamName");
  const passcodeInput = document.getElementById("passcodeInput");
  const passcodeError = document.getElementById("passcodeError");
  const passcodeSubmitBtn = document.getElementById("passcodeSubmitBtn");
  const passcodeCancelBtn = document.getElementById("passcodeCancelBtn");

  let pendingTeam = null;        // team awaiting passcode
  let currentTeam = null;       // { name, icon }
  let selectedChatTeam = null;
  let currentChatId = null;
  let unsubscribeMessages = null;

  // Helper: generate chat ID from two team names (sorted)
  function getChatId(team1, team2) {
    const [a, b] = [team1, team2].sort();
    return `${a}_${b}`;
  }

  // Show passcode modal for a selected team
  function requestPasscode(team) {
    pendingTeam = team;
    passcodeTeamNameSpan.textContent = team.name;
    passcodeInput.value = "";
    passcodeError.textContent = "";
    passcodeModal.classList.add("active");
  }

  // Verify passcode and proceed
  function verifyPasscode() {
    const enteredCode = passcodeInput.value.trim();
    if (enteredCode === pendingTeam.passcode) {
      passcodeModal.classList.remove("active");
      selectTeam(pendingTeam);
    } else {
      passcodeError.textContent = "❌ Incorrect passcode. Try again.";
    }
  }

  // Cancel passcode entry
  function cancelPasscode() {
    passcodeModal.classList.remove("active");
    pendingTeam = null;
  }

  passcodeSubmitBtn.addEventListener("click", verifyPasscode);
  passcodeCancelBtn.addEventListener("click", cancelPasscode);
  passcodeInput.addEventListener("keypress", (e) => { if (e.key === "Enter") verifyPasscode(); });

  // Render team selection grid
  function renderTeamSelector() {
    teamGrid.innerHTML = "";
    teams.forEach(team => {
      const card = document.createElement("div");
      card.className = "team-card";
      card.innerHTML = `
        <img class="team-icon" src="${team.icon}" alt="${team.name}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22 viewBox=%220 0 24 24%22 fill=%22%23f5d742%22%3E%3Cpath d=%22M12 2L15 8.5L22 9.5L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.5L9 8.5L12 2Z%22/%3E%3C/svg%3E'">
        <div class="team-name">${team.name}</div>
      `;
      card.addEventListener("click", () => requestPasscode(team));
      teamGrid.appendChild(card);
    });
  }

  // Select a team (called after successful passcode or continue)
  async function selectTeam(team) {
    currentTeam = team;
    localStorage.setItem("chat_team", team.name);
    localStorage.setItem("chat_team_icon", team.icon);
    // Sign in anonymously if not already
    if (!auth.currentUser) {
      await signInAnonymously(auth);
    }
    teamSelectorDiv.style.display = "none";
    chatAppDiv.style.display = "block";
    loadOtherTeams();
  }

  // Load list of other teams (excluding current team)
  function loadOtherTeams() {
    if (!currentTeam) return;
    const otherTeams = teams.filter(t => t.name !== currentTeam.name);
    userListDiv.innerHTML = otherTeams.length === 0 ? '<div class="user-item">No other teams</div>' : '';
    otherTeams.forEach(team => {
      const div = document.createElement("div");
      div.className = "user-item";
      div.innerHTML = `
        <img src="${team.icon}" style="width:32px; height:32px; border-radius:50%; object-fit:contain;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22 viewBox=%220 0 24 24%22 fill=%22%23f5d742%22%3E%3Cpath d=%22M12 2L15 8.5L22 9.5L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.5L9 8.5L12 2Z%22/%3E%3C/svg%3E'">
        <span class="user-name">${team.name}</span>
      `;
      div.addEventListener("click", () => openChat(team));
      userListDiv.appendChild(div);
    });
  }

  // Listen for messages in a specific chat room
  function listenToMessages(chatId) {
    if (unsubscribeMessages) unsubscribeMessages();
    const messagesRef = ref(db, `chats/${chatId}/messages`);
    const recentQuery = query(messagesRef, limitToLast(50));
    onChildAdded(recentQuery, (snapshot) => {
      const msg = snapshot.val();
      if (!msg) return;
      const div = document.createElement("div");
      div.className = `message ${msg.sender === currentTeam.name ? "own" : ""}`;
      const senderTeam = teams.find(t => t.name === msg.sender);
      const senderIcon = senderTeam ? senderTeam.icon : "";
      div.innerHTML = `
        <div class="message-sender">
          ${senderIcon ? `<img src="${senderIcon}" style="width:18px; height:18px; border-radius:50%; object-fit:contain;" onerror="this.style.display='none'">` : ""}
          <span>${msg.sender}</span>
        </div>
        <div class="message-text">${escapeHtml(msg.text)}</div>
        <div class="message-time">${msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : ""}</div>
      `;
      messagesArea.appendChild(div);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function openChat(team) {
    if (!currentTeam) return;
    selectedChatTeam = team;
    chatHeader.innerHTML = `<img src="${team.icon}" style="width:28px; height:28px; border-radius:50%; object-fit:contain;" onerror="this.style.display='none'"> 💬 Chat with ${team.name}`;
    inputArea.style.display = "flex";
    const chatId = getChatId(currentTeam.name, team.name);
    currentChatId = chatId;
    messagesArea.innerHTML = "";
    listenToMessages(chatId);
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || !currentChatId || !currentTeam) return;
    const messagesRef = ref(db, `chats/${currentChatId}/messages`);
    const newMessageRef = push(messagesRef);
    await set(newMessageRef, {
      text: text,
      sender: currentTeam.name,
      timestamp: Date.now()
    });
    messageInput.value = "";
  }

  sendBtn.onclick = sendMessage;
  messageInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

  // Initialize: check localStorage for saved team
  const savedTeamName = localStorage.getItem("chat_team");
  const savedTeamIcon = localStorage.getItem("chat_team_icon");
  if (savedTeamName && savedTeamIcon) {
    const savedTeam = teams.find(t => t.name === savedTeamName);
    if (savedTeam) {
      continueMessage.innerText = `Continue as ${savedTeam.name}?`;
      continueDialog.classList.add("active");
      continueYesBtn.onclick = () => {
        selectTeam(savedTeam);
        continueDialog.classList.remove("active");
      };
      continueNoBtn.onclick = () => {
        localStorage.removeItem("chat_team");
        localStorage.removeItem("chat_team_icon");
        continueDialog.classList.remove("active");
        renderTeamSelector();
        teamSelectorDiv.style.display = "block";
      };
    } else {
      localStorage.removeItem("chat_team");
      localStorage.removeItem("chat_team_icon");
      renderTeamSelector();
      teamSelectorDiv.style.display = "block";
    }
  } else {
    renderTeamSelector();
    teamSelectorDiv.style.display = "block";
  }

  // Modal hamburger menu
  const hamburgerBtn = document.getElementById("hamburgerBtn");
  const modalOverlayEl = document.getElementById("modalOverlay");
  const closeModalBtn = document.getElementById("closeModalBtn");
  function openModal() { modalOverlayEl.classList.add("active"); }
  function closeModalFunc() { modalOverlayEl.classList.remove("active"); }
  hamburgerBtn.addEventListener("click", openModal);
  closeModalBtn.addEventListener("click", closeModalFunc);
  modalOverlayEl.addEventListener("click", (e) => { if (e.target === modalOverlayEl) closeModalFunc(); });
</script>
</body>
</html>
