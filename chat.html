<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>eFootball 412 · Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      color: #f5f0ff;
      min-height: 100vh;
    }

    /* Navbar (identical to home page) */
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-icon-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
      text-decoration: none;
    }
    .nav-icon-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .home-svg {
      width: 20px;
      height: 20px;
      display: block;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }

    /* Modals (same style) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }
    .modal-content {
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 2rem;
      padding: 1.5rem;
      max-width: 350px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .modal-content h3 {
      color: #f5d742;
      margin-bottom: 1rem;
    }
    .modal-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }
    .modal-btn {
      background: #6a3bb5;
      border: 1px solid #f5d742;
      color: #f5d742;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: bold;
    }
    .modal-btn:hover {
      background: #7e4acf;
    }

    /* Chat main layout */
    .chat-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .users-panel {
      flex: 1;
      min-width: 250px;
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      padding: 1rem;
      height: fit-content;
      max-height: 70vh;
      overflow-y: auto;
    }
    .chat-panel {
      flex: 2;
      min-width: 300px;
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      display: flex;
      flex-direction: column;
      height: 70vh;
    }
    .panel-title {
      padding: 1rem;
      border-bottom: 1px solid rgba(245, 215, 66, 0.3);
      font-size: 1.2rem;
      font-weight: bold;
      color: #f5d742;
    }
    .user-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .user-item {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .user-item:hover {
      background: rgba(106, 59, 181, 0.8);
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      background: #f5d742;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2d1b4e;
      font-weight: bold;
    }
    .user-name {
      font-weight: 500;
    }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .message {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 0.5rem 1rem;
      max-width: 80%;
      align-self: flex-start;
    }
    .message.own {
      align-self: flex-end;
      background: #6a3bb5;
    }
    .message-sender {
      font-size: 0.7rem;
      color: #f5d742;
      margin-bottom: 0.2rem;
    }
    .message-text {
      font-size: 0.9rem;
      word-wrap: break-word;
    }
    .message-time {
      font-size: 0.6rem;
      color: #c4b0ff;
      text-align: right;
      margin-top: 0.2rem;
    }
    .input-area {
      padding: 1rem;
      border-top: 1px solid rgba(245, 215, 66, 0.3);
      display: flex;
      gap: 0.5rem;
    }
    .input-area input {
      flex: 1;
      background: rgba(30, 15, 55, 0.8);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      color: white;
      outline: none;
    }
    .input-area button {
      background: #6a3bb5;
      border: none;
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-area button:hover {
      background: #7e4acf;
    }
    .username-setup {
      max-width: 400px;
      margin: 3rem auto;
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      padding: 2rem;
      text-align: center;
    }
    .username-setup h2 {
      color: #f5d742;
      margin-bottom: 1rem;
    }
    .username-setup input {
      width: 100%;
      background: rgba(30, 15, 55, 0.8);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.8rem 1rem;
      color: white;
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }
    .username-setup button {
      background: #6a3bb5;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      color: white;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .availability-status {
      font-size: 0.8rem;
      margin: 0.5rem 0;
      min-height: 2rem;
    }
    .status-available { color: #22c55e; }
    .status-unavailable { color: #ef4444; }
    .status-checking { color: #f5d742; }

    @media (max-width: 780px) {
      .chat-container { flex-direction: column; }
      .users-panel { max-height: 40vh; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <a href="index.html" class="nav-icon-btn">
    <svg class="home-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 12L12 3L21 12L19 14M5 10V19H19V10L12 5L5 10Z" stroke="#F5D742" stroke-width="2" fill="none"/>
      <path d="M12 15V19M8 19H16" stroke="#F5D742" stroke-width="2"/>
    </svg>
  </a>
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<!-- Tournament Modal (same as home) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <h3>TOURNAMENTS</h3>
    <div style="display: flex; flex-direction: column; gap: 0.6rem;">
      <a href="fifa-club-world-cup.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">FIFA CLUB WORLD CUP</a>
      <a href="uefa-champions-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA CHAMPIONS LEAGUE</a>
      <a href="uefa-europa-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA EUROPA LEAGUE</a>
      <a href="uefa-super-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA SUPER LEAGUE</a>
      <a href="uefa-conference-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA CONFERENCE LEAGUE</a>

      <a href="calendar.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">CALENDAR</a>

<!-- Main chat UI (initially hidden until user is set) -->
<div id="chatApp" style="display: none;">
  <div class="chat-container">
    <div class="users-panel">
      <div class="panel-title">👥 Users</div>
      <div id="userList" class="user-list">Loading...</div>
    </div>
    <div class="chat-panel">
      <div class="panel-title" id="chatHeader">Select a user to start chatting</div>
      <div id="messagesArea" class="messages-area"></div>
      <div class="input-area" id="inputArea" style="display: none;">
        <input type="text" id="messageInput" placeholder="Type a message...">

</div>

<!-- Username setup screen -->
<div id="usernameSetup" class="username-setup">
  <h2>💬 Choose your username</h2>
  <input type="text" id="usernameInput" placeholder="Enter username" maxlength="20">
  <div id="availabilityStatus" class="availability-status"></div>
  <button id="createUserBtn">Join Chat</button>
</div>

<!-- Continue as dialog (hidden initially) -->
<div id="continueDialog" class="modal-overlay" style="z-index: 300;">
  <div class="modal-content">
    <h3>Welcome back!</h3>
    <p id="continueMessage"></p>
    <div class="modal-buttons">
      <button id="continueYesBtn" class="modal-btn">Continue</button>
      <button id="continueNoBtn" class="modal-btn">Switch user</button>
    </div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
  import { getFirestore, collection, doc, setDoc, getDoc, query, where, getDocs, onSnapshot, addDoc, orderBy, serverTimestamp, updateDoc, arrayUnion, arrayRemove } from "firebase/firestore";

  // Firebase config (provided by user)
  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8",
    measurementId: "G-KHY86ZMPZH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // DOM elements
  const setupDiv = document.getElementById("usernameSetup");
  const chatAppDiv = document.getElementById("chatApp");
  const continueDialog = document.getElementById("continueDialog");
  const continueMessage = document.getElementById("continueMessage");
  const continueYesBtn = document.getElementById("continueYesBtn");
  const continueNoBtn = document.getElementById("continueNoBtn");
  const usernameInput = document.getElementById("usernameInput");
  const availabilityStatus = document.getElementById("availabilityStatus");
  const createUserBtn = document.getElementById("createUserBtn");
  const userListDiv = document.getElementById("userList");
  const chatHeader = document.getElementById("chatHeader");
  const messagesArea = document.getElementById("messagesArea");
  const inputArea = document.getElementById("inputArea");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");

  let currentUser = null;       // { uid, username }
  let selectedChatUser = null;  // username of the person we're chatting with
  let currentChatId = null;     // document ID for the private chat (sorted usernames)
  let unsubscribeMessages = null;

  // Helper: generate chat ID from two usernames (sorted)
  function getChatId(user1, user2) {
    const [a, b] = [user1, user2].sort();
    return `${a}_${b}`;
  }

  // Load user list (all registered usernames except current)
  async function loadUserList() {
    if (!currentUser) return;
    const usersSnapshot = await getDocs(collection(db, "usernames"));
    const users = [];
    usersSnapshot.forEach(docSnap => {
      const data = docSnap.data();
      if (data.username !== currentUser.username) {
        users.push({ username: data.username, uid: data.uid });
      }
    });
    userListDiv.innerHTML = users.length === 0 ? '<div class="user-item">No other users yet</div>' : '';
    users.forEach(user => {
      const div = document.createElement("div");
      div.className = "user-item";
      div.innerHTML = `<div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div><div class="user-name">${user.username}</div>`;
      div.addEventListener("click", () => openChat(user.username));
      userListDiv.appendChild(div);
    });
  }

  // Listen to messages in current chat
  function listenToMessages(chatId) {
    if (unsubscribeMessages) unsubscribeMessages();
    const messagesRef = collection(db, "chats", chatId, "messages");
    const q = query(messagesRef, orderBy("timestamp", "asc"));
    unsubscribeMessages = onSnapshot(q, (snapshot) => {
      messagesArea.innerHTML = "";
      snapshot.forEach(docSnap => {
        const msg = docSnap.data();
        const div = document.createElement("div");
        div.className = `message ${msg.sender === currentUser.username ? "own" : ""}`;
        div.innerHTML = `
          <div class="message-sender">${msg.sender}</div>
          <div class="message-text">${escapeHtml(msg.text)}</div>
          <div class="message-time">${msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString() : ""}</div>
        `;
        messagesArea.appendChild(div);
      });
      messagesArea.scrollTop = messagesArea.scrollHeight;
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function openChat(otherUsername) {
    if (!currentUser) return;
    selectedChatUser = otherUsername;
    chatHeader.innerText = `💬 Chat with ${otherUsername}`;
    inputArea.style.display = "flex";
    const chatId = getChatId(currentUser.username, otherUsername);
    currentChatId = chatId;
    // Ensure chat document exists (with participants)
    const chatRef = doc(db, "chats", chatId);
    const chatSnap = await getDoc(chatRef);
    if (!chatSnap.exists()) {
      await setDoc(chatRef, {
        participants: [currentUser.username, otherUsername],
        createdAt: serverTimestamp()
      });
    }
    listenToMessages(chatId);
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || !currentChatId || !currentUser) return;
    const messagesRef = collection(db, "chats", currentChatId, "messages");
    await addDoc(messagesRef, {
      text: text,
      sender: currentUser.username,
      timestamp: serverTimestamp()
    });
    messageInput.value = "";
  }

  // Username availability check (debounced)
  let checkTimeout = null;
  usernameInput.addEventListener("input", () => {
    const username = usernameInput.value.trim();
    if (username.length < 3) {
      availabilityStatus.innerHTML = '<span class="status-checking">⏳ Minimum 3 characters</span>';
      createUserBtn.disabled = true;
      return;
    }
    availabilityStatus.innerHTML = '<span class="status-checking">🔍 Checking availability...</span>';
    if (checkTimeout) clearTimeout(checkTimeout);
    checkTimeout = setTimeout(async () => {
      const userDoc = await getDoc(doc(db, "usernames", username));
      if (userDoc.exists()) {
        availabilityStatus.innerHTML = '<span class="status-unavailable">❌ Username already taken</span>';
        createUserBtn.disabled = true;
      } else {
        availabilityStatus.innerHTML = '<span class="status-available">✅ Username available</span>';
        createUserBtn.disabled = false;
      }
    }, 500);
  });

  // Create new user (after auth)
  async function createNewUser(username, uid) {
    // Double-check username still available
    const userDoc = await getDoc(doc(db, "usernames", username));
    if (userDoc.exists()) throw new Error("Username already taken");
    await setDoc(doc(db, "usernames", username), {
      username: username,
      uid: uid,
      createdAt: serverTimestamp()
    });
    // Also store in localStorage for device recognition
    localStorage.setItem("chat_username", username);
    localStorage.setItem("chat_uid", uid);
    currentUser = { username, uid };
    setupDiv.style.display = "none";
    chatAppDiv.style.display = "block";
    loadUserList();
  }

  // Handle anonymous auth and username flow
  async function startAuthAndSetup(storedUsername, storedUid) {
    // Sign in anonymously first
    try {
      const userCred = await signInAnonymously(auth);
      const uid = userCred.user.uid;
      // If we have stored username and uid, verify they match and that username still exists
      if (storedUsername && storedUid && storedUid === uid) {
        const userDoc = await getDoc(doc(db, "usernames", storedUsername));
        if (userDoc.exists() && userDoc.data().uid === uid) {
          // Valid: ask to continue
          continueMessage.innerText = `Continue as "${storedUsername}"?`;
          continueDialog.classList.add("active");
          // Store temporary promise resolution
          const choice = await new Promise(resolve => {
            continueYesBtn.onclick = () => { resolve(true); continueDialog.classList.remove("active"); };
            continueNoBtn.onclick = () => { resolve(false); continueDialog.classList.remove("active"); };
          });
          if (choice) {
            currentUser = { username: storedUsername, uid };
            setupDiv.style.display = "none";
            chatAppDiv.style.display = "block";
            loadUserList();
            return;
          } else {
            // Clear storage and start fresh
            localStorage.removeItem("chat_username");
            localStorage.removeItem("chat_uid");
            startAuthAndSetup(null, null);
            return;
          }
        }
      }
      // No valid stored user: show username setup
      setupDiv.style.display = "block";
      chatAppDiv.style.display = "none";
      // Store the uid temporarily for when user creates username
      window.tempUid = uid;
    } catch (err) {
      console.error(err);
      alert("Authentication failed. Refresh and try again.");
    }
  }

  createUserBtn.onclick = async () => {
    const username = usernameInput.value.trim();
    if (username.length < 3) {
      availabilityStatus.innerHTML = '<span class="status-unavailable">Username too short</span>';
      return;
    }
    if (!window.tempUid) {
      alert("Please wait, still signing in...");
      return;
    }
    try {
      await createNewUser(username, window.tempUid);
    } catch (err) {
      alert(err.message);
      availabilityStatus.innerHTML = '<span class="status-unavailable">Username taken or error</span>';
    }
  };

  // Real-time user list updates when currentUser exists
  function subscribeToUserList() {
    if (!currentUser) return;
    const unsub = onSnapshot(collection(db, "usernames"), (snapshot) => {
      if (!currentUser) return;
      const users = [];
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        if (data.username !== currentUser.username) {
          users.push({ username: data.username, uid: data.uid });
        }
      });
      userListDiv.innerHTML = users.length === 0 ? '<div class="user-item">No other users yet</div>' : '';
      users.forEach(user => {
        const div = document.createElement("div");
        div.className = "user-item";
        div.innerHTML = `<div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div><div class="user-name">${user.username}</div>`;
        div.addEventListener("click", () => openChat(user.username));
        userListDiv.appendChild(div);
      });
    });
  }

  sendBtn.onclick = sendMessage;
  messageInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

  // Start the app
  const storedUsername = localStorage.getItem("chat_username");
  const storedUid = localStorage.getItem("chat_uid");
  startAuthAndSetup(storedUsername, storedUid);

  // Re-run user list subscription after currentUser set (observe via interval or setter)
  // We'll override the loadUserList to use real-time listener after login.
  // After login, we call subscribeToUserList.
  const originalLoad = loadUserList;
  window.loadUserList = loadUserList;
  // We'll monitor currentUser via a simple observer
  setInterval(() => {
    if (currentUser && !window._listenerActive) {
      window._listenerActive = true;
      subscribeToUserList();
      // Also trigger initial load
      loadUserList();
    }
  }, 500);

  // Modal hamburger
  const hamburgerBtn = document.getElementById("hamburgerBtn");
  const modalOverlayEl = document.getElementById("modalOverlay");
  const closeModalBtn = document.getElementById("closeModalBtn");
  function openModal() { modalOverlayEl.classList.add("active"); }
  function closeModalFunc() { modalOverlayEl.classList.remove("active"); }
  hamburgerBtn.addEventListener("click", openModal);
  closeModalBtn.addEventListener("click", closeModalFunc);
  modalOverlayEl.addEventListener("click", (e) => { if (e.target === modalOverlayEl) closeModalFunc(); });
</script>
