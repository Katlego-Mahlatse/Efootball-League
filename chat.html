<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>eFootball 412 · Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      padding: 0;
      color: #f5f0ff;
      min-height: 100vh;
    }

    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-icon-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
      text-decoration: none;
    }
    .nav-icon-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .chat-icon {
      font-size: 1.2rem;
      color: #f5d742;
      font-weight: bold;
    }

    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }

    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }

    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }

    .modal-content {
      position: absolute;
      top: 60px;
      right: 20px;
      background: linear-gradient(135deg, #f5d742, #e6c42c);
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      width: auto;
      min-width: 200px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeInDown 0.2s ease;
      border: 1px solid #6a3bb5;
    }

    @keyframes fadeInDown {
      from {
        transform: translateY(-15px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-content h3 {
      font-size: 1.1rem;
      color: #4a1d8c;
      margin-bottom: 0.8rem;
      font-weight: 800;
      border-bottom: 1px solid #6a3bb5;
      display: inline-block;
      padding-bottom: 0.2rem;
    }

    .modal-options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 0.8rem 0;
    }

    .modal-option {
      background: rgba(106, 59, 181, 0.15);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #3c1a70;
      font-weight: 700;
      font-size: 0.8rem;
      transition: all 0.2s;
      border: 1px solid #6a3bb5;
      display: block;
    }

    .modal-option:hover {
      background: #6a3bb5;
      color: #f5d742;
      transform: translateX(3px);
    }

    .close-modal {
      background: #4a1d8c;
      color: #f5d742;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
      font-size: 0.7rem;
    }

    .close-modal:hover {
      background: #2d0f5a;
    }

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .coming-soon-card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      padding: 3rem 2rem;
      margin-top: 3rem;
    }

    .coming-soon-card h1 {
      font-size: 2.5rem;
      color: #f5d742;
      margin-bottom: 1rem;
    }

    .coming-soon-card p {
      font-size: 1.2rem;
      color: #e6d5ff;
    }

    @media (max-width: 780px) {
      .dashboard { padding: 1rem; }
      .coming-soon-card h1 { font-size: 1.8rem; }
      .coming-soon-card p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="gold-navbar">
    <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
    <a href="index.html" class="nav-icon-btn" id="homeBtn">
      <span class="chat-icon">🏠</span>
    </a>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <h3>TOURNAMENTS</h3>
      <div class="modal-options">
        <a href="fifa-club-world-cup.html" class="modal-option">FIFA CLUB WORLD CUP</a>
        <a href="uefa-champions-league.html" class="modal-option">UEFA CHAMPIONS LEAGUE</a>
        <a href="uefa-europa-league.html" class="modal-option">UEFA EUROPA LEAGUE</a>
        <a href="uefa-super-league.html" class="modal-option">UEFA SUPER LEAGUE</a>
        <a href="uefa-conference-league.html" class="modal-option">UEFA CONFERENCE LEAGUE</a>
        <a href="player-titles.html" class="modal-option">PLAYER TITLES</a>
      </div>
      <button class="close-modal" id="closeModalBtn">CLOSE</button>
    </div>
  </div>

  <div class="dashboard">
    <div class="coming-soon-card">
      <h1>💬 Chat Interface</h1>
      <p>Coming Soon</p>
    </div>
  </div>

  <script>
    // Modal functionality (same as home page)
    const hamburger = document.getElementById("hamburgerBtn");
    const modalOverlay = document.getElementById("modalOverlay");
    const closeBtn = document.getElementById("closeModalBtn");
    function openModal() { modalOverlay.classList.add("active"); }
    function closeModal() { modalOverlay.classList.remove("active"); }
    if (hamburger) hamburger.addEventListener("click", openModal);
    if (closeBtn) closeBtn.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModal(); });
  </script>
</body>
</html>
