<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>eFootball 412 · Team Chat</title>
  <style>
    /* Same as before, only added profile picture display in user list */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      color: #f5f0ff;
      min-height: 100vh;
    }
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-icon-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
      text-decoration: none;
    }
    .nav-icon-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .home-svg {
      width: 20px;
      height: 20px;
      display: block;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }
    .modal-content {
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 2rem;
      padding: 1.5rem;
      max-width: 350px;
      width: 90%;
      text-align: center;
    }
    .modal-content h3 {
      color: #f5d742;
      margin-bottom: 1rem;
    }
    .modal-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }
    .modal-btn {
      background: #6a3bb5;
      border: 1px solid #f5d742;
      color: #f5d742;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: bold;
    }
    .user-list-container {
      width: 100%;
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
    }
    .user-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .user-item {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 1.1rem;
    }
    .user-item:hover {
      background: rgba(106, 59, 181, 0.8);
    }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: #f5d742;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2d1b4e;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .user-name {
      flex: 1;
      font-weight: 500;
    }
    .admin-gear {
      margin-left: 0.5rem;
      font-size: 1.1rem;
    }
    .chat-view {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      z-index: 150;
      display: flex;
      flex-direction: column;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .chat-view.active {
      visibility: visible;
      opacity: 1;
    }
    .chat-header {
      background: rgba(30, 15, 55, 0.9);
      padding: 1rem;
      border-bottom: 2px solid #f5d742;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .close-chat {
      background: none;
      border: none;
      color: #f5d742;
      font-size: 1.8rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 0.5rem;
    }
    .chat-header h3 {
      flex: 1;
      margin: 0;
      font-size: 1.2rem;
    }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .message {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 0.5rem 1rem;
      max-width: 80%;
      align-self: flex-start;
    }
    .message.own {
      align-self: flex-end;
      background: #6a3bb5;
    }
    .message-sender {
      font-size: 0.7rem;
      color: #f5d742;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .message-text {
      font-size: 0.9rem;
      word-wrap: break-word;
    }
    .message-time {
      font-size: 0.6rem;
      color: #c4b0ff;
      text-align: right;
      margin-top: 0.2rem;
    }
    .input-area {
      padding: 1rem;
      border-top: 1px solid rgba(245, 215, 66, 0.3);
      display: flex;
      gap: 0.5rem;
      background: rgba(30, 15, 55, 0.9);
    }
    .input-area input {
      flex: 1;
      background: rgba(30, 15, 55, 0.8);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      color: white;
      outline: none;
    }
    .input-area button {
      background: #6a3bb5;
      border: none;
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-area button:hover {
      background: #7e4acf;
    }
    .loading {
      text-align: center;
      padding: 2rem;
      color: #c4b0ff;
    }
    @media (max-width: 780px) {
      .user-avatar { width: 40px; height: 40px; font-size: 1rem; }
      .user-item { font-size: 1rem; padding: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <a href="index.html" class="nav-icon-btn">
    <svg class="home-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 12L12 3L21 12L19 14M5 10V19H19V10L12 5L5 10Z" stroke="#F5D742" stroke-width="2" fill="none"/>
      <path d="M12 15V19M8 19H16" stroke="#F5D742" stroke-width="2"/>
    </svg>
  </a>
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <h3>TOURNAMENTS</h3>
    <div style="display: flex; flex-direction: column; gap: 0.6rem;">
      <a href="fifa-club-world-cup.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">FIFA CLUB WORLD CUP</a>
      <a href="uefa-champions-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA CHAMPIONS LEAGUE</a>
      <a href="uefa-europa-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA EUROPA LEAGUE</a>
      <a href="uefa-super-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA SUPER LEAGUE</a>
      <a href="uefa-conference-league.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">UEFA CONFERENCE LEAGUE</a>
      <a href="player-titles.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">PLAYER TITLES</a>
      <a href="rules.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">RULES</a>
      <a href="calendar.html" style="background:rgba(106,59,181,0.15); padding:0.4rem 0.8rem; border-radius:40px; text-decoration:none; color:#f5e6ff;">CALENDAR</a>
    </div>
    <button class="modal-btn" id="closeModalBtn" style="margin-top:1rem;">CLOSE</button>
  </div>
</div>

<div id="userListContainer" class="user-list-container">
  <div id="userList" class="user-list">Loading users...</div>
</div>

<div id="chatView" class="chat-view">
  <div class="chat-header">
    <button id="closeChatBtn" class="close-chat">✕</button>
    <h3 id="chatHeader">Chat</h3>
  </div>
  <div id="messagesArea" class="messages-area"></div>
  <div class="input-area" id="inputArea">
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, onAuthStateChanged } from "firebase/auth";
  import { getDatabase, ref, push, onChildAdded, query, limitToLast, set, get } from "firebase/database";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8",
    measurementId: "G-KHY86ZMPZH",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUser = null;
  let currentUserId = null;
  let selectedUser = null;
  let currentChatId = null;
  let unsubscribeMessages = null;

  const userListDiv = document.getElementById("userList");
  const chatView = document.getElementById("chatView");
  const userListContainer = document.getElementById("userListContainer");
  const closeChatBtn = document.getElementById("closeChatBtn");
  const chatHeader = document.getElementById("chatHeader");
  const messagesArea = document.getElementById("messagesArea");
  const inputArea = document.getElementById("inputArea");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");

  function getChatId(uid1, uid2) {
    const [a, b] = [uid1, uid2].sort();
    return `${a}_${b}`;
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function loadUsers() {
    if (!currentUserId) return;
    userListDiv.innerHTML = '<div class="loading">Loading users...</div>';
    const usersRef = ref(db, 'users');
    try {
      const snapshot = await get(usersRef);
      if (!snapshot.exists()) {
        userListDiv.innerHTML = '<div class="loading">No other users found.</div>';
        return;
      }
      const users = snapshot.val();
      const otherUsers = [];
      for (const uid in users) {
        if (uid !== currentUserId) {
          otherUsers.push({ uid, ...users[uid] });
        }
      }
      if (otherUsers.length === 0) {
        userListDiv.innerHTML = '<div class="loading">No other users yet.</div>';
        return;
      }
      userListDiv.innerHTML = '';
      otherUsers.forEach(user => {
        const displayName = user.username || user.email || 'Anonymous';
        const firstChar = displayName.charAt(0).toUpperCase();
        const isAdmin = user.role === 'admin';
        const div = document.createElement('div');
        div.className = 'user-item';
        const photoURL = user.photoURL;
        let avatarHtml = '';
        if (photoURL) {
          avatarHtml = `<img class="user-avatar" src="${photoURL}" alt="avatar" onerror="this.onerror=null; this.src=''; this.style.backgroundColor='#f5d742'; this.innerHTML='${firstChar}';">`;
        } else {
          avatarHtml = `<div class="user-avatar" style="background:#f5d742; display:flex; align-items:center; justify-content:center;">${firstChar}</div>`;
        }
        div.innerHTML = `
          ${avatarHtml}
          <span class="user-name">${escapeHtml(displayName)}${isAdmin ? ' <span class="admin-gear">⚙️</span>' : ''}</span>
        `;
        div.addEventListener('click', () => openChat(user));
        userListDiv.appendChild(div);
      });
    } catch (error) {
      console.error('Error loading users:', error);
      userListDiv.innerHTML = '<div class="loading">Error loading users</div>';
    }
  }

  async function openChat(user) {
    if (!currentUserId) return;
    selectedUser = user;
    const chatId = getChatId(currentUserId, user.uid);
    currentChatId = chatId;
    const displayName = user.username || user.email || 'Anonymous';
    chatHeader.innerHTML = `💬 Chat with ${escapeHtml(displayName)}`;
    messagesArea.innerHTML = '';
    if (unsubscribeMessages) unsubscribeMessages();
    const messagesRef = ref(db, `private_messages/${chatId}/messages`);
    const recentQuery = query(messagesRef, limitToLast(50));
    unsubscribeMessages = onChildAdded(recentQuery, (snapshot) => {
      const msg = snapshot.val();
      if (!msg) return;
      const div = document.createElement('div');
      div.className = `message ${msg.senderId === currentUserId ? 'own' : ''}`;
      const senderName = msg.senderName || (msg.senderId === currentUserId ? 'You' : displayName);
      div.innerHTML = `
        <div class="message-sender">
          <span>${escapeHtml(senderName)}</span>
        </div>
        <div class="message-text">${escapeHtml(msg.text)}</div>
        <div class="message-time">${msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : ''}</div>
      `;
      messagesArea.appendChild(div);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    });
    userListContainer.style.display = 'none';
    chatView.classList.add('active');
    messageInput.focus();
  }

  function closeChat() {
    chatView.classList.remove('active');
    userListContainer.style.display = 'block';
    if (unsubscribeMessages) {
      unsubscribeMessages();
      unsubscribeMessages = null;
    }
    selectedUser = null;
    currentChatId = null;
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || !currentChatId || !currentUser || !selectedUser) return;
    const messagesRef = ref(db, `private_messages/${currentChatId}/messages`);
    const newMessageRef = push(messagesRef);
    await set(newMessageRef, {
      text: text,
      senderId: currentUserId,
      senderName: currentUser.displayName || currentUser.email?.split('@')[0] || 'User',
      timestamp: Date.now()
    });
    messageInput.value = '';
  }

  sendBtn.onclick = sendMessage;
  messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  closeChatBtn.addEventListener('click', closeChat);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = user;
    currentUserId = user.uid;
    const userRef = ref(db, `users/${user.uid}`);
    const snapshot = await get(userRef);
    if (!snapshot.exists()) {
      const username = user.displayName || user.email?.split('@')[0] || 'Player';
      await set(userRef, {
        uid: user.uid,
        email: user.email,
        username: username,
        role: 'player',
        createdAt: Date.now()
      });
    }
    await loadUsers();
  });

  const hamburgerBtn = document.getElementById("hamburgerBtn");
  const modalOverlay = document.getElementById("modalOverlay");
  const closeModalBtn = document.getElementById("closeModalBtn");
  function openModal() { modalOverlay.classList.add("active"); }
  function closeModalFunc() { modalOverlay.classList.remove("active"); }
  hamburgerBtn.addEventListener("click", openModal);
  closeModalBtn.addEventListener("click", closeModalFunc);
  modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModalFunc(); });
</script>
</body>
</html>
