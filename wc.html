

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <title>FIFA Club World Cup</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0D1B2A;
      --primary-light: #1a3a52;
      --accent: #F0A500;
      --accent-light: #FFD700;
      --white: #ffffff;
      --text-muted: rgba(255,255,255,0.6);
      --glass-bg: rgba(255,255,255,0.06);
      --glass-border: rgba(240,165,0,0.25);
      --glass-blur: blur(12px);
    }
    @keyframes fadeInDown { from { opacity:0; transform:translateY(-24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes cardSlideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    body {
      font-family:'Rajdhani',sans-serif;
      background: var(--primary);
      min-height:100vh;
      overflow-x:auto;
      min-width:1200px;
      width:1200px;
      margin:0 auto;
      font-size:20px;
      padding-bottom:3rem;
    }
    body.has-bg::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:var(--bg-image);
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      z-index:-2;
    }
    body.has-bg::after {
      content:'';
      position:fixed;
      inset:0;
      background:rgba(13,27,42,0.65);
      z-index:-1;
    }
    .navbar {
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
      border-bottom: 2px solid var(--accent-light);
      padding: 0 2rem;
      height: 100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(240,165,0,0.2);
      animation: fadeInDown 0.5s ease both;
    }
    .navbar-logo { height:74px; max-width:260px; object-fit:contain; cursor:pointer; transition:transform 0.3s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .navbar-logo:hover { transform:scale(1.05); }
    .navbar-logo-placeholder { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:3px; color: white; cursor:pointer; font-weight:bold; }
    .menu-btn {
      background: var(--primary);
      border: 2px solid white;
      width:70px; height:70px; border-radius:20px;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center; gap:8px;
      cursor:pointer; transition:all 0.3s;
    }
    .menu-btn span { width:32px; height:4px; background:white; border-radius:4px; transition:all 0.3s; }
    .menu-btn:hover { background:var(--primary-light); transform:rotate(90deg); }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:199; display:none; backdrop-filter:blur(3px); }
    .overlay.active { display:block; }
    .side-menu {
      position:fixed; top:0; right:-360px; width:360px; height:100%;
      background:rgba(13,27,42,0.98); backdrop-filter:blur(20px);
      border-left: 2px solid var(--accent);
      z-index:200; padding:40px 28px;
      transition:right 0.35s cubic-bezier(.4,0,.2,1);
    }
    .side-menu.active { right:0; }
    .close-menu { text-align:right; font-size:2.8rem; cursor:pointer; color:white; margin-bottom:40px; line-height:1; transition:color 0.2s; }
    .close-menu:hover { color:var(--accent); }
    .menu-item {
      padding:20px 28px; margin:12px 0;
      border:1px solid rgba(240,165,0,0.3); border-radius:20px;
      cursor:pointer; font-weight:600; font-size:1.5rem;
      color:white; transition:all 0.2s;
      font-family:'Rajdhani',sans-serif;
    }
    .menu-item:hover { background:var(--accent); border-color:white; color:var(--primary); transform:translateX(8px); }
    .slideshow-wrapper { padding:36px 36px 20px; display:flex; flex-direction:column; align-items:center; animation:fadeIn 0.7s ease 0.2s both; }
    .slideshow-frame {
      width:100%; max-width:1100px; border-radius:32px; overflow:hidden;
      box-shadow:0 8px 40px rgba(240,165,0,0.25);
      border: 2px solid var(--accent);
      background:#000; display:flex; justify-content:center; align-items:center;
    }
    .slideshow-img { width:100%; height:auto; max-height:520px; object-fit:contain; display:block; transition:opacity 0.5s ease; }
    .dots-container { margin-top:20px; display:flex; gap:12px; }
    .dot { width:14px; height:14px; border-radius:50%; background:rgba(240,165,0,0.3); cursor:pointer; transition:all 0.25s; }
    .dot.active { background:var(--accent); transform:scale(1.4); box-shadow:0 0 12px rgba(240,165,0,0.7); }
    .dot:hover { background:var(--accent); }
    .season-bar { display:flex; justify-content:center; margin:24px 0 16px; }
    .season-controls {
      display:flex; align-items:center; gap:20px;
      background:var(--accent);
      border: none;
      padding:12px 32px;
      border-radius:80px;
      backdrop-filter:blur(8px);
    }
    .season-arrow {
      background:transparent;
      border:none;
      width:56px; height:56px;
      border-radius:50%;
      font-size:2rem;
      cursor:pointer;
      font-weight:bold;
      transition:all 0.2s;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
    }
    #prevSeasonBtn:hover:not(:disabled), #nextSeasonBtn:hover:not(:disabled) { transform:scale(1.1); background:rgba(0,0,0,0.1); }
    .season-arrow:disabled { opacity:0.3; cursor:not-allowed; }
    .season-number {
      font-family:'Bebas Neue',sans-serif;
      font-size:2.2rem;
      letter-spacing:3px;
      color:var(--primary);
      min-width:180px;
      text-align:center;
    }
    .season-admin-btns { display:flex; gap:10px; margin-left:10px; }
    .season-admin-btn {
      background:rgba(0,0,0,0.15); border:1px solid rgba(0,0,0,0.3);
      padding:8px 20px; border-radius:40px; font-weight:600;
      cursor:pointer; color:var(--primary); font-size:1.1rem;
      font-family:'Rajdhani',sans-serif; transition:all 0.2s;
    }
    .season-admin-btn:hover { background:var(--primary); color:var(--accent); }
    .tabs-container {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      margin:28px 36px 0;
      background:linear-gradient(90deg, var(--accent), var(--accent-light));
      border: 2px solid white;
      border-radius:80px;
      padding:12px 20px;
      backdrop-filter:blur(8px);
      max-width:1100px;
      margin-left:auto;
      margin-right:auto;
      animation:fadeInUp 0.5s ease 0.3s both;
    }
    .tabs-row { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
    .tab-btn {
      background:transparent;
      border:none;
      font-family:'Rajdhani',sans-serif;
      font-size:1.3rem;
      font-weight:700;
      padding:10px 28px;
      cursor:pointer;
      color:rgba(0,0,0,0.7);
      border-radius:60px;
      letter-spacing:0.5px;
      transition:all 0.25s;
      white-space:nowrap;
    }
    .tab-btn.active { background:var(--primary); color:var(--accent); }
    .tab-btn:hover:not(.active) { color:var(--primary); background:rgba(0,0,0,0.1); }
    .content-card {
      margin:24px 36px 40px;
      background:var(--glass-bg); backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border); border-radius:32px;
      padding:32px;
      min-height:200px;
      animation:fadeInUp 0.5s ease 0.4s both;
    }
    .loading-spinner { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px; gap:24px; }
    .spinner { width:60px; height:60px; border:5px solid rgba(240,165,0,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    .loading-spinner span { color:rgba(255,255,255,0.6); font-size:1.4rem; font-family:'Rajdhani',sans-serif; }
    .empty-state { text-align:center; padding:80px 20px; color:rgba(255,255,255,0.4); }
    .empty-state .empty-icon { font-size:5rem; margin-bottom:20px; }
    .empty-state p { font-size:2rem; font-weight:500; font-family:'Rajdhani',sans-serif; }
    .table-scroll-wrap { overflow-x:auto; border-radius:20px; position:relative; }
    .stats-table {
      width:100%;
      border-collapse:collapse;
      font-family:'Rajdhani',sans-serif;
      min-width:900px;
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);
      color:white;
    }
    .stats-table thead th {
      background:rgba(0,0,0,0.3);
      color:white;
      font-size:1.3rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:1px;
      padding:16px 18px;
      border-bottom: 2px solid var(--accent);
      white-space:nowrap;
      z-index:20;
    }
    .stats-table th:first-child, .stats-table td:first-child {
      position:sticky;
      left:0;
      z-index:25;
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);
      width:64px;
      min-width:64px;
    }
    .stats-table thead th:first-child { background:rgba(0,0,0,0.4); z-index:30; }
    .stats-table th:nth-child(2), .stats-table td:nth-child(2) {
      position:sticky;
      left:64px;
      z-index:24;
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);
      box-shadow:4px 0 8px -2px rgba(0,0,0,0.45);
      border-right: 2px solid rgba(240,165,0,0.35);
    }
    .stats-table thead th:nth-child(2) { background:rgba(0,0,0,0.4); z-index:30; }
    .stats-table tbody tr { border-bottom:1px solid rgba(240,165,0,0.2); transition:background 0.2s; }
    .stats-table tbody tr:hover { background:rgba(240,165,0,0.15); }
    .stats-table td {
      padding:14px 18px;
      color:white;
      font-size:1.3rem;
      font-weight:600;
      white-space:nowrap;
    }
    .stats-table td.stat-number { font-size:2.6rem !important; font-weight:800; line-height:1.2; }
    .team-name-text { font-weight:700; font-size:2.8rem !important; color:white; }
    .pts-cell { font-weight:800; color:white; font-size:1.5rem; }
    .rank-cell { font-weight:700; color:white; font-family:'Bebas Neue',sans-serif; font-size:1.6rem; }
    .table-actions {
      display:flex;
      justify-content:flex-end;
      gap:12px;
      padding:14px 18px;
      background:rgba(0,0,0,0.3);
      border-radius:20px 20px 0 0;
      border: 2px solid rgba(240,165,0,0.2);
      border-bottom: 3px solid var(--accent);
      align-items:center;
    }
    .table-actions-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.6rem;
      color:white;
      letter-spacing:2px;
      flex:1;
      display:flex;
      align-items:center;
    }
    .table-header-img { max-height:60px; max-width:260px; object-fit:contain; }
    .add-btn {
      background:rgba(255,255,255,0.15);
      border: 2px solid var(--accent);
      color:white;
      font-family:'Rajdhani',sans-serif;
      font-weight:700;
      font-size:1.2rem;
      padding:10px 24px;
      border-radius:40px;
      cursor:pointer;
      transition:all 0.2s;
    }
    .add-btn:hover { background:var(--accent); color:var(--primary); transform:translateY(-2px); }
    .three-dot-btn {
      background:rgba(255,255,255,0.15);
      border: 2px solid var(--accent);
      color:white;
      font-size:2.2rem;
      width:52px;
      height:52px;
      border-radius:50%;
      cursor:pointer;
      transition:all 0.2s;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .three-dot-btn:hover { background:var(--accent); color:var(--primary); }
    .filters-bar {
      display:flex;
      flex-wrap:wrap;
      gap:20px;
      align-items:flex-end;
      margin-bottom:30px;
      padding:20px;
      background:rgba(0,0,0,0.2);
      border-radius:28px;
    }
    .filter-group { display:flex; flex-direction:column; gap:8px; }
    .filter-group label {
      font-size:1rem; font-weight:600; text-transform:uppercase;
      letter-spacing:1px; color:rgba(255,255,255,0.6);
    }
    .filter-group select, .filter-group button {
      background:rgba(0,0,0,0.3); border:1px solid var(--accent);
      border-radius:40px; padding:12px 20px;
      font-family:'Rajdhani',sans-serif; font-size:1.2rem;
      font-weight:600; color:white;
      cursor:pointer; transition:all 0.2s;
    }
    .filter-group select:hover, .filter-group button:hover { background:var(--accent); color:var(--primary); border-color:var(--primary); }
    .clear-filters { background:rgba(240,165,0,0.2); }
    .filter-stats { font-size:1rem; color:rgba(255,255,255,0.5); margin-left:auto; align-self:center; }
    .view-calendar-btn {
      background:rgba(240,165,0,0.15);
      border: 2px solid var(--accent);
      color:white;
      font-family:'Rajdhani',sans-serif;
      font-weight:700;
      font-size:1.2rem;
      padding:12px 28px;
      border-radius:40px;
      cursor:pointer;
      transition:all 0.25s;
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
      align-self:flex-end;
      text-decoration:none;
    }
    .view-calendar-btn:hover { background:var(--accent); color:var(--primary); transform:translateY(-2px); box-shadow:0 8px 24px rgba(240,165,0,0.4); }
    .fixture-date-group { margin-bottom:32px; animation:cardSlideIn 0.4s ease both; }
    .fixture-date-label {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.8rem;
      letter-spacing:3px;
      color:white;
      margin-bottom:14px;
      padding:10px 20px;
      background:rgba(240,165,0,0.2);
      border-radius:50px;
      border-left: 4px solid var(--accent);
      display:inline-block;
    }
    .fixture-card {
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);
      border-radius:28px;
      padding:28px 40px;
      margin-bottom:16px;
      transition:all 0.25s;
      animation:cardSlideIn 0.4s ease both;
      border:1px solid rgba(240,165,0,0.3);
    }
    .fixture-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(240,165,0,0.35); }
    .fixture-tournament-label {
      font-size:1rem;
      font-weight:700;
      color:rgba(255,255,255,0.7);
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:16px;
      font-family:'Rajdhani',sans-serif;
    }
    .fixture-match-row {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
    }
    .fixture-team-side {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      flex:1;
      text-align:center;
    }
    .fixture-team-name {
      font-family:'Rajdhani',sans-serif;
      font-weight:700;
      font-size:2.2rem;
      color:white;
    }
    .fixture-vs {
      font-family:'Bebas Neue',sans-serif;
      font-size:3rem;
      color:white;
      letter-spacing:4px;
      flex-shrink:0;
      opacity:0.6;
    }
    .matches-list { display:flex; flex-direction:column; gap:24px; }
    .match-card {
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);
      border-radius:28px;
      padding:32px 48px;
      transition:all 0.25s;
      animation:cardSlideIn 0.4s ease both;
      border:1px solid rgba(240,165,0,0.3);
    }
    .match-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(240,165,0,0.35); }
    .match-row { display:flex; align-items:center; justify-content:space-between; gap:32px; }
    .team-side { display:flex; flex-direction:column; align-items:center; gap:16px; flex:1; text-align:center; }
    .team-name-big {
      font-family:'Rajdhani',sans-serif; font-weight:700;
      font-size:2.8rem; color:white; letter-spacing:0.3px;
    }
    .match-center { display:flex; flex-direction:column; align-items:center; gap:8px; flex-shrink:0; min-width:180px; }
    .score-display {
      font-family:'Bebas Neue',sans-serif; font-size:4.5rem;
      color:white; letter-spacing:6px;
      background:rgba(0,0,0,0.3); padding:14px 42px;
      border-radius:80px; border: 2px solid rgba(240,165,0,0.3);
    }
    .forfeit-display {
      font-family:'Bebas Neue',sans-serif; font-size:3rem;
      color:#ffaaaa; letter-spacing:4px;
      background:rgba(0,0,0,0.5); padding:12px 28px;
      border-radius:60px; border: 2px solid #ffaaaa;
    }
    .aggregate-text { font-size:1.6rem; color:rgba(255,255,255,0.7); font-family:'Rajdhani',sans-serif; }
    .goal-scorers { margin-top:12px; }
    .goal-scorer-item {
      display:inline-block; background:rgba(0,0,0,0.4);
      border:1px solid rgba(240,165,0,0.5);
      padding:5px 14px; border-radius:30px;
      margin:3px; font-size:1.2rem; color:white;
    }
    .match-meta { display:flex; gap:16px; flex-wrap:wrap; margin-top:24px; justify-content:center; }
    .meta-tag {
      font-size:1.4rem; font-weight:500; color:white;
      background:rgba(0,0,0,0.3); padding:10px 24px;
      border-radius:50px; border:1px solid rgba(240,165,0,0.3);
      font-family:'Inter',sans-serif;
    }
    .admin-row { display:flex; gap:16px; justify-content:flex-end; margin-top:24px; }

      font-size:1.5rem; padding:12px 32px; border-radius:50px;
      border:none; cursor:pointer; transition:all 0.2s; letter-spacing:1px;
    }
    .btn-edit { background:rgba(240,165,0,0.3); color:white; border:1px solid var(--accent); }
    .btn-edit:hover { background:var(--accent); color:var(--primary); }

    .btn-delete:hover { background:#cc3333; color:white; }
    .add-btn-main {
      display:inline-flex; align-items:center; gap:14px;
      background:rgba(240,165,0,0.3); border: 2px solid var(--accent);
      color:white; font-family:'Rajdhani',sans-serif;
      font-weight:700; font-size:2rem; padding:20px 56px;
      border-radius:100px; cursor:pointer; margin-top:40px;
      transition:all 0.2s; letter-spacing:1px;
    }
    .add-btn-main:hover { background:var(--accent); color:var(--primary); transform:translateY(-3px); box-shadow:0 12px 40px rgba(240,165,0,0.4); }
    .add-result-top-btn {

      background:var(--accent); border: 2px solid var(--accent);
      color:var(--primary); font-family:'Rajdhani',sans-serif;
      font-weight:700; font-size:1.2rem; padding:12px 28px;
      border-radius:40px; cursor:pointer;
      transition:all 0.2s; letter-spacing:1px;
      white-space:nowrap;
    }
    .add-result-top-btn:hover { background:transparent; color:var(--accent); transform:translateY(-2px); box-shadow:0 8px 24px rgba(240,165,0,0.4); }
    .top3-container { display:flex; justify-content:center; gap:0; margin-bottom:40px; width:100%; }
    .top3-block {
      position:relative; text-align:center; flex:1;
      background:rgba(240,165,0,0.06);

      background:rgba(0,0,0,0.2); margin:0; border-radius:0;
    }
    .top3-block:first-child .player-image-wrapper { border-top-left-radius:32px; }
    .top3-block:last-child .player-image-wrapper { border-top-right-radius:32px; }

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
  authDomain: "efootball-412.firebaseapp.com",
  databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
  projectId: "efootball-412",
  storageBucket: "efootball-412.firebasestorage.app",
  messagingSenderId: "596548424249",
  appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const IMGBB_API_KEY = "81c24f30884ec6dda1dbd2b39739e0c9";
const RMBG_KEY = "zdkDj9iwQqbGNe8sJu7AEuE8";
const basePath = "world_cup";

let isAdminMode = false;
let currentSeasonId = 2;
let availableSeasons = [];
let activeSeasonId = 2;
let resultsData = [];
let teamIconsCache = {};
let slideshowImages = [], slideshowDuration = 3000, slideInterval = null, currentSlideIdx = 0;
let navbarLogoUrl = '';
let watchMatchEmbedCode = '';
let topScorerList = [], topAssistantList = [];
let tempScorersHome = [], tempScorersAway = [];
let currentMdFilter = '';
let currentTeamFilter = '';
let currentFixTeamFilter = '';
let currentFixMonthFilter = '';

function getSeasonPath(seasonNum, subPath = "") {
  return `${basePath}/seasons/season_${seasonNum}${subPath ? "/" + subPath : ""}`;
}

async function uploadToImgBB(blob) {
  const fd = new FormData(); fd.append('image', blob);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method:'POST', body:fd });
  const data = await res.json();
  if (!data.success) throw new Error(data.error?.message || 'ImgBB upload failed');
  return data.data.url;
}

async function removeBackground(file) {
  const fd = new FormData();
  fd.append('image_file', file);
  fd.append('size', 'auto');
  const res = await fetch('https://api.remove.bg/v1.0/removebg', {
    method: 'POST', headers: { 'X-Api-Key': RMBG_KEY }, body: fd
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.errors?.[0]?.title || 'remove.bg failed');
  }
  return await res.blob();
}

function pickFile(accept) {
  return new Promise(res => {
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = accept;
    inp.onchange = e => res(e.target.files[0] || null); inp.click();
  });
}

function getTeamIconHtml(teamName, className = "team-icon-sm") {
  const url = teamIconsCache[teamName];
  return url ? `<img class="${className}" src="${url}" alt="${teamName}" onerror="this.style.display='none';">` : '';
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('genericModal').classList.add('active');
}
function closeModal() { document.getElementById('genericModal').classList.remove('active'); }

async function loadNavbarLogo() {
  const snap = await database.ref(`${basePath}/navbar_logo`).once('value');
  navbarLogoUrl = snap.val() || '';
  const c = document.getElementById('logoContainer');
  c.innerHTML = navbarLogoUrl
    ? `<img src="${navbarLogoUrl}" class="navbar-logo" alt="Logo">`
    : `<div class="navbar-logo-placeholder">🌎 CLUB WORLD CUP</div>`;
}

async function loadTeamIcons() {
  const snapshot = await database.ref(`${basePath}/teamIcons`).once('value');
  const data = snapshot.val() || {};
  for (const [team, value] of Object.entries(data)) {
    if (value && value.imageUrl) teamIconsCache[team] = value.imageUrl;
    else if (typeof value === 'string') teamIconsCache[team] = value;
  }
}

async function loadSlideshow() {
  const [imgSnap, durSnap] = await Promise.all([
    database.ref(`${basePath}/slideshow/images`).once('value'),
    database.ref(`${basePath}/slideshow/duration`).once('value'),
  ]);
  slideshowImages = imgSnap.val() || [];
  slideshowDuration = durSnap.val() || 3000;
  if (slideInterval) clearInterval(slideInterval);
  const imgEl = document.getElementById('slideshowImg');
  if (slideshowImages.length) {
    imgEl.style.display = 'block'; currentSlideIdx = 0; updateSlide();
    slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx+1) % slideshowImages.length; updateSlide(); }, slideshowDuration);
  } else { imgEl.style.display = 'none'; }
}

function updateSlide() {
  const img = document.getElementById('slideshowImg');
  img.src = slideshowImages[currentSlideIdx];
  const dots = document.getElementById('dotsContainer');
  dots.innerHTML = '';
  slideshowImages.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === currentSlideIdx ? ' active' : '');
    d.onclick = () => { currentSlideIdx = i; updateSlide(); if (slideInterval) { clearInterval(slideInterval); slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx+1) % slideshowImages.length; updateSlide(); }, slideshowDuration); } };
    dots.appendChild(d);
  });
}

async function loadSeasonsMetadata() {
  const snapshot = await database.ref(`${basePath}/seasons`).once('value');
  const seasons = snapshot.val() || {};
  availableSeasons = [];
  for (const key in seasons) {
    if (!key.startsWith('season_')) continue;
    const id = parseInt(key.split('_')[1]);
    if (!isNaN(id)) availableSeasons.push(id);
    if (seasons[key].active === true) activeSeasonId = id;
  }
  
  if (!availableSeasons.includes(2)) {
    const oldResults = await database.ref(`${basePath}/results`).once('value');
    await database.ref(getSeasonPath(2, 'results')).set(oldResults.val() || {});
    await database.ref(`${basePath}/seasons/season_2/active`).set(true);
    availableSeasons.push(2); activeSeasonId = 2;
  }

  availableSeasons.sort((a,b)=>a-b);
  if (!availableSeasons.includes(activeSeasonId) && availableSeasons.length) activeSeasonId = availableSeasons[0];
  currentSeasonId = activeSeasonId;
  updateSeasonUI();
  await loadCurrentSeasonData();
}

function updateSeasonUI() {
  document.getElementById('seasonNumber').textContent = `Season ${currentSeasonId}`;
  const idx = availableSeasons.indexOf(currentSeasonId);
  document.getElementById('prevSeasonBtn').disabled = idx <= 0;
  document.getElementById('nextSeasonBtn').disabled = idx >= availableSeasons.length - 1;
  document.getElementById('seasonAdminPanel').style.display = isAdminMode ? 'flex' : 'none';
}

async function loadCurrentSeasonData() {
  const resultsSnap = await database.ref(getSeasonPath(currentSeasonId, 'results')).once('value');
  resultsData = resultsSnap.val() ? Object.entries(resultsSnap.val()).map(([k,v])=>({key:k,...v})) : [];
}

async function loadTopScorerData() {
  const snap = await database.ref(getSeasonPath(currentSeasonId, 'topScorers/list')).once('value');
  topScorerList = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : [];
}

async function loadTopAssistantData() {
  const snap = await database.ref(getSeasonPath(currentSeasonId, 'topAssistants/list')).once('value');
  topAssistantList = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : [];
}

async function loadWatchMatchEmbed() {
  const snap = await database.ref(`${basePath}/watchMatch/embedCode`).once('value');
  watchMatchEmbedCode = snap.val() || '';
}

async function switchSeason(delta) {
  const idx = availableSeasons.indexOf(currentSeasonId);
  const nIdx = idx + delta;
  if (nIdx < 0 || nIdx >= availableSeasons.length) return;
  currentSeasonId = availableSeasons[nIdx];
  updateSeasonUI(); await loadCurrentSeasonData();
  await loadTopScorerData(); await loadTopAssistantData();
  renderCurrentTab();
}

async function addNewSeason() {
  const raw = prompt("Enter new season number:"); if (!raw) return;
  const id = parseInt(raw);
  if (isNaN(id)) { alert("Invalid number"); return; }
  if (availableSeasons.includes(id)) { alert("Season already exists"); return; }
  await database.ref(getSeasonPath(id, 'results')).set({});
  await database.ref(getSeasonPath(id, 'topScorers/list')).set({});
  await database.ref(getSeasonPath(id, 'topAssistants/list')).set({});
  availableSeasons.push(id); availableSeasons.sort((a,b)=>a-b);
  currentSeasonId = id; updateSeasonUI();
  await loadCurrentSeasonData(); await loadTopScorerData(); await loadTopAssistantData(); renderCurrentTab();
}

async function renameSeason() {
  const raw = prompt(`New number for Season ${currentSeasonId}:`); if (!raw) return;
  const id = parseInt(raw); if (isNaN(id)) return;
  if (availableSeasons.includes(id) && id !== currentSeasonId) { alert("Number taken"); return; }
  const [rSnap, tsSnap, taSnap] = await Promise.all([
    database.ref(getSeasonPath(currentSeasonId,'results')).once('value'),
    database.ref(getSeasonPath(currentSeasonId,'topScorers')).once('value'),
    database.ref(getSeasonPath(currentSeasonId,'topAssistants')).once('value'),
  ]);
  const wasActive = activeSeasonId === currentSeasonId;
  await database.ref(getSeasonPath(id,'results')).set(rSnap.val()||{});
  await database.ref(getSeasonPath(id,'topScorers')).set(tsSnap.val()||{});
  await database.ref(getSeasonPath(id,'topAssistants')).set(taSnap.val()||{});
  if (wasActive) await database.ref(`${basePath}/seasons/season_${id}/active`).set(true);
  await database.ref(getSeasonPath(currentSeasonId)).remove();
  availableSeasons = availableSeasons.filter(s=>s!==currentSeasonId);
  availableSeasons.push(id); availableSeasons.sort((a,b)=>a-b);
  if (activeSeasonId === currentSeasonId) activeSeasonId = id;
  currentSeasonId = id; updateSeasonUI();
  await loadCurrentSeasonData(); await loadTopScorerData(); await loadTopAssistantData(); renderCurrentTab();
}

async function setActiveSeason() {
  const updates = {};
  availableSeasons.forEach(s => { updates[`${basePath}/seasons/season_${s}/active`] = (s === currentSeasonId); });
  await database.ref().update(updates); activeSeasonId = currentSeasonId;
  alert(`Season ${currentSeasonId} set as active.`);
}

function escapeHtml(s) {
  if(!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderFixtures() {
  const card = document.getElementById('contentCard');
  const allTeams = [...new Set(resultsData.map(r => [r.homeTeam, r.awayTeam]).flat().filter(Boolean))].sort();
  
  let teamF = 'all', monthF = 'all';
  let filtered = [...resultsData];
  if (currentFixTeamFilter && currentFixTeamFilter !== 'all') {
    filtered = filtered.filter(r => r.homeTeam === currentFixTeamFilter || r.awayTeam === currentFixTeamFilter);
  }

  const grouped = {};
  for (const fix of filtered) {
    const date = fix.date || 'Unknown Date';
    if (!grouped[date]) grouped[date] = [];
    grouped[date].push(fix);
  }

  let html = `<div class="filters-bar">
    <div class="filter-group">
      <label>Team</label>
      <select id="fixTeamFilter">
        <option value="all">All Teams</option>
        ${allTeams.map(t => `<option value="${t}" ${currentFixTeamFilter===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="filter-group">
      <button id="clearFixFiltersBtn" class="clear-filters">Clear Filters</button>
    </div>
    <div class="filter-stats">${filtered.length} fixture${filtered.length !== 1 ? 's' : ''} found</div>
    <a href="manager-calendar.html" class="view-calendar-btn">📅 View Calendar</a>
  </div>`;

  const sortedDates = Object.keys(grouped).sort();
  if (!sortedDates.length) {
    html += '<div class="empty-state"><div class="empty-icon">📅</div><p>No fixtures found</p></div>';
  } else {
    for (const dateStr of sortedDates) {
      html += `<div class="fixture-date-group">
        <div class="fixture-date-label">📅 ${escapeHtml(dateStr)}</div>`;
      for (const fix of grouped[dateStr]) {
        const homeIconHtml = getTeamIconHtml(fix.homeTeam, 'team-icon-lg');
        const awayIconHtml = getTeamIconHtml(fix.awayTeam, 'team-icon-lg');
        html += `<div class="fixture-card">
          <div class="fixture-tournament-label">🌎 FIFA Club World Cup</div>
          <div class="fixture-match-row">
            <div class="fixture-team-side">
              ${homeIconHtml}
              <span class="fixture-team-name">${escapeHtml(fix.homeTeam)}</span>
            </div>
            <div class="fixture-vs">VS</div>
            <div class="fixture-team-side">
              ${awayIconHtml}
              <span class="fixture-team-name">${escapeHtml(fix.awayTeam)}</span>
            </div>
          </div>
        </div>`;
      }
      html += `</div>`;
    }
  }

  card.innerHTML = html;
  document.getElementById('fixTeamFilter')?.addEventListener('change', e => { currentFixTeamFilter = e.target.value; renderFixtures(); });
  document.getElementById('clearFixFiltersBtn')?.addEventListener('click', () => { currentFixTeamFilter = ''; renderFixtures(); });
}

function renderResults() {
  const allMds = [...new Set(resultsData.map(r => r.md).filter(md => md !== undefined && md !== null))].sort((a,b)=>a-b);
  const allTeams = [...new Set(resultsData.map(r => [r.homeTeam, r.awayTeam]).flat().filter(Boolean))].sort();

  let filtered = [...resultsData];
  if (currentMdFilter && currentMdFilter !== 'all') {
    const mdNum = parseInt(currentMdFilter);
    filtered = filtered.filter(r => r.md === mdNum);
  }
  if (currentTeamFilter && currentTeamFilter !== 'all') {
    filtered = filtered.filter(r => r.homeTeam === currentTeamFilter || r.awayTeam === currentTeamFilter);
  }
  const sorted = filtered.sort((a,b) => (b.md||0)-(a.md||0));

  let html = `<div class="filters-bar">
    <div class="filter-group">
      <label>Matchday</label>
      <select id="mdFilterSelect">
        <option value="all" ${!currentMdFilter||currentMdFilter==='all'?'selected':''}>All</option>
        ${allMds.map(md => `<option value="${md}" ${currentMdFilter==md?'selected':''}>Matchday ${md}</option>`).join('')}
      </select>
    </div>
    <div class="filter-group">
      <label>Team</label>
      <select id="teamFilterSelect">
        <option value="all" ${!currentTeamFilter||currentTeamFilter==='all'?'selected':''}>All Teams</option>
        ${allTeams.map(team => `<option value="${team}" ${currentTeamFilter===team?'selected':''}>${team}</option>`).join('')}
      </select>
    </div>
    <div class="filter-group">
      <button id="clearFiltersBtn" class="clear-filters">Clear Filters</button>
    </div>
    <div class="filter-stats">${filtered.length} match${filtered.length !== 1 ? 'es' : ''} found</div>
    ${isAdminMode ? `<button class="add-result-top-btn" id="addResultTopBtn">⚽ + Add Result</button>` : ''}
  </div>`;

  if (!sorted.length) {
    html += '<div class="empty-state"><div class="empty-icon">🏆</div><p>No results match the filters</p></div>';
  } else {
    html += '<div class="matches-list">';
    sorted.forEach((r, i) => {
      const homeIcon = getTeamIconHtml(r.homeTeam, 'team-icon-lg');
      const awayIcon = getTeamIconHtml(r.awayTeam, 'team-icon-lg');
      let scoreHtml = '';
      if (r.resultType === 'forfeit' || r.forfeitTeam) {
        scoreHtml = `<div class="score-display">${r.homeScore||'?'} — ${r.awayScore||'?'}</div><div class="aggregate-text">Forfeit</div>`;
      } else {
        scoreHtml = `<div class="score-display">${r.homeScore||'?'} — ${r.awayScore||'?'}</div>`;
      }
      html += `<div class="match-card" style="animation-delay:${i*0.05}s">
        <div class="match-row">
          <div class="team-side">
            ${homeIcon}
            <span class="team-name-big">${escapeHtml(r.homeTeam||'')}</span>
          </div>
          <div class="match-center">${scoreHtml}</div>
          <div class="team-side">
            ${awayIcon}
            <span class="team-name-big">${escapeHtml(r.awayTeam||'')}</span>
          </div>
        </div>
        <div class="match-meta">
          ${r.date ? `<span class="meta-tag">📅 ${escapeHtml(r.date)}</span>` : ''}
          ${r.venue ? `<span class="meta-tag">📍 ${escapeHtml(r.venue)}</span>` : ''}
          ${r.md ? `<span class="meta-tag">MD ${r.md}</span>` : ''}
        </div>
        ${isAdminMode ? `<div class="admin-row">
          <button class="btn-sm btn-edit" data-id="${r.key}">✏️ Edit</button>
          <button class="btn-sm btn-delete" data-id="${r.key}">🗑️ Delete</button>
        </div>` : ''}
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('contentCard').innerHTML = html;
  document.getElementById('mdFilterSelect')?.addEventListener('change', e => { currentMdFilter = e.target.value; renderResults(); });
  document.getElementById('teamFilterSelect')?.addEventListener('change', e => { currentTeamFilter = e.target.value; renderResults(); });
  document.getElementById('clearFiltersBtn')?.addEventListener('click', () => { currentMdFilter = ''; currentTeamFilter = ''; renderResults(); });
  document.getElementById('addResultTopBtn')?.addEventListener('click', () => openResultForm(null));

  if (isAdminMode) {
    document.querySelectorAll('.btn-edit[data-id]').forEach(btn => {
      const r = resultsData.find(x => x.key === btn.dataset.id);
      if (r) btn.onclick = () => openResultForm(r);
    });
    document.querySelectorAll('.btn-delete[data-id]').forEach(btn => {
      btn.onclick = async () => { if (confirm('Delete result?')) await database.ref(getSeasonPath(currentSeasonId, `results/${btn.dataset.id}`)).remove(); await loadCurrentSeasonData(); renderResults(); };
    });
  }
}

      if (e) btn.onclick = () => openStatModal('scorer', e);

    document.querySelectorAll('.btn-delete[data-id]').forEach(btn => {

function renderWatchMatch() {
  let html = '';
  if (watchMatchEmbedCode) {
    html = `<div class="inline-media"><div class="video-wrapper">${watchMatchEmbedCode}</div></div>`;
  } else {
    html = `<div class="empty-state"><div class="empty-icon">🎬</div><p>No match video available yet.</p></div>`;
  }
  if (isAdminMode) html += `<button class="add-btn-main" id="setWatchBtn">🎥 Update Match Video</button>`;
  document.getElementById('contentCard').innerHTML = html;
  if (isAdminMode) document.getElementById('setWatchBtn')?.addEventListener('click', updateWatchMatchEmbed);
}

async function updateWatchMatchEmbed() {
  const embed = prompt("Paste YouTube embed code (iframe) or full URL:", watchMatchEmbedCode);
  if (embed === null) return;
  let finalEmbed = embed.trim();
  if (finalEmbed.includes("youtube.com/watch?v=") || finalEmbed.includes("youtu.be/")) {
    let videoId = '';
    if (finalEmbed.includes("youtu.be/")) videoId = finalEmbed.split("youtu.be/")[1].split(/[?#]/)[0];
    else { const u = new URLSearchParams(new URL(finalEmbed).search); videoId = u.get('v'); }
    if (videoId) finalEmbed = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  }
  await database.ref(`${basePath}/watchMatch/embedCode`).set(finalEmbed);
  watchMatchEmbedCode = finalEmbed;
  alert("Watch Match updated!");
  if (document.querySelector('.tab-btn.active')?.dataset.tab === 'watch') renderWatchMatch();
}

async function openStatModal(type, entry = null) {
  const isScorer = type === 'scorer';
  const currentImageUrl = entry?.imageUrl || '';
  showModal(`
    <h3>${entry ? 'Edit' : 'Add'} ${isScorer ? 'Top Scorer' : 'Top Assistant'}</h3>
    <label>Player Name</label>
    <input id="statName" placeholder="Player Name" value="${escapeHtml(entry?.name || '')}">
    <label>Team</label>
    <input id="statTeam" placeholder="Team" value="${escapeHtml(entry?.team || '')}">
    <label>${isScorer ? 'Goals' : 'Assists'}</label>
    <input id="statCount" type="number" value="${entry?.count || 0}">
    <label>Player Photo (upload will remove background automatically)</label>
    <input type="file" id="statPhoto" accept="image/*">
    <div id="photoPreview" style="margin-top:10px;">${currentImageUrl ? `<img src="${currentImageUrl}" style="max-width:120px; border-radius:12px;">` : 'No photo'}</div>
    <div class="modal-btns">
      <button class="modal-btn-primary" id="saveStatBtn">Save</button>
      <button class="modal-btn-cancel" id="cancelStatBtn">Cancel</button>
    </div>
  `);
  document.getElementById('cancelStatBtn').onclick = closeModal;
  const fileInput = document.getElementById('statPhoto');
  const previewDiv = document.getElementById('photoPreview');
  fileInput.onchange = async () => {
    const file = fileInput.files[0];
    if (!file) return;
    previewDiv.innerHTML = '<div class="status-msg status-loading">Processing image (remove.bg)...</div>';
    try {
      let processedBlob;
      try { processedBlob = await removeBackground(file); }
      catch(e) { processedBlob = file; }
      const url = await uploadToImgBB(processedBlob);
      previewDiv.innerHTML = `<img src="${url}" style="max-width:120px; border-radius:12px;"><div class="status-msg status-success">Photo ready</div>`;
      fileInput.dataset.uploadedUrl = url;
    } catch(e) { previewDiv.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`; }
  };
  document.getElementById('saveStatBtn').onclick = async () => {
    const name = document.getElementById('statName').value.trim();
    const team = document.getElementById('statTeam').value.trim();
    const count = parseInt(document.getElementById('statCount').value) || 0;
    if (!name || !team) { alert("Fill all fields"); return; }
    let imageUrl = currentImageUrl;
    if (fileInput.files.length && fileInput.dataset.uploadedUrl) imageUrl = fileInput.dataset.uploadedUrl;
    const data = { name, team, count, imageUrl };
    const path = isScorer ? getSeasonPath(currentSeasonId, 'topScorers/list') : getSeasonPath(currentSeasonId, 'topAssistants/list');
    if (entry?.key) await database.ref(`${path}/${entry.key}`).set(data);
    else await database.ref(path).push(data);
    closeModal();
    if (isScorer) { await loadTopScorerData(); renderTopScorers(); }
    else { await loadTopAssistantData(); renderTopAssistants(); }
  };
}

async function openResultForm(r) {
  const homeTeams = [...new Set(resultsData.map(x => x.homeTeam).filter(Boolean))].sort();
  const awayTeams = [...new Set(resultsData.map(x => x.awayTeam).filter(Boolean))].sort();
  const homeOpts = homeTeams.map(t=>`<option value="${t}" ${r?.homeTeam===t?'selected':''}>${t}</option>`).join('');
  const awayOpts = awayTeams.map(t=>`<option value="${t}" ${r?.awayTeam===t?'selected':''}>${t}</option>`).join('');
  
  showModal(`
    <h3>${r ? 'Edit Result' : 'Add Result'}</h3>
    <label>Home Team</label>
    <select id="rHome"><option value="">Select Team</option>${homeOpts}</select>
    <label>Away Team</label>
    <select id="rAway"><option value="">Select Team</option>${awayOpts}</select>
    <label>Home Score</label>
    <input id="rHS" type="number" value="${r?.homeScore || 0}">
    <label>Away Score</label>
    <input id="rAS" type="number" value="${r?.awayScore || 0}">
    <label>Result Type</label>
    <select id="rType">
      <option value="normal" ${(!r?.resultType||r.resultType==='normal')?'selected':''}>Normal</option>
      <option value="forfeit" ${r?.resultType==='forfeit'?'selected':''}>Forfeit</option>
      <option value="nocontest" ${r?.resultType==='nocontest'?'selected':''}>No Contest</option>
    </select>
    <label>Date (optional)</label>
    <input id="rDate" placeholder="e.g. 15 May 2025" value="${r?.date || ''}">
    <label>Venue (optional)</label>
    <input id="rVenue" placeholder="Venue" value="${r?.venue || ''}">
    <label>Matchday (optional)</label>
    <input id="rMd" type="number" value="${r?.md || ''}">
    <div class="modal-btns">
      <button class="modal-btn-primary" id="saveResultBtn">Save</button>
      <button class="modal-btn-cancel" id="cancelResultBtn">Cancel</button>
    </div>
  `);
  document.getElementById('cancelResultBtn').onclick = closeModal;
  document.getElementById('saveResultBtn').onclick = async () => {
    const homeTeam = document.getElementById('rHome').value;
    const awayTeam = document.getElementById('rAway').value;
    const hs = parseInt(document.getElementById('rHS').value) || 0;
    const as2 = parseInt(document.getElementById('rAS').value) || 0;
    const resultType = document.getElementById('rType').value;
    const date = document.getElementById('rDate').value.trim();
    const venue = document.getElementById('rVenue').value.trim();
    const md = parseInt(document.getElementById('rMd').value) || null;
    if (!homeTeam || !awayTeam) { alert("Select both teams"); return; }
    if (homeTeam === awayTeam) { alert("Teams cannot be the same"); return; }
    const resultData = {
      homeTeam, awayTeam, homeScore: hs, awayScore: as2,
      resultType: resultType === 'normal' ? 'normal' : resultType,
      ...(date && { date }),
      ...(venue && { venue }),
      ...(md !== null && { md })
    };
    const path = getSeasonPath(currentSeasonId, 'results');
    if (r?.key) await database.ref(`${path}/${r.key}`).set(resultData);
    else await database.ref(path).push(resultData);
    closeModal();
    await loadCurrentSeasonData();
    renderResults();
  };
}

function renderCurrentTab() {
  const tab = document.querySelector('.tab-btn.active')?.dataset.tab;
  document.getElementById('contentCard').innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>Loading…</span></div>';
  if (tab === 'fixtures') renderFixtures();
  else if (tab === 'results') renderResults();
  else if (tab === 'topscorers') renderTopScorers();
  else if (tab === 'topassists') renderTopAssistants();
  else if (tab === 'watch') renderWatchMatch();
}

function closeMenu() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }

document.getElementById('menuBtn').onclick = toggleMenu;

document.getElementById('overlay').onclick = closeMenu;
document.getElementById('homeBtn').onclick = () => window.location.href = 'feed.html';
document.getElementById('adminModeBtn').onclick = () => {

    isAdminMode = true; alert("Admin mode activated ✅");

};

document.getElementById('prevSeasonBtn').onclick = () => switchSeason(-1);
document.getElementById('nextSeasonBtn').onclick = () => switchSeason(1);
document.getElementById('addSeasonBtn').onclick = () => isAdminMode && addNewSeason();
document.getElementById('renameSeasonBtn').onclick = () => isAdminMode && renameSeason();
document.getElementById('setActiveSeasonBtn').onclick = () => isAdminMode && setActiveSeason();

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

async function init() {
  await loadNavbarLogo();
  await loadSlideshow();
  await loadTeamIcons();
  await loadWatchMatchEmbed();
  await loadSeasonsMetadata();
  await loadTopScorerData();
  await loadTopAssistantData();

init();
