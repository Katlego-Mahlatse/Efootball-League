<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- DYNAMIC VIEWPORT: ensures full 1200px width is visible on any screen without changing element sizes -->
  <script>
    (function() {
      // Target design width is 1200px
      var designWidth = 1200;
      // Get actual screen width (viewport width)
      var screenWidth = window.screen.width;
      // Calculate scale so that 1200px fits horizontally
      var scale = screenWidth / designWidth;
      // Clamp scale to reasonable range (minimum 0.3, maximum 1.0) – ensures readability
      scale = Math.min(1.0, Math.max(0.3, scale));
      // Create viewport meta tag with dynamic initial-scale
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <!-- Original viewport meta removed, replaced by dynamic script above -->
  <!-- Firebase SDKs (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

      from { opacity: 0; transform: translateY(-20px); }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }

    .league-table-wrapper {

      -webkit-overflow-scrolling: touch;
      position: relative;

    /* STICKY FIRST TWO COLUMNS (Pos + Club) with divider after Club column */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px; /* ensure horizontal scroll */
      font-size: 2.4rem;
    }
    
    /* Pos column sticky */
    .stats-table th:first-child,
    .stats-table td:first-child {
      position: sticky;
      left: 0;
      background: #f5d742;
      z-index: 10;
      padding-right: 24px;
    }
    
    /* Club column sticky - immediately after Pos */
    .stats-table th:nth-child(2),
    .stats-table td:nth-child(2) {
      position: sticky;
      left: 160px; /* doubled */
      background: #f5d742;
      z-index: 10;
      padding-right: 24px;
    }
    
    /* Vertical divider line after Club column (between Club and P) */
    .stats-table th:nth-child(2)::after,
    .stats-table td:nth-child(2)::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 0;
      bottom: 0;
      width: 8px;
      background: #1a1a1a;
      z-index: 15;
    }
    
    /* Ensure cells have relative positioning for pseudo-element */
    .stats-table th, .stats-table td {
      position: relative;
      padding: 2rem 1.6rem;
      text-align: left;
      border-bottom: 4px solid #e5e7eb;
      background-color: #f5d742;
    }

  function renderLeagueTable() { /* original implementation preserved, but keep unchanged */ const tbody=document.getElementById('tableBody'); if(!tbody)return; const actionHeader=document.getElementById('actionHeader'); if(actionHeader)actionHeader.style.display=isAdminMode?'table-cell':'none'; tbody.innerHTML=''; const sorted=[...teamsData].sort((a,b)=>(b.pts||0)-(a.pts||0)||(b.gd||0)-(a.gd||0)); sorted.forEach((team,idx)=>{ const row=tbody.insertRow(); const pos=idx+1; let barClass=""; if(currentSeasonId===1){ if(pos<=4)barClass="blue-bar-vertical"; }else if(currentSeasonId===2){ if(pos<=4)barClass="blue-bar-vertical"; else if(pos<=8)barClass="orange-bar-vertical"; else if(pos<=12)barClass="green-bar-vertical"; if(pos===8)row.classList.add("dashed-separator-white"); }else{ if(pos<=4)barClass="blue-bar-vertical"; else if(pos<=8)barClass="orange-bar-vertical"; else if(pos<=12)barClass="green-bar-vertical"; else if(pos>=18&&pos<=20)barClass="red-bar-vertical"; if(pos===8)row.classList.add("dashed-separator-white"); if(pos===17)row.classList.add("dashed-separator-red"); } const posCell=row.insertCell(0); posCell.className="rank-cell"; if(barClass)posCell.innerHTML=`<div class="pos-with-bar"><span class="vertical-bar ${barClass}"></span>${pos}</div>`; else posCell.innerText=pos; let arrowHtml=""; if(window.showFormArrows){ const arrow=getLatestArrow(team.name); if(arrow==="↑")arrowHtml='<span class="arrow-up">↑</span> '; else if(arrow==="↓")arrowHtml='<span class="arrow-down">↓</span> '; else if(arrow==="→")arrowHtml='<span class="arrow-side">→</span> '; else if(arrow==="⚪")arrowHtml='<span style="opacity:0.5;">⚪</span> '; else arrowHtml='<span style="opacity:0.3;">—</span> '; } const displayName=(window.currentView==="player"&&playerMap[team.name])?playerMap[team.name]:team.name; const iconHtml=getTeamIconHtml(team.name,"team-icon"); row.insertCell(1).innerHTML=`<div class="team-name">${arrowHtml}${iconHtml}${displayName}</div>`; row.insertCell(2).innerText=team.p||0; const wCell=row.insertCell(3),dCell=row.insertCell(4),lCell=row.insertCell(5); if(currentSeasonId===1){ wCell.innerText=team.w||0; dCell.innerText=team.d||0; lCell.innerText=team.l||0; }else if(currentSeasonId===2){ wCell.innerText="🤷‍♂️"; dCell.innerText="🤷‍♂️"; lCell.innerText="🤷‍♂️"; }else{ wCell.innerText=team.w||0; dCell.innerText=team.d||0; lCell.innerText=team.l||0; } const gsCell=row.insertCell(6),gcCell=row.insertCell(7); if(currentSeasonId===1||currentSeasonId===2){ gsCell.innerText="🤷‍♂️"; gcCell.innerText="🤷‍♂️"; }else{ gsCell.innerText=team.gs||0; gcCell.innerText=team.gc||0; } const gd=team.gd||0; row.insertCell(8).innerText=gd>0?`+${gd}`:`${gd}`; const ptsCell=row.insertCell(9); ptsCell.className="pts-cell"; ptsCell.innerText=team.pts||0; const last5Cell=row.insertCell(10); if(window.showLast5){ const last5=getTeamLast5(team.name); const container=document.createElement("div"); container.className="form-circles"; last5.forEach(res=>{ const circle=document.createElement("span"); circle.className="circle-result"; if(res==="W"){circle.classList.add("circle-win"); circle.innerHTML="✓";} else if(res==="L"){circle.classList.add("circle-loss"); circle.innerHTML="✗";} else if(res==="D"){circle.classList.add("circle-draw"); circle.innerHTML="–";} else if(res==="F"){circle.classList.add("circle-forfeit-grey"); circle.innerHTML="F";} else if(res==="WF"){circle.classList.add("circle-forfeit-win"); circle.innerHTML="F";} else if(res==="LF"){circle.classList.add("circle-forfeit-loss"); circle.innerHTML="F";} else {circle.classList.add("circle-blank"); circle.innerHTML="";} container.appendChild(circle); }); last5Cell.appendChild(container); } else last5Cell.innerHTML=''; if(isAdminMode){ const actions=row.insertCell(11); const editBtn=document.createElement('button'); editBtn.innerText='✏️'; editBtn.className='edit-btn'; editBtn.onclick=()=>openTeamForm(team.key,team); const delBtn=document.createElement('button'); delBtn.innerText='🗑️'; delBtn.className='delete-btn'; delBtn.onclick=async()=>{ if(confirm('Delete this team?')){ await database.ref(getSeasonPath(currentSeasonId, `table/${team.key}`)).remove(); } }; actions.appendChild(editBtn); actions.appendChild(delBtn); } }); renderLegend(); }

  function getResultStatusForTeam(team, matchText) { const lower = matchText.toLowerCase(); if (lower.includes("no contest") || lower.includes("f - f")) return "F"; const isForfeit = lower.includes("forfeit") || lower.includes("forfeited"); const parts = matchText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/); if (parts) { let home = parts[1].trim(), hScore = parseInt(parts[2]), aScore = parseInt(parts[3]), away = parts[4].trim(); if (home === team && hScore > aScore) return isForfeit ? "WF" : "W"; if (home === team && hScore < aScore) return isForfeit ? "LF" : "L"; if (away === team && aScore > hScore) return isForfeit ? "WF" : "W"; if (away === team && aScore < hScore) return isForfeit ? "LF" : "L"; if ((home === team || away === team) && hScore === aScore) return "D"; } return null; }
  function getTeamLast5(team) { const teamResults = resultsData.filter(r => r.matchText.includes(team)).sort((a,b)=>(b.md||0)-(a.md||0)); const last5 = teamResults.slice(0,5).map(r => getResultStatusForTeam(team, r.matchText)).filter(s=>s); while(last5.length<5) last5.push(null); return last5.reverse(); }
  function renderLegend() { const container = document.getElementById('legendContainer'); if(!container) return; let legendHtml = '<div style="display:flex; flex-wrap:wrap; gap:3rem; justify-content:center;">'; if(currentSeasonId===1) legendHtml += '<span class="legend-item"><span class="legend-vertical-bar legend-blue"></span><span>UEFA Champions League</span></span>'; else if(currentSeasonId===2){ legendHtml+='<span class="legend-item"><span class="legend-vertical-bar legend-blue"></span><span>UEFA Champions League</span></span><span class="legend-item"><span class="legend-vertical-bar legend-orange"></span><span>Europa League</span></span><span class="legend-item"><span class="legend-dashed-white"></span><span>FIFA Club World Cup</span></span><span class="legend-item"><span class="legend-vertical-bar legend-green"></span><span>UEFA Conference League</span></span>'; } else { legendHtml+='<span class="legend-item"><span class="legend-vertical-bar legend-blue"></span><span>UEFA Champions League</span></span><span class="legend-item"><span class="legend-vertical-bar legend-orange"></span><span>Europa League</span></span><span class="legend-item"><span class="legend-dashed-white"></span><span>FIFA Club World Cup</span></span><span class="legend-item"><span class="legend-vertical-bar legend-green"></span><span>UEFA Conference League</span></span><span class="legend-item"><span class="legend-vertical-bar legend-red"></span><span>Relegation</span></span>'; } legendHtml+='</div>'; container.innerHTML=legendHtml; }
  async function updateTeamStats(homeTeam, awayTeam, homeScore, awayScore, forfeitType) { /* same as original but kept functional */ const tableRef = database.ref(getSeasonPath(currentSeasonId, 'table')); const snapshot = await tableRef.once('value'); const teams = snapshot.val() || {}; let homeTeamKey=null, awayTeamKey=null, homeTeamData=null, awayTeamData=null; for(const [key,data] of Object.entries(teams)){ if(data.name===homeTeam){homeTeamKey=key;homeTeamData=data;} if(data.name===awayTeam){awayTeamKey=key;awayTeamData=data;} } if(!homeTeamData){ homeTeamData={name:homeTeam,p:0,w:0,d:0,l:0,gs:0,gc:0,gd:0,pts:0}; homeTeamKey=tableRef.push().key; } if(!awayTeamData){ awayTeamData={name:awayTeam,p:0,w:0,d:0,l:0,gs:0,gc:0,gd:0,pts:0}; awayTeamKey=tableRef.push().key; } homeTeamData.p+=1; awayTeamData.p+=1; if(forfeitType==="no_contest"){} else if(forfeitType==="forfeit_no_reply"||forfeitType==="forfeit_agreement"){ if(homeScore>awayScore){ homeTeamData.pts+=3; homeTeamData.w+=1; awayTeamData.gd-=3; awayTeamData.gc+=3; awayTeamData.l+=1; } else if(awayScore>homeScore){ awayTeamData.pts+=3; awayTeamData.w+=1; homeTeamData.gd-=3; homeTeamData.gc+=3; homeTeamData.l+=1; } } else { homeTeamData.gs+=homeScore; homeTeamData.gc+=awayScore; awayTeamData.gs+=awayScore; awayTeamData.gc+=homeScore; homeTeamData.gd=homeTeamData.gs-homeTeamData.gc; awayTeamData.gd=awayTeamData.gs-awayTeamData.gc; if(homeScore>awayScore){ homeTeamData.pts+=3; homeTeamData.w+=1; awayTeamData.l+=1; } else if(awayScore>homeScore){ awayTeamData.pts+=3; awayTeamData.w+=1; homeTeamData.l+=1; } else { homeTeamData.pts+=1; awayTeamData.pts+=1; homeTeamData.d+=1; awayTeamData.d+=1; } } await tableRef.child(homeTeamKey).set(homeTeamData); await tableRef.child(awayTeamKey).set(awayTeamData); }
  function formatResultText(homeTeam, homeScore, awayTeam, awayScore, forfeitType){ if(forfeitType==="no_contest") return `${homeTeam} F - F ${awayTeam} (No Contest)`; else if(forfeitType==="forfeit_no_reply") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited - No Reply)`; else if(forfeitType==="forfeit_agreement") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited on Agreement)`; else return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`; }

  document.getElementById('saveTeamBtn').onclick = async () => { const name=document.getElementById('teamNameInput').value.trim(); const p=parseInt(document.getElementById('teamP').value)||0; const w=parseInt(document.getElementById('teamW').value)||0; const d=parseInt(document.getElementById('teamD').value)||0; const l=parseInt(document.getElementById('teamL').value)||0; const gs=parseInt(document.getElementById('teamGS').value)||0; const gc=parseInt(document.getElementById('teamGC').value)||0; const gd=parseInt(document.getElementById('teamGD').value)||0; const pts=parseInt(document.getElementById('teamPts').value)||0; if(!name){alert("Team name required");return;} if(editingTeamKey) await database.ref(getSeasonPath(currentSeasonId, `table/${editingTeamKey}`)).set({name,p,w,d,l,gs,gc,gd,pts}); else await database.ref(getSeasonPath(currentSeasonId, 'table')).push({name,p,w,d,l,gs,gc,gd,pts}); document.getElementById('teamForm').classList.remove('active'); };

  async function openResultForm(key,data){ editingResultKey=key; const homeSel=document.getElementById('resultHomeTeam'); const awaySel=document.getElementById('resultAwayTeam'); const currentSeasonTeams=teamsData.map(t=>t.name).sort(); homeSel.innerHTML='<option value="">Select Home Team</option>'+currentSeasonTeams.map(t=>`<option value="${t}">${t}</option>`).join(''); awaySel.innerHTML='<option value="">Select Away Team</option>'+currentSeasonTeams.map(t=>`<option value="${t}">${t}</option>`).join(''); if(data){ const text=data.matchText; let homeTeam="",awayTeam="",homeScore="",awayScore="",forfeit="none"; if(text.includes("F - F")){ const parts=text.split(/\s*F\s*-\s*F\s*/i); if(parts.length>=2){ homeTeam=parts[0].trim().replace(/\(.*\)/g,'').trim(); awayTeam=parts[1].trim().replace(/\(.*\)/g,'').trim(); homeScore="F"; awayScore="F"; } } else{ const scoreRegex=/(\d+)\s*-\s*(\d+)/; const match=text.match(scoreRegex); if(match){ homeScore=match[1];awayScore=match[2]; const parts=text.split(/\s+\d+\s*-\s*\d+\s+/); if(parts.length>=2){ homeTeam=parts[0].trim(); awayTeam=parts[1].trim().replace(/\(.*\)/g,'').trim(); } } } if(text.includes("No Contest")) forfeit="no_contest"; else if(text.includes("Forfeited - No Reply")) forfeit="forfeit_no_reply"; else if(text.includes("Forfeited on Agreement")) forfeit="forfeit_agreement"; homeSel.value=homeTeam||""; awaySel.value=awayTeam||""; document.getElementById('resultHomeScore').value=homeScore==="F"?0:(homeScore||0); document.getElementById('resultAwayScore').value=awayScore==="F"?0:(awayScore||0); document.getElementById('resultForfeitType').value=forfeit; document.getElementById('resultMd').value=data.md||""; } else{ homeSel.value=""; awaySel.value=""; document.getElementById('resultHomeScore').value=0; document.getElementById('resultAwayScore').value=0; document.getElementById('resultForfeitType').value="none"; document.getElementById('resultMd').value=""; } document.getElementById('resultFormTitle').innerText=key?"Edit Result":"Add Result"; document.getElementById('resultForm').classList.add('active'); }
  document.getElementById('addResultBtn').onclick = () => openResultForm(null);
  document.getElementById('saveResultBtn').onclick = async () => { const homeTeam=document.getElementById('resultHomeTeam').value; const awayTeam=document.getElementById('resultAwayTeam').value; let homeScore=document.getElementById('resultHomeScore').value; let awayScore=document.getElementById('resultAwayScore').value; const forfeitType=document.getElementById('resultForfeitType').value; const md=parseInt(document.getElementById('resultMd').value); if(!homeTeam||!awayTeam||!md){alert("Please fill all fields");return;} if(homeTeam===awayTeam){alert("Home and away teams cannot be the same");return;} if(forfeitType!=="no_contest"){homeScore=parseInt(homeScore)||0; awayScore=parseInt(awayScore)||0;} else{homeScore="F"; awayScore="F";} const matchText=formatResultText(homeTeam,homeScore,awayTeam,awayScore,forfeitType); if(editingResultKey) await database.ref(getSeasonPath(currentSeasonId, `results/${editingResultKey}`)).set({matchText,md}); else{ await database.ref(getSeasonPath(currentSeasonId, 'results')).push({matchText,md}); const hScore=homeScore==="F"?0:parseInt(homeScore); const aScore=awayScore==="F"?0:parseInt(awayScore); await updateTeamStats(homeTeam,awayTeam,hScore,aScore,forfeitType); } document.getElementById('resultForm').classList.remove('active'); };

  async function loadSlideshow() { const snap = await database.ref('slideshow/images').once('value'); slideshowImages = snap.val() || []; const durSnap = await database.ref('slideshow/duration').once('value'); slideshowDuration = durSnap.val() || 3000; startSlideshow(); }
  function startSlideshow() { if(slideInterval) clearInterval(slideInterval); if(!slideshowImages.length) return; currentSlideIdx=0; updateSlideImage(); slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx+1)%slideshowImages.length; updateSlideImage(); }, slideshowDuration); }

  async function addNewSeason() { let newId = prompt("Enter season number:"); if(!newId) return; newId = parseInt(newId); if(isNaN(newId)){alert("Invalid number");return;} if(availableSeasons.includes(newId)){alert("Season already exists");return;} await database.ref(`seasons/season_${newId}/table`).set({}); await database.ref(`seasons/season_${newId}/results`).set({}); await database.ref(`seasons/season_${newId}/managerMap`).set({}); availableSeasons.push(newId); availableSeasons.sort((a,b)=>a-b); currentSeasonId = newId; updateSeasonDisplay(); await loadCurrentSeasonData(); await loadManagerNamesForSeason(); updateFilterDropdowns(); applyFiltersAndRender(); }
  async function renameSeason() { let seasonList = availableSeasons.map(s=>`Season ${s}`).join(', '); let oldNum = prompt(`Enter current season number to rename (existing: ${seasonList}):`); if(!oldNum) return; oldNum=parseInt(oldNum); if(!availableSeasons.includes(oldNum)){alert("Season not found");return;} let newNum=prompt(`Enter new season number for Season ${oldNum}:`); if(!newNum) return; newNum=parseInt(newNum); if(isNaN(newNum)){alert("Invalid number");return;} if(availableSeasons.includes(newNum)&&newNum!==oldNum){alert("A season with that number already exists");return;} const oldTable = await database.ref(getSeasonPath(oldNum,'table')).once('value'); const oldResults = await database.ref(getSeasonPath(oldNum,'results')).once('value'); const oldManager = await database.ref(getSeasonPath(oldNum,'managerMap')).once('value'); const wasActive = (activeSeasonId === oldNum); await database.ref(getSeasonPath(newNum,'table')).set(oldTable.val()||{}); await database.ref(getSeasonPath(newNum,'results')).set(oldResults.val()||{}); await database.ref(getSeasonPath(newNum,'managerMap')).set(oldManager.val()||{}); if(wasActive) await database.ref(`seasons/season_${newNum}/active`).set(true); await database.ref(getSeasonPath(oldNum)).remove(); availableSeasons = availableSeasons.filter(s=>s!==oldNum); availableSeasons.push(newNum); availableSeasons.sort((a,b)=>a-b); if(currentSeasonId===oldNum) currentSeasonId=newNum; if(activeSeasonId===oldNum) activeSeasonId=newNum; updateSeasonDisplay(); await loadCurrentSeasonData(); await loadManagerNamesForSeason(); updateFilterDropdowns(); applyFiltersAndRender(); alert(`Season renamed from ${oldNum} to ${newNum}`); }
