<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>UEFA Champions League | eFootball Fan Hub</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ucl-blue: #0A2B5E;
      --ucl-blue-light: #0E3A7A;
      --ucl-gold: #C5A647;
      --white: #FFFFFF;
      --dark-text: #1A2C3E;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--ucl-blue);
      min-height: 100vh;
      transition: background-image 0.3s ease;
      position: relative;
    }

    body.has-bg-image::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.85;
      z-index: -1;
    }

    /* Smaller navbar */
    .navbar {
      background: var(--white);
      padding: 0.5rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-logo {
      height: 45px;
      max-width: 160px;
      object-fit: contain;
      cursor: pointer;
    }

    .navbar-logo-placeholder {
      height: 45px;
      width: 160px;
      background: #f0f0f0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ucl-blue);
      font-weight: bold;
      border: 1px solid var(--ucl-blue);
      font-size: 0.8rem;
    }

    /* Menu button */
    .menu-btn {
      background: var(--ucl-blue);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      border: none;
      transition: transform 0.2s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .menu-btn span {
      width: 20px;
      height: 2.5px;
      background: var(--white);
      border-radius: 2px;
    }

    .menu-btn:hover {
      transform: scale(1.05);
    }

    /* Overlay & side menu */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 199;
      display: none;
    }
    .overlay.active { display: block; }

    .side-menu {
      position: fixed;
      top: 0;
      right: -280px;
      width: 260px;
      height: 100%;
      background: var(--white);
      z-index: 200;
      padding: 25px 20px;
      transition: right 0.3s ease;
      box-shadow: -2px 0 20px rgba(0,0,0,0.2);
      border-left: 3px solid var(--ucl-blue);
    }
    .side-menu.active { right: 0; }

    .close-menu {
      text-align: right;
      font-size: 26px;
      cursor: pointer;
      color: var(--ucl-blue);
      margin-bottom: 25px;
    }
    .menu-item {
      padding: 12px 18px;
      margin: 8px 0;
      background: rgba(10,43,94,0.08);
      border-radius: 30px;
      cursor: pointer;
      font-weight: 500;
      color: var(--ucl-blue);
      transition: 0.2s;
    }
    .menu-item:hover {
      background: var(--ucl-blue);
      color: white;
      transform: translateX(5px);
    }

    /* Slideshow */
    .slideshow-container {
      text-align: center;
      padding: 20px 20px 10px;
    }
    .slideshow-img {
      max-width: 90%;
      max-height: 380px;
      border-radius: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
      border: 2px solid var(--white);
      object-fit: cover;
    }
    .dots-container {
      margin-top: 12px;
    }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      margin: 0 5px;
      cursor: pointer;
      transition: 0.2s;
    }
    .dot.active {
      background: var(--white);
      transform: scale(1.2);
    }

    /* Season selector - right aligned under slideshow */
    .season-bar {
      display: flex;
      justify-content: flex-end;
      margin: 15px 30px 10px;
    }
    .season-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.4);
      padding: 5px 15px;
      border-radius: 50px;
      backdrop-filter: blur(4px);
    }
    .season-arrow {
      background: white;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      font-weight: bold;
      color: var(--ucl-blue);
      transition: 0.2s;
    }
    .season-arrow:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .season-number {
      font-weight: bold;
      font-size: 1.2rem;
      background: white;
      padding: 4px 18px;
      border-radius: 30px;
      color: var(--ucl-blue);
      cursor: pointer;
      min-width: 120px;
      text-align: center;
    }
    .season-admin-btns {
      display: flex;
      gap: 8px;
      margin-left: 12px;
    }
    .season-admin-btn {
      background: white;
      border: none;
      padding: 4px 14px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      color: var(--ucl-blue);
      font-size: 0.8rem;
    }

    /* Horizontal tabs at bottom */
    .tabs-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 30px 20px 20px;
      flex-wrap: wrap;
    }
    .tab-btn {
      background: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 8px 22px;
      cursor: pointer;
      color: white;
      border-radius: 40px;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: white;
      color: var(--ucl-blue);
    }
    .tab-btn:hover:not(.active) {
      background: rgba(255,255,255,0.2);
    }

    /* Transparent Card */
    .card-transparent {
      background: transparent;
      backdrop-filter: blur(2px);
      margin: 20px;
      border-radius: 24px;
      padding: 20px;
    }

    /* Fixtures / Results list */
    .fixtures-list, .results-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .fixture-item, .result-item {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .match-details {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .match-teams {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .team-with-icon {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
    }
    .team-icon-small {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 50%;
      background: white;
      padding: 2px;
    }
    .vs {
      font-weight: bold;
      color: var(--ucl-gold);
      font-size: 1rem;
    }
    .match-score {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--ucl-gold);
      background: rgba(0,0,0,0.5);
      padding: 2px 12px;
      border-radius: 30px;
    }
    .match-meta {
      font-size: 0.8rem;
      color: #ddd;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .match-meta span {
      background: rgba(0,0,0,0.4);
      padding: 2px 10px;
      border-radius: 20px;
    }
    .admin-actions {
      display: flex;
      gap: 8px;
    }
    .edit-btn, .delete-btn, .add-result-btn {
      background: white;
      border: none;
      padding: 5px 12px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.8rem;
    }

    /* Stats table (popup) */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      overflow: hidden;
    }
    .stats-table th, .stats-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      color: white;
    }
    .stats-table th {
      background: rgba(0,0,0,0.5);
    }

    .add-btn {
      background: white;
      color: var(--ucl-blue);
      border: none;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: white;
      border-radius: 28px;
      padding: 25px;
      max-width: 550px;
      width: 90%;
      color: var(--ucl-blue);
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-card input, .modal-card select, .modal-card textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 30px;
      border: 1px solid #ccc;
    }
    .image-preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 15px 0;
    }
    .preview-item {
      position: relative;
      width: 90px;
      height: 90px;
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }
    .delete-preview {
      position: absolute;
      top: -8px;
      right: -8px;
      background: red;
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      line-height: 20px;
    }
    .bg-preview {
      margin: 15px 0;
      text-align: center;
    }
    .bg-preview img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 16px;
      border: 2px solid var(--ucl-blue);
    }

    footer {
      text-align: center;
      padding: 25px;
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<div class="navbar">
  <div id="logoContainer"></div>
  <div class="menu-btn" id="menuBtn">
    <span></span><span></span><span></span>
  </div>
</div>
<div class="overlay" id="overlay"></div>
<div class="side-menu" id="sideMenu">
  <div class="close-menu" id="closeMenuBtn">x</div>
  <div class="menu-item" id="homeBtn">Home</div>
  <div class="menu-item" id="adminModeBtn">Admin Mode</div>
</div>

<div class="slideshow-container">
  <img id="slideshowImg" class="slideshow-img" src="" alt="Slideshow">
  <div class="dots-container" id="dotsContainer"></div>
</div>

<div class="season-bar">
  <div class="season-controls">
    <button class="season-arrow" id="prevSeasonBtn">‹</button>
    <div class="season-number" id="seasonNumber">Season 1</div>
    <button class="season-arrow" id="nextSeasonBtn">›</button>
    <div id="seasonAdminPanel" style="display:none;" class="season-admin-btns">
      <button class="season-admin-btn" id="addSeasonBtn">+New</button>
      <button class="season-admin-btn" id="renameSeasonBtn">Rename</button>
      <button class="season-admin-btn" id="setActiveSeasonBtn">Set Active</button>
    </div>
  </div>
</div>

<div class="tabs-container">
  <button class="tab-btn active" data-tab="fixtures">Fixtures</button>
  <button class="tab-btn" data-tab="results">Results</button>
  <button class="tab-btn" data-tab="scorers">Top Scorers</button>
  <button class="tab-btn" data-tab="assists">Top Assists</button>
</div>

<div class="card-transparent" id="contentCard">
  <!-- dynamic content for fixtures (default) -->
</div>

<footer>eFootball Fan Hub — UEFA Champions League</footer>

<!-- Generic Modal -->
<div id="genericModal" class="modal-overlay"><div class="modal-card" id="modalContent"></div></div>

<script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const IMGBB_KEY = "81c24f30884ec6dda1dbd2b39739e0c9";

  // Paths
  const BASE_PATH = "champions_league";
  let isAdmin = false;
  let currentSeasonId = 1;
  let availableSeasons = [1];
  let activeSeasonId = 1;
  let teamIcons = {};

  let fixtures = [];
  let results = [];
  let topScorers = [];
  let topAssists = [];

  // Slideshow
  let slideshowImages = [];
  let slideInterval = null;
  let currentSlide = 0;
  let slideshowDuration = 3000;

  // Background image
  let bgImageUrl = null;
  let navbarLogoUrl = null;

  // Helper: upload to ImgBB
  async function uploadToImgBB(file) {
    const fd = new FormData();
    fd.append('image', file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.success) throw new Error(data.error?.message);
    return data.data.url;
  }

  // Load background
  async function loadBackground() {
    const snap = await db.ref(`${BASE_PATH}/settings/backgroundImage`).once('value');
    bgImageUrl = snap.val();
    if (bgImageUrl) {
      document.body.style.backgroundImage = `url(${bgImageUrl})`;
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center';
      document.body.style.backgroundAttachment = 'fixed';
      document.body.classList.add('has-bg-image');
    } else {
      document.body.style.backgroundImage = '';
      document.body.style.backgroundColor = '#0A2B5E';
      document.body.classList.remove('has-bg-image');
    }
  }

  async function loadLogo() {
    const snap = await db.ref(`${BASE_PATH}/settings/navbarLogo`).once('value');
    navbarLogoUrl = snap.val();
    const container = document.getElementById('logoContainer');
    if (navbarLogoUrl) {
      container.innerHTML = `<img src="${navbarLogoUrl}" class="navbar-logo" alt="Logo" onclick="goHome()">`;
    } else {
      container.innerHTML = `<div class="navbar-logo-placeholder" onclick="goHome()">CHAMPIONS LEAGUE</div>`;
    }
  }

  async function loadTeamIcons() {
    const snap = await db.ref(`${BASE_PATH}/teamIcons`).once('value');
    teamIcons = snap.val() || {};
  }

  function getIconHtml(teamName, className = "team-icon-small") {
    const url = teamIcons[teamName];
    return url ? `<img class="${className}" src="${url}" alt="${teamName}">` : `<span style="width:32px;display:inline-block;"></span>`;
  }

  // Season management
  async function loadSeasons() {
    const snap = await db.ref(`${BASE_PATH}/seasons`).once('value');
    const seasons = snap.val() || {};
    availableSeasons = [];
    for (const key in seasons) {
      if (key.startsWith('season_')) {
        let id = parseInt(key.split('_')[1]);
        if (!isNaN(id)) availableSeasons.push(id);
        if (seasons[key].active === true) activeSeasonId = id;
      }
    }
    if (availableSeasons.length === 0) {
      availableSeasons = [1];
      await db.ref(`${BASE_PATH}/seasons/season_1`).set({ active: true, name: "Season 1" });
      activeSeasonId = 1;
    }
    if (!availableSeasons.includes(activeSeasonId)) activeSeasonId = availableSeasons[0];
    currentSeasonId = activeSeasonId;
    updateSeasonUI();
    await loadSeasonData();
  }

  async function loadSeasonData() {
    const seasonRef = `${BASE_PATH}/seasons/season_${currentSeasonId}`;
    const fixturesSnap = await db.ref(`${seasonRef}/fixtures`).once('value');
    const resultsSnap = await db.ref(`${seasonRef}/results`).once('value');
    const scorersSnap = await db.ref(`${seasonRef}/topScorers`).once('value');
    const assistsSnap = await db.ref(`${seasonRef}/topAssists`).once('value');
    fixtures = fixturesSnap.val() ? Object.entries(fixturesSnap.val()).map(([k,v])=>({id:k, ...v})) : [];
    results = resultsSnap.val() ? Object.entries(resultsSnap.val()).map(([k,v])=>({id:k, ...v})) : [];
    topScorers = scorersSnap.val() ? Object.entries(scorersSnap.val()).map(([k,v])=>({id:k, ...v})) : [];
    topAssists = assistsSnap.val() ? Object.entries(assistsSnap.val()).map(([k,v])=>({id:k, ...v})) : [];
    renderCurrentTab();
  }

  function updateSeasonUI() {
    document.getElementById('seasonNumber').innerText = `Season ${currentSeasonId}`;
    const idx = availableSeasons.indexOf(currentSeasonId);
    document.getElementById('prevSeasonBtn').disabled = idx <= 0;
    document.getElementById('nextSeasonBtn').disabled = idx >= availableSeasons.length-1;
    const adminPanel = document.getElementById('seasonAdminPanel');
    if (adminPanel) adminPanel.style.display = isAdmin ? 'flex' : 'none';
  }

  async function switchSeason(delta) {
    const idx = availableSeasons.indexOf(currentSeasonId);
    const newIdx = idx + delta;
    if (newIdx >= 0 && newIdx < availableSeasons.length) {
      currentSeasonId = availableSeasons[newIdx];
      updateSeasonUI();
      await loadSeasonData();
    }
  }

  async function addNewSeason() {
    let newId = prompt("Enter new season number:");
    if (!newId) return;
    newId = parseInt(newId);
    if (availableSeasons.includes(newId)) { alert("Season exists"); return; }
    await db.ref(`${BASE_PATH}/seasons/season_${newId}`).set({ active: false, name: `Season ${newId}`, fixtures: {}, results: {}, topScorers: {}, topAssists: {} });
    availableSeasons.push(newId);
    availableSeasons.sort((a,b)=>a-b);
    currentSeasonId = newId;
    updateSeasonUI();
    await loadSeasonData();
  }

  async function renameSeason() {
    let newNum = prompt(`Enter new number for Season ${currentSeasonId}:`);
    if (!newNum) return;
    newNum = parseInt(newNum);
    if (availableSeasons.includes(newNum) && newNum !== currentSeasonId) { alert("Number taken"); return; }
    const oldData = await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}`).once('value');
    await db.ref(`${BASE_PATH}/seasons/season_${newNum}`).set(oldData.val());
    await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}`).remove();
    availableSeasons = availableSeasons.map(s => s === currentSeasonId ? newNum : s);
    availableSeasons.sort((a,b)=>a-b);
    currentSeasonId = newNum;
    if (activeSeasonId === currentSeasonId) activeSeasonId = newNum;
    updateSeasonUI();
    await loadSeasonData();
  }

  async function setActiveSeason() {
    const updates = {};
    for (let s of availableSeasons) {
      updates[`${BASE_PATH}/seasons/season_${s}/active`] = (s === currentSeasonId);
    }
    await db.ref().update(updates);
    activeSeasonId = currentSeasonId;
    alert(`Season ${currentSeasonId} active`);
  }

  // CRUD for fixtures (with date, venue, description)
  async function addEditFixture(item = null) {
    const modal = document.getElementById('genericModal');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
      <h3>${item ? 'Edit Fixture' : 'Add Fixture'}</h3>
      <input type="text" id="fixtureHomeTeam" placeholder="Home Team" value="${item?.homeTeam || ''}">
      <input type="text" id="fixtureAwayTeam" placeholder="Away Team" value="${item?.awayTeam || ''}">
      <input type="text" id="fixtureDate" placeholder="Date (e.g., 15 May 2025)" value="${item?.date || ''}">
      <input type="text" id="fixtureVenue" placeholder="Venue" value="${item?.venue || ''}">
      <textarea id="fixtureDescription" placeholder="Description (e.g., Semi Final - First Leg)">${item?.description || ''}</textarea>
      <input type="number" id="fixtureMd" placeholder="Matchday" value="${item?.md || 0}">
      <button id="saveFixtureBtn">Save</button>
      <button id="cancelModalBtn">Cancel</button>
    `;
    modal.classList.add('active');
    document.getElementById('saveFixtureBtn').onclick = async () => {
      const homeTeam = document.getElementById('fixtureHomeTeam').value.trim();
      const awayTeam = document.getElementById('fixtureAwayTeam').value.trim();
      const date = document.getElementById('fixtureDate').value.trim();
      const venue = document.getElementById('fixtureVenue').value.trim();
      const description = document.getElementById('fixtureDescription').value.trim();
      const md = parseInt(document.getElementById('fixtureMd').value) || 0;
      if (!homeTeam || !awayTeam) { alert("Enter both teams"); return; }
      const data = { homeTeam, awayTeam, date, venue, description, md };
      if (item && item.id) {
        await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/fixtures/${item.id}`).set(data);
      } else {
        await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/fixtures`).push(data);
      }
      modal.classList.remove('active');
      await loadSeasonData();
    };
    document.getElementById('cancelModalBtn').onclick = () => modal.classList.remove('active');
  }

  async function deleteFixture(id) {
    if (confirm("Delete fixture?")) {
      await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/fixtures/${id}`).remove();
      await loadSeasonData();
    }
  }

  // Add result from fixture (popup)
  async function addResultFromFixture(fixture) {
    const modal = document.getElementById('genericModal');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
      <h3>Add Result</h3>
      <div>${fixture.homeTeam} vs ${fixture.awayTeam}</div>
      <input type="number" id="homeScore" placeholder="Home Score" value="0">
      <input type="number" id="awayScore" placeholder="Away Score" value="0">
      <input type="text" id="resultType" placeholder="Match type (e.g., Final)" value="${fixture.description || ''}">
      <input type="number" id="resultMd" placeholder="Matchday" value="${fixture.md || 0}">
      <button id="saveResultFromFixtureBtn">Save Result</button>
      <button id="cancelModalBtn">Cancel</button>
    `;
    modal.classList.add('active');
    document.getElementById('saveResultFromFixtureBtn').onclick = async () => {
      const homeScore = parseInt(document.getElementById('homeScore').value) || 0;
      const awayScore = parseInt(document.getElementById('awayScore').value) || 0;
      const resultType = document.getElementById('resultType').value.trim();
      const md = parseInt(document.getElementById('resultMd').value) || 0;
      const resultData = {
        homeTeam: fixture.homeTeam,
        awayTeam: fixture.awayTeam,
        homeScore, awayScore,
        matchType: resultType,
        md,
        date: fixture.date || "",
        venue: fixture.venue || ""
      };
      await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/results`).push(resultData);
      modal.classList.remove('active');
      await loadSeasonData();
      // Optionally switch to results tab
      document.querySelector('.tab-btn[data-tab="results"]').click();
    };
    document.getElementById('cancelModalBtn').onclick = () => modal.classList.remove('active');
  }

  // Results CRUD
  async function addEditResult(item = null) {
    const modal = document.getElementById('genericModal');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
      <h3>${item ? 'Edit Result' : 'Add Result'}</h3>
      <input type="text" id="resHomeTeam" placeholder="Home Team" value="${item?.homeTeam || ''}">
      <input type="text" id="resAwayTeam" placeholder="Away Team" value="${item?.awayTeam || ''}">
      <input type="number" id="resHomeScore" placeholder="Home Score" value="${item?.homeScore || 0}">
      <input type="number" id="resAwayScore" placeholder="Away Score" value="${item?.awayScore || 0}">
      <input type="text" id="resType" placeholder="Match type" value="${item?.matchType || ''}">
      <input type="text" id="resDate" placeholder="Date" value="${item?.date || ''}">
      <input type="text" id="resVenue" placeholder="Venue" value="${item?.venue || ''}">
      <input type="number" id="resMd" placeholder="Matchday" value="${item?.md || 0}">
      <button id="saveResultBtn">Save</button>
      <button id="cancelModalBtn">Cancel</button>
    `;
    modal.classList.add('active');
    document.getElementById('saveResultBtn').onclick = async () => {
      const homeTeam = document.getElementById('resHomeTeam').value.trim();
      const awayTeam = document.getElementById('resAwayTeam').value.trim();
      const homeScore = parseInt(document.getElementById('resHomeScore').value) || 0;
      const awayScore = parseInt(document.getElementById('resAwayScore').value) || 0;
      const matchType = document.getElementById('resType').value.trim();
      const date = document.getElementById('resDate').value.trim();
      const venue = document.getElementById('resVenue').value.trim();
      const md = parseInt(document.getElementById('resMd').value) || 0;
      if (!homeTeam || !awayTeam) { alert("Teams required"); return; }
      const data = { homeTeam, awayTeam, homeScore, awayScore, matchType, date, venue, md };
      if (item && item.id) {
        await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/results/${item.id}`).set(data);
      } else {
        await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/results`).push(data);
      }
      modal.classList.remove('active');
      await loadSeasonData();
    };
    document.getElementById('cancelModalBtn').onclick = () => modal.classList.remove('active');
  }

  async function deleteResult(id) {
    if (confirm("Delete result?")) {
      await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/results/${id}`).remove();
      await loadSeasonData();
    }
  }

  // Top Scorer / Assists CRUD (popup modals)
  function openStatsPopup(type) {
    const modal = document.getElementById('genericModal');
    const content = document.getElementById('modalContent');
    const list = type === 'scorer' ? topScorers : topAssists;
    const sorted = [...list].sort((a,b)=> (b.count||0) - (a.count||0));
    let html = `<h3>${type === 'scorer' ? 'Top Scorers' : 'Top Assists'}</h3>
                <table class="stats-table"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>${type === 'scorer' ? 'Goals' : 'Assists'}</th>${isAdmin ? '<th>Actions</th>' : ''}</tr></thead><tbody>`;
    sorted.forEach((p, idx) => {
      html += `<tr>
        <td>${idx+1}</td>
        <td>${p.name}</td>
        <td><div class="team-with-icon" style="gap:6px;">${getIconHtml(p.team)} ${p.team}</div></td>
        <td>${p.count}</td>
        ${isAdmin ? `<td><button class="edit-btn" data-id="${p.id}" data-type="${type}">Edit</button> <button class="delete-btn" data-id="${p.id}" data-type="${type}">Del</button></td>` : ''}
      </tr>`;
    });
    html += `</tbody></table>`;
    if (isAdmin) {
      html += `<button id="addStatsEntryBtn" class="add-btn">Add ${type === 'scorer' ? 'Scorer' : 'Assistant'}</button>`;
    }
    html += `<button id="closeStatsPopup" class="add-btn" style="background:#ccc;">Close</button>`;
    content.innerHTML = html;
    modal.classList.add('active');

    if (isAdmin) {
      document.getElementById('addStatsEntryBtn').onclick = () => addEditStatsEntry(type);
      document.querySelectorAll('.edit-btn').forEach(btn => {
        const id = btn.dataset.id;
        const entry = list.find(p => p.id === id);
        btn.onclick = () => addEditStatsEntry(type, entry);
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        const id = btn.dataset.id;
        btn.onclick = async () => {
          if (confirm("Delete?")) {
            const path = type === 'scorer' ? 'topScorers' : 'topAssists';
            await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/${path}/${id}`).remove();
            modal.classList.remove('active');
            await loadSeasonData();
            openStatsPopup(type);
          }
        };
      });
    }
    document.getElementById('closeStatsPopup').onclick = () => modal.classList.remove('active');
  }

  async function addEditStatsEntry(type, entry = null) {
    const modal = document.getElementById('genericModal');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
      <h3>${entry ? 'Edit' : 'Add'} ${type === 'scorer' ? 'Top Scorer' : 'Top Assistant'}</h3>
      <input type="text" id="statName" placeholder="Player Name" value="${entry?.name || ''}">
      <input type="text" id="statTeam" placeholder="Team" value="${entry?.team || ''}">
      <input type="number" id="statCount" placeholder="${type === 'scorer' ? 'Goals' : 'Assists'}" value="${entry?.count || 0}">
      <button id="saveStatBtn">Save</button>
      <button id="cancelModalBtn">Cancel</button>
    `;
    modal.classList.add('active');
    document.getElementById('saveStatBtn').onclick = async () => {
      const name = document.getElementById('statName').value.trim();
      const team = document.getElementById('statTeam').value.trim();
      const count = parseInt(document.getElementById('statCount').value) || 0;
      if (!name || !team) { alert("Fill all fields"); return; }
      const data = { name, team, count };
      const path = type === 'scorer' ? 'topScorers' : 'topAssists';
      if (entry && entry.id) {
        await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/${path}/${entry.id}`).set(data);
      } else {
        await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/${path}`).push(data);
      }
      modal.classList.remove('active');
      await loadSeasonData();
      openStatsPopup(type);
    };
    document.getElementById('cancelModalBtn').onclick = () => modal.classList.remove('active');
  }

  // Render Fixtures tab
  function renderFixturesTab() {
    const sorted = [...fixtures].sort((a,b)=> (a.md||0) - (b.md||0));
    if (sorted.length === 0) return '<div style="color:white; text-align:center;">No fixtures scheduled.</div>';
    let html = '<div class="fixtures-list">';
    sorted.forEach(f => {
      html += `
        <div class="fixture-item">
          <div class="match-details">
            <div class="match-teams">
              <div class="team-with-icon">${getIconHtml(f.homeTeam)} ${f.homeTeam}</div>
              <span class="vs">vs</span>
              <div class="team-with-icon">${getIconHtml(f.awayTeam)} ${f.awayTeam}</div>
            </div>
            <div class="match-meta">
              <span>${f.date || 'TBD'}</span>
              <span>${f.venue || 'TBD'}</span>
              <span>${f.description || 'Match'}</span>
              <span>MD ${f.md || 0}</span>
            </div>
          </div>
          ${isAdmin ? `
          <div class="admin-actions">
            <button class="add-result-btn" data-id="${f.id}">Add Result</button>
            <button class="edit-btn" data-id="${f.id}">Edit</button>
            <button class="delete-btn" data-id="${f.id}">Delete</button>
          </div>` : ''}
        </div>
      `;
    });
    html += `</div>${isAdmin ? '<button class="add-btn" id="addFixtureBtn">+ Add Fixture</button>' : ''}`;
    return html;
  }

  function renderResultsTab() {
    const sorted = [...results].sort((a,b)=> (b.md||0) - (a.md||0));
    if (sorted.length === 0) return '<div style="color:white; text-align:center;">No results yet.</div>';
    let html = '<div class="results-list">';
    sorted.forEach(r => {
      html += `
        <div class="fixture-item">
          <div class="match-details">
            <div class="match-teams">
              <div class="team-with-icon">${getIconHtml(r.homeTeam)} ${r.homeTeam}</div>
              <div class="match-score">${r.homeScore} - ${r.awayScore}</div>
              <div class="team-with-icon">${getIconHtml(r.awayTeam)} ${r.awayTeam}</div>
            </div>
            <div class="match-meta">
              <span>${r.date || ''}</span>
              <span>${r.venue || ''}</span>
              <span>${r.matchType || 'Match'}</span>
              <span>MD ${r.md || 0}</span>
            </div>
          </div>
          ${isAdmin ? `<div class="admin-actions"><button class="edit-btn" data-id="${r.id}">Edit</button><button class="delete-btn" data-id="${r.id}">Delete</button></div>` : ''}
        </div>
      `;
    });
    html += `</div>${isAdmin ? '<button class="add-btn" id="addResultBtn">+ Add Result</button>' : ''}`;
    return html;
  }

  function renderCurrentTab() {
    const card = document.getElementById('contentCard');
    let content = '';
    const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
    if (activeTab === 'fixtures') {
      content = renderFixturesTab();
    } else if (activeTab === 'results') {
      content = renderResultsTab();
    } else if (activeTab === 'scorers') {
      openStatsPopup('scorer');
      return;
    } else if (activeTab === 'assists') {
      openStatsPopup('assist');
      return;
    }
    card.innerHTML = content;
    attachTabEventHandlers();
  }

  function attachTabEventHandlers() {
    if (isAdmin) {
      const addFixtureBtn = document.getElementById('addFixtureBtn');
      if (addFixtureBtn) addFixtureBtn.onclick = () => addEditFixture();
      const addResultBtn = document.getElementById('addResultBtn');
      if (addResultBtn) addResultBtn.onclick = () => addEditResult();
      document.querySelectorAll('.edit-btn[data-id]').forEach(btn => {
        const id = btn.dataset.id;
        const isResult = btn.closest('.results-list') !== null;
        if (isResult) {
          const item = results.find(r => r.id === id);
          btn.onclick = () => addEditResult(item);
        } else {
          const item = fixtures.find(f => f.id === id);
          btn.onclick = () => addEditFixture(item);
        }
      });
      document.querySelectorAll('.delete-btn[data-id]').forEach(btn => {
        const id = btn.dataset.id;
        const isResult = btn.closest('.results-list') !== null;
        if (isResult) {
          btn.onclick = () => deleteResult(id);
        } else {
          btn.onclick = () => deleteFixture(id);
        }
      });
      document.querySelectorAll('.add-result-btn').forEach(btn => {
        const id = btn.dataset.id;
        const fixture = fixtures.find(f => f.id === id);
        btn.onclick = () => addResultFromFixture(fixture);
      });
    }
  }

  // Slideshow
  async function loadSlideshow() {
    const imagesSnap = await db.ref(`${BASE_PATH}/slideshow/images`).once('value');
    slideshowImages = imagesSnap.val() || [];
    const durSnap = await db.ref(`${BASE_PATH}/slideshow/duration`).once('value');
    slideshowDuration = durSnap.val() || 3000;
    if (slideInterval) clearInterval(slideInterval);
    if (slideshowImages.length) {
      currentSlide = 0;
      updateSlide();
      slideInterval = setInterval(() => {
        currentSlide = (currentSlide + 1) % slideshowImages.length;
        updateSlide();
      }, slideshowDuration);
    }
  }
  function updateSlide() {
    const img = document.getElementById('slideshowImg');
    if (slideshowImages.length) img.src = slideshowImages[currentSlide];
    const dotsDiv = document.getElementById('dotsContainer');
    dotsDiv.innerHTML = '';
    slideshowImages.forEach((_, i) => {
      const dot = document.createElement('span');
      dot.classList.add('dot');
      if (i === currentSlide) dot.classList.add('active');
      dot.onclick = () => { currentSlide = i; updateSlide(); if(slideInterval){clearInterval(slideInterval); slideInterval = setInterval(()=>{ currentSlide = (currentSlide+1)%slideshowImages.length; updateSlide();}, slideshowDuration);} };
      dotsDiv.appendChild(dot);
    });
  }

  // Admin settings with background preview
  function openAdminSettings() {
    const modal = document.getElementById('genericModal');
    const content = document.getElementById('modalContent');
    content.innerHTML = `
      <h3>Admin Settings</h3>
      <button id="uploadLogoBtn" class="add-btn">Upload Navbar Logo</button>
      <button id="uploadBgBtn" class="add-btn">Upload Background Image</button>
      <button id="previewBgBtn" class="add-btn">Preview Background</button>
      <button id="manageSlideshowBtn" class="add-btn">Manage Slideshow</button>
      <button id="uploadTeamIconBtn" class="add-btn">Add Team Icon</button>
      <button id="closeAdminModal" class="add-btn" style="background:#ddd;">Close</button>
    `;
    modal.classList.add('active');
    document.getElementById('uploadLogoBtn').onclick = () => uploadImageAndSave('navbarLogo');
    document.getElementById('uploadBgBtn').onclick = () => uploadImageAndSave('backgroundImage');
    document.getElementById('previewBgBtn').onclick = () => previewBackground();
    document.getElementById('manageSlideshowBtn').onclick = () => manageSlideshowUI();
    document.getElementById('uploadTeamIconBtn').onclick = () => uploadTeamIcon();
    document.getElementById('closeAdminModal').onclick = () => modal.classList.remove('active');
  }

  async function uploadImageAndSave(type) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = await uploadToImgBB(file);
      if (type === 'navbarLogo') await db.ref(`${BASE_PATH}/settings/navbarLogo`).set(url);
      else if (type === 'backgroundImage') await db.ref(`${BASE_PATH}/settings/backgroundImage`).set(url);
      await loadLogo();
      await loadBackground();
      alert('Updated');
      document.getElementById('genericModal').classList.remove('active');
    };
    input.click();
  }

  async function previewBackground() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = await uploadToImgBB(file);
      const modal = document.getElementById('genericModal');
      const content = document.getElementById('modalContent');
      content.innerHTML = `
        <h3>Background Preview</h3>
        <div class="bg-preview"><img src="${url}" alt="Preview"></div>
        <button id="applyBgBtn" class="add-btn">Apply This Background</button>
        <button id="cancelPreviewBtn" class="add-btn">Cancel</button>
      `;
      document.getElementById('applyBgBtn').onclick = async () => {
        await db.ref(`${BASE_PATH}/settings/backgroundImage`).set(url);
        await loadBackground();
        modal.classList.remove('active');
        alert('Background applied');
      };
      document.getElementById('cancelPreviewBtn').onclick = () => modal.classList.remove('active');
    };
    input.click();
  }

  async function manageSlideshowUI() {
    const modal = document.getElementById('genericModal');
    const content = document.getElementById('modalContent');
    let imgs = [...slideshowImages];
    const refresh = () => {
      let preview = '<div class="image-preview-grid">';
      imgs.forEach((url, idx) => {
        preview += `<div class="preview-item"><img src="${url}"><button class="delete-preview" data-idx="${idx}">x</button></div>`;
      });
      preview += '</div>';
      content.innerHTML = `<h3>Slideshow Manager</h3>${preview}<input type="file" id="newSlideFile"><button id="addSlideBtn">Add Slide</button><label>Duration (sec): <input type="number" id="slideDurSec" value="${slideshowDuration/1000}" step="0.5"></label><button id="saveDurBtn">Set Duration</button><button id="closeSlideModal">Close</button>`;
      document.querySelectorAll('.delete-preview').forEach(btn => {
        btn.onclick = async () => {
          const idx = parseInt(btn.dataset.idx);
          imgs.splice(idx,1);
          await db.ref(`${BASE_PATH}/slideshow/images`).set(imgs);
          await loadSlideshow();
          manageSlideshowUI();
        };
      });
      document.getElementById('addSlideBtn').onclick = async () => {
        const file = document.getElementById('newSlideFile').files[0];
        if (!file) return;
        const url = await uploadToImgBB(file);
        imgs.push(url);
        await db.ref(`${BASE_PATH}/slideshow/images`).set(imgs);
        await loadSlideshow();
        manageSlideshowUI();
      };
      document.getElementById('saveDurBtn').onclick = async () => {
        let sec = parseFloat(document.getElementById('slideDurSec').value);
        if (isNaN(sec)) sec = 3;
        sec = Math.min(10, Math.max(1, sec));
        await db.ref(`${BASE_PATH}/slideshow/duration`).set(sec * 1000);
        await loadSlideshow();
        alert('Duration updated');
        modal.classList.remove('active');
      };
      document.getElementById('closeSlideModal').onclick = () => modal.classList.remove('active');
    };
    refresh();
    modal.classList.add('active');
  }

  async function uploadTeamIcon() {
    const team = prompt("Enter team name:");
    if (!team) return;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const url = await uploadToImgBB(file);
      await db.ref(`${BASE_PATH}/teamIcons/${team}`).set(url);
      await loadTeamIcons();
      await loadSeasonData();
      alert('Icon added');
    };
    input.click();
  }

  // Menu, admin mode
  function toggleMenu() {
    document.getElementById('sideMenu').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  }
  function closeMenu() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
  document.getElementById('menuBtn').onclick = toggleMenu;
  document.getElementById('closeMenuBtn').onclick = closeMenu;
  document.getElementById('overlay').onclick = closeMenu;
  document.getElementById('homeBtn').onclick = () => window.location.href = 'feed.html';
  document.getElementById('adminModeBtn').onclick = () => {
    const key = prompt("Admin key:");
    if (key === "admin@100") {
      isAdmin = true;
      alert("Admin mode ON");
      document.getElementById('seasonAdminPanel').style.display = 'flex';
      renderCurrentTab();
      // Add admin settings to side menu
      let settingsItem = document.getElementById('adminSettingsMenuItem');
      if (!settingsItem) {
        settingsItem = document.createElement('div');
        settingsItem.id = 'adminSettingsMenuItem';
        settingsItem.className = 'menu-item';
        settingsItem.innerText = 'Admin Settings';
        settingsItem.onclick = () => { openAdminSettings(); closeMenu(); };
        document.getElementById('sideMenu').appendChild(settingsItem);
      }
    } else alert("Wrong key");
  };

  document.getElementById('prevSeasonBtn').onclick = () => switchSeason(-1);
  document.getElementById('nextSeasonBtn').onclick = () => switchSeason(1);
  document.getElementById('addSeasonBtn').onclick = () => { if(isAdmin) addNewSeason(); };
  document.getElementById('renameSeasonBtn').onclick = () => { if(isAdmin) renameSeason(); };
  document.getElementById('setActiveSeasonBtn').onclick = () => { if(isAdmin) setActiveSeason(); };

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCurrentTab();
    };
  });

  async function init() {
    await loadSeasons();
    await loadTeamIcons();
    await loadLogo();
    await loadBackground();
    await loadSlideshow();
    renderCurrentTab();
  }
  init();
  window.goHome = () => window.location.href = 'feed.html';
</script>
