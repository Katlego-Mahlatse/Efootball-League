<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UEFA Champions League | eFootball Fan Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --ucl-blue: #0A2B5E;
      --ucl-blue-light: #0E3A7A;
      --ucl-blue-dark: #061A3A;
      --ucl-gold: #C5A647;
      --ucl-gold-light: #E2C76A;
      --white: #FFFFFF;
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.15);
      --glass-blur: blur(12px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--ucl-blue-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body.has-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: var(--bg-image);
      background-size: var(--bg-size, cover);
      background-position: var(--bg-pos, center);
      background-repeat: no-repeat;
      z-index: -2;
    }
    body.has-bg::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(6,26,58,0.55);
      z-index: -1;
    }

    /* ─── NAVBAR ─── */
    .navbar {
      background: rgba(6,26,58,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(197,166,71,0.3);
      padding: 0 2rem;
      height: 62px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-logo { height: 42px; max-width: 160px; object-fit: contain; cursor: pointer; }
    .navbar-logo-placeholder {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: var(--ucl-gold);
      cursor: pointer;
    }
    .menu-btn {
      background: rgba(197,166,71,0.15);
      border: 1px solid rgba(197,166,71,0.4);
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 5px; cursor: pointer;
      transition: all 0.2s;
    }
    .menu-btn span { width: 18px; height: 2px; background: var(--ucl-gold); border-radius: 2px; transition: 0.2s; }
    .menu-btn:hover { background: rgba(197,166,71,0.3); }

    /* ─── SIDE MENU ─── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 199; display: none; backdrop-filter: blur(2px); }
    .overlay.active { display: block; }
    .side-menu {
      position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
      background: rgba(6,26,58,0.97);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(197,166,71,0.3);
      z-index: 200; padding: 28px 20px;
      transition: right 0.35s cubic-bezier(.4,0,.2,1);
    }
    .side-menu.active { right: 0; }
    .close-menu { text-align: right; font-size: 1.8rem; cursor: pointer; color: var(--ucl-gold); margin-bottom: 30px; line-height: 1; }
    .menu-item {
      padding: 13px 20px; margin: 8px 0;
      border: 1px solid rgba(197,166,71,0.2);
      border-radius: 12px; cursor: pointer;
      font-weight: 600; font-size: 1rem;
      color: var(--white);
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .menu-item:hover { background: rgba(197,166,71,0.2); border-color: var(--ucl-gold); color: var(--ucl-gold); }

    /* ─── SLIDESHOW ─── */
    .slideshow-wrapper {
      padding: 24px 40px 16px;
      display: flex; flex-direction: column; align-items: center;
    }
    .slideshow-frame {
      width: 100%; max-width: 900px;
      border-radius: 20px; overflow: hidden;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 1px solid rgba(197,166,71,0.25);
    }
    .slideshow-img {
      width: 100%; height: 360px;
      object-fit: cover; display: block;
      transition: opacity 0.5s ease;
    }
    .dots-container { margin-top: 14px; display: flex; gap: 8px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.2s;
    }
    .dot.active { background: var(--ucl-gold); transform: scale(1.3); }

    /* ─── SEASON SELECTOR ─── */
    .season-bar {
      display: flex; justify-content: center;
      margin: 18px 0 10px;
    }
    .season-controls {
      display: flex; align-items: center; gap: 12px;
      background: rgba(6,26,58,0.6);
      border: 1px solid rgba(197,166,71,0.3);
      padding: 6px 20px; border-radius: 50px;
      backdrop-filter: blur(8px);
    }
    .season-arrow {
      background: rgba(197,166,71,0.15);
      border: 1px solid rgba(197,166,71,0.4);
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 1.2rem; cursor: pointer;
      color: var(--ucl-gold); font-weight: bold;
      transition: all 0.2s; line-height: 1;
    }
    .season-arrow:hover:not(:disabled) { background: var(--ucl-gold); color: var(--ucl-blue-dark); }
    .season-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
    .season-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; letter-spacing: 2px;
      color: var(--ucl-gold); min-width: 110px; text-align: center;
    }
    .season-admin-btns { display: flex; gap: 6px; margin-left: 10px; }
    .season-admin-btn {
      background: rgba(197,166,71,0.15);
      border: 1px solid rgba(197,166,71,0.4);
      padding: 4px 12px; border-radius: 20px;
      font-weight: 600; cursor: pointer;
      color: var(--ucl-gold); font-size: 0.75rem;
      font-family: 'Rajdhani', sans-serif;
      transition: all 0.2s;
    }
    .season-admin-btn:hover { background: var(--ucl-gold); color: var(--ucl-blue-dark); }

    /* ─── TABS ─── */
    .tabs-container {
      display: flex; justify-content: center;
      gap: 0; margin: 20px 40px 0;
      background: rgba(6,26,58,0.5);
      border: 1px solid rgba(197,166,71,0.2);
      border-radius: 50px;
      padding: 5px;
      backdrop-filter: blur(8px);
      max-width: 700px;
      margin-left: auto; margin-right: auto;
    }
    .tab-btn {
      flex: 1;
      background: transparent; border: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      padding: 10px 18px; cursor: pointer;
      color: rgba(255,255,255,0.6);
      border-radius: 40px;
      letter-spacing: 0.5px;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--ucl-gold);
      color: var(--ucl-blue-dark);
    }
    .tab-btn:hover:not(.active) { color: var(--ucl-gold); background: rgba(197,166,71,0.1); }

    /* ─── CONTENT CARD ─── */
    .content-card {
      margin: 18px 40px 30px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 24px;
      min-height: 200px;
    }

    /* ─── MATCH CARDS ─── */
    .matches-list { display: flex; flex-direction: column; gap: 12px; }

    .match-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 24px;
      transition: all 0.2s;
    }
    .match-card:hover { background: rgba(255,255,255,0.1); border-color: rgba(197,166,71,0.3); }

    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .team-side {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }
    .team-side.away { flex-direction: row-reverse; }

    .team-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 1.1rem;
      color: var(--white);
      letter-spacing: 0.3px;
    }
    .team-side.away .team-name { text-align: right; }

    .team-icon-wrap {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .team-icon-wrap img { width: 38px; height: 38px; object-fit: contain; }
    .team-initials {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; color: var(--ucl-gold);
      letter-spacing: 1px;
    }

    .match-center {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      flex-shrink: 0; min-width: 110px;
    }
    .vs-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem; color: var(--ucl-gold);
      letter-spacing: 3px;
    }
    .score-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; color: var(--ucl-gold);
      letter-spacing: 4px;
      background: rgba(0,0,0,0.3);
      padding: 2px 16px; border-radius: 30px;
      border: 1px solid rgba(197,166,71,0.3);
    }

    .match-meta {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 10px; justify-content: center;
    }
    .meta-tag {
      font-size: 0.78rem; font-weight: 500;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.25);
      padding: 2px 10px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      font-family: 'Inter', sans-serif;
    }

    .admin-row {
      display: flex; gap: 8px; justify-content: flex-end;
      margin-top: 10px;
    }
    .btn-sm {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 0.8rem;
      padding: 4px 14px; border-radius: 20px;
      border: none; cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-edit { background: rgba(197,166,71,0.2); color: var(--ucl-gold); border: 1px solid rgba(197,166,71,0.4); }
    .btn-edit:hover { background: var(--ucl-gold); color: var(--ucl-blue-dark); }
    .btn-delete { background: rgba(220,50,50,0.2); color: #ff6b6b; border: 1px solid rgba(220,50,50,0.3); }
    .btn-delete:hover { background: #cc3333; color: white; }
    .btn-add-result { background: rgba(50,200,100,0.2); color: #5dde8a; border: 1px solid rgba(50,200,100,0.3); }
    .btn-add-result:hover { background: #22884a; color: white; }

    .add-btn-main {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(197,166,71,0.15);
      border: 1px solid rgba(197,166,71,0.4);
      color: var(--ucl-gold);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; font-size: 0.95rem;
      padding: 8px 20px; border-radius: 30px;
      cursor: pointer; margin-top: 16px;
      transition: all 0.2s; letter-spacing: 0.5px;
    }
    .add-btn-main:hover { background: var(--ucl-gold); color: var(--ucl-blue-dark); }

    /* ─── STATS TABLE ─── */
    .stats-table-wrap { overflow-x: auto; }
    .stats-table {
      width: 100%; border-collapse: collapse;
      font-family: 'Rajdhani', sans-serif;
    }
    .stats-table thead th {
      background: rgba(0,0,0,0.4);
      color: var(--ucl-gold);
      font-size: 0.85rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 12px 16px; text-align: left;
      border-bottom: 1px solid rgba(197,166,71,0.3);
    }
    .stats-table tbody tr { border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.15s; }
    .stats-table tbody tr:hover { background: rgba(255,255,255,0.05); }
    .stats-table td { padding: 11px 16px; color: var(--white); font-size: 1rem; font-weight: 500; }
    .stats-table td:first-child { color: var(--ucl-gold); font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; }
    .rank-1 td:first-child { color: #FFD700; }
    .rank-2 td:first-child { color: #C0C0C0; }
    .rank-3 td:first-child { color: #CD7F32; }
    .count-badge {
      background: rgba(197,166,71,0.2);
      border: 1px solid rgba(197,166,71,0.4);
      color: var(--ucl-gold);
      padding: 2px 12px; border-radius: 20px;
      font-weight: 700; font-size: 0.95rem;
    }
    .team-cell { display: flex; align-items: center; gap: 10px; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(6px);
      display: none; justify-content: center; align-items: center;
      z-index: 1000; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: rgba(8,24,52,0.97);
      border: 1px solid rgba(197,166,71,0.35);
      border-radius: 24px; padding: 28px;
      max-width: 520px; width: 100%;
      max-height: 88vh; overflow-y: auto;
      font-family: 'Rajdhani', sans-serif;
    }
    .modal-card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; color: var(--ucl-gold);
      letter-spacing: 2px; margin-bottom: 20px;
    }
    .modal-card label {
      display: block; color: rgba(255,255,255,0.6);
      font-size: 0.82rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 4px; margin-top: 14px;
    }
    .modal-card input, .modal-card select, .modal-card textarea {
      width: 100%; padding: 10px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; color: white;
      font-family: 'Rajdhani', sans-serif; font-size: 1rem;
      font-weight: 500; outline: none; transition: border-color 0.2s;
    }
    .modal-card input:focus, .modal-card select:focus, .modal-card textarea:focus {
      border-color: rgba(197,166,71,0.6);
    }
    .modal-card textarea { resize: vertical; min-height: 70px; }
    .modal-card select option { background: #0A2B5E; }
    .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
    .modal-btn-primary {
      flex: 1; background: var(--ucl-gold); color: var(--ucl-blue-dark);
      border: none; padding: 11px; border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
      letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
    }
    .modal-btn-primary:hover { background: var(--ucl-gold-light); }
    .modal-btn-cancel {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7); padding: 11px 20px;
      border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
      letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
    }
    .modal-btn-cancel:hover { background: rgba(255,255,255,0.15); }

    /* ─── CROP MODAL ─── */
    .crop-container {
      width: 100%; height: 280px;
      overflow: hidden; border-radius: 16px;
      position: relative; cursor: grab;
      border: 1px solid rgba(197,166,71,0.3);
      background: #000;
      user-select: none;
    }
    .crop-container:active { cursor: grabbing; }
    .crop-img {
      position: absolute;
      transform-origin: 0 0;
      pointer-events: none;
    }
    .crop-controls { margin-top: 14px; }
    .crop-controls label { color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 6px; }
    .crop-slider {
      width: 100%; accent-color: var(--ucl-gold);
      height: 4px; cursor: pointer;
    }

    /* ─── IMAGE PREVIEW GRID ─── */
    .img-preview-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 14px 0; }
    .preview-thumb {
      position: relative; width: 80px; height: 80px;
      border-radius: 10px; overflow: hidden;
      border: 1px solid rgba(197,166,71,0.3);
    }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-del {
      position: absolute; top: -6px; right: -6px;
      background: #cc3333; color: white; border-radius: 50%;
      width: 20px; height: 20px; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-weight: bold;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center; padding: 48px 20px;
      color: rgba(255,255,255,0.4);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 1.1rem; font-weight: 500; }

    /* ─── ADMIN SETTINGS ─── */
    .settings-grid { display: flex; flex-direction: column; gap: 10px; }
    .settings-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: white; padding: 12px 18px;
      border-radius: 14px; cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; font-weight: 600;
      text-align: left; transition: all 0.2s;
      display: flex; align-items: center; gap: 10px;
    }
    .settings-btn:hover { background: rgba(197,166,71,0.15); border-color: rgba(197,166,71,0.4); color: var(--ucl-gold); }

    /* ─── LOADING ─── */
    .loading-spinner {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px; color: rgba(255,255,255,0.5);
      gap: 14px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(197,166,71,0.2);
      border-top-color: var(--ucl-gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center; padding: 28px;
      color: rgba(255,255,255,0.25);
      font-size: 0.8rem; font-family: 'Inter', sans-serif;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 20px;
      letter-spacing: 0.5px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: rgba(197,166,71,0.4); border-radius: 3px; }

    @media (max-width: 600px) {
      .tabs-container { margin: 16px 16px 0; }
      .content-card { margin: 14px 16px 20px; padding: 16px; }
      .tab-btn { font-size: 0.8rem; padding: 8px 10px; }
      .slideshow-wrapper { padding: 16px 16px 10px; }
      .slideshow-img { height: 200px; }
      .match-row { flex-wrap: wrap; gap: 8px; }
      .team-name { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div id="logoContainer"></div>
  <button class="menu-btn" id="menuBtn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</div>

<div class="overlay" id="overlay"></div>
<div class="side-menu" id="sideMenu">
  <div class="close-menu" id="closeMenuBtn">&#x2715;</div>
  <div class="menu-item" id="homeBtn">🏠 Home</div>
  <div class="menu-item" id="adminModeBtn">🔐 Admin Mode</div>
</div>

<div class="slideshow-wrapper">
  <div class="slideshow-frame">
    <img id="slideshowImg" class="slideshow-img" src="" alt="Slideshow" style="display:none;">
  </div>
  <div class="dots-container" id="dotsContainer"></div>
</div>

<div class="season-bar">
  <div class="season-controls">
    <button class="season-arrow" id="prevSeasonBtn">&#8249;</button>
    <div class="season-number" id="seasonNumber">Season 1</div>
    <button class="season-arrow" id="nextSeasonBtn">&#8250;</button>
    <div id="seasonAdminPanel" style="display:none;" class="season-admin-btns">
      <button class="season-admin-btn" id="addSeasonBtn">+ New</button>
      <button class="season-admin-btn" id="renameSeasonBtn">Rename</button>
      <button class="season-admin-btn" id="setActiveSeasonBtn">Set Active</button>
    </div>
  </div>
</div>

<div class="tabs-container">
  <button class="tab-btn active" data-tab="fixtures">Fixtures</button>
  <button class="tab-btn" data-tab="results">Results</button>
  <button class="tab-btn" data-tab="scorers">Top Scorers</button>
  <button class="tab-btn" data-tab="assists">Top Assists</button>
</div>

<div class="content-card" id="contentCard">
  <div class="loading-spinner"><div class="spinner"></div><span>Loading...</span></div>
</div>

<footer>eFootball Fan Hub &mdash; UEFA Champions League &copy; 2025</footer>

<div id="genericModal" class="modal-overlay">
  <div class="modal-card" id="modalContent"></div>
</div>

<script>

  authDomain: "efootball-412.firebaseapp.com",

  projectId: "efootball-412",
  storageBucket: "efootball-412.firebasestorage.app",
  messagingSenderId: "596548424249",
  appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"

async function uploadToImgBB(blob) {
  const fd = new FormData();
  fd.append('image', blob);
  const res  = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
  const data = await res.json();
  if (!data.success) throw new Error(data.error?.message || 'ImgBB upload failed');
  return data.data.url;
}

async function removeBackground(file) {
  const fd = new FormData();
  fd.append('image_file', file);
  fd.append('size', 'auto');
  const res = await fetch('https://api.remove.bg/v1.0/removebg', {
    method: 'POST',
    headers: { 'X-Api-Key': RMBG_KEY },
    body: fd
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.errors?.[0]?.title || 'remove.bg failed');
  }
  return await res.blob();
}

function getInitials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').slice(0,3).toUpperCase();
}

function teamIconHtml(teamName) {
  const url = teamIcons[teamName];
  if (url) return `<div class="team-icon-wrap"><img src="${url}" alt="${teamName}"></div>`;
  return `<div class="team-icon-wrap"><span class="team-initials">${getInitials(teamName)}</span></div>`;
}

async function loadBackground() {
  const snap = await db.ref(`${BASE_PATH}/settings/backgroundImage`).once('value');

  if (val) {
    document.body.style.setProperty('--bg-image', `url(${val})`);

    document.body.classList.add('has-bg');

async function loadSeasons() {
  const snap    = await db.ref(`${BASE_PATH}/seasons`).once('value');
  const seasons = snap.val() || {};
  availableSeasons = [];
  for (const key in seasons) {
    if (!key.startsWith('season_')) continue;
    const id = parseInt(key.split('_')[1]);
    if (!isNaN(id)) availableSeasons.push(id);
    if (seasons[key].active) activeSeasonId = id;
  }
  if (!availableSeasons.length) {
    availableSeasons = [1];
    await db.ref(`${BASE_PATH}/seasons/season_1`).set({ active:true, name:'Season 1' });
    activeSeasonId = 1;
  }
  availableSeasons.sort((a,b) => a-b);
  if (!availableSeasons.includes(activeSeasonId)) activeSeasonId = availableSeasons[0];
  currentSeasonId = activeSeasonId;
  updateSeasonUI();
  await loadSeasonData();
}

async function loadSeasonData() {
  const base = `${BASE_PATH}/seasons/season_${currentSeasonId}`;
  const [fSnap, rSnap, sSnap, aSnap] = await Promise.all([
    db.ref(`${base}/fixtures`).once('value'),
    db.ref(`${base}/results`).once('value'),
    db.ref(`${base}/topScorers`).once('value'),
    db.ref(`${base}/topAssists`).once('value'),
  ]);
  fixtures   = fSnap.val() ? Object.entries(fSnap.val()).map(([k,v])=>({id:k,...v})) : [];
  results    = rSnap.val() ? Object.entries(rSnap.val()).map(([k,v])=>({id:k,...v})) : [];
  topScorers = sSnap.val() ? Object.entries(sSnap.val()).map(([k,v])=>({id:k,...v})) : [];
  topAssists = aSnap.val() ? Object.entries(aSnap.val()).map(([k,v])=>({id:k,...v})) : [];
  renderCurrentTab();
}

function updateSeasonUI() {
  document.getElementById('seasonNumber').textContent = `Season ${currentSeasonId}`;
  const idx = availableSeasons.indexOf(currentSeasonId);
  document.getElementById('prevSeasonBtn').disabled = idx <= 0;
  document.getElementById('nextSeasonBtn').disabled = idx >= availableSeasons.length - 1;
  document.getElementById('seasonAdminPanel').style.display = isAdmin ? 'flex' : 'none';
}

async function switchSeason(delta) {
  const idx = availableSeasons.indexOf(currentSeasonId);
  const nIdx = idx + delta;
  if (nIdx < 0 || nIdx >= availableSeasons.length) return;
  currentSeasonId = availableSeasons[nIdx];
  updateSeasonUI();
  await loadSeasonData();
}

async function addNewSeason() {
  const raw = prompt("Enter new season number:");
  if (!raw) return;
  const id = parseInt(raw);
  if (isNaN(id)) { alert("Invalid number"); return; }
  if (availableSeasons.includes(id)) { alert("Season already exists"); return; }
  await db.ref(`${BASE_PATH}/seasons/season_${id}`).set({ active:false, name:`Season ${id}` });
  availableSeasons.push(id); availableSeasons.sort((a,b)=>a-b);
  currentSeasonId = id; updateSeasonUI(); await loadSeasonData();
}

async function renameSeason() {
  const raw = prompt(`New number for Season ${currentSeasonId}:`);
  if (!raw) return;
  const id = parseInt(raw);
  if (isNaN(id)) return;
  if (availableSeasons.includes(id) && id !== currentSeasonId) { alert("Number taken"); return; }
  const snap = await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}`).once('value');
  await db.ref(`${BASE_PATH}/seasons/season_${id}`).set(snap.val());
  await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}`).remove();
  availableSeasons = availableSeasons.map(s => s === currentSeasonId ? id : s).sort((a,b)=>a-b);
  if (activeSeasonId === currentSeasonId) activeSeasonId = id;
  currentSeasonId = id; updateSeasonUI(); await loadSeasonData();
}

async function setActiveSeason() {
  const updates = {};
  availableSeasons.forEach(s => { updates[`${BASE_PATH}/seasons/season_${s}/active`] = (s === currentSeasonId); });
  await db.ref().update(updates);
  activeSeasonId = currentSeasonId;
  alert(`Season ${currentSeasonId} is now active`);
}

async function openStatsModal(type) {
  const list = type === 'scorer' ? topScorers : topAssists;
  const label = type === 'scorer' ? 'Goals' : 'Assists';
  const sorted = [...list].sort((a,b) => (b.count||0) - (a.count||0));
  const medals = ['🥇','🥈','🥉'];
  let rows = sorted.map((p, i) => `
    <tr class="${i < 3 ? 'rank-'+(i+1) : ''}">
      <td>${medals[i] || (i+1)}</td>
      <td>${p.name}</td>
      <td><div class="team-cell">${teamIconHtml(p.team)}<span>${p.team}</span></div></td>
      <td><span class="count-badge">${p.count}</span></td>
      ${isAdmin ? `<td>
        <button class="btn-sm btn-edit" data-id="${p.id}">Edit</button>
        <button class="btn-sm btn-delete" data-id="${p.id}">Del</button>
      </td>` : ''}
    </tr>
  `).join('');
  showModal(`
    <h3>${type === 'scorer' ? '⚽ Top Scorers' : '🎯 Top Assists'}</h3>
    <div class="stats-table-wrap">
      <table class="stats-table">
        <thead><tr><th>#</th><th>Player</th><th>Team</th><th>${label}</th>${isAdmin ? '<th>Actions</th>' : ''}</tr></thead>
        <tbody>${rows || `<tr><td colspan="5" style="text-align:center;padding:20px;">No data yet</td></tr>`}</tbody>
      </table>
    </div>
    ${isAdmin ? `<button class="add-btn-main" id="addStatBtn">+ Add Entry</button>` : ''}
    <div class="modal-btns"><button class="modal-btn-cancel" id="closeStatsBtn" style="width:100%;">Close</button></div>
  `);
  document.getElementById('closeStatsBtn').onclick = closeModal;
  if (isAdmin) {
    document.getElementById('addStatBtn').onclick = () => openStatEntryModal(type);
    document.querySelectorAll('.btn-edit[data-id]').forEach(btn => {
      const entry = list.find(p => p.id === btn.dataset.id);
      btn.onclick = () => openStatEntryModal(type, entry);
    });
    document.querySelectorAll('.btn-delete[data-id]').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm("Delete?")) return;
        const path = type === 'scorer' ? 'topScorers' : 'topAssists';
        await db.ref(`${BASE_PATH}/seasons/season_${currentSeasonId}/${path}/${btn.dataset.id}`).remove();
        closeModal(); await loadSeasonData(); openStatsModal(type);
      };
    });
  }
}

async function openStatEntryModal(type, entry = null) {
  const label = type === 'scorer' ? 'Goals' : 'Assists';
  showModal(`
    <h3>${entry ? 'Edit' : 'Add'} ${type === 'scorer' ? 'Scorer' : 'Assistant'}</h3>
    <label>Player Name</label>
    <input id="statName" placeholder="Player Name" value="${entry?.name || ''}">
    <label>Team</label>
    <input id="statTeam" placeholder="Team" value="${entry?.team || ''}">
    <label>${label}</label>
    <input id="statCount" type="number" placeholder="0" value="${entry?.count || 0}">
    <div class="modal-btns">
      <button class="modal-btn-primary" id="saveStatBtn">Save</button>
      <button class="modal-btn-cancel" id="cancelStatBtn">Cancel</button>
    </div>
  `);
  document.getElementById('cancelStatBtn').onclick = () => { closeModal(); openStatsModal(type); };
  document.getElementById('saveStatBtn').onclick = async () => {
    const name  = document.getElementById('statName').value.trim();
    const team  = document.getElementById('statTeam').value.trim();
    const count = parseInt(document.getElementById('statCount').value) || 0;
    if (!name || !team) { alert("Fill all fields"); return; }
    const path = `${BASE_PATH}/seasons/season_${currentSeasonId}/${type === 'scorer' ? 'topScorers' : 'topAssists'}`;
    if (entry?.id) await db.ref(`${path}/${entry.id}`).set({ name, team, count });
    else await db.ref(path).push({ name, team, count });
    closeModal(); await loadSeasonData(); openStatsModal(type);
  };
}

function renderCurrentTab() {
  const tab  = document.querySelector('.tab-btn.active')?.dataset.tab;
  const card = document.getElementById('contentCard');
  if (tab === 'fixtures') {
    card.innerHTML = renderFixtures();
    attachFixtureHandlers();
  }
  else if (tab === 'results') {
    card.innerHTML = renderResults();
    attachResultHandlers();
  }
  else if (tab === 'scorers') {
    openStatsModal('scorer');
    card.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>Loading stats...</span></div>';
  }
  else if (tab === 'assists') {
    openStatsModal('assist');
    card.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>Loading stats...</span></div>';
  }
}

async function loadSlideshow() {
  const [imgSnap, durSnap] = await Promise.all([
    db.ref(`${BASE_PATH}/slideshow/images`).once('value'),
    db.ref(`${BASE_PATH}/slideshow/duration`).once('value'),
  ]);
  slideshowImages  = imgSnap.val() || [];
  slideshowDuration = durSnap.val() || 3000;
  if (slideInterval) clearInterval(slideInterval);
  const imgEl = document.getElementById('slideshowImg');
  if (slideshowImages.length) {
    imgEl.style.display = 'block';
    currentSlide = 0;
    updateSlide();
    slideInterval = setInterval(() => {
      currentSlide = (currentSlide + 1) % slideshowImages.length;
      updateSlide();
    }, slideshowDuration);
  } else {
    imgEl.style.display = 'none';
  }
}

function updateSlide() {
  const img = document.getElementById('slideshowImg');
  img.src = slideshowImages[currentSlide];
  const dots = document.getElementById('dotsContainer');
  dots.innerHTML = '';
  slideshowImages.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === currentSlide ? ' active' : '');
    d.onclick = () => {
      currentSlide = i; updateSlide();
      if (slideInterval) { clearInterval(slideInterval); slideInterval = setInterval(() => { currentSlide = (currentSlide+1) % slideshowImages.length; updateSlide(); }, slideshowDuration); }
    };
    dots.appendChild(d);
  });
}

    await db.ref(`${BASE_PATH}/settings/navbarLogo`).set(url);
    await loadLogo();
    alert('Logo updated!');
    closeModal();
  } catch(e) { alert('Upload failed: ' + e.message); }
}

function pickFile(accept) {
  return new Promise(res => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = accept;
    inp.onchange = e => res(e.target.files[0] || null);
    inp.click();
  });
}

let cropState = { img: null, x: 0, y: 0, scale: 1, dragging: false, startX: 0, startY: 0, originX: 0, originY: 0, naturalW: 0, naturalH: 0 };

async function openBgCropTool() {
  const file = await pickFile('image/*');
  if (!file) return;
  const objectUrl = URL.createObjectURL(file);
  showModal(`
    <h3>🌄 Crop Background</h3>
    <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;margin-bottom:12px;">Drag to reposition • Use slider to zoom</p>
    <div class="crop-container" id="cropContainer">
      <img class="crop-img" id="cropImg" src="${objectUrl}" draggable="false">
    </div>
    <div class="crop-controls"><label>Zoom</label><input class="crop-slider" id="zoomSlider" type="range" min="0.5" max="3" step="0.01" value="1"></div>
    <div class="modal-btns"><button class="modal-btn-primary" id="applyCropBtn">Apply Background</button><button class="modal-btn-cancel" id="cancelCropBtn">Cancel</button></div>
  `);
  const container = document.getElementById('cropContainer');
  const img       = document.getElementById('cropImg');
  const slider    = document.getElementById('zoomSlider');
  cropState = { x:0, y:0, scale:1, dragging:false, startX:0, startY:0, originX:0, originY:0 };
  img.onload = () => {
    cropState.naturalW = img.naturalWidth;
    cropState.naturalH = img.naturalHeight;
    const cw = container.clientWidth;
    const ch = container.clientHeight;
    const fit = Math.max(cw / img.naturalWidth, ch / img.naturalHeight);
    cropState.scale = fit;
    slider.min   = fit * 0.8;
    slider.max   = fit * 4;
    slider.step  = fit * 0.01;
    slider.value = fit;
    cropState.x = (cw - img.naturalWidth * fit) / 2;
    cropState.y = (ch - img.naturalHeight * fit) / 2;
    applyTransform();
  };
  function applyTransform() {
    img.style.transform = `translate(${cropState.x}px, ${cropState.y}px) scale(${cropState.scale})`;
    img.style.transformOrigin = '0 0';
  }
  slider.oninput = () => {
    const oldScale = cropState.scale;
    const newScale = parseFloat(slider.value);
    const cw = container.clientWidth / 2;
    const ch = container.clientHeight / 2;
    cropState.x = cw - (cw - cropState.x) * (newScale / oldScale);
    cropState.y = ch - (ch - cropState.y) * (newScale / oldScale);
    cropState.scale = newScale;
    applyTransform();
  };
  container.addEventListener('mousedown', e => { cropState.dragging = true; cropState.startX = e.clientX - cropState.x; cropState.startY = e.clientY - cropState.y; e.preventDefault(); });
  container.addEventListener('touchstart', e => { cropState.dragging = true; cropState.startX = e.touches[0].clientX - cropState.x; cropState.startY = e.touches[0].clientY - cropState.y; }, { passive:true });
  document.addEventListener('mousemove', e => { if (!cropState.dragging) return; cropState.x = e.clientX - cropState.startX; cropState.y = e.clientY - cropState.startY; applyTransform(); });
  document.addEventListener('touchmove', e => { if (!cropState.dragging) return; cropState.x = e.touches[0].clientX - cropState.startX; cropState.y = e.touches[0].clientY - cropState.startY; applyTransform(); }, { passive:true });
  const stopDrag = () => { cropState.dragging = false; };
  document.addEventListener('mouseup', stopDrag); document.addEventListener('touchend', stopDrag);
  document.getElementById('cancelCropBtn').onclick = closeModal;
  document.getElementById('applyCropBtn').onclick = async () => {
    document.getElementById('applyCropBtn').textContent = 'Uploading…';
    document.getElementById('applyCropBtn').disabled = true;
    try {
      const cw = container.clientWidth; const ch = container.clientHeight;
      const canvas = document.createElement('canvas'); canvas.width = cw * 2; canvas.height = ch * 2;
      const ctx = canvas.getContext('2d'); ctx.scale(2,2);
      ctx.drawImage(img, -cropState.x / cropState.scale, -cropState.y / cropState.scale, cw / cropState.scale, ch / cropState.scale, 0, 0, cw, ch);
      const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
      const url  = await uploadToImgBB(blob);
      await db.ref(`${BASE_PATH}/settings/backgroundImage`).set(url);
      document.body.style.setProperty('--bg-image', `url(${url})`);
      document.body.classList.add('has-bg');
      closeModal(); alert('Background applied!'); URL.revokeObjectURL(objectUrl);
    } catch(e) { alert('Failed: ' + e.message); document.getElementById('applyCropBtn').textContent = 'Apply Background'; document.getElementById('applyCropBtn').disabled = false; }
  };
}

async function manageSlideshowUI() {
  const refresh = () => {
    let preview = '<div class="img-preview-grid">';
    slideshowImages.forEach((url, idx) => { preview += `<div class="preview-thumb"><img src="${url}" alt="slide"><span class="thumb-del" data-idx="${idx}">×</span></div>`; });
    preview += '</div>';
    showModal(`
      <h3>🎞️ Slideshow Manager</h3>${preview}
      <label>Add New Slide</label><input type="file" id="newSlideFile" accept="image/*" style="border-radius:8px;">
      <button class="add-btn-main" id="addSlideBtn">+ Add Slide</button>
      <label style="margin-top:14px;">Duration (seconds)</label><input type="number" id="slideDur" value="${slideshowDuration/1000}" step="0.5" min="1" max="10">
      <div class="modal-btns"><button class="modal-btn-primary" id="saveDurBtn">Save Duration</button><button class="modal-btn-cancel" id="closeSlideBtn">Close</button></div>
    `);
    document.querySelectorAll('.thumb-del').forEach(btn => { btn.onclick = async () => { const idx = parseInt(btn.dataset.idx); slideshowImages.splice(idx,1); await db.ref(`${BASE_PATH}/slideshow/images`).set(slideshowImages.length ? slideshowImages : null); await loadSlideshow(); refresh(); }; });
    document.getElementById('addSlideBtn').onclick = async () => { const file = document.getElementById('newSlideFile').files[0]; if(!file) return; document.getElementById('addSlideBtn').textContent = 'Uploading…'; try { const url = await uploadToImgBB(file); slideshowImages.push(url); await db.ref(`${BASE_PATH}/slideshow/images`).set(slideshowImages); await loadSlideshow(); refresh(); } catch(e) { alert('Upload failed: '+e.message); document.getElementById('addSlideBtn').textContent = '+ Add Slide'; } };
    document.getElementById('saveDurBtn').onclick = async () => { let sec = parseFloat(document.getElementById('slideDur').value); if(isNaN(sec)) sec=3; sec = Math.min(10,Math.max(1,sec)); await db.ref(`${BASE_PATH}/slideshow/duration`).set(sec*1000); await loadSlideshow(); alert('Duration saved!'); closeModal(); };
    document.getElementById('closeSlideBtn').onclick = closeModal;
  };
  refresh();
}

async function uploadTeamIcon() {
  const teamName = prompt("Enter team name exactly as it appears in fixtures/results:");
  if (!teamName) return;
  const file = await pickFile('image/*');
  if (!file) return;
  const loadMsg = () => showModal(`<h3>Processing Icon</h3><div class="loading-spinner"><div class="spinner"></div><span>Removing background…</span></div>`);
  loadMsg();
  try {
    let transparentBlob;
    try { transparentBlob = await removeBackground(file); } catch(e) { console.warn('remove.bg failed, using original:', e); transparentBlob = file; }
    document.querySelector('.loading-spinner span').textContent = 'Uploading to storage…';
    const url = await uploadToImgBB(transparentBlob);
    await db.ref(`${BASE_PATH}/teamIcons/${teamName}`).set(url);
    teamIcons[teamName] = url;
    renderCurrentTab();
    closeModal();
    alert(`Icon saved for "${teamName}"!`);
  } catch(e) { alert('Failed: ' + e.message); closeModal(); }
}

function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
function closeMenu() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
document.getElementById('menuBtn').onclick = toggleMenu;
document.getElementById('closeMenuBtn').onclick = closeMenu;
document.getElementById('overlay').onclick = closeMenu;
document.getElementById('homeBtn').onclick = () => window.location.href = 'feed.html';
document.getElementById('adminModeBtn').onclick = () => {
  const key = prompt("Enter admin key:");
  if (key === "admin@100") {
    isAdmin = true;
    alert("Admin mode activated ✅");
    document.getElementById('seasonAdminPanel').style.display = 'flex';
    renderCurrentTab();
    if (!document.getElementById('adminSettingsItem')) {
      const item = document.createElement('div');
      item.id = 'adminSettingsItem';
      item.className = 'menu-item';
      item.innerHTML = '⚙️ Admin Settings';
      item.onclick = () => { openAdminSettings(); closeMenu(); };
      document.getElementById('sideMenu').appendChild(item);
    }
  } else alert("Incorrect key");
};
document.getElementById('prevSeasonBtn').onclick = () => switchSeason(-1);
document.getElementById('nextSeasonBtn').onclick = () => switchSeason(1);
document.getElementById('addSeasonBtn').onclick = () => isAdmin && addNewSeason();
document.getElementById('renameSeasonBtn').onclick = () => isAdmin && renameSeason();
document.getElementById('setActiveSeasonBtn').onclick = () => isAdmin && setActiveSeason();
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCurrentTab();
  };
});
async function init() {
  await Promise.all([loadBgSettings(), loadLogo(), loadTeamIcons()]);
  await loadSeasons();
  await loadSlideshow();
}
window.goHome = () => window.location.href = 'feed.html';
init();
</script>
