<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>eFootball Fan Hub - UEFA Europa League</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .navbar {
            background: linear-gradient(135deg, #f5d742, #d4af37);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(245, 215, 66, 0.3);
        }
        .menu-icon {
            background: #1a1a1a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border: 1.5px solid #f5d742;
            transition: 0.2s;
        }
        .menu-icon span {
            display: block;
            width: 20px;
            height: 2.5px;
            background-color: #f5d742;
            border-radius: 2px;
        }
        .menu-icon:hover { transform: scale(1.05); background: #0a0a0a; }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1999;
            display: none;
        }
        .overlay.active { display: block; }
        .hamburger-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            z-index: 2000;
            padding: 30px 20px;
            transition: left 0.3s ease;
            border-right: 2px solid #f5d742;
        }
        .hamburger-menu.active { left: 0; }
        .close-menu {
            color: #f5d742;
            font-size: 28px;
            cursor: pointer;
            text-align: right;
            margin-bottom: 30px;
        }
        .menu-item {
            padding: 15px 20px;
            margin: 10px 0;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 12px;
            cursor: pointer;
            border-left: 5px solid #f5d742;
            font-weight: 500;
            transition: 0.2s;
        }
        .menu-item:hover { background: rgba(255, 215, 0, 0.2); transform: translateX(5px); }
        .page-heading {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #000, #1a1a1a);
            border-bottom: 2px solid #f5d742;
        }
        .page-heading h1 {
            font-size: 2.2rem;
            color: #f5d742;
            letter-spacing: 2px;
        }
        .page-heading p { color: #aaa; margin-top: 8px; }
        .admin-bar {
            text-align: center;
            padding: 15px;
            background: rgba(255,215,0,0.05);
            border-bottom: 1px solid rgba(255,215,0,0.2);
        }
        .admin-btn {
            background: linear-gradient(135deg, #f5d742, #d4af37);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .admin-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,215,66,0.4); }
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .gallery-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.3s;
            position: relative;
        }
        .gallery-card:hover { transform: translateY(-5px); border-color: #f5d742; }
        .gallery-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .card-caption {
            padding: 12px;
            font-size: 14px;
            color: #ddd;
            text-align: center;
            background: #0a0a0a;
        }
        .delete-img-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(220,20,60,0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: none;
        }
        .delete-img-btn:hover { background: red; transform: scale(1.05); }
        .admin-mode .delete-img-btn { display: flex; align-items: center; justify-content: center; }
        .empty-gallery {
            text-align: center;
            padding: 60px;
            color: #666;
            font-size: 18px;
        }
        .add-image-btn {
            margin-top: 20px;
            background: #f5d742;
            color: #000;
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
        }
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(8px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #1a1a1a, #000);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #f5d742;
        }
        .modal-content h2 { color: #f5d742; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #f5d742; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #f5d742;
            color: white;
            border-radius: 10px;
        }
        .file-upload-label {
            display: block;
            padding: 12px;
            background: rgba(255,215,0,0.1);
            border: 2px dashed #f5d742;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
        }
        .form-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .btn-primary {
            background: #f5d742;
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        .btn-secondary { background: #333; color: white; flex: 1; border: none; border-radius: 10px; cursor: pointer; }
        .preview-img { max-width: 100%; max-height: 150px; margin-top: 10px; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-spinner { border: 3px solid #333; border-top: 3px solid #f5d742; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="menu-icon" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="closeAll()"></div>
    <div class="hamburger-menu" id="hamburgerMenu">
        <div class="close-menu" onclick="closeMenu()">✕</div>
        <div class="menu-item" onclick="goHome()">🏠 Home</div>
        <div class="menu-item" onclick="promptAdminKey()">🔑 Admin Mode</div>
    </div>

    <div class="page-heading">
        <h1>🏆 UEFA EUROPA LEAGUE</h1>
        <p>Showcase of thrilling nights and rising stars</p>
    </div>

    <div class="admin-bar" id="adminBar" style="display: none;">
        <button class="admin-btn" id="openAddModalBtn">➕ Add New Image</button>
    </div>

    <div class="gallery-container">
        <div class="gallery-grid" id="galleryGrid">
            <div class="empty-gallery">Loading images...</div>
        </div>
    </div>

    <!-- Add Image Modal -->
    <div class="modal" id="addImageModal">
        <div class="modal-content">
            <h2>📸 Add Image to Europa League</h2>
            <div class="form-group">
                <label>Select Image *</label>
                <input type="file" id="imageFile" accept="image/*">
                <label for="imageFile" class="file-upload-label">Choose Image</label>
                <img id="previewImg" class="preview-img" style="display: none;">
            </div>
            <div class="form-group">
                <label>Caption (optional)</label>
                <input type="text" id="imageCaption" placeholder="Write a short caption...">
            </div>
            <div id="uploadStatus" style="color: #f5d742; font-size: 13px;"></div>
            <div class="form-buttons">
                <button class="btn-primary" id="uploadImageBtn">Upload</button>
                <button class="btn-secondary" onclick="closeAddModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_CONFIG = { databaseURL: 'https://efootball-412-default-rtdb.firebaseio.com' };
        const IMGBB_API_KEY = "81c24f30884ec6dda1dbd2b39739e0c9";
        const STORAGE_PATH = "europa_images";
        
        let isAdmin = false;
        let imagesList = [];

        async function fetchImages() {
            try {
                const res = await fetch(`${FIREBASE_CONFIG.databaseURL}/${STORAGE_PATH}.json`);
                const data = await res.json();
                if (data) imagesList = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                else imagesList = [];
                renderGallery();
            } catch(e) { console.error(e); renderGallery(); }
        }

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            if (!imagesList.length) { grid.innerHTML = '<div class="empty-gallery">📷 No images yet. Admin can add some!</div>'; return; }
            const adminClass = isAdmin ? 'admin-mode' : '';
            grid.innerHTML = imagesList.map(img => `
                <div class="gallery-card ${adminClass}" data-id="${img.id}">
                    <img class="gallery-img" src="${img.imageUrl}" alt="gallery image" loading="lazy">
                    <div class="card-caption">${escapeHtml(img.caption || '⚽ Europa League')}</div>
                    ${isAdmin ? `<button class="delete-img-btn" onclick="deleteImage('${img.id}')">✕</button>` : ''}
                </div>
            `).join('');
        }

        async function uploadImage(file) {
            const formData = new FormData();
            formData.append("image", file);
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
            const data = await response.json();
            if (!data.success) throw new Error(data.error?.message);
            return data.data.url;
        }

        async function addNewImage() {
            const file = document.getElementById('imageFile').files[0];
            const caption = document.getElementById('imageCaption').value.trim();
            if (!file) { alert("Please select an image"); return; }
            const statusDiv = document.getElementById('uploadStatus');
            const btn = document.getElementById('uploadImageBtn');
            btn.disabled = true;
            btn.textContent = "Uploading...";
            statusDiv.innerHTML = 'Uploading to ImgBB... <span class="loading-spinner"></span>';
            try {
                const imageUrl = await uploadImage(file);
                statusDiv.innerHTML = 'Saving to Firebase...';
                const newImage = { imageUrl, caption: caption || "🏆 Europa League", timestamp: Date.now() };
                const res = await fetch(`${FIREBASE_CONFIG.databaseURL}/${STORAGE_PATH}.json`, { method: 'POST', body: JSON.stringify(newImage) });
                const result = await res.json();
                imagesList.push({ id: result.name, ...newImage });
                renderGallery();
                closeAddModal();
                statusDiv.innerHTML = '';
            } catch(err) {
                statusDiv.innerHTML = `❌ Error: ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.textContent = "Upload";
            }
        }

        async function deleteImage(id) {
            if (!isAdmin || !confirm("Delete this image?")) return;
            await fetch(`${FIREBASE_CONFIG.databaseURL}/${STORAGE_PATH}/${id}.json`, { method: 'DELETE' });
            imagesList = imagesList.filter(img => img.id !== id);
            renderGallery();
        }

        function toggleMenu() { document.getElementById('hamburgerMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function closeMenu() { document.getElementById('hamburgerMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
        function closeAll() { closeMenu(); }
        function goHome() { window.location.href = 'feed.html'; }
        
        function promptAdminKey() {
            const key = prompt("Enter Admin Key:");
            if (key === "admin@100") {
                isAdmin = true;
                document.getElementById('adminBar').style.display = 'block';
                renderGallery();
                closeMenu();
                alert("Admin mode activated – you can now add/delete images.");
            } else if (key !== null) alert("Invalid admin key.");
        }

        function showAddModal() { if(isAdmin) document.getElementById('addImageModal').classList.add('active'); }
        function closeAddModal() { document.getElementById('addImageModal').classList.remove('active'); }
        
        document.getElementById('imageFile').addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = ev => { document.getElementById('previewImg').src = ev.target.result; document.getElementById('previewImg').style.display = 'block'; };
                reader.readAsDataURL(e.target.files[0]);
            }
        });
        document.getElementById('openAddModalBtn')?.addEventListener('click', showAddModal);
        document.getElementById('uploadImageBtn')?.addEventListener('click', addNewImage);
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        fetchImages();
    </script>
</body>
</html>
