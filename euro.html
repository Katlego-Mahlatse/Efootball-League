<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <title>UEFA EURO 2025 | Official Tournament Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* EURO 2025 COLOR VARIABLES */
    :root {
      --euro-blue: #0033A0;
      --euro-gold: #FFD700;
      --euro-silver: #C0C0C0;
      --euro-white: #FFFFFF;
      --euro-black: #1A1A2E;
      --euro-red: #E3000F;
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,215,0,0.25);
      --glass-blur: blur(12px);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--euro-black);
      min-height: 100vh;
      overflow-x: auto;
      min-width: 1200px;
      width: 1200px;
      margin: 0 auto;
      font-size: 20px;
      padding-bottom: 3rem;
      position: relative;
    }
    body.has-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: var(--bg-image);
      background-size: var(--bg-size, cover);
      background-position: var(--bg-pos, center);
      background-repeat: no-repeat;
      z-index: -2;
    }
    body.has-bg::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.75);
      z-index: -1;
    }

    /* MULTI-COLOR STRIPE NAVBAR */
    .navbar {
      background: repeating-linear-gradient(
        90deg,
        #0033A0 0px, #0033A0 60px,
        #FFD700 60px, #FFD700 120px,
        #E3000F 120px, #E3000F 180px,
        #008C45 180px, #008C45 240px,
        #002D62 240px, #002D62 300px,
        #FFD700 300px, #FFD700 360px,
        #C8102E 360px, #C8102E 420px
      );
      border-bottom: 3px solid var(--euro-gold);
      padding: 0 2rem;
      height: 100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      animation: fadeInDown 0.5s ease both;
    }
    .navbar-logo { height: 74px; max-width: 260px; object-fit: contain; cursor: pointer; transition: transform 0.3s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .navbar-logo:hover { transform: scale(1.05); }
    .navbar-logo-placeholder {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: 4px;
      color: var(--euro-white); cursor: pointer; font-weight: bold;
      text-shadow: 2px 2px 0 var(--euro-blue);
      background: rgba(0,0,0,0.4);
      padding: 0 20px;
      border-radius: 40px;
    }
    .menu-btn {
      background: var(--euro-blue);
      border: 2px solid var(--euro-gold);
      width: 70px; height: 70px; border-radius: 20px;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 8px;
      cursor: pointer; transition: all 0.3s;
    }
    .menu-btn span { width: 32px; height: 4px; background: var(--euro-gold); border-radius: 4px; }
    .menu-btn:hover { background: var(--euro-red); transform: rotate(90deg); }

    /* SIDE MENU */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 199; display: none; backdrop-filter: blur(3px); }
    .overlay.active { display: block; }
    .side-menu {
      position: fixed; top: 0; right: -360px; width: 360px; height: 100%;
      background: rgba(26,26,46,0.98); backdrop-filter: blur(20px);
      border-left: 2px solid var(--euro-gold);
      z-index: 200; padding: 40px 28px;
      transition: right 0.35s cubic-bezier(.4,0,.2,1);
    }
    .side-menu.active { right: 0; }
    .close-menu { text-align: right; font-size: 2.8rem; cursor: pointer; color: var(--euro-white); margin-bottom: 40px; line-height: 1; transition: color 0.2s; }
    .close-menu:hover { color: var(--euro-gold); }
    .menu-item {
      padding: 20px 28px; margin: 12px 0;
      border: 1px solid rgba(255,215,0,0.3); border-radius: 20px;
      cursor: pointer; font-weight: 600; font-size: 1.5rem;
      color: var(--euro-white); transition: all 0.2s;
      font-family: 'Rajdhani', sans-serif;
    }
    .menu-item:hover { background: var(--euro-gold); color: var(--euro-black); border-color: var(--euro-white); transform: translateX(8px); }

    /* SLIDESHOW */
    .slideshow-wrapper { padding: 36px 36px 20px; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.7s ease 0.2s both; }
    .slideshow-frame {
      width: 100%; max-width: 1100px; border-radius: 32px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,51,160,0.4);
      border: 2px solid var(--euro-gold);
      background: #000; display: flex; justify-content: center; align-items: center;
    }
    .slideshow-img { width: 100%; height: auto; max-height: 520px; object-fit: contain; display: block; transition: opacity 0.5s ease; }
    .dots-container { margin-top: 20px; display: flex; gap: 12px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,215,0,0.3); cursor: pointer; transition: all 0.25s; }
    .dot.active { background: var(--euro-gold); transform: scale(1.4); box-shadow: 0 0 12px rgba(255,215,0,0.7); }

    /* SEASON BAR */
    .season-bar { display: flex; justify-content: center; margin: 24px 0 16px; }
    .season-controls {
      display: flex; align-items: center; gap: 20px;
      background: var(--euro-blue);
      border: 2px solid var(--euro-gold);
      padding: 12px 32px;
      border-radius: 80px;
    }
    .season-arrow {
      background: var(--euro-red);
      border: none;
      width: 56px; height: 56px;
      border-radius: 50%;
      font-size: 2rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      color: white;
    }
    .season-arrow:hover:not(:disabled) { background: #b0000a; transform: scale(1.1); }
    .season-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
    .season-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: var(--euro-gold);
      min-width: 180px;
      text-align: center;
      background: rgba(0,0,0,0.2);
      padding: 4px 16px;
      border-radius: 40px;
    }
    .season-admin-btns { display: flex; gap: 10px; margin-left: 10px; }
    .season-admin-btn {
      background: rgba(255,215,0,0.15);
      border: 1px solid var(--euro-gold);
      padding: 8px 20px; border-radius: 40px; font-weight: 600;
      cursor: pointer; color: var(--euro-white); font-size: 1.1rem;
      font-family: 'Rajdhani', sans-serif; transition: all 0.2s;
    }
    .season-admin-btn:hover { background: var(--euro-gold); color: var(--euro-black); }

    /* TABS */
    .tabs-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin: 28px 36px 0;
      background: linear-gradient(90deg, var(--euro-blue), var(--euro-red));
      border: 2px solid var(--euro-gold);
      border-radius: 80px;
      padding: 12px 20px;
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeInUp 0.5s ease 0.3s both;
    }
    .tabs-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .tab-btn {
      background: transparent;
      border: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 10px 28px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      border-radius: 60px;
      letter-spacing: 0.5px;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--euro-gold);
      color: var(--euro-blue);
    }
    .tab-btn:hover:not(.active) {
      color: var(--euro-white);
      background: rgba(255,255,255,0.2);
    }

    /* CONTENT CARD */
    .content-card {
      margin: 24px 36px 40px;
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); border-radius: 32px;
      padding: 32px;
      min-height: 200px;
      animation: fadeInUp 0.5s ease 0.4s both;
    }

    /* LOADING */
    .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 24px; }
    .spinner { width: 60px; height: 60px; border: 5px solid rgba(255,215,0,0.2); border-top-color: var(--euro-gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

    /* TABLES */
    .table-scroll-wrap { overflow-x: auto; border-radius: 20px; }
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Rajdhani', sans-serif;
      min-width: 900px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      color: var(--euro-white);
    }
    .stats-table thead th {
      background: rgba(0,51,160,0.5);
      color: var(--euro-gold);
      font-size: 1.3rem;
      font-weight: 800;
      padding: 16px 18px;
      border-bottom: 2px solid var(--euro-gold);
    }
    .stats-table th:first-child, .stats-table td:first-child { position: sticky; left: 0; background: var(--glass-bg); backdrop-filter: var(--glass-blur); width: 64px; }
    .stats-table th:nth-child(2), .stats-table td:nth-child(2) { position: sticky; left: 64px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); box-shadow: 4px 0 8px -2px rgba(0,0,0,0.45); }
    .stats-table tbody tr { border-bottom: 1px solid rgba(255,215,0,0.2); }
    .stats-table tbody tr:hover { background: rgba(0,51,160,0.2); }
    .stats-table td { padding: 14px 18px; font-size: 1.3rem; font-weight: 600; }
    .team-name-text { font-weight: 700; font-size: 2rem !important; }
    .team-cell-inner { display: flex; align-items: center; gap: 14px; }
    .team-icon-sm { width: 60px; height: 60px; object-fit: contain; background: transparent; border-radius: 0; }
    .form-circles { display: flex; gap: 6px; }
    .circle-result { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .cW { background: #22c55e; color: white; }
    .cL { background: #ef4444; color: white; }
    .cD { background: #6b7280; color: white; }
    .cBlank { background: rgba(255,255,255,0.2); }

    .table-actions { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: rgba(0,51,160,0.3); border-radius: 20px 20px 0 0; border-bottom: 2px solid var(--euro-gold); }
    .add-btn { background: var(--euro-gold); color: var(--euro-black); border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .three-dot-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--euro-gold); color: white; width: 52px; height: 52px; border-radius: 50%; cursor: pointer; font-size: 2rem; }

    /* FIXTURES / RESULTS CARDS */
    .fixture-date-group, .match-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--glass-border);
      transition: transform 0.2s;
    }
    .fixture-card, .match-card { margin-bottom: 16px; }
    .fixture-match-row, .match-row { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .fixture-team-side, .team-side { text-align: center; flex: 1; }
    .fixture-team-name, .team-name-big { font-size: 2rem; font-weight: 700; }
    .fixture-vs, .match-center { font-size: 2rem; font-weight: bold; color: var(--euro-gold); }
    .score-display { font-family: 'Bebas Neue'; font-size: 3rem; background: rgba(0,0,0,0.3); padding: 8px 24px; border-radius: 60px; }
    .goal-scorer-item { background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; display: inline-block; margin: 2px; }
    .filters-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; padding: 16px; background: rgba(0,0,0,0.3); border-radius: 28px; }

    /* TOP 3 BLOCKS (Premier League style) */
    .top3-container { display: flex; justify-content: center; gap: 0; margin-bottom: 40px; }
    .top3-block { flex: 1; background: rgba(0,51,160,0.3); text-align: center; border: 1px solid var(--euro-gold); }
    .top3-block:first-child { border-top-left-radius: 32px; border-bottom-left-radius: 32px; }
    .top3-block:last-child { border-top-right-radius: 32px; border-bottom-right-radius: 32px; }
    .player-image-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background: var(--euro-black); }
    .player-img { width: 100%; height: 100%; object-fit: cover; }
    .medal-badge { position: absolute; top: 12px; left: 12px; font-size: 3rem; }
    .player-name-overlay { position: absolute; bottom: 16px; left: 16px; background: linear-gradient(90deg, rgba(0,0,0,0.7), transparent); color: white; padding: 6px 16px; border-radius: 40px; font-weight: bold; }
    .team-icon-overlay { position: absolute; bottom: 12px; right: 12px; width: 56px; height: 56px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .team-icon-overlay img { width: 80%; height: 80%; object-fit: contain; }
    .top3-count { font-family: 'Bebas Neue'; font-size: 2rem; background: var(--euro-gold); color: var(--euro-black); display: inline-block; padding: 8px 24px; border-radius: 40px; margin: 16px 0; }

    .stats-list { width: 100%; border-collapse: collapse; background: var(--glass-bg); }
    .stats-list th, .stats-list td { padding: 16px; text-align: left; border-bottom: 1px solid rgba(255,215,0,0.2); }
    .count-badge { background: var(--euro-gold); color: var(--euro-black); padding: 4px 16px; border-radius: 40px; font-weight: bold; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(6px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal-card { background: var(--euro-black); border: 2px solid var(--euro-gold); border-radius: 40px; padding: 32px; max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-card h3 { font-family: 'Bebas Neue'; font-size: 2rem; color: var(--euro-gold); margin-bottom: 24px; }
    .form-row { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.8rem; color: var(--euro-gold); margin-bottom: 6px; }
    .form-input, .form-select { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid var(--euro-gold); border-radius: 28px; color: white; font-family: inherit; }
    .modal-btns { display: flex; gap: 16px; margin-top: 24px; }
    .modal-btn-primary { background: var(--euro-gold); color: var(--euro-black); border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .modal-btn-cancel { background: transparent; border: 1px solid var(--euro-gold); color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; }

    .team-icon-lg { width: 80px; height: 80px; object-fit: contain; }
    footer { text-align: center; padding: 36px; color: rgba(255,255,255,0.4); border-top: 1px solid var(--euro-gold); margin-top: 24px; }
  </style>
</head>
<body>

<div class="navbar">
  <div id="logoContainer"></div>
  <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
</div>

<div class="overlay" id="overlay"></div>
<div class="side-menu" id="sideMenu">
  <div class="close-menu" id="closeMenuBtn">&#x2715;</div>
  <div class="menu-item" id="homeBtn">🏠 Home</div>
  <div class="menu-item" id="adminModeBtn">🔐 Admin Mode</div>
</div>

<div class="slideshow-wrapper">
  <div class="slideshow-frame"><img id="slideshowImg" class="slideshow-img" style="display:none;"></div>
  <div class="dots-container" id="dotsContainer"></div>
</div>

<div class="season-bar">
  <div class="season-controls">
    <button class="season-arrow" id="prevSeasonBtn">&#8249;</button>
    <div class="season-number" id="seasonNumber">EURO 2024</div>
    <button class="season-arrow" id="nextSeasonBtn">&#8250;</button>
    <div id="seasonAdminPanel" style="display:none;" class="season-admin-btns">
      <button class="season-admin-btn" id="addSeasonBtn">+ New</button>
      <button class="season-admin-btn" id="setActiveSeasonBtn">Set Active</button>
    </div>
  </div>
</div>

<div class="tabs-container">
  <div class="tabs-row">
    <button class="tab-btn active" data-tab="groups">GROUP STAGES</button>
    <button class="tab-btn" data-tab="fixtures">FIXTURES</button>
    <button class="tab-btn" data-tab="results">RESULTS</button>
    <button class="tab-btn" data-tab="topscorers">TOP SCORERS</button>
    <button class="tab-btn" data-tab="topassists">TOP ASSISTS</button>
    <button class="tab-btn" data-tab="watch">WATCH MATCH</button>
  </div>
</div>

<div class="content-card" id="contentCard"><div class="loading-spinner"><div class="spinner"></div><span>Loading EURO 2025...</span></div></div>

<footer>UEFA EURO 2025 &copy; Official Tournament Hub</footer>

<div id="genericModal" class="modal-overlay"><div class="modal-card" id="modalContent"></div></div>
<div id="teamForm" class="modal-overlay"><div class="modal-card"><h3>Add/Edit Team</h3><div class="form-row"><label class="form-label">Team Name</label><input id="teamNameInput" class="form-input"></div><div class="form-row"><label class="form-label">Played (P)</label><input id="teamP" type="number" class="form-input"></div><div class="form-row"><label class="form-label">Wins</label><input id="teamW" type="number" class="form-input"></div><div class="form-row"><label class="form-label">Draws</label><input id="teamD" type="number" class="form-input"></div><div class="form-row"><label class="form-label">Losses</label><input id="teamL" type="number" class="form-input"></div><div class="form-row"><label class="form-label">GS</label><input id="teamGS" type="number" class="form-input"></div><div class="form-row"><label class="form-label">GC</label><input id="teamGC" type="number" class="form-input"></div><div class="form-row"><label class="form-label">GD</label><input id="teamGD" type="number" class="form-input"></div><div class="form-row"><label class="form-label">Points</label><input id="teamPts" type="number" class="form-input"></div><div class="modal-btns"><button class="modal-btn-primary" id="saveTeamBtn">Save</button><button class="modal-btn-cancel" id="cancelTeamBtn">Cancel</button></div></div></div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
  authDomain: "efootball-412.firebaseapp.com",
  databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
  projectId: "efootball-412",
  storageBucket: "efootball-412.firebasestorage.app",
  messagingSenderId: "596548424249",
  appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const IMGBB_API_KEY = "81c24f30884ec6dda1dbd2b39739e0c9";

// STATE
let isAdmin = false;
let currentSeasonId = 2024;
let availableSeasons = [2024];
let groupsData = {};
let teamsDataCache = {};
let teamIcons = {};
let slideshowImages = [], slideshowDuration = 3000, slideInterval;
let watchMatchEmbed = '';
let topScorers = [], topAssists = [];
let calendarEvents = {};

// HELPERS
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
async function uploadImgBB(file) { const fd = new FormData(); fd.append('image',file); const r=await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`,{method:'POST',body:fd}); const d=await r.json(); if(!d.success) throw new Error('Upload failed'); return d.data.url; }
function pickFile(accept) { return new Promise(res=>{const i=document.createElement('input');i.type='file';i.accept=accept;i.onchange=e=>res(e.target.files[0]);i.click();}); }
function showModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('genericModal').classList.add('active'); }
function closeModal() { document.getElementById('genericModal').classList.remove('active'); }

function seasonPath(sub='') { return `euro/seasons/season_${currentSeasonId}${sub ? '/'+sub : ''}`; }

async function loadData() {
  const [groupsSnap, iconsSnap, slidesSnap, durSnap, watchSnap, scorersSnap, assistsSnap, calendarSnap] = await Promise.all([
    db.ref(seasonPath('groups')).once('value'),
    db.ref('euro/teamIcons').once('value'),
    db.ref('euro/slideshow/images').once('value'),
    db.ref('euro/slideshow/duration').once('value'),
    db.ref('euro/watchMatch/embedCode').once('value'),
    db.ref(seasonPath('topScorers')).once('value'),
    db.ref(seasonPath('topAssistants')).once('value'),
    db.ref('calendarEvents').once('value')
  ]);
  groupsData = groupsSnap.val() || {};
  teamIcons = iconsSnap.val() || {};
  slideshowImages = slidesSnap.val() || [];
  slideshowDuration = durSnap.val() || 3000;
  watchMatchEmbed = watchSnap.val() || '';
  topScorers = scorersSnap.val() ? Object.entries(scorersSnap.val()).map(([k,v])=>({key:k,...v})) : [];
  topAssists = assistsSnap.val() ? Object.entries(assistsSnap.val()).map(([k,v])=>({key:k,...v})) : [];
  calendarEvents = calendarSnap.val() || {};
  if(slideInterval) clearInterval(slideInterval);
  const imgEl = document.getElementById('slideshowImg');
  if(slideshowImages.length) { imgEl.style.display='block'; updateSlide(0); slideInterval = setInterval(()=>{ let i=(currentSlide+1)%slideshowImages.length; updateSlide(i); }, slideshowDuration); }
  else imgEl.style.display='none';
}
let currentSlide=0;
function updateSlide(i) { currentSlide=i; document.getElementById('slideshowImg').src=slideshowImages[i]; const dots=document.getElementById('dotsContainer'); dots.innerHTML=slideshowImages.map((_,idx)=>`<span class="dot ${idx===i?'active':''}" onclick="updateSlide(${idx})"></span>`).join(''); }

function getTeamIconHtml(name,cls='team-icon-sm') { const url = teamIcons[name]; return url ? `<img class="${cls}" src="${url}" alt="${name}">` : ''; }

// RENDER GROUPS
function renderGroups() {
  let html = `<div class="table-actions"><span>🇪🇺 UEFA EURO ${currentSeasonId} – Group Stage</span>${isAdmin?'<button class="add-btn" id="addGroupBtn">+ New Group</button>':''}<button class="three-dot-btn" id="threeDotBtn">⋮</button></div>`;
  for(let gid in groupsData) {
    const grp = groupsData[gid];
    const teams = grp.teams ? Object.entries(grp.teams).map(([k,v])=>({key:k,...v})) : [];
    const sorted = [...teams].sort((a,b)=> (b.pts||0)-(a.pts||0) || (b.gd||0)-(a.gd||0));
    html += `<div style="margin-bottom:40px;"><h3 style="color:var(--euro-gold);margin-bottom:12px;">${escapeHtml(grp.name||gid)}</h3>
      <div class="table-scroll-wrap"><table class="stats-table"><thead><tr><th>Pos</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GS</th><th>GC</th><th>GD</th><th>Pts</th><th>Last5</th>${isAdmin?'<th></th>':''}</tr></thead><tbody>`;
    sorted.forEach((t,idx)=>{
      const last5 = (t.last5||[]).map(r=>`<span class="circle-result ${r==='W'?'cW':r==='L'?'cL':r==='D'?'cD':'cBlank'}">${r==='W'?'✓':r==='L'?'✗':r==='D'?'–':'?'}</span>`).join('');
      const icon = getTeamIconHtml(t.name);
      html += `<tr><td>${idx+1}</td><td><div class="team-cell-inner">${icon}<span class="team-name-text">${escapeHtml(t.name)}</span></div></td>
        <td>${t.p||0}</td><td>${t.w||0}</td><td>${t.d||0}</td><td>${t.l||0}</td>
        <td>${t.gs||0}</td><td>${t.gc||0}</td><td>${(t.gd||0)>0?'+'+t.gd:t.gd||0}</td>
        <td class="pts-cell">${t.pts||0}</td><td><div class="form-circles">${last5}</div></td>
        ${isAdmin?`<td><button class="add-btn" style="padding:4px 12px;font-size:0.8rem;" onclick="editTeam('${gid}','${t.key}')">Edit</button></td>`:''}
      </tr>`;
    });
    html += `</tbody></table></div>${isAdmin?`<div style="margin-top:8px;"><button class="add-btn" onclick="addTeamToGroup('${gid}')">+ Add Team to ${grp.name}</button></div>`:''}</div>`;
  }
  document.getElementById('contentCard').innerHTML = html;
  if(isAdmin) document.getElementById('addGroupBtn')?.addEventListener('click', addNewGroup);
}
function addNewGroup() { let name=prompt('Group name (e.g. Group A)'); if(name) db.ref(seasonPath(`groups`)).push({name, teams:{}}).then(loadData).then(renderGroups); }
function addTeamToGroup(gid) { openTeamForm(gid,null); }
function editTeam(gid,key) { const t = groupsData[gid]?.teams?.[key]; if(t) openTeamForm(gid,key,t); }
let editingGroup=null, editingTeamKey=null;
function openTeamForm(gid,key,data) {
  editingGroup=gid; editingTeamKey=key;
  document.getElementById('teamNameInput').value=data?.name||'';
  document.getElementById('teamP').value=data?.p||0;
  document.getElementById('teamW').value=data?.w||0;
  document.getElementById('teamD').value=data?.d||0;
  document.getElementById('teamL').value=data?.l||0;
  document.getElementById('teamGS').value=data?.gs||0;
  document.getElementById('teamGC').value=data?.gc||0;
  document.getElementById('teamGD').value=data?.gd||0;
  document.getElementById('teamPts').value=data?.pts||0;
  document.getElementById('teamForm').classList.add('active');
}
document.getElementById('saveTeamBtn').onclick = async () => {
  const name = document.getElementById('teamNameInput').value.trim();
  if(!name) return;
  const data = { name, p:parseInt(document.getElementById('teamP').value)||0, w:parseInt(document.getElementById('teamW').value)||0, d:parseInt(document.getElementById('teamD').value)||0, l:parseInt(document.getElementById('teamL').value)||0, gs:parseInt(document.getElementById('teamGS').value)||0, gc:parseInt(document.getElementById('teamGC').value)||0, gd:parseInt(document.getElementById('teamGD').value)||0, pts:parseInt(document.getElementById('teamPts').value)||0, last5:[] };
  const ref = db.ref(seasonPath(`groups/${editingGroup}/teams`));
  if(editingTeamKey) await ref.child(editingTeamKey).set(data);
  else await ref.push(data);
  document.getElementById('teamForm').classList.remove('active');
  await loadData(); renderGroups();
};
document.getElementById('cancelTeamBtn').onclick = () => document.getElementById('teamForm').classList.remove('active');

// RENDER FIXTURES & RESULTS (simplified using calendarEvents)
function renderFixtures() {
  let fixtures = [];
  for(let d in calendarEvents) {
    const ev = calendarEvents[d];
    if(ev.title !== 'UEFA EURO') continue;
    (ev.tournaments||[]).forEach(t=>{
      (t.fixtures||[]).forEach(f=>{ fixtures.push({date:d, tournament:t.name, home:f.home, away:f.away}); });
    });
  }
  fixtures.sort((a,b)=>new Date(a.date)-new Date(b.date));
  let html = `<div class="filters-bar"><input type="text" placeholder="Filter team..." id="fixFilter" class="form-input" style="width:200px;"><button class="add-btn" id="clearFix">Clear</button></div>`;
  if(!fixtures.length) html += '<div class="empty-state">No fixtures scheduled</div>';
  else {
    let filtered = fixtures;
    html += `<div id="fixturesList">`;
    let lastDate='';
    filtered.forEach(f=>{
      if(f.date!==lastDate) { if(lastDate) html+=`</div>`; html+=`<div class="fixture-date-group"><div class="fixture-date-label">📅 ${f.date}</div>`; lastDate=f.date; }
      html += `<div class="fixture-card"><div class="fixture-match-row"><div class="fixture-team-side">${getTeamIconHtml(f.home,'team-icon-lg')}<span class="fixture-team-name">${escapeHtml(f.home)}</span></div><div class="fixture-vs">VS</div><div class="fixture-team-side">${getTeamIconHtml(f.away,'team-icon-lg')}<span class="fixture-team-name">${escapeHtml(f.away)}</span></div></div></div>`;
    });
    html+=`</div></div>`;
  }
  document.getElementById('contentCard').innerHTML = html;
  document.getElementById('fixFilter')?.addEventListener('input', function() { const v=this.value.toLowerCase(); document.querySelectorAll('.fixture-card').forEach(c=>{ const t=c.innerText.toLowerCase(); c.style.display=t.includes(v)?'block':'none'; }); });
  document.getElementById('clearFix')?.addEventListener('click',()=>{ document.getElementById('fixFilter').value=''; document.querySelectorAll('.fixture-card').forEach(c=>c.style.display='block'); });
}

async function renderResults() {
  const snap = await db.ref(seasonPath('results')).once('value');
  const results = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : [];
  results.sort((a,b)=>(b.md||0)-(a.md||0));
  let html = `<div class="filters-bar"><select id="mdFilter" class="form-select" style="width:150px;"><option value="all">All MD</option>${[...new Set(results.map(r=>r.md))].sort((a,b)=>a-b).map(m=>`<option value="${m}">MD ${m}</option>`).join('')}</select><button class="add-btn" id="clearResults">Clear</button>${isAdmin?'<button class="add-btn" id="addResultBtn">+ Add Result</button>':''}</div>`;
  if(!results.length) html += '<div class="empty-state">No results yet</div>';
  else {
    html += '<div id="resultsList">';
    results.forEach(r=>{
      const isForfeit = r.forfeitType && r.forfeitType !== 'none';
      const scoreDisplay = isForfeit ? (r.forfeitType==='no_contest' ? 'F — F' : `${r.homeScore||0} — ${r.awayScore||0} (Forfeit)`) : `${r.homeScore||0} — ${r.awayScore||0}`;
      html += `<div class="match-card" data-md="${r.md||0}">
        <div class="match-row"><div class="team-side">${getTeamIconHtml(r.homeTeam,'team-icon-lg')}<span class="team-name-big">${escapeHtml(r.homeTeam)}</span><div class="goal-scorers">${(r.goalScorers?.home||[]).map(s=>`<span class="goal-scorer-item">⚽ ${s.player} (${s.goals})</span>`).join('')}</div></div>
        <div class="match-center"><div class="score-display">${scoreDisplay}</div></div>
        <div class="team-side">${getTeamIconHtml(r.awayTeam,'team-icon-lg')}<span class="team-name-big">${escapeHtml(r.awayTeam)}</span><div class="goal-scorers">${(r.goalScorers?.away||[]).map(s=>`<span class="goal-scorer-item">⚽ ${s.player} (${s.goals})</span>`).join('')}</div></div></div>
        <div class="match-meta">Matchday ${r.md||'?'}</div>${isAdmin?`<div class="admin-row"><button class="add-btn" onclick="editResult('${r.key}')">Edit</button></div>`:''}
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('contentCard').innerHTML = html;
  document.getElementById('mdFilter')?.addEventListener('change',e=>{ const v=e.target.value; document.querySelectorAll('.match-card').forEach(c=>{ c.style.display = (v==='all' || c.dataset.md==v) ? 'block' : 'none'; }); });
  document.getElementById('clearResults')?.addEventListener('click',()=>{ document.getElementById('mdFilter').value='all'; document.querySelectorAll('.match-card').forEach(c=>c.style.display='block'); });
  if(isAdmin) document.getElementById('addResultBtn')?.addEventListener('click',()=>openResultForm(null));
}
let editingResultKey=null;
async function openResultForm(res) {
  editingResultKey = res?.key||null;
  const groupsList = Object.entries(groupsData).map(([id,g])=>`<option value="${id}" ${res?.groupId===id?'selected':''}>${escapeHtml(g.name)}</option>`).join('');
  showModal(`<h3>${res?'Edit':'Add'} Result</h3>
    <div class="form-row"><label class="form-label">Group</label><select id="resGroup" class="form-select">${groupsList}</select></div>
    <div class="form-row"><label class="form-label">Home Team</label><select id="resHome" class="form-select"></select></div>
    <div class="form-row"><label class="form-label">Away Team</label><select id="resAway" class="form-select"></select></div>
    <div class="form-row"><label class="form-label">Home Score</label><input id="resHS" type="number" class="form-input" value="${res?.homeScore||0}"></div>
    <div class="form-row"><label class="form-label">Away Score</label><input id="resAS" type="number" class="form-input" value="${res?.awayScore||0}"></div>
    <div class="form-row"><label class="form-label">Forfeit Type</label><select id="resForfeit" class="form-select"><option value="none">Normal</option><option value="no_contest">No Contest (F-F)</option><option value="forfeit">Forfeit</option></select></div>
    <div class="form-row"><label class="form-label">Matchday</label><input id="resMd" type="number" class="form-input" value="${res?.md||1}"></div>
    <div class="modal-btns"><button class="modal-btn-primary" id="saveResultBtn">Save</button><button class="modal-btn-cancel" id="cancelResBtn">Cancel</button></div>`);
  document.getElementById('resGroup').addEventListener('change',()=>updateTeamSelects());
  function updateTeamSelects() {
    const gid = document.getElementById('resGroup').value;
    const teams = groupsData[gid]?.teams ? Object.values(groupsData[gid].teams).map(t=>t.name) : [];
    document.getElementById('resHome').innerHTML = teams.map(t=>`<option value="${t}" ${res?.homeTeam===t?'selected':''}>${t}</option>`).join('');
    document.getElementById('resAway').innerHTML = teams.map(t=>`<option value="${t}" ${res?.awayTeam===t?'selected':''}>${t}</option>`).join('');
  }
  updateTeamSelects();
  document.getElementById('cancelResBtn').onclick=closeModal;
  document.getElementById('saveResultBtn').onclick=async()=>{
    const gid = document.getElementById('resGroup').value;
    const home = document.getElementById('resHome').value;
    const away = document.getElementById('resAway').value;
    const hs = parseInt(document.getElementById('resHS').value)||0;
    const as2 = parseInt(document.getElementById('resAS').value)||0;
    const forfeit = document.getElementById('resForfeit').value;
    const md = parseInt(document.getElementById('resMd').value)||0;
    if(!home||!away) return;
    const matchText = forfeit==='no_contest' ? `${home} F - F ${away} (No Contest)` : `${home} ${hs} - ${as2} ${away}${forfeit==='forfeit'?' (Forfeit)':''}`;
    const resultObj = { matchText, homeTeam:home, awayTeam:away, homeScore:hs, awayScore:as2, forfeitType:forfeit, md, goalScorers:{home:[],away:[]} };
    const resultsRef = db.ref(seasonPath('results'));
    if(editingResultKey) await resultsRef.child(editingResultKey).set(resultObj);
    else await resultsRef.push(resultObj);
    // Update group table stats
    const groupsRef = db.ref(seasonPath(`groups/${gid}/teams`));
    const teamsSnap = await groupsRef.once('value');
    const teamsObj = teamsSnap.val()||{};
    let homeKey=null, awayKey=null;
    for(let k in teamsObj) if(teamsObj[k].name===home) homeKey=k;
    for(let k in teamsObj) if(teamsObj[k].name===away) awayKey=k;
    if(homeKey && awayKey && forfeit!=='no_contest') {
      let h = {...teamsObj[homeKey]}, a = {...teamsObj[awayKey]};
      h.p = (h.p||0)+1; a.p = (a.p||0)+1;
      if(forfeit==='forfeit') {
        if(hs>as2) { h.pts=(h.pts||0)+3; h.w=(h.w||0)+1; a.l=(a.l||0)+1; }
        else { a.pts=(a.pts||0)+3; a.w=(a.w||0)+1; h.l=(h.l||0)+1; }
      } else {
        h.gs=(h.gs||0)+hs; h.gc=(h.gc||0)+as2; a.gs=(a.gs||0)+as2; a.gc=(a.gc||0)+hs;
        h.gd = h.gs - h.gc; a.gd = a.gs - a.gc;
        if(hs>as2) { h.pts=(h.pts||0)+3; h.w=(h.w||0)+1; a.l=(a.l||0)+1; }
        else if(as2>hs) { a.pts=(a.pts||0)+3; a.w=(a.w||0)+1; h.l=(h.l||0)+1; }
        else { h.pts=(h.pts||0)+1; a.pts=(a.pts||0)+1; h.d=(h.d||0)+1; a.d=(a.d||0)+1; }
      }
      await groupsRef.child(homeKey).set(h);
      await groupsRef.child(awayKey).set(a);
    }
    closeModal();
    await loadData();
    renderResults();
  };
}

function renderTopScorers() { renderTopList(topScorers, 'scorer', 'Goals'); }
function renderTopAssists() { renderTopList(topAssists, 'assist', 'Assists'); }
function renderTopList(list, type, label) {
  const sorted = [...list].sort((a,b)=>(b.count||0)-(a.count||0));
  const top3 = sorted.slice(0,3);
  const rest = sorted.slice(3);
  let html = `<div class="top3-container">${top3.map((p,i)=>
    `<div class="top3-block"><div class="player-image-wrapper"><div class="medal-badge">${i===0?'🥇':i===1?'🥈':'🥉'}</div><img class="player-img" src="${p.imageUrl||'https://via.placeholder.com/300x300?text=No+Image'}"><div class="player-name-overlay">${escapeHtml(p.name)}</div><div class="team-icon-overlay">${getTeamIconHtml(p.team,'')}</div></div><div class="top3-count">${p.count||0} ${label}</div>${isAdmin?`<button class="add-btn" onclick="editStat('${type}','${p.key}')">Edit</button>`:''}</div>`
  ).join('')}</div>`;
  if(rest.length) {
    html += `<div class="table-scroll-wrap"><table class="stats-list"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>${label}</th>${isAdmin?'<th></th>':''}</tr></thead><tbody>`;
    rest.forEach((p,i)=> {
      html += `<tr><td>${i+4}</td><td>${escapeHtml(p.name)}</td><td><div class="team-cell-inner">${getTeamIconHtml(p.team)} ${escapeHtml(p.team)}</div></td><td><span class="count-badge">${p.count||0}</span></td>${isAdmin?`<td><button class="add-btn" onclick="editStat('${type}','${p.key}')">✏️</button></td>`:''}</tr>`;
    });
    html += `</tbody></table></div>`;
  }
  if(isAdmin) html += `<button class="add-btn" id="addStatBtn" style="margin-top:20px;">+ Add ${type==='scorer'?'Scorer':'Assistant'}</button>`;
  document.getElementById('contentCard').innerHTML = html;
  if(isAdmin) document.getElementById('addStatBtn')?.addEventListener('click',()=>openStatModal(type));
}
function openStatModal(type, existing=null) {
  showModal(`<h3>${existing?'Edit':'Add'} ${type==='scorer'?'Top Scorer':'Top Assistant'}</h3>
    <div class="form-row"><label class="form-label">Player Name</label><input id="statName" class="form-input" value="${existing?.name||''}"></div>
    <div class="form-row"><label class="form-label">Team</label><input id="statTeam" class="form-input" value="${existing?.team||''}"></div>
    <div class="form-row"><label class="form-label">${type==='scorer'?'Goals':'Assists'}</label><input id="statCount" type="number" class="form-input" value="${existing?.count||0}"></div>
    <div class="form-row"><label class="form-label">Photo URL (optional)</label><input id="statImage" class="form-input" value="${existing?.imageUrl||''}"></div>
    <div class="modal-btns"><button class="modal-btn-primary" id="saveStatBtn">Save</button><button class="modal-btn-cancel" id="cancelStatBtn">Cancel</button></div>`);
  document.getElementById('saveStatBtn').onclick = async () => {
    const name = document.getElementById('statName').value.trim();
    const team = document.getElementById('statTeam').value.trim();
    const count = parseInt(document.getElementById('statCount').value)||0;
    const imageUrl = document.getElementById('statImage').value.trim();
    if(!name||!team) return;
    const data = { name, team, count, imageUrl };
    const path = seasonPath(`${type==='scorer'?'topScorers':'topAssistants'}`);
    if(existing?.key) await db.ref(`${path}/${existing.key}`).set(data);
    else await db.ref(path).push(data);
    closeModal();
    await loadData();
    if(type==='scorer') renderTopScorers(); else renderTopAssists();
  };
  document.getElementById('cancelStatBtn').onclick = closeModal;
}
function editStat(type,key) { const item = type==='scorer' ? topScorers.find(s=>s.key===key) : topAssists.find(a=>a.key===key); if(item) openStatModal(type,item); }

function renderWatchMatch() {
  let html = watchMatchEmbed ? `<div class="video-wrapper" style="position:relative;padding-bottom:56.25%;height:0;"><iframe src="${watchMatchEmbed}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen></iframe></div>` : '<div class="empty-state">No match video available</div>';
  if(isAdmin) html += `<button class="add-btn" id="updateWatchBtn" style="margin-top:20px;">Update Video</button>`;
  document.getElementById('contentCard').innerHTML = html;
  if(isAdmin) document.getElementById('updateWatchBtn')?.addEventListener('click', async ()=>{ const url=prompt('YouTube embed URL or code:', watchMatchEmbed); if(url) await db.ref('euro/watchMatch/embedCode').set(url); await loadData(); renderWatchMatch(); });
}

function renderCurrentTab() {
  const tab = document.querySelector('.tab-btn.active').dataset.tab;
  if(tab === 'groups') renderGroups();
  else if(tab === 'fixtures') renderFixtures();
  else if(tab === 'results') renderResults();
  else if(tab === 'topscorers') renderTopScorers();
  else if(tab === 'topassists') renderTopAssists();
  else if(tab === 'watch') renderWatchMatch();
}

// SEASONS
async function loadSeasons() { const snap = await db.ref('euro/seasons').once('value'); const s=snap.val()||{}; availableSeasons = Object.keys(s).map(k=>parseInt(k.split('_')[1])).filter(n=>!isNaN(n)); if(!availableSeasons.length) { await db.ref('euro/seasons/season_2024/groups').set({}); availableSeasons=[2024]; } currentSeasonId = availableSeasons[0]; document.getElementById('seasonNumber').innerText=`EURO ${currentSeasonId}`; }
async function switchSeason(delta) { let idx=availableSeasons.indexOf(currentSeasonId); let n=idx+delta; if(n>=0 && n<availableSeasons.length) { currentSeasonId=availableSeasons[n]; document.getElementById('seasonNumber').innerText=`EURO ${currentSeasonId}`; await loadData(); renderCurrentTab(); } }
document.getElementById('prevSeasonBtn').onclick=()=>switchSeason(-1);
document.getElementById('nextSeasonBtn').onclick=()=>switchSeason(1);

// ADMIN
function promptAdmin() { const key=prompt('Admin Key:'); if(key==='euro@2025') { isAdmin=true; document.getElementById('seasonAdminPanel').style.display='flex'; renderCurrentTab(); document.getElementById('adminModeBtn').innerHTML='✅ Admin Mode'; } else alert('Wrong key'); }
document.getElementById('adminModeBtn').onclick=promptAdmin;
document.getElementById('addSeasonBtn').onclick=async()=>{ const s=prompt('New season year (e.g. 2028)'); if(s) { await db.ref(`euro/seasons/season_${s}/groups`).set({}); availableSeasons.push(parseInt(s)); availableSeasons.sort(); switchSeason(availableSeasons.indexOf(parseInt(s))-availableSeasons.indexOf(currentSeasonId)); } };
document.getElementById('setActiveSeasonBtn').onclick=async()=>{ alert(`Season ${currentSeasonId} set as active for external pages.`); /* optional */ };
document.getElementById('homeBtn').onclick=()=>window.location.href='feed.html';

document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCurrentTab(); }); });

function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
document.getElementById('menuBtn').onclick=toggleMenu;
document.getElementById('closeMenuBtn').onclick=toggleMenu;
document.getElementById('overlay').onclick=toggleMenu;

async function init() {
  await loadSeasons();
  await loadData();
  renderCurrentTab();
}
init();
</script>
