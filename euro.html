<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <title>UEFA EUROs</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --eu-primary: #003399;
      --eu-accent: #ffcc00;
      --eu-accent2: #0052cc;
      --eu-deep: #001a66;
      --eu-star: #ffcc00;
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.15);
      --glass-blur: blur(14px);
    }

    @keyframes fadeInDown { from{opacity:0;transform:translateY(-24px);}to{opacity:1;transform:translateY(0);} }
    @keyframes fadeInUp   { from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);} }
    @keyframes fadeIn     { from{opacity:0;}to{opacity:1;} }
    @keyframes spin       { to{transform:rotate(360deg);} }
    @keyframes cardSlideIn{ from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
    @keyframes orbitFlags { from{transform:rotate(0deg);}to{transform:rotate(360deg);} }
    @keyframes counterRotate { from{transform:rotate(0deg);}to{transform:rotate(-360deg);} }
    @keyframes pulsCenter { 0%,100%{box-shadow:0 0 30px rgba(255,204,0,0.4);}50%{box-shadow:0 0 70px rgba(255,204,0,0.8);} }
    @keyframes navStripe  { 0%{background-position:0 0;}100%{background-position:60px 0;} }
    @keyframes starTwinkle{ 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.6;transform:scale(0.85);} }

    body {
      font-family:'Rajdhani',sans-serif;
      background: var(--eu-deep);
      min-height:100vh;
      overflow-x:auto;
      min-width:1200px;
      width:1200px;
      margin:0 auto;
      font-size:20px;
      padding-bottom:3rem;
    }
    body.has-bg::before {
      content:'';position:fixed;inset:0;
      background-image:var(--bg-image);
      background-size:cover;background-position:center;background-repeat:no-repeat;
      z-index:-2;
    }
    body.has-bg::after {
      content:'';position:fixed;inset:0;
      background:rgba(0,26,102,0.75);
      z-index:-1;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: var(--eu-primary);
      height:110px;
      display:flex;
      justify-content:center;
      align-items:center;
      position:sticky;top:0;z-index:100;
      box-shadow:0 2px 24px rgba(255,204,0,0.2);
      animation:fadeInDown 0.5s ease both;
      overflow:hidden;
    }
    /* dots pattern strip top */
    .navbar::before {
      content:'';
      position:absolute;top:0;left:0;right:0;height:10px;
      background: repeating-linear-gradient(
        90deg,
        #003399 0px, #003399 14px,
        #ffffff 14px, #ffffff 24px,
        #c0392b 24px, #c0392b 38px,
        #ffcc00 38px, #ffcc00 48px,
        #003399 48px, #003399 62px,
        #ffffff 62px, #ffffff 72px,
        #009246 72px, #009246 86px,
        #ce1126 86px, #ce1126 100px,
        #002395 100px, #002395 114px,
        #ed2939 114px, #ed2939 124px
      );
      background-size:124px 10px;
      animation:navStripe 4s linear infinite;
    }
    /* checks pattern strip bottom */
    .navbar::after {
      content:'';
      position:absolute;bottom:0;left:0;right:0;height:10px;
      background: repeating-linear-gradient(
        90deg,
        #ffcc00 0px,#ffcc00 14px,
        #003399 14px,#003399 28px,
        #ce1126 28px,#ce1126 42px,
        #ffffff 42px,#ffffff 52px,
        #009246 52px,#009246 66px,
        #002395 66px,#002395 80px,
        #ed2939 80px,#ed2939 94px,
        #c0392b 94px,#c0392b 108px,
        #ffcc00 108px,#ffcc00 118px,
        #003399 118px,#003399 128px
      );
      background-size:128px 10px;
      animation:navStripe 4s linear infinite reverse;
    }
    .navbar-center { display:flex;flex-direction:column;align-items:center;gap:6px;z-index:1; }
    /* 12 EU stars */
    .eu-stars {
      display:flex;gap:6px;justify-content:center;
    }
    .eu-star {
      color:var(--eu-star);font-size:1rem;
      animation:starTwinkle 2s ease-in-out infinite;
    }
    .eu-star:nth-child(2) { animation-delay:0.17s; }
    .eu-star:nth-child(3) { animation-delay:0.33s; }
    .eu-star:nth-child(4) { animation-delay:0.5s; }
    .eu-star:nth-child(5) { animation-delay:0.67s; }
    .eu-star:nth-child(6) { animation-delay:0.83s; }
    .eu-star:nth-child(7) { animation-delay:1.0s; }
    .eu-star:nth-child(8) { animation-delay:1.17s; }
    .eu-star:nth-child(9) { animation-delay:1.33s; }
    .eu-star:nth-child(10){ animation-delay:1.5s; }
    .eu-star:nth-child(11){ animation-delay:1.67s; }
    .eu-star:nth-child(12){ animation-delay:1.83s; }
    .navbar-logo   { height:70px;max-width:220px;object-fit:contain;cursor:pointer;transition:transform 0.3s; }
    .navbar-logo:hover { transform:scale(1.05); }
    .navbar-title  {
      font-family:'Bebas Neue',sans-serif;
      font-size:2.2rem;letter-spacing:6px;
      color:var(--eu-accent);text-shadow:0 2px 12px rgba(255,204,0,0.4);
    }
    .menu-btn {
      position:absolute;right:2rem;top:50%;transform:translateY(-50%);
      background:rgba(255,204,0,0.15);
      border:2px solid rgba(255,204,0,0.4);
      width:64px;height:64px;border-radius:18px;
      display:flex;flex-direction:column;
      justify-content:center;align-items:center;gap:7px;
      cursor:pointer;transition:all 0.3s;z-index:1;
    }
    .menu-btn span { width:30px;height:3px;background:white;border-radius:3px; }
    .menu-btn:hover { background:rgba(255,204,0,0.3);transform:translateY(-50%) rotate(90deg); }

    /* ── SIDE MENU ── */
    .overlay { position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:199;display:none;backdrop-filter:blur(3px); }
    .overlay.active { display:block; }
    .side-menu {
      position:fixed;top:0;right:-360px;width:360px;height:100%;
      background:rgba(0,26,102,0.98);backdrop-filter:blur(20px);
      border-left:2px solid var(--eu-accent);
      z-index:200;padding:40px 28px;
      transition:right 0.35s cubic-bezier(.4,0,.2,1);
    }
    .side-menu.active { right:0; }
    .close-menu { text-align:right;font-size:2.8rem;cursor:pointer;color:white;margin-bottom:40px;line-height:1;transition:color 0.2s; }
    .close-menu:hover { color:var(--eu-accent); }
    .menu-item {
      padding:20px 28px;margin:12px 0;
      border:1px solid rgba(255,204,0,0.3);border-radius:20px;
      cursor:pointer;font-weight:600;font-size:1.5rem;
      color:white;transition:all 0.2s;
    }
    .menu-item:hover { background:rgba(255,204,0,0.15);border-color:var(--eu-accent);transform:translateX(8px); }

    /* ── ORBIT FLAGS SECTION ── */
    .orbit-section {
      display:flex;justify-content:center;align-items:center;
      padding:50px 0 30px;
      animation:fadeIn 0.8s ease 0.2s both;
    }
    .orbit-wrapper {
      position:relative;
      width:880px;height:880px;
    }
    .orbit-ring {
      position:absolute;inset:0;border-radius:50%;
      border:1px dashed rgba(255,204,0,0.2);
    }
    .orbit-spinner {
      position:absolute;inset:0;border-radius:50%;
      animation:orbitFlags var(--orbit-duration,20s) linear infinite;
    }
    .orbit-flag-item {
      position:absolute;
      width:64px;height:64px;border-radius:50%;overflow:hidden;
      border:3px solid rgba(255,204,0,0.4);
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
      top:50%;left:50%;transform-origin:0 0;
      transition:border-color 0.3s;
    }
    .orbit-flag-item:hover { border-color:var(--eu-accent);z-index:10; }
    .orbit-flag-item img { width:100%;height:100%;object-fit:cover;display:block; }
    .orbit-flag-item .flag-inner {
      width:100%;height:100%;
      animation:counterRotate var(--orbit-duration,20s) linear infinite;
    }
    /* CENTER - 3x bigger */
    .orbit-center {
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:600px;height:600px;border-radius:50%;overflow:hidden;
      border:4px solid rgba(255,204,0,0.7);
      box-shadow:0 0 50px rgba(255,204,0,0.35);
      background:var(--eu-deep);
      animation:pulsCenter 3s ease-in-out infinite;z-index:10;
    }
    .orbit-center img { width:100%;height:100%;object-fit:cover;transition:opacity 0.5s ease; }
    .orbit-center-placeholder {
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;
      color:var(--eu-accent);text-align:center;padding:10px;
    }
    .center-dots {
      position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);
      display:flex;gap:8px;
    }
    .center-dot { width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.25s; }
    .center-dot.active { background:var(--eu-accent);transform:scale(1.4); }

    /* ── SEASON BAR ── */
    .season-bar { display:flex;justify-content:center;margin:24px 0 16px; }
    .season-controls {
      display:flex;align-items:center;gap:20px;
      background:#ffffff;border:2px solid rgba(0,51,153,0.2);
      padding:12px 32px;border-radius:80px;
      box-shadow:0 4px 16px rgba(0,0,0,0.2);
    }
    .season-arrow {
      background:var(--eu-primary);border:none;
      width:56px;height:56px;border-radius:50%;
      font-size:2rem;cursor:pointer;color:white;
      font-weight:bold;transition:all 0.2s;line-height:1;
      display:flex;align-items:center;justify-content:center;
    }
    .season-arrow:hover:not(:disabled) { background:var(--eu-accent2);transform:scale(1.1); }
    .season-arrow:disabled { opacity:0.3;cursor:not-allowed; }
    .season-number {
      font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;
      color:var(--eu-primary);min-width:180px;text-align:center;
    }
    .season-admin-btns { display:flex;gap:10px;margin-left:10px; }
    .season-admin-btn {
      background:rgba(0,51,153,0.1);border:1px solid var(--eu-primary);
      padding:8px 20px;border-radius:40px;font-weight:600;
      cursor:pointer;color:var(--eu-primary);font-size:1.1rem;
      font-family:'Rajdhani',sans-serif;transition:all 0.2s;
    }
    .season-admin-btn:hover { background:var(--eu-primary);color:white; }

    /* ── TABS ── */
    .tabs-container {
      display:flex;flex-direction:column;align-items:center;gap:10px;
      margin:28px 36px 0;
      background:var(--glass-bg);backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-radius:80px;padding:12px 20px;
      max-width:1100px;margin-left:auto;margin-right:auto;
      animation:fadeInUp 0.5s ease 0.3s both;
    }
    .tabs-row { display:flex;justify-content:center;gap:8px;flex-wrap:wrap; }
    .tab-btn {
      background:transparent;border:none;
      font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;
      padding:10px 28px;cursor:pointer;color:rgba(255,255,255,0.6);
      border-radius:60px;letter-spacing:0.5px;transition:all 0.25s;white-space:nowrap;
    }
    .tab-btn.active { background:#ffffff;color:var(--eu-primary); }
    .tab-btn:hover:not(.active) { color:white;background:rgba(255,255,255,0.15); }

    /* ── SUB TABS ── */
    .sub-tabs-row { display:flex;gap:8px;margin-bottom:24px;justify-content:center; }
    .sub-tab-btn {
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);
      font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;
      padding:8px 28px;cursor:pointer;color:rgba(255,255,255,0.6);border-radius:60px;
      letter-spacing:0.5px;transition:all 0.25s;white-space:nowrap;
    }
    .sub-tab-btn.active { background:#ffffff;color:var(--eu-primary); }
    .sub-tab-btn:hover:not(.active) { color:white;background:rgba(255,255,255,0.2); }

    /* ── CONTENT CARD ── */
    .content-card {
      margin:24px 36px 40px;
      background:var(--glass-bg);backdrop-filter:var(--glass-blur);
      -webkit-backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);border-radius:32px;padding:32px;min-height:200px;
      animation:fadeInUp 0.5s ease 0.4s both;
    }

    /* ── LOADING / EMPTY ── */
    .loading-spinner { display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:24px; }
    .spinner { width:60px;height:60px;border:5px solid rgba(255,255,255,0.2);border-top-color:var(--eu-accent);border-radius:50%;animation:spin 0.8s linear infinite; }
    .loading-spinner span { color:rgba(255,255,255,0.6);font-size:1.4rem; }
    .empty-state { text-align:center;padding:80px 20px;color:rgba(255,255,255,0.4); }
    .empty-state .empty-icon { font-size:5rem;margin-bottom:20px; }
    .empty-state p { font-size:2rem;font-weight:500; }
    .coming-soon { text-align:center;padding:80px 20px;color:rgba(255,255,255,0.7); }
    .coming-soon .cs-icon { font-size:5rem;margin-bottom:20px; }
    .coming-soon h2 { font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:4px;color:white;margin-bottom:12px; }
    .coming-soon p { font-size:1.6rem;color:rgba(255,255,255,0.5); }

    /* ── TABLE ── */
    .table-scroll-wrap { overflow-x:auto;border-radius:20px;position:relative; }
    .stats-table {
      width:100%;border-collapse:collapse;font-family:'Rajdhani',sans-serif;
      min-width:900px;background:rgba(255,255,255,0.06);color:white;
    }
    .stats-table thead th {
      background:rgba(0,0,0,0.35);color:white;font-size:1.3rem;font-weight:800;
      text-transform:uppercase;letter-spacing:1px;padding:16px 18px;
      border-bottom:2px solid rgba(255,255,255,0.15);white-space:nowrap;
    }
    .stats-table th:first-child,.stats-table td:first-child {
      position:sticky;left:0;z-index:25;background:rgba(0,10,50,0.85);width:64px;min-width:64px;
    }
    .stats-table thead th:first-child { background:rgba(0,0,0,0.5);z-index:30; }
    .stats-table th:nth-child(2),.stats-table td:nth-child(2) {
      position:sticky;left:64px;z-index:24;background:rgba(0,10,50,0.85);
      box-shadow:4px 0 8px -2px rgba(0,0,0,0.4);border-right:1px solid rgba(255,255,255,0.1);
    }
    .stats-table thead th:nth-child(2) { background:rgba(0,0,0,0.5);z-index:30; }
    .stats-table tbody tr { border-bottom:1px solid rgba(255,255,255,0.07);transition:background 0.2s; }
    .stats-table tbody tr:hover { background:rgba(255,204,0,0.06); }
    .stats-table td { padding:14px 18px;color:white;font-size:1.3rem;font-weight:600;white-space:nowrap; }
    .stats-table td.stat-number { font-size:2.4rem!important;font-weight:800;line-height:1.2; }
    .team-name-text { font-weight:700;font-size:2.4rem!important;color:white; }
    .pts-cell { font-weight:800;color:white;font-size:1.5rem; }
    .rank-cell { font-weight:700;color:white;font-family:'Bebas Neue',sans-serif;font-size:1.6rem; }
    .table-actions {
      display:flex;justify-content:center;gap:12px;padding:14px 18px;
      background:rgba(0,0,0,0.3);border-radius:20px 20px 0 0;
      border:1px solid rgba(255,255,255,0.1);border-bottom:2px solid rgba(255,255,255,0.15);align-items:center;
    }
    .table-actions-title { font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:white;letter-spacing:2px;text-align:center;flex:1; }
    .add-btn {
      background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);color:white;
      font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.2rem;
      padding:10px 24px;border-radius:40px;cursor:pointer;transition:all 0.2s;
    }
    .add-btn:hover { background:rgba(255,255,255,0.25); }
    .legend-row {
      margin-top:24px;padding:16px 20px;background:rgba(0,0,0,0.2);border-radius:20px;
      display:flex;gap:28px;flex-wrap:wrap;justify-content:center;
    }
    .legend-item { display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,0.85);font-size:1.5rem;font-weight:600; }
    .vbar { width:6px;height:28px;border-radius:3px;display:inline-block; }
    .vbar-blue  { background:#3b82f6; }
    .vbar-red   { background:#ef4444; }
    .vbar-orange { background:#f97316; }
    .pos-bar-wrap { display:flex;align-items:center;gap:8px; }
    .dashed-sep-blue td { border-bottom:3px dashed #3b82f6!important; }
    .dashed-sep-red  td { border-bottom:3px dashed #ef4444!important; }
    .dashed-sep-orange td { border-bottom:3px dashed #f97316!important; }
    .team-cell-inner { display:flex;align-items:center;gap:14px; }
    .team-icon-sm { width:60px;height:60px;object-fit:contain;background:transparent;border:none;border-radius:0;transition:transform 0.25s; }
    .team-icon-sm:hover { transform:scale(1.1); }
    .team-icon-lg { width:100px;height:100px;object-fit:contain;background:transparent;border:none;border-radius:0;transition:transform 0.25s; }
    .team-icon-lg:hover { transform:scale(1.05); }
    .form-circles { display:flex;gap:6px;align-items:center; }
    .circle-result { width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:1rem;font-weight:bold; }
    .cW{background:#22c55e;color:white;} .cL{background:#ef4444;color:white;} .cD{background:#6b7280;color:white;} .cBlank{background:rgba(255,255,255,0.15);}

    /* ── FILTERS ── */
    .filters-bar {
      display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end;
      margin-bottom:30px;padding:20px;
      background:rgba(0,0,0,0.2);border-radius:28px;border:1px solid rgba(255,255,255,0.1);
    }
    .filter-group { display:flex;flex-direction:column;gap:8px; }
    .filter-group label { font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.6); }
    .filter-group select,.filter-group button {
      background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);
      border-radius:40px;padding:12px 20px;font-family:'Rajdhani',sans-serif;
      font-size:1.2rem;font-weight:600;color:white;cursor:pointer;transition:all 0.2s;
    }
    .filter-group select:hover,.filter-group button:hover { background:rgba(255,255,255,0.1); }
    .filter-stats { font-size:1rem;color:rgba(255,255,255,0.5);margin-left:auto;align-self:center; }
    .view-calendar-btn {
      background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);
      color:white;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.2rem;
      padding:12px 28px;border-radius:40px;cursor:pointer;transition:all 0.25s;
      display:flex;align-items:center;gap:8px;white-space:nowrap;align-self:flex-end;text-decoration:none;
    }
    .view-calendar-btn:hover { background:rgba(255,255,255,0.2);transform:translateY(-2px); }

    /* ── FIXTURE CARDS ── */
    .fixture-date-group { margin-bottom:32px;animation:cardSlideIn 0.4s ease both; }
    .fixture-date-label {
      font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;color:white;
      margin-bottom:14px;padding:10px 20px;
      background:rgba(255,255,255,0.08);border-radius:50px;
      border-left:4px solid var(--eu-accent);display:inline-block;
    }
    .fixture-card {
      background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);
      border-radius:28px;padding:28px 40px;margin-bottom:16px;
      transition:all 0.25s;animation:cardSlideIn 0.4s ease both;
      border:1px solid rgba(255,255,255,0.1);
    }
    .fixture-card:hover { background:rgba(255,204,0,0.07);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.3); }

  const spinner=document.getElementById('orbitSpinner');
  spinner.innerHTML='';
  spinner.style.setProperty('--orbit-duration',orbitDuration+'ms');
  if(!orbitFlags.length)return;
  const count=orbitFlags.length;const radius=390;
  orbitFlags.forEach((url,i)=>{
    const angle=(360/count)*i;const rad=(angle*Math.PI)/180;
    const x=440+radius*Math.cos(rad)-32;const y=440+radius*Math.sin(rad)-32;
    const flagEl=document.createElement('div');
    flagEl.className='orbit-flag-item';
    flagEl.style.cssText=`left:${x}px;top:${y}px;--orbit-duration:${orbitDuration}ms;`;
    flagEl.innerHTML=`<div class="flag-inner"><img src="${url}" alt="flag" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%23335%22/></svg>'"></div>`;
    spinner.appendChild(flagEl);
  });
  spinner.style.animation=`orbitFlags ${orbitDuration}ms linear infinite`;
}

// ─── RENDER FIXTURES (CHANGE 2 — season-scoped, correct filter) ───
function renderFixtures(){
  const card=document.getElementById('contentCard');
  const subTabsHtml=`<div class="sub-tabs-row"><button class="sub-tab-btn ${activeFixtureSubTab==='group-stage'?'active':''}" data-subtab="group-stage">Group Stage</button><button class="sub-tab-btn ${activeFixtureSubTab==='knockout'?'active':''}" data-subtab="knockout">Knockout</button></div>`;
  if(activeFixtureSubTab==='knockout'){card.innerHTML=subTabsHtml+`<div class="coming-soon"><div class="cs-icon">🏆</div><h2>Knockout Round Coming Soon</h2><p>The knockout stage fixtures will be available shortly.</p></div>`;card.querySelectorAll('.sub-tab-btn').forEach(btn=>btn.addEventListener('click',()=>{activeFixtureSubTab=btn.dataset.subtab;renderFixtures();}));return;}

  // CHANGE 2: Build fixtures with correct season-scoped filter and tournament name filter
  const allFixtures = [];
  const today = new Date(); today.setHours(0,0,0,0);
  for (const [dateStr, eventData] of Object.entries(calendarEventsData)) {
    // Only include dates where season matches currentSeasonId
    if (eventData.season !== currentSeasonId) continue;
    const tournaments = eventData.tournaments || [];
    for (const tourn of tournaments) {
      // Only include tournaments whose name contains 'uefa euro' (case-insensitive)
      if (!tourn.name || !tourn.name.toLowerCase().includes('uefa euro')) continue;
      for (const fix of (tourn.fixtures || [])) {
        allFixtures.push({
          date: dateStr,
          tournament: tourn.name || 'UEFA EUROs',
          home: fix.home || '',
          away: fix.away || '',
          season: eventData.season // store season for filtering in applyFixtureFilters
        });
      }
    }
  }

  allFixtures.sort((a,b)=>{
    const da=new Date(a.date), db2=new Date(b.date);
    const af=da>=today, bf=db2>=today;
    if(af && bf) return da - db2;
    if(!af && !bf) return da - db2;
    return af ? -1 : 1;
  });
  const allTeams=[...new Set(allFixtures.map(f=>[f.home,f.away]).flat().filter(Boolean))].sort();

    <div class="scorer-section"><h4>Away Scorers</h4><div style="display:flex;gap:10px;margin-bottom:10px;"><input type="text" id="awayScorerName" placeholder="Player name" style="flex:2;"><input type="number" id="awayScorerGoals" placeholder="Goals" value="1" style="width:90px;"><button id="addAwayScorer" class="modal-btn-primary" style="padding:10px 20px;flex-shrink:0;">Add</button></div><div id="awayScorerList" class="scorer-list"></div></div>
    <div class="modal-btns"><button class="modal-btn-primary" id="saveResultBtn">Save</button><button class="modal-btn-cancel" id="cancelResultBtn">Cancel</button></div>`);
  renderScorerList('home');renderScorerList('away');
  document.getElementById('rGroup').addEventListener('change',e=>{const gid=e.target.value;const teams=gid&&groupsData[gid]?Object.values(groupsData[gid].teams||{}).map(t=>t.name).sort():[];const opts='<option value="">Select</option>'+teams.map(t=>`<option value="${t}">${t}</option>`).join('');document.getElementById('rHome').innerHTML=opts;document.getElementById('rAway').innerHTML=opts;editingResultGroupId=gid;});
  document.getElementById('addHomeScorer').onclick=()=>{const name=document.getElementById('homeScorerName').value.trim();const goals=parseInt(document.getElementById('homeScorerGoals').value)||1;if(!name)return;tempScorersHome.push({player:name,goals});renderScorerList('home');document.getElementById('homeScorerName').value='';document.getElementById('homeScorerGoals').value='1';};
  document.getElementById('addAwayScorer').onclick=()=>{const name=document.getElementById('awayScorerName').value.trim();const goals=parseInt(document.getElementById('awayScorerGoals').value)||1;if(!name)return;tempScorersAway.push({player:name,goals});renderScorerList('away');document.getElementById('awayScorerName').value='';document.getElementById('awayScorerGoals').value='1';};
  document.getElementById('cancelResultBtn').onclick=closeModal;
  document.getElementById('saveResultBtn').onclick=async()=>{
    const gid=document.getElementById('rGroup').value||editingResultGroupId;const home=document.getElementById('rHome').value;const away=document.getElementById('rAway').value;
    const hs=parseInt(document.getElementById('rHS').value)||0;const as2=parseInt(document.getElementById('rAS').value)||0;const forfeit=document.getElementById('rForfeit').value;const md=parseInt(document.getElementById('rMd').value)||0;
    if(!gid){alert('Select a group');return;}if(!home||!away){alert('Select both teams');return;}if(home===away){alert('Teams cannot be the same');return;}
    let matchText=`${home} ${hs} - ${as2} ${away}`;if(forfeit==='no_contest')matchText=`${home} F - F ${away} (No Contest)`;else if(forfeit==='forfeit')matchText+=` (Forfeit)`;
    const resultObj={matchText,homeTeam:home,awayTeam:away,homeScore:hs,awayScore:as2,forfeitType:forfeit,md,goalScorers:{home:tempScorersHome,away:tempScorersAway}};

function renderScorerList(side){const list=side==='home'?tempScorersHome:tempScorersAway;const container=document.getElementById(`${side}ScorerList`);if(!container)return;container.innerHTML=list.map((s,idx)=>`<div class="scorer-badge">${escapeHtml(s.player)} (${s.goals})<button class="remove-scorer" data-side="${side}" data-idx="${idx}">x</button></div>`).join('');container.querySelectorAll('.remove-scorer').forEach(btn=>{btn.onclick=()=>{const idx=parseInt(btn.dataset.idx);if(btn.dataset.side==='home')tempScorersHome.splice(idx,1);else tempScorersAway.splice(idx,1);renderScorerList(btn.dataset.side);};});}
async function updateGroupTeamStats(gid,homeTeam,awayTeam,hScore,aScore,forfeit){
  const ref=db.ref(sp(currentSeasonId,`groups/${gid}/teams`));const snap=await ref.once('value');const teams=snap.val()||{};let hKey=null,aKey=null,hData=null,aData=null;for(const [k,v] of Object.entries(teams)){if(v.name===homeTeam){hKey=k;hData={...v};}if(v.name===awayTeam){aKey=k;aData={...v};}}
  if(!hData)hData={name:homeTeam,p:0,w:0,d:0,l:0,gs:0,gc:0,gd:0,pts:0};if(!aData)aData={name:awayTeam,p:0,w:0,d:0,l:0,gs:0,gc:0,gd:0,pts:0};
  hData.p=(hData.p||0)+1;aData.p=(aData.p||0)+1;
  if(forfeit==='no_contest'){}else if(forfeit==='forfeit'){if(hScore>aScore){hData.pts+=3;hData.w++;aData.l++;aData.gd=(aData.gd||0)-3;aData.gc=(aData.gc||0)+3;}else if(aScore>hScore){aData.pts+=3;aData.w++;hData.l++;hData.gd=(hData.gd||0)-3;hData.gc=(hData.gc||0)+3;}}
  else{hData.gs=(hData.gs||0)+hScore;hData.gc=(hData.gc||0)+aScore;aData.gs=(aData.gs||0)+aScore;aData.gc=(aData.gc||0)+hScore;hData.gd=hData.gs-hData.gc;aData.gd=aData.gs-aData.gc;if(hScore>aScore){hData.pts+=3;hData.w++;aData.l++;}else if(aScore>hScore){aData.pts+=3;aData.w++;hData.l++;}else{hData.pts+=1;aData.pts+=1;hData.d++;aData.d++;}}
  if(!hKey)hKey=ref.push().key;if(!aKey)aKey=ref.push().key;await db.ref(sp(currentSeasonId,`groups/${gid}/teams/${hKey}`)).set(hData);await db.ref(sp(currentSeasonId,`groups/${gid}/teams/${aKey}`)).set(aData);
}

// ─── CHANGE 4 — SAST Helpers ───
function getSASTDate() {
  const now = new Date();
  const sast = new Date(now.getTime() + (2 * 60 * 60 * 1000));
  return sast.toISOString().split('T')[0];
}
function getSASTYesterday() {
  const now = new Date();
  const sast = new Date(now.getTime() + (2 * 60 * 60 * 1000));
  sast.setDate(sast.getDate() - 1);
  return sast.toISOString().split('T')[0];
}
function getSASTToday() {
  return getSASTDate();
}

// ─── CHANGE 5 — Manager Keys System ───
async function loadManagerKeys() {
  const snap = await db.ref('managerKeys').once('value');
  const data = snap.val() || {};
  managerKeysCache = {};
  for (const key in data) {
    const entry = data[key];
    if (entry && entry.key && entry.teamName) {
      managerKeysCache[key] = {
        id: key,
        key: entry.key,
        teamName: entry.teamName,
        createdAt: entry.createdAt || Date.now(),
        lastSubmissionTimestamp: entry.lastSubmissionTimestamp || 0
      };
    }
  }
  return managerKeysCache;
}
async function findManagerKeyId(keyValue) {
  await loadManagerKeys();
  const upper = keyValue.toUpperCase().trim();
  for (const id in managerKeysCache) {
    if (managerKeysCache[id].key === upper) return id;
  }
  return null;
}
async function canUserSubmitResult(managerKey) {
  const id = await findManagerKeyId(managerKey);
  if (!id) return { allowed: false, message: 'Invalid manager key.' };
  const entry = managerKeysCache[id];
  const last = entry.lastSubmissionTimestamp || 0;
  const hoursSince = (Date.now() - last) / (1000 * 60 * 60);
  if (hoursSince < 24) {
    const remaining = Math.ceil(24 - hoursSince);
    return { allowed: false, message: `Please wait ${remaining} hour(s) before submitting again.` };
  }
  return { allowed: true };
}
async function validateDailyMatchLimit(managerKey, proposedMatchday) {
  const todaySAST = getSASTDate();
  const snap = await db.ref(sp(currentSeasonId, 'pending_results')).once('value');
  const data = snap.val() || {};
  const submissions = [];
  for (const id in data) {
    const entry = data[id];
    if (entry.submittedBy === managerKey) {
      const subDate = new Date(new Date(entry.submittedAt).getTime() + (2*60*60*1000)).toISOString().split('T')[0];
      if (subDate === todaySAST) submissions.push(entry);
    }
  }
  if (submissions.length >= 2) return { allowed: false, message: 'You have already submitted 2 results today.' };
  for (const sub of submissions) {
    if (sub.md === proposedMatchday) return { allowed: false, message: `You already submitted a result for Matchday ${proposedMatchday} today.` };
  }
  return { allowed: true };
}
function formatResultText(homeTeam, homeScore, awayTeam, awayScore, forfeitType) {
  if (forfeitType === 'no_contest') return `${homeTeam} F - F ${awayTeam} (No Contest)`;
  if (forfeitType === 'forfeit_no_reply') return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited - No Reply)`;
  if (forfeitType === 'forfeit_agreement') return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited on Agreement)`;
  return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`;
}
let rememberedManagerKey = localStorage.getItem('rememberedManagerKey') || '';
let managerLinkedTeam = '';
function saveManagerKey(key, teamName) {
  rememberedManagerKey = key;
  managerLinkedTeam = teamName;
  localStorage.setItem('rememberedManagerKey', key);
  localStorage.setItem('rememberedManagerTeam', teamName);
}
function clearSavedManagerKey() {
  rememberedManagerKey = '';
  managerLinkedTeam = '';
  localStorage.removeItem('rememberedManagerKey');
  localStorage.removeItem('rememberedManagerTeam');
}
function openAddResultsKeyModal() {
  if (rememberedManagerKey) {
    findManagerKeyId(rememberedManagerKey).then(id => {
      if (id) {
        const entry = managerKeysCache[id];
        if (entry) {
          managerLinkedTeam = entry.teamName;
          canUserSubmitResult(rememberedManagerKey).then(result => {
            if (!result.allowed) {
              showModal(`<h3>⏳ Throttled</h3><p style="color:rgba(255,255,255,0.6);font-size:1.2rem;text-align:center;padding:20px 0;">${escapeHtml(result.message)}</p><div class="modal-btns"><button class="modal-btn-cancel" id="closeThrottleBtn" style="width:100%;">Close</button></div>`);
              document.getElementById('closeThrottleBtn').onclick = closeModal;
              return;
            }
            showModal(`<h3>👋 Welcome Back!</h3><p style="color:rgba(255,255,255,0.6);text-align:center;font-size:1.4rem;margin:20px 0;">Team: <strong style="color:white;">${escapeHtml(managerLinkedTeam)}</strong></p><div class="modal-btns"><button class="modal-btn-primary" id="welcomeConfirmBtn">Continue</button><button class="modal-btn-cancel" id="welcomeDifferentBtn">Use Different Key</button></div>`);
            document.getElementById('welcomeConfirmBtn').onclick = () => { closeModal(); openMatchTypeSelectionPopup(); };
            document.getElementById('welcomeDifferentBtn').onclick = () => { clearSavedManagerKey(); closeModal(); openAddResultsKeyModal(); };
          });
          return;
        }
      }
      clearSavedManagerKey();
      showKeyEntryModal();
    });
  } else {
    showKeyEntryModal();
  }
}
function showKeyEntryModal() {
  showModal(`<h3>🔑 Manager Key Entry</h3><p style="color:rgba(255,255,255,0.6);margin-bottom:20px;">Enter your manager key to submit match results.</p><label>Manager Key</label><input type="password" id="keyEntryInput" placeholder="Enter your key" style="font-size:1.4rem;letter-spacing:2px;"><div id="keyEntryStatus"></div><div class="modal-btns"><button class="modal-btn-primary" id="keyEntryVerifyBtn">Verify Key</button><button class="modal-btn-cancel" id="keyEntryCancelBtn">Cancel</button></div>`);
  document.getElementById('keyEntryCancelBtn').onclick = closeModal;
  document.getElementById('keyEntryVerifyBtn').onclick = async function() {
    const key = document.getElementById('keyEntryInput').value.trim();
    const statusEl = document.getElementById('keyEntryStatus');
    if (!key) { statusEl.innerHTML = '<div class="status-msg status-error">Enter your key.</div>'; return; }
    statusEl.innerHTML = '<div class="status-msg status-loading">Verifying…</div>';
    try {
      await loadManagerKeys();
      const id = await findManagerKeyId(key);
      if (!id) { statusEl.innerHTML = '<div class="status-msg status-error">Invalid key.</div>'; return; }
      const entry = managerKeysCache[id];
      const canSubmit = await canUserSubmitResult(key);
      if (!canSubmit.allowed) { statusEl.innerHTML = `<div class="status-msg status-error">${escapeHtml(canSubmit.message)}</div>`; return; }
      saveManagerKey(key, entry.teamName);
      closeModal();
      openMatchTypeSelectionPopup();
    } catch (err) {
      statusEl.innerHTML = `<div class="status-msg status-error">❌ Error: ${escapeHtml(err.message)}</div>`;
    }
  };
}

function openTodayYesterdayPopup(mode) {

  showModal(`<h3>👁️ Preview Result</h3> <div style="background:rgba(255,255,255,0.04);border-radius:16px;padding:20px;margin-bottom:16px;"> <div style="font-size:1.4rem;color:white;text-align:center;margin-bottom:12px;"><strong>${escapeHtml(entry.homeTeam||'')}</strong> ${entry.forfeitType==='no_contest'?'F — F':`${entry.homeScore||0} — ${entry.awayScore||0}`} <strong>${escapeHtml(entry.awayTeam||'')}</strong></div> <div style="color:rgba(255,255,255,0.5);font-size:1rem;text-align:center;">MD ${entry.md||'?'} · ${escapeHtml(entry.date||'')} · Submitted: ${submittedAt}</div> ${hScorers ? `<div style="margin-top:8px;color:rgba(255,255,255,0.7);">Home: ${hScorers}</div>` : ''} ${aScorers ? `<div style="color:rgba(255,255,255,0.7);">Away: ${aScorers}</div>` : ''} ${hAssists ? `<div style="color:rgba(255,255,255,0.7);">Home Assists: ${hAssists}</div>` : ''} ${aAssists ? `<div style="color:rgba(255,255,255,0.7);">Away Assists: ${aAssists}</div>` : ''} </div> ${imgsHtml ? `<div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;">${imgsHtml}</div>` : '<p style="color:rgba(255,255,255,0.3);">No images</p>'} <div id="previewActionStatus"></div> <div class="modal-btns"> <button class="modal-btn-primary" id="previewApproveBtn">✅ Approve</button> <button class="modal-btn-cancel" id="previewRejectBtn">🗑️ Reject</button> <button class="modal-btn-cancel" id="previewCloseBtn" style="flex:0.5;">Close</button> </div>`);
  document.getElementById('previewCloseBtn').onclick = closeModal;
  document.getElementById('previewApproveBtn').onclick = async () => {
    if (!confirm('Approve?')) return;

  };
  document.getElementById('previewRejectBtn').onclick = async () => {

}
async function approvePendingResult(id, entry) {
  const forfeitType = entry.forfeitType || 'none';
  const homeScore = entry.homeScore || 0;
  const awayScore = entry.awayScore || 0;
  const resultObj = {
    matchText: entry.matchText || formatResultText(entry.homeTeam, homeScore, entry.awayTeam, awayScore, forfeitType),
    homeTeam: entry.homeTeam,
    awayTeam: entry.awayTeam,
    homeScore,
    awayScore,
    forfeitType,
    md: entry.md || 0,
    date: entry.date || '',
    venue: entry.venue || '',
    goalScorers: entry.goalScorers || { home: [], away: [] },
    userAssists: entry.userAssists || { home: [], away: [] },
    _approved: true,
    _approvedAt: Date.now()
  };
  // Only update group table stats if both teams are in the same group (regular group stage match)
  let groupFound = false;
  for (const gid in groupsData) {
    const teams = groupsData[gid]?.teams || {};
    let hasHome = false, hasAway = false;
    for (const k in teams) {
      if (teams[k]?.name === entry.homeTeam) hasHome = true;
      if (teams[k]?.name === entry.awayTeam) hasAway = true;
    }
    if (hasHome && hasAway) {
      await db.ref(sp(currentSeasonId, `groups/${gid}/results`)).push(resultObj);
      // CHANGE 14 — Only update stats for group stage matches (not knockout)
      if (forfeitType !== 'no_contest') {
        await updateGroupTeamStats(gid, entry.homeTeam, entry.awayTeam, homeScore, awayScore, forfeitType);
      }
      groupFound = true;
      break;
    }
  }
  // If no group found, push to knockout_results (no table update)
  if (!groupFound) {
    await db.ref(sp(currentSeasonId, 'knockout_results')).push(resultObj);
  }
  await db.ref(sp(currentSeasonId, `pending_results/${id}`)).remove();
  await loadCurrentSeasonData();
}

    document.querySelectorAll('.mk-del-btn').forEach(btn => {
