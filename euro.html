<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --euro-blue: #0033A0;
      --euro-gold: #FFD700;
      --euro-red: #E3000F;
      --euro-white: #FFFFFF;
      --euro-black: #1A1A2E;
      --glass-bg: rgba(255,255,255,0.05);
      --glass-border: rgba(255,215,0,0.25);
      --glass-blur: blur(12px);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--euro-black);
      min-height: 100vh;
      overflow-x: auto;
      min-width: 1200px;
      width: 1200px;
      margin: 0 auto;
      font-size: 20px;
      padding-bottom: 3rem;
      position: relative;
    }
    body.has-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: var(--bg-image);
      background-size: var(--bg-size, cover);
      background-position: var(--bg-pos, center);
      background-repeat: no-repeat;
      z-index: -2;
    }
    body.has-bg::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.75);
      z-index: -1;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* MULTI-COLOR STRIPE NAVBAR */
    .navbar {
      background: repeating-linear-gradient(
        90deg,
        #0033A0 0px, #0033A0 60px,
        #FFD700 60px, #FFD700 120px,
        #E3000F 120px, #E3000F 180px,
        #008C45 180px, #008C45 240px,
        #002D62 240px, #002D62 300px,
        #FFD700 300px, #FFD700 360px,
        #C8102E 360px, #C8102E 420px
      );
      border-bottom: 3px solid var(--euro-gold);
      padding: 0 2rem;
      height: 100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      animation: fadeInDown 0.5s ease both;
    }
    .navbar-logo { height: 74px; max-width: 260px; object-fit: contain; cursor: pointer; transition: transform 0.3s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .navbar-logo:hover { transform: scale(1.05); }
    .navbar-logo-placeholder {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: 4px;
      color: var(--euro-white); cursor: pointer; font-weight: bold;
      text-shadow: 2px 2px 0 var(--euro-blue);
      background: rgba(0,0,0,0.4);
      padding: 0 20px;
      border-radius: 40px;
    }
    .menu-btn {
      background: var(--euro-blue);
      border: 2px solid var(--euro-gold);
      width: 70px; height: 70px; border-radius: 20px;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 8px;
      cursor: pointer; transition: all 0.3s;
    }
    .menu-btn span { width: 32px; height: 4px; background: var(--euro-gold); border-radius: 4px; }
    .menu-btn:hover { background: var(--euro-red); transform: rotate(90deg); }

    /* SIDE MENU */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 199; display: none; backdrop-filter: blur(3px); }
    .overlay.active { display: block; }
    .side-menu {
      position: fixed; top: 0; right: -360px; width: 360px; height: 100%;
      background: rgba(26,26,46,0.98); backdrop-filter: blur(20px);
      border-left: 2px solid var(--euro-gold);
      z-index: 200; padding: 40px 28px;
      transition: right 0.35s cubic-bezier(.4,0,.2,1);
    }
    .side-menu.active { right: 0; }
    .close-menu { text-align: right; font-size: 2.8rem; cursor: pointer; color: var(--euro-white); margin-bottom: 40px; line-height: 1; transition: color 0.2s; }
    .close-menu:hover { color: var(--euro-gold); }
    .menu-item {
      padding: 20px 28px; margin: 12px 0;
      border: 1px solid rgba(255,215,0,0.3); border-radius: 20px;
      cursor: pointer; font-weight: 600; font-size: 1.5rem;
      color: var(--euro-white); transition: all 0.2s;
      font-family: 'Rajdhani', sans-serif;
    }
    .menu-item:hover { background: var(--euro-gold); color: var(--euro-black); border-color: var(--euro-white); transform: translateX(8px); }

    /* SLIDESHOW */
    .slideshow-wrapper { padding: 36px 36px 20px; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.7s ease 0.2s both; }
    .slideshow-frame {
      width: 100%; max-width: 1100px; border-radius: 32px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,51,160,0.4);
      border: 2px solid var(--euro-gold);
      background: #000; display: flex; justify-content: center; align-items: center;
    }
    .slideshow-img { width: 100%; height: auto; max-height: 520px; object-fit: contain; display: block; transition: opacity 0.5s ease; }
    .dots-container { margin-top: 20px; display: flex; gap: 12px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,215,0,0.3); cursor: pointer; transition: all 0.25s; }
    .dot.active { background: var(--euro-gold); transform: scale(1.4); box-shadow: 0 0 12px rgba(255,215,0,0.7); }

    /* SEASON BAR */
    .season-bar { display: flex; justify-content: center; margin: 24px 0 16px; }
    .season-controls {
      display: flex; align-items: center; gap: 20px;
      background: var(--euro-blue);
      border: 2px solid var(--euro-gold);
      padding: 12px 32px;
      border-radius: 80px;
    }
    .season-arrow {
      background: var(--euro-red);
      border: none;
      width: 56px; height: 56px;
      border-radius: 50%;
      font-size: 2rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      color: white;
    }
    .season-arrow:hover:not(:disabled) { background: #b0000a; transform: scale(1.1); }
    .season-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
    .season-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      color: var(--euro-gold);
      min-width: 180px;
      text-align: center;
      background: rgba(0,0,0,0.2);
      padding: 4px 16px;
      border-radius: 40px;
    }
    .season-admin-btns { display: flex; gap: 10px; margin-left: 10px; }
    .season-admin-btn {
      background: rgba(255,215,0,0.15);
      border: 1px solid var(--euro-gold);
      padding: 8px 20px; border-radius: 40px; font-weight: 600;
      cursor: pointer; color: var(--euro-white); font-size: 1.1rem;
      font-family: 'Rajdhani', sans-serif; transition: all 0.2s;
    }
    .season-admin-btn:hover { background: var(--euro-gold); color: var(--euro-black); }

    /* TABS */
    .tabs-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin: 28px 36px 0;
      background: linear-gradient(90deg, var(--euro-blue), var(--euro-red));
      border: 2px solid var(--euro-gold);
      border-radius: 80px;
      padding: 12px 20px;
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeInUp 0.5s ease 0.3s both;
    }
    .tabs-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .tab-btn {
      background: transparent;
      border: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 10px 28px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      border-radius: 60px;
      letter-spacing: 0.5px;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--euro-gold);
      color: var(--euro-blue);
    }
    .tab-btn:hover:not(.active) {
      color: var(--euro-white);
      background: rgba(255,255,255,0.2);
    }

    /* CONTENT CARD */
    .content-card {
      margin: 24px 36px 40px;
      background: var(--glass-bg); backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); border-radius: 32px;
      padding: 32px;
      min-height: 200px;
      animation: fadeInUp 0.5s ease 0.4s both;
    }

    /* LOADING */
    .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 24px; }
    .spinner { width: 60px; height: 60px; border: 5px solid rgba(255,215,0,0.2); border-top-color: var(--euro-gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

    /* GROUP TABLES */
    .table-scroll-wrap { overflow-x: auto; border-radius: 20px; }
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Rajdhani', sans-serif;
      min-width: 900px;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      color: var(--euro-white);
    }
    .stats-table thead th {
      background: rgba(0,51,160,0.5);
      color: var(--euro-gold);
      font-size: 1.3rem;
      font-weight: 800;
      padding: 16px 18px;
      border-bottom: 2px solid var(--euro-gold);
    }
    .stats-table th:first-child, .stats-table td:first-child { position: sticky; left: 0; background: var(--glass-bg); backdrop-filter: var(--glass-blur); width: 64px; }
    .stats-table th:nth-child(2), .stats-table td:nth-child(2) { position: sticky; left: 64px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); box-shadow: 4px 0 8px -2px rgba(0,0,0,0.45); }
    .stats-table tbody tr { border-bottom: 1px solid rgba(255,215,0,0.2); transition: background 0.2s; }
    .stats-table tbody tr:hover { background: rgba(0,51,160,0.2); }
    .stats-table td { padding: 14px 18px; font-size: 1.3rem; font-weight: 600; }
    .team-name-text { font-weight: 700; font-size: 2rem !important; }
    .team-cell-inner { display: flex; align-items: center; gap: 14px; }
    .team-icon-sm { width: 60px; height: 60px; object-fit: contain; background: transparent; border-radius: 0; }
    .form-circles { display: flex; gap: 6px; }
    .circle-result { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; }
    .cW { background: #22c55e; color: white; }
    .cL { background: #ef4444; color: white; }
    .cD { background: #6b7280; color: white; }
    .cBlank { background: rgba(255,255,255,0.2); }

    .table-actions {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px;
      background: rgba(0,51,160,0.3);
      border-radius: 20px 20px 0 0;
      border-bottom: 2px solid var(--euro-gold);
    }
    .add-btn { background: var(--euro-gold); color: var(--euro-black); border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .add-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,215,0,0.4); }
    .three-dot-btn { background: rgba(0,0,0,0.3); border: 1px solid var(--euro-gold); color: white; width: 52px; height: 52px; border-radius: 50%; cursor: pointer; font-size: 2rem; line-height: 1; transition: 0.2s; }
    .three-dot-btn:hover { background: rgba(255,215,0,0.3); }

    /* FIXTURES / RESULTS CARDS */
    .fixture-date-group, .match-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--glass-border);
      transition: transform 0.2s;
    }
    .fixture-card, .match-card { margin-bottom: 16px; }
    .fixture-match-row, .match-row { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .fixture-team-side, .team-side { text-align: center; flex: 1; min-width: 150px; }
    .fixture-team-name, .team-name-big { font-size: 2rem; font-weight: 700; }
    .fixture-vs, .match-center { font-size: 2rem; font-weight: bold; color: var(--euro-gold); }
    .score-display { font-family: 'Bebas Neue'; font-size: 3rem; background: rgba(0,0,0,0.3); padding: 8px 24px; border-radius: 60px; }
    .goal-scorer-item { background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; display: inline-block; margin: 2px; }
    .filters-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; padding: 16px; background: rgba(0,0,0,0.3); border-radius: 28px; align-items: center; }

    /* TOP 3 BLOCKS */
    .top3-container { display: flex; justify-content: center; gap: 0; margin-bottom: 40px; }
    .top3-block { flex: 1; background: rgba(0,51,160,0.3); text-align: center; border: 1px solid var(--euro-gold); transition: transform 0.2s; }
    .top3-block:first-child { border-top-left-radius: 32px; border-bottom-left-radius: 32px; }
    .top3-block:last-child { border-top-right-radius: 32px; border-bottom-right-radius: 32px; }
    .top3-block:hover { transform: translateY(-8px); z-index: 5; }
    .player-image-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background: var(--euro-black); }
    .player-img { width: 100%; height: 100%; object-fit: cover; }
    .medal-badge { position: absolute; top: 12px; left: 12px; font-size: 3rem; filter: drop-shadow(0 2px 4px black); }
    .player-name-overlay { position: absolute; bottom: 16px; left: 16px; background: linear-gradient(90deg,rgba(0,0,0,0.7),rgba(0,0,0,0.3)); color: white; padding: 6px 16px; border-radius: 40px; font-weight: bold; border-left: 3px solid var(--euro-gold); }
    .team-icon-overlay { position: absolute; bottom: 12px; right: 12px; width: 56px; height: 56px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .team-icon-overlay img { width: 70%; height: 70%; object-fit: contain; }
    .top3-count { font-family: 'Bebas Neue'; font-size: 2rem; background: var(--euro-gold); color: var(--euro-black); display: inline-block; padding: 8px 24px; border-radius: 40px; margin: 16px 0; }

    .stats-list { width: 100%; border-collapse: collapse; background: var(--glass-bg); backdrop-filter: var(--glass-blur); }
    .stats-list th, .stats-list td { padding: 16px; text-align: left; border-bottom: 1px solid rgba(255,215,0,0.2); }
    .stats-list th { color: var(--euro-gold); background: rgba(0,51,160,0.5); }
    .count-badge { background: var(--euro-gold); color: var(--euro-black); padding: 4px 16px; border-radius: 40px; font-weight: bold; }

    /* LEGEND */
    .legend-row {
      margin-top: 16px; padding: 12px 16px;
      background: rgba(0,0,0,0.3); border-radius: 20px;
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
    }
    .legend-item { display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; color: white; }
    .vbar { width: 6px; height: 24px; border-radius: 3px; display: inline-block; }
    .vbar-blue { background: #3b82f6; }
    .vbar-red  { background: #ef4444; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(6px);
      display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: var(--euro-black); border: 2px solid var(--euro-gold); border-radius: 40px;
      padding: 32px; max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto;
    }
    .modal-card h3 { font-family: 'Bebas Neue'; font-size: 2rem; color: var(--euro-gold); margin-bottom: 24px; }
    .form-row { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.8rem; color: var(--euro-gold); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid var(--euro-gold); border-radius: 28px; color: white; font-family: inherit; font-size: 0.9rem; }
    .modal-btns { display: flex; gap: 16px; margin-top: 24px; }
    .modal-btn-primary { background: var(--euro-gold); color: var(--euro-black); border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .modal-btn-cancel { background: transparent; border: 1px solid var(--euro-gold); color: white; padding: 12px 24px; border-radius: 40px; cursor: pointer; }
    .settings-grid { display: flex; flex-direction: column; gap: 12px; }
    .settings-btn { background: rgba(255,215,0,0.1); border: 1px solid var(--euro-gold); padding: 16px; border-radius: 28px; cursor: pointer; font-weight: bold; color: white; text-align: left; transition: 0.2s; }
    .settings-btn:hover { background: rgba(255,215,0,0.3); transform: translateX(4px); }

    .scorer-section { border-top: 1px solid rgba(255,255,255,0.15); margin-top: 18px; padding-top: 18px; }
    .scorer-section h4 { color: var(--euro-gold); font-size: 1.2rem; margin-bottom: 12px; }
    .scorer-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
    .scorer-badge { background: rgba(0,51,160,0.5); border: 1px solid var(--euro-gold); border-radius: 32px; padding: 5px 12px; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px; color: white; }
    .remove-scorer { background: #ef4444; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; }

    .team-icon-lg { width: 80px; height: 80px; object-fit: contain; }
    .popup-menu { position: absolute; background: var(--euro-black); border: 1px solid var(--euro-gold); border-radius: 20px; padding: 8px 0; z-index: 150; box-shadow: 0 8px 32px rgba(0,0,0,0.4); min-width: 200px; }
    .popup-menu div { padding: 12px 20px; cursor: pointer; color: white; transition: 0.2s; font-weight: 500; }
    .popup-menu div:hover { background: rgba(255,215,0,0.2); transform: translateX(4px); }
    .img-preview-grid { display: flex; flex-wrap: wrap; gap: 16px; margin: 16px 0; justify-content: center; }
    .preview-thumb { position: relative; width: 120px; height: 120px; border-radius: 12px; overflow: hidden; border: 1px solid var(--euro-gold); }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-del { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

    footer { text-align: center; padding: 36px; color: rgba(255,255,255,0.3); border-top: 1px solid var(--euro-gold); margin-top: 24px; }
    .crop-container { position: relative; width: 100%; height: 400px; overflow: hidden; background: #111; border-radius: 20px; margin: 20px 0; cursor: grab; }
    .crop-img { position: absolute; transform-origin: 0 0; user-select: none; pointer-events: none; max-width: none; }
    .crop-controls { margin: 15px 0; }
    .crop-slider { width: 100%; }
  </style>
</head>
<body>

<div class="navbar">
  <div id="logoContainer"></div>
  <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
</div>

<div class="overlay" id="overlay"></div>
<div class="side-menu" id="sideMenu">
  <div class="close-menu" id="closeMenuBtn">&#x2715;</div>
  <div class="menu-item" id="homeBtn">🏠 Home</div>
  <div class="menu-item" id="adminModeBtn">🔐 Admin Mode</div>
</div>

<div class="slideshow-wrapper">
  <div class="slideshow-frame">
    <img id="slideshowImg" class="slideshow-img" src="" alt="Slideshow" style="display:none;">
  </div>
  <div class="dots-container" id="dotsContainer"></div>
</div>

<div class="season-bar">
  <div class="season-controls">
    <button class="season-arrow" id="prevSeasonBtn">&#8249;</button>
    <div class="season-number" id="seasonNumber">EURO 2024</div>
    <button class="season-arrow" id="nextSeasonBtn">&#8250;</button>
    <div id="seasonAdminPanel" style="display:none;" class="season-admin-btns">
      <button class="season-admin-btn" id="addSeasonBtn">+ New</button>
      <button class="season-admin-btn" id="setActiveSeasonBtn">Set Active</button>
    </div>
  </div>
</div>

<div class="tabs-container">
  <div class="tabs-row">
    <button class="tab-btn active" data-tab="groups">GROUP STAGES</button>
    <button class="tab-btn" data-tab="fixtures">FIXTURES</button>
    <button class="tab-btn" data-tab="results">RESULTS</button>
    <button class="tab-btn" data-tab="topscorers">TOP SCORERS</button>
    <button class="tab-btn" data-tab="topassists">TOP ASSISTANTS</button>
    <button class="tab-btn" data-tab="watch">WATCH MATCH</button>
  </div>
</div>

<div class="content-card" id="contentCard">
  <div class="loading-spinner"><div class="spinner"></div><span>Loading UEFA EURO 2025...</span></div>
</div>

// ─── LAST 5 CALCULATION ───
async function computeLast5ForTeam(groupId, teamName) {
  const snap = await db.ref(seasonPath('results')).once('value');
  const results = snap.val() || {};
  const matches = [];
  for(let key in results) {
    const r = results[key];
    if((r.homeTeam === teamName || r.awayTeam === teamName) && r.forfeitType !== 'no_contest') {
      let win=false, lose=false, draw=false;
      if(r.forfeitType === 'forfeit') {
        const homeWin = r.homeScore > r.awayScore;
        if((r.homeTeam === teamName && homeWin) || (r.awayTeam === teamName && !homeWin)) win=true;
        else lose=true;
      } else {
        const hs = r.homeScore||0, as = r.awayScore||0;
        if(r.homeTeam === teamName) { if(hs>as) win=true; else if(hs<as) lose=true; else draw=true; }
        else { if(as>hs) win=true; else if(as<hs) lose=true; else draw=true; }
      }
      matches.push({ md: r.md || 0, result: win ? 'W' : (draw ? 'D' : 'L') });
    }
  }
  matches.sort((a,b)=>b.md - a.md);
  const last5 = matches.slice(0,5).map(m=>m.result);
  while(last5.length < 5) last5.unshift(null);
  return last5;
}
async function updateAllLast5() {
  for(let gid in groupsData) {
    const teams = groupsData[gid].teams || {};
    for(let tid in teams) {
      const team = teams[tid];
      const last5 = await computeLast5ForTeam(gid, team.name);
      await db.ref(seasonPath(`groups/${gid}/teams/${tid}/last5`)).set(last5);
    }
  }
}

        <td>${t.gs||0}</td><td>${t.gc||0}</td><td>${(t.gd||0)>0?'+'+t.gd:t.gd||0}</td>

  }
  document.getElementById('contentCard').innerHTML = html;

  attachThreeDotHandler();

function attachThreeDotHandler() {
  const btn = document.getElementById('threeDotBtn');
  if(!btn) return;
  btn.onclick = (e) => {
    e.stopPropagation();
    if(popupEl) { popupEl.remove(); popupEl = null; return; }
    const rect = btn.getBoundingClientRect();
    popupEl = document.createElement('div'); popupEl.className = 'popup-menu';
    popupEl.style.position = 'absolute';
    popupEl.style.top = (rect.bottom + window.scrollY + 6) + 'px';
    popupEl.style.left = (rect.left + window.scrollX - 80) + 'px';
    const opts = [
      { label: showFormArrows ? 'Hide Form Arrows' : 'Show Form Arrows', fn: () => { showFormArrows = !showFormArrows; renderGroups(); } },
      { label: showLast5 ? 'Hide Last 5' : 'Show Last 5', fn: () => { showLast5 = !showLast5; renderGroups(); } }
    ];
    opts.forEach(o => {
      const d = document.createElement('div'); d.textContent = o.label;
      d.onclick = () => { if(popupEl) popupEl.remove(); popupEl=null; o.fn(); };
      popupEl.appendChild(d);
    });
    document.body.appendChild(popupEl);
  };
  document.addEventListener('click', e => { if(popupEl && !popupEl.contains(e.target) && e.target !== btn) { popupEl.remove(); popupEl=null; } });
}

    const ev = calendarEvents[d];

    (ev.tournaments||[]).forEach(t=>{
      (t.fixtures||[]).forEach(f=>{ fixtures.push({date:d, tournament:t.name, home:f.home, away:f.away}); });
    });
  }
  fixtures.sort((a,b)=>new Date(a.date)-new Date(b.date));
  let html = `<div class="filters-bar"><input type="text" id="fixFilter" placeholder="Filter team..." class="form-input" style="width:200px;"><button class="add-btn" id="clearFix">Clear</button></div>`;
  if(!fixtures.length) html += '<div class="empty-state">No fixtures scheduled</div>';
  else {
    let lastDate='';
    fixtures.forEach(f=>{
      if(f.date!==lastDate) { if(lastDate) html+=`</div>`; html+=`<div class="fixture-date-group"><div class="fixture-date-label">📅 ${f.date}</div>`; lastDate=f.date; }

    });
    html+=`</div>`;
  }
  document.getElementById('contentCard').innerHTML = html;
  document.getElementById('fixFilter')?.addEventListener('input', function() { const v=this.value.toLowerCase(); document.querySelectorAll('.fixture-card').forEach(c=>{ c.style.display=c.innerText.toLowerCase().includes(v)?'block':'none'; }); });

}

// ─── RESULTS (with goal scorers, auto update group stats) ───
async function renderResults() {
  const snap = await db.ref(seasonPath('results')).once('value');
  const results = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : [];
  results.sort((a,b)=>(b.md||0)-(a.md||0));
  const allMds = [...new Set(results.map(r=>r.md))].filter(m=>m!=null).sort((a,b)=>a-b);
  const allTeams = [...new Set(results.map(r=>[r.homeTeam,r.awayTeam]).flat().filter(Boolean))].sort();
  let html = `<div class="filters-bar"><select id="mdFilter" class="form-select" style="width:150px;"><option value="all">All MD</option>${allMds.map(m=>`<option value="${m}">MD ${m}</option>`).join('')}</select><select id="teamFilter" class="form-select" style="width:150px;"><option value="all">All Teams</option>${allTeams.map(t=>`<option value="${t}">${t}</option>`).join('')}</select><button class="add-btn" id="clearResults">Clear</button>${isAdmin?'<button class="add-btn" id="addResultBtn">+ Add Result</button>':''}</div>`;
  if(!results.length) html += '<div class="empty-state">No results yet</div>';
  else {
    let filtered = results;
    if(currentMdFilter && currentMdFilter !== 'all') filtered = filtered.filter(r => r.md == currentMdFilter);
    if(currentTeamFilter && currentTeamFilter !== 'all') filtered = filtered.filter(r => r.homeTeam===currentTeamFilter || r.awayTeam===currentTeamFilter);
    filtered.forEach(r=>{
      const forfeit = r.forfeitType || 'none';
      let scoreHtml = '';
      if(forfeit === 'no_contest') scoreHtml = `<div class="forfeit-display">F — F</div><div class="aggregate-text">No Contest</div>`;
      else if(forfeit === 'forfeit') scoreHtml = `<div class="score-display">${r.homeScore||0} — ${r.awayScore||0}</div><div class="aggregate-text">Forfeit</div>`;
      else scoreHtml = `<div class="score-display">${r.homeScore||0} — ${r.awayScore||0}</div>`;
      const homeScorers = (r.goalScorers?.home||[]).map(s=>`<span class="goal-scorer-item">⚽ ${s.player} (${s.goals})</span>`).join('');
      const awayScorers = (r.goalScorers?.away||[]).map(s=>`<span class="goal-scorer-item">⚽ ${s.player} (${s.goals})</span>`).join('');
      html += `<div class="match-card" data-md="${r.md||0}"><div class="match-row"><div class="team-side">${getTeamIconHtml(r.homeTeam,'team-icon-lg')}<span class="team-name-big">${escapeHtml(r.homeTeam)}</span><div class="goal-scorers">${homeScorers}</div></div>
        <div class="match-center">${scoreHtml}</div><div class="team-side">${getTeamIconHtml(r.awayTeam,'team-icon-lg')}<span class="team-name-big">${escapeHtml(r.awayTeam)}</span><div class="goal-scorers">${awayScorers}</div></div></div>
        <div class="match-meta">Matchday ${r.md||'?'}</div>${isAdmin?`<div class="admin-row"><button class="add-btn" onclick="editResult('${r.key}')">Edit</button></div>`:''}</div>`;
    });
  }
  document.getElementById('contentCard').innerHTML = html;
  document.getElementById('mdFilter')?.addEventListener('change', e => { currentMdFilter = e.target.value; renderResults(); });
  document.getElementById('teamFilter')?.addEventListener('change', e => { currentTeamFilter = e.target.value; renderResults(); });
  document.getElementById('clearResults')?.addEventListener('click', () => { currentMdFilter = ''; currentTeamFilter = ''; renderResults(); });
  if(isAdmin) document.getElementById('addResultBtn')?.addEventListener('click',()=>openResultForm(null));
}

  const groupsList = Object.entries(groupsData).map(([id,g])=>`<option value="${id}" ${res?.groupId===id?'selected':''}>${escapeHtml(g.name)}</option>`).join('');
  showModal(`<h3>${res?'Edit':'Add'} Result</h3><div class="form-row"><label>Group</label><select id="resGroup" class="form-select">${groupsList}</select></div>

    <div class="modal-btns"><button class="modal-btn-primary" id="saveResultBtn">Save</button><button class="modal-btn-cancel" id="cancelResBtn">Cancel</button></div>`);

  document.getElementById('resGroup').addEventListener('change', updateTeamSelects);
  updateTeamSelects();
  document.getElementById('addHomeScorerBtn').onclick = () => { const name = document.getElementById('homeScorerName').value.trim(); const goals = parseInt(document.getElementById('homeScorerGoals').value)||1; if(name){ tempScorersHome.push({player:name,goals}); renderScorerList('home'); document.getElementById('homeScorerName').value=''; document.getElementById('homeScorerGoals').value='1'; } };
  document.getElementById('addAwayScorerBtn').onclick = () => { const name = document.getElementById('awayScorerName').value.trim(); const goals = parseInt(document.getElementById('awayScorerGoals').value)||1; if(name){ tempScorersAway.push({player:name,goals}); renderScorerList('away'); document.getElementById('awayScorerName').value=''; document.getElementById('awayScorerGoals').value='1'; } };
  renderScorerList('home'); renderScorerList('away');
  document.getElementById('cancelResBtn').onclick = closeModal;
  document.getElementById('saveResultBtn').onclick = async () => {
    const gid = document.getElementById('resGroup').value;
    const home = document.getElementById('resHome').value;
    const away = document.getElementById('resAway').value;
    const hs = parseInt(document.getElementById('resHS').value)||0;
    const as = parseInt(document.getElementById('resAS').value)||0;
    const forfeit = document.getElementById('resForfeit').value;
    const md = parseInt(document.getElementById('resMd').value)||0;
    if(!home||!away) return;
    const matchText = forfeit==='no_contest' ? `${home} F - F ${away} (No Contest)` : `${home} ${hs} - ${as} ${away}${forfeit==='forfeit'?' (Forfeit)':''}`;
    const resultObj = { matchText, homeTeam:home, awayTeam:away, homeScore:hs, awayScore:as, forfeitType:forfeit, md, goalScorers:{home:tempScorersHome, away:tempScorersAway}, groupId:gid };
    if(editingResultKey) await db.ref(seasonPath(`results/${editingResultKey}`)).set(resultObj);
    else await db.ref(seasonPath('results')).push(resultObj);
    // Update group table
    const teamsRef = db.ref(seasonPath(`groups/${gid}/teams`));
    const teamsSnap = await teamsRef.once('value');
    const teams = teamsSnap.val()||{};
    let homeKey=null, awayKey=null;
    for(let k in teams) if(teams[k].name===home) homeKey=k;
    for(let k in teams) if(teams[k].name===away) awayKey=k;
    if(homeKey && awayKey && forfeit !== 'no_contest') {
      let h = {...teams[homeKey]}, a = {...teams[awayKey]};
      h.p = (h.p||0)+1; a.p = (a.p||0)+1;
      if(forfeit === 'forfeit') {
        if(hs>as) { h.pts=(h.pts||0)+3; h.w=(h.w||0)+1; a.l=(a.l||0)+1; }
        else { a.pts=(a.pts||0)+3; a.w=(a.w||0)+1; h.l=(h.l||0)+1; }
      } else {
        h.gs=(h.gs||0)+hs; h.gc=(h.gc||0)+as; a.gs=(a.gs||0)+as; a.gc=(a.gc||0)+hs;
        h.gd = h.gs - h.gc; a.gd = a.gs - a.gc;
        if(hs>as) { h.pts=(h.pts||0)+3; h.w=(h.w||0)+1; a.l=(a.l||0)+1; }
        else if(as>hs) { a.pts=(a.pts||0)+3; a.w=(a.w||0)+1; h.l=(h.l||0)+1; }
        else { h.pts=(h.pts||0)+1; a.pts=(a.pts||0)+1; h.d=(h.d||0)+1; a.d=(a.d||0)+1; }
      }
      await teamsRef.child(homeKey).set(h);
      await teamsRef.child(awayKey).set(a);
      await updateAllLast5();
    }
    closeModal();
    await loadData();
    renderResults();
  };
}
function editResult(key) { (async () => { const snap = await db.ref(seasonPath(`results/${key}`)).once('value'); openResultForm({key, ...snap.val()}); })(); }

// ─── TOP SCORERS & ASSISTS ───
function renderTopScorers() { renderTopList(topScorers, 'scorer', 'Goals'); }
function renderTopAssists() { renderTopList(topAssists, 'assist', 'Assists'); }
function renderTopList(list, type, label) {
  const sorted = [...list].sort((a,b)=>(b.count||0)-(a.count||0));
  const top3 = sorted.slice(0,3), rest = sorted.slice(3);
  let html = `<div class="top3-container">${top3.map((p,i)=>`<div class="top3-block"><div class="player-image-wrapper"><div class="medal-badge">${i===0?'🥇':i===1?'🥈':'🥉'}</div><img class="player-img" src="${p.imageUrl||'https://via.placeholder.com/300x300?text=No+Image'}"><div class="player-name-overlay">${escapeHtml(p.name)}</div><div class="team-icon-overlay">${getTeamIconHtml(p.team,'')}</div></div><div class="top3-count">${p.count||0} ${label}</div>${isAdmin?`<button class="add-btn" onclick="editStat('${type}','${p.key}')">Edit</button>`:''}</div>`).join('')}</div>`;
  if(rest.length) {
    html += `<div class="table-scroll-wrap"><table class="stats-list"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>${label}</th>${isAdmin?'<th></th>':''}</tr></thead><tbody>`;
    rest.forEach((p,i)=> { html += `<tr><td>${i+4}</td><td>${escapeHtml(p.name)}</td><td><div class="team-cell-inner">${getTeamIconHtml(p.team)} ${escapeHtml(p.team)}</div></td><td><span class="count-badge">${p.count||0}</span></td>${isAdmin?`<td><button class="add-btn" onclick="editStat('${type}','${p.key}')">✏️</button></td>`:''}</tr>`; });
    html += `</tbody>}</div>`;
  }
  if(isAdmin) html += `<button class="add-btn" id="addStatBtn" style="margin-top:20px;">+ Add ${type==='scorer'?'Scorer':'Assistant'}</button>`;
  document.getElementById('contentCard').innerHTML = html;
  if(isAdmin) document.getElementById('addStatBtn')?.addEventListener('click',()=>openStatModal(type));
}
function openStatModal(type, existing=null) {
  showModal(`<h3>${existing?'Edit':'Add'} ${type==='scorer'?'Top Scorer':'Top Assistant'}</h3>
    <div class="form-row"><label>Player Name</label><input id="statName" class="form-input" value="${existing?.name||''}"></div>
    <div class="form-row"><label>Team</label><input id="statTeam" class="form-input" value="${existing?.team||''}"></div>
    <div class="form-row"><label>${type==='scorer'?'Goals':'Assists'}</label><input id="statCount" type="number" class="form-input" value="${existing?.count||0}"></div>
    <div class="form-row"><label>Photo (upload auto remove.bg)</label><input type="file" id="statPhoto" accept="image/*"><div id="photoPreview" style="margin-top:8px;">${existing?.imageUrl?`<img src="${existing.imageUrl}" style="max-width:100px;border-radius:12px;">`:'No photo'}</div></div>
    <div class="modal-btns"><button class="modal-btn-primary" id="saveStatBtn">Save</button><button class="modal-btn-cancel" id="cancelStatBtn">Cancel</button></div>`);
  const fileInput = document.getElementById('statPhoto');
  const preview = document.getElementById('photoPreview');
  fileInput.onchange = async () => {
    const f = fileInput.files[0]; if(!f) return;
    preview.innerHTML = '<div class="status-msg status-loading">Removing background...</div>';
    try { let blob; try{ blob=await removeBackground(f); }catch(e){ blob=f; } const url=await uploadToImgBB(blob); preview.innerHTML = `<img src="${url}" style="max-width:100px;border-radius:12px;"><div class="status-msg status-success">Ready</div>`; fileInput.dataset.uploadedUrl=url; } catch(e){ preview.innerHTML = `<div class="status-msg status-error">Error</div>`; }
  };
  document.getElementById('saveStatBtn').onclick = async () => {
    let imageUrl = existing?.imageUrl || '';
    if(fileInput.files.length && fileInput.dataset.uploadedUrl) imageUrl = fileInput.dataset.uploadedUrl;
    const name = document.getElementById('statName').value.trim();
    const team = document.getElementById('statTeam').value.trim();
    const count = parseInt(document.getElementById('statCount').value)||0;
    if(!name||!team) return;
    const data = { name, team, count, imageUrl };
    const path = seasonPath(type==='scorer'?'topScorers':'topAssistants');
    if(existing?.key) await db.ref(`${path}/${existing.key}`).set(data);
    else await db.ref(path).push(data);
    closeModal(); await loadData(); if(type==='scorer') renderTopScorers(); else renderTopAssists();
  };
  document.getElementById('cancelStatBtn').onclick = closeModal;
}
function editStat(type,key) { const item = type==='scorer' ? topScorers.find(s=>s.key===key) : topAssists.find(a=>a.key===key); if(item) openStatModal(type,item); }

// ─── WATCH MATCH ───
function renderWatchMatch() {
  let html = watchMatchEmbed ? `<div class="video-wrapper" style="position:relative;padding-bottom:56.25%;height:0;"><iframe src="${watchMatchEmbed}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen></iframe></div>` : '<div class="empty-state">No match video available</div>';
  if(isAdmin) html += `<button class="add-btn" id="updateWatchBtn" style="margin-top:20px;">Update Video</button>`;
  document.getElementById('contentCard').innerHTML = html;
  if(isAdmin) document.getElementById('updateWatchBtn')?.addEventListener('click', async () => { let url=prompt('YouTube embed URL or code:', watchMatchEmbed); if(url){ let embed=url; if(url.includes('youtu.be/')||url.includes('watch?v=')){ let vid=(url.split('youtu.be/')[1]||url.split('v=')[1])?.split(/[?#]/)[0]; if(vid) embed=`https://www.youtube.com/embed/${vid}`; } await db.ref('euro/watchMatch/embedCode').set(embed); await loadData(); renderWatchMatch(); } });
}

// ─── ADMIN SETTINGS ───
function openAdminSettings() {
  showModal(`<h3>⚙️ Admin Settings</h3><div class="settings-grid">
    <button class="settings-btn" id="setLogoBtn">🖼️ Upload Navbar Logo</button>
    <button class="settings-btn" id="setBgBtn">🌄 Set Background Image</button>
    <button class="settings-btn" id="manageSlideBtn">🎞️ Manage Slideshow</button>
    <button class="settings-btn" id="addIconBtn">⚽ Add Team Icon (auto remove.bg)</button>
  </div><div class="modal-btns"><button class="modal-btn-cancel" id="closeAdminBtn">Close</button></div>`);
  document.getElementById('setLogoBtn').onclick = async () => { const f=await pickFile('image/*'); if(f){ const url=await uploadToImgBB(f); await db.ref('euro/navbar_logo').set(url); await loadData(); renderCurrentTab(); closeModal(); } };
  document.getElementById('setBgBtn').onclick = () => openBgCropTool();
  document.getElementById('manageSlideBtn').onclick = () => manageSlideshowUI();
  document.getElementById('addIconBtn').onclick = async () => { const team=prompt('Exact team name:'); if(!team) return; const f=await pickFile('image/*'); if(!f) return; try { let blob; try{ blob=await removeBackground(f); }catch(e){ blob=f; } const url=await uploadToImgBB(blob); await db.ref(`euro/teamIcons/${team}`).set(url); teamIcons[team]=url; closeModal(); showToast(`Icon for ${team} saved`); }catch(e){ showToast('Failed'); } };
  document.getElementById('closeAdminBtn').onclick = closeModal;
}
async function openBgCropTool() {
  const file = await pickFile('image/*'); if(!file) return;
  const objUrl = URL.createObjectURL(file);
  showModal(`<h3>Set Background Image</h3><div class="crop-container"><img class="crop-img" id="cropImg" src="${objUrl}" draggable="false"></div><div class="crop-controls"><label>Zoom</label><input class="crop-slider" id="zoomSlider" type="range" min="0.5" max="2" step="0.01" value="1"><label>Horizontal</label><input class="crop-slider" id="posXSlider" type="range" min="0" max="100" value="50"><label>Vertical</label><input class="crop-slider" id="posYSlider" type="range" min="0" max="100" value="50"></div><div class="modal-btns"><button class="modal-btn-primary" id="applyCropBtn">Apply</button><button class="modal-btn-cancel" id="cancelCropBtn">Cancel</button></div>`);
  const img = document.getElementById('cropImg');
  const zoom = document.getElementById('zoomSlider');
  const posX = document.getElementById('posXSlider');
  const posY = document.getElementById('posYSlider');
  let z=1, px=50, py=50;
  function update() { const scale=z; const tx=(px/100)*(1-1/scale)*100; const ty=(py/100)*(1-1/scale)*100; img.style.transform=`scale(${scale}) translate(${tx}%, ${ty}%)`; }
  zoom.oninput = () => { z=parseFloat(zoom.value); update(); };
  posX.oninput = () => { px=parseFloat(posX.value); update(); };
  posY.oninput = () => { py=parseFloat(posY.value); update(); };
  img.onload = update;
  document.getElementById('cancelCropBtn').onclick = () => { URL.revokeObjectURL(objUrl); closeModal(); };
  document.getElementById('applyCropBtn').onclick = async () => {
    const url = await uploadToImgBB(file);
    await db.ref('euro/settings/backgroundImage').set({ url, size:'cover', position:`${px}% ${py}%` });
    await loadData(); closeModal(); URL.revokeObjectURL(objUrl);
  };
}
async function manageSlideshowUI() {
  const refresh = () => {
    let preview = '<div class="img-preview-grid">';
    slideshowImages.forEach((url,idx)=>{ preview+=`<div class="preview-thumb"><img src="${url}"><span class="thumb-del" data-idx="${idx}">✕</span></div>`; });
    preview+='</div>';
    showModal(`<h3>Slideshow Manager</h3>${preview}<div class="form-row"><label>Add Image</label><input type="file" id="newSlideFile" accept="image/*"></div><div class="form-row"><label>Duration (seconds)</label><input id="slideDur" type="number" step="0.5" value="${slideshowDuration/1000}"></div><div class="modal-btns"><button class="modal-btn-primary" id="uploadSlideBtn">Upload</button><button class="modal-btn-primary" id="saveDurBtn">Save Duration</button><button class="modal-btn-cancel" id="closeSlideBtn">Close</button></div>`);
    document.querySelectorAll('.thumb-del').forEach(btn=>{ btn.onclick = async () => { const idx=parseInt(btn.dataset.idx); slideshowImages.splice(idx,1); await db.ref('euro/slideshow/images').set(slideshowImages); await loadData(); refresh(); }; });
    document.getElementById('uploadSlideBtn').onclick = async () => { const f=document.getElementById('newSlideFile').files[0]; if(f){ const url=await uploadToImgBB(f); slideshowImages.push(url); await db.ref('euro/slideshow/images').set(slideshowImages); await loadData(); refresh(); } };
    document.getElementById('saveDurBtn').onclick = async () => { const dur=parseFloat(document.getElementById('slideDur').value)*1000; await db.ref('euro/slideshow/duration').set(dur); slideshowDuration=dur; await loadData(); closeModal(); };
    document.getElementById('closeSlideBtn').onclick = closeModal;
  };
  refresh();
}

// ─── SEASONS ───
async function loadSeasons() { const snap=await db.ref('euro/seasons').once('value'); const s=snap.val()||{}; availableSeasons=Object.keys(s).map(k=>parseInt(k.split('_')[1])).filter(n=>!isNaN(n)); if(!availableSeasons.length){ await db.ref('euro/seasons/season_2024/groups').set({}); availableSeasons=[2024]; } currentSeasonId=availableSeasons[0]; document.getElementById('seasonNumber').innerText=`EURO ${currentSeasonId}`; }
async function switchSeason(delta) { let idx=availableSeasons.indexOf(currentSeasonId), n=idx+delta; if(n>=0 && n<availableSeasons.length){ currentSeasonId=availableSeasons[n]; document.getElementById('seasonNumber').innerText=`EURO ${currentSeasonId}`; await loadData(); renderCurrentTab(); } }
document.getElementById('prevSeasonBtn').onclick=()=>switchSeason(-1);
document.getElementById('nextSeasonBtn').onclick=()=>switchSeason(1);
document.getElementById('addSeasonBtn').onclick=async()=>{ const s=prompt('New season year (e.g. 2028)'); if(s){ await db.ref(`euro/seasons/season_${s}/groups`).set({}); availableSeasons.push(parseInt(s)); availableSeasons.sort(); await switchSeason(availableSeasons.indexOf(parseInt(s))-availableSeasons.indexOf(currentSeasonId)); } };
document.getElementById('setActiveSeasonBtn').onclick=async()=>{ alert(`Season ${currentSeasonId} set as active for external pages.`); };

// ─── ADMIN MODE ───
document.getElementById('adminModeBtn').onclick = () => { const key=prompt('Admin Key:'); if(key==='admin@100') { isAdmin=true; document.getElementById('seasonAdminPanel').style.display='flex'; document.getElementById('adminModeBtn').innerHTML='✅ Admin Mode'; if(!document.getElementById('adminSettingsItem')){ const item=document.createElement('div'); item.id='adminSettingsItem'; item.className='menu-item'; item.innerHTML='⚙️ Admin Settings'; item.onclick=()=>{ openAdminSettings(); closeMenu(); }; document.getElementById('sideMenu').appendChild(item); } renderCurrentTab(); } else alert('Wrong key'); };
document.getElementById('homeBtn').onclick = () => window.location.href = 'feed.html';
function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
function closeMenu() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
document.getElementById('menuBtn').onclick = toggleMenu;
document.getElementById('closeMenuBtn').onclick = closeMenu;
document.getElementById('overlay').onclick = closeMenu;
document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCurrentTab(); }); });
function renderCurrentTab() {
  const tab = document.querySelector('.tab-btn.active').dataset.tab;
  document.getElementById('contentCard').innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>Loading...</span></div>';
  if(tab === 'groups') renderGroups();
  else if(tab === 'fixtures') renderFixtures();
  else if(tab === 'results') renderResults();
  else if(tab === 'topscorers') renderTopScorers();
  else if(tab === 'topassists') renderTopAssists();
  else if(tab === 'watch') renderWatchMatch();
}
async function init() { await loadSeasons(); await loadData(); renderCurrentTab(); }
init();
</script>
