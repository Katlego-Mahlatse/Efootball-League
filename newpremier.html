<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Premier League · eFootball 412</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      color: #f5f0ff;
    }
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }
    .modal-content {
      position: absolute;
      top: 60px;
      right: 20px;
      background: linear-gradient(135deg, #f5d742, #e6c42c);
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      width: auto;
      min-width: 200px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      border: 1px solid #6a3bb5;
    }
    .modal-content h3 {
      font-size: 1.1rem;
      color: #4a1d8c;
      margin-bottom: 0.8rem;
    }
    .modal-option {
      background: rgba(106, 59, 181, 0.15);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #3c1a70;
      font-weight: 700;
      font-size: 0.8rem;
      display: block;
      margin: 0.5rem 0;
      border: 1px solid #6a3bb5;
      cursor: pointer;
    }
    .modal-option:hover {
      background: #6a3bb5;
      color: #f5d742;
    }
    .close-modal {
      background: #4a1d8c;
      color: #f5d742;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .card-header {
      padding: 1rem 1.5rem;
      background: rgba(30, 15, 55, 0.9);
      border-bottom: 2px solid #f5d742;
    }
    .stats-table, .inner-table {
      width: 100%;
      border-collapse: collapse;
    }
    .stats-table th, .inner-table th {
      text-align: left;
      padding: 0.8rem;
      background: rgba(55, 35, 95, 0.7);
      border-bottom: 1px solid #f5d742;
    }
    .stats-table td, .inner-table td {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid rgba(245, 215, 66, 0.2);
    }
    .team-icon-sm {
      width: 30px;
      height: 30px;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 8px;
    }
    .date-badge {
      background: rgba(0,0,0,0.4);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
    }
    .match-highlight {
      background: #3d2a6b;
      border-radius: 20px;
      padding: 0.2rem 0.8rem;
      display: inline-block;
      font-size: 0.8rem;
    }
    .filter-container {
      padding: 1rem;
      background: rgba(30,15,55,0.6);
      border-bottom: 1px solid rgba(245,215,66,0.3);
    }
    .filter-input {
      background: rgba(45,25,75,0.9);
      border: 1px solid #f5d742;
      border-radius: 30px;
      padding: 0.5rem 1rem;
      color: white;
      width: 200px;
    }
    @media (max-width: 780px) {
      .dashboard { padding: 1rem; }
      .stats-table th, .stats-table td { padding: 0.4rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <h3>TOURNAMENTS</h3>
    <div class="modal-option" id="rulesBtn">RULES</div>
    <div class="modal-option" id="playerTitlesBtn">PLAYER TITLES</div>
    <div class="modal-option" id="logoutBtn">LOGOUT</div>
    <button class="close-modal" id="closeModalBtn">CLOSE</button>
  </div>
</div>

<div class="dashboard">
  <!-- League Table -->
  <div class="card">
    <div class="card-header"><h2>🏆 PREMIER LEAGUE TABLE</h2></div>
    <div style="overflow-x:auto;">
      <table class="stats-table" id="leagueTable">
        <thead><tr><th>Pos</th><th>Club</th><th>P</th><th>GD</th><th>Pts</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Fixtures -->
  <div class="card">
    <div class="card-header"><h2>📅 FIXTURES</h2></div>
    <div class="filter-container"><input type="text" id="fixtureSearch" class="filter-input" placeholder="🔍 Search team..."></div>
    <div style="overflow-x:auto;">
      <table class="inner-table" id="fixturesTable">
        <thead><tr><th>Date</th><th>Home vs Away</th><th>Matchday</th></tr></thead>
        <tbody id="fixturesBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Results -->
  <div class="card">
    <div class="card-header"><h2>📝 RESULTS</h2></div>
    <div style="overflow-x:auto;">
      <table class="inner-table" id="resultsTable">
        <thead><tr><th>Match</th><th>Match Day</th></tr></thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getFirestore, collection, onSnapshot } from "firebase/firestore";
  import { getAuth, signOut } from "firebase/auth";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const teamIcons = {
    "Arsenal": "b688ae57-b21a-4ee9-ba6c-5027a09cc9c5.png",
    "AC Milan": "44e0f58a-e5db-445b-9896-db22ea99b936.png",
    "PSG": "4dea795d-a516-46ae-bd34-07a784693d80.png",
    "Barcelona": "IMG_20260421_085117.jpg",
    "Inter Milan": "IMG_20260421_092951.png",
    "Atletico": "IMG_20260421_093024.png",
    "Newcastle": "IMG_20260421_093046.png",
    "Napoli": "IMG_20260421_100318.jpg",
    "Chelsea": "IMG_20260421_100354.jpg",
    "Dortmund": "01cf2986-d9d6-4a33-830d-5d12de4e21b2.jpeg",
    "Real Madrid": "21259ea4-042f-48ff-902f-1e776d27fe58.jpeg",
    "Man City": "9e92a100-327b-48fc-96d4-e4c89f69d7ef.jpeg",
    "Liverpool": "269acb36-d189-45ea-860d-ea8f1cf05f05.jpeg",
    "Juventus": "IMG_20260421_151224.jpg"
  };
  const teamList = Object.keys(teamIcons);

  function getTeamIconHtml(team, size = "30px") {
    const src = teamIcons[team];
    if (src) return `<img class="team-icon-sm" src="${src}" style="width:${size}; height:${size}; object-fit:contain;">`;
    return team;
  }

  // Table – top-level collection "premier_league_standings"
  const standingsCol = collection(db, "premier_league_standings");
  onSnapshot(standingsCol, (snapshot) => {
    const teams = [];
    snapshot.forEach(doc => teams.push({ id: doc.id, ...doc.data() }));
    teams.sort((a,b) => b.pts - a.pts || b.gd - a.gd);
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    teams.forEach((team, idx) => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = idx+1;
      row.insertCell(1).innerHTML = `<div>${getTeamIconHtml(team.name)} ${team.name}</div>`;
      row.insertCell(2).innerText = team.p || 0;
      row.insertCell(3).innerText = team.gd || 0;
      row.insertCell(4).innerText = team.pts || 0;
    });
  });

  // Fixtures – top-level collection "premier_league_fixtures"
  const fixturesCol = collection(db, "premier_league_fixtures");
  let fixturesData = [];
  onSnapshot(fixturesCol, (snapshot) => {
    fixturesData = [];
    snapshot.forEach(doc => fixturesData.push({ id: doc.id, ...doc.data() }));
    renderFixtures();
  });
  function renderFixtures() {
    const search = document.getElementById('fixtureSearch')?.value.toLowerCase() || '';
    const tbody = document.getElementById('fixturesBody');
    tbody.innerHTML = '';
    fixturesData.forEach(f => {
      if (search && !f.home.toLowerCase().includes(search) && !f.away.toLowerCase().includes(search)) return;
      const row = tbody.insertRow();
      row.insertCell(0).innerHTML = `<span class="date-badge">${f.date || ''}</span>`;
      row.insertCell(1).innerHTML = `<div>${getTeamIconHtml(f.home)} ${f.home} vs ${getTeamIconHtml(f.away)} ${f.away}</div>`;
      row.insertCell(2).innerHTML = `<span style="background:#5e3a9e; padding:0.2rem 0.7rem; border-radius:30px;">MD ${f.md}</span>`;
    });
  }
  document.getElementById('fixtureSearch')?.addEventListener('input', renderFixtures);

  // Results – top-level collection "premier_league_results"
  const resultsCol = collection(db, "premier_league_results");
  onSnapshot(resultsCol, (snapshot) => {
    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';
    snapshot.forEach(doc => {
      const r = doc.data();
      let processed = r.matchText;
      teamList.forEach(team => {
        const regex = new RegExp(`\\b${team}\\b`, 'g');
        processed = processed.replace(regex, `${getTeamIconHtml(team, '24px')} ${team}`);
      });
      const row = tbody.insertRow();
      row.insertCell(0).innerHTML = `<strong>${processed}</strong>`;
      row.insertCell(1).innerHTML = `<span class="match-highlight">MD${r.md}</span>`;
    });
  });

  // Menu
  const hamburger = document.getElementById('hamburgerBtn');
  const modalOverlay = document.getElementById('modalOverlay');
  const closeModal = document.getElementById('closeModalBtn');
  hamburger.onclick = () => modalOverlay.classList.add('active');
  closeModal.onclick = () => modalOverlay.classList.remove('active');
  document.getElementById('rulesBtn').onclick = () => window.location.href = 'rules.html';
  document.getElementById('playerTitlesBtn').onclick = () => window.location.href = 'player-titles.html';
  document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = 'login.html'; };
</script>
</body>
</html>
