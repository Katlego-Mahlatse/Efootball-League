<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      padding: 0;
      color: #f5f0ff;
    }

    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover { transform: scale(1.05); background: #7e4acf; }
    .hamburger-btn span { display: block; width: 18px; height: 2.5px; background-color: #f5d742; border-radius: 2px; }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
    }
    .modal-overlay.active { visibility: visible; pointer-events: auto; }

    .modal-content {
      position: absolute;
      top: 60px; right: 20px;
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      min-width: 200px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      animation: fadeInDown 0.2s ease;
    }
    @keyframes fadeInDown {
      from { transform: translateY(-15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-content h3 { font-size: 1.1rem; color: #f5d742; margin-bottom: 0.8rem; font-weight: 800; border-bottom: 1px solid #f5d742; display: inline-block; padding-bottom: 0.2rem; }
    .modal-options { display: flex; flex-direction: column; gap: 0.6rem; margin: 0.8rem 0; }
    .modal-option {
      background: rgba(106,59,181,0.3);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #f5d742;
      font-weight: 700;
      font-size: 0.8rem;
      transition: all 0.2s;
      border: 1px solid #f5d742;
      display: block;
      cursor: pointer;
    }
    .modal-option:hover { background: #6a3bb5; transform: translateX(3px); }
    .close-modal { background: #6a3bb5; color: #f5d742; border: none; padding: 0.3rem 0.9rem; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 0.5rem; font-size: 0.7rem; }
    .close-modal:hover { background: #7e4acf; }

    .dashboard { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }

    .slideshow-container { position: relative; text-align: center; margin-bottom: 2.5rem; }
    .slideshow-img { max-width: 100%; height: auto; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .dots-container { text-align: center; margin-top: 0.8rem; position: absolute; bottom: 12px; left: 0; right: 0; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background-color: #f5d742; margin: 0 4px; cursor: pointer; }
    .dot.active { background-color: #6a3bb5; }

    .card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      overflow: hidden;

    }

    .card-header {
      padding: 1.2rem 1.8rem;

    .popup-menu {

    .filter-container {

    .scrollable-table::-webkit-scrollbar-track { background: rgba(30,15,55,0.5); border-radius: 10px; }
    .scrollable-table::-webkit-scrollbar-thumb { background: #f5d742; border-radius: 10px; }

    .stats-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }

      text-align: left;
      padding: 0.9rem 0.8rem 0.7rem 1.2rem;

    .stats-table td {
      padding: 0.75rem 0.8rem 0.75rem 1.2rem;

      color: #f0eaff;
      vertical-align: middle;
    }

    .inner-table { width: 100%; border-collapse: collapse; }
    .inner-table th {
      text-align: left;
      padding: 0.9rem 0.8rem 0.7rem 1.2rem;
      background: rgba(55, 35, 95, 0.5);
      border-bottom: 1px solid #f5d742;
      color: #f5e6ff;
    }

      padding: 0.9rem 0.8rem 0.9rem 1.2rem;

    .pos-with-bar { display: flex; align-items: center; gap: 6px; }
    .vertical-bar { width: 4px; height: 18px; border-radius: 2px; display: inline-block; }
    .blue-bar-vertical { background-color: #3b82f6; }
    .orange-bar-vertical { background-color: #f97316; }
    .green-bar-vertical { background-color: #22c55e; }

    .dashed-separator-gold { border-bottom: 2px dashed #d4af37 !important; }
    .dashed-separator-white { border-bottom: 2px dashed #ffffff !important; }
    .dashed-separator-red { border-bottom: 2px dashed #ef4444 !important; }

    .rank-cell { font-weight: 700; width: 60px; color: #f5d742; }
    .pts-cell { font-weight: 800; color: #f5d742; text-align: center; }

    .team-name { display: flex; align-items: center; gap: 12px; }
    .team-icon { width: 44px; height: 44px; object-fit: contain; background: transparent; }
    .team-icon-sm { width: 30px; height: 30px; object-fit: contain; vertical-align: middle; }
    .inline-team-icon { width: 36px; height: 36px; object-fit: contain; vertical-align: middle; margin: 0 4px; display: inline-block; }

    .fixture-icons { display: inline-flex; align-items: center; flex-wrap: nowrap; white-space: nowrap; gap: 4px; }

    .form-circles { display: flex; gap: 4px; align-items: center; }
    .circle-result { width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; }
    .circle-win { background-color: #22c55e; color: white; }
    .circle-loss { background-color: #ef4444; color: white; }
    .circle-draw { background-color: #6b7280; color: white; }
    .circle-forfeit-win { background-color: #22c55e; color: white; }
    .circle-forfeit-loss { background-color: #ef4444; color: white; }
    .circle-forfeit-grey { background-color: #6b7280; color: white; }
    .circle-blank { background-color: transparent; border: 1px solid #a0a0a0; color: transparent; }

    .arrow-up { color: #22c55e; font-size: 1.2rem; display: inline-block; width: 24px; text-align: center; }
    .arrow-down { color: #ef4444; font-size: 1.2rem; display: inline-block; width: 24px; text-align: center; }
    .arrow-side { color: #f5d742; font-size: 1.2rem; display: inline-block; width: 24px; text-align: center; }

    .legend-under-table {
      padding: 0.8rem 1.2rem;
      background: rgba(30, 15, 55, 0.5);
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      font-size: 0.7rem;
    }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; }
    .legend-vertical-bar { width: 4px; height: 16px; border-radius: 2px; display: inline-block; }
    .legend-blue { background-color: #3b82f6; }
    .legend-orange { background-color: #f97316; }
    .legend-green { background-color: #22c55e; }
    .legend-dashed-white { display: inline-block; width: 20px; height: 2px; border-bottom: 2px dashed #ffffff; vertical-align: middle; }
    .legend-text { color: #e6d5ff; }

    .match-highlight { background: #3d2a6b; border-radius: 20px; padding: 0.2rem 0.8rem; display: inline-block; font-size: 0.8rem; color: #f5d742; }
    .date-badge { font-size: 0.7rem; background: rgba(0,0,0,0.4); padding: 0.2rem 0.6rem; border-radius: 20px; }
    .result-with-forfeit { display: flex; flex-direction: column; align-items: flex-start; }
    .forfeit-text { font-size: 0.7rem; color: #f5d742; margin-top: 4px; }
    .empty-message { text-align: center; padding: 2rem; color: #c4b0ff; font-style: italic; }

    @media (max-width: 780px) {
      .dashboard { padding: 1rem; }
      .stats-table th, .stats-table td { padding: 0.6rem 0.5rem; font-size: 0.75rem; }
      .card-header-left h2 { font-size: 1.3rem; }
      .circle-result { width: 14px; height: 14px; font-size: 7px; }
      .arrow-up, .arrow-down, .arrow-side { font-size: 1rem; width: 18px; }
      .team-icon { width: 32px; height: 32px; }
      .inline-team-icon { width: 28px; height: 28px; }
    }
  </style>
</head>

<script type="importmap">
  { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js", "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js" } }
</script>
<script type="module">
  import { initializeApp } from "firebase/app";
  import { getDatabase, ref, onValue } from "firebase/database";
  import { getAuth, signOut } from "firebase/auth";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  const teamIcons = {
    "Arsenal": "b688ae57-b21a-4ee9-ba6c-5027a09cc9c5.png",
    "AC Milan": "44e0f58a-e5db-445b-9896-db22ea99b936.png",
    "PSG": "4dea795d-a516-46ae-bd34-07a784693d80.png",
    "Barcelona": "IMG_20260421_085117.jpg",
    "Inter Milan": "IMG_20260421_092951.png",
    "Atletico": "IMG_20260421_093024.png",
    "Newcastle": "IMG_20260421_093046.png",
    "Napoli": "IMG_20260421_100318.jpg",
    "Chelsea": "IMG_20260421_100354.jpg",
    "Dortmund": "01cf2986-d9d6-4a33-830d-5d12de4e21b2.jpeg",
    "Real Madrid": "21259ea4-042f-48ff-902f-1e776d27fe58.jpeg",
    "Man City": "9e92a100-327b-48fc-96d4-e4c89f69d7ef.jpeg",
    "Liverpool": "269acb36-d189-45ea-860d-ea8f1cf05f05.jpeg",
    "Juventus": "IMG_20260421_151224.jpg"
  };

  const playerMap = {
    "Barcelona": "~Rea🫡",
    "Inter Milan": "Mali",
    "Dortmund": "~Qha we 🤍",
    "Juventus": "Izu",
    "Atletico": "~Stalker.",
    "PSG": "~MJ",
    "Napoli": "~PrettyBoy Tendancies. 👅",
    "Real Madrid": "~Karabo",
    "Arsenal": "Kath",
    "AC Milan": "Tapz",
    "Chelsea": "~Zazo",
    "Man City": "gry",
    "Liverpool": "🅿️",
    "Newcastle": "~Oratile"
  };

  function getTeamIconHtml(team, cls = "inline-team-icon") {
    const src = teamIcons[team];
    return src ? `<img class="${cls}" src="${src}" alt="${team}">` : `<span>${team}</span>`;
  }

  // ─── State ───────────────────────────────────────────────────────────────
  let teamsData = [];
  let allResultsCache = [];
  let fixturesData = [];
  let resultsData = [];
  let currentView = "team";
  let showFormArrows = true;
  let showLast5 = true;
  let popup = null;

  // ─── Results helpers ─────────────────────────────────────────────────────
  function getResultStatusForTeam(team, resultText) {
    const lower = resultText.toLowerCase();
    if (lower.includes("no contest") || lower.includes("f - f")) return "F";
    const isForfeit = lower.includes("forfeit") || lower.includes("forfeited");
    const parts = resultText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/);
    if (parts) {
      const home = parts[1].trim(), homeScore = parseInt(parts[2]), awayScore = parseInt(parts[3]), away = parts[4].trim();
      if (home === team && homeScore > awayScore) return isForfeit ? "WF" : "W";
      if (home === team && homeScore < awayScore) return isForfeit ? "LF" : "L";
      if (away === team && awayScore > homeScore) return isForfeit ? "WF" : "W";
      if (away === team && awayScore < homeScore) return isForfeit ? "LF" : "L";
      if ((home === team || away === team) && homeScore === awayScore) return "D";
    }
    if (resultText.includes(`${team} `) && isForfeit) {
      if (lower.includes("win")) return "WF";
      if (lower.includes("loss")) return "LF";
    }
    return null;
  }

  function getTeamLast5(team) {
    const teamResults = allResultsCache
      .filter(r => r.matchText && r.matchText.includes(team))
      .sort((a, b) => (b.md || 0) - (a.md || 0));
    const statuses = teamResults.slice(0, 5).map(r => getResultStatusForTeam(team, r.matchText)).filter(Boolean);
    while (statuses.length < 5) statuses.push(null);
    return statuses.reverse();
  }

  function getLatestArrow(team) {
    const teamResults = allResultsCache
      .filter(r => r.matchText && r.matchText.includes(team))
      .sort((a, b) => (b.md || 0) - (a.md || 0));
    if (!teamResults.length) return null;
    const status = getResultStatusForTeam(team, teamResults[0].matchText);
    if (status === "W" || status === "WF") return "up";
    if (status === "L" || status === "LF") return "down";
    if (status === "D") return "side";
    return null;
  }

  // ─── League Table ─────────────────────────────────────────────────────────
  function renderLeagueTable() {
    const tbody = document.getElementById('tableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    const sorted = [...teamsData].sort((a, b) => b.pts - a.pts || b.gd - a.gd);
    sorted.forEach((team, idx) => {
      const row = tbody.insertRow();
      const pos = idx + 1;
      let barClass = "";
      if (pos <= 4) barClass = "blue-bar-vertical";
      else if (pos <= 8) barClass = "orange-bar-vertical";
      else if (pos <= 12) barClass = "green-bar-vertical";

      if (pos === 1) row.classList.add("dashed-separator-gold");
      else if (pos === 8) row.classList.add("dashed-separator-white");
      else if (pos === 12) row.classList.add("dashed-separator-red");

      // Pos cell
      const posCell = row.insertCell(0);
      posCell.className = "rank-cell";
      posCell.innerHTML = barClass
        ? `<div class="pos-with-bar"><span class="vertical-bar ${barClass}"></span>${pos}</div>`
        : pos;

      // Club cell
      const displayName = currentView === "player" ? (playerMap[team.name] || team.name) : team.name;
      let clubHtml = '';
      if (showFormArrows) {
        const dir = getLatestArrow(team.name);
        if (dir === "up") clubHtml += '<span class="arrow-up">↑</span> ';
        else if (dir === "down") clubHtml += '<span class="arrow-down">↓</span> ';
        else if (dir === "side") clubHtml += '<span class="arrow-side">→</span> ';
        else clubHtml += '<span style="opacity:0.3;">—</span> ';
      }
      clubHtml += getTeamIconHtml(team.name, "team-icon") + ' ' + displayName;
      row.insertCell(1).innerHTML = `<div class="team-name">${clubHtml}</div>`;

      row.insertCell(2).innerText = team.p || 0;
      const gd = team.gd || 0;
      row.insertCell(3).innerText = gd > 0 ? `+${gd}` : gd;
      const ptsCell = row.insertCell(4);
      ptsCell.className = "pts-cell";
      ptsCell.innerText = team.pts || 0;

      // Last 5 cell
      const last5Cell = row.insertCell(5);
      if (showLast5) {
        const last5 = getTeamLast5(team.name);
        const container = document.createElement("div");
        container.className = "form-circles";
        last5.forEach(res => {
          const circle = document.createElement("span");
          circle.className = "circle-result";
          if (res === "W") { circle.classList.add("circle-win"); circle.innerHTML = "✓"; }
          else if (res === "L") { circle.classList.add("circle-loss"); circle.innerHTML = "✗"; }
          else if (res === "D") { circle.classList.add("circle-draw"); circle.innerHTML = "–"; }
          else if (res === "F") { circle.classList.add("circle-forfeit-grey"); circle.innerHTML = "F"; }
          else if (res === "WF") { circle.classList.add("circle-forfeit-win"); circle.innerHTML = "F"; }
          else if (res === "LF") { circle.classList.add("circle-forfeit-loss"); circle.innerHTML = "F"; }
          else { circle.classList.add("circle-blank"); circle.innerHTML = ""; }
          container.appendChild(circle);
        });
        last5Cell.appendChild(container);
      }
    });
  }

  // ─── Fixtures ─────────────────────────────────────────────────────────────
  function renderFixtures() {
    const search = (document.getElementById('fixtureSearch')?.value || '').toLowerCase();
    const tbody = document.getElementById('fixturesBody');
    tbody.innerHTML = '';
    const filtered = fixturesData.filter(f =>
      !search || f.home.toLowerCase().includes(search) || f.away.toLowerCase().includes(search)
    );
    if (!filtered.length) {
      const r = tbody.insertRow(); r.insertCell(0).colSpan = 3;
      r.cells[0].className = "empty-message"; r.cells[0].innerText = "No fixtures found.";
      return;
    }
    filtered.forEach(f => {
      const row = tbody.insertRow();
      row.insertCell(0).innerHTML = `<span class="date-badge">${f.date || ''}</span>`;
      const homeIcon = getTeamIconHtml(f.home, "inline-team-icon");
      const awayIcon = getTeamIconHtml(f.away, "inline-team-icon");
      row.insertCell(1).innerHTML = `<div class="fixture-icons">${homeIcon}<span style="margin:0 8px; color:#f5d742; font-weight:700;">vs</span>${awayIcon}</div>`;
      row.insertCell(2).innerHTML = `<span style="background:#5e3a9e; padding:0.2rem 0.7rem; border-radius:30px; color:#f5d742; font-size:0.8rem;">MD ${f.md}</span>`;
    });
  }

  // ─── Results ──────────────────────────────────────────────────────────────
  function renderResults() {
    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';
    const teamList = Object.keys(teamIcons);
    resultsData.forEach(r => {
      let processed = r.matchText;
      teamList.forEach(team => {
        const regex = new RegExp(`\\b${team.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'g');
        processed = processed.replace(regex, getTeamIconHtml(team, "inline-team-icon") + ' ' + team);
      });
      const row = tbody.insertRow();
      const isForfeit = r.matchText.includes("Forfeit") || r.matchText.includes("No Contest") || r.matchText.includes("F - F");
      if (isForfeit) {
        let forfeitText = "Forfeit";
        if (r.matchText.includes("No Contest") || r.matchText.includes("F - F")) forfeitText = "No Contest";
        else if (r.matchText.includes("No Reply")) forfeitText = "Forfeited - No Reply";
        else if (r.matchText.includes("on Agreement")) forfeitText = "Forfeited on Agreement";
        row.insertCell(0).innerHTML = `<div class="result-with-forfeit"><strong>${processed}</strong><div class="forfeit-text">${forfeitText}</div></div>`;
      } else {
        row.insertCell(0).innerHTML = `<strong>${processed}</strong>`;
      }
      row.insertCell(1).innerHTML = `<span class="match-highlight">MD${r.md}</span>`;
    });
  }

  // ─── Three-dot popup ──────────────────────────────────────────────────────
  const threeDotBtn = document.getElementById('threeDotBtn');
  function closePopup() { if (popup) { popup.remove(); popup = null; } }
  threeDotBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (popup) { closePopup(); return; }
    const rect = threeDotBtn.getBoundingClientRect();
    popup = document.createElement('div');
    popup.className = 'popup-menu';
    popup.style.position = 'absolute';
    popup.style.top = (rect.bottom + window.scrollY + 5) + 'px';
    popup.style.left = (rect.left + window.scrollX - 80) + 'px';

    const items = [
      { label: () => currentView === "team" ? "Manager names" : "Team names", action: () => { currentView = currentView === "team" ? "player" : "team"; renderLeagueTable(); closePopup(); } },
      { label: () => showFormArrows ? "Hide Form arrows" : "Show Form arrows", action: () => { showFormArrows = !showFormArrows; renderLeagueTable(); closePopup(); } },
      { label: () => showLast5 ? "Hide Last 5" : "Show Last 5", action: () => { showLast5 = !showLast5; renderLeagueTable(); closePopup(); } },
      { label: () => "Calendar", action: () => { window.location.href = 'calendar.html'; closePopup(); } },
      { label: () => "Rules", action: () => { window.location.href = 'rules.html'; closePopup(); } },
    ];
    items.forEach(item => {
      const div = document.createElement('div');
      div.innerText = item.label();
      div.addEventListener('click', item.action);
      popup.appendChild(div);
    });
    document.body.appendChild(popup);
  });
  document.addEventListener('click', (e) => { if (popup && !popup.contains(e.target) && e.target !== threeDotBtn) closePopup(); });

  // ─── Collapsible cards ────────────────────────────────────────────────────
  function setupCollapse(headerId, contentId, iconId) {
    const h = document.getElementById(headerId), c = document.getElementById(contentId), ic = document.getElementById(iconId);
    if (!h || !c) return;
    let collapsed = c.classList.contains('collapsed');
    h.addEventListener('click', () => {
      collapsed = !collapsed;
      if (collapsed) { c.classList.add('collapsed'); if (ic) ic.innerHTML = '▶'; }
      else { c.classList.remove('collapsed'); if (ic) ic.innerHTML = '▼'; }
    });
  }
  setupCollapse('fixturesHeader', 'fixturesContent', 'fixturesToggleIcon');
  setupCollapse('resultsHeader', 'resultsContent', 'resultsToggleIcon');

  // ─── Firebase listeners ───────────────────────────────────────────────────
  onValue(ref(db, 'premier_league/results'), (snap) => {
    allResultsCache = snap.val() ? Object.values(snap.val()) : [];
    resultsData = allResultsCache;
    renderLeagueTable();
    renderResults();
  });

  onValue(ref(db, 'premier_league/table'), (snap) => {
    teamsData = snap.val() ? Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })) : [];
    renderLeagueTable();
  });

  onValue(ref(db, 'premier_league/fixtures'), (snap) => {
    fixturesData = snap.val() ? Object.values(snap.val()) : [];
    renderFixtures();
  });

  document.getElementById('fixtureSearch')?.addEventListener('input', renderFixtures);

  // ─── Hamburger modal ──────────────────────────────────────────────────────
  const hamburger = document.getElementById('hamburgerBtn');
  const modalOverlay = document.getElementById('modalOverlay');
  const closeModalBtn = document.getElementById('closeModalBtn');
  hamburger.onclick = () => modalOverlay.classList.add('active');
  closeModalBtn.onclick = () => modalOverlay.classList.remove('active');
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });
  document.getElementById('rulesBtn').onclick = () => window.location.href = 'rules.html';
  document.getElementById('playerTitlesBtn').onclick = () => window.location.href = 'player-titles.html';
  document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = 'login.html'; };

  // ─── Slideshow ────────────────────────────────────────────────────────────
  const images = [
    "images - 2026-04-19T121231.816.jpeg",
    "images - 2026-04-19T155746.715.jpeg",
    "37686bb3-06ce-401b-a022-026933c165e7.jpeg",
    "12871.jpg",
    "1f157df7-2054-4a9d-aa14-b9941ef4a743.jpeg"
  ];
  let idx = 0;
  const imgEl = document.getElementById('slideshow-img');
  const dotsContainer = document.getElementById('dotsContainer');
  function createDots() {
    dotsContainer.innerHTML = '';
    images.forEach((_, i) => {
      const dot = document.createElement('span');
      dot.classList.add('dot');
      if (i === idx) dot.classList.add('active');
      dot.addEventListener('click', () => { idx = i; imgEl.src = images[idx]; updateDots(); });
      dotsContainer.appendChild(dot);
    });
  }
  function updateDots() { document.querySelectorAll('.dot').forEach((d, i) => { d.classList.toggle('active', i === idx); }); }
  if (imgEl) { createDots(); setInterval(() => { idx = (idx + 1) % images.length; imgEl.src = images[idx]; updateDots(); }, 2000); }
</script>
</body>
</html>
