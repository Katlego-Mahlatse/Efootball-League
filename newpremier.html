<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Premier League · eFootball 412</title>
  <style>
    /* exactly the same CSS as admin but without .edit-btn, .delete-btn, .add-btn, and action column */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%); font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; color: #f5f0ff; padding-bottom: 2rem; }
    .gold-navbar { background: linear-gradient(135deg, #d4af37, #f5d742); padding: 0.4rem 1.2rem; display: flex; justify-content: flex-end; align-items: center; gap: 0.8rem; position: sticky; top: 0; z-index: 100; }
    .hamburger-btn { background: #6a3bb5; width: 36px; height: 36px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; cursor: pointer; border: 1.5px solid #f5d742; }
    .hamburger-btn span { width: 18px; height: 2.5px; background: #f5d742; border-radius: 2px; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; visibility: hidden; pointer-events: none; }
    .modal-overlay.active { visibility: visible; pointer-events: auto; }
    .modal-content { position: absolute; top: 60px; right: 20px; background: linear-gradient(135deg, #2d1b4e, #1f0f3a); border: 2px solid #f5d742; border-radius: 1.2rem; padding: 1rem; min-width: 200px; }
    .modal-option { background: rgba(106,59,181,0.3); padding: 0.4rem 0.8rem; border-radius: 40px; text-decoration: none; color: #f5d742; font-weight: 700; font-size: 0.8rem; display: block; margin: 0.5rem 0; border: 1px solid #f5d742; cursor: pointer; }
    .close-modal { background: #6a3bb5; color: #f5d742; border: none; padding: 0.3rem 0.9rem; border-radius: 30px; cursor: pointer; }
    .dashboard { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
    .slideshow-container { text-align: center; margin-bottom: 2rem; }
    .slideshow-img { max-width: 100%; border-radius: 1.5rem; }
    .dots-container { margin-top: 0.8rem; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f5d742; margin: 0 4px; cursor: pointer; }
    .dot.active { background: #6a3bb5; }
    .card { background: rgba(45,25,75,0.85); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(245,215,66,0.4); margin-bottom: 2rem; overflow: hidden; }
    .card-header { padding: 1rem 1.5rem; background: rgba(30,15,55,0.9); border-bottom: 2px solid #f5d742; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .card-header-left h2 { font-size: 1.4rem; }
    .toggle-icon { font-size: 1.2rem; color: #f5d742; }
    .three-dot-menu { background: none; border: none; color: #f5d742; font-size: 1.8rem; cursor: pointer; padding: 0 0.5rem; }
    .card-content { transition: max-height 0.4s ease; max-height: 2000px; overflow: hidden; }
    .card-content.collapsed { max-height: 0; }
    .filter-container { padding: 1rem; background: rgba(30,15,55,0.6); border-bottom: 1px solid rgba(245,215,66,0.3); }
    .filter-input { background: rgba(45,25,75,0.9); border: 1px solid #f5d742; border-radius: 30px; padding: 0.5rem 1rem; color: white; width: 220px; }
    .scrollable-table { max-height: 450px; overflow-y: auto; }
    .stats-table, .inner-table { width: 100%; border-collapse: collapse; }
    .stats-table th, .inner-table th { text-align: left; padding: 0.8rem; background: rgba(55,35,95,0.7); border-bottom: 1px solid #f5d742; }
    .stats-table td, .inner-table td { padding: 0.6rem 0.8rem; border-bottom: 1px solid rgba(245,215,66,0.2); }
    .team-icon-sm { width: 30px; height: 30px; object-fit: contain; vertical-align: middle; margin-right: 8px; }
    .team-icon { width: 40px; height: 40px; object-fit: contain; vertical-align: middle; margin-right: 8px; display: inline-block; }
    .rank-cell { font-weight: 700; width: 60px; }
    .pos-with-bar { display: flex; align-items: center; gap: 6px; }
    .vertical-bar { width: 4px; height: 18px; border-radius: 2px; }
    .blue-bar-vertical { background: #3b82f6; }
    .orange-bar-vertical { background: #f97316; }
    .green-bar-vertical { background: #22c55e; }
    .dashed-separator-gold { border-bottom: 2px dashed #d4af37 !important; }
    .dashed-separator-white { border-bottom: 2px dashed #ffffff !important; }
    .dashed-separator-red { border-bottom: 2px dashed #ef4444 !important; }
    .pts-cell { font-weight: 800; color: #f5d742; text-align: center; }
    .form-circles { display: flex; gap: 4px; align-items: center; }
    .circle-result { width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
    .circle-win { background: #22c55e; color: white; }
    .circle-loss { background: #ef4444; color: white; }
    .circle-draw { background: #6b7280; color: white; }
    .circle-forfeit-win { background: #22c55e; color: white; }
    .circle-forfeit-loss { background: #ef4444; color: white; }
    .circle-forfeit-grey { background: #6b7280; color: white; }
    .circle-blank { background: transparent; border: 1px solid #a0a0a0; }
    .arrow-up { color: #22c55e; font-size: 1.2rem; display: inline-block; width: 24px; text-align: center; }
    .arrow-down { color: #ef4444; font-size: 1.2rem; display: inline-block; width: 24px; text-align: center; }
    .arrow-side { color: #f5d742; font-size: 1.2rem; display: inline-block; width: 24px; text-align: center; }
    .legend-under-table { margin-top: 1rem; padding: 0.8rem 1.2rem; background: rgba(30,15,55,0.5); border-radius: 1rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; font-size: 0.7rem; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; }
    .legend-vertical-bar { width: 4px; height: 16px; border-radius: 2px; }
    .legend-blue { background: #3b82f6; }
    .legend-orange { background: #f97316; }
    .legend-green { background: #22c55e; }
    .legend-dashed-white { display: inline-block; width: 20px; height: 2px; border-bottom: 2px dashed #ffffff; vertical-align: middle; }
    .forfeit-text { font-size: 0.7rem; color: #f5d742; margin-top: 4px; }
    @media (max-width: 780px) {
      .dashboard { padding: 1rem; }
      .stats-table th, .stats-table td { padding: 0.4rem; font-size: 0.75rem; }
      .circle-result { width: 14px; height: 14px; font-size: 7px; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <h3>TOURNAMENTS</h3>
    <div class="modal-option" id="rulesBtn">RULES</div>
    <div class="modal-option" id="playerTitlesBtn">PLAYER TITLES</div>
    <div class="modal-option" id="logoutBtn">LOGOUT</div>
    <button class="close-modal" id="closeModalBtn">CLOSE</button>
  </div>
</div>

<div class="dashboard">
  <div class="slideshow-container"><img id="slideshow-img" class="slideshow-img" src="images - 2026-04-19T121231.816.jpeg"><div class="dots-container" id="dotsContainer"></div></div>

  <div class="card">
    <div class="card-header" style="cursor:default;">
      <div class="card-header-left"><h2>🏆 PREMIER LEAGUE TABLE</h2></div>
      <button class="three-dot-menu" id="threeDotBtn">⋮</button>
    </div>
    <div class="card-content">
      <div class="scrollable-table"><table class="stats-table" id="leagueTable"><thead><tr><th>Pos</th><th>Club</th><th>P</th><th>GD</th><th>Pts</th><th>Last 5</th></tr></thead><tbody id="tableBody"></tbody></table></div>
      <div class="legend-under-table"><div style="display:flex; flex-wrap:wrap; gap:1.5rem; justify-content:center;"><span class="legend-item"><span class="legend-vertical-bar legend-blue"></span><span>UCL</span></span><span class="legend-item"><span class="legend-vertical-bar legend-orange"></span><span>UEL</span></span><span class="legend-item"><span class="legend-vertical-bar legend-green"></span><span>UECL</span></span><span class="legend-item"><span class="legend-dashed-white"></span><span>FIFA CWC</span></span></div></div>
    </div>
  </div>

  <div class="card"><div class="card-header" id="fixturesHeader"><div class="card-header-left"><h2>📅 FIXTURES</h2></div><div class="toggle-icon" id="fixturesToggleIcon">▼</div></div>
  <div class="card-content" id="fixturesContent"><div class="filter-container"><input type="text" id="fixtureSearch" class="filter-input" placeholder="🔍 Search team..."></div><div class="scrollable-table"><table class="inner-table"><thead><tr><th>Date</th><th>Home vs Away</th><th>Matchday</th></tr></thead><tbody id="fixturesBody"></tbody></table></div></div></div>

  <div class="card"><div class="card-header" id="resultsHeader"><div class="card-header-left"><h2>📝 RESULTS</h2></div><div class="toggle-icon" id="resultsToggleIcon">▼</div></div>
  <div class="card-content" id="resultsContent"><div class="scrollable-table"><table class="inner-table"><thead><tr><th>Match</th><th>Match Day</th></tr></thead><tbody id="resultsBody"></tbody></table></div></div></div>
</div>

<script type="importmap">
  { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js", "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js" } }
</script>
<script type="module">
  import { initializeApp } from "firebase/app";
  import { getDatabase, ref, onValue } from "firebase/database";
  import { getAuth, signOut } from "firebase/auth";

  const firebaseConfig = { apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4", authDomain: "efootball-412.firebaseapp.com", databaseURL: "https://efootball-412-default-rtdb.firebaseio.com", projectId: "efootball-412", storageBucket: "efootball-412.firebasestorage.app", messagingSenderId: "596548424249", appId: "1:596548424249:web:4349f6e87a40a1590bf3e8" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  const teamIcons = { "Arsenal":"b688ae57-b21a-4ee9-ba6c-5027a09cc9c5.png","AC Milan":"44e0f58a-e5db-445b-9896-db22ea99b936.png","PSG":"4dea795d-a516-46ae-bd34-07a784693d80.png","Barcelona":"IMG_20260421_085117.jpg","Inter Milan":"IMG_20260421_092951.png","Atletico":"IMG_20260421_093024.png","Newcastle":"IMG_20260421_093046.png","Napoli":"IMG_20260421_100318.jpg","Chelsea":"IMG_20260421_100354.jpg","Dortmund":"01cf2986-d9d6-4a33-830d-5d12de4e21b2.jpeg","Real Madrid":"21259ea4-042f-48ff-902f-1e776d27fe58.jpeg","Man City":"9e92a100-327b-48fc-96d4-e4c89f69d7ef.jpeg","Liverpool":"269acb36-d189-45ea-860d-ea8f1cf05f05.jpeg","Juventus":"IMG_20260421_151224.jpg" };
  const teamList = Object.keys(teamIcons);
  function getTeamIconHtml(team, cls="team-icon-sm") { const src = teamIcons[team]; return src ? `<img class="${cls}" src="${src}">` : team; }

  const playerMap = { "Barcelona":"~Rea🫡","Inter Milan":"Mali","Dortmund":"~Qhawe 🤍","Juventus":"Izu","Atletico":"~Stalker.","PSG":"~MJ","Napoli":"~PrettyBoy Tendancies. 👅","Real Madrid":"~Karabo","Arsenal":"Kath","AC Milan":"Tapz","Chelsea":"~Zazo","Man City":"gry","Liverpool":"🅿️","Newcastle":"~Oratile" };

  let currentView = "team";
  let showFormArrows = true;
  let showLast5 = true;

  let teamsData = [];
  let fixturesData = [];
  let resultsData = [];

  function getResultStatusForTeam(team, resultText) {
    const lower = resultText.toLowerCase();
    if (lower.includes("no contest") || lower.includes("f - f")) return "F";
    const isForfeit = lower.includes("forfeit") || lower.includes("forfeited");
    const parts = resultText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/);
    if (parts) {
      let home = parts[1].trim(), homeScore = parseInt(parts[2]), awayScore = parseInt(parts[3]), away = parts[4].trim();
      if (home === team && homeScore > awayScore) return isForfeit ? "WF" : "W";
      if (home === team && homeScore < awayScore) return isForfeit ? "LF" : "L";
      if (away === team && awayScore > homeScore) return isForfeit ? "WF" : "W";
      if (away === team && awayScore < homeScore) return isForfeit ? "LF" : "L";
      if ((home === team || away === team) && homeScore === awayScore) return "D";
    }
    if (resultText.includes(`${team} `) && isForfeit) {
      if (lower.includes("win")) return "WF";
      if (lower.includes("loss")) return "LF";
    }
    return null;
  }

  function getTeamLast5(team) {
    const teamResults = resultsData.filter(r => r.matchText.includes(team)).sort((a,b) => (b.md||0) - (a.md||0));
    const last5Status = teamResults.slice(0,5).map(r => getResultStatusForTeam(team, r.matchText)).filter(s => s);
    while(last5Status.length < 5) last5Status.push(null);
    return last5Status.reverse();
  }

  function getLatestArrow(team) {
    const teamResults = resultsData.filter(r => r.matchText.includes(team)).sort((a,b) => (b.md||0) - (a.md||0));
    if(teamResults.length === 0) return null;
    const status = getResultStatusForTeam(team, teamResults[0].matchText);
    if(status === "W" || status === "WF") return "↑";
    if(status === "L" || status === "LF") return "↓";
    if(status === "D") return "→";
    if(status === "F") return "⚪";
    return null;
  }

  function renderLeagueTable() {
    const tbody = document.getElementById('tableBody'); if(!tbody) return;
    tbody.innerHTML = '';
    const sorted = [...teamsData].sort((a,b) => b.pts - a.pts || b.gd - a.gd);
    sorted.forEach((team, idx) => {
      const row = tbody.insertRow();
      const pos = idx+1;
      let barClass = "";
      if(pos <=4) barClass = "blue-bar-vertical";
      else if(pos <=8) barClass = "orange-bar-vertical";
      else if(pos <=12) barClass = "green-bar-vertical";
      if(pos ===1) row.classList.add("dashed-separator-gold");
      else if(pos ===8) row.classList.add("dashed-separator-white");
      else if(pos ===12) row.classList.add("dashed-separator-red");
      const posCell = row.insertCell(0);
      posCell.className = "rank-cell";
      if(barClass) posCell.innerHTML = `<div class="pos-with-bar"><span class="vertical-bar ${barClass}"></span>${pos}</div>`;
      else posCell.innerText = pos;

      let arrowHtml = "";
      if(showFormArrows) {
        const arrow = getLatestArrow(team.name);
        if(arrow === "↑") arrowHtml = '<span class="arrow-up">↑</span> ';
        else if(arrow === "↓") arrowHtml = '<span class="arrow-down">↓</span> ';
        else if(arrow === "→") arrowHtml = '<span class="arrow-side">→</span> ';
        else if(arrow === "⚪") arrowHtml = '<span style="opacity:0.5;">⚪</span> ';
        else arrowHtml = '<span style="opacity:0.3;">—</span> ';
      }
      const displayName = (currentView === "player" && playerMap[team.name]) ? playerMap[team.name] : team.name;
      const iconHtml = getTeamIconHtml(team.name, "team-icon");
      row.insertCell(1).innerHTML = `<div class="team-name">${arrowHtml}${iconHtml} ${displayName}</div>`;
      row.insertCell(2).innerText = team.p || 0;
      const gdValue = team.gd || 0;
      row.insertCell(3).innerText = gdValue > 0 ? `+${gdValue}` : `${gdValue}`;
      const ptsCell = row.insertCell(4);
      ptsCell.className = "pts-cell";
      ptsCell.innerText = team.pts || 0;

      const last5Cell = row.insertCell(5);
      if(showLast5) {
        const last5 = getTeamLast5(team.name);
        const container = document.createElement("div");
        container.className = "form-circles";
        last5.forEach(res => {
          const circle = document.createElement("span");
          circle.className = "circle-result";
          if(res === "W") { circle.classList.add("circle-win"); circle.innerHTML = "✓"; }
          else if(res === "L") { circle.classList.add("circle-loss"); circle.innerHTML = "✗"; }
          else if(res === "D") { circle.classList.add("circle-draw"); circle.innerHTML = "–"; }
          else if(res === "F") { circle.classList.add("circle-forfeit-grey"); circle.innerHTML = "F"; }
          else if(res === "WF") { circle.classList.add("circle-forfeit-win"); circle.innerHTML = "F"; }
          else if(res === "LF") { circle.classList.add("circle-forfeit-loss"); circle.innerHTML = "F"; }
          else { circle.classList.add("circle-blank"); circle.innerHTML = ""; }
          container.appendChild(circle);
        });
        last5Cell.appendChild(container);
      }
    });
  }

  onValue(ref(db,'premier_league/table'), (snap) => { teamsData = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : []; renderLeagueTable(); });
  onValue(ref(db,'premier_league/results'), (snap) => { resultsData = snap.val() ? Object.values(snap.val()) : []; renderResults(); renderLeagueTable(); });

  function renderFixtures() {
    const search = document.getElementById('fixtureSearch')?.value.toLowerCase() || '';
    const tbody = document.getElementById('fixturesBody');
    if(!tbody) return;
    tbody.innerHTML = '';
    fixturesData.forEach(f => {
      if(search && !f.home.toLowerCase().includes(search) && !f.away.toLowerCase().includes(search)) return;
      const row = tbody.insertRow();
      row.insertCell(0).innerHTML = `<span class="date-badge">${f.date || ''}</span>`;
      const homeIcon = getTeamIconHtml(f.home, "inline-team-icon");
      const awayIcon = getTeamIconHtml(f.away, "inline-team-icon");
      row.insertCell(1).innerHTML = `<div class="fixture-icons">${homeIcon} ${f.home} vs ${awayIcon} ${f.away}</div>`;
      row.insertCell(2).innerHTML = `<span style="background:#5e3a9e; padding:0.2rem 0.7rem; border-radius:30px;">MD ${f.md}</span>`;
    });
    if(tbody.rows.length === 0) { const r=tbody.insertRow(); r.insertCell(0).colSpan=3; r.cells[0].className="empty-message"; r.cells[0].innerText="No fixtures match."; }
  }
  onValue(ref(db,'premier_league/fixtures'), (snap)=>{ fixturesData = snap.val() ? Object.values(snap.val()) : []; renderFixtures(); });
  document.getElementById('fixtureSearch')?.addEventListener('input', renderFixtures);

  function renderResults() {
    const tbody = document.getElementById('resultsBody');
    if(!tbody) return;
    tbody.innerHTML = '';
    resultsData.forEach(r => {
      let processed = r.matchText;
      teamList.forEach(team => {
        const regex = new RegExp(`\\b${team}\\b`, 'g');
        processed = processed.replace(regex, `${getTeamIconHtml(team, "inline-team-icon")} ${team}`);
      });
      const row = tbody.insertRow();
      const isForfeit = r.matchText.includes("Forfeit") || r.matchText.includes("No Contest") || r.matchText.includes("F - F");
      if(isForfeit) {
        let forfeitText = "Forfeit";
        if(r.matchText.includes("No Contest")) forfeitText = "No Contest";
        else if(r.matchText.includes("Forfeited - No Reply")) forfeitText = "Forfeited - No Reply";
        else if(r.matchText.includes("Forfeited on Agreement")) forfeitText = "Forfeited on Agreement";
        else if(r.matchText.includes("F - F")) forfeitText = "No Contest";
        row.insertCell(0).innerHTML = `<div class="result-with-forfeit"><strong>${processed}</strong><div class="forfeit-text">${forfeitText}</div></div>`;
      } else {
        row.insertCell(0).innerHTML = `<strong>${processed}</strong>`;
      }
      row.insertCell(1).innerHTML = `<span class="match-highlight">MD${r.md}</span>`;
    });
  }

  // Three-dot menu (same as admin but no CRUD options)
  let popup = null;
  const threeDot = document.getElementById('threeDotBtn');
  function closePopup() { if(popup) { popup.remove(); popup = null; } }
  function updateMenuOptions() {
    if(!popup) return;
    popup.children[0].innerText = (currentView === "team") ? "Manager names" : "Team View";
    popup.children[1].innerText = showFormArrows ? "Hide Form arrows" : "Show Form arrows";
    popup.children[2].innerText = showLast5 ? "Hide Last 5" : "Show Last 5";
  }
  threeDot.addEventListener('click', (e) => {
    e.stopPropagation();
    if(popup) { closePopup(); return; }
    const rect = threeDot.getBoundingClientRect();
    popup = document.createElement('div');
    popup.className = 'popup-menu';
    popup.style.position = 'absolute';
    popup.style.top = (rect.bottom + window.scrollY + 5) + 'px';
    popup.style.left = (rect.left + window.scrollX - 60) + 'px';
    popup.style.background = 'linear-gradient(135deg, #2d1b4e, #1f0f3a)';
    popup.style.border = '1px solid #f5d742';
    popup.style.borderRadius = '1rem';
    popup.style.padding = '0.5rem 0';
    popup.style.zIndex = '150';

    const playersOpt = document.createElement('div'); playersOpt.style.padding = '0.5rem 1rem'; playersOpt.style.cursor = 'pointer';
    playersOpt.innerText = (currentView === "team") ? "Manager names" : "Team View";
    playersOpt.onclick = () => { currentView = (currentView === "team") ? "player" : "team"; renderLeagueTable(); updateMenuOptions(); };
    const formOpt = document.createElement('div'); formOpt.style.padding = '0.5rem 1rem'; formOpt.style.cursor = 'pointer';
    formOpt.innerText = showFormArrows ? "Hide Form arrows" : "Show Form arrows";
    formOpt.onclick = () => { showFormArrows = !showFormArrows; renderLeagueTable(); updateMenuOptions(); };
    const last5Opt = document.createElement('div'); last5Opt.style.padding = '0.5rem 1rem'; last5Opt.style.cursor = 'pointer';
    last5Opt.innerText = showLast5 ? "Hide Last 5" : "Show Last 5";
    last5Opt.onclick = () => { showLast5 = !showLast5; renderLeagueTable(); updateMenuOptions(); };
    const calendarOpt = document.createElement('div'); calendarOpt.innerText = 'Calendar'; calendarOpt.style.padding = '0.5rem 1rem'; calendarOpt.onclick = () => { window.location.href = 'calendar.html'; closePopup(); };
    const rulesOpt = document.createElement('div'); rulesOpt.innerText = 'Rules'; rulesOpt.style.padding = '0.5rem 1rem'; rulesOpt.onclick = () => { window.location.href = 'rules.html'; closePopup(); };
    popup.appendChild(playersOpt); popup.appendChild(formOpt); popup.appendChild(last5Opt); popup.appendChild(calendarOpt); popup.appendChild(rulesOpt);
    document.body.appendChild(popup);
  });
  document.addEventListener('click', (e) => { if(popup && !popup.contains(e.target) && e.target !== threeDot) closePopup(); });

  function setupCollapse(headerId, contentId, iconId) {
    const h = document.getElementById(headerId);
    const c = document.getElementById(contentId);
    const ic = document.getElementById(iconId);
    if(!h || !c) return;
    let collapsed = c.classList.contains('collapsed');
    h.addEventListener('click', () => {
      collapsed = !collapsed;
      if(collapsed) { c.classList.add('collapsed'); if(ic) ic.innerHTML = '▶'; }
      else { c.classList.remove('collapsed'); if(ic) ic.innerHTML = '▼'; }
    });
  }
  setupCollapse('fixturesHeader', 'fixturesContent', 'fixturesToggleIcon');
  setupCollapse('resultsHeader', 'resultsContent', 'resultsToggleIcon');
  document.getElementById('fixturesContent')?.classList.add('collapsed');
  document.getElementById('resultsContent')?.classList.add('collapsed');
  if(document.getElementById('fixturesToggleIcon')) document.getElementById('fixturesToggleIcon').innerHTML = '▶';
  if(document.getElementById('resultsToggleIcon')) document.getElementById('resultsToggleIcon').innerHTML = '▶';

  // Slideshow
  const images = ["images - 2026-04-19T121231.816.jpeg", "images - 2026-04-19T155746.715.jpeg", "37686bb3-06ce-401b-a022-026933c165e7.jpeg", "12871.jpg", "1f157df7-2054-4a9d-aa14-b9941ef4a743.jpeg"];
  let idx = 0;
  const slideshowImg = document.getElementById('slideshow-img');
  const dotsContainer = document.getElementById('dotsContainer');
  function createDots() {
    if(!dotsContainer) return;
    dotsContainer.innerHTML = '';
    images.forEach((_, i) => {
      const dot = document.createElement('span');
      dot.classList.add('dot');
      if(i === idx) dot.classList.add('active');
      dot.addEventListener('click', () => { idx = i; slideshowImg.src = images[idx]; updateDots(); });
      dotsContainer.appendChild(dot);
    });
  }
  function updateDots() { document.querySelectorAll('.dot').forEach((dot, i) => { if(i === idx) dot.classList.add('active'); else dot.classList.remove('active'); }); }
  if(slideshowImg) { createDots(); setInterval(() => { idx = (idx+1) % images.length; slideshowImg.src = images[idx]; updateDots(); }, 2000); }

  // Modal menu
  const hamburger = document.getElementById('hamburgerBtn');
  const modalOverlay = document.getElementById('modalOverlay');
  const closeModalBtn = document.getElementById('closeModalBtn');
  hamburger.onclick = () => modalOverlay.classList.add('active');
  closeModalBtn.onclick = () => modalOverlay.classList.remove('active');
  document.getElementById('rulesBtn').onclick = () => window.location.href = 'rules.html';
  document.getElementById('playerTitlesBtn').onclick = () => window.location.href = 'player-titles.html';
  document.getElementById('logoutBtn').onclick = async () => { await signOut(auth); window.location.href = 'login.html'; };
</script>
</body>
</html>
