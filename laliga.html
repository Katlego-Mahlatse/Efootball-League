            display: flex;

            gap: 20px;

            margin-bottom: 30px;

            background: rgba(0, 0, 0, 0.3);

            gap: 8px;

            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);

        .filter-group select,
        .filter-group button {
            background: rgba(58, 4, 16, 0.8);
            border: 1px solid var(--laliga-red);
            border-radius: 40px;
            padding: 12px 20px;

            font-weight: 600;
            color: var(--laliga-white);

        }

        .filter-stats {

            color: rgba(255, 255, 255, 0.5);

            align-self: center;

            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;

            border-radius: 40px;

            background: var(--laliga-red);

        .fixture-date-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: var(--laliga-white);
            margin-bottom: 14px;
            padding: 10px 20px;
            background: rgba(233, 16, 46, 0.2);
            border-radius: 50px;
            border-left: 4px solid var(--laliga-red);
            display: inline-flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .fixture-date-label .date-text {
            font-size: 1.8rem;
        }
        .fixture-date-label .matchday-badge {
            background: rgba(233, 16, 46, 0.5);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 1.2rem;
            letter-spacing: 1px;

        .fixture-date-actions {
            display: inline-flex;
            gap: 8px;

        }
        .edit-matchday-btn {
            background: rgba(0, 0, 0, 0.4);

            border-radius: 30px;
            padding: 6px 16px;

            font-weight: 600;
            color: var(--laliga-white);

            animation: cardSlideIn 0.4s ease both;
            border: 1px solid rgba(255, 255, 255, 0.1);

        .fixture-tournament-label {

        .fixture-team-side {

            align-items: center;
            gap: 12px;

            text-align: center;

        .fixture-team-name {

            font-weight: 700;

        .see-more-btn {
            display: inline-block;
            background: rgba(233, 16, 46, 0.2);
            border: 2px solid var(--laliga-red);
            color: var(--laliga-white);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            padding: 16px 40px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 24px;
            text-align: center;

        }
        .see-more-btn:hover {
            background: var(--laliga-red);
            transform: translateY(-2px);
        }

        /* ─── MATCH CARDS ─── */
        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .match-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 28px;
            padding: 32px 48px;
            transition: all 0.25s;
            animation: cardSlideIn 0.4s ease both;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .match-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(233, 16, 46, 0.35);
        }
        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
        }
        .team-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            flex: 1;
            text-align: center;
        }
        .team-name-big {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 2.8rem;
            color: var(--laliga-white);
            letter-spacing: 0.3px;
        }

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            min-width: 180px;
        }
        .score-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4.5rem;
            color: var(--laliga-white);
            letter-spacing: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 14px 42px;
            border-radius: 80px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .forfeit-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: #ffaaaa;
            letter-spacing: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 28px;
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .aggregate-text {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Rajdhani', sans-serif;
        }
        .goal-scorers {
            margin-top: 12px;
        }
        .goal-scorer-item {
            display: inline-block;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(233, 16, 46, 0.5);
            padding: 5px 14px;

            font-size: 1.4rem;
            color: var(--laliga-white);
        }
        .match-meta {

            margin-top: 24px;
            justify-content: center;
        }
        .meta-tag {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--laliga-white);

            border-radius: 50px;
            border: 1px solid rgba(233, 16, 46, 0.3);
            font-family: 'Inter', sans-serif;

        .admin-row {
            display: flex;
            gap: 16px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .btn-sm {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 12px 32px;
            border-radius: 50px;

            transition: all 0.2s;
            letter-spacing: 1px;

        .btn-edit {
            background: rgba(255, 255, 255, 0.15);

            border: 1px solid rgba(255, 255, 255, 0.3);

            background: var(--laliga-white);
            color: var(--laliga-red);
        }
        .btn-delete {

        .btn-delete:hover {
            background: #7a0000;
            color: white;
        }

        .add-btn-main {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--laliga-red);
            color: var(--laliga-red);
            font-family: 'Rajdhani', sans-serif;

            font-size: 2rem;

            background: var(--laliga-red);

            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(233, 16, 46, 0.4);
        }

        .add-result-top-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--laliga-red);
            border: 2px solid var(--laliga-red);
            color: var(--laliga-white);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            white-space: nowrap;

            background: var(--laliga-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(233, 16, 46, 0.4);

        /* ─── WATCH MATCH ─── */
        .inline-media {
            width: 100%;
            border-radius: 32px;
            overflow: hidden;
            background: #000;
            margin-bottom: 24px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--laliga-white);
            padding: 16px 8px 8px 8px;
            letter-spacing: 1px;
            text-align: left;
            border-bottom: 2px solid rgba(233, 16, 46, 0.3);
            margin-top: 4px;
        }
        .video-item {
            margin-bottom: 40px;
        }
        .video-delete-btn {
            background: rgba(100, 0, 0, 0.25);
            border: 1px solid var(--laliga-red);
            color: var(--laliga-white);
            padding: 8px 24px;
            border-radius: 40px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .video-delete-btn:hover {
            background: #7a0000;
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-card {
            background: rgba(58, 4, 16, 0.98);
            border: 2px solid var(--laliga-red);
            border-radius: 40px;
            padding: 44px;
            max-width: 860px;
            width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            font-family: 'Rajdhani', sans-serif;
            animation: fadeInUp 0.35s ease both;
        }
        .modal-card h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            color: var(--laliga-red);
            letter-spacing: 2px;
            margin-bottom: 28px;
        }
        .modal-card label {
            display: block;
            color: rgba(255, 255, 255, 0.55);
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            margin-top: 20px;
        }
        .modal-card input,
        .modal-card select,
        .modal-card textarea {
            width: 100%;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--laliga-red);
            border-radius: 28px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            font-weight: 500;
            outline: none;
        }
        .modal-card textarea {
            min-height: 100px;
        }
        .modal-card input:focus,
        .modal-card select:focus {
            box-shadow: 0 0 0 3px rgba(233, 16, 46, 0.3);

        .scorer-section {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 18px;
            padding-top: 18px;
        }
        .scorer-section h4 {
            color: var(--laliga-red);

            margin-bottom: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;

        .scorer-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }
        .scorer-badge {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--laliga-red);
            border-radius: 32px;
            padding: 7px 18px;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--laliga-white);
        }
        .remove-scorer {
            background: #b91c1c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            font-size: 16px;
            cursor: pointer;
        }
        .modal-btns {
            display: flex;
            gap: 18px;
            margin-top: 28px;
        }
        .modal-btn-primary,
        .modal-btn-cancel {
            flex: 1;
            padding: 16px;
            border-radius: 28px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .modal-btn-primary {
            background: var(--laliga-red);
            color: white;
            border: none;
            transition: background 0.2s;
        }
        .modal-btn-primary:hover {
            background: var(--laliga-red-light);
        }
        .modal-btn-cancel {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--laliga-red);

        .status-msg {
            margin-top: 14px;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2rem;
        }
        .status-success {
            background: #dcfce7;
            color: #166534;
        }
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-loading {
            background: #fef3c7;
            color: #92400e;
        }
        .settings-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .settings-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--laliga-red);
            color: var(--laliga-white);
            padding: 18px 26px;
            border-radius: 28px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;

            align-items: center;
            gap: 16px;
            transition: all 0.2s;
        }
        .settings-btn:hover {
            background: var(--laliga-red);
        }

        .popup-menu {
            position: absolute;
            background: rgba(58, 4, 16, 0.98);
            border: 1px solid var(--laliga-red);
            border-radius: 20px;

            font-family: 'Rajdhani', sans-serif;

            background: rgba(233, 16, 46, 0.2);
            transform: translateX(8px);

            display: flex;

            background: rgba(233, 16, 46, 0.15);

        const debugLogs = [];
        const MAX_DEBUG_LOGS = 500;

        function logDebug(message, data) {
            const ts = new Date().toISOString();
            debugLogs.push({ ts, message, data: data || null });
            if (debugLogs.length > MAX_DEBUG_LOGS) {
                debugLogs.splice(0, debugLogs.length - MAX_DEBUG_LOGS);
            }
            console.log(`[DEBUG ${ts}]`, message, data || '');
        }

        const origConsoleLog = console.log;
        console.log = function() {
            const args = Array.from(arguments);
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
            logDebug('console.log', msg);
            origConsoleLog.apply(console, arguments);
        };

        const origConsoleError = console.error;
        console.error = function() {
            const args = Array.from(arguments);
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
            logDebug('console.error', msg);
            origConsoleError.apply(console, arguments);
        };

        window.onerror = function(message, source, lineno, colno, error) {
            logDebug('window.onerror', { message, source, lineno, colno, error: error ? error.stack : null });
            return false;
        };

        window.addEventListener('unhandledrejection', function(e) {
            logDebug('unhandledrejection', { reason: e.reason ? e.reason.stack || e.reason : e.reason });
        });

            const logsHtml = debugLogs.slice(-100).reverse().map(log =>

            ).join('');

            showModal(`
                <h3>🐛 Debug Info</h3>
                <p style="color:rgba(255,255,255,0.5);font-size:1.1rem;margin-bottom:16px;">Last 100 logs. Total: ${debugLogs.length}</p>

                    document.getElementById('copyDebugBtn').textContent = '✓ Copied!';

                    const ta = document.createElement('textarea');

        async function loadSeasonsMetadata() {
            const snapshot = await database.ref('laliga/seasons').once('value');

            availableSeasons = [];
            for (const key in seasons) {
                if (!key.startsWith('season_')) continue;
                const id = parseInt(key.split('_')[1]);
                if (!isNaN(id)) availableSeasons.push(id);
                if (seasons[key].active === true) activeSeasonId = id;
            }
            if (!availableSeasons.length) {
                await database.ref('laliga/seasons/season_1/table').set({});
                await database.ref('laliga/seasons/season_1/results').set({});
                await database.ref('laliga/seasons/season_1/active').set(true);
                availableSeasons.push(1);
                activeSeasonId = 1;
            }
            availableSeasons.sort((a, b) => a - b);
            if (!availableSeasons.includes(activeSeasonId) && availableSeasons.length) activeSeasonId = availableSeasons[0];
            currentSeasonId = activeSeasonId;
            updateSeasonUI();
            await loadCurrentSeasonData();
            await loadManagerNamesForSeason();
            await loadManagerHistory();
        }

        // ─── SAST helpers ───
        function getSASTToday() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const sast = new Date(utc + (2 * 3600000));
            return sast.toISOString().split('T')[0];
        }

        function getSASTYesterday() {
            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            const sast = new Date(utc + (2 * 3600000));
            sast.setDate(sast.getDate() - 1);
            return sast.toISOString().split('T')[0];
        }

        function getSASTMidnightTimestamp() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const sastNow = new Date(utc + (2 * 3600000));
            const midnight = new Date(sastNow.getFullYear(), sastNow.getMonth(), sastNow.getDate(), 0, 0, 0, 0);
            return midnight.getTime() - (2 * 3600000);
        }

        function getSASTDateObj() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (2 * 3600000));
        }

        // ─── Form / Last5 helpers ───
        function getResultStatusForTeam(team, matchText) {
            const lower = matchText.toLowerCase();
            if (lower.includes("no contest") || lower.includes("f - f")) return "F";
            const isForfeit = lower.includes("forfeit") || lower.includes("forfeited");
            const parts = matchText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/);
            if (parts) {
                let home = parts[1].trim(),
                    hs = parseInt(parts[2]),
                    as2 = parseInt(parts[3]),
                    away = parts[4].trim();
                if (home === team && hs > as2) return isForfeit ? "WF" : "W";
                if (home === team && hs < as2) return isForfeit ? "LF" : "L";
                if (away === team && as2 > hs) return isForfeit ? "WF" : "W";
                if (away === team && as2 < hs) return isForfeit ? "LF" : "L";
                if ((home === team || away === team) && hs === as2) return "D";
            }
            return null;
        }

        function getTeamLast5(team) {
            const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a, b) => (b.md || 0) - (a
                .md || 0));
            const last5 = sorted.slice(0, 5).map(r => getResultStatusForTeam(team, r.matchText)).filter(Boolean);
            while (last5.length < 5) last5.push(null);
            return last5.reverse();
        }

        function getLatestArrow(team) {
            const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a, b) => (b.md || 0) - (a
                .md || 0));
            if (!sorted.length) return null;
            const s = getResultStatusForTeam(team, sorted[0].matchText);
            if (s === "W" || s === "WF") return "↑";
            if (s === "L" || s === "LF") return "↓";
            if (s === "D") return "→";
            return "⚪";
        }

        // ─── Helper for SAST today (already defined above) ───

        function getMatchdayDeadlineTimestamp(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            const sastMidnightUTCms = Date.UTC(y, m - 1, d) - (2 * 60 * 60 * 1000);
            return sastMidnightUTCms + (48 * 60 * 60 * 1000);
        }
        function formatCountdown(deadlineMs) {
            const diff = deadlineMs - Date.now();
            if (diff <= 0) return 'Expired';
            const totalSeconds = Math.floor(diff / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s`;
        }

        function isFixtureRecentlyRecorded(home, away, md, combinedRecords) {
            const cutoff = Date.now() - (48 * 60 * 60 * 1000);
            for (const key in combinedRecords) {
                const r = combinedRecords[key];
                const sameMatch = ((r.homeTeam === home && r.awayTeam === away) || (r.homeTeam === away && r.awayTeam === home)) && String(r.md) === String(md);
                if (!sameMatch) continue;
                const ts = r.submittedAt || r.approvedAt || 0;
                if (ts >= cutoff) return true;
            }
            return false;
        }

        // ─── FIXTURES RENDERER ───
        function renderFixtures() {
            activeFixtureDate = getSASTToday();

            const laligaFixtures = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            for (const [date, eventData] of Object.entries(calendarEventsData)) {
                const eventSeason = eventData.season;
                if (eventSeason !== undefined && eventSeason !== null && eventSeason !== currentSeasonId) {
                    continue;
                }
                if (eventData.tournaments && Array.isArray(eventData.tournaments)) {
                    for (const tournament of eventData.tournaments) {
                        let isLaLiga = false;
                        if (tournament.name) {
                            const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, '');
                            if (normalized === 'laliga') isLaLiga = true;
                        }
                        if (isLaLiga && tournament.fixtures && Array.isArray(tournament.fixtures)) {
                            for (const fixture of tournament.fixtures) {
                                laligaFixtures.push({
                                    date: date,
                                    homeTeam: fixture.home,
                                    awayTeam: fixture.away,
                                    tournamentName: tournament.name,
                                    eventName: eventData.eventPairs?.[0]?.name || 'LaLiga',
                                    matchday: fixture.matchday || tournament.matchday || null
                                });
                            }
                        }
                    }
                }
            }

            laligaFixtures.sort((a, b) => new Date(a.date) - new Date(b.date));

            const allTeams = [...new Set(laligaFixtures.flatMap(f => [f.homeTeam, f.awayTeam]).filter(Boolean))].sort();
            const allMonths = [...new Set(laligaFixtures.map(f => f.date.substring(0, 7)))].sort();
            const allMatchdays = [...new Set(laligaFixtures.map(f => f.matchday).filter(md => md !== null && md !==
                undefined))].sort((a, b) => a - b);

            let filtered = [...laligaFixtures];
            if (currentFixTeamFilter && currentFixTeamFilter !== 'all') {
                filtered = filtered.filter(f => f.homeTeam === currentFixTeamFilter || f.awayTeam ===
                currentFixTeamFilter);
            }
            if (currentFixMonthFilter && currentFixMonthFilter !== 'all') {
                filtered = filtered.filter(f => f.date.startsWith(currentFixMonthFilter));
            }
            if (currentFixMatchdayFilter && currentFixMatchdayFilter !== 'all') {
                filtered = filtered.filter(f => f.matchday === parseInt(currentFixMatchdayFilter));
            }

            const grouped = {};
            for (const fix of filtered) {
                if (!grouped[fix.date]) grouped[fix.date] = [];
                grouped[fix.date].push(fix);
            }

            let sortedDates = Object.keys(grouped).sort((a, b) => new Date(a) - new Date(b));

            function offsetDate(baseDateStr, days) {
                const [y, m, d] = baseDateStr.split('-').map(Number);
                const date = new Date(y, m - 1, d);
                date.setDate(date.getDate() + days);
                const ny = date.getFullYear();
                const nm = String(date.getMonth() + 1).padStart(2, '0');
                const nd = String(date.getDate()).padStart(2, '0');
                return `${ny}-${nm}-${nd}`;
            }
            const todayStr = activeFixtureDate;
            const yesterdayStr = offsetDate(todayStr, -1);
            const tomorrowStr = offsetDate(todayStr, 1);
            const dayAfterStr = offsetDate(todayStr, 2);
            let visibleDates = [];
            if (!showAllFixtures) {
                if (grouped[todayStr]) {
                    visibleDates = [todayStr];
                } else {
                    visibleDates = [];
                }
            } else {
                const priorityDates = [todayStr, yesterdayStr, tomorrowStr, dayAfterStr];
                const prioritySet = new Set(priorityDates);
                const remainingPast = sortedDates
                    .filter(d => !prioritySet.has(d) && d < todayStr)
                    .sort((a, b) => b.localeCompare(a));
                const remainingFuture = sortedDates
                    .filter(d => !prioritySet.has(d) && d > dayAfterStr)
                    .sort((a, b) => a.localeCompare(b));
                const orderedDates = [
                    ...priorityDates,
                    ...remainingPast,
                    ...remainingFuture
                ];
                visibleDates = orderedDates.filter(d => grouped[d]);
            }

            const monthLabels = {
                '01': 'January',
                '02': 'February',
                '03': 'March',
                '04': 'April',
                '05': 'May',
                '06': 'June',
                '07': 'July',
                '08': 'August',
                '09': 'September',
                '10': 'October',
                '11': 'November',
                '12': 'December'
            };

            let filtersHtml = `
            <div class="filters-bar">
              <div class="filter-group">
                <label>Team</label>
                <select id="fixTeamFilter">
                  <option value="all">All Teams</option>
                  ${allTeams.map(t => `<option value="${t}" ${currentFixTeamFilter===t?'selected':''}>${t}</option>`).join('')}
                </select>
              </div>
              <div class="filter-group">
                <label>Month</label>
                <select id="fixMonthFilter">
                  <option value="all">All Months</option>
                  ${allMonths.map(m => {
                    const [y, mo] = m.split('-');
                    return `<option value="${m}" ${currentFixMonthFilter===m?'selected':''}>${monthLabels[mo] || mo} ${y}</option>`;
                  }).join('')}
                </select>
              </div>
              ${allMatchdays.length > 0 ? `
              <div class="filter-group">
                <label>Matchday</label>
                <select id="fixMatchdayFilter">
                  <option value="all">All Matchdays</option>
                  ${allMatchdays.map(md => `<option value="${md}" ${currentFixMatchdayFilter==md?'selected':''}>Matchday ${md}</option>`).join('')}
                </select>
              </div>
              ` : ''}
              <div class="filter-group">
                <button id="clearFixFiltersBtn" class="clear-filters">Clear Filters</button>
              </div>
              <div class="filter-stats">${filtered.length} fixture${filtered.length !== 1 ? 's' : ''} found</div>
            </div>
          `;

            let contentHtml = '';
            if (visibleDates.length === 0) {
                let msg = 'No LaLiga fixtures found for Season ' + currentSeasonId;
                if (activeFixtureDate && !grouped[activeFixtureDate]) msg += ` (Active date ${activeFixtureDate} has no fixtures)`;
                contentHtml =
                    '<div class="empty-state"><div class="empty-icon">📅</div><p>' + msg + '</p></div>';
            } else {
                for (const dateStr of visibleDates) {
                    const dateObj = new Date(dateStr);
                    const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                    const dayName = dayNames[dateObj.getDay()];
                    const day = dateObj.getDate();
                    const [y, mo] = dateStr.split('-');
                    const monthName = monthLabels[mo] || mo;
                    const isPast = dateObj < today;
                    const matchdayNum = calendarEventsData[dateStr]?.matchday || '';
                    const matchdayText = matchdayNum ? ` · Matchday ${matchdayNum}` : '';
                    const dateLabelText =
                        `${dayName}, ${day} ${monthName} ${y}${isPast ? ' · Played' : ''}${matchdayText}`;

                    let adminActions = '';
                    if (isAdminMode) {
                        adminActions = `
                            <div class="fixture-date-actions">
                              <button class="edit-matchday-btn" data-date="${dateStr}">📝 Edit Matchday</button>
                            </div>
                          `;
                    }

                    contentHtml +=
                        `<div class="fixture-date-group"><div class="fixture-date-label"><span class="date-text">📅 ${dateLabelText}</span>${adminActions}</div>`;
                    for (const fix of grouped[dateStr]) {
                        const homeIconHtml = getTeamIconHtml(fix.homeTeam, 'team-icon-lg');
                        const awayIconHtml = getTeamIconHtml(fix.awayTeam, 'team-icon-lg');
                        contentHtml += `
                            <div class="fixture-card">
                              <div class="fixture-tournament-label">
                                🏆 ${escapeHtml(fix.tournamentName || 'LaLiga')}
                              </div>

        // ─── PARSE RESULT ───
        function parseResultCard(r) {
            let homeTeam = '',
                awayTeam = '',
                homeScore = '',
                awayScore = '',
                isForfeit = false,
                forfeitType = '';
            const text = r.matchText || '';
            const lower = text.toLowerCase();
            if (lower.includes('no contest') || lower.includes('f - f')) isForfeit = true;
            else if (lower.includes('forfeit')) isForfeit = true;
            if (isForfeit && text.includes('F - F')) {
                const parts = text.split(/\s*F\s*-\s*F\s*/i);
                if (parts.length >= 2) { homeTeam = parts[0].trim().replace(/\(.*\)/g, '').trim();
                    awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim();
                    homeScore = 'F';
                    awayScore = 'F'; }
                if (text.includes('No Contest')) forfeitType = 'No Contest';
                else if (text.includes('Forfeited - No Reply')) forfeitType = 'Forfeited - No Reply';
                else if (text.includes('Forfeited on Agreement')) forfeitType = 'Forfeited on Agreement';
                else forfeitType = 'Forfeit';
            } else {
                const match = text.match(/(\d+)\s*-\s*(\d+)/);
                if (match) {
                    homeScore = match[1];
                    awayScore = match[2];
                    const parts = text.split(/\s+\d+\s*-\s*\d+\s+/);
                    if (parts.length >= 2) { homeTeam = parts[0].trim();
                        awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim(); }
                    if (lower.includes('forfeited - no reply')) forfeitType = 'Forfeited - No Reply';
                    else if (lower.includes('forfeited on agreement')) forfeitType = 'Forfeited on Agreement';
                    else if (lower.includes('forfeit')) forfeitType = 'Forfeit';
                }
            }
            return { homeTeam, awayTeam, homeScore, awayScore, isForfeit, forfeitType, md: r.md };
        }

        function extractYouTubeId(input) {
            if (!input) return null;
            if (input.includes('youtube.com/embed/')) {
                const match = input.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
                return match ? match[1] : null;
            }
            if (input.includes('youtu.be/')) {
                const match = input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
                return match ? match[1] : null;
            }
            if (input.includes('youtube.com/watch?v=')) {
                const match = input.match(/v=([a-zA-Z0-9_-]{11})/);
                return match ? match[1] : null;
            }
            const match = input.match(/([a-zA-Z0-9_-]{11})/);
            return match && match[1].length === 11 ? match[1] : null;
        }

        // ─── APPLY RESULT TO TABLE ───
        async function applyResultToTable(homeTeam, awayTeam, homeScore, awayScore, forfeitType) {
            const isNoContest = forfeitType === 'no_contest';
            const isForfeitWin = (forfeitType === 'forfeit_no_reply' || forfeitType === 'forfeit_agreement' || forfeitType === 'forfeit_win');

            const tableSnap = await database.ref(getSeasonPath(currentSeasonId, 'table')).once('value');
            const tableVal = tableSnap.val() || {};

            function findTeamEntry(name) {
                for (const [key, val] of Object.entries(tableVal)) {
                    if (val.name === name) return { key, data: { ...val } };
                }
                return null;
            }

            const homeEntry = findTeamEntry(homeTeam);
            const awayEntry = findTeamEntry(awayTeam);
            if (!homeEntry || !awayEntry) return;

            const hd = homeEntry.data;
            const ad = awayEntry.data;

            if (isNoContest) {
                hd.p = (hd.p || 0) + 1;
                hd.l = (hd.l || 0) + 1;
                ad.p = (ad.p || 0) + 1;
                ad.l = (ad.l || 0) + 1;
            } else if (isForfeitWin) {
                hd.p = (hd.p || 0) + 1;
                ad.p = (ad.p || 0) + 1;

                if (homeScore > awayScore) {
                    hd.w = (hd.w || 0) + 1;
                    hd.pts = (hd.pts || 0) + 3;
                    ad.l = (ad.l || 0) + 1;
                    ad.gd = (ad.gd || 0) - 3;
                    ad.gc = (ad.gc || 0) + 1;
                } else {
                    ad.w = (ad.w || 0) + 1;
                    ad.pts = (ad.pts || 0) + 3;
                    hd.l = (hd.l || 0) + 1;
                    hd.gd = (hd.gd || 0) - 3;
                    hd.gc = (hd.gc || 0) + 1;
                }
            } else {
                hd.p = (hd.p || 0) + 1;
                ad.p = (ad.p || 0) + 1;
                hd.gs = (hd.gs || 0) + homeScore;
                hd.gc = (hd.gc || 0) + awayScore;
                ad.gs = (ad.gs || 0) + awayScore;
                ad.gc = (ad.gc || 0) + homeScore;
                hd.gd = (hd.gd || 0) + (homeScore - awayScore);
                ad.gd = (ad.gd || 0) + (awayScore - homeScore);

                if (homeScore > awayScore) {
                    hd.w = (hd.w || 0) + 1;
                    hd.pts = (hd.pts || 0) + 3;
                    ad.l = (ad.l || 0) + 1;
                } else if (homeScore < awayScore) {
                    ad.w = (ad.w || 0) + 1;
                    ad.pts = (ad.pts || 0) + 3;
                    hd.l = (hd.l || 0) + 1;
                } else {
                    hd.d = (hd.d || 0) + 1;
                    hd.pts = (hd.pts || 0) + 1;
                    ad.d = (ad.d || 0) + 1;
                    ad.pts = (ad.pts || 0) + 1;
                }
            }

            await database.ref(getSeasonPath(currentSeasonId, `table/${homeEntry.key}`)).set(hd);
            await database.ref(getSeasonPath(currentSeasonId, `table/${awayEntry.key}`)).set(ad);
            invalidateSeasonCache();
        }

        // ─── mergeScorersOrAssists helper ───
        function mergeScorersOrAssists(listA, listB) {
            const map = {};
            const merged = [];
            const all = [...(listA || []), ...(listB || [])];
            for (const item of all) {
                const key = (item.player || '').toLowerCase().replace(/\s/g, '');
                if (!key) continue;
                if (map[key]) {
                    const countField = item.goals !== undefined ? 'goals' : 'assists';
                    map[key][countField] = (map[key][countField] || 0) + (item[countField] || 0);
                } else {
                    map[key] = { ...item };
                    merged.push(map[key]);
                }
            }
            return merged;
        }

        // ─── REPLACED: getExistingMatchResult ───
        async function getExistingMatchResult(homeTeam, awayTeam) {
            const todayStr = getSASTToday();
            const yesterdayStr = getSASTYesterday();
            const pendingSnap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
            const pendingData = pendingSnap.val() || {};
            for (const key in pendingData) {
                const r = pendingData[key];
                const sameTeams = (r.homeTeam === homeTeam && r.awayTeam === awayTeam) || (r.homeTeam === awayTeam && r.awayTeam === homeTeam);
                const recentDate = r.date === todayStr || r.date === yesterdayStr;
                if (sameTeams && recentDate) return { found: true, data: r, key, location: 'pending' };
            }
            const approvedSnap = await database.ref(getSeasonPath(currentSeasonId, 'results')).once('value');
            const approvedData = approvedSnap.val() || {};
            for (const key in approvedData) {
                const r = approvedData[key];
                const sameTeams = (r.homeTeam === homeTeam && r.awayTeam === awayTeam) || (r.homeTeam === awayTeam && r.awayTeam === homeTeam);
                const recentDate = r.date === todayStr || r.date === yesterdayStr;
                if (sameTeams && recentDate) return { found: true, data: r, key, location: 'approved' };
            }
            return { found: false };
        }

        // ─── AUTocomplete setup ───
        function setupAutocomplete(inputId, dropdownId, teamName, type) {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            if (!input || !dropdown) return;

            input.addEventListener('input', function() {
                const query = this.value.trim().toLowerCase();
                if (!query) {
                    dropdown.style.display = 'none';
                    return;
                }
                let list = [];
                if (type === 'scorer') {
                    list = topScorerList.filter(p => p.team === teamName && p.name.toLowerCase().includes(query));
                } else {
                    list = topAssistantList.filter(p => p.team === teamName && p.name.toLowerCase().includes(query));
                }
                if (list.length === 0) {
                    dropdown.style.display = 'none';
                    return;
                }
                dropdown.innerHTML = '';
                list.forEach(p => {
                    const div = document.createElement('div');
                    div.textContent = p.name;
                    div.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        input.value = p.name;
                        dropdown.style.display = 'none';
                    });
                    dropdown.appendChild(div);
                });
                dropdown.style.display = 'block';
            });

            input.addEventListener('blur', function() {
                setTimeout(() => {
                    dropdown.style.display = 'none';
                }, 150);
            });

            document.addEventListener('click', function(e) {
                if (dropdown && !dropdown.contains(e.target) && e.target !== input) {
                    dropdown.style.display = 'none';
                }
            });
        }

        // ─── savePlayedOpponent (LaLiga path) ───
        async function savePlayedOpponent(managerKey, teamName, opponentName, date) {
            const safeKey = (managerKey + '_' + date + '_' + opponentName).replace(/[^a-zA-Z0-9_]/g, '_');
            await database.ref('laliga_played_opponents/' + safeKey).set({
                managerKey,
                teamName,
                opponentName,
                date,
                submittedAt: Date.now()
            });
        }

        async function getPlayedOpponents(managerKey) {
            const snap = await database.ref('laliga_played_opponents').once('value');
            const data = snap.val() || {};
            const played = [];
            for (const key in data) {
                if (data[key].managerKey === managerKey) {
                    played.push({ opponent: data[key].opponentName, date: data[key].date });
                }
            }
            return played;
        }

        // ─── validateDailyMatchLimit ───
        async function validateDailyMatchLimit(managerKey) {
            const sastDate = getSASTToday();
            const pendingSnap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
            const pendingData = pendingSnap.val() || {};
            const approvedSnap = await database.ref(getSeasonPath(currentSeasonId, 'results')).once('value');
            const approvedData = approvedSnap.val() || {};
            const allData = { ...pendingData, ...approvedData };
            let count = 0;
            for (const key in allData) {
                const entry = allData[key];
                if (entry.submittedBy === managerKey && entry.submittedAt) {
                    const entryDate = new Date(entry.submittedAt);
                    const entrySAST = new Date(entryDate.getTime() + (2 * 3600000));
                    const entryDateStr = entrySAST.toISOString().split('T')[0];
                    if (entryDateStr === sastDate) count++;
                }
            }
            if (count >= 3) {
                return {
                    allowed: false,
                    message: "You've reached your 3-match daily limit. Try again tomorrow (SAST midnight)."
                };
            }
            return { allowed: true, message: null };
        }

        // ─── findManagerKeyId ───
        async function findManagerKeyId(managerKey) {
            const snap = await database.ref('managerKeys').orderByChild('key').equalTo(managerKey).once('value');
            const keys = snap.val();
            if (!keys) return null;
            return Object.keys(keys)[0];
        }

        // ─── loadManagerKeys ───
        async function loadManagerKeys() {
            const snap = await database.ref('managerKeys').once('value');
            const data = snap.val() || {};
            managerKeysCache = {};
            for (const key in data) {
                const entry = data[key];
                if (entry && entry.key) {
                    managerKeysCache[key] = { ...entry, id: key };
                }
            }
            return managerKeysCache;
        }

        // ─── openPendingResultsModal ───
        async function openPendingResultsModal() {
            const todayStr = getSASTToday();
            const yesterdayStr = getSASTYesterday();

            function collectFixturesForDate(dateStr) {
                const list = [];
                const eventData = calendarEventsData[dateStr];
                if (!eventData || !eventData.tournaments) return list;
                const eventSeason = eventData.season;
                if (eventSeason !== undefined && eventSeason !== null && eventSeason !== currentSeasonId) return list;
                for (const tournament of eventData.tournaments) {
                    if (!tournament.name) continue;
                    const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, '');
                    if (normalized !== 'laliga') continue;
                    if (tournament.fixtures && Array.isArray(tournament.fixtures)) {
                        for (const fixture of tournament.fixtures) {
                            if (fixture.home && fixture.away) {
                                list.push({ date: dateStr, home: fixture.home, away: fixture.away });
                            }
                        }
                    }
                }
                return list;
            }

            function getDeadlineTimestamp(dateStr) {
                const [y, m, d] = dateStr.split('-').map(Number);
                const sastMidnightUTC = Date.UTC(y, m - 1, d) - (2 * 3600000);
                return sastMidnightUTC + (48 * 3600000);
            }

            function getCountdownHtml(dateStr, badgeId) {
                const deadline = getDeadlineTimestamp(dateStr);
                const remaining = deadline - Date.now();
                if (remaining <= 0) return `<span id="${badgeId}" style="color:#ef4444;font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1px;">⏰ EXPIRED</span>`;
                const hours = Math.floor(remaining / 3600000);
                const minutes = Math.floor((remaining % 3600000) / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                const color = remaining < 3600000 ? '#ef4444' : remaining < 10800000 ? '#f97316' : '#22c55e';
                return `<span id="${badgeId}" data-deadline="${deadline}" style="color:${color};font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1px;">⏱ ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}</span>`;
            }

            const resultsSnap = await database.ref(getSeasonPath(currentSeasonId, 'results')).once('value');
            const approvedData = resultsSnap.val() || {};
            const pendingSnap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
            const pendingData = pendingSnap.val() || {};

            const recordedSet = new Set();
            function makeMatchKey(home, away, date) {
                const sorted = [home, away].sort().join('_');
                return `${date}_${sorted}`;
            }

            for (const key in approvedData) {
                const r = approvedData[key];
                if (r.homeTeam && r.awayTeam && r.date) {
                    recordedSet.add(makeMatchKey(r.homeTeam, r.awayTeam, r.date));
                }
            }
            for (const key in pendingData) {
                const r = pendingData[key];
                if (r.homeTeam && r.awayTeam && r.date) {
                    recordedSet.add(makeMatchKey(r.homeTeam, r.awayTeam, r.date));
                }
            }

            let todayFixtures = collectFixturesForDate(todayStr).filter(f => !recordedSet.has(makeMatchKey(f.home, f.away, todayStr)));
            let yesterdayFixtures = collectFixturesForDate(yesterdayStr).filter(f => !recordedSet.has(makeMatchKey(f.home, f.away, yesterdayStr)));

            async function autoApplyNoContests(fixtures, dateStr) {
                for (const fix of fixtures) {
                    const matchKey = makeMatchKey(fix.home, fix.away, dateStr);
                    if (recordedSet.has(matchKey)) continue;
                    recordedSet.add(matchKey);
                    const matchText = `${fix.home} F - F ${fix.away} (No Contest)`;
                    const resultData = {
                        matchText,
                        date: dateStr,
                        homeTeam: fix.home,
                        awayTeam: fix.away,
                        homeScore: 0,
                        awayScore: 0,
                        matchType: 'forfeit',
                        forfeitType: 'no_contest',
                        submittedBy: 'system_auto',
                        submittedAt: Date.now(),
                        status: 'approved',
                        approvedAt: Date.now(),
                        approvedBy: 'system_auto',
                        autoGenerated: true
                    };
                    await database.ref(getSeasonPath(currentSeasonId, 'results')).push(resultData);
                    await applyResultToTable(fix.home, fix.away, 0, 0, 'no_contest');
                }
                await loadCurrentSeasonDataSync();
                renderCurrentTab();
            }

            const todayDeadline = getDeadlineTimestamp(todayStr);
            const yesterdayDeadline = getDeadlineTimestamp(yesterdayStr);

            if (Date.now() > yesterdayDeadline && yesterdayFixtures.length > 0) {
                await autoApplyNoContests(yesterdayFixtures, yesterdayStr);
                yesterdayFixtures = [];
            }
            if (Date.now() > todayDeadline && todayFixtures.length > 0) {
                await autoApplyNoContests(todayFixtures, todayStr);
                todayFixtures = [];
            }

            if (todayFixtures.length === 0 && yesterdayFixtures.length === 0) {
                showModal(`
                    <h3>⏳ Pending Fixtures</h3>
                    <div class="empty-state"><div class="empty-icon">✅</div><p>No unsubmitted matches found for today or yesterday.</p></div>
                    <div class="modal-btns"><button class="modal-btn-cancel" id="closePendingEmptyBtn">Close</button></div>
                `);
                document.getElementById('closePendingEmptyBtn').onclick = closeModal;
                return;
            }

            function renderFixtureCard(fix, dateStr) {
                const homeIcon = getTeamIconHtml(fix.home, 'team-icon-sm');
                const awayIcon = getTeamIconHtml(fix.away, 'team-icon-sm');
                return `
                    <div class="pending-item" data-home="${escapeHtml(fix.home)}" data-away="${escapeHtml(fix.away)}" data-date="${escapeHtml(dateStr)}">
                        <div class="pi-teams">
                            ${homeIcon}
                            <span>${escapeHtml(fix.home)}</span>
                            <span style="color:var(--laliga-red);font-weight:400;">vs</span>
                            <span>${escapeHtml(fix.away)}</span>
                            ${awayIcon}
                        </div>
                        <div class="pi-actions">
                            <button class="btn-sm btn-confirm no-contest-btn" style="padding:8px 20px;font-size:1.1rem;">🤝 No Contest</button>
                            <button class="btn-sm btn-edit dismiss-btn" style="padding:8px 20px;font-size:1.1rem;">✓ Dismiss</button>
                        </div>
                    </div>
                `;
            }

            let html = `
                <h3>⏳ Pending Fixtures</h3>
                <p style="color:rgba(255,255,255,0.6);margin-bottom:16px;font-size:1.3rem;">Unsubmitted LaLiga matches from today and yesterday.</p>
                <div style="border-left:4px solid var(--laliga-red);padding-left:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
                    <h4 style="color:var(--laliga-red);font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;">📅 TODAY'S UNSUBMITTED</h4>
                    ${getCountdownHtml(todayStr, 'todayCountdown')}
                </div>
                ${todayFixtures.length ? todayFixtures.map(f => renderFixtureCard(f, todayStr)).join('') : '<div style="color:rgba(255,255,255,0.3);padding:16px 0;font-size:1.2rem;">✅ All today\'s matches submitted.</div>'}
                <div style="border-left:4px solid #f97316;padding-left:16px;margin-top:24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
                    <h4 style="color:#f97316;font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;">📅 YESTERDAY'S UNSUBMITTED</h4>
                    ${getCountdownHtml(yesterdayStr, 'yesterdayCountdown')}
                </div>
                ${yesterdayFixtures.length ? yesterdayFixtures.map(f => renderFixtureCard(f, yesterdayStr)).join('') : '<div style="color:rgba(255,255,255,0.3);padding:16px 0;font-size:1.2rem;">✅ All yesterday\'s matches submitted.</div>'}
                <div class="modal-btns"><button class="modal-btn-cancel" id="closePendingBtn">Close</button></div>
            `;

            showModal(html, true);

            if (pendingFixturesCountdownInterval) clearInterval(pendingFixturesCountdownInterval);
            pendingFixturesCountdownInterval = setInterval(() => {
                ['todayCountdown', 'yesterdayCountdown'].forEach((id, i) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    const deadline = parseInt(el.dataset.deadline);
                    if (!deadline) return;
                    const remaining = deadline - Date.now();
                    if (remaining <= 0) {
                        el.textContent = '⏰ EXPIRED';
                        el.style.color = '#ef4444';
                        return;
                    }
                    const hours = Math.floor(remaining / 3600000);
                    const minutes = Math.floor((remaining % 3600000) / 60000);
                    const seconds = Math.floor((remaining % 60000) / 1000);
                    el.style.color = remaining < 3600000 ? '#ef4444' : remaining < 10800000 ? '#f97316' : '#22c55e';
                    el.textContent = `⏱ ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
                });
            }, 1000);

            document.getElementById('closePendingBtn').onclick = () => {
                if (pendingFixturesCountdownInterval) {
                    clearInterval(pendingFixturesCountdownInterval);
                    pendingFixturesCountdownInterval = null;
                }
                closeModal();
            };

            document.querySelectorAll('.no-contest-btn').forEach(btn => {
                btn.onclick = async () => {
                    const item = btn.closest('.pending-item');
                    const home = item.dataset.home;
                    const away = item.dataset.away;
                    const date = item.dataset.date;
                    const matchKey = makeMatchKey(home, away, date);
                    if (recordedSet.has(matchKey)) {
                        item.style.opacity = '0.3';
                        setTimeout(() => item.remove(), 400);
                        return;
                    }
                    if (!confirm(`Mark ${home} vs ${away} as NO CONTEST (F - F)?`)) return;
                    btn.disabled = true;
                    btn.innerHTML = '⏳';
                    try {
                        recordedSet.add(matchKey);
                        const matchText = `${home} F - F ${away} (No Contest)`;
                        const resultData = {
                            matchText,
                            date,
                            homeTeam: home,
                            awayTeam: away,
                            homeScore: 0,
                            awayScore: 0,
                            matchType: 'forfeit',
                            forfeitType: 'no_contest',
                            submittedBy: 'admin',
                            submittedAt: Date.now(),
                            status: 'approved',
                            approvedAt: Date.now(),
                            approvedBy: 'admin'
                        };
                        await database.ref(getSeasonPath(currentSeasonId, 'results')).push(resultData);
                        await applyResultToTable(home, away, 0, 0, 'no_contest');
                        await loadCurrentSeasonDataSync();
                        renderCurrentTab();
                        item.style.opacity = '0.3';
                        item.style.transition = 'opacity 0.3s';
                        setTimeout(() => item.remove(), 400);
                    } catch (e) {
                        alert('Error: ' + e.message);
                        btn.disabled = false;
                        btn.innerHTML = '🤝 No Contest';
                    }
                };
            });

            document.querySelectorAll('.dismiss-btn').forEach(btn => {
                btn.onclick = () => {
                    const item = btn.closest('.pending-item');
                    item.style.opacity = '0.3';
                    item.style.transition = 'opacity 0.3s';
                    setTimeout(() => item.remove(), 300);
                };
            });
        }

        // ─── revokeResultStats ───
        async function revokeResultStats(resultData) {
            const homeTeam = resultData.homeTeam;
            const awayTeam = resultData.awayTeam;
            const homeScore = resultData.homeScore || 0;
            const awayScore = resultData.awayScore || 0;
            const isForfeit = resultData.matchType === 'forfeit' || (resultData.matchText && resultData.matchText
                .toLowerCase().includes('forfeit'));
            const forfeitType = resultData.forfeitType || '';
            const isNoContest = forfeitType === 'no_contest' || (resultData.matchText && resultData.matchText.toLowerCase()
                .includes('no contest'));
            const tablePath = getSeasonPath(currentSeasonId, 'table');
            const snap = await database.ref(tablePath).once('value');
            const tableData = snap.val() || {};
            let homeKey = null,
                homeEntry = null;
            let awayKey = null,
                awayEntry = null;
            for (const key in tableData) {
                if (tableData[key].name === homeTeam) { homeKey = key;
                    homeEntry = { ...tableData[key] }; }
                if (tableData[key].name === awayTeam) { awayKey = key;
                    awayEntry = { ...tableData[key] }; }
            }
            if (!homeEntry || !awayEntry) return;

            if (isNoContest) {
                homeEntry.p = Math.max(0, (homeEntry.p || 0) - 1);
                homeEntry.l = Math.max(0, (homeEntry.l || 0) - 1);
                awayEntry.p = Math.max(0, (awayEntry.p || 0) - 1);
                awayEntry.l = Math.max(0, (awayEntry.l || 0) - 1);
            } else if (isForfeit) {
                const winner = homeScore > awayScore ? homeEntry : awayEntry;
                const loser = homeScore > awayScore ? awayEntry : homeEntry;
                winner.p = Math.max(0, (winner.p || 0) - 1);
                winner.w = Math.max(0, (winner.w || 0) - 1);
                winner.pts = Math.max(0, (winner.pts || 0) - 3);
                loser.p = Math.max(0, (loser.p || 0) - 1);
                loser.l = Math.max(0, (loser.l || 0) - 1);
                loser.gd = (loser.gd || 0) + 3;
                loser.gc = Math.max(0, (loser.gc || 0) - 1);
            } else {
                homeEntry.p = Math.max(0, (homeEntry.p || 0) - 1);
                awayEntry.p = Math.max(0, (awayEntry.p || 0) - 1);
                homeEntry.gs = Math.max(0, (homeEntry.gs || 0) - homeScore);
                homeEntry.gc = Math.max(0, (homeEntry.gc || 0) - awayScore);
                awayEntry.gs = Math.max(0, (awayEntry.gs || 0) - awayScore);
                awayEntry.gc = Math.max(0, (awayEntry.gc || 0) - homeScore);
                if (homeScore > awayScore) {
                    homeEntry.w = Math.max(0, (homeEntry.w || 0) - 1);
                    homeEntry.pts = Math.max(0, (homeEntry.pts || 0) - 3);
                    awayEntry.l = Math.max(0, (awayEntry.l || 0) - 1);
                } else if (homeScore < awayScore) {
                    awayEntry.w = Math.max(0, (awayEntry.w || 0) - 1);
                    awayEntry.pts = Math.max(0, (awayEntry.pts || 0) - 3);
                    homeEntry.l = Math.max(0, (homeEntry.l || 0) - 1);
                } else {
                    homeEntry.d = Math.max(0, (homeEntry.d || 0) - 1);
                    homeEntry.pts = Math.max(0, (homeEntry.pts || 0) - 1);
                    awayEntry.d = Math.max(0, (awayEntry.d || 0) - 1);
                    awayEntry.pts = Math.max(0, (awayEntry.pts || 0) - 1);
                }
            }
            homeEntry.gd = (homeEntry.gs || 0) - (homeEntry.gc || 0);
            awayEntry.gd = (awayEntry.gs || 0) - (awayEntry.gc || 0);
            await database.ref(tablePath + '/' + homeKey).set(homeEntry);
            await database.ref(tablePath + '/' + awayKey).set(awayEntry);

            // Reverse scorers
            const scorersPath = getSeasonPath(currentSeasonId, 'topScorers/list');
            const assistsPath = getSeasonPath(currentSeasonId, 'topAssistants/list');
            await loadTopScorerData();
            await loadTopAssistantData();

            const scorerTeams = [
                ...(resultData.goalScorers?.home || []).map(s => ({ ...s, team: homeTeam })),
                ...(resultData.goalScorers?.away || []).map(s => ({ ...s, team: awayTeam }))
            ];
            for (const s of scorerTeams) {
                const existing = findMatchingPlayer(topScorerList, s.player, s.team);
                if (existing && existing.key) {
                    const newCount = Math.max(0, (existing.count || 0) - (s.goals || 1));
                    if (newCount === 0) await database.ref(scorersPath + '/' + existing.key).remove();
                    else await database.ref(scorersPath + '/' + existing.key + '/count').set(newCount);
                }
            }

            const assistTeams = [
                ...(resultData.userAssists?.home || []).map(a => ({ ...a, team: homeTeam })),
                ...(resultData.userAssists?.away || []).map(a => ({ ...a, team: awayTeam }))
            ];
            for (const a of assistTeams) {
                const existing = findMatchingPlayer(topAssistantList, a.player, a.team);
                if (existing && existing.key) {
                    const newCount = Math.max(0, (existing.count || 0) - (a.assists || 1));
                    if (newCount === 0) await database.ref(assistsPath + '/' + existing.key).remove();
                    else await database.ref(assistsPath + '/' + existing.key + '/count').set(newCount);
                }
            }

            // Remove played opponent records
            const playedSnap = await database.ref('laliga_played_opponents').once('value');
            const playedData = playedSnap.val() || {};
            for (const key in playedData) {
                const entry = playedData[key];
                const matchesHome = entry.teamName === homeTeam && entry.opponentName === awayTeam &&
                    entry.date === resultData.date;
                const matchesAway = entry.teamName === awayTeam && entry.opponentName === homeTeam &&
                    entry.date === resultData.date;
                if (matchesHome || matchesAway) {
                    await database.ref('laliga_played_opponents/' + key).remove();
                }
            }
        }

        // ─── applyScorersFromScan and applyAssistsFromScan ───
        function normalizeName(name) {
            return (name || '').toLowerCase().replace(/\s/g, '');
        }

        function findMatchingPlayer(list, playerName, teamName) {
            const pNorm = normalizeName(playerName);
            const tNorm = normalizeName(teamName);
            for (const item of list) {
                if (normalizeName(item.name) === pNorm && normalizeName(item.team) === tNorm) {
                    return item;
                }
            }
            return null;
        }

        async function applyScorersFromScan(scorers, team) {
            if (!scorers || !scorers.length) return;
            const path = getSeasonPath(currentSeasonId, 'topScorers/list');
            for (const s of scorers) {
                if (!s.player) continue;
                const existing = findMatchingPlayer(topScorerList, s.player, team);
                if (existing && existing.key) {
                    const newCount = (existing.count || 0) + (s.goals || 1);
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                } else {
                    await database.ref(path).push({ name: s.player, team, count: s.goals || 1, imageUrl: '' });
                }
            }
            await loadTopScorerData();
        }

        async function applyAssistsFromScan(assists, team) {
            if (!assists || !assists.length) return;
            const path = getSeasonPath(currentSeasonId, 'topAssistants/list');
            for (const a of assists) {
                if (!a.player) continue;
                const existing = findMatchingPlayer(topAssistantList, a.player, team);
                if (existing && existing.key) {
                    const newCount = (existing.count || 0) + (a.assists || 1);
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                } else {
                    await database.ref(path).push({ name: a.player, team, count: a.assists || 1, imageUrl: '' });
                }
            }
            await loadTopAssistantData();
        }

        // ─── openMultiScanModal (unchanged) ───
        function pickFiles(accept) {
            return new Promise(res => {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = accept;
                inp.multiple = true;
                inp.onchange = e => res(Array.from(e.target.files));
                inp.click();
            });
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

            showModal(`

                <div id="multiScanBlocks">${blocksHtml}</div>
                <button class="add-match-block-btn" id="addMatchBlockBtn">+ Add Another Match</button>

        async function scanAllMatches() {
            const statusEl = document.getElementById('scanAllStatus');
            const scanBtn = document.getElementById('scanAllBtn');
            if (scanBtn) {
                scanBtn.disabled = true;
                scanBtn.innerHTML = '<span class="btn-spinner"></span> Scanning…';

            for (let i = 0; i < multiScanMatches.length; i++) {
                const match = multiScanMatches[i];
                if (!match.images.length) continue;
                if (statusEl) statusEl.innerHTML =
                    `<div class="status-msg status-loading">🤖 Scanning Match ${i + 1} of ${multiScanMatches.length}…</div>`;
                try {
                    const scanned = await scanMatchImages(match.images, statusEl);
                    results.push({ matchIdx: i + 1, scanned });
                } catch (e) {
                    results.push({ matchIdx: i + 1, scanned: null, error: e.message });
                }

            openMultiScanPreviewModal(results);
        }

        async function scanMatchImages(images, statusEl) {
            const contentParts = [{
                type: 'text',
                text: `Analyze these football/soccer match screenshot(s) and extract the following information in JSON format only (no markdown, no explanation, no code blocks): { "homeTeam": "team name exactly as shown", "awayTeam": "team name exactly as shown", "homeScore": 0, "awayScore": 0, "homeScorers": [{"player": "name", "goals": 1}], "awayScorers": [{"player": "name", "goals": 1}], "homeAssists": [{"player": "name", "assists": 1}], "awayAssists": [{"player": "name", "assists": 1}], "matchday": null } Use team names EXACTLY as shown in the image. If you cannot find scorers or assists, return empty arrays. Return ONLY the JSON object, nothing else.`
            }];

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">🖼️ Preparing images...</div>';

            for (const img of images) {
                const base64 = await fileToBase64(img.file);
                const mimeType = img.file.type || 'image/jpeg';
                contentParts.push({
                    type: 'image_url',
                    image_url: { url: `data:${mimeType};base64,${base64}` }
                });
            }

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">🤖 Sending to AI...</div>';

            const response = await fetch(RENDER_URL + '/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'meta-llama/llama-4-scout-17b-16e-instruct',
                    messages: [{ role: 'user', content: contentParts }],
                    max_tokens: 1000,
                    temperature: 0
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err?.error?.message || 'Scan API error: ' + response.status);
            }

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">📖 Reading response...</div>';

            const data = await response.json();
            const text = data.choices?.[0]?.message?.content || data.result || data.response || '';
            const clean = text.replace(/```json|```/g, '').trim();

            let parsed;
            try {
                const jsonMatch = clean.match(/\{[\s\S]*\}/);
                parsed = JSON.parse(jsonMatch ? jsonMatch[0] : clean);
            } catch (e) {
                throw new Error('Could not parse AI response: ' + clean.substring(0, 100));
            }

            if (parsed.homeTeam) parsed.homeTeam = mapTeamName(parsed.homeTeam);
            if (parsed.awayTeam) parsed.awayTeam = mapTeamName(parsed.awayTeam);
            parsed.homeScore = parseInt(parsed.homeScore) || 0;
            parsed.awayScore = parseInt(parsed.awayScore) || 0;

            if (statusEl) statusEl.innerHTML =
                `<div class="status-msg status-success">✅ Detected: ${parsed.homeTeam} vs ${parsed.awayTeam}</div>`;
            return parsed;
        }

            previewMatches = results.map(r => {
                if (r.error || !r.scanned) {
                    return {
                        matchIdx: r.matchIdx,
                        error: r.error || 'Unknown error',
                        homeTeam: '',
                        awayTeam: '',
                        homeScore: 0,
                        awayScore: 0,
                        forfeitType: 'none',
                        matchday: '',
                        date: '',
                        venue: '',
                        matchType: '',
                        aggregate: '',
                        homeScorers: [],
                        awayScorers: [],
                        homeAssists: [],
                        awayAssists: []
                    };
                }
                const s = r.scanned;
                return {
                    matchIdx: r.matchIdx,
                    error: null,
                    homeTeam: s.homeTeam || '',
                    awayTeam: s.awayTeam || '',
                    homeScore: s.homeScore || 0,
                    awayScore: s.awayScore || 0,
                    forfeitType: 'none',
                    matchday: s.matchday || '',
                    date: '',
                    venue: '',
                    matchType: '',
                    aggregate: '',
                    homeScorers: s.homeScorers || [],
                    awayScorers: s.awayScorers || [],
                    homeAssists: s.homeAssists || [],
                    awayAssists: s.awayAssists || []
                };
            });
            renderPreviewModal();
        }

        function renderPreviewModal() {
            const teamNames = teamsData.map(t => t.name).sort();

            let matchesHtml = previewMatches.map((m, idx) => {
                const makeOpts = (selected) => teamNames.map(t =>
                    `<option value="${t}" ${t === selected ? 'selected' : ''}>${escapeHtml(t)}</option>`
                ).join('');

                const hsHome = (m.homeScorers || []).map((s, i) =>
                    `<span class="scorer-badge">⚽ ${escapeHtml(s.player)} (${s.goals})<button class="remove-scorer" data-matchidx="${idx}" data-side="homeScorers" data-sidx="${i}">✖</button></span>`
