<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --laliga-red: #E9102E;
      --laliga-red-light: #ff2a46;
      --laliga-red-dark: #c40c26;
      --laliga-navy: #1A2B5E;
      --laliga-navy-dark: #0E1A3A;
      --laliga-white: #ffffff;
      --glass-bg: rgba(233,16,46,0.07);
      --glass-border: rgba(233,16,46,0.25);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulseRed {
      0%,100% { box-shadow: 0 0 0 0 rgba(233,16,46,0.4); }
      50%      { box-shadow: 0 0 0 12px rgba(233,16,46,0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--laliga-navy-dark);
      min-height: 100vh;
      overflow-x: auto;
      min-width: 1200px;
      width: 1200px;
      margin: 0 auto;
      font-size: 20px;
      padding-bottom: 3rem;
    }

    /* ─── NAVBAR ─── */
    .navbar {
      background: var(--laliga-red);
      border-bottom: 3px solid var(--laliga-navy);
      padding: 0 2rem;
      height: 100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      animation: fadeInDown 0.5s ease both;
    }
    .navbar-logo { height: 74px; max-width: 260px; object-fit: contain; cursor: pointer; transition: transform 0.3s; }
    .navbar-logo:hover { transform: scale(1.05); }
    .navbar-logo-placeholder {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem; letter-spacing: 3px;
      color: var(--laliga-navy); cursor: pointer; font-weight: bold;
    }
    .menu-btn {
      background: var(--laliga-navy);
      border: 2px solid var(--laliga-red-light);
      width: 70px; height: 70px; border-radius: 20px;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 8px;
      cursor: pointer; transition: all 0.3s;
    }
    .menu-btn span { width: 32px; height: 4px; background: var(--laliga-red); border-radius: 4px; transition: all 0.3s; }
    .menu-btn:hover { background: var(--laliga-navy-dark); transform: rotate(90deg); }

    /* ─── SIDE MENU ─── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 199; display: none; backdrop-filter: blur(3px); }
    .overlay.active { display: block; }
    .side-menu {
      position: fixed; top: 0; right: -360px; width: 360px; height: 100%;
      background: rgba(14,26,58,0.98); backdrop-filter: blur(20px);
      border-left: 2px solid var(--laliga-red);
      z-index: 200; padding: 40px 28px;
      transition: right 0.35s cubic-bezier(.4,0,.2,1);
    }
    .side-menu.active { right: 0; }
    .close-menu { text-align: right; font-size: 2.8rem; cursor: pointer; color: var(--laliga-white); margin-bottom: 40px; line-height: 1; transition: color 0.2s; }
    .close-menu:hover { color: var(--laliga-red); }
    .menu-item {
      padding: 20px 28px; margin: 12px 0;
      border: 1px solid rgba(233,16,46,0.3); border-radius: 20px;
      cursor: pointer; font-weight: 600; font-size: 1.5rem;
      color: var(--laliga-white); transition: all 0.2s;
      font-family: 'Rajdhani', sans-serif;
    }
    .menu-item:hover { background: var(--laliga-red); border-color: var(--laliga-white); color: var(--laliga-white); transform: translateX(8px); }

    /* ─── SLIDESHOW ─── */
    .slideshow-wrapper { padding: 36px 36px 20px; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.7s ease 0.2s both; }
    .slideshow-frame {
      width: 100%; max-width: 1100px; border-radius: 32px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(233,16,46,0.25);
      border: 2px solid var(--laliga-red);
      background: #000; display: flex; justify-content: center; align-items: center;
    }
    .slideshow-img { width: 100%; height: auto; max-height: 520px; object-fit: contain; display: block; transition: opacity 0.5s ease; }
    .dots-container { margin-top: 20px; display: flex; gap: 12px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(233,16,46,0.3); cursor: pointer; transition: all 0.25s; }
    .dot.active { background: var(--laliga-red); transform: scale(1.4); box-shadow: 0 0 12px rgba(233,16,46,0.7); }
    .dot:hover { background: var(--laliga-red-light); }

    /* ─── SEASON BAR ─── */
    .season-bar { display: flex; justify-content: center; margin: 24px 0 16px; }
    .season-controls {
      display: flex; align-items: center; gap: 20px;
      background: rgba(14,26,58,0.8); border: 2px solid var(--laliga-red);
      padding: 12px 32px; border-radius: 80px; backdrop-filter: blur(8px);
    }
    .season-arrow {
      background: rgba(233,16,46,0.15); border: 1px solid var(--laliga-red);
      width: 56px; height: 56px; border-radius: 50%;
      font-size: 2rem; cursor: pointer; color: var(--laliga-white);
      font-weight: bold; transition: all 0.2s; line-height: 1;
    }
    .season-arrow:hover:not(:disabled) { background: var(--laliga-red); color: var(--laliga-white); transform: scale(1.1); }
    .season-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
    .season-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem; letter-spacing: 3px;
      color: var(--laliga-white); min-width: 180px; text-align: center;
    }
    .season-admin-btns { display: flex; gap: 10px; margin-left: 10px; }
    .season-admin-btn {
      background: rgba(233,16,46,0.15); border: 1px solid var(--laliga-red);
      padding: 8px 20px; border-radius: 40px; font-weight: 600;
      cursor: pointer; color: var(--laliga-white); font-size: 1.1rem;
      font-family: 'Rajdhani', sans-serif; transition: all 0.2s;
    }
    .season-admin-btn:hover { background: var(--laliga-red); }

    /* ─── TABS ─── */
    .tabs-container {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      margin: 28px 36px 0;
      background: rgba(14,26,58,0.7); border: 2px solid var(--laliga-red);
      border-radius: 80px; padding: 12px 20px; backdrop-filter: blur(8px);
      max-width: 1100px; margin-left: auto; margin-right: auto;
      animation: fadeInUp 0.5s ease 0.3s both;
    }
    .tabs-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .tab-btn {
      background: transparent; border: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.3rem; font-weight: 700;
      padding: 10px 28px; cursor: pointer;
      color: rgba(255,255,255,0.6); border-radius: 60px;
      letter-spacing: 0.5px; transition: all 0.25s; white-space: nowrap;
    }
    .tab-btn.active { background: var(--laliga-red); color: var(--laliga-white); }
    .tab-btn:hover:not(.active) { color: var(--laliga-white); background: rgba(233,16,46,0.2); }

    /* ─── CONTENT CARD ─── */
    .content-card {
      margin: 24px 36px 40px;
      background: var(--glass-bg); backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: 32px;
      padding: 32px;
      min-height: 200px;
      animation: fadeInUp 0.5s ease 0.4s both;
    }

    /* ─── LOADING ─── */
    .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 24px; }
    .spinner { width: 60px; height: 60px; border: 5px solid rgba(233,16,46,0.2); border-top-color: var(--laliga-red); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loading-spinner span { color: rgba(255,255,255,0.6); font-size: 1.4rem; font-family: 'Rajdhani', sans-serif; }

    /* ─── EMPTY STATE ─── */
    .empty-state { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.4); }
    .empty-state .empty-icon { font-size: 5rem; margin-bottom: 20px; }
    .empty-state p { font-size: 2rem; font-weight: 500; font-family: 'Rajdhani', sans-serif; }

    /* ─── TABLE WRAPPER with horizontal scroll ─── */
    .table-scroll-wrap {
      overflow-x: auto;
      border-radius: 20px;
      position: relative;
    }

    /* ─── LEAGUE TABLE ─── */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Rajdhani', sans-serif;
      min-width: 900px;
      background: var(--laliga-red);
      color: var(--laliga-navy);
    }
    .stats-table thead th {
      background: rgba(26,43,94,0.2);
      color: var(--laliga-navy);
      font-size: 1.3rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 16px 18px;
      border-bottom: 2px solid var(--laliga-navy);
      white-space: nowrap;
      z-index: 20;
    }

    /* Sticky pos column */
    .stats-table th:first-child,
    .stats-table td:first-child {
      position: sticky;
      left: 0;
      z-index: 25;
      background: var(--laliga-red);
      width: 64px;
      min-width: 64px;
    }
    .stats-table thead th:first-child { background: rgba(233,16,46,0.95); z-index: 30; }

    /* Sticky club column */
    .stats-table th:nth-child(2),
    .stats-table td:nth-child(2) {
      position: sticky;
      left: 64px;
      z-index: 24;
      background: var(--laliga-red);
      box-shadow: 4px 0 8px -2px rgba(26,43,94,0.45);
      border-right: 2px solid rgba(26,43,94,0.35);
    }
    .stats-table thead th:nth-child(2) { background: rgba(233,16,46,0.95); z-index: 30; }

    .stats-table tbody tr { border-bottom: 1px solid rgba(26,43,94,0.2); transition: background 0.2s; }
    .stats-table tbody tr:hover { background: rgba(26,43,94,0.1); }
    .stats-table td {
      padding: 14px 18px;
      color: var(--laliga-navy);
      font-size: 1.3rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .stats-table td.stat-number {
      font-size: 2.6rem !important;
      font-weight: 800;
      line-height: 1.2;
    }
    .team-name-text {
      font-weight: 700;
      font-size: 2.8rem !important;
      color: var(--laliga-navy);
    }
    .pts-cell { font-weight: 800; color: var(--laliga-navy); font-size: 1.5rem; }
    .rank-cell { font-weight: 700; color: var(--laliga-navy); font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; }

    /* ─── TABLE HEADER ROW ─── */
    .table-header-row {
      display: flex;
      align-items: center;
      background: var(--laliga-red);
      border-radius: 20px 20px 0 0;
      padding: 0;
      overflow: hidden;
      border: 2px solid rgba(26,43,94,0.3);
      border-bottom: none;
    }
    .table-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 14px 18px;
      background: var(--laliga-red);
      border-radius: 20px 20px 0 0;
      border: 2px solid rgba(26,43,94,0.2);
      border-bottom: 3px solid var(--laliga-navy);
      align-items: center;
    }
    .table-actions-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--laliga-navy);
      letter-spacing: 2px;
      flex: 1;
    }
    .add-btn {
      background: rgba(26,43,94,0.15);
      border: 2px solid var(--laliga-navy);
      color: var(--laliga-navy);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-btn:hover { background: var(--laliga-navy); color: var(--laliga-red); transform: translateY(-2px); }
    .three-dot-btn {
      background: rgba(26,43,94,0.15);
      border: 2px solid var(--laliga-navy);
      color: var(--laliga-navy);
      font-size: 2.2rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .three-dot-btn:hover { background: var(--laliga-navy); color: var(--laliga-red); }

    /* ─── TOP SCORERS & TOP ASSISTANTS ─── */
    .stats-list {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Rajdhani', sans-serif;
      background: var(--laliga-red);
      color: var(--laliga-navy);
    }
    .stats-list thead th {
      background: rgba(26,43,94,0.15);
      color: var(--laliga-navy);
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 18px 22px;
      border-bottom: 2px solid var(--laliga-navy);
    }
    .stats-list tbody tr { border-bottom: 1px solid rgba(26,43,94,0.2); transition: background 0.2s; }
    .stats-list tbody tr:hover { background: rgba(26,43,94,0.1); }
    .stats-list td {
      padding: 18px 22px;
      color: var(--laliga-navy);
      font-size: 1.4rem;
      font-weight: 600;
    }
    .stats-list td:first-child { color: var(--laliga-navy); font-family: 'Bebas Neue', sans-serif; font-size: 2rem; font-weight: bold; }
    .count-badge {
      background: rgba(26,43,94,0.2);
      border: 1px solid var(--laliga-navy);
      color: var(--laliga-navy);
      padding: 6px 22px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.4rem;
    }
    .stat-team-cell { display: flex; align-items: center; gap: 16px; color: var(--laliga-navy); }

    /* TOP 3 BLOCKS */
    .top3-container {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 40px;
      flex-wrap: nowrap;
      width: 100%;
    }
    .top3-block {
      position: relative;
      text-align: center;
      flex: 1;
      background: rgba(26,43,94,0.4);
      border-radius: 0;
      padding: 0;
      transition: transform 0.3s;
      margin: 0;
      min-width: 0;
    }
    .top3-block:first-child { border-top-left-radius: 32px; border-bottom-left-radius: 32px; }
    .top3-block:last-child { border-top-right-radius: 32px; border-bottom-right-radius: 32px; }
    .top3-block:hover { transform: translateY(-8px); z-index: 5; }
    .player-image-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border: 3px solid var(--laliga-red);
      background: #0E1A3A;
      margin: 0;
      border-radius: 0;
    }
    .top3-block:first-child .player-image-wrapper { border-top-left-radius: 32px; border-bottom-left-radius: 32px; }
    .top3-block:last-child .player-image-wrapper { border-top-right-radius: 32px; border-bottom-right-radius: 32px; }
    .player-img { width: 100%; height: 100%; object-fit: cover; }
    .medal-badge {
      position: absolute; top: 12px; left: 12px;
      font-size: 3rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); z-index: 2;
    }
    .edit-block-btn {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.6); border: 1px solid var(--laliga-red);
      border-radius: 50%; width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.6rem; color: var(--laliga-white);
      transition: all 0.2s; z-index: 3;
    }
    .edit-block-btn:hover { background: var(--laliga-red); transform: scale(1.1); }
    .player-name-overlay {
      position: absolute; bottom: 16px; left: 16px;
      background: linear-gradient(90deg, rgba(0,0,0,0.7), rgba(0,0,0,0.3));
      color: white; font-family: 'Rajdhani', sans-serif;
      font-weight: 800; font-size: 1.6rem; padding: 6px 16px;
      border-radius: 40px; backdrop-filter: blur(4px); z-index: 2;
      letter-spacing: 0.5px; border-left: 3px solid var(--laliga-red); pointer-events: none;
    }
    .team-icon-overlay {
      position: absolute; bottom: 12px; right: 12px;
      width: 56px; height: 56px; background: rgba(0,0,0,0.4);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); padding: 6px; z-index: 2;
    }
    .team-icon-overlay img { width: 100%; height: 100%; object-fit: contain; }
    .top3-count {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--laliga-red);
      background: rgba(0,0,0,0.3); display: inline-block;
      padding: 8px 20px; border-radius: 60px; letter-spacing: 2px;
      margin-top: 12px; margin-bottom: 16px;
    }
    .rest-table-wrapper { margin-top: 20px; border-top: 2px solid var(--laliga-red); padding-top: 24px; }

    /* ─── FILTERS BAR ─── */
    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-end;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(26,43,94,0.3);
      border-radius: 28px;
    }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-group label {
      font-size: 1rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(255,255,255,0.6);
    }
    .filter-group select, .filter-group button {
      background: rgba(14,26,58,0.8); border: 1px solid var(--laliga-red);
      border-radius: 40px; padding: 12px 20px;
      font-family: 'Rajdhani', sans-serif; font-size: 1.2rem;
      font-weight: 600; color: var(--laliga-white);
      cursor: pointer; transition: all 0.2s;
    }
    .filter-group select:hover, .filter-group button:hover { background: var(--laliga-red); border-color: var(--laliga-white); }
    .clear-filters { background: rgba(233,16,46,0.2); }
    .filter-stats { font-size: 1rem; color: rgba(255,255,255,0.5); margin-left: auto; align-self: center; }

    /* ─── VIEW CALENDAR BUTTON ─── */
    .view-calendar-btn {
      background: rgba(233,16,46,0.15);
      border: 2px solid var(--laliga-red);
      color: var(--laliga-white);
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 12px 28px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      align-self: flex-end;
      text-decoration: none;
    }
    .view-calendar-btn:hover {
      background: var(--laliga-red);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(233,16,46,0.4);
    }

    /* ─── FIXTURE CARDS (red bg) ─── */
    .fixture-date-group { margin-bottom: 32px; animation: cardSlideIn 0.4s ease both; }
    .fixture-date-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: var(--laliga-white);
      margin-bottom: 14px;
      padding: 10px 20px;
      background: rgba(233,16,46,0.2);
      border-radius: 50px;
      border-left: 4px solid var(--laliga-red);
      display: inline-flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .fixture-date-label .date-text { font-size: 1.8rem; }
    .fixture-date-label .matchday-badge {
      background: rgba(233,16,46,0.5);
      padding: 4px 16px;
      border-radius: 40px;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: white;
    }
    .fixture-date-actions {
      display: inline-flex;
      gap: 8px;
      margin-left: auto;
    }
    .edit-matchday-btn, .set-active-btn {
      background: rgba(26,43,94,0.6);
      border: 1px solid var(--laliga-red);
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 1rem;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      color: var(--laliga-white);
      transition: all 0.2s;
    }

// ─── AUTO TABLE UPDATE (forfeit logic) ───
async function applyResultToTable(homeTeam, awayTeam, homeScore, awayScore, forfeitType) {
  const isNoContest = forfeitType === 'no_contest';
  const isForfeitWin = (forfeitType === 'forfeit_no_reply' || forfeitType === 'forfeit_agreement');
  
  const tableSnap = await database.ref(getSeasonPath(currentSeasonId, 'table')).once('value');
  const tableVal = tableSnap.val() || {};

  function findTeamEntry(name) {
    for (const [key, val] of Object.entries(tableVal)) {
      if (val.name === name) return { key, data: { ...val } };
    }
    return null;
  }

  const homeEntry = findTeamEntry(homeTeam);
  const awayEntry = findTeamEntry(awayTeam);
  if (!homeEntry || !awayEntry) return;

  const hd = homeEntry.data;
  const ad = awayEntry.data;

  if (isNoContest) {
    hd.p = (hd.p || 0) + 1;
    ad.p = (ad.p || 0) + 1;
  } 
  else if (isForfeitWin) {
    hd.p = (hd.p || 0) + 1;
    ad.p = (ad.p || 0) + 1;
    
    if (homeScore > awayScore) {
      hd.w = (hd.w || 0) + 1;
      hd.pts = (hd.pts || 0) + 3;
      ad.l = (ad.l || 0) + 1;
      ad.gd = (ad.gd || 0) - 3;
      ad.gc = (ad.gc || 0) + 1;
    } else {
      ad.w = (ad.w || 0) + 1;
      ad.pts = (ad.pts || 0) + 3;
      hd.l = (hd.l || 0) + 1;
      hd.gd = (hd.gd || 0) - 3;
      hd.gc = (hd.gc || 0) + 1;
    }
  } 
  else {
    hd.p = (hd.p || 0) + 1;
    ad.p = (ad.p || 0) + 1;
    hd.gs = (hd.gs || 0) + homeScore;
    hd.gc = (hd.gc || 0) + awayScore;
    ad.gs = (ad.gs || 0) + awayScore;
    ad.gc = (ad.gc || 0) + homeScore;
    hd.gd = (hd.gd || 0) + (homeScore - awayScore);
    ad.gd = (ad.gd || 0) + (awayScore - homeScore);
    
    if (homeScore > awayScore) {
      hd.w = (hd.w || 0) + 1;
      hd.pts = (hd.pts || 0) + 3;
      ad.l = (ad.l || 0) + 1;
    } else if (homeScore < awayScore) {
      ad.w = (ad.w || 0) + 1;
      ad.pts = (ad.pts || 0) + 3;
      hd.l = (hd.l || 0) + 1;
    } else {
      hd.d = (hd.d || 0) + 1;
      hd.pts = (hd.pts || 0) + 1;
      ad.d = (ad.d || 0) + 1;
      ad.pts = (ad.pts || 0) + 1;
    }
  }

  await database.ref(getSeasonPath(currentSeasonId, `table/${homeEntry.key}`)).set(hd);
  await database.ref(getSeasonPath(currentSeasonId, `table/${awayEntry.key}`)).set(ad);
}

// ─── Form / Last5 helpers ───
function getResultStatusForTeam(team, matchText) {
  const lower = matchText.toLowerCase();
  if (lower.includes("no contest") || lower.includes("f - f")) return "F";
  const isForfeit = lower.includes("forfeit") || lower.includes("forfeited");
  const parts = matchText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/);
  if (parts) {
    let home = parts[1].trim(), hs = parseInt(parts[2]), as2 = parseInt(parts[3]), away = parts[4].trim();
    if (home === team && hs > as2) return isForfeit ? "WF" : "W";
    if (home === team && hs < as2) return isForfeit ? "LF" : "L";
    if (away === team && as2 > hs) return isForfeit ? "WF" : "W";
    if (away === team && as2 < hs) return isForfeit ? "LF" : "L";
    if ((home === team || away === team) && hs === as2) return "D";
  }
  return null;
}

function getTeamLast5(team) {
  const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a,b)=>(b.md||0)-(a.md||0));
  const last5 = sorted.slice(0,5).map(r => getResultStatusForTeam(team, r.matchText)).filter(Boolean);
  while (last5.length < 5) last5.push(null);
  return last5.reverse();
}

function getLatestArrow(team) {
  const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a,b)=>(b.md||0)-(a.md||0));
  if (!sorted.length) return null;
  const s = getResultStatusForTeam(team, sorted[0].matchText);
  if (s === "W" || s === "WF") return "↑";
  if (s === "L" || s === "LF") return "↓";
  if (s === "D") return "→";
  return "⚪";
}

}

// ─── RENDER TABLE ───
function renderTable() {
  const sorted = [...teamsData].sort((a,b) => (b.pts||0)-(a.pts||0) || (b.gd||0)-(a.gd||0));

  let html = `
    <div class="table-actions">
      <span class="table-actions-title">🏆 League Table</span>
      ${isAdminMode ? `<button class="add-btn" id="addTeamBtnInner">+ Add Team</button>` : ''}
      <button class="three-dot-btn" id="threeDotBtn">⋮</button>
    </div>
    <div class="table-scroll-wrap">
      <table class="stats-table">
        <thead><tr><th>Pos</th><th>Club</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GS</th><th>GC</th><th>GD</th><th>Pts</th><th>Last 5</th>${isAdminMode ? '<th>Actions</th>' : ''}</tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="legend-row" id="legendContainer"></div>
  `;
  document.getElementById('contentCard').innerHTML = html;

  const tbody = document.getElementById('tableBody');
  sorted.forEach((team, idx) => {
    const pos = idx + 1;
    let barClass = '';
    let rowClass = '';
    if (currentSeasonId === 1) {
      if (pos <= 4) barClass = 'vbar-blue';
    } else if (currentSeasonId === 2) {
      if (pos <= 4) barClass = 'vbar-blue';
      else if (pos <= 8) barClass = 'vbar-orange';
      else if (pos <= 12) barClass = 'vbar-green';
      if (pos === 8) rowClass = 'dashed-sep';
    } else {
      if (pos <= 4) barClass = 'vbar-blue';
      else if (pos <= 8) barClass = 'vbar-orange';
      else if (pos <= 12) barClass = 'vbar-green';
      else if (pos >= 18) barClass = 'vbar-red';
      if (pos === 8) rowClass = 'dashed-sep';
      if (pos === 17) rowClass = 'dashed-sep-red';
    }
    const row = document.createElement('tr');
    if (rowClass) row.className = rowClass;

    const posCell = document.createElement('td');
    posCell.className = 'rank-cell stat-number';
    if (barClass) posCell.innerHTML = `<div class="pos-bar-wrap"><span class="vbar ${barClass}"></span>${pos}</div>`;
    else posCell.textContent = pos;
    row.appendChild(posCell);

    let arrowHtml = '';
    if (showFormArrows) {
      const a = getLatestArrow(team.name);
      if (a === '↑') arrowHtml = '<span class="arrow-up">↑</span> ';
      else if (a === '↓') arrowHtml = '<span class="arrow-down">↓</span> ';
      else if (a === '→') arrowHtml = '<span class="arrow-side">→</span> ';
      else arrowHtml = '<span class="arrow-side" style="opacity:0.3;">—</span> ';
    }
    const displayName = (currentView === 'player' && playerMap[team.name]) ? playerMap[team.name] : team.name;
    const iconHtml = getTeamIconHtml(team.name, 'team-icon-sm');
    const clubCell = document.createElement('td');
    clubCell.innerHTML = `<div class="team-cell-inner">${arrowHtml}${iconHtml}<span class="team-name-text">${displayName}</span></div>`;
    row.appendChild(clubCell);

    function mkNumCell(val) { const td = document.createElement('td'); td.textContent = val; td.className = 'stat-number'; return td; }

    row.appendChild(mkNumCell(team.p || 0));
    const w = currentSeasonId === 2 ? '🤷‍♂️' : (team.w || 0);
    const d = currentSeasonId === 2 ? '🤷‍♂️' : (team.d || 0);
    const l = currentSeasonId === 2 ? '🤷‍♂️' : (team.l || 0);
    row.appendChild(mkNumCell(w));
    row.appendChild(mkNumCell(d));
    row.appendChild(mkNumCell(l));

// ─── FIXTURES RENDERER ───
function renderFixtures() {
  const laligaFixtures = [];
  const today = new Date();
  today.setHours(0,0,0,0);
  
  for (const [date, eventData] of Object.entries(calendarEventsData)) {
    const eventSeason = eventData.season;
    if (eventSeason !== undefined && eventSeason !== null && eventSeason !== currentSeasonId) {
      continue;
    }
    if (eventData.tournaments && Array.isArray(eventData.tournaments)) {
      for (const tournament of eventData.tournaments) {
        let isLaLiga = false;
        if (tournament.name) {
          const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, '');
          if (normalized === 'laliga') isLaLiga = true;
        }
        if (isLaLiga && tournament.fixtures && Array.isArray(tournament.fixtures)) {
          for (const fixture of tournament.fixtures) {
            laligaFixtures.push({
              date: date,
              homeTeam: fixture.home,
              awayTeam: fixture.away,
              tournamentName: tournament.name,
              eventName: eventData.eventPairs?.[0]?.name || 'LaLiga',
              matchday: fixture.matchday || tournament.matchday || null
            });
          }
        }
      }
    }
  }
  
  laligaFixtures.sort((a, b) => new Date(a.date) - new Date(b.date));
  
  const allTeams = [...new Set(laligaFixtures.flatMap(f => [f.homeTeam, f.awayTeam]).filter(Boolean))].sort();
  const allMonths = [...new Set(laligaFixtures.map(f => f.date.substring(0,7)))].sort();
  const allMatchdays = [...new Set(laligaFixtures.map(f => f.matchday).filter(md => md !== null && md !== undefined))].sort((a,b)=>a-b);
  
  let filtered = [...laligaFixtures];
  if (currentFixTeamFilter && currentFixTeamFilter !== 'all') {
    filtered = filtered.filter(f => f.homeTeam === currentFixTeamFilter || f.awayTeam === currentFixTeamFilter);
  }
  if (currentFixMonthFilter && currentFixMonthFilter !== 'all') {
    filtered = filtered.filter(f => f.date.startsWith(currentFixMonthFilter));
  }
  if (currentFixMatchdayFilter && currentFixMatchdayFilter !== 'all') {
    filtered = filtered.filter(f => f.matchday === parseInt(currentFixMatchdayFilter));
  }
  
  const grouped = {};
  for (const fix of filtered) {
    if (!grouped[fix.date]) grouped[fix.date] = [];
    grouped[fix.date].push(fix);
  }
  
  let sortedDates = Object.keys(grouped).sort((a,b) => new Date(a) - new Date(b));
  let visibleDates = [];
  if (!showAllFixtures && activeFixtureDate && grouped[activeFixtureDate]) {
    visibleDates = [activeFixtureDate];
  } else {
    visibleDates = sortedDates;
  }
  
  const monthLabels = {
    '01':'January','02':'February','03':'March','04':'April',
    '05':'May','06':'June','07':'July','08':'August',
    '09':'September','10':'October','11':'November','12':'December'
  };
  
  let filtersHtml = `
    <div class="filters-bar">
      <div class="filter-group">
        <label>Team</label>
        <select id="fixTeamFilter">
          <option value="all">All Teams</option>
          ${allTeams.map(t => `<option value="${t}" ${currentFixTeamFilter===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="filter-group">
        <label>Month</label>
        <select id="fixMonthFilter">
          <option value="all">All Months</option>
          ${allMonths.map(m => {
            const [y, mo] = m.split('-');
            return `<option value="${m}" ${currentFixMonthFilter===m?'selected':''}>${monthLabels[mo] || mo} ${y}</option>`;
          }).join('')}
        </select>
      </div>
      ${allMatchdays.length > 0 ? `
      <div class="filter-group">
        <label>Matchday</label>
        <select id="fixMatchdayFilter">
          <option value="all">All Matchdays</option>
          ${allMatchdays.map(md => `<option value="${md}" ${currentFixMatchdayFilter==md?'selected':''}>Matchday ${md}</option>`).join('')}
        </select>
      </div>
      ` : ''}
      <div class="filter-group">
        <button id="clearFixFiltersBtn" class="clear-filters">Clear Filters</button>
      </div>
      <div class="filter-stats">${filtered.length} fixture${filtered.length !== 1 ? 's' : ''} found</div>
    </div>
  `;
  
  let contentHtml = '';
  if (visibleDates.length === 0) {
    let msg = 'No LaLiga fixtures found for Season ' + currentSeasonId;
    if (activeFixtureDate && !grouped[activeFixtureDate]) msg += ` (Active date ${activeFixtureDate} has no fixtures)`;
    contentHtml = '<div class="empty-state"><div class="empty-icon">📅</div><p>' + msg + '</p></div>';
  } else {
    for (const dateStr of visibleDates) {
      const dateObj = new Date(dateStr);
      const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const dayName = dayNames[dateObj.getDay()];
      const day = dateObj.getDate();
      const [y, mo] = dateStr.split('-');
      const monthName = monthLabels[mo] || mo;
      const isPast = dateObj < today;
      const matchdayNum = calendarEventsData[dateStr]?.matchday || '';
      const matchdayText = matchdayNum ? ` · Matchday ${matchdayNum}` : '';
      const dateLabelText = `${dayName}, ${day} ${monthName} ${y}${isPast ? ' · Played' : ''}${matchdayText}`;
      
      let adminActions = '';
      if (isAdminMode) {
        adminActions = `
          <div class="fixture-date-actions">
            <button class="edit-matchday-btn" data-date="${dateStr}">📝 Edit Matchday</button>
            <button class="set-active-btn" data-date="${dateStr}">⭐ Set as Active</button>
          </div>
        `;
      }
      
      contentHtml += `<div class="fixture-date-group"><div class="fixture-date-label"><span class="date-text">📅 ${dateLabelText}</span>${adminActions}</div>`;
      for (const fix of grouped[dateStr]) {
        const homeIconHtml = getTeamIconHtml(fix.homeTeam, 'team-icon-lg');
        const awayIconHtml = getTeamIconHtml(fix.awayTeam, 'team-icon-lg');
        const matchdayBadge = fix.matchday ? `<span class="meta-tag" style="margin-left: 8px;">MD ${fix.matchday}</span>` : '';
        contentHtml += `
          <div class="fixture-card">
            <div class="fixture-tournament-label">
              🏆 ${escapeHtml(fix.tournamentName || 'LaLiga')}
              ${matchdayBadge}
            </div>
            <div class="fixture-match-row">
              <div class="fixture-team-side">${homeIconHtml}<span class="fixture-team-name">${escapeHtml(fix.homeTeam)}</span></div>
              <div class="fixture-vs">VS</div>
              <div class="fixture-team-side">${awayIconHtml}<span class="fixture-team-name">${escapeHtml(fix.awayTeam)}</span></div>
            </div>
          </div>
        `;
      }
      contentHtml += `</div>`;
    }
    
    const hiddenDates = sortedDates.filter(d => !visibleDates.includes(d));
    const hasHiddenFuture = hiddenDates.some(d => new Date(d) >= today);
    if (!showAllFixtures && activeFixtureDate && hiddenDates.length > 0 && hasHiddenFuture) {
      contentHtml += `<div style="text-align:center;"><button class="see-more-btn" id="seeMoreFixturesBtn">➕ See More Fixtures</button></div>`;
    } else if (showAllFixtures && sortedDates.length > visibleDates.length) {
      contentHtml += `<div style="text-align:center;"><button class="see-more-btn" id="showLessFixturesBtn">➖ Show Less (only active date)</button></div>`;
    }
  }
  
  document.getElementById('contentCard').innerHTML = filtersHtml + contentHtml;
  
  document.getElementById('fixTeamFilter')?.addEventListener('change', e => { currentFixTeamFilter = e.target.value; renderFixtures(); });
  document.getElementById('fixMonthFilter')?.addEventListener('change', e => { currentFixMonthFilter = e.target.value; renderFixtures(); });
  document.getElementById('fixMatchdayFilter')?.addEventListener('change', e => { currentFixMatchdayFilter = e.target.value; renderFixtures(); });
  document.getElementById('clearFixFiltersBtn')?.addEventListener('click', () => { currentFixTeamFilter = ''; currentFixMonthFilter = ''; currentFixMatchdayFilter = ''; renderFixtures(); });
  
  if (isAdminMode) {
    document.querySelectorAll('.edit-matchday-btn').forEach(btn => {
      btn.onclick = async (e) => {
        const date = btn.dataset.date;
        const currentMd = calendarEventsData[date]?.matchday || '';
        const newMd = prompt(`Enter matchday number for ${date}:`, currentMd);
        if (newMd !== null && !isNaN(parseInt(newMd))) {
          await saveMatchdayForDate(date, parseInt(newMd));
          await loadCalendarEvents();
          renderFixtures();
        } else if (newMd !== null && newMd === '') {
          await saveMatchdayForDate(date, null);
          await loadCalendarEvents();
          renderFixtures();
        }
      };
    });
    document.querySelectorAll('.set-active-btn').forEach(btn => {
      btn.onclick = async () => {
        const date = btn.dataset.date;
        await saveActiveFixtureDate(date);
        showAllFixtures = false;
        renderFixtures();
      };
    });
  }
  
  const seeMoreBtn = document.getElementById('seeMoreFixturesBtn');
  if (seeMoreBtn) {
    seeMoreBtn.onclick = () => {
      showAllFixtures = true;
      renderFixtures();
    };
  }
  const showLessBtn = document.getElementById('showLessFixturesBtn');
  if (showLessBtn) {
    showLessBtn.onclick = () => {
      showAllFixtures = false;
      renderFixtures();
    };
  }
}

// ─── PARSE RESULT ───
function parseResultCard(r) {
  let homeTeam = '', awayTeam = '', homeScore = '', awayScore = '', isForfeit = false, forfeitType = '';
  const text = r.matchText || '';
  const lower = text.toLowerCase();
  if (lower.includes('no contest') || lower.includes('f - f')) isForfeit = true;
  else if (lower.includes('forfeit')) isForfeit = true;
  if (isForfeit && text.includes('F - F')) {
    const parts = text.split(/\s*F\s*-\s*F\s*/i);
    if (parts.length >= 2) { homeTeam = parts[0].trim().replace(/\(.*\)/g,'').trim(); awayTeam = parts[1].trim().replace(/\(.*\)/g,'').trim(); homeScore = 'F'; awayScore = 'F'; }
    if (text.includes('No Contest')) forfeitType = 'No Contest';
    else if (text.includes('Forfeited - No Reply')) forfeitType = 'Forfeited - No Reply';
    else if (text.includes('Forfeited on Agreement')) forfeitType = 'Forfeited on Agreement';
    else forfeitType = 'Forfeit';
  } else {
    const match = text.match(/(\d+)\s*-\s*(\d+)/);
    if (match) {
      homeScore = match[1]; awayScore = match[2];
      const parts = text.split(/\s+\d+\s*-\s*\d+\s+/);
      if (parts.length >= 2) { homeTeam = parts[0].trim(); awayTeam = parts[1].trim().replace(/\(.*\)/g,'').trim(); }
      if (lower.includes('forfeited - no reply')) forfeitType = 'Forfeited - No Reply';
      else if (lower.includes('forfeited on agreement')) forfeitType = 'Forfeited on Agreement';
      else if (lower.includes('forfeit')) forfeitType = 'Forfeit';
    }
  }
  return { homeTeam, awayTeam, homeScore, awayScore, isForfeit, forfeitType, md: r.md };
}

      top3Html += `<div class="top3-block">${isAdminMode ? `<div class="edit-block-btn" data-key="${player.key}" data-type="assistant">✏️</div>` : ''}<div class="player-image-wrapper"><div class="medal-badge">${medal}</div><img class="player-img" src="${playerImageUrl || 'https://via.placeholder.com/320x320?text=No+Image'}" alt="${player.name}" onerror="this.src='https://via.placeholder.com/320x320?text=No+Image'"><div class="player-name-overlay">${escapeHtml(player.name || '')}</div>${teamIconUrl ? `<div class="team-icon-overlay"><img src="${teamIconUrl}" alt="${player.team}"></div>` : ''}</div><div class="top3-count">🎯 ${player.count || 0}</div></div>`;
    });
    top3Html += '</div>';
  }
  let restHtml = '';
  if (rest.length) {
    restHtml = `<div class="rest-table-wrapper"><table class="stats-list"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Assists</th>${isAdminMode?'<th>Actions</th>':''}</tr></thead><tbody>`;
    rest.forEach((p, i) => {
      const iconHtml = getTeamIconHtml(p.team, 'team-icon-sm');
      restHtml += `<tr><td>${i+4}</td><td style="font-size:1.5rem;">${escapeHtml(p.name||'')}</td><td><div class="stat-team-cell">${iconHtml}<span style="font-size:1.5rem;">${escapeHtml(p.team||'')}</span></div></td><td><span class="count-badge">${p.count||0}</span></td>${isAdminMode?`<td><button class="btn-sm btn-edit" data-id="${p.key}">✏️</button> <button class="btn-sm btn-delete" data-id="${p.key}">🗑️</button></td>`:''}</tr>`;
    });
    restHtml += `</tbody></table></div>`;
  }
  let html = top3Html + restHtml;
  if (!sorted.length) html = '<div class="empty-state"><div class="empty-icon">🎯</div><p>No assistants yet</p></div>';
  if (isAdminMode) html += `<button class="add-btn-main" id="addAssistBtn">+ Add Assistant</button>`;
  document.getElementById('contentCard').innerHTML = html;
  document.querySelectorAll('.edit-block-btn').forEach(btn => { btn.addEventListener('click', e => { const player = topAssistantList.find(p => p.key === btn.dataset.key); if (player) openStatModal('assistant', player); }); });
  if (isAdminMode) {
    document.getElementById('addAssistBtn')?.addEventListener('click', () => openStatModal('assistant'));
    document.querySelectorAll('.btn-edit[data-id]').forEach(btn => { const e = topAssistantList.find(x => x.key === btn.dataset.id); if (e) btn.onclick = () => openStatModal('assistant', e); });
    document.querySelectorAll('.btn-delete[data-id]').forEach(btn => { btn.onclick = async () => { if (confirm('Delete?')) { await database.ref(getSeasonPath(currentSeasonId, `topAssistants/list/${btn.dataset.id}`)).remove(); await loadTopAssistantData(); renderTopAssistants(); } }; });
  }
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

// ─── RENDER WATCH MATCH (multiple videos) ───
function renderWatchMatch() {
  let html = '';
  const allVideos = [...watchMatchVideos];
  
  // Legacy fallback: if there's an old embedCode and no videos, show it
  if (allVideos.length === 0 && watchMatchLegacyEmbed) {
    allVideos.push({ key: 'legacy', embedCode: watchMatchLegacyEmbed, title: '' });
  }
  
  if (allVideos.length === 0) {
    html = `<div class="empty-state"><div class="empty-icon">🎬</div><p>No match videos available yet.</p></div>`;
  } else {
    html = '<div class="watch-videos-container">';
    for (const video of allVideos) {
      const embedCode = video.embedCode || '';
      const title = video.title || '';
      const isLegacy = video.key === 'legacy';
      const videoId = extractYouTubeId(embedCode);
      let finalEmbed = embedCode;
      if (videoId) {
        finalEmbed = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
      }
      html += `<div class="video-item">`;
      html += `<div class="inline-media"><div class="video-wrapper">${finalEmbed}</div></div>`;
      if (title) {
        html += `<div class="video-title">${escapeHtml(title)}</div>`;
      }
      if (isAdminMode && !isLegacy && video.key) {
        html += `<button class="video-delete-btn" data-key="${video.key}">🗑️ Delete Video</button>`;
      }
      html += `</div>`;
    }
    html += '</div>';
  }
  
  if (isAdminMode) {
    html += `<button class="add-btn-main" id="addVideoBtn">🎥 + Add Video</button>`;
  }
  
  document.getElementById('contentCard').innerHTML = html;
  
  // Delete video handlers
  document.querySelectorAll('.video-delete-btn[data-key]').forEach(btn => {
    btn.onclick = async () => {
      if (confirm('Delete this video?')) {
        await database.ref(`laliga/watchMatch/videos/${btn.dataset.key}`).remove();
        await loadWatchMatchVideos();
        if (document.querySelector('.tab-btn.active')?.dataset.tab === 'watch') renderWatchMatch();
      }
    };
  });
  
  document.getElementById('addVideoBtn')?.addEventListener('click', showAddVideoModal);
}

function extractYouTubeId(input) {
  if (!input) return null;
  if (input.includes('youtube.com/embed/')) {
    const match = input.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
    return match ? match[1] : null;
  }
  if (input.includes('youtu.be/')) {
    const match = input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
    return match ? match[1] : null;
  }
  if (input.includes('youtube.com/watch?v=')) {
    const match = input.match(/v=([a-zA-Z0-9_-]{11})/);
    return match ? match[1] : null;
  }
  const match = input.match(/([a-zA-Z0-9_-]{11})/);
  return match && match[1].length === 11 ? match[1] : null;
}

function formatResultText(homeTeam, homeScore, awayTeam, awayScore, forfeitType) {
  if (forfeitType === "no_contest") return `${homeTeam} F - F ${awayTeam} (No Contest)`;
  if (forfeitType === "forfeit_no_reply") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited - No Reply)`;
  if (forfeitType === "forfeit_agreement") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited on Agreement)`;
  return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`;
}

function attachThreeDotHandler() {
  const btn = document.getElementById('threeDotBtn');
  if (!btn) return;
  btn.onclick = (e) => {
    e.stopPropagation();
    if (popupEl) { popupEl.remove(); popupEl = null; return; }
    const rect = btn.getBoundingClientRect();
    popupEl = document.createElement('div'); popupEl.className = 'popup-menu';
    popupEl.style.position = 'absolute';
    popupEl.style.top = (rect.bottom + window.scrollY + 6) + 'px';
    popupEl.style.left = (rect.left + window.scrollX - 80) + 'px';
    const opts = [
      { label: currentView === 'team' ? 'Show Manager Names' : 'Show Team Names', fn: () => { currentView = currentView === 'team' ? 'player' : 'team'; renderTable(); } },
      { label: showFormArrows ? 'Hide Form Arrows' : 'Show Form Arrows', fn: () => { showFormArrows = !showFormArrows; renderTable(); } },
      { label: showLast5 ? 'Hide Last 5' : 'Show Last 5', fn: () => { showLast5 = !showLast5; renderTable(); } },
    ];
    if (isAdminMode) opts.unshift({ label: 'Edit Manager Names', fn: showEditManagersModal });
    opts.forEach(o => { const d = document.createElement('div'); d.textContent = o.label; d.onclick = () => { if (popupEl) { popupEl.remove(); popupEl = null; } o.fn(); }; popupEl.appendChild(d); });
    document.body.appendChild(popupEl);
  };
  document.addEventListener('click', e => { if (popupEl && !popupEl.contains(e.target) && e.target !== btn) { popupEl.remove(); popupEl = null; } });
}

function normalizeTeamName(name) {
  if (!name) return '';
  const lower = name.toLowerCase().trim();
  // Try exact mapping
  if (teamNameMapping[lower]) return teamNameMapping[lower];
  // Try partial mapping (first word match)
  const firstWord = lower.split(' ')[0];
  if (teamNameMapping[firstWord]) return teamNameMapping[firstWord];
  // Try to find in teamsData
  const found = teamsData.find(t => t.name.toLowerCase() === lower);
  if (found) return found.name;
  // Try partial match in teamsData
  const partial = teamsData.find(t => t.name.toLowerCase().includes(lower) || lower.includes(t.name.toLowerCase()));
  if (partial) return partial.name;
  // Return as-is with proper capitalization
  return name.trim();
}

async function performScan() {
  // Validate: each block must have a team and at least one image
  for (const block of scanMatchBlocks) {
    if (!block.team.trim()) {
      document.getElementById('scanModalStatus').innerHTML = `<div class="status-msg status-error">All matches must have a team name.</div>`;
      return;
    }
    if (block.images.length === 0) {
      document.getElementById('scanModalStatus').innerHTML = `<div class="status-msg status-error">Match "${block.team}" has no images.</div>`;
      return;
    }
  }
  
  // Show loading overlay
  document.getElementById('scanLoadingOverlay').classList.add('active');
  document.getElementById('scanModalStatus').innerHTML = '';
  
  try {
    // For each block, scan each image and aggregate results
    const allResults = [];
    let totalImages = 0;
    for (const block of scanMatchBlocks) {
      totalImages += block.images.length;
    }
    let processed = 0;
    
    for (const block of scanMatchBlocks) {
      const teamName = block.team.trim();
      for (const imgData of block.images) {
        // Convert dataUrl to blob
        const res = await fetch(imgData.dataUrl);
        const blob = await res.blob();
        
        // Prepare form data for scan API
        const formData = new FormData();
        formData.append('image', blob, 'match.jpg');
        formData.append('prompt', `Analyze this football match image. Extract the match result. The team playing is "${teamName}". Return a JSON object with: homeTeam (string), awayTeam (string), homeScore (number), awayScore (number), matchday (number), forfeitType (string: "none", "no_contest", "forfeit_no_reply", or "forfeit_agreement"), date (string), venue (string), matchType (string), aggregate (string), scorers (array of {player, goals}), assists (array of {player, count}). Only return valid JSON.`);
        formData.append('model', 'meta-llama/llama-4-scout-17b-16e-instruct');
        
        const response = await fetch('https://efootball-league.onrender.com/scan', {
          method: 'POST',
          body: formData
        });
        
        if (!response.ok) {
          throw new Error(`Scan API error: ${response.status}`);
        }
        
        const result = await response.json();
        processed++;
        document.querySelector('.scan-loading-sub').textContent = `Processing ${processed}/${totalImages} images...`;
        
        // Parse the result (expecting JSON from the AI)
        let parsed = null;
        try {
          // The result might be nested or direct
          const raw = result.result || result.response || result;
          if (typeof raw === 'string') {
            // Try to extract JSON from the string
            const jsonMatch = raw.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
              parsed = JSON.parse(jsonMatch[0]);
            } else {
              parsed = JSON.parse(raw);
            }
          } else {
            parsed = raw;
          }
        } catch (e) {
          console.warn('Failed to parse scan result:', e);
          // Fallback: try to extract data manually
          parsed = { homeTeam: '', awayTeam: '', homeScore: 0, awayScore: 0 };
        }
        
        // Normalize team names using mapping
        if (parsed.homeTeam) parsed.homeTeam = normalizeTeamName(parsed.homeTeam);
        if (parsed.awayTeam) parsed.awayTeam = normalizeTeamName(parsed.awayTeam);
        
        // Ensure numbers are valid
        parsed.homeScore = parseInt(parsed.homeScore) || 0;
        parsed.awayScore = parseInt(parsed.awayScore) || 0;
        parsed.matchday = parseInt(parsed.matchday) || 0;
        
        // Store with the team context
        allResults.push({
          ...parsed,
          _scannedTeam: teamName,
          _scorers: parsed.scorers || [],
          _assists: parsed.assists || []
        });
      }
    }
    
    // Close loading overlay
    document.getElementById('scanLoadingOverlay').classList.remove('active');
    
    // Show preview modal with results
    if (allResults.length === 0) {
      document.getElementById('scanModalStatus').innerHTML = `<div class="status-msg status-error">No results could be extracted from the images.</div>`;
      return;
    }
    
    scanPreviewData = allResults;
    renderScanPreview();
    
  } catch (error) {
    document.getElementById('scanLoadingOverlay').classList.remove('active');
    document.getElementById('scanModalStatus').innerHTML = `<div class="status-msg status-error">Error: ${error.message}</div>`;
  }
}

  const btn = document.getElementById('adminModeBtn');
  const origText = btn.textContent;
  btn.textContent = '⏳ Verifying...';
  btn.style.opacity = '0.6';
  
  fetch('https://efootball-league.onrender.com/verify-admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key: key })
  })
  .then(res => res.json())
  .then(data => {
    btn.textContent = origText;
    btn.style.opacity = '1';
    if (data.success === true) {
      isAdminMode = true;
      alert("Admin mode activated ✅");
      document.getElementById('seasonAdminPanel').style.display = 'flex';
      renderCurrentTab();
      if (!document.getElementById('adminSettingsItem')) {
        const item = document.createElement('div');
        item.id = 'adminSettingsItem';
        item.className = 'menu-item';
        item.innerHTML = '⚙️ Admin Settings';
        item.onclick = () => { openAdminSettings(); closeMenu(); };
        document.getElementById('sideMenu').appendChild(item);
      }
    } else {
      alert("Incorrect key");
    }
  })
  .catch(err => {
    btn.textContent = origText;
    btn.style.opacity = '1';
    alert("Error verifying key: " + err.message);
  });
};

document.getElementById('prevSeasonBtn').onclick = () => switchSeason(-1);
document.getElementById('nextSeasonBtn').onclick = () => switchSeason(1);
document.getElementById('addSeasonBtn').onclick = () => isAdminMode && addNewSeason();
document.getElementById('renameSeasonBtn').onclick = () => isAdminMode && renameSeason();
document.getElementById('setActiveSeasonBtn').onclick = () => isAdminMode && setActiveSeason();

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCurrentTab();
  });
});

function attachRealtimeListeners() {
  database.ref(getSeasonPath(currentSeasonId, 'table')).on('value', snap => { teamsData = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : []; if (document.querySelector('.tab-btn.active')?.dataset.tab === 'table') renderTable(); });
  database.ref(getSeasonPath(currentSeasonId, 'results')).on('value', snap => { resultsData = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : []; const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab; if (activeTab === 'results') renderResults(); if (activeTab === 'table') renderTable(); });
  database.ref(getSeasonPath(currentSeasonId, 'topScorers/list')).on('value', async () => { await loadTopScorerData(); if (document.querySelector('.tab-btn.active')?.dataset.tab === 'topscorers') renderTopScorers(); });
  database.ref(getSeasonPath(currentSeasonId, 'topAssistants/list')).on('value', async () => { await loadTopAssistantData(); if (document.querySelector('.tab-btn.active')?.dataset.tab === 'topassists') renderTopAssistants(); });
  database.ref('calendarEvents').on('value', snap => { calendarEventsData = snap.val() || {}; if (document.querySelector('.tab-btn.active')?.dataset.tab === 'fixtures') renderFixtures(); });
  // Watch videos realtime
  database.ref('laliga/watchMatch/videos').on('value', async () => { await loadWatchMatchVideos(); if (document.querySelector('.tab-btn.active')?.dataset.tab === 'watch') renderWatchMatch(); });
}

async function init() {
  await loadSlideshow();
  await loadTeamIcons();
  await loadNavbarLogo();
  await loadTableHeaderBgImage();
  await loadWatchMatchVideos();
  await loadCalendarEvents();
  await loadSeasonsMetadata();
  await loadTopScorerData();
  await loadTopAssistantData();
  attachRealtimeListeners();
  renderCurrentTab();
}
init();
</script>
</body>
