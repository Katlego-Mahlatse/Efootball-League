        async function confirmAndSaveAll() {
            const btn = document.getElementById('confirmAllScanBtn');
            const statusEl = document.getElementById('confirmSaveStatus');

            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="btn-spinner"></span> Saving…';
            }

            document.querySelectorAll('[data-field][data-idx]').forEach(el => {
                const idx = parseInt(el.dataset.idx);
                const field = el.dataset.field;
                if (idx >= previewMatches.length) return;
                let val = el.value;
                if (field === 'homeScore' || field === 'awayScore' || field === 'matchday') val =
                parseInt(val) || 0;
                previewMatches[idx][field] = val;
            });

            let savedCount = 0;
            const errors = [];

            for (const m of previewMatches) {
                if (!m.homeTeam || !m.awayTeam) {
                    errors.push(`Match ${m.matchIdx}: teams missing`);
                    continue;
                }
                if (m.homeTeam === m.awayTeam) {
                    errors.push(`Match ${m.matchIdx}: same team on both sides`);
                    continue;
                }

                try {
                    const hs = m.homeScore || 0;
                    const as2 = m.awayScore || 0;
                    const forfeit = m.forfeitType || 'none';

                    const matchText = formatResultText(m.homeTeam, hs, m.awayTeam, as2, forfeit === 'none' ? '' :
                        forfeit);

                    const resultData = {
                        matchText,
                        uploadedAt: Date.now(),
                        ...(m.date && { date: m.date }),
                        ...(m.venue && { venue: m.venue }),
                        ...(m.matchType && { matchType: m.matchType }),
                        ...(m.aggregate && { aggregate: m.aggregate }),
                        goalScorers: { home: m.homeScorers || [], away: m.awayScorers || [] },
                        matchday: m.matchday || null
                    };

                    if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">💾 Saving result...</div>';
                    await database.ref(getSeasonPath(currentSeasonId, 'results')).push(resultData);

                    if (statusEl) statusEl.innerHTML =
                    '<div class="status-msg status-loading">📊 Updating table...</div>';
                    await applyResultToTable(m.homeTeam, m.awayTeam, hs, as2, forfeit === 'none' ? '' : forfeit);

                    if (statusEl) statusEl.innerHTML =
                        '<div class="status-msg status-loading">⚽ Updating top scorers...</div>';
                    await applyScorersFromScan(m.homeScorers || [], m.homeTeam);
                    await applyScorersFromScan(m.awayScorers || [], m.awayTeam);

                    if (statusEl) statusEl.innerHTML =
                        '<div class="status-msg status-loading">🎯 Updating top assistants...</div>';
                    await applyAssistsFromScan(m.homeAssists || [], m.homeTeam);
                    await applyAssistsFromScan(m.awayAssists || [], m.awayTeam);

                    savedCount++;
                } catch (e) {
                    errors.push(`Match ${m.matchIdx}: ${e.message}`);
                }
            }

            await loadCurrentSeasonDataSync();
            await loadTopScorerData();
            await loadTopAssistantData();

            if (errors.length) {
                if (statusEl) statusEl.innerHTML =
                    `<div class="status-msg status-error">Saved ${savedCount}. Errors: ${errors.join('; ')}</div>`;
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '✅ CONFIRM & SAVE ALL';
                }
            } else {
                if (statusEl) statusEl.innerHTML =
                    `<div class="status-msg status-success">✅ ${savedCount} match(es) saved successfully!</div>`;
                multiScanMatches = [];
                closeModal();
                renderCurrentTab();
            }
        }

        // ─── MANAGER KEYS HELPERS ───
        function getSavedManagerKey() {
            try {
                const raw = localStorage.getItem('rememberedManagerKey_laliga');
                if (!raw) return null;
                return JSON.parse(raw);
            } catch (e) {
                return null;
            }
        }

        function saveManagerKey(key, teamName) {
            localStorage.setItem('rememberedManagerKey_laliga', JSON.stringify({ key, teamName }));
        }

        function clearSavedManagerKey() {
            localStorage.removeItem('rememberedManagerKey_laliga');
        }

        async function validateSavedKey() {
            const saved = getSavedManagerKey();
            if (!saved) return null;
            await loadManagerKeys();
            const entry = Object.values(managerKeysCache).find(e => e.key === saved.key);
            if (!entry || entry.teamName !== saved.teamName) {
                clearSavedManagerKey();
                return null;
            }
            return saved;
        }

        function renderManagerHistoryModal() {
            const teamNames = teamsData.map(t => t.name).sort();
            let html =
                `<h3>👥 Manager History</h3><p style="color:rgba(255,255,255,0.6);margin-bottom:16px;">Manage managers for each team. Set one active; others will be sacked.</p>`;
            for (const team of teamNames) {
                const entries = managerHistory[team] || [];
                html += `<div class="manager-team-group"><h4>${escapeHtml(team)}</h4>`;
                if (entries.length === 0) {
                    html += `<p style="color:rgba(255,255,255,0.3);font-size:1.1rem;">No managers yet.</p>`;
                } else {
                    for (const entry of entries) {
                        const statusEmoji = entry.status === 'active' ? '🟢' : (entry.status === 'sacked' ? '🔴' :
                            '🟡');
                        const leftText = entry.matchdayLeft ? `left MD ${entry.matchdayLeft}` : '';
                        const joinedText = entry.matchdayJoined ? `joined MD ${entry.matchdayJoined}` : '';
                        html += `<div class="manager-entry" data-key="${entry.key}">`;
                        html += `<span class="mgr-name">${escapeHtml(entry.name)}</span>`;
                        html += `<span class="mgr-status">${statusEmoji}</span>`;
                        html += `<span class="mgr-details">${joinedText} ${leftText}</span>`;
                        html += `<div class="mgr-actions">`;
                        if (entry.status !== 'active') {
                            html +=
                                `<button class="set-active-mgr" data-team="${team}" data-key="${entry.key}">Set Active</button>`;
                        }
                        html +=
                            `<button class="edit-mgr" data-team="${team}" data-key="${entry.key}">✏️</button>`;
                        html +=
                            `<button class="delete-mgr" data-team="${team}" data-key="${entry.key}">🗑️</button>`;
                        html += `</div></div>`;
                    }
                }
                html += `<div class="manager-inline-form" data-team="${team}">
                  <div class="form-group"><label>Name</label><input type="text" class="mgr-name-input" placeholder="Manager name"></div>
                  <div class="form-group"><label>Status</label><select class="mgr-status-select"><option value="active">Active</option><option value="sacked">Sacked</option><option value="retired">Retired</option></select></div>
                  <div class="form-group"><label>Joined MD</label><input type="number" class="mgr-joined" placeholder="Matchday" value="0"></div>
                  <div class="form-group"><label>Left MD</label><input type="number" class="mgr-left" placeholder="Optional"></div>
                  <div class="form-actions"><button class="add-mgr-btn" data-team="${team}">Add</button></div>
                </div>`;
                html += `</div>`;
            }
            html += `<div class="modal-btns"><button class="modal-btn-cancel" id="closeManagerHistory">Close</button></div>`;
            showModal(html);

            document.getElementById('closeManagerHistory').onclick = closeModal;

            document.querySelectorAll('.add-mgr-btn').forEach(btn => {
                btn.onclick = async () => {
                    const team = btn.dataset.team;
                    const form = btn.closest('.manager-inline-form');
                    const name = form.querySelector('.mgr-name-input').value.trim();
                    const status = form.querySelector('.mgr-status-select').value;
                    const matchdayJoined = parseInt(form.querySelector('.mgr-joined').value) || 0;
                    const matchdayLeft = parseInt(form.querySelector('.mgr-left').value) || undefined;
                    if (!name) { alert('Enter manager name.'); return; }
                    const data = { name, status, matchdayJoined, matchdayLeft: matchdayLeft || null };
                    if (status === 'active') {
                        const entries = managerHistory[team] || [];
                        for (const e of entries) {
                            if (e.status === 'active') {
                                await database.ref(getSeasonPath(currentSeasonId,
                                    `managerHistory/${team}/${e.key}/status`)).set('sacked');
                            }
                        }
                    }
                    const ref = database.ref(getSeasonPath(currentSeasonId, `managerHistory/${team}`)).push();
                    await ref.set(data);
                    await loadManagerHistory();
                    renderManagerHistoryModal();
                };
            });

            document.querySelectorAll('.set-active-mgr').forEach(btn => {
                btn.onclick = async () => {
                    const team = btn.dataset.team;
                    const key = btn.dataset.key;
                    const entries = managerHistory[team] || [];
                    for (const e of entries) {
                        if (e.key !== key && e.status === 'active') {
                            await database.ref(getSeasonPath(currentSeasonId,
                                `managerHistory/${team}/${e.key}/status`)).set('sacked');
                        }
                    }
                    await database.ref(getSeasonPath(currentSeasonId, `managerHistory/${team}/${key}/status`))
                        .set('active');
                    await loadManagerHistory();
                    renderManagerHistoryModal();
                };
            });

            document.querySelectorAll('.edit-mgr').forEach(btn => {
                btn.onclick = () => {
                    const team = btn.dataset.team;
                    const key = btn.dataset.key;
                    const entry = managerHistory[team]?.find(e => e.key === key);
                    if (!entry) return;
                    const newName = prompt('Enter new manager name:', entry.name);
                    if (newName === null) return;
                    const newStatus = prompt('Enter status (active/sacked/retired):', entry.status);
                    if (newStatus === null) return;
                    const newJoined = prompt('Matchday joined:', entry.matchdayJoined);
                    if (newJoined === null) return;
                    const newLeft = prompt('Matchday left (optional):', entry.matchdayLeft || '');
                    const updates = {
                        name: newName.trim(),
                        status: newStatus.trim(),
                        matchdayJoined: parseInt(newJoined) || 0,
                        matchdayLeft: newLeft.trim() ? parseInt(newLeft) : null
                    };
                    if (updates.status === 'active') {
                        const entries = managerHistory[team] || [];
                        for (const e of entries) {
                            if (e.key !== key && e.status === 'active') {
                                database.ref(getSeasonPath(currentSeasonId,
                                    `managerHistory/${team}/${e.key}/status`)).set('sacked');
                            }
                        }
                    }
                    database.ref(getSeasonPath(currentSeasonId, `managerHistory/${team}/${key}`)).update(updates)
                        .then(() => { loadManagerHistory();
                            renderManagerHistoryModal(); });
                };
            });

            document.querySelectorAll('.delete-mgr').forEach(btn => {
                btn.onclick = async () => {
                    if (!confirm('Delete this manager entry?')) return;
                    const team = btn.dataset.team;
                    const key = btn.dataset.key;
                    await database.ref(getSeasonPath(currentSeasonId, `managerHistory/${team}/${key}`)).remove();
                    await loadManagerHistory();
                    renderManagerHistoryModal();
                };
            });
        }

                for (const [efoot, real] of mappingEntries) {

                        `<li style="display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.2);border-radius:16px;padding:10px 16px;margin-bottom:8px;">`;
                    html +=
                        `<span style="color:var(--laliga-white);font-weight:600;">${escapeHtml(efoot)} → ${escapeHtml(real)}</span>`;
                    html +=
                        `<button class="delete-name-mapping" data-efoot="${efoot}" style="background:rgba(233,16,46,0.15);border:1px solid var(--laliga-red);border-radius:20px;padding:4px 14px;color:var(--laliga-white);cursor:pointer;">Delete</button>`;
                    html += `</li>`;
                }
                html += `</ul>`;
            } else {
                html += `<p style="color:rgba(255,255,255,0.3);">No mappings yet.</p>`;
            }
            html += `<div style="margin-top:20px;border-top:1px solid rgba(233,16,46,0.2);padding-top:20px;">
                <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
                  <div class="form-group" style="flex:1;min-width:150px;"><label>eFootball Name</label><input id="newEfootName" placeholder="e.g. realmadrid" style="width:100%;padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--laliga-red);border-radius:14px;color:white;font-family:'Rajdhani',sans-serif;font-size:1.1rem;"></div>
                  <div class="form-group" style="flex:1;min-width:150px;"><label>Real Name</label><input id="newRealName" placeholder="e.g. Real Madrid" style="width:100%;padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--laliga-red);border-radius:14px;color:white;font-family:'Rajdhani',sans-serif;font-size:1.1rem;"></div>
                  <button class="modal-btn-primary" id="addNameMapping" style="flex:0 0 auto;padding:12px 32px;">Add Mapping</button>
                </div>
                <div id="nameMappingStatus" style="margin-top:12px;"></div>
              </div>`;
            html +=
                `<div class="modal-btns"><button class="modal-btn-cancel" id="closeNameMappings">Close</button></div>`;
            showModal(html);

            document.getElementById('closeNameMappings').onclick = closeModal;

            document.getElementById('addNameMapping').onclick = async () => {
                const efoot = document.getElementById('newEfootName').value.trim();
                const real = document.getElementById('newRealName').value.trim();
                const status = document.getElementById('nameMappingStatus');
                if (!efoot || !real) { status.innerHTML =
                        '<div class="status-msg status-error">Both fields required.</div>'; return; }
                try {
                    await database.ref('teamNameMappings').push({ efootballName: efoot, realName: real });
                    await loadTeamNameMappings();
                    status.innerHTML = '<div class="status-msg status-success">Mapping added.</div>';
                    renderTeamNameMappingsModal();
                } catch (e) {
                    status.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`;
                }
            };

            document.querySelectorAll('.delete-name-mapping').forEach(btn => {
                btn.onclick = async () => {
                    const efoot = btn.dataset.efoot;
                    if (!confirm(`Delete mapping for "${efoot}"?`)) return;
                    const snap = await database.ref('teamNameMappings').once('value');
                    const data = snap.val() || {};
                    for (const [key, val] of Object.entries(data)) {
                        if (val.efootballName && val.efootballName.toLowerCase() === efoot.toLowerCase()) {
                            await database.ref(`teamNameMappings/${key}`).remove();
                            break;
                        }
                    }
                    await loadTeamNameMappings();
                    renderTeamNameMappingsModal();
                };
            });
        }

        // ─── TEAM LOGO MAPPINGS MODAL ───

                `<h3>🏷️ Manage Team Logo Mappings</h3><p style="color:rgba(255,255,255,0.6);margin-bottom:16px;">Upload team logos to help AI identify teams during scanning.</p>`;
            const entries = Object.entries(teamLogoMappings);
            if (entries.length) {
                html += `<div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px;">`;
                for (const [team, val] of entries) {

                    html +=
                        `<img src="${val.imageUrl}" style="width:80px;height:80px;object-fit:contain;border-radius:8px;border:2px solid var(--laliga-red);">`;

                    html +=
                        `<span style="color:rgba(255,255,255,0.5);font-size:0.9rem;">${escapeHtml(val.efootballName)}</span>`;
                    html +=
                        `<button class="delete-logo-mapping" data-team="${team}" style="background:rgba(233,16,46,0.15);border:1px solid var(--laliga-red);border-radius:20px;padding:4px 14px;color:var(--laliga-white);cursor:pointer;">Delete</button>`;
                    html += `</div>`;
                }
                html += `</div>`;
            } else {
                html += `<p style="color:rgba(255,255,255,0.3);">No logo mappings yet.</p>`;
            }
            html += `<div style="margin-top:20px;border-top:1px solid rgba(233,16,46,0.2);padding-top:20px;">
                <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
                  <div class="form-group" style="flex:1;min-width:150px;"><label>Team Name</label><input id="newLogoTeam" placeholder="e.g. Real Madrid" style="width:100%;padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--laliga-red);border-radius:14px;color:white;font-family:'Rajdhani',sans-serif;font-size:1.1rem;"></div>
                  <div class="form-group" style="flex:1;min-width:150px;"><label>eFootball Name</label><input id="newLogoEfoot" placeholder="e.g. realmadrid" style="width:100%;padding:10px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--laliga-red);border-radius:14px;color:white;font-family:'Rajdhani',sans-serif;font-size:1.1rem;"></div>
                  <div class="form-group" style="flex:0 0 auto;"><label>Logo Image</label><input type="file" id="newLogoFile" accept="image/*" style="padding:10px;background:rgba(255,255,255,0.05);border:1px solid var(--laliga-red);border-radius:14px;color:white;"></div>
                  <button class="modal-btn-primary" id="addLogoMapping" style="flex:0 0 auto;padding:12px 32px;">Add Logo</button>
                </div>
                <div id="logoMappingStatus" style="margin-top:12px;"></div>
              </div>`;
            html +=
                `<div class="modal-btns"><button class="modal-btn-cancel" id="closeLogoMappings">Close</button></div>`;
            showModal(html);

            document.getElementById('closeLogoMappings').onclick = closeModal;

            document.getElementById('addLogoMapping').onclick = async () => {
                const team = document.getElementById('newLogoTeam').value.trim();
                const efoot = document.getElementById('newLogoEfoot').value.trim();
                const fileInput = document.getElementById('newLogoFile');
                const status = document.getElementById('logoMappingStatus');
                if (!team || !efoot) { status.innerHTML =
                        '<div class="status-msg status-error">Team and eFootball name required.</div>'; return; }
                if (!fileInput.files.length) { status.innerHTML =
                        '<div class="status-msg status-error">Please select an image.</div>'; return; }
                try {
                    status.innerHTML = '<div class="status-msg status-loading">Uploading logo...</div>';
                    const url = await uploadToImgBB(fileInput.files[0]);
                    await database.ref(`teamLogoMappings/${team}`).set({ imageUrl: url, efootballName: efoot });
                    await loadTeamLogoMappings();
                    status.innerHTML = '<div class="status-msg status-success">Logo added.</div>';
                    renderTeamLogoMappingsModal();
                } catch (e) {
                    status.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`;

            document.querySelectorAll('.delete-logo-mapping').forEach(btn => {
                btn.onclick = async () => {

                    if (!confirm(`Delete logo for "${team}"?`)) return;
                    await database.ref(`teamLogoMappings/${team}`).remove();
                    await loadTeamLogoMappings();
                    renderTeamLogoMappingsModal();

            });
        }
