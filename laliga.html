                    <button class="modal-btn-cancel" id="differentKeyBtn">Use Different Key</button>
                  </div>
                `);
                        document.getElementById('confirmSavedKeyBtn').onclick = () => {
                            closeModal();
                            openMatchTypeSelectionPopup(valid.teamName, valid.key);
                        };
                        document.getElementById('differentKeyBtn').onclick = () => {
                            clearSavedManagerKey();
                            closeModal();
                            openAddResultsKeyModal();
                        };
                        return;
                    } else {
                        clearSavedManagerKey();
                    }
                });
                return;
            }
            showModal(`
            <h3>🔐 Manager Key Required</h3>
            <p style="color:rgba(255,255,255,0.6);margin-bottom:20px;font-size:1.2rem;">Enter your manager key to submit match results.</p>
            <label>Manager Key</label>
            <input type="password" id="managerKeyInput" placeholder="Enter your key" style="font-family:'Inter',monospace;letter-spacing:2px;">
            <div id="keyVerifyStatus"></div>
            <div class="modal-btns">
              <button class="modal-btn-primary" id="verifyKeyBtn">🔍 Verify Key</button>
              <button class="modal-btn-cancel" id="cancelKeyModalBtn">Cancel</button>
            </div>
          `);
            document.getElementById('cancelKeyModalBtn').onclick = closeModal;
            document.getElementById('managerKeyInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') document.getElementById('verifyKeyBtn').click();
            });
            document.getElementById('verifyKeyBtn').onclick = async () => {
                const keyInput = document.getElementById('managerKeyInput');
                const statusEl = document.getElementById('keyVerifyStatus');
                const key = keyInput.value.trim().toUpperCase();
                if (!key) {
                    statusEl.innerHTML = '<div class="status-msg status-error">Please enter your manager key.</div>';
                    return;
                }
                const btn = document.getElementById('verifyKeyBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="btn-spinner"></span> Verifying...';
                statusEl.innerHTML = '<div class="status-msg status-loading">Checking key...</div>';
                try {
                    await loadManagerKeys();
                    const entry = Object.values(managerKeysCache).find(e => e.key === key);
                    if (!entry) {
                        statusEl.innerHTML =
                            '<div class="status-msg status-error">❌ Invalid manager key. Please check and try again.</div>';
                        btn.disabled = false;
                        btn.innerHTML = '🔍 Verify Key';
                        return;
                    }
                    saveManagerKey(key, entry.teamName);
                    statusEl.innerHTML =
                        `<div class="status-msg status-success">✅ Verified! Welcome ${escapeHtml(entry.teamName)}.</div>`;
                    btn.innerHTML = '✓ Verified';
                    setTimeout(() => {
                        closeModal();
                        openMatchTypeSelectionPopup(entry.teamName, key);
                    }, 600);
                } catch (e) {
                    statusEl.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`;
                    btn.disabled = false;
                    btn.innerHTML = '🔍 Verify Key';
                }
            };
        }

        // ─── FORFEIT SUBMIT FORM ───
        function openForfeitSubmitForm(linkedTeam, managerKey, forfeitDate, forfeitType) {
            const teamNames = teamsData.map(t => t.name).sort();
            const otherTeams = teamNames.filter(t => t !== linkedTeam);
            let forfeitImages = [];
            let matchNotesValue = '';
            const typeLabel = forfeitType === 'no_contest' ? 'No Contest (F - F)' : 'Forfeit Win (3 - 0)';

                'Both teams will receive a game played. No points awarded to either team.' :
                'You will receive 3 points and a win. Opponent receives a loss.';

            const renderForfeitForm = () => {
                const awayOpts = otherTeams.map(t => `<option value="${t}">${escapeHtml(t)}</option>`).join('');
                let imgThumbsHtml = forfeitImages.map((img, idx) => `
                  <div class="preview-thumb" style="width:120px;height:120px;position:relative;">

                showModal(`
                  <h3>🚫 ${typeLabel}</h3>

                  <div style="color:rgba(255,255,255,0.6);font-size:1.2rem;background:rgba(233,16,46,0.08);border-radius:16px;padding:14px 18px;margin:12px 0;border-left:3px solid var(--laliga-red);">${typeDesc}</div>

                  <select id="forfeitOpponent"><option value="">Select Opponent</option>${awayOpts}</select>
                  <label>Upload Screenshot Evidence (required)</label>
                  <div id="forfeitImageArea" style="border:2px dashed rgba(233,16,46,0.4);border-radius:20px;padding:24px;text-align:center;cursor:pointer;transition:all 0.3s;">
                    <div style="font-size:3rem;color:rgba(255,255,255,0.3);">📸</div>
                    <div style="color:rgba(255,255,255,0.5);font-size:1.1rem;margin-top:8px;">Click to upload screenshots (${forfeitImages.length} added)</div>
                    <input type="file" id="forfeitImageInput" accept="image/*" multiple style="display:none;">
                  </div>
                  <div style="display:flex;flex-wrap:wrap;gap:12px;margin:12px 0;">${imgThumbsHtml}</div>
                  <label>Match Notes for Admin (optional)</label>
                  <textarea id="forfeitMatchNotes" placeholder="Any notes for the admin reviewing this request...">${escapeHtml(matchNotesValue)}</textarea>
                  <div id="forfeitStatus"></div>
                  <div class="modal-btns">
                    <button class="modal-btn-primary" id="submitForfeitBtn">🚫 Submit Forfeit Request</button>
                    <button class="modal-btn-cancel" id="cancelForfeitBtn">Cancel</button>
                  </div>
                `);
                document.getElementById('cancelForfeitBtn').onclick = closeModal;
                const area = document.getElementById('forfeitImageArea');
                const fileInput = document.getElementById('forfeitImageInput');
                area.onclick = () => fileInput.click();
                fileInput.onchange = async function() {
                    for (const file of Array.from(this.files)) {
                        const dataUrl = await fileToDataUrl(file);
                        forfeitImages.push({ file, dataUrl });
                    }
                    renderForfeitForm();
                };
                document.querySelectorAll('[data-fidx]').forEach(el => {
                    el.onclick = () => {
                        forfeitImages.splice(parseInt(el.dataset.fidx), 1);
                        renderForfeitForm();
                    };
                });
                document.getElementById('forfeitMatchNotes').addEventListener('input', function() {
                    matchNotesValue = this.value;
                });
                document.getElementById('submitForfeitBtn').onclick = async () => {
                    const status = document.getElementById('forfeitStatus');
                    const btn = document.getElementById('submitForfeitBtn');
                    const opponent = document.getElementById('forfeitOpponent').value;
                    const matchNotes = document.getElementById('forfeitMatchNotes').value.trim();
                    if (!opponent) {
                        status.innerHTML =
                            '<div class="status-msg status-error">Please select an opponent.</div>';
                        return;
                    }
                    if (opponent === linkedTeam) {
                        status.innerHTML =
                            '<div class="status-msg status-error">Cannot forfeit against your own team.</div>';
                        return;
                    }
                    if (forfeitImages.length === 0) {
                        status.innerHTML =
                            '<div class="status-msg status-error">Please upload at least one screenshot.</div>';
                        return;
                    }
                    btn.disabled = true;
                    btn.innerHTML = '<span class="btn-spinner"></span> Submitting...';
                    status.innerHTML = '<div class="status-msg status-loading">Uploading images...</div>';
                    try {
                        const imageUrls = [];
                        for (const img of forfeitImages) imageUrls.push(await uploadToImgBB(img.file));
                        const homeTeam = linkedTeam,
                            awayTeam = opponent;
                        const homeScore = forfeitType === 'no_contest' ? 0 : 3;
                        const awayScore = 0;
                        const forfeitData = {
                            matchType: 'forfeit',
                            forfeitType,
                            homeTeam,
                            awayTeam,
                            homeScore,
                            awayScore,
                            date: forfeitDate === 'today' ? getSASTToday() : getSASTYesterday(),
                            images: imageUrls,
                            submittedBy: managerKey,
                            submittedAt: Date.now(),
                            matchNotes,
                            status: 'pending'
                        };
                        await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).push(
                        forfeitData);
                        const keyId = await findManagerKeyId(managerKey);
                        if (keyId) await database.ref(`managerKeys/${keyId}/lastSubmissionTimestamp`).set(Date
                        .now());
                        status.innerHTML =
                            '<div class="status-msg status-success">✅ Forfeit request submitted! Awaiting admin approval.</div>';
                        btn.innerHTML = '✓ Submitted!';
                        setTimeout(() => {
                            closeModal();
                        }, 1500);
                    } catch (e) {
                        status.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`;
                        btn.disabled = false;
                        btn.innerHTML = '🚫 Submit Forfeit Request';
                    }
                };
            };
            renderForfeitForm();
        }

        async function approvePendingResult(pendingResultId, resultData) {
            const isForfeit = resultData.matchType === 'forfeit';
            const homeTeam = resultData.homeTeam || '',
                awayTeam = resultData.awayTeam || '';
            const homeScore = resultData.homeScore || 0,
                awayScore = resultData.awayScore || 0;
            const forfeitType = resultData.forfeitType || '';
            let matchText = '';
            if (isForfeit) {
                if (forfeitType === 'no_contest') matchText = `${homeTeam} F - F ${awayTeam} (No Contest)`;
                else matchText = `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited - No Reply)`;
            } else {
                matchText = `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`;
            }
            const resultEntry = {
                matchText,
                md: resultData.md || 0,
                date: resultData.date || '',
                venue: '',
                matchType: '',
                goalScorers: resultData.goalScorers || { home: [], away: [] },
                userSubmitted: true,
                submittedBy: resultData.submittedBy || '',
                submittedAt: resultData.submittedAt || Date.now(),
                approvedAt: Date.now()
            };
            await database.ref(getSeasonPath(currentSeasonId, 'results')).push(resultEntry);
            const tableForfeitType = isForfeit ? (forfeitType === 'no_contest' ? 'no_contest' : 'forfeit_no_reply') : '';
            await applyResultToTable(homeTeam, awayTeam, homeScore, awayScore, tableForfeitType);
            await loadTopScorerData();
            await loadTopAssistantData();
            const scorersHome = resultData.goalScorers?.home || [];
            const scorersAway = resultData.goalScorers?.away || [];
            if (scorersHome.length) await applyScorersFromScan(scorersHome, homeTeam);
            if (scorersAway.length) await applyScorersFromScan(scorersAway, awayTeam);
            const assistsHome = resultData.userAssists?.home || [];
            const assistsAway = resultData.userAssists?.away || [];
            if (assistsHome.length) await applyAssistsFromScan(assistsHome, homeTeam);
            if (assistsAway.length) await applyAssistsFromScan(assistsAway, awayTeam);
            await database.ref(getSeasonPath(currentSeasonId, `pending_results/${pendingResultId}`)).remove();
            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();
        }

                    await database.ref('managerKeys').push({ key: keyVal, teamName, createdAt: Date.now(),
                        createdBy: 'admin' });
                    statusEl.innerHTML =
                        `<div class="status-msg status-success">✅ Key "${keyVal}" created for ${escapeHtml(teamName)}!</div>`;
                    await loadManagerKeys();
                    setTimeout(() => {
                        openManagerKeysModal();
                    }, 800);
                } catch (e) {
                    statusEl.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`;
                    btn.disabled = false;
                    btn.innerHTML = '+ Create Key';
                }
            };
            document.querySelectorAll('.key-delete-btn').forEach(btn => {
                btn.onclick = async () => {
                    const keyId = btn.dataset.keyid;
                    if (!confirm('Delete this manager key? This cannot be undone.')) return;
                    try {
                        await database.ref(`managerKeys/${keyId}`).remove();
                        await loadManagerKeys();
                        openManagerKeysModal();
                    } catch (e) {
                        alert('Error deleting key: ' + e.message);
                    }
                };
            });
        }

        // ─── NEW SET CURRENT MATCHDAY MODAL ───
        function openSetCurrentMatchdayModal() {
            const fixtureDates = [];
            const todayStr = getSASTToday();

            for (const [date, eventData] of Object.entries(calendarEventsData)) {
                const eventSeason = eventData.season;
                if (eventSeason !== undefined && eventSeason !== null && eventSeason !== currentSeasonId) {
                    continue;
                }
                if (eventData.tournaments && Array.isArray(eventData.tournaments)) {
                    for (const tournament of eventData.tournaments) {
                        let isLaLiga = false;
                        if (tournament.name) {
                            const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, '');
                            if (normalized === 'laliga') isLaLiga = true;
                        }
                        if (isLaLiga && tournament.fixtures && Array.isArray(tournament.fixtures) && tournament.fixtures
                            .length > 0) {
                            if (!fixtureDates.includes(date)) {
                                fixtureDates.push(date);
                            }
                        }
                    }
                }
            }

            fixtureDates.sort((a, b) => a.localeCompare(b));

            let filteredDates = fixtureDates.filter(d => d >= todayStr);
            if (filteredDates.length === 0 && fixtureDates.length > 0) {
                filteredDates = [fixtureDates[fixtureDates.length - 1]];
            }

            const dateItems = filteredDates.map((date, idx) => {
                const currentMd = calendarEventsData[date]?.matchday || '';
                return { date, currentMd: currentMd, predicted: currentMd || '' };
            });

            if (dateItems.length === 0) {
                showModal(`
              <h3>📊 Set Current Matchday</h3>
              <div class="empty-state"><div class="empty-icon">📅</div><p>No fixture dates found for this season.</p></div>
              <div class="modal-btns"><button class="modal-btn-cancel" id="closeMatchdayEmpty">Close</button></div>
            `);
                document.getElementById('closeMatchdayEmpty').onclick = closeModal;
                return;
            }

            const renderMatchdayModal = () => {
                let listHtml = dateItems.map((item, idx) => {
                    const dateObj = new Date(item.date);
                    const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                    const dayName = dayNames[dateObj.getDay()];
                    const [y, mo, d] = item.date.split('-');
                    const monthLabels = { '01': 'Jan', '02': 'Feb', '03': 'Mar', '04': 'Apr', '05': 'May',
                        '06': 'Jun', '07': 'Jul', '08': 'Aug', '09': 'Sep', '10': 'Oct', '11': 'Nov', '12': 'Dec' };
                    const label = `${dayName} ${parseInt(d)} ${monthLabels[mo] || mo} ${y}`;
                    const isToday = item.date === todayStr;
                    return `
                  <div style="display:flex;align-items:center;gap:16px;padding:12px 16px;background:${isToday ? 'rgba(233,16,46,0.15)' : 'rgba(0,0,0,0.2)'};border-radius:16px;margin-bottom:10px;border-left:4px solid ${isToday ? 'var(--laliga-red)' : 'rgba(233,16,46,0.3)'};">
                    <span style="font-weight:600;color:var(--laliga-white);min-width:180px;">${label}${isToday ? ' ⭐' : ''}</span>
                    <span style="color:rgba(255,255,255,0.4);font-size:0.9rem;">MD</span>
                    <input type="number" class="matchday-prediction-input" data-date="${item.date}" value="${item.predicted || ''}" min="1" style="width:80px;padding:8px 12px;background:rgba(255,255,255,0.06);border:1px solid var(--laliga-red);border-radius:14px;color:white;font-family:'Rajdhani',sans-serif;font-size:1.2rem;outline:none;text-align:center;">
                    <span style="color:rgba(255,255,255,0.3);font-size:0.85rem;margin-left:auto;">${item.currentMd ? `(prev: ${item.currentMd})` : '(unassigned)'}</span>
                  </div>
                `;
                }).join('');

                showModal(`
                <h3>📊 Matchday Scheduling</h3>
                <p style="color:rgba(255,255,255,0.6);margin-bottom:16px;">Set matchday numbers for each fixture date. Predicted values will auto-increment from the "Set Today's MD" input.</p>
                <div style="display:flex;gap:12px;align-items:center;padding:16px 20px;background:rgba(0,0,0,0.25);border-radius:20px;margin-bottom:20px;">
                  <span style="color:rgba(255,255,255,0.6);font-weight:600;">Set Today's MD:</span>
                  <input type="number" id="todayMatchdayInput" value="${currentMatchday || 1}" min="1" style="width:100px;padding:10px 16px;background:rgba(255,255,255,0.06);border:1px solid var(--laliga-red);border-radius:14px;color:white;font-family:'Rajdhani',sans-serif;font-size:1.4rem;outline:none;text-align:center;">
                  <button class="modal-btn-primary" id="predictMatchdaysBtn" style="padding:10px 28px;font-size:1.2rem;">🔮 Predict</button>
                </div>
                <div style="max-height:350px;overflow-y:auto;margin:12px 0;">
                  ${listHtml}
                </div>
                <div style="margin-top:20px;padding:16px;background:rgba(233,16,46,0.08);border:1px solid var(--laliga-red);border-radius:16px;">
                  <p style="color:rgba(255,255,255,0.5);font-size:1rem;">📌 Predict will auto-fill from the current date forward, incrementing by 1 for each fixture date. Dates with no fixtures are skipped.</p>
                </div>
                <div class="modal-btns" style="margin-top:20px;">
                  <button class="modal-btn-primary" id="confirmMatchdayPredictions">✅ Confirm All Predictions</button>
                  <button class="modal-btn-cancel" id="cancelMatchdayModal">Cancel</button>
                </div>
                <div id="matchdayPredictionStatus"></div>
              `);

                document.getElementById('cancelMatchdayModal').onclick = closeModal;

                document.getElementById('predictMatchdaysBtn').onclick = () => {
                    const todayMd = parseInt(document.getElementById('todayMatchdayInput').value);
                    if (isNaN(todayMd) || todayMd < 1) {
                        document.getElementById('matchdayPredictionStatus').innerHTML =
                            '<div class="status-msg status-error">Enter a valid matchday number.</div>';
                        return;
                    }
                    let startIdx = dateItems.findIndex(d => d.date === todayStr);
                    if (startIdx === -1) startIdx = 0;

                    let currentMd = todayMd;
                    for (let i = startIdx; i < dateItems.length; i++) {
                        dateItems[i].predicted = currentMd;
                        currentMd++;
                    }
                    if (startIdx > 0) {
                        let backwardMd = todayMd - 1;
                        for (let i = startIdx - 1; i >= 0; i--) {
                            dateItems[i].predicted = backwardMd;
                            backwardMd--;
                        }
                    }
                    renderMatchdayModal();
                };

                document.getElementById('confirmMatchdayPredictions').onclick = async () => {
                    const statusEl = document.getElementById('matchdayPredictionStatus');
                    const btn = document.getElementById('confirmMatchdayPredictions');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="btn-spinner"></span> Saving...';
                    statusEl.innerHTML = '<div class="status-msg status-loading">Saving matchday assignments...</div>';

                    const inputs = document.querySelectorAll('.matchday-prediction-input');
                    const updates = [];
                    let todayMd = null;
                    for (const inp of inputs) {
                        const date = inp.dataset.date;
                        const val = parseInt(inp.value);
                        if (!isNaN(val) && val > 0) {
                            updates.push({ date, md: val });
                            if (date === todayStr) todayMd = val;
                        }
                    }

                    if (updates.length === 0) {
                        statusEl.innerHTML = '<div class="status-msg status-error">No valid matchday numbers entered.</div>';
                        btn.disabled = false;
                        btn.innerHTML = '✅ Confirm All Predictions';
                        return;
                    }

                    try {
                        for (const u of updates) {
                            await saveMatchdayForDate(u.date, u.md);
                        }
                        if (todayMd !== null) {
                            await saveCurrentMatchday(todayMd);
                        } else if (updates.length > 0) {
                            const earliest = updates.reduce((a, b) => a.date < b.date ? a : b);
                            await saveCurrentMatchday(earliest.md);
                        }
                        await loadCalendarEvents();
                        await loadCurrentMatchday();
                        statusEl.innerHTML =
                            `<div class="status-msg status-success">✅ ${updates.length} matchday(s) saved!</div>`;
                        btn.innerHTML = '✓ Done';
                        setTimeout(() => {
                            closeModal();
                            renderCurrentTab();
                        }, 1000);
                    } catch (e) {
                        statusEl.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`;
                        btn.disabled = false;
                        btn.innerHTML = '✅ Confirm All Predictions';
                    }
                };

                document.querySelectorAll('.matchday-prediction-input').forEach(inp => {
                    inp.addEventListener('change', function() {
                        const date = this.dataset.date;
                        const val = parseInt(this.value);
                        if (!isNaN(val) && val > 0) {
                            const item = dateItems.find(d => d.date === date);
                            if (item) item.predicted = val;
                        }
                    });
                });
            };

            renderMatchdayModal();
        }

        // ─── MENU AND EVENT LISTENERS ───
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active'); }

        function closeMenu() { document.getElementById('sideMenu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active'); }
        document.getElementById('menuBtn').onclick = toggleMenu;
        document.getElementById('closeMenuBtn').onclick = closeMenu;
        document.getElementById('overlay').onclick = closeMenu;
        document.getElementById('homeBtn').onclick = () => window.location.href = 'feed.html';

        document.getElementById('addResultsMenuBtn').onclick = () => { closeMenu();
            openAddResultsKeyModal(); };

        document.getElementById('adminModeBtn').onclick = async () => {
            if (localStorage.getItem('laliga_adminModeVerified') === 'true') {
                isAdminMode = true;
                document.getElementById('seasonAdminPanel').style.display = 'flex';
                renderCurrentTab();
                if (!document.getElementById('adminSettingsItem')) {
                    const item = document.createElement('div');
                    item.id = 'adminSettingsItem';
                    item.className = 'menu-item';
                    item.innerHTML = '⚙️ Admin Settings';
                    item.onclick = () => { openAdminSettings();
                        closeMenu(); };
                    document.getElementById('sideMenu').appendChild(item);
                }
                return;
            }
            const key = prompt("Enter admin key:");
            if (key === null) return;
            const btn = document.getElementById('adminModeBtn');
            const origText = btn.textContent;
            btn.textContent = '⏳ Verifying...';
            btn.style.opacity = '0.6';
            try {
                const res = await fetch(RENDER_URL + '/verify-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: key })
                });
                const data = await res.json();
                btn.textContent = origText;
                btn.style.opacity = '1';
                if (data.success === true) {
                    isAdminMode = true;
                    localStorage.setItem('laliga_adminModeVerified', 'true');
                    alert("Admin mode activated ✅");
                    document.getElementById('seasonAdminPanel').style.display = 'flex';
                    renderCurrentTab();
                    if (!document.getElementById('adminSettingsItem')) {
                        const item = document.createElement('div');
                        item.id = 'adminSettingsItem';
                        item.className = 'menu-item';
                        item.innerHTML = '⚙️ Admin Settings';
                        item.onclick = () => { openAdminSettings();
                            closeMenu(); };
                        document.getElementById('sideMenu').appendChild(item);
                    }
                } else {
                    alert("Incorrect key");
                }
            } catch (err) {
                btn.textContent = origText;
                btn.style.opacity = '1';
                alert("Error verifying key: " + err.message);
            }
        };

        document.getElementById('prevSeasonBtn').onclick = () => switchSeason(-1);
        document.getElementById('nextSeasonBtn').onclick = () => switchSeason(1);
        document.getElementById('addSeasonBtn').onclick = () => isAdminMode && addNewSeason();
        document.getElementById('renameSeasonBtn').onclick = () => isAdminMode && renameSeason();
        document.getElementById('setActiveSeasonBtn').onclick = () => isAdminMode && setActiveSeason();

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCurrentTab();
            });
        });

        function attachRealtimeListeners() {
            database.ref(getSeasonPath(currentSeasonId, 'table')).on('value', snap => { teamsData = snap.val() ?
                    Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })) : [];
                if (document.querySelector('.tab-btn.active')?.dataset.tab === 'table') renderTable(); });
            database.ref(getSeasonPath(currentSeasonId, 'results')).on('value', snap => { resultsData = snap.val() ?
                    Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })) : [];
                const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab; if (activeTab === 'results')
                    renderResults(); if (activeTab === 'table') renderTable(); });
            database.ref(getSeasonPath(currentSeasonId, 'topScorers/list')).on('value', async () => {
                await loadTopScorerData();
                if (document.querySelector('.tab-btn.active')?.dataset.tab === 'topscorers') renderTopScorers();
            });
            database.ref(getSeasonPath(currentSeasonId, 'topAssistants/list')).on('value', async () => {
                await loadTopAssistantData();
                if (document.querySelector('.tab-btn.active')?.dataset.tab === 'topassists') renderTopAssistants();
            });
            database.ref('calendarEvents').on('value', snap => { calendarEventsData = snap.val() || {};
                if (document.querySelector('.tab-btn.active')?.dataset.tab === 'fixtures') renderFixtures(); });
            database.ref('laliga/watchMatch/videos').on('value', async () => { await loadWatchMatchVideos();
                if (document.querySelector('.tab-btn.active')?.dataset.tab === 'watch') renderWatchMatch(); });
            database.ref(getSeasonPath(currentSeasonId, 'managerHistory')).on('value', async () => {
                await loadManagerHistory();
                if (document.querySelector('.tab-btn.active')?.dataset.tab === 'table') renderTable(); });
        }

        async function init() {
            await loadBackgroundImage();
            await loadSlideshow();
            await loadTeamIcons();
            await loadNavbarLogo();
            await loadTableHeaderBgImage();
            await loadWatchMatchVideos();
            await loadCalendarEvents();
            await loadSeasonsMetadata();
            await loadTopScorerData();
            await loadTopAssistantData();
            await loadCurrentMatchday();
            await loadManagerHistory();
            await loadTeamNameMappings();
            await loadTeamLogoMappings();
            attachRealtimeListeners();
            renderCurrentTab();
        }
        init();
    </script>
</body>
</html>
