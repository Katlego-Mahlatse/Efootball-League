
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            var designWidth = 1200;
            var screenWidth = window.screen.width;
            var scale = screenWidth / designWidth;
            scale = Math.min(1.0, Math.max(0.3, scale));
            var viewportMeta = document.createElement('meta');
            viewportMeta.name = 'viewport';
            viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
            document.head.appendChild(viewportMeta);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --laliga-red: #E9102E;
            --laliga-red-light: #ff2a46;
            --laliga-red-dark: #8c0a1c;
            --laliga-navy: #5c0716;
            --laliga-navy-dark: #3a0410;
            --laliga-white: #ffffff;
            --glass-bg: rgba(233, 16, 46, 0.07);
            --glass-border: rgba(233, 16, 46, 0.25);
            --glass-blur: blur(12px);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes pulseRed {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(233, 16, 46, 0.4);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(233, 16, 46, 0);
            }
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes shimmer {
            0% {
                background-position: -600px 0;
            }
            100% {
                background-position: 600px 0;
            }
        }
        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--laliga-navy-dark);
            min-height: 100vh;
            overflow-x: auto;
            min-width: 1200px;
            width: 1200px;
            margin: 0 auto;
            font-size: 20px;
            padding-bottom: 3rem;
        }
        body.has-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: var(--bg-image);
            background-size: var(--bg-size, cover);
            background-position: var(--bg-pos, center);
            background-repeat: no-repeat;
            z-index: -2;
        }
        body.has-bg::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(58, 4, 16, 0.55);
            z-index: -1;
        }

        /* ─── NAVBAR ─── */
        .navbar {
            background: linear-gradient(90deg, var(--laliga-red) 0%, var(--laliga-red-dark) 50%, var(--laliga-navy-dark) 100%);
            border-bottom: 2px solid var(--laliga-white);
            padding: 0 2rem;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
            animation: fadeInDown 0.5s ease both;
        }
        .navbar-logo {
            height: 74px;
            max-width: 260px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .navbar-logo:hover {
            transform: scale(1.05);
        }
        .navbar-logo-placeholder {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: var(--laliga-white);
            cursor: pointer;
            font-weight: bold;
        }
        .menu-btn {
            background: var(--laliga-navy);
            border: 2px solid var(--laliga-red-light);
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .menu-btn span {
            width: 32px;
            height: 4px;
            background: var(--laliga-red);
            border-radius: 4px;
            transition: all 0.3s;
        }
        .menu-btn:hover {
            background: var(--laliga-navy-dark);
            transform: rotate(90deg);
        }

        /* ─── SIDE MENU ─── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 199;
            display: none;
            backdrop-filter: blur(3px);
        }
        .overlay.active {
            display: block;
        }
        .side-menu {
            position: fixed;
            top: 0;
            right: -360px;
            width: 360px;
            height: 100%;
            background: rgba(14, 26, 58, 0.98);
            backdrop-filter: blur(20px);
            border-left: 2px solid var(--laliga-red);
            z-index: 200;
            padding: 40px 28px;
            transition: right 0.35s cubic-bezier(.4, 0, .2, 1);
        }
        .side-menu.active {
            right: 0;
        }
        .close-menu {
            text-align: right;
            font-size: 2.8rem;
            cursor: pointer;
            color: var(--laliga-white);
            margin-bottom: 40px;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-menu:hover {
            color: var(--laliga-red);
        }
        .menu-item {
            padding: 40px 28px;
            margin: 12px 0;
            border: 1px solid rgba(233, 16, 46, 0.3);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--laliga-white);
            transition: all 0.2s;
            font-family: 'Rajdhani', sans-serif;
        }
        .menu-item:hover {
            background: var(--laliga-red);
            border-color: var(--laliga-white);
            color: var(--laliga-white);
            transform: translateX(8px);
        }

        /* ─── SLIDESHOW ─── */
        .slideshow-wrapper {
            padding: 36px 36px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.7s ease 0.2s both;
        }
        .slideshow-frame {
            width: 100%;
            max-width: 1100px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(233, 16, 46, 0.25);
            border: 2px solid var(--laliga-red);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slideshow-img {
            width: 100%;
            height: auto;
            max-height: 520px;
            object-fit: contain;
            display: block;
            transition: opacity 0.5s ease;
        }
        .dots-container {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(233, 16, 46, 0.3);
            cursor: pointer;
            transition: all 0.25s;
        }
        .dot.active {
            background: var(--laliga-red);
            transform: scale(1.4);
            box-shadow: 0 0 12px rgba(233, 16, 46, 0.7);
        }
        .dot:hover {
            background: var(--laliga-red-light);
        }

        /* ─── SEASON BAR ─── */
        .season-bar {
            display: flex;
            justify-content: center;
            margin: 24px 0 16px;
        }
        .season-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(14, 26, 58, 0.8);
            border: 2px solid var(--laliga-red);
            padding: 12px 32px;
            border-radius: 80px;
            backdrop-filter: blur(8px);
        }
        .season-arrow {
            background: rgba(233, 16, 46, 0.15);
            border: 1px solid var(--laliga-red);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            color: var(--laliga-white);
            font-weight: bold;
            transition: all 0.2s;
            line-height: 1;
        }
        .season-arrow:hover:not(:disabled) {
            background: var(--laliga-red);
            color: var(--laliga-white);
            transform: scale(1.1);
        }
        .season-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .season-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: var(--laliga-white);
            min-width: 180px;
            text-align: center;
        }
        .season-admin-btns {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }
        .season-admin-btn {
            background: rgba(233, 16, 46, 0.15);
            border: 1px solid var(--laliga-red);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: var(--laliga-white);
            font-size: 1.1rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.2s;
        }
        .season-admin-btn:hover {
            background: var(--laliga-red);
        }

        /* ─── TABS ─── */
        .tabs-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 28px 36px 0;
            background: rgba(14, 26, 58, 0.7);
            border: 2px solid var(--laliga-red);
            border-radius: 80px;
            padding: 12px 20px;
            backdrop-filter: blur(8px);
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 0.5s ease 0.3s both;
        }
        .tabs-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent;
            border: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 10px 28px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 60px;
            letter-spacing: 0.5px;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--laliga-red);
            color: var(--laliga-white);
        }
        .tab-btn:hover:not(.active) {
            color: var(--laliga-white);
            background: rgba(233, 16, 46, 0.2);
        }

        /* ─── CONTENT CARD ─── */
        .content-card {
            margin: 24px 36px 40px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px;
            min-height: 200px;
            animation: fadeInUp 0.5s ease 0.4s both;
        }

        /* ─── LOADING ─── */
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            gap: 24px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(233, 16, 46, 0.2);
            border-top-color: var(--laliga-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-spinner span {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.4rem;
            font-family: 'Rajdhani', sans-serif;
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.4);
        }
        .empty-state .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .empty-state p {
            font-size: 2rem;
            font-weight: 500;
            font-family: 'Rajdhani', sans-serif;
        }

        /* ─── TABLE WRAPPER with horizontal scroll ─── */
        .table-scroll-wrap {
            overflow-x: auto;
            border-radius: 20px;
            position: relative;
        }

        /* ─── LEAGUE TABLE ─── */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rajdhani', sans-serif;
            min-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            color: var(--laliga-white);
        }
        .stats-table thead th {
            background: rgba(0, 0, 0, 0.25);
            color: var(--laliga-white);
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 18px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            z-index: 20;
        }

        /* Sticky pos column */
        .stats-table th:first-child,
        .stats-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 25;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            width: 64px;
            min-width: 64px;
        }
        .stats-table thead th:first-child {
            background: rgba(0, 0, 0, 0.25);
            z-index: 30;
        }

        /* Sticky club column */
        .stats-table th:nth-child(2),
        .stats-table td:nth-child(2) {
            position: sticky;
            left: 64px;
            z-index: 24;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 4px 0 8px -2px rgba(0, 0, 0, 0.45);
            border-right: 2px solid rgba(255, 255, 255, 0.15);
        }
        .stats-table thead th:nth-child(2) {
            background: rgba(0, 0, 0, 0.25);
            z-index: 30;
        }

        .stats-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.2s;
        }
        .stats-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .stats-table td {
            padding: 14px 18px;
            color: var(--laliga-white);
            font-size: 1.3rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .stats-table td.stat-number {
            font-size: 2.6rem !important;
            font-weight: 800;
            line-height: 1.2;
        }
        .team-name-text {
            font-weight: 700;
            font-size: 2.8rem !important;
            color: var(--laliga-white);
        }
        .pts-cell {
            font-weight: 800;
            color: var(--laliga-white);
            font-size: 1.5rem;
        }
        .rank-cell {
            font-weight: 700;
            color: var(--laliga-white);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
        }

        /* ─── TABLE HEADER ROW ─── */
        .table-header-row {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 20px 20px 0 0;
            padding: 0;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-bottom: none;
        }
        .table-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 14px 18px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 20px 20px 0 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-bottom: 3px solid rgba(255, 255, 255, 0.2);
            align-items: center;
        }
        .table-actions-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            color: var(--laliga-white);
            letter-spacing: 2px;
            flex: 1;
        }
        .add-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--laliga-red);
            color: var(--laliga-white);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-btn:hover {
            background: var(--laliga-red);
            color: var(--laliga-white);
            transform: translateY(-2px);
        }
        .three-dot-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--laliga-red);
            color: var(--laliga-white);
            font-size: 2.2rem;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .three-dot-btn:hover {
            background: var(--laliga-red);
            color: var(--laliga-white);
        }

        /* ─── TOP SCORERS & TOP ASSISTANTS ─── */
        .stats-list {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rajdhani', sans-serif;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            color: var(--laliga-white);
        }
        .stats-list thead th {
            background: rgba(0, 0, 0, 0.25);
            color: var(--laliga-white);
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 18px 22px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }
        .stats-list tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.2s;
        }
        .stats-list tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .stats-list td {
            padding: 18px 22px;
            color: var(--laliga-white);
            font-size: 1.4rem;
            font-weight: 600;
        }
        .stats-list td:first-child {
            color: var(--laliga-white);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            font-weight: bold;
        }
        .count-badge {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--laliga-white);
            padding: 6px 22px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.4rem;
        }
        .stat-team-cell {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--laliga-white);
        }

        /* TOP 3 BLOCKS */
        .top3-container {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 40px;
            flex-wrap: nowrap;
            width: 100%;
        }
        .top3-block {
            position: relative;
            text-align: center;
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 0;
            padding: 0;
            transition: transform 0.3s;
            margin: 0;
            min-width: 0;
        }
        .top3-block:first-child {
            border-top-left-radius: 32px;
            border-bottom-left-radius: 32px;
        }
        .top3-block:last-child {
            border-top-right-radius: 32px;
            border-bottom-right-radius: 32px;
        }
        .top3-block:hover {
            transform: translateY(-8px);
            z-index: 5;
        }
        .player-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border: 3px solid var(--laliga-red);
            background: #0E1A3A;
            margin: 0;
            border-radius: 0;
        }
        .top3-block:first-child .player-image-wrapper {
            border-top-left-radius: 32px;
            border-bottom-left-radius: 32px;
        }
        .top3-block:last-child .player-image-wrapper {
            border-top-right-radius: 32px;
            border-bottom-right-radius: 32px;
        }
        .player-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .medal-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 3rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            z-index: 2;
        }
        .edit-block-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--laliga-red);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.6rem;
            color: var(--laliga-white);
            transition: all 0.2s;
            z-index: 3;
        }
        .edit-block-btn:hover {
            background: var(--laliga-red);
            transform: scale(1.1);
        }
        .player-name-overlay {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.3));
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            padding: 6px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            z-index: 2;
            letter-spacing: 0.5px;
            border-left: 3px solid var(--laliga-red);
            pointer-events: none;
        }
        .team-icon-overlay {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 56px;
            height: 56px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            padding: 6px;
            z-index: 2;
        }
        .team-icon-overlay img {
            width: 100%;

            background: rgba(14, 26, 58, 0.8);
            border: 1px solid var(--laliga-red);

            border-radius: 50px;
            border-left: 4px solid var(--laliga-red);

            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .fixture-date-label .date-text {

        .fixture-date-label .matchday-badge {
            background: rgba(233, 16, 46, 0.5);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 1.2rem;

        .edit-matchday-btn {

            text-align: center;

            font-weight: 700;

        .see-more-btn {

            background: rgba(233, 16, 46, 0.2);
            border: 2px solid var(--laliga-red);
            color: var(--laliga-white);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            padding: 16px 40px;
            border-radius: 60px;
            cursor: pointer;

        }
        .see-more-btn:hover {
            background: var(--laliga-red);
            transform: translateY(-2px);
        }

        /* ─── MATCH CARDS ─── */

            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .match-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 28px;
            padding: 32px 48px;
            transition: all 0.25s;
            animation: cardSlideIn 0.4s ease both;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .match-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(233, 16, 46, 0.35);
        }
        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;

            align-items: center;

            flex: 1;
            text-align: center;
        }
        .team-name-big {

            font-weight: 700;
            font-size: 2.8rem;
            color: var(--laliga-white);
            letter-spacing: 0.3px;
        }
        .match-center {

            align-items: center;
            gap: 8px;

        }
        .score-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4.5rem;
            color: var(--laliga-white);
            letter-spacing: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 14px 42px;
            border-radius: 80px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .forfeit-display {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: #ffaaaa;
            letter-spacing: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 28px;
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .aggregate-text {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Rajdhani', sans-serif;
        }
        .goal-scorers {
            margin-top: 12px;
        }
        .goal-scorer-item {
            display: inline-block;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(233, 16, 46, 0.5);
            padding: 5px 14px;
            border-radius: 30px;
            margin: 3px;
            font-size: 1.4rem;
            color: var(--laliga-white);

        .match-meta {

        .meta-tag {
            font-size: 1.4rem;

            color: var(--laliga-white);

            border: 1px solid rgba(233, 16, 46, 0.3);

            gap: 16px;

            margin-top: 24px;

        .btn-sm {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 12px 32px;
            border-radius: 50px;

            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .btn-edit {
            background: rgba(255, 255, 255, 0.15);

            border: 1px solid rgba(255, 255, 255, 0.3);
        }

            background: var(--laliga-white);
            color: var(--laliga-red);
        }
        .btn-delete {

            border: 1px solid rgba(255, 255, 255, 0.15);
        }

            background: #7a0000;
            color: white;
        }

        .add-btn-main {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--laliga-red);
            color: var(--laliga-red);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            padding: 20px 56px;

            background: var(--laliga-red);

            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(233, 16, 46, 0.4);

        .add-result-top-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--laliga-red);
            border: 2px solid var(--laliga-red);
            color: var(--laliga-white);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            white-space: nowrap;

            background: var(--laliga-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(233, 16, 46, 0.4);

        /* ─── WATCH MATCH ─── */
        .inline-media {
            width: 100%;

            background: #000;
            margin-bottom: 24px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--laliga-white);
            padding: 16px 8px 8px 8px;
            letter-spacing: 1px;
            text-align: left;
            border-bottom: 2px solid rgba(233, 16, 46, 0.3);
            margin-top: 4px;
        }
        .video-item {
            margin-bottom: 40px;
        }
        .video-delete-btn {
            background: rgba(100, 0, 0, 0.25);
            border: 1px solid var(--laliga-red);
            color: var(--laliga-white);
            padding: 8px 24px;
            border-radius: 40px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .video-delete-btn:hover {
            background: #7a0000;
        }

        /* ─── MODAL ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-card {
            background: rgba(14, 26, 58, 0.98);
            border: 2px solid var(--laliga-red);
            border-radius: 40px;
            padding: 44px;
            max-width: 860px;
            width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            font-family: 'Rajdhani', sans-serif;
            animation: fadeInUp 0.35s ease both;
        }
        .modal-card h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            color: var(--laliga-red);
            letter-spacing: 2px;
            margin-bottom: 28px;
        }
        .modal-card label {
            display: block;
            color: rgba(255, 255, 255, 0.55);
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            margin-top: 20px;
        }
        .modal-card input,
        .modal-card select,
        .modal-card textarea {
            width: 100%;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--laliga-red);
            border-radius: 28px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            font-weight: 500;
            outline: none;
        }
        .modal-card textarea {
            min-height: 100px;
        }
        .modal-card input:focus,
        .modal-card select:focus {
            box-shadow: 0 0 0 3px rgba(233, 16, 46, 0.3);

        .scorer-section {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 18px;
            padding-top: 18px;

        .scorer-section h4 {
            color: var(--laliga-red);

            margin-bottom: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;

            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }
        .scorer-badge {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--laliga-red);
            border-radius: 32px;
            padding: 7px 18px;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--laliga-white);
        }

            background: #b91c1c;

            border-radius: 50%;
            width: 26px;
            height: 26px;
            font-size: 16px;
            cursor: pointer;
        }
        .modal-btns {
            display: flex;
            gap: 18px;
            margin-top: 28px;
        }
        .modal-btn-primary,
        .modal-btn-cancel {
            flex: 1;
            padding: 16px;
            border-radius: 28px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 1px;
            cursor: pointer;

        .modal-btn-primary {
            background: var(--laliga-red);
            color: white;
            border: none;
            transition: background 0.2s;
        }
        .modal-btn-primary:hover {
            background: var(--laliga-red-light);
        }
        .modal-btn-cancel {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--laliga-red);

        .status-msg {
            margin-top: 14px;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2rem;

            background: #dcfce7;
            color: #166534;
        }
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-loading {
            background: #fef3c7;
            color: #92400e;
        }
        .settings-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .settings-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--laliga-red);
            color: var(--laliga-white);
            padding: 18px 26px;
            border-radius: 28px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;

            gap: 16px;

            background: var(--laliga-red);

        .popup-menu {
            position: absolute;
            background: rgba(14, 26, 58, 0.98);
            border: 1px solid var(--laliga-red);
            border-radius: 20px;

            background: rgba(233, 16, 46, 0.2);
            transform: translateX(8px);

            background: rgba(233, 16, 46, 0.15);

        async function uploadToImgBB(blob) {
            const fd = new FormData();
            fd.append('image', blob);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
            const data = await res.json();
            if (!data.success) throw new Error(data.error?.message || 'ImgBB upload failed');
            return data.data.url;
        }

        async function removeBackground(file) {
            const fd = new FormData();
            fd.append('image_file', file);
            fd.append('size', 'auto');
            const res = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': RMBG_KEY },
                body: fd
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err?.errors?.[0]?.title || 'remove.bg failed');
            }
            return await res.blob();
        }

        function pickFile(accept) {
            return new Promise(res => {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = accept;
                inp.onchange = e => res(e.target.files[0] || null);
                inp.click();
            });

        async function loadNavbarLogo() {

            tableHeaderBgImageUrl = snap.val() || '';
        }

        async function loadWatchMatchVideos() {
            const videosSnap = await database.ref('laliga/watchMatch/videos').once('value');
            watchMatchVideos = videosSnap.val() ? Object.entries(videosSnap.val()).map(([k, v]) => ({ key: k,
                ...v })) : [];
            if (watchMatchVideos.length === 0) {
                const legacySnap = await database.ref('laliga/watchMatch/embedCode').once('value');
                watchMatchLegacyEmbed = legacySnap.val() || '';
            } else {
                watchMatchLegacyEmbed = '';
            }
        }

        async function loadTeamIcons() {
            const snapshot = await database.ref('laliga_teamIcons').once('value');
            const data = snapshot.val() || {};
            for (const [team, value] of Object.entries(data)) {
                if (value.imageUrl) teamIconsCache[team] = value.imageUrl;
            }
        }

        async function loadCalendarEvents() {
            const snap = await database.ref('calendarEvents').once('value');
            calendarEventsData = snap.val() || {};
        }

        async function saveMatchdayForDate(date, matchdayNum) {
            if (!calendarEventsData[date]) calendarEventsData[date] = {};
            calendarEventsData[date].matchday = matchdayNum;
            await database.ref(`calendarEvents/${date}/matchday`).set(matchdayNum);
        }

        // ─── AUTO TABLE UPDATE ───
        async function applyResultToTable(homeTeam, awayTeam, homeScore, awayScore, forfeitType) {
            const isNoContest = forfeitType === 'no_contest';
            const isForfeitWin = (forfeitType === 'forfeit_no_reply' || forfeitType === 'forfeit_agreement');

            const tableSnap = await database.ref(getSeasonPath(currentSeasonId, 'table')).once('value');
            const tableVal = tableSnap.val() || {};

            function findTeamEntry(name) {
                for (const [key, val] of Object.entries(tableVal)) {
                    if (val.name === name) return { key, data: { ...val } };
                }
                return null;
            }

            const homeEntry = findTeamEntry(homeTeam);
            const awayEntry = findTeamEntry(awayTeam);
            if (!homeEntry || !awayEntry) return;

            const hd = homeEntry.data;
            const ad = awayEntry.data;

            if (isNoContest) {
                hd.p = (hd.p || 0) + 1;
                ad.p = (ad.p || 0) + 1;
            } else if (isForfeitWin) {
                hd.p = (hd.p || 0) + 1;
                ad.p = (ad.p || 0) + 1;

                if (homeScore > awayScore) {
                    hd.w = (hd.w || 0) + 1;
                    hd.pts = (hd.pts || 0) + 3;
                    ad.l = (ad.l || 0) + 1;
                    ad.gd = (ad.gd || 0) - 3;
                    ad.gc = (ad.gc || 0) + 1;
                } else {
                    ad.w = (ad.w || 0) + 1;
                    ad.pts = (ad.pts || 0) + 3;
                    hd.l = (hd.l || 0) + 1;
                    hd.gd = (hd.gd || 0) - 3;
                    hd.gc = (hd.gc || 0) + 1;
                }
            } else {
                hd.p = (hd.p || 0) + 1;
                ad.p = (ad.p || 0) + 1;
                hd.gs = (hd.gs || 0) + homeScore;
                hd.gc = (hd.gc || 0) + awayScore;
                ad.gs = (ad.gs || 0) + awayScore;
                ad.gc = (ad.gc || 0) + homeScore;
                hd.gd = (hd.gd || 0) + (homeScore - awayScore);
                ad.gd = (ad.gd || 0) + (awayScore - homeScore);

                if (homeScore > awayScore) {
                    hd.w = (hd.w || 0) + 1;
                    hd.pts = (hd.pts || 0) + 3;
                    ad.l = (ad.l || 0) + 1;
                } else if (homeScore < awayScore) {
                    ad.w = (ad.w || 0) + 1;
                    ad.pts = (ad.pts || 0) + 3;
                    hd.l = (hd.l || 0) + 1;
                } else {
                    hd.d = (hd.d || 0) + 1;
                    hd.pts = (hd.pts || 0) + 1;
                    ad.d = (ad.d || 0) + 1;
                    ad.pts = (ad.pts || 0) + 1;
                }
            }

            await database.ref(getSeasonPath(currentSeasonId, `table/${homeEntry.key}`)).set(hd);
            await database.ref(getSeasonPath(currentSeasonId, `table/${awayEntry.key}`)).set(ad);
        }

        // ─── Seasons & Migration ───
        async function loadSeasonsMetadata() {
            const snapshot = await database.ref('laliga/seasons').once('value');
            const seasons = snapshot.val() || {};
            availableSeasons = [];
            for (const key in seasons) {
                if (!key.startsWith('season_')) continue;
                const id = parseInt(key.split('_')[1]);
                if (!isNaN(id)) availableSeasons.push(id);
                if (seasons[key].active === true) activeSeasonId = id;
            }
            if (!availableSeasons.length) {
                await database.ref('laliga/seasons/season_1/table').set({});
                await database.ref('laliga/seasons/season_1/results').set({});
                await database.ref('laliga/seasons/season_1/active').set(true);
                availableSeasons.push(1);
                activeSeasonId = 1;
            }
            availableSeasons.sort((a, b) => a - b);
            if (!availableSeasons.includes(activeSeasonId) && availableSeasons.length) activeSeasonId = availableSeasons[0];
            currentSeasonId = activeSeasonId;
            updateSeasonUI();
            await loadCurrentSeasonData();
            await loadManagerNamesForSeason();
            await loadManagerHistory();
        }

        function updateSeasonUI() {
            document.getElementById('seasonNumber').textContent = `Season ${currentSeasonId}`;
            const idx = availableSeasons.indexOf(currentSeasonId);
            document.getElementById('prevSeasonBtn').disabled = idx <= 0;
            document.getElementById('nextSeasonBtn').disabled = idx >= availableSeasons.length - 1;
            document.getElementById('seasonAdminPanel').style.display = isAdminMode ? 'flex' : 'none';
        }

            const [tableSnap, resultsSnap] = await Promise.all([
                database.ref(getSeasonPath(currentSeasonId, 'table')).once('value'),
                database.ref(getSeasonPath(currentSeasonId, 'results')).once('value'),
            ]);
            teamsData = tableSnap.val() ? Object.entries(tableSnap.val()).map(([k, v]) => ({ key: k, ...v })) : [];
            resultsData = resultsSnap.val() ? Object.entries(resultsSnap.val()).map(([k, v]) => ({ key: k, ...v })) : [];
        }

            playerMap = snap.val() || {};

        async function loadManagerHistory() {
            const snap = await database.ref(getSeasonPath(currentSeasonId, 'managerHistory')).once('value');

                managerHistory[team] = Object.entries(entries).map(([key, val]) => ({ key, ...val }));

            const entries = managerHistory[teamName] || [];
            const active = entries.find(e => e.status === 'active');

        // ─── Form / Last5 helpers ───
        function getResultStatusForTeam(team, matchText) {
            const lower = matchText.toLowerCase();
            if (lower.includes("no contest") || lower.includes("f - f")) return "F";
            const isForfeit = lower.includes("forfeit") || lower.includes("forfeited");
            const parts = matchText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/);
            if (parts) {
                let home = parts[1].trim(),
                    hs = parseInt(parts[2]),
                    as2 = parseInt(parts[3]),
                    away = parts[4].trim();
                if (home === team && hs > as2) return isForfeit ? "WF" : "W";
                if (home === team && hs < as2) return isForfeit ? "LF" : "L";
                if (away === team && as2 > hs) return isForfeit ? "WF" : "W";
                if (away === team && as2 < hs) return isForfeit ? "LF" : "L";
                if ((home === team || away === team) && hs === as2) return "D";
            }
            return null;
        }

        function getTeamLast5(team) {
            const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a, b) => (b.md || 0) - (a
            .md || 0));
            const last5 = sorted.slice(0, 5).map(r => getResultStatusForTeam(team, r.matchText)).filter(Boolean);
            while (last5.length < 5) last5.push(null);
            return last5.reverse();
        }

        function getLatestArrow(team) {
            const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a, b) => (b.md || 0) - (a
            .md || 0));
            if (!sorted.length) return null;
            const s = getResultStatusForTeam(team, sorted[0].matchText);
            if (s === "W" || s === "WF") return "↑";
            if (s === "L" || s === "LF") return "↓";
            if (s === "D") return "→";
            return "⚪";
        }

        // ─── Helper for SAST today ───
        function getTodaySAST() {
            const now = new Date();
            const sastOffset = 2 * 60;
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const sast = new Date(utc + (sastOffset * 60000));
            const y = sast.getFullYear();
            const m = String(sast.getMonth() + 1).padStart(2, '0');
            const d = String(sast.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // ─── FIXTURES RENDERER ───
        function renderFixtures() {
            activeFixtureDate = getTodaySAST();

            const laligaFixtures = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            for (const [date, eventData] of Object.entries(calendarEventsData)) {
                const eventSeason = eventData.season;
                if (eventSeason !== undefined && eventSeason !== null && eventSeason !== currentSeasonId) {
                    continue;
                }
                if (eventData.tournaments && Array.isArray(eventData.tournaments)) {
                    for (const tournament of eventData.tournaments) {
                        let isLaLiga = false;
                        if (tournament.name) {
                            const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, '');
                            if (normalized === 'laliga') isLaLiga = true;
                        }
                        if (isLaLiga && tournament.fixtures && Array.isArray(tournament.fixtures)) {
                            for (const fixture of tournament.fixtures) {
                                laligaFixtures.push({
                                    date: date,
                                    homeTeam: fixture.home,
                                    awayTeam: fixture.away,
                                    tournamentName: tournament.name,
                                    eventName: eventData.eventPairs?.[0]?.name || 'LaLiga',
                                    matchday: fixture.matchday || tournament.matchday || null
                                });
                            }
                        }
                    }
                }
            }

            laligaFixtures.sort((a, b) => new Date(a.date) - new Date(b.date));

            const allTeams = [...new Set(laligaFixtures.flatMap(f => [f.homeTeam, f.awayTeam]).filter(Boolean))].sort();
            const allMonths = [...new Set(laligaFixtures.map(f => f.date.substring(0, 7)))].sort();
            const allMatchdays = [...new Set(laligaFixtures.map(f => f.matchday).filter(md => md !== null && md !==
            undefined))].sort((a, b) => a - b);

            let filtered = [...laligaFixtures];
            if (currentFixTeamFilter && currentFixTeamFilter !== 'all') {
                filtered = filtered.filter(f => f.homeTeam === currentFixTeamFilter || f.awayTeam ===
                currentFixTeamFilter);
            }
            if (currentFixMonthFilter && currentFixMonthFilter !== 'all') {
                filtered = filtered.filter(f => f.date.startsWith(currentFixMonthFilter));
            }
            if (currentFixMatchdayFilter && currentFixMatchdayFilter !== 'all') {
                filtered = filtered.filter(f => f.matchday === parseInt(currentFixMatchdayFilter));
            }

            const grouped = {};
            for (const fix of filtered) {
                if (!grouped[fix.date]) grouped[fix.date] = [];
                grouped[fix.date].push(fix);
            }

            let sortedDates = Object.keys(grouped).sort((a, b) => new Date(a) - new Date(b));

            function offsetDate(baseDateStr, days) {
                const [y, m, d] = baseDateStr.split('-').map(Number);
                const date = new Date(y, m - 1, d);
                date.setDate(date.getDate() + days);
                const ny = date.getFullYear();
                const nm = String(date.getMonth() + 1).padStart(2, '0');
                const nd = String(date.getDate()).padStart(2, '0');
                return `${ny}-${nm}-${nd}`;
            }
            const todayStr = activeFixtureDate;
            const yesterdayStr = offsetDate(todayStr, -1);
            const tomorrowStr = offsetDate(todayStr, 1);
            const dayAfterStr = offsetDate(todayStr, 2);
            let visibleDates = [];
            if (!showAllFixtures) {
                if (grouped[todayStr]) {
                    visibleDates = [todayStr];
                } else {
                    visibleDates = [];
                }
            } else {
                const priorityDates = [todayStr, yesterdayStr, tomorrowStr, dayAfterStr];
                const prioritySet = new Set(priorityDates);
                const remainingPast = sortedDates
                    .filter(d => !prioritySet.has(d) && d < todayStr)
                    .sort((a, b) => b.localeCompare(a));
                const remainingFuture = sortedDates
                    .filter(d => !prioritySet.has(d) && d > dayAfterStr)
                    .sort((a, b) => a.localeCompare(b));
                const orderedDates = [
                    ...priorityDates,
                    ...remainingPast,
                    ...remainingFuture
                ];
                visibleDates = orderedDates.filter(d => grouped[d]);
            }

            const monthLabels = {
                '01': 'January',
                '02': 'February',
                '03': 'March',
                '04': 'April',
                '05': 'May',
                '06': 'June',
                '07': 'July',
                '08': 'August',
                '09': 'September',
                '10': 'October',
                '11': 'November',
                '12': 'December'
            };

        // ─── PARSE RESULT ───
        function parseResultCard(r) {
            let homeTeam = '',
                awayTeam = '',
                homeScore = '',
                awayScore = '',
                isForfeit = false,
                forfeitType = '';
            const text = r.matchText || '';
            const lower = text.toLowerCase();
            if (lower.includes('no contest') || lower.includes('f - f')) isForfeit = true;
            else if (lower.includes('forfeit')) isForfeit = true;
            if (isForfeit && text.includes('F - F')) {
                const parts = text.split(/\s*F\s*-\s*F\s*/i);
                if (parts.length >= 2) { homeTeam = parts[0].trim().replace(/\(.*\)/g, '').trim();
                    awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim();
                    homeScore = 'F';
                    awayScore = 'F'; }
                if (text.includes('No Contest')) forfeitType = 'No Contest';
                else if (text.includes('Forfeited - No Reply')) forfeitType = 'Forfeited - No Reply';
                else if (text.includes('Forfeited on Agreement')) forfeitType = 'Forfeited on Agreement';
                else forfeitType = 'Forfeit';
            } else {
                const match = text.match(/(\d+)\s*-\s*(\d+)/);
                if (match) {
                    homeScore = match[1];
                    awayScore = match[2];
                    const parts = text.split(/\s+\d+\s*-\s*\d+\s+/);
                    if (parts.length >= 2) { homeTeam = parts[0].trim();
                        awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim(); }
                    if (lower.includes('forfeited - no reply')) forfeitType = 'Forfeited - No Reply';
                    else if (lower.includes('forfeited on agreement')) forfeitType = 'Forfeited on Agreement';
                    else if (lower.includes('forfeit')) forfeitType = 'Forfeit';
                }
            }
            return { homeTeam, awayTeam, homeScore, awayScore, isForfeit, forfeitType, md: r.md };
        }

        function extractYouTubeId(input) {
            if (!input) return null;
            if (input.includes('youtube.com/embed/')) {
                const match = input.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
                return match ? match[1] : null;
            }
            if (input.includes('youtu.be/')) {
                const match = input.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
                return match ? match[1] : null;
            }
            if (input.includes('youtube.com/watch?v=')) {
                const match = input.match(/v=([a-zA-Z0-9_-]{11})/);
                return match ? match[1] : null;
            }
            const match = input.match(/([a-zA-Z0-9_-]{11})/);
            return match && match[1].length === 11 ? match[1] : null;
        }

        function formatResultText(homeTeam, homeScore, awayTeam, awayScore, forfeitType) {
            if (forfeitType === "no_contest") return `${homeTeam} F - F ${awayTeam} (No Contest)`;
            if (forfeitType === "forfeit_no_reply") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited - No Reply)`;
            if (forfeitType === "forfeit_agreement") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited on Agreement)`;
            return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`;
        }

        let editingResultKey = null;

        async function openResultForm(r) {
            editingResultKey = r?.key || null;

            tempScorersAway = r?.goalScorers?.away ? [...r.goalScorers.away] : [];

                const text = r.matchText || '';

                else if (lower.includes('forfeited on agreement')) existingForfeit = 'forfeit_agreement';

                    ).join('');

            document.getElementById('saveResultBtn').onclick = async () => {

                        away: tempScorersAway } };

                if (!editingResultKey) await applyResultToTable(homeTeam, awayTeam, hs, as2, forfeit === 'none' ? '' :

        function attachThreeDotHandler() {
            const btn = document.getElementById('threeDotBtn');
            if (!btn) return;
            btn.onclick = (e) => {
                e.stopPropagation();
                if (popupEl) { popupEl.remove();
                    popupEl = null; return; }
                const rect = btn.getBoundingClientRect();
                popupEl = document.createElement('div');
                popupEl.className = 'popup-menu';
                popupEl.style.position = 'absolute';
                popupEl.style.top = (rect.bottom + window.scrollY + 6) + 'px';
                popupEl.style.left = (rect.left + window.scrollX - 80) + 'px';
                const opts = [
                    { label: currentView === 'team' ? 'Show Manager Names' : 'Show Team Names', fn: () => {
                            currentView = currentView === 'team' ? 'player' : 'team';
                            renderTable(); } },
                    { label: showFormArrows ? 'Hide Form Arrows' : 'Show Form Arrows', fn: () => {
                            showFormArrows = !showFormArrows;
                            renderTable(); } },
                    { label: showLast5 ? 'Hide Last 5' : 'Show Last 5', fn: () => { showLast5 = !showLast5;
                            renderTable(); } },
                ];
                if (isAdminMode) opts.unshift({ label: 'Edit Manager Names', fn: showEditManagersModal });
                opts.forEach(o => { const d = document.createElement('div');
                    d.textContent = o.label;
                    d.onclick = () => { if (popupEl) { popupEl.remove();
                            popupEl = null; }
                        o.fn(); };
                    popupEl.appendChild(d); });
                document.body.appendChild(popupEl);
            };
            document.addEventListener('click', e => { if (popupEl && !popupEl.contains(e.target) && e.target !== btn) {
                    popupEl.remove();
                    popupEl = null; } });
        }

                    );

                        parseInt(btn.dataset.idx);

                document.getElementById('uploadSlideBtn').onclick = async () => { const file = document
                        .getElementById('newSlideFile').files[0];

                            '<div class="status-msg status-error">Select a file first</div>';
                        return; } try { statusDiv.innerHTML =
                            '<div class="status-msg status-loading">Uploading…</div>';
                        const url = await uploadToImgBB(file);

                        await database.ref('laliga_slideshow/images').set(slideshowImages);
                        await loadSlideshow();
                        refresh(); } catch (e) { statusDiv.innerHTML =
                            `<div class="status-msg status-error">Error: ${e.message}</div>`; } };
                document.getElementById('saveDurBtn').onclick = async () => { let sec = parseFloat(document
                        .getElementById('slideDur').value); if (isNaN(sec)) sec = 3;

                        '<div class="status-msg status-success">Duration saved!</div>'; };
                document.getElementById('closeSlideBtn').onclick = closeModal;

        // ─── NEW SCAN SYSTEM ───

        // ─── File helpers ───
        function pickFiles(accept) {
            return new Promise(res => {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = accept;
                inp.multiple = true;
                inp.onchange = e => res(Array.from(e.target.files));
                inp.click();
            });
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ─── Name normalizer for smart player merging ───
        function normalizeName(name) {
            return (name || '').toLowerCase().replace(/\s/g, '');
        }

        function findMatchingPlayer(list, playerName, teamName) {
            const pNorm = normalizeName(playerName);
            const tNorm = normalizeName(teamName);
            for (const item of list) {
                if (normalizeName(item.name) === pNorm && normalizeName(item.team) === tNorm) {
                    return item;
                }
            }
            return null;
        }

        // ─── Apply scorers from scan ───
        async function applyScorersFromScan(scorers, team) {
            if (!scorers || !scorers.length) return;
            const path = getSeasonPath(currentSeasonId, 'topScorers/list');
            for (const s of scorers) {
                if (!s.player) continue;
                const existing = findMatchingPlayer(topScorerList, s.player, team);
                if (existing && existing.key) {
                    const newCount = (existing.count || 0) + (s.goals || 1);
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                } else {
                    await database.ref(path).push({ name: s.player, team, count: s.goals || 1, imageUrl: '' });
                }
            }
            await loadTopScorerData();
        }

        async function applyAssistsFromScan(assists, team) {
            if (!assists || !assists.length) return;
            const path = getSeasonPath(currentSeasonId, 'topAssistants/list');
            for (const a of assists) {
                if (!a.player) continue;
                const existing = findMatchingPlayer(topAssistantList, a.player, team);
                if (existing && existing.key) {
                    const newCount = (existing.count || 0) + (a.assists || 1);
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                } else {
                    await database.ref(path).push({ name: a.player, team, count: a.assists || 1, imageUrl: '' });
                }
            }
            await loadTopAssistantData();
        }

            const totalImages = multiScanMatches.reduce((sum, m) => sum + m.images.length, 0);
            const canScan = totalImages > 0;

            showModal(`

            <button class="add-match-block-btn" id="addMatchBlockBtn">+ Add Another Match</button>

              <button class="modal-btn-cancel" id="cancelMultiScanBtn">Cancel</button>
            </div>
          `, true);

            document.getElementById('cancelMultiScanBtn').onclick = () => {
                multiScanMatches = [];
                closeModal();
            };

            document.getElementById('addMatchBlockBtn').onclick = () => {
                multiScanIdCounter++;
                multiScanMatches.push({ id: multiScanIdCounter, images: [] });
                renderMultiScanModal();
            };

            document.querySelectorAll('[data-removemid]').forEach(btn => {
                btn.onclick = () => {
                    const mid = parseInt(btn.dataset.removemid);
                    multiScanMatches = multiScanMatches.filter(m => m.id !== mid);
                    renderMultiScanModal();
                };
            });

            document.querySelectorAll('.add-match-img-btn').forEach(btn => {
                btn.onclick = async () => {
                    const mid = parseInt(btn.dataset.mid);
                    const files = await pickFiles('image/*');
                    if (!files.length) return;
                    const match = multiScanMatches.find(m => m.id === mid);
                    if (!match) return;
                    for (const file of files) {
                        const dataUrl = await fileToDataUrl(file);
                        match.images.push({ file, dataUrl });
                    }
                    renderMultiScanModal();
                };
            });

            document.querySelectorAll('[data-iidx]').forEach(btn => {
                btn.onclick = () => {
                    const mid = parseInt(btn.dataset.mid);
                    const iIdx = parseInt(btn.dataset.iidx);
                    const match = multiScanMatches.find(m => m.id === mid);
                    if (match) {
                        match.images.splice(iIdx, 1);
                        renderMultiScanModal();
                    }
                };
            });

            document.getElementById('scanAllBtn').onclick = () => scanAllMatches();
        }

        async function scanAllMatches() {
            const statusEl = document.getElementById('scanAllStatus');
            const scanBtn = document.getElementById('scanAllBtn');
            if (scanBtn) {
                scanBtn.disabled = true;
                scanBtn.innerHTML = '<span class="btn-spinner"></span> Scanning…';
            }
            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">Starting scan...</div>';

            const results = [];
            for (let i = 0; i < multiScanMatches.length; i++) {
                const match = multiScanMatches[i];
                if (!match.images.length) continue;
                if (statusEl) statusEl.innerHTML =
                    `<div class="status-msg status-loading">🤖 Scanning Match ${i + 1} of ${multiScanMatches.length}…</div>`;
                try {
                    const scanned = await scanMatchImages(match.images, statusEl);
                    results.push({ matchIdx: i + 1, scanned });
                } catch (e) {
                    results.push({ matchIdx: i + 1, scanned: null, error: e.message });
                }
            }

            openMultiScanPreviewModal(results);
        }

        async function scanMatchImages(images, statusEl) {
            const contentParts = [{
                type: 'text',
                text: `Analyze these football/soccer match screenshot(s) and extract the following information in JSON format only (no markdown, no explanation, no code blocks): { "homeTeam": "team name exactly as shown", "awayTeam": "team name exactly as shown", "homeScore": 0, "awayScore": 0, "homeScorers": [{"player": "name", "goals": 1}], "awayScorers": [{"player": "name", "goals": 1}], "homeAssists": [{"player": "name", "assists": 1}], "awayAssists": [{"player": "name", "assists": 1}], "matchday": null } Use team names EXACTLY as shown in the image. If you cannot find scorers or assists, return empty arrays. Return ONLY the JSON object, nothing else.`
            }];

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">🖼️ Preparing images...</div>';

            for (const img of images) {
                const base64 = await fileToBase64(img.file);
                const mimeType = img.file.type || 'image/jpeg';
                contentParts.push({
                    type: 'image_url',
                    image_url: { url: `data:${mimeType};base64,${base64}` }
                });
            }

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">🤖 Sending to AI...</div>';

            const response = await fetch(RENDER_URL + '/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'meta-llama/llama-4-scout-17b-16e-instruct',
                    messages: [{ role: 'user', content: contentParts }],
                    max_tokens: 1000,
                    temperature: 0
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err?.error?.message || 'Scan API error: ' + response.status);
            }

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">📖 Reading response...</div>';

            const data = await response.json();
            const text = data.choices?.[0]?.message?.content || data.result || data.response || '';
            const clean = text.replace(/```json|```/g, '').trim();

            let parsed;
            try {
                const jsonMatch = clean.match(/\{[\s\S]*\}/);
                parsed = JSON.parse(jsonMatch ? jsonMatch[0] : clean);
            } catch (e) {
                throw new Error('Could not parse AI response: ' + clean.substring(0, 100));
            }

            if (parsed.homeTeam) parsed.homeTeam = mapTeamName(parsed.homeTeam);
            if (parsed.awayTeam) parsed.awayTeam = mapTeamName(parsed.awayTeam);
            parsed.homeScore = parseInt(parsed.homeScore) || 0;
            parsed.awayScore = parseInt(parsed.awayScore) || 0;

            if (statusEl) statusEl.innerHTML =
                `<div class="status-msg status-success">✅ Detected: ${parsed.homeTeam} vs ${parsed.awayTeam}</div>`;
            return parsed;
        }

        async function confirmAndSaveAll() {
            const btn = document.getElementById('confirmAllScanBtn');
            const statusEl = document.getElementById('confirmSaveStatus');

            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="btn-spinner"></span> Saving…';
            }

            document.querySelectorAll('[data-field][data-idx]').forEach(el => {
                const idx = parseInt(el.dataset.idx);
                const field = el.dataset.field;
                if (idx >= previewMatches.length) return;
                let val = el.value;
                if (field === 'homeScore' || field === 'awayScore' || field === 'matchday') val =
                parseInt(val) || 0;
                previewMatches[idx][field] = val;
            });

            let savedCount = 0;
            const errors = [];

            for (const m of previewMatches) {
                if (!m.homeTeam || !m.awayTeam) {
                    errors.push(`Match ${m.matchIdx}: teams missing`);
                    continue;
                }
                if (m.homeTeam === m.awayTeam) {
                    errors.push(`Match ${m.matchIdx}: same team on both sides`);
                    continue;
                }

                try {
                    const hs = m.homeScore || 0;
                    const as2 = m.awayScore || 0;
                    const forfeit = m.forfeitType || 'none';

                    const matchText = formatResultText(m.homeTeam, hs, m.awayTeam, as2, forfeit === 'none' ? '' :
                        forfeit);

                    const resultData = {
                        matchText,
                        md: m.matchday || 0,
                        ...(m.date && { date: m.date }),
                        ...(m.venue && { venue: m.venue }),
                        ...(m.matchType && { matchType: m.matchType }),
                        ...(m.aggregate && { aggregate: m.aggregate }),
                        goalScorers: { home: m.homeScorers || [], away: m.awayScorers || [] }
                    };

                    if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">💾 Saving result...</div>';
                    await database.ref(getSeasonPath(currentSeasonId, 'results')).push(resultData);

                    if (statusEl) statusEl.innerHTML =
                    '<div class="status-msg status-loading">📊 Updating table...</div>';
                    await applyResultToTable(m.homeTeam, m.awayTeam, hs, as2, forfeit === 'none' ? '' : forfeit);

                    if (statusEl) statusEl.innerHTML =
                        '<div class="status-msg status-loading">⚽ Updating top scorers...</div>';
                    await applyScorersFromScan(m.homeScorers || [], m.homeTeam);
                    await applyScorersFromScan(m.awayScorers || [], m.awayTeam);

                    if (statusEl) statusEl.innerHTML =
                        '<div class="status-msg status-loading">🎯 Updating top assistants...</div>';
                    await applyAssistsFromScan(m.homeAssists || [], m.homeTeam);
                    await applyAssistsFromScan(m.awayAssists || [], m.awayTeam);

                    savedCount++;
                } catch (e) {
                    errors.push(`Match ${m.matchIdx}: ${e.message}`);
                }
            }

            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();

            if (errors.length) {
                if (statusEl) statusEl.innerHTML =
                    `<div class="status-msg status-error">Saved ${savedCount}. Errors: ${errors.join('; ')}</div>`;
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '✅ CONFIRM & SAVE ALL';
                }
            } else {
                if (statusEl) statusEl.innerHTML =
                    `<div class="status-msg status-success">✅ ${savedCount} match(es) saved successfully!</div>`;
                multiScanMatches = [];
                closeModal();
                renderCurrentTab();
            }
        }

        // ─── NEW HELPER FUNCTIONS ───

        // ─── SAST HELPERS ───
        function getSASTDateObj() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (2 * 3600000));
        }

        function getSASTToday() {
            const d = getSASTDateObj();
            return d.toISOString().split('T')[0];
        }

        function getSASTYesterday() {
            const d = getSASTDateObj();
            d.setDate(d.getDate() - 1);
            return d.toISOString().split('T')[0];
        }

        // ─── LOCALSTORAGE KEY MEMORY ───
        function getSavedManagerKey() {
            try {
                const raw = localStorage.getItem('rememberedManagerKey_laliga');
                if (!raw) return null;
                return JSON.parse(raw);
            } catch (e) {
                return null;
            }
        }

        function saveManagerKey(key, teamName) {
            localStorage.setItem('rememberedManagerKey_laliga', JSON.stringify({ key, teamName }));
        }

        function clearSavedManagerKey() {
            localStorage.removeItem('rememberedManagerKey_laliga');
        }

        async function validateSavedKey() {
            const saved = getSavedManagerKey();
            if (!saved) return null;
            await loadManagerKeys();
            const entry = Object.values(managerKeysCache).find(e => e.key === saved.key);
            if (!entry || entry.teamName !== saved.teamName) {
                clearSavedManagerKey();
                return null;
            }
            return saved;
        }

        // ─── MANAGER KEYS ───
        async function loadManagerKeys() {
            const snap = await database.ref('managerKeys').once('value');
            const data = snap.val() || {};
            managerKeysCache = {};
            for (const key in data) {
                const entry = data[key];
                if (entry && entry.key) {
                    managerKeysCache[key] = { ...entry, id: key };
                }
            }
            return managerKeysCache;
        }

        async function findManagerKeyId(managerKey) {
            const snap = await database.ref('managerKeys').orderByChild('key').equalTo(managerKey).once('value');
            const keys = snap.val();
            if (!keys) return null;
            return Object.keys(keys)[0];
        }

        function openAddResultsKeyModal() {
            const saved = getSavedManagerKey();
            if (saved) {
                validateSavedKey().then(valid => {
                    if (valid) {
                        showModal(`
                  <h3>🔑 Welcome back, ${escapeHtml(valid.teamName)}!</h3>
                  <p style="color:rgba(255,255,255,0.6);font-size:1.3rem;margin:20px 0;">Are you submitting for <strong style="color:var(--laliga-red);">${escapeHtml(valid.teamName)}</strong>?</p>
