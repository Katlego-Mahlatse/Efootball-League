<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>eFootball 412 · League Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      padding: 2rem 1.5rem;
      color: #f5f0ff;
    }

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header */
    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f9e45b, #d4aaff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .hero p {
      font-size: 1.1rem;
      color: #e6d5ff;
      margin-top: 0.5rem;
      font-weight: 500;
    }

    /* two column grid for league table and first card */
    .two-col-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }

    /* card style */
    .card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(245, 215, 66, 0.8);
    }

    .card-header {
      padding: 1.2rem 1.8rem;
      background: rgba(30, 15, 55, 0.9);
      border-bottom: 2px solid #f5d742;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.2s;
    }

    .card-header:hover {
      background: rgba(40, 20, 65, 0.9);
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .card-header-left h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f5e6ff;
    }

    .card-header-left span {
      font-size: 1.5rem;
    }

    .toggle-icon {
      font-size: 1.3rem;
      color: #f5d742;
      transition: transform 0.3s;
    }

    .card-content {
      transition: max-height 0.4s ease-out, padding 0.3s;
      max-height: 800px;
      overflow: hidden;
    }

    .card-content.collapsed {
      max-height: 0;
      padding: 0;
    }

    /* league table style */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .stats-table th {
      text-align: left;
      padding: 0.9rem 0.8rem 0.7rem 1.2rem;
      font-weight: 600;
      color: #f5e6ff;
      background: rgba(55, 35, 95, 0.7);
      border-bottom: 1px solid #f5d742;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
    }

    .stats-table td {
      padding: 0.75rem 0.8rem 0.75rem 1.2rem;
      border-bottom: 1px solid rgba(245, 215, 66, 0.2);
      font-weight: 500;
      color: #f0eaff;
    }

    .stats-table tr:last-child td {
      border-bottom: none;
    }

    .rank-cell {
      font-weight: 700;
      width: 50px;
      color: #f5d742;
    }

    .team-name {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pts-cell {
      font-weight: 800;
      color: #f5d742;
      text-align: center;
    }

    .stat-number {
      text-align: center;
    }

    /* fixtures and results inner tables */
    .inner-table {
      width: 100%;
      border-collapse: collapse;
    }

    .inner-table th {
      text-align: left;
      padding: 0.9rem 0.8rem 0.7rem 1.2rem;
      font-weight: 600;
      color: #f5e6ff;
      background: rgba(55, 35, 95, 0.5);
      border-bottom: 1px solid #f5d742;
    }

    .inner-table td {
      padding: 0.9rem 0.8rem 0.9rem 1.2rem;
      border-bottom: 1px solid rgba(245, 215, 66, 0.2);
      vertical-align: middle;
    }

    .player-name {
      font-size: 0.7rem;
      color: #d4baff;
      display: block;
      margin-top: 2px;
    }

    .match-highlight {
      background: #3d2a6b;
      border-radius: 20px;
      padding: 0.2rem 0.8rem;
      display: inline-block;
      font-size: 0.8rem;
      color: #f5d742;
    }

    .empty-message {
      text-align: center;
      padding: 2rem;
      color: #c4b0ff;
      font-style: italic;
    }

    .round-badge {
      background: #5e3a9e;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-block;
      color: #f5e6ff;
    }

    .date-badge {
      font-size: 0.7rem;
      background: rgba(0,0,0,0.4);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      margin-left: 8px;
    }

    .footer-note {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #b59fdb;
      border-top: 1px dashed #7a5db3;
      padding-top: 1.8rem;
    }

    @media (max-width: 780px) {
      body {
        padding: 1rem;
      }
      .two-col-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      .stats-table th, .stats-table td {
        padding: 0.6rem 0.5rem;
        font-size: 0.75rem;
      }
      .card-header-left h2 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="hero">
    <h1>EFOOTBALL 412</h1>
    <p>official standings · fixtures & results hub</p>
  </div>

  <div class="two-col-grid">
    <!-- LEFT: LEAGUE TABLE (real data from screenshot) -->
    <div class="card">
      <div class="card-header" style="cursor: default;">
        <div class="card-header-left">
          <h2>LEAGUE TABLE</h2>
        </div>
      </div>
      <div class="card-content">
        <div style="overflow-x: auto;">
          <table class="stats-table" id="leagueTable">
            <thead>
              <tr><th>Pos</th><th>Club</th><th>P</th><th>GD</th><th>Pts</th></tr>
            </thead>
            <tbody id="leagueTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- RIGHT: empty placeholder for spacing -->
    <div class="card">
      <div class="card-header" style="cursor: default;">
        <div class="card-header-left">
          <h2>MATCHDAY 7 · TODAY</h2>
        </div>
      </div>
      <div class="card-content">
        <!-- This block is intentionally left empty as requested -->
      </div>
    </div>
  </div>

  <!-- SEPARATE CARD: FIXTURES (collapsible dropdown) -->
  <div class="card" style="margin-bottom: 1.5rem;">
    <div class="card-header" id="fixturesHeader">
      <div class="card-header-left">
        <h2>FIXTURES</h2>
      </div>
      <div class="toggle-icon" id="fixturesToggleIcon">▼</div>
    </div>
    <div class="card-content" id="fixturesContent">
      <div style="overflow-x: auto;">
        <table class="inner-table" id="fixturesTable">
          <thead>
            <tr><th>Home</th><th>Away</th><th>Date</th></tr>
          </thead>
          <tbody id="fixturesTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- SEPARATE CARD: RESULTS (collapsible dropdown, empty for now) -->
  <div class="card">
    <div class="card-header" id="resultsHeader">
      <div class="card-header-left">
        <h2>RESULTS · PREVIOUS ROUNDS</h2>
      </div>
      <div class="toggle-icon" id="resultsToggleIcon">▼</div>
    </div>
    <div class="card-content" id="resultsContent">
      <div style="overflow-x: auto;">
        <table class="inner-table" id="resultsTable">
          <thead>
            <tr><th>Round</th><th>Match</th><th>Score</th></tr>
          </thead>
          <tbody id="resultsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="footer-note">
    click on FIXTURES or RESULTS cards to expand/collapse · results will be added soon
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // 1. REAL LEAGUE TABLE (from screenshot, Matchday 6)
  // --------------------------------------------------------------
  const LEAGUE_DATA = [
    { pos: 1, club: "Liverpool", p: 6, gd: 23, pts: 18 },
    { pos: 2, club: "Real Madrid", p: 6, gd: 13, pts: 18 },
    { pos: 3, club: "Dortmund", p: 6, gd: 12, pts: 15 },
    { pos: 4, club: "Man City", p: 6, gd: 9, pts: 15 },
    { pos: 5, club: "Barcelona", p: 6, gd: -3, pts: 9 },
    { pos: 6, club: "Arsenal", p: 6, gd: -1, pts: 7 },
    { pos: 7, club: "PSG", p: 6, gd: -7, pts: 6 },
    { pos: 8, club: "AC Milan", p: 6, gd: -5, pts: 6 },
    { pos: 9, club: "Napoli", p: 6, gd: 3, pts: 3 },
    { pos: 10, club: "Chelsea", p: 6, gd: 1, pts: 3 },
    { pos: 11, club: "Juventus", p: 6, gd: -1, pts: 3 },
    { pos: 12, club: "Newcastle", p: 6, gd: -15, pts: 3 },
    { pos: 13, club: "Atletico", p: 6, gd: -10, pts: 1 },
    { pos: 14, club: "Aston Villa", p: 6, gd: -9, pts: 0 }
  ];

  // --------------------------------------------------------------
  // 2. FIXTURES: Matchday 7 with team names + player @names (today's date)
  //    Format: homeTeam (player), awayTeam (player)
  // --------------------------------------------------------------
  const FIXTURES_MD7 = [
    { home: "FC Barcelona", homePlayer: "~Rea🫡", away: "Aston Villa", awayPlayer: "Mali", date: "Today · Apr 19, 2026" },
    { home: "Borussia Dortmund", homePlayer: "~Qhawe 🤍", away: "Juventus", awayPlayer: "~Lawree ✨", date: "Today · Apr 19, 2026" },
    { home: "Atlético Madrid", homePlayer: "~Stalker.", away: "Paris Saint-Germain", awayPlayer: "~MJ", date: "Today · Apr 19, 2026" },
    { home: "Napoli", homePlayer: "~PrettyBoy Tendancies. 👅", away: "Real Madrid", awayPlayer: "~Karabo", date: "Today · Apr 19, 2026" },
    { home: "Arsenal", homePlayer: "Kath", away: "AC Milan", awayPlayer: "~Ntsiki", date: "Today · Apr 19, 2026" },
    { home: "Chelsea", homePlayer: "~Zazo", away: "Manchester City", awayPlayer: "gry", date: "Today · Apr 19, 2026" },
    { home: "Liverpool", homePlayer: "🅿️", away: "Newcastle United", awayPlayer: "~Oratile", date: "Today · Apr 19, 2026" }
  ];

  // --------------------------------------------------------------
  // 3. RESULTS: empty for now (placeholder)
  // --------------------------------------------------------------
  const RESULTS_PLACEHOLDER = [
    { round: 1, match: "Liverpool vs Ipswich", score: "—" },
    { round: 1, match: "Real Madrid vs Mallorca", score: "—" },
    { round: 2, match: "Man City vs Chelsea", score: "—" },
    { round: 2, match: "Barcelona vs Athletic", score: "—" },
    { round: 3, match: "PSG vs Monaco", score: "—" },
    { round: 4, match: "Napoli vs Roma", score: "—" },
    { round: 5, match: "Newcastle vs West Ham", score: "—" },
    { round: 6, match: "Liverpool vs Everton", score: "—" }
  ];

  // render league table
  function renderLeagueTable() {
    const tbody = document.getElementById("leagueTableBody");
    if (!tbody) return;
    tbody.innerHTML = "";
    LEAGUE_DATA.forEach(team => {
      const row = tbody.insertRow();
      const posCell = row.insertCell(0);
      posCell.className = "rank-cell";
      posCell.innerText = team.pos;
      const clubCell = row.insertCell(1);
      clubCell.innerHTML = `<div class="team-name">${team.club}</div>`;
      row.insertCell(2).innerText = team.p;
      const gdValue = team.gd;
      row.insertCell(3).innerText = gdValue > 0 ? `+${gdValue}` : `${gdValue}`;
      const ptsCell = row.insertCell(4);
      ptsCell.className = "pts-cell";
      ptsCell.innerText = team.pts;
    });
  }

  // render fixtures (today's games with player names)
  function renderFixtures() {
    const tbody = document.getElementById("fixturesTableBody");
    if (!tbody) return;
    tbody.innerHTML = "";
    FIXTURES_MD7.forEach(fix => {
      const row = tbody.insertRow();
      // home team cell with player name
      const homeCell = row.insertCell(0);
      homeCell.innerHTML = `<strong>${fix.home}</strong><span class="player-name">${fix.homePlayer}</span>`;
      // away team cell with player name
      const awayCell = row.insertCell(1);
      awayCell.innerHTML = `<strong>${fix.away}</strong><span class="player-name">${fix.awayPlayer}</span>`;
      // date cell
      const dateCell = row.insertCell(2);
      dateCell.innerHTML = `<span class="date-badge">${fix.date}</span>`;
    });
  }

  // render results (empty for now, placeholder)
  function renderResults() {
    const tbody = document.getElementById("resultsTableBody");
    if (!tbody) return;
    tbody.innerHTML = "";
    RESULTS_PLACEHOLDER.forEach(res => {
      const row = tbody.insertRow();
      const roundCell = row.insertCell(0);
      roundCell.innerHTML = `<span class="round-badge">R${res.round}</span>`;
      const matchCell = row.insertCell(1);
      matchCell.innerHTML = `<strong>${res.match}</strong>`;
      const scoreCell = row.insertCell(2);
      scoreCell.innerHTML = `<span class="match-highlight">${res.score}</span>`;
    });
    // add an extra note row to indicate results will be added
    const noteRow = tbody.insertRow();
    const noteCell = noteRow.insertCell(0);
    noteCell.colSpan = 3;
    noteCell.className = "empty-message";
    noteCell.innerHTML = "results will go here — stay tuned for updates after matches are played!";
    noteCell.style.textAlign = "center";
  }

  // --------------------------------------------------------------
  // Collapsible functionality for Fixtures & Results cards
  // --------------------------------------------------------------
  function setupCollapsible(headerId, contentId, toggleIconId) {
    const header = document.getElementById(headerId);
    const content = document.getElementById(contentId);
    const icon = document.getElementById(toggleIconId);
    if (!header || !content) return;
    
    let isCollapsed = false;
    header.addEventListener("click", (e) => {
      isCollapsed = !isCollapsed;
      if (isCollapsed) {
        content.classList.add("collapsed");
        icon.innerHTML = "▶";
        icon.style.transform = "rotate(0deg)";
      } else {
        content.classList.remove("collapsed");
        icon.innerHTML = "▼";
        icon.style.transform = "rotate(0deg)";
      }
    });
  }

  // Initialize everything
  function init() {
    renderLeagueTable();
    renderFixtures();
    renderResults();
    
    // setup collapsible cards
    setupCollapsible("fixturesHeader", "fixturesContent", "fixturesToggleIcon");
    setupCollapsible("resultsHeader", "resultsContent", "resultsToggleIcon");
    
    // ensure league table card content is always visible (no collapse for league)
    const leagueContent = document.querySelector(".two-col-grid .card:first-child .card-content");
    if (leagueContent) leagueContent.classList.remove("collapsed");
  }

  init();
  
  // optional refresh helper
  window.refreshAllData = function() {
    renderLeagueTable();
    renderFixtures();
    renderResults();
    console.log("All data refreshed (hardcoded)");
  };
</script>
</body>
</html>
