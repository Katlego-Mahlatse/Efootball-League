<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>eFootball 412 · Loading</title>
    <style>
        /* RESET & FULLSCREEN LAYOUT */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #d4af37;  /* exact gold background */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
            padding: 1.5rem;
        }

        /* CENTERED CARD – clean, minimal, no extra effects */
        .redirect-container {
            text-align: center;
            max-width: 480px;
            width: 100%;
            background: transparent;   /* no white box, just content on gold */
            border-radius: 0;
            padding: 1rem;
        }

        /* IMAGE – responsive, keeps ratio, gentle presence */
        .hero-image {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 2rem auto;
            border-radius: 20px;
            /* subtle soft shadow for depth but stays minimal */
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
            background-color: #f9e45b; /* fallback while loading */
        }

        /* LOADING SECTION: text + spinner */
        .loading-area {
            margin-top: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        /* simple circle loading animation (classic spinner) */
        .spinner {
            width: 48px;
            height: 48px;
            border: 5px solid rgba(0, 0, 0, 0.15);
            border-top: 5px solid #2c1a4a;     /* deep purple to match efootball vibe, but clean */
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        /* loading text */
        .loading-text {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #1e2a3a;
            background: rgba(255, 248, 205, 0.7);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            font-family: inherit;
            box-shadow: none;
        }

        /* smooth spin keyframes */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* optional small note (very subtle) */
        .footnote {
            margin-top: 2.5rem;
            font-size: 0.7rem;
            color: #2c2b26;
            opacity: 0.6;
            font-weight: 500;
        }

        /* responsive fine-tune */
        @media (max-width: 520px) {
            .loading-text {
                font-size: 1rem;
                padding: 0.2rem 1rem;
            }
            .spinner {
                width: 42px;
                height: 42px;
                border-width: 4px;
            }
            .hero-image {
                border-radius: 16px;
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="redirect-container">
    <!-- EXACT IMAGE from repo root (no folder, just filename) -->
    <img class="hero-image" 
         src="368c2563-3fa8-4b98-b0dd-b3d4c2463a9e.jpeg" 
         alt="eFootball 412" 
         onerror="this.style.opacity='0.8'; this.alt='image loading...';">

    <div class="loading-area">
        <!-- circle loading animation -->
        <div class="spinner"></div>
        <!-- text: "loading" exactly as requested -->
        <div class="loading-text">loading</div>
    </div>
    <div class="footnote">⚽ eFootball 412</div>
</div>

<script>
    // AFTER 2 SECONDS, REDIRECT TO feed.html (preserve exact behaviour)
    setTimeout(function() {
        window.location.href = 'feed.html';
    }, 2000);
</script>

</body>
</html>
