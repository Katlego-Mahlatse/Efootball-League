<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eFootball 412 · Calendar (View Only)</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#f5d742; --gold2:#ffe985; --gold-dim:rgba(245,215,66,0.12);
  --gold-border:rgba(245,215,66,0.3); --black-deep:#000000; --black-dark:#0d0d0d;
  --black-mid:#1a1a1a; --black-card:#222222; --black-light:#333333;
  --btn-accent:#b8960c; --btn-hover:#d4af37; --text-primary:#f0e8ff;
  --text-dim:#9b8ab8; --red:#ef4444; --green:#22c55e;
  --shadow-gold:0 0 30px rgba(245,215,66,0.12); --shadow-deep:0 20px 60px rgba(0,0,0,0.6);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black-deep);font-family:'Exo 2',sans-serif;color:var(--text-primary);min-height:100vh;overflow-x:hidden;}

.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbFloat 14s ease-in-out infinite;}
.bg-orb:nth-child(1){width:700px;height:700px;background:radial-gradient(circle,rgba(212,175,55,0.15),transparent);top:-20%;left:-15%;animation-delay:0s;}
.bg-orb:nth-child(2){width:450px;height:450px;background:radial-gradient(circle,rgba(245,215,66,0.06),transparent);top:50%;right:-10%;animation-delay:-5s;}
.bg-orb:nth-child(3){width:550px;height:550px;background:radial-gradient(circle,rgba(212,175,55,0.1),transparent);bottom:-15%;left:35%;animation-delay:-9s;}
@keyframes orbFloat{0%,100%{transform:translate(0,0);}33%{transform:translate(25px,-18px);}66%{transform:translate(-18px,14px);}}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(245,215,66,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,215,66,0.025) 1px,transparent 1px);background-size:55px 55px;z-index:0;pointer-events:none;}

.loader{position:fixed;inset:0;background:var(--black-deep);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;transition:opacity 0.6s,visibility 0.6s;}
.loader.hidden{opacity:0;visibility:hidden;}
.loader-logo{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;color:var(--gold);letter-spacing:0.1em;animation:glowPulse 1.8s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{text-shadow:0 0 20px rgba(245,215,66,0.5);}50%{text-shadow:0 0 40px rgba(245,215,66,0.9),0 0 80px rgba(245,215,66,0.3);}}
.loader-ring{width:56px;height:56px;border:3px solid rgba(245,215,66,0.15);border-top-color:var(--gold);border-radius:50%;animation:spin 0.85s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-family:'Rajdhani',sans-serif;font-size:0.8rem;color:var(--text-dim);letter-spacing:0.22em;text-transform:uppercase;}

.navbar{position:sticky;top:0;z-index:200;background:linear-gradient(135deg,#a87e0a,#f5d742 40%,#e0c020 100%);padding:0 1.5rem;height:58px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 28px rgba(0,0,0,0.55);}
.navbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);}
.nav-brand{display:flex;align-items:center;gap:0.7rem;font-family:'Orbitron',monospace;font-weight:900;font-size:0.95rem;color:var(--black-deep);letter-spacing:0.06em;}
.nav-icon-wrap{width:32px;height:32px;background:var(--black-deep);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.95rem;}
.admin-pill{background:var(--black-deep);color:var(--gold);font-size:0.52rem;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:0.12em;font-family:'Rajdhani',sans-serif;}
.nav-actions{display:flex;gap:0.5rem;}
.nav-btn{width:37px;height:37px;border-radius:50%;background:var(--black-deep);border:1.5px solid rgba(245,215,66,0.6);color:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all 0.25s;box-shadow:0 2px 8px rgba(0,0,0,0.35);}
.nav-btn:hover{background:var(--black-light);transform:scale(1.1);}

.wrapper{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:2rem 1.5rem 5rem;}

.page-header{margin-bottom:2.5rem;animation:slideDown 0.7s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes slideDown{from{opacity:0;transform:translateY(-22px);}to{opacity:1;transform:translateY(0);}}
.page-title{font-family:'Orbitron',monospace;font-size:clamp(1.6rem,4vw,2.5rem);font-weight:900;color:var(--gold);letter-spacing:0.05em;line-height:1.1;margin-bottom:0.4rem;text-shadow:0 0 50px rgba(245,215,66,0.35);}
.page-sub{font-size:0.85rem;color:var(--text-dim);font-style:italic;}

.month-card{background:linear-gradient(160deg,rgba(34,34,34,0.82),rgba(13,13,13,0.92));border:1px solid var(--gold-border);border-radius:1.8rem;overflow:hidden;margin-bottom:2.5rem;box-shadow:var(--shadow-deep),var(--shadow-gold);animation:cardIn 0.65s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
.month-header{padding:1rem 1.6rem;background:linear-gradient(135deg,rgba(0,0,0,0.98),rgba(13,13,13,0.98));border-bottom:2px solid var(--gold);display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
.month-header::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--gold),rgba(245,215,66,0.2));}
.month-header h2{font-family:'Orbitron',monospace;font-size:1.25rem;font-weight:700;color:var(--text-primary);letter-spacing:0.04em;}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(51,51,51,0.3);border-bottom:1px solid var(--gold-border);}
.weekday{padding:0.65rem 0.3rem;text-align:center;font-family:'Orbitron',monospace;font-weight:700;font-size:0.65rem;color:var(--gold);letter-spacing:0.08em;}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);}

.day-cell{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;border:1px solid rgba(245,215,66,0.07);background:rgba(26,26,26,0.45);min-height:115px;padding:8px 5px 6px;cursor:pointer;position:relative;transition:background 0.2s,border-color 0.25s;overflow:hidden;}
.day-cell::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(245,215,66,0.05),transparent);opacity:0;transition:opacity 0.25s;}
.day-cell:hover{background:rgba(184,150,12,0.3);border-color:rgba(245,215,66,0.22);}
.day-cell:hover::after{opacity:1;}
.day-cell:active{transform:scale(0.97);}
.day-cell.has-event{background:rgba(51,51,51,0.58);}
.day-cell.has-event:hover{background:rgba(184,150,12,0.5);}
.day-cell.empty-day{background:rgba(0,0,0,0.55);cursor:default;pointer-events:none;}
.day-number{font-family:'Orbitron',monospace;font-size:0.68rem;font-weight:700;color:var(--text-dim);align-self:flex-start;margin-bottom:5px;letter-spacing:0.03em;}
.day-cell.has-event .day-number{color:var(--gold);}

/* FLIP CONTAINER */
.flip-container{width:48px;height:48px;perspective:300px;margin-top:2px;flex-shrink:0;}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s ease;}
.flip-inner.flipping{transform:rotateY(90deg);}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;}
.flip-face img{width:48px;height:48px;object-fit:contain;border-radius:8px;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.5));}

/* EVENT LABEL - FULL TEXT, NO ELLIPSIS, WRAPPING */
.event-label{font-family:'Rajdhani',sans-serif;font-size:0.58rem;font-weight:700;color:var(--gold);letter-spacing:0.05em;text-transform:uppercase;margin-top:5px;text-align:center;line-height:1.3;word-break:break-word;max-width:100%;padding:0 2px;}

.add-hint{font-size:0.58rem;color:rgba(245,215,66,0.22);font-style:italic;margin-top:auto;padding-top:4px;transition:color 0.2s;}
.day-cell:hover .add-hint{color:rgba(245,215,66,0.55);}
.event-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--gold);border-radius:50%;box-shadow:0 0 6px var(--gold);animation:dotPulse 2.2s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--gold);}50%{opacity:0.4;box-shadow:0 0 14px var(--gold);}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(7px);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;visibility:hidden;opacity:0;transition:opacity 0.3s,visibility 0.3s;}
.overlay.active{visibility:visible;opacity:1;}
.overlay.active .modal{transform:translateY(0) scale(1);}
.modal{background:linear-gradient(158deg,#222222,#0d0d0d);border:1.5px solid var(--gold-border);border-radius:1.8rem;padding:2rem;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 30px 90px rgba(0,0,0,0.75),0 0 40px rgba(245,215,66,0.08);transform:translateY(22px) scale(0.97);transition:transform 0.38s cubic-bezier(0.22,1,0.36,1);}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--gold-border);border-radius:2px;}
.modal-close{position:absolute;top:14px;right:16px;background:rgba(184,150,12,0.4);border:1px solid var(--gold-border);color:var(--gold);width:32px;height:32px;border-radius:50%;font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s;line-height:1;}
.modal-close:hover{background:var(--red);border-color:var(--red);color:#fff;transform:rotate(90deg);}
.modal-title{font-family:'Orbitron',monospace;font-size:1.05rem;font-weight:700;color:var(--gold);margin-bottom:1.5rem;padding-right:2.5rem;letter-spacing:0.05em;text-shadow:0 0 25px rgba(245,215,66,0.3);}

.section-label{font-family:'Orbitron',monospace;font-size:0.6rem;font-weight:700;color:var(--gold);letter-spacing:0.15em;margin:1.4rem 0 0.8rem;display:flex;align-items:center;gap:0.5rem;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold-border),transparent);}

.form-group{margin-bottom:1rem;}
.form-label{display:block;font-family:'Rajdhani',sans-serif;font-size:0.7rem;font-weight:700;color:var(--text-dim);margin-bottom:0.4rem;letter-spacing:0.1em;text-transform:uppercase;}
.form-input{width:100%;background:rgba(0,0,0,0.85);border:1px solid var(--gold-border);border-radius:0.7rem;color:var(--text-primary);padding:0.65rem 0.9rem;font-size:0.9rem;font-family:'Exo 2',sans-serif;outline:none;}
.form-input[readonly]{opacity:0.8;background:rgba(0,0,0,0.6);cursor:default;}

.img-preview{width:44px;height:44px;object-fit:contain;border-radius:8px;display:none;}
.img-preview.show{display:block;}

.tournament-card{background:rgba(0,0,0,0.72);border:1px solid rgba(245,215,66,0.14);border-radius:1.1rem;padding:0.9rem 1rem;margin-bottom:0.8rem;transition:border-color 0.2s;}
.tournament-card:hover{border-color:rgba(245,215,66,0.28);}
.tc-header{display:flex;align-items:center;gap:0.7rem;}
.tc-icon{width:38px;height:38px;object-fit:contain;border-radius:6px;flex-shrink:0;}
.tc-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;color:var(--text-primary);}
.tc-desc{font-family:'Rajdhani',sans-serif;font-size:0.72rem;color:var(--gold);margin-top:0.2rem;}
.fix-toggle{background:none;border:1px solid rgba(245,215,66,0.18);color:var(--text-dim);padding:0.25rem 0.65rem;border-radius:1.5rem;font-size:0.67rem;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:0.06em;cursor:pointer;margin-top:0.6rem;transition:all 0.2s;}
.fix-toggle:hover{border-color:var(--gold-border);color:var(--gold);}
.fix-panel{display:none;margin-top:0.7rem;background:rgba(0,0,0,0.65);border-radius:0.8rem;border:1px solid rgba(245,215,66,0.07);padding:0.7rem;animation:fadeIn 0.2s ease;}
.fix-panel.open{display:block;}
.fix-row{display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0;border-bottom:1px solid rgba(245,215,66,0.06);flex-wrap:wrap;}
.fix-row:last-of-type{border-bottom:none;}
.fix-team-icon{width:26px;height:26px;object-fit:contain;border-radius:4px;flex-shrink:0;}
.fix-team-name{font-size:0.78rem;font-weight:600;color:var(--text-primary);}
.fix-vs{font-size:0.63rem;color:var(--gold);font-family:'Orbitron',monospace;font-weight:700;}
.no-data{text-align:center;color:var(--text-dim);font-size:0.85rem;padding:1rem;}

.event-pair-row{display:flex;align-items:center;gap:0.6rem;background:rgba(0,0,0,0.4);border:1px solid rgba(245,215,66,0.1);border-radius:0.8rem;padding:0.7rem;margin-bottom:0.6rem;}
.event-pair-icon{width:38px;height:38px;object-fit:contain;border-radius:6px;border:1px solid var(--gold-border);flex-shrink:0;background:rgba(0,0,0,0.5);}
.event-pair-name{flex:1;font-family:'Rajdhani',sans-serif;font-size:0.85rem;color:var(--text-primary);word-break:break-word;}
.event-pair-num{font-family:'Orbitron',monospace;font-size:0.6rem;color:var(--gold);font-weight:700;white-space:nowrap;margin-right:0.5rem;}

.btn{padding:0.55rem 1.3rem;border-radius:2rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:0.06em;cursor:pointer;transition:all 0.25s;border:none;display:inline-flex;align-items:center;gap:0.3rem;}
.btn-purple{background:rgba(184,150,12,0.45);border:1px solid var(--gold-border);color:var(--gold);}
.btn-purple:hover{background:var(--btn-hover);}
.btn-sm{padding:0.3rem 0.75rem;font-size:0.7rem;border-radius:1.5rem;}
.btn-row{display:flex;gap:0.6rem;flex-wrap:wrap;margin-top:1.2rem;}

.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:1rem;}
.team-opt{background:rgba(184,150,12,0.18);border:1px solid var(--gold-border);border-radius:2rem;padding:0.5rem 0.8rem;cursor:pointer;text-align:center;font-size:0.8rem;font-weight:600;color:var(--text-primary);transition:all 0.2s;font-family:'Rajdhani',sans-serif;}
.team-opt:hover,.team-opt.active{background:var(--btn-accent);border-color:var(--gold);color:var(--gold);}

.menu-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;}
.menu-link{display:block;text-align:center;padding:0.65rem 1rem;background:rgba(184,150,12,0.18);border:1px solid var(--gold-border);border-radius:2rem;color:var(--text-primary);text-decoration:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:0.9rem;letter-spacing:0.06em;transition:all 0.2s;}
.menu-link:hover{background:var(--btn-accent);color:var(--gold);transform:translateX(4px);}

.toast{position:fixed;bottom:2rem;right:2rem;background:linear-gradient(135deg,var(--black-card),var(--black-mid));border-radius:1.1rem;padding:0.9rem 1.3rem;font-size:0.84rem;color:var(--text-primary);z-index:9998;box-shadow:0 10px 35px rgba(0,0,0,0.55);transform:translateY(80px);opacity:0;transition:all 0.38s cubic-bezier(0.22,1,0.36,1);border:1px solid var(--gold-border);max-width:300px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--green);}
.toast.error{border-color:var(--red);}

@media(max-width:680px){
  .wrapper{padding:1rem 0.75rem 3rem;}
  .flip-container{width:36px;height:36px;}
  .flip-face img{width:36px;height:36px;}
  .day-cell{min-height:80px;padding:5px 3px;}
  .day-number{font-size:0.6rem;}
  .weekday{font-size:0.58rem;padding:0.5rem 0.2rem;}
  .event-label{font-size:0.5rem;}
}
</style>
</head>
<body>

<div class="bg-layer"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>
<div class="bg-grid"></div>

<div class="loader" id="loader">
  <div class="loader-logo">eFOOTBALL 412</div>
  <div class="loader-ring"></div>
  <div class="loader-text">Loading Calendar...</div>
</div>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-icon-wrap">⚽</div>
    eFOOTBALL 412
    <span class="admin-pill">VIEW ONLY</span>
  </div>
  <div class="nav-actions">
    <button class="nav-btn" id="filterBtn" title="Filter by team">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M4 6H20M6 12H18M10 18H14" stroke="#F5D742" stroke-width="2.2" stroke-linecap="round"/><circle cx="6" cy="6" r="2" stroke="#F5D742" stroke-width="1.8"/><circle cx="18" cy="12" r="2" stroke="#F5D742" stroke-width="1.8"/><circle cx="14" cy="18" r="2" stroke="#F5D742" stroke-width="1.8"/></svg>

<div class="wrapper">

    <div class="page-title">CALENDAR</div>

  </div>

</div>

<div class="toast" id="toast"></div>

<!-- MENU -->
<div class="overlay" id="menuOverlay">
  <div class="modal" style="max-width:300px;">
    <button class="modal-close" data-close="menuOverlay">✕</button>
    <div class="modal-title">MENU</div>
    <div class="menu-list">
      <a href="rules.html" class="menu-link">📋 RULES</a>
      <a href="index.html" class="menu-link">🏠 MAIN MENU</a>
      <a href="login.html" class="menu-link">🔑 LOGIN</a>
      <a href="player-titles.html" class="menu-link">🏆 MANAGER TITLES</a>
      <a href="admin-calendar.html" class="menu-link">⚙ ADMIN PANEL</a>
    </div>
    <button class="btn btn-purple" style="width:100%;" data-close="menuOverlay">CLOSE</button>
  </div>
</div>

<!-- FILTER -->
<div class="overlay" id="filterOverlay">
  <div class="modal" style="max-width:380px;">
    <button class="modal-close" data-close="filterOverlay">✕</button>
    <div class="modal-title">FILTER BY TEAM</div>

    <div class="btn-row">
      <button class="btn btn-purple btn-sm" data-close="filterOverlay">CLOSE</button>
    </div>
  </div>
</div>

<!-- DAY / EVENT VIEWER (READ ONLY) -->
<div class="overlay" id="dayOverlay">
  <div class="modal" style="max-width:600px;">
    <button class="modal-close" data-close="dayOverlay">✕</button>

    </div>
    <div class="section-label">TOURNAMENTS</div>
    <div id="tournamentsContainer"></div>
    <div class="btn-row">
      <button class="btn btn-purple" data-close="dayOverlay">CLOSE</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

const FB = { apiKey:"AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4", authDomain:"efootball-412.firebaseapp.com", projectId:"efootball-412", storageBucket:"efootball-412.firebasestorage.app", messagingSenderId:"596548424249", appId:"1:596548424249:web:4349f6e87a40a1590bf3e8", measurementId:"G-KHY86ZMPZH" };
const app = initializeApp(FB);
const db = getDatabase(app);
const YEAR = 2026;

const ALL_MONTHS = [
  {month:3,label:"April 2026"},{month:4,label:"May 2026"},{month:5,label:"June 2026"},
  {month:6,label:"July 2026"},{month:7,label:"August 2026"},{month:8,label:"September 2026"},
  {month:9,label:"October 2026"},{month:10,label:"November 2026"},{month:11,label:"December 2026"}
];
const ALL_TEAMS = ["Real Madrid","Liverpool","Dortmund","Man City","Barcelona","Arsenal","PSG","AC Milan","Chelsea","Napoli","Atletico","Juventus","Newcastle","Inter Milan"];

let calData = {};
let activeMonths = [];
let selectedTeam = null;
let teamIconMap = {};
let globalFlipInterval = null;

function rebuildTeamIconMap() {
  const map = {};
  for (const date in calData) {
    const ev = calData[date];
    if (ev && ev.tournaments) {
      for (const t of ev.tournaments) {
        if (t.fixtures) {
          for (const f of t.fixtures) {
            if (f.home && f.homeIcon) map[f.home.trim()] = f.homeIcon;
            if (f.away && f.awayIcon) map[f.away.trim()] = f.awayIcon;
          }
        }
      }
    }
  }
  teamIconMap = map;
}

function getTeamIcon(teamName) {
  if (!teamName) return null;
  return teamIconMap[teamName.trim()] || null;
}

function getAllTeamNames() {
  const s = new Set(ALL_TEAMS);
  for (const date in calData) {
    const ev = calData[date];
    if (ev && ev.tournaments) {
      for (const t of ev.tournaments) {
        if (t.fixtures) {
          for (const f of t.fixtures) {
            if (f.home) s.add(f.home.trim());
            if (f.away) s.add(f.away.trim());
          }
        }
      }
    }
  }
  return Array.from(s).sort();
}

function toast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (type ? " " + type : "");
  setTimeout(() => t.className = "toast", 3200);
}

function openOv(id) { document.getElementById(id).classList.add("active"); }
function closeOv(id) { document.getElementById(id).classList.remove("active"); }
document.querySelectorAll("[data-close]").forEach(el => el.addEventListener("click", () => closeOv(el.dataset.close)));
document.querySelectorAll(".overlay").forEach(ov => ov.addEventListener("click", e => { if (e.target === ov) closeOv(ov.id); }));

// Firebase listeners
onValue(ref(db, 'settings/calendar'), (snap) => {
  const data = snap.val();
  activeMonths = data?.activeMonths || [3, 4, 5, 6];
  renderCalendar();
});

onValue(ref(db, 'calendarEvents'), (snap) => {
  calData = snap.val() || {};
  rebuildTeamIconMap();
  renderCalendar();
  document.getElementById("loader").classList.add("hidden");
}, (error) => {
  console.error(error);
  calData = {};
  renderCalendar();
  document.getElementById("loader").classList.add("hidden");
  toast("Failed to load events", "error");
});

// Flip animation global index
let globalFlipIdx = 0;
if (globalFlipInterval) clearInterval(globalFlipInterval);
globalFlipInterval = setInterval(() => {
  globalFlipIdx++;
  document.querySelectorAll('.flip-cell').forEach(cell => {
    const pairs = JSON.parse(cell.dataset.pairs || '[]');
    if (pairs.length < 2) return;
    const inner = cell.querySelector('.flip-inner');
    if (!inner) return;
    const nextIdx = globalFlipIdx % pairs.length;
    inner.classList.add('flipping');
    setTimeout(() => {
      const face = inner.querySelector('.flip-face');
      const labelSpan = cell.querySelector('.event-label');
      if (face && face.querySelector('img')) {
        face.querySelector('img').src = pairs[nextIdx].iconUrl || '';
      }
      if (labelSpan) labelSpan.textContent = pairs[nextIdx].name || '';
      inner.classList.remove('flipping');
    }, 250);
  });
}, 2000);

// Calendar helpers
function fmtYMD(y, m, d) { return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`; }
function evHasTeam(ev, team) {
  if (!ev || !ev.tournaments) return false;
  const tl = team.toLowerCase();
  return ev.tournaments.some(t => (t.fixtures || []).some(f => (f.home || "").toLowerCase().includes(tl) || (f.away || "").toLowerCase().includes(tl)));
}
function oppIcon(ev, team) {
  const tl = team.toLowerCase();
  for (const t of ev?.tournaments || []) {
    for (const f of t.fixtures || []) {
      const home = f.home || "", away = f.away || "";
      if (home.toLowerCase().includes(tl)) return getTeamIcon(away) || f.awayIcon || null;
      if (away.toLowerCase().includes(tl)) return getTeamIcon(home) || f.homeIcon || null;
    }
  }
  return null;
}

function renderCalendar() {
  const root = document.getElementById("calendarRoot");
  root.innerHTML = "";
  const WD = ["S", "M", "T", "W", "T", "F", "S"];
  [...activeMonths].sort((a, b) => a - b).forEach((m, mi) => {
    const info = ALL_MONTHS.find(x => x.month === m);
    if (!info) return;
    const first = new Date(YEAR, m, 1);
    const dim = new Date(YEAR, m + 1, 0).getDate();
    const swd = first.getDay();
    const card = document.createElement("div");
    card.className = "month-card";
    card.style.animationDelay = (mi * 0.07) + "s";
    card.innerHTML = `<div class="month-header"><h2>${info.label}</h2></div>`;
    const wdRow = document.createElement("div");
    wdRow.className = "weekdays";
    WD.forEach(l => { const d = document.createElement("div"); d.className = "weekday"; d.textContent = l; wdRow.appendChild(d); });
    card.appendChild(wdRow);
    const grid = document.createElement("div");
    grid.className = "days-grid";
    for (let i = 0; i < swd; i++) { const e = document.createElement("div"); e.className = "day-cell empty-day"; grid.appendChild(e); }
    for (let d = 1; d <= dim; d++) {
      const ds = fmtYMD(YEAR, m, d);
      const ev = calData[ds];
      const cell = document.createElement("div");
      cell.className = "day-cell" + (ev ? " has-event" : "");
      const dn = document.createElement("div");
      dn.className = "day-number";
      dn.textContent = d;
      cell.appendChild(dn);
      if (ev) {
        const pairs = ev.eventPairs || [];
        if (selectedTeam) {
          if (evHasTeam(ev, selectedTeam)) {
            const oi = oppIcon(ev, selectedTeam);
            if (oi) {
              const img = document.createElement("img");
              img.className = "event-icon";
              img.src = oi;
              cell.appendChild(img);
            }
          } else {
            cell.classList.remove("has-event");
          }
        } else {
          if (pairs.length > 0) {
            const fc = document.createElement("div");
            fc.className = "flip-container flip-cell";
            fc.dataset.pairs = JSON.stringify(pairs);
            const fi = document.createElement("div");
            fi.className = "flip-inner";
            const face = document.createElement("div");
            face.className = "flip-face";
            if (pairs[0].iconUrl) {
              const img = document.createElement("img");
              img.src = pairs[0].iconUrl;
              img.alt = pairs[0].name || "";
              face.appendChild(img);
            }
            fi.appendChild(face);
            fc.appendChild(fi);
            cell.appendChild(fc);
            const lbl = document.createElement("div");
            lbl.className = "event-label";
            lbl.textContent = pairs[0].name || "";
            cell.appendChild(lbl);
          }
        }
        const dot = document.createElement("div");
        dot.className = "event-dot";
        cell.appendChild(dot);
      } else {
        const hint = document.createElement("div");
        hint.className = "add-hint";
        hint.textContent = "No event";
        cell.appendChild(hint);
      }
      cell.addEventListener("click", () => openDayModal(ds, d, info.label));
      grid.appendChild(cell);
    }
    card.appendChild(grid);
    root.appendChild(card);
  });
}

// Read-only day modal
function openDayModal(ds, day, monthLabel) {
  const ev = calData[ds];
  document.getElementById("dayTitle").textContent = `${day} ${monthLabel}`;
  // Event pairs
  const pairsContainer = document.getElementById("eventPairsViewer");
  pairsContainer.innerHTML = "";
  const pairs = ev?.eventPairs || [];
  if (pairs.length === 0) {
    pairsContainer.innerHTML = '<div class="no-data">No events scheduled for this day.</div>';
  } else {
    pairs.forEach((pair, idx) => {
      const row = document.createElement("div");
      row.className = "event-pair-row";
      const numSpan = document.createElement("div");
      numSpan.className = "event-pair-num";
      numSpan.textContent = `EVENT ${idx + 1}`;
      row.appendChild(numSpan);
      if (pair.iconUrl) {
        const iconImg = document.createElement("img");
        iconImg.className = "event-pair-icon";
        iconImg.src = pair.iconUrl;
        row.appendChild(iconImg);
      }
      const nameSpan = document.createElement("div");
      nameSpan.className = "event-pair-name";
      nameSpan.textContent = pair.name || "(Unnamed)";
      row.appendChild(nameSpan);
      pairsContainer.appendChild(row);
    });
  }
  // Season
  const seasonInput = document.getElementById("evSeasonView");
  seasonInput.value = ev?.season ? `Season ${ev.season}` : "Not specified";
  // Tournaments
  renderTournamentsReadonly(ev?.tournaments || []);
  openOv("dayOverlay");
}

function renderTournamentsReadonly(tournaments) {
  const c = document.getElementById("tournamentsContainer");
  c.innerHTML = "";
  if (!tournaments.length) {
    c.innerHTML = '<div class="no-data">No tournaments for this date.</div>';
    return;
  }
  tournaments.forEach((t) => {
    const card = document.createElement("div");
    card.className = "tournament-card";
    const hdr = document.createElement("div");
    hdr.className = "tc-header";
    if (t.iconUrl) {
      const img = document.createElement("img");
      img.className = "tc-icon";
      img.src = t.iconUrl;
      hdr.appendChild(img);
    }
    const infoDiv = document.createElement("div");
    const nm = document.createElement("div");
    nm.className = "tc-name";
    nm.textContent = t.name || "Untitled";
    infoDiv.appendChild(nm);
    if (t.description) {
      const desc = document.createElement("div");
      desc.className = "tc-desc";
      desc.textContent = t.description;
      infoDiv.appendChild(desc);
    }
    hdr.appendChild(infoDiv);
    card.appendChild(hdr);
    const tog = document.createElement("button");
    tog.className = "fix-toggle";
    const fixtureCount = (t.fixtures || []).length;
    tog.textContent = `⚽ FIXTURES (${fixtureCount})`;
    card.appendChild(tog);
    const panel = document.createElement("div");
    panel.className = "fix-panel";
    (t.fixtures || []).forEach((f) => {
      const row = document.createElement("div");
      row.className = "fix-row";
      const homeIcon = getTeamIcon(f.home) || f.homeIcon;
      if (homeIcon) {
        const img = document.createElement("img");
        img.className = "fix-team-icon";
        img.src = homeIcon;
        row.appendChild(img);
      } else if (f.home) {
        const hn = document.createElement("span");
        hn.className = "fix-team-name";
        hn.textContent = f.home;
        row.appendChild(hn);
      }
      const vs = document.createElement("span");
      vs.className = "fix-vs";
      vs.textContent = "vs";
      row.appendChild(vs);
      const awayIcon = getTeamIcon(f.away) || f.awayIcon;
      if (awayIcon) {
        const img = document.createElement("img");
        img.className = "fix-team-icon";
        img.src = awayIcon;
        row.appendChild(img);
      } else if (f.away) {
        const an = document.createElement("span");
        an.className = "fix-team-name";
        an.textContent = f.away;
        row.appendChild(an);
      }
      panel.appendChild(row);
    });
    if (fixtureCount === 0) {
      const nofix = document.createElement("div");
      nofix.className = "no-data";
      nofix.textContent = "No fixtures added.";
      panel.appendChild(nofix);
    }
    tog.onclick = () => panel.classList.toggle("open");
    card.appendChild(panel);
    c.appendChild(card);
  });
}

// Filter team grid
const teamGrid = document.getElementById("teamGrid");
const allTeamsList = getAllTeamNames();
allTeamsList.forEach(team => {
  const el = document.createElement("div");
  el.className = "team-opt";
  el.textContent = team;
  el.onclick = () => {
    selectedTeam = team;
    teamGrid.querySelectorAll(".team-opt").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
    closeOv("filterOverlay");
    renderCalendar();
    toast(`Filtering: ${team}`, "success");
  };
  teamGrid.appendChild(el);
});
document.getElementById("filterBtn").onclick = () => openOv("filterOverlay");
document.getElementById("menuBtn").onclick = () => openOv("menuOverlay");
</script>
