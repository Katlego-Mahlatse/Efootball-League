        currentMd = fixtureList[nextIdx].md;
        currentDate.setDate(currentDate.getDate()+1);
      }
    }
    return matchdayDates;

    { date: "2026-06-11", type: "premier_league", title: "Premier League Matchday 13" },
    { date: "2026-06-12", type: "premier_league", title: "Premier League Matchday 14" }
  ];

  // Generate future seasons by shifting the same pattern (31-day blocks)
  function generateFutureSeasons() {
    const futureEvents = [];
    // Start after June 12, 2026
    let startDate = new Date(2026, 5, 13); // June 13, 2026
    const endDate = new Date(2026, 11, 31); // Dec 31, 2026
    const seasonDuration = 31; // days
    let seasonNum = 3;
    while (startDate <= endDate) {
      for (let ev of season2Events) {
        const evDate = new Date(ev.date);
        const offset = evDate.getDate() - 13; // relative offset from May 13
        const newDate = new Date(startDate);
        newDate.setDate(startDate.getDate() + offset);
        if (newDate <= endDate) {
          futureEvents.push({
            date: formatYMD(newDate),
            type: ev.type,
            title: "TBD"
          });
        }
      }
      // Move to next season block
      startDate.setDate(startDate.getDate() + seasonDuration);
      seasonNum++;
    }
    return futureEvents;
  }

  // Build complete event map
  const eventMap = new Map(); // key: YYYY-MM-DD -> { type, matches, title }

  // Add Premier League matchday events (existing)
  for (let md in matchdayDates) {
    const dateStr = matchdayDates[md].date;
    eventMap.set(dateStr, { type: "premier_league", matches: matchdayDates[md].fixtures, title: null });
  }

  // Add Season 2 events
  for (let ev of season2Events) {
    if (!eventMap.has(ev.date)) {
      eventMap.set(ev.date, { type: ev.type, matches: [], title: ev.title });
    } else {
      // If date already has Premier League, we keep both? Rare, but if conflict, we keep the existing (Premier League has priority)
      // For simplicity, we don't overwrite.
    }
  }

  // Add future season events (TBD)
  const futureEvents = generateFutureSeasons();
  for (let ev of futureEvents) {
    if (!eventMap.has(ev.date)) {
      eventMap.set(ev.date, { type: ev.type, matches: [], title: ev.title });
    }
  }

  // ---------- CALENDAR RENDERING ----------
  function renderCalendar() {
    const root = document.getElementById("calendarRoot");
    root.innerHTML = "";
    const monthsData = [];
    for (let m = 3; m <= 11; m++) {
      const year = 2026;
      const firstDay = new Date(year, m, 1);
      const lastDay = new Date(year, m+1, 0);
      const startWeekday = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      monthsData.push({ year, month: m, firstDay, daysInMonth, startWeekday });
    }
    const monthNames = ["April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const weekLabels = ["S", "M", "T", "W", "T", "F", "S"];

    for (let mi = 0; mi < monthsData.length; mi++) {
      const m = monthsData[mi];
      const monthName = monthNames[mi];
      const days = [];
      for (let i = 0; i < m.startWeekday; i++) days.push(null);
      for (let d = 1; d <= m.daysInMonth; d++) days.push(new Date(m.year, m.month, d));

      const monthCard = document.createElement("div");
      monthCard.className = "month-card";
      monthCard.innerHTML = `<div class="month-header"><h2>${monthName} ${m.year}</h2></div>`;
      const weekdaysDiv = document.createElement("div");
      weekdaysDiv.className = "weekdays";
      weekLabels.forEach(label => {
        const wd = document.createElement("div");
        wd.className = "weekday";
        wd.textContent = label;
        weekdaysDiv.appendChild(wd);
      });
      monthCard.appendChild(weekdaysDiv);
      const daysGrid = document.createElement("div");
      daysGrid.className = "days-grid";
      for (let dayObj of days) {
        const cell = document.createElement("div");
        cell.className = "day-cell";
        if (!dayObj) {
          cell.classList.add("empty-day");
          cell.innerHTML = "";
        } else {
          const dateStr = formatYMD(dayObj);
          const event = eventMap.get(dateStr);
          const dayNum = dayObj.getDate();
          const numberSpan = document.createElement("div");
          numberSpan.className = "day-number";
          numberSpan.textContent = dayNum;
          cell.appendChild(numberSpan);
          if (event) {
            const icon = document.createElement("img");
            icon.className = "event-icon";
            icon.src = typeToIcon[event.type];
            icon.alt = event.type;
            cell.appendChild(icon);
          }
          cell.addEventListener("click", (function(d, ds) { return function() { showPopupForDate(d, ds); }; })(dayObj, dateStr));
        }
        daysGrid.appendChild(cell);
      }
      monthCard.appendChild(daysGrid);
      root.appendChild(monthCard);
    }
  }

  function showPopupForDate(date, dateStr) {
    const popup = document.getElementById("matchPopup");
    const popupDate = document.getElementById("popupDate");
    const popupMatchesDiv = document.getElementById("popupMatches");
    popupDate.textContent = date.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
    popupMatchesDiv.innerHTML = "";
    const event = eventMap.get(dateStr);
    if (event) {
      if (event.matches && event.matches.length > 0) {
        event.matches.forEach(match => {
          const matchDiv = document.createElement("div");
          matchDiv.className = "match-item";
          const homeIcon = getTeamIconHtml(match.home, "match-icon");
          const awayIcon = getTeamIconHtml(match.away, "match-icon");
          matchDiv.innerHTML = `${homeIcon} <span class="match-text">vs</span> ${awayIcon}`;
          popupMatchesDiv.appendChild(matchDiv);
        });
      } else if (event.title) {
        const msg = document.createElement("div");
        msg.className = "match-item";
        msg.innerHTML = `<span class="match-text">${event.title}</span>`;
        popupMatchesDiv.appendChild(msg);
      } else {
        const msg = document.createElement("div");
        msg.className = "match-item";
        msg.innerHTML = `<span class="match-text">Matchday - Details coming soon</span>`;
        popupMatchesDiv.appendChild(msg);
      }
    } else {
      const msg = document.createElement("div");
      msg.className = "match-item";
      msg.innerHTML = `<span class="match-text">No matches scheduled</span>`;
      popupMatchesDiv.appendChild(msg);
    }
    popup.classList.add("active");
  }

  // ---------- FILTER MODAL ----------
  const filterBtn = document.getElementById("filterBtn");
  const filterModal = document.getElementById("filterModal");
  const closeFilterBtn = document.getElementById("closeFilterBtn");
  const clearFilterBtn = document.getElementById("clearFilterBtn");
  const teamListContainer = document.getElementById("teamListContainer");

  function openFilterModal() { filterModal.classList.add("active"); }
  function closeFilterModal() { filterModal.classList.remove("active"); }
  filterBtn.addEventListener("click", openFilterModal);
  closeFilterBtn.addEventListener("click", closeFilterModal);
  filterModal.addEventListener("click", (e) => { if (e.target === filterModal) closeFilterModal(); });

  function buildTeamList() {
    teamListContainer.innerHTML = "";
    allTeams.forEach(team => {
      const div = document.createElement("div");
      div.className = "team-option";
      div.textContent = team;
      div.addEventListener("click", () => {
        selectedTeam = team;
        closeFilterModal();
        renderCalendar();
      });
      teamListContainer.appendChild(div);
    });
  }
  buildTeamList();
  clearFilterBtn.addEventListener("click", () => {
    selectedTeam = null;
    closeFilterModal();
    renderCalendar();
  });

  // ---------- TOURNAMENT MODAL ----------
  const hamburgerBtn = document.getElementById("hamburgerBtn");
  const modalOverlay = document.getElementById("modalOverlay");
  const closeModalBtn = document.getElementById("closeModalBtn");
  function openModal() { modalOverlay.classList.add("active"); }
  function closeModal() { modalOverlay.classList.remove("active"); }
  hamburgerBtn.addEventListener("click", openModal);
  closeModalBtn.addEventListener("click", closeModal);
  modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModal(); });

  // ---------- CLOSE POPUP ----------
  const closePopupBtn = document.getElementById("closePopupBtn");
  const popupOverlay = document.getElementById("matchPopup");
  closePopupBtn.addEventListener("click", () => popupOverlay.classList.remove("active"));
  popupOverlay.addEventListener("click", (e) => { if (e.target === popupOverlay) popupOverlay.classList.remove("active"); });

  renderCalendar();
</script>
