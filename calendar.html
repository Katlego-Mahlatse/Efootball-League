<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>eFootball 412 · Calendar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      padding: 0;
      color: #f5f0ff;
    }

    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-icon-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
      text-decoration: none;
    }
    .nav-icon-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .chat-svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }

    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }

    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }

    .modal-content {
      position: absolute;
      top: 60px;
      right: 20px;
      background: linear-gradient(135deg, #f5d742, #e6c42c);
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      width: auto;
      min-width: 200px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeInDown 0.2s ease;
      border: 1px solid #6a3bb5;
    }

    @keyframes fadeInDown {
      from {
        transform: translateY(-15px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-content h3 {
      font-size: 1.1rem;
      color: #4a1d8c;
      margin-bottom: 0.8rem;
      font-weight: 800;
      border-bottom: 1px solid #6a3bb5;
      display: inline-block;
      padding-bottom: 0.2rem;
    }

    .modal-options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 0.8rem 0;
    }

    .modal-option {
      background: rgba(106, 59, 181, 0.15);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #3c1a70;
      font-weight: 700;
      font-size: 0.8rem;
      transition: all 0.2s;
      border: 1px solid #6a3bb5;
      display: block;
    }

    .modal-option:hover {
      background: #6a3bb5;
      color: #f5d742;
      transform: translateX(3px);
    }

    .close-modal {
      background: #4a1d8c;
      color: #f5d742;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
      font-size: 0.7rem;
    }

    .close-modal:hover {
      background: #2d0f5a;
    }

    .calendar-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .month-card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .month-header {
      padding: 1rem 1.5rem;
      background: rgba(30, 15, 55, 0.9);
      border-bottom: 2px solid #f5d742;
    }
    .month-header h2 {
      font-size: 1.6rem;
      color: #f5e6ff;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: rgba(55, 35, 95, 0.5);
      border-bottom: 1px solid #f5d742;
    }
    .weekday {
      padding: 0.8rem;
      text-align: center;
      font-weight: bold;
      color: #f5d742;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .day-cell {
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(245, 215, 66, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(45, 25, 75, 0.6);
      transition: background 0.2s;
      cursor: pointer;
      position: relative;
    }
    .day-cell:hover {
      background: rgba(106, 59, 181, 0.6);
    }
    .day-number {
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 4px;
      color: #f5e6ff;
    }
    .event-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      margin-top: 4px;
    }
    .empty-day {
      background: rgba(30, 15, 55, 0.4);
      cursor: default;
    }
    .empty-day:hover {
      background: rgba(30, 15, 55, 0.4);
    }

    /* Popup styles */
    .match-popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .match-popup-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .match-popup {
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .match-popup h3 {
      color: #f5d742;
      margin-bottom: 1rem;
      font-size: 1.4rem;
      text-align: center;
    }
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .match-item {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .match-icon {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }
    .match-text {
      font-size: 0.9rem;
      font-weight: bold;
      color: #f5e6ff;
    }
    .close-popup {
      display: block;
      margin: 1rem auto 0;
      background: #6a3bb5;
      border: 1px solid #f5d742;
      color: #f5d742;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 780px) {
      .calendar-container { padding: 1rem; }
      .event-icon { width: 32px; height: 32px; }
      .day-number { font-size: 0.7rem; }
      .match-icon { width: 30px; height: 30px; }
    }
  </style>
</head>

    // Generate dates for MD10 to MD26 starting April 22, 2026
    function formatYMD(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }
    const matchdayDates = {};
    let currentDate = new Date(2026, 3, 22); // April 22 for MD10
    let currentMd = 10;

      if (!matchdayDates[currentMd]) matchdayDates[currentMd] = { date: formatYMD(currentDate), fixtures: [] };

      // when matchday changes, increment date
      const nextIdx = fixtureList.indexOf(f)+1;
      if (nextIdx < fixtureList.length && fixtureList[nextIdx].md !== currentMd) {
        currentMd = fixtureList[nextIdx].md;
        currentDate.setDate(currentDate.getDate()+1);
      }
    }

    const eventMap = new Map(); // key: YYYY-MM-DD, value: { type, matches: [] }

      { name: "conference_league", icon: "images (16).png", dayOffset: 2 }, // Thursday
      // then break a week, then Super Cup
      { name: "super_cup", icon: "images - 2026-04-21T172601.589.jpeg", dayOffset: 7+0 }, // next Tuesday
      { name: "club_world_cup", icon: "images - 2026-04-21T172656.176.jpeg", dayOffset: 7+1 }, // next Wednesday
      { name: "fa_cup", icon: "GEryYr_5YQv6lyYkYIMYdH-pgvv7tZ5nGqQ4sCna6ewduDy5v_LTbGqjg3g81Fx8ZA1a_Mae5g5HI7VEY_6uQQ.webp", dayOffset: 7+2 } // next Thursday
    ];
    // We'll also add more rounds? The requirement says "one after the other example uefa champions league on Tuesday then uefa europa league on Wednesday and so on, then you add club world and fa cup". We'll do one round each.
    // To fill until December, we can repeat the cycle (e.g., multiple matchdays for each competition). But to keep simple, we'll add one occurrence per competition, but that would end in May. The calendar goes to December, so we need more. Let's add monthly cycles: each month we can have a "matchday week" with UCL, UEL, UECL. For simplicity, we'll add a week of European competitions every 4 weeks from May through November.
    // Better: generate events for each month from June to November: one week per month with UCL Tue, UEL Wed, UECL Thu.
    let baseDate = new Date(2026, 4, 12); // first Tuesday after May 8 (May 12)
    for (let month = 5; month <= 10; month++) { // May to October
      // find Tuesday of that week (second week of month roughly)
      let tuesday = new Date(2026, month, 1);
      while (tuesday.getDay() !== 2) tuesday.setDate(tuesday.getDate()+1);
      tuesday.setDate(tuesday.getDate() + 7); // second Tuesday
      if (tuesday < startAfter) tuesday = new Date(startAfter);
      const dateStr = formatYMD(tuesday);
      if (!eventMap.has(dateStr)) eventMap.set(dateStr, { type: "champions_league", matches: [] });
      // Wednesday
      let wednesday = new Date(tuesday); wednesday.setDate(tuesday.getDate()+1);
      const wedStr = formatYMD(wednesday);
      if (!eventMap.has(wedStr)) eventMap.set(wedStr, { type: "europa_league", matches: [] });
      // Thursday
      let thursday = new Date(tuesday); thursday.setDate(tuesday.getDate()+2);
      const thuStr = formatYMD(thursday);
      if (!eventMap.has(thuStr)) eventMap.set(thuStr, { type: "conference_league", matches: [] });
    }
    // Add Super Cup, Club World Cup, FA Cup in June/July
    let superCupDate = new Date(2026, 5, 9); // June 9
    if (!eventMap.has(formatYMD(superCupDate))) eventMap.set(formatYMD(superCupDate), { type: "super_cup", matches: [] });
    let clubWorldDate = new Date(2026, 5, 10);
    if (!eventMap.has(formatYMD(clubWorldDate))) eventMap.set(formatYMD(clubWorldDate), { type: "club_world_cup", matches: [] });
    let faCupDate = new Date(2026, 5, 11);
    if (!eventMap.has(formatYMD(faCupDate))) eventMap.set(formatYMD(faCupDate), { type: "fa_cup", matches: [] });
    // Add additional later events for December? Not strictly needed but we'll add one more cycle in November.
    let novTuesday = new Date(2026, 10, 10);
    if (!eventMap.has(formatYMD(novTuesday))) eventMap.set(formatYMD(novTuesday), { type: "champions_league", matches: [] });
    let novWed = new Date(2026, 10, 11);
    if (!eventMap.has(formatYMD(novWed))) eventMap.set(formatYMD(novWed), { type: "europa_league", matches: [] });
    let novThu = new Date(2026, 10, 12);
    if (!eventMap.has(formatYMD(novThu))) eventMap.set(formatYMD(novThu), { type: "conference_league", matches: [] });

    // Map type to icon
    const typeToIcon = {
      "premier_league": "images (14).png",
      "champions_league": "images (15).png",
      "europa_league": "uefa-europa-league-logo-on-transparent-background-free-vector.jpg",
      "conference_league": "images (16).png",
      "super_cup": "images - 2026-04-21T172601.589.jpeg",
      "club_world_cup": "images - 2026-04-21T172656.176.jpeg",
      "fa_cup": "GEryYr_5YQv6lyYkYIMYdH-pgvv7tZ5nGqQ4sCna6ewduDy5v_LTbGqjg3g81Fx8ZA1a_Mae5g5HI7VEY_6uQQ.webp"
    };

    // Build calendar months from April 2026 to December 2026
    const months = [];
    for (let m = 3; m <= 11; m++) { // 3=April, 11=December
      const year = 2026;
      const firstDay = new Date(year, m, 1);
      const lastDay = new Date(year, m+1, 0);
      const startWeekday = firstDay.getDay(); // 0=Sunday
      const daysInMonth = lastDay.getDate();
      months.push({ year, month: m, firstDay, daysInMonth, startWeekday });
    }

    const monthNames = ["April", "May", "June", "July", "August", "September", "October", "November", "December"];

    function renderCalendar() {
      const root = document.getElementById("calendarRoot");
      root.innerHTML = "";
      for (let monthIdx = 0; monthIdx < months.length; monthIdx++) {
        const m = months[monthIdx];
        const monthName = monthNames[monthIdx];
        const days = [];
        // empty cells before first day
        for (let i = 0; i < m.startWeekday; i++) days.push(null);
        for (let d = 1; d <= m.daysInMonth; d++) days.push(new Date(m.year, m.month, d));
        const monthCard = document.createElement("div");
        monthCard.className = "month-card";
        monthCard.innerHTML = `<div class="month-header"><h2>${monthName} ${m.year}</h2></div>`;
        const weekdaysDiv = document.createElement("div");
        weekdaysDiv.className = "weekdays";
        ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].forEach(day => {
          const wd = document.createElement("div");
          wd.className = "weekday";
          wd.textContent = day;
          weekdaysDiv.appendChild(wd);
        });
        monthCard.appendChild(weekdaysDiv);
        const daysGrid = document.createElement("div");
        daysGrid.className = "days-grid";
        for (let dayObj of days) {
          const cell = document.createElement("div");
          cell.className = "day-cell";
          if (!dayObj) {
            cell.classList.add("empty-day");
            cell.innerHTML = "";
          } else {
            const dateStr = formatYMD(dayObj);
            const event = eventMap.get(dateStr);
            const dayNum = dayObj.getDate();
            const numberSpan = document.createElement("div");
            numberSpan.className = "day-number";
            numberSpan.textContent = dayNum;
            cell.appendChild(numberSpan);
            if (event) {
              const icon = document.createElement("img");
              icon.className = "event-icon";
              icon.src = typeToIcon[event.type];
              icon.alt = event.type;
              cell.appendChild(icon);
            }
            cell.addEventListener("click", (function(d, ev) { return function() { showPopup(d, ev); }; })(dayObj, event));
          }
          daysGrid.appendChild(cell);
        }
        monthCard.appendChild(daysGrid);
        root.appendChild(monthCard);
      }
    }

    function showPopup(date, event) {
      const popup = document.getElementById("matchPopup");
      const popupDate = document.getElementById("popupDate");
      const popupMatchesDiv = document.getElementById("popupMatches");
      popupDate.textContent = date.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
      popupMatchesDiv.innerHTML = "";
      if (event && event.matches && event.matches.length > 0) {
        // Show matches for Premier League
        event.matches.forEach(match => {
          const matchDiv = document.createElement("div");
          matchDiv.className = "match-item";
          const homeIcon = getTeamIconHtml(match.home);
          const awayIcon = getTeamIconHtml(match.away);
          matchDiv.innerHTML = `${homeIcon} <span class="match-text">vs</span> ${awayIcon}`;
          popupMatchesDiv.appendChild(matchDiv);
        });
      } else if (event) {
        // For other competitions, show generic message
        const msg = document.createElement("div");
        msg.className = "match-item";
        msg.innerHTML = `<span class="match-text">Matchday - Details coming soon</span>`;
        popupMatchesDiv.appendChild(msg);
      } else {
        const msg = document.createElement("div");
        msg.className = "match-item";
        msg.innerHTML = `<span class="match-text">No matches scheduled</span>`;
        popupMatchesDiv.appendChild(msg);
      }
      popup.classList.add("active");
    }

    const closePopupBtn = document.getElementById("closePopupBtn");
    const popupOverlay = document.getElementById("matchPopup");
    closePopupBtn.addEventListener("click", () => {
      popupOverlay.classList.remove("active");
    });
    popupOverlay.addEventListener("click", (e) => {
      if (e.target === popupOverlay) popupOverlay.classList.remove("active");
    });

    renderCalendar();
  </script>
</body>
</html>
