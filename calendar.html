<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>eFootball 412 · Calendar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      padding: 0;
      color: #f5f0ff;
    }

    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-icon-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
      text-decoration: none;
    }
    .nav-icon-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .filter-svg {
      width: 20px;
      height: 20px;
      display: block;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }

    .modal-overlay, .filter-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active, .filter-modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }
    .modal-content, .filter-modal-content {
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 2rem;
      padding: 1.5rem;
      max-width: 300px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      max-height: 80vh;
      overflow-y: auto;
    }
    .filter-modal-content h3 {
      color: #f5d742;
      margin-bottom: 1rem;
    }
    .team-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .team-option {
      background: rgba(106, 59, 181, 0.3);
      padding: 0.5rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #f5d742;
    }
    .team-option:hover {
      background: #6a3bb5;
    }
    .clear-filter {
      background: #ef4444;
      border: none;
      color: white;
      padding: 0.5rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: bold;
      margin-top: 0.5rem;
    }
    .close-modal-btn {
      background: #6a3bb5;
      border: 1px solid #f5d742;
      color: #f5d742;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    .tournament-options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .tournament-option {
      background: rgba(106, 59, 181, 0.15);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #f5e6ff;
      font-weight: 700;
      font-size: 0.8rem;
      transition: all 0.2s;
      border: 1px solid #f5d742;
    }

    .calendar-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .month-card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .month-header {
      padding: 1rem 1.5rem;
      background: rgba(30, 15, 55, 0.9);
      border-bottom: 2px solid #f5d742;
    }
    .month-header h2 {
      font-size: 1.6rem;
      color: #f5e6ff;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: rgba(55, 35, 95, 0.5);
      border-bottom: 1px solid #f5d742;
    }
    .weekday {
      padding: 0.8rem;
      text-align: center;
      font-weight: bold;
      color: #f5d742;
      font-size: 1rem;
    }
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .day-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(245, 215, 66, 0.2);
      background: rgba(45, 25, 75, 0.6);
      transition: background 0.2s;
      cursor: pointer;
      min-height: 100px;
      padding: 8px;
      text-align: center;
    }
    .day-cell:hover {
      background: rgba(106, 59, 181, 0.6);
    }
    .day-number {
      font-size: 0.9rem;
      font-weight: bold;
      margin-bottom: 4px;
      color: #f5e6ff;
    }
    .event-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      margin-top: 4px;
      display: block;
    }
    .empty-day {
      background: rgba(30, 15, 55, 0.4);
      cursor: default;
    }
    .empty-day:hover {
      background: rgba(30, 15, 55, 0.4);
    }

    .match-popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s;
    }
    .match-popup-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .match-popup {
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      position: relative;
    }
    .popup-close-x {
      position: absolute;
      top: 12px;
      right: 18px;
      font-size: 28px;
      font-weight: bold;
      color: #f5d742;
      cursor: pointer;
      background: transparent;
      border: none;
      line-height: 1;
    }
    .popup-close-x:hover {
      color: #ffaa00;
    }
    .match-popup h3 {
      color: #f5d742;
      margin-bottom: 1rem;
      font-size: 1.4rem;
      text-align: center;
      padding-right: 20px;
    }
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    /* original match-item for premier league (April 22 - May 8) */
    .match-item {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .match-icon {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }
    .match-text {
      font-size: 0.9rem;
      font-weight: bold;
      color: #f5e6ff;
    }
    /* For competition popups (May 17 onward) */
    .tournament-header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .competition-icon {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }
    .competition-details {
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .competition-name {
      font-weight: bold;
      color: #f5d742;
      font-size: 0.9rem;
    }
    .competition-round {
      font-size: 0.8rem;
      color: #f5e6ff;
    }
    .view-fixtures-btn {
      background: #6a3bb5;
      border: 1px solid #f5d742;
      color: #f5d742;
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.7rem;
      margin-top: 0.4rem;
      align-self: flex-start;
    }
    .fixtures-dropdown {
      display: none;
      background: rgba(30, 15, 55, 0.9);
      border-radius: 0.8rem;
      padding: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #ddd;
      border: 1px solid #f5d742;
    }
    .fixtures-dropdown.show {
      display: block;
    }
    .fixtures-dropdown ul {
      margin-left: 1rem;
      padding-left: 0;
      list-style: none;
    }
    .fixtures-dropdown li {
      padding: 0.2rem 0;
    }
    .close-popup {
      display: block;
      margin: 1rem auto 0;
      background: #6a3bb5;
      border: 1px solid #f5d742;
      color: #f5d742;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 780px) {
      .calendar-container { padding: 1rem; }
      .event-icon { width: 32px; height: 32px; }
      .day-number { font-size: 0.7rem; }
      .competition-icon { width: 45px; height: 45px; }
      .match-icon { width: 30px; height: 30px; }
      .weekday { font-size: 0.8rem; padding: 0.5rem; }
      .day-cell { min-height: 70px; padding: 4px; }
    }
  </style>
</head>

      const nextIdx = fixtureList.indexOf(f)+1;
      if (nextIdx < fixtureList.length && fixtureList[nextIdx].md !== currentMd) {
        currentMd = fixtureList[nextIdx].md;
        currentDate.setDate(currentDate.getDate()+1);
      }
    }
    return matchdayDates;
  }

  // Helper to get day cell icon from competitions
  function getDayCellIcon(comps) {
    if (!comps || comps.length === 0) return null;
    const uefaNames = ["Champions League", "Europa League", "Conference League", "Nations League", "UEFA Super Cup"];
    const hasUefa = comps.some(c => uefaNames.includes(c.name));
    const hasFifa = comps.some(c => c.name === "World Cup" || c.name === "Club World Cup");
    const hasDomestic = comps.some(c => c.name === "FA Cup" || c.name === "Premier League" || c.name === "Community Shield");
    if (hasUefa) return "aavgzoshm.webp";
    if (hasFifa) return "fifa-vector-flag-official-colors-aspect-ratio-white-logo-blue-background-fifa-vector-flag-436952842.jpg";
    if (hasDomestic) return "images - 2026-05-01T151142.585.jpeg";
    if (comps.some(c => c.name === "UEFA Super League")) return "images - 2026-05-01T151142.585.jpeg";
    return "images (14).png";
  }

  // ---------- CALENDAR RENDERING ----------
  function renderCalendar() {
    const root = document.getElementById("calendarRoot");
    root.innerHTML = "";
    const monthsData = [];
    for (let m = 3; m <= 11; m++) {
      const year = 2026;
      const firstDay = new Date(year, m, 1);
      const lastDay = new Date(year, m+1, 0);
      const startWeekday = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      monthsData.push({ year, month: m, firstDay, daysInMonth, startWeekday });
    }
    const monthNames = ["April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const weekLabels = ["S", "M", "T", "W", "T", "F", "S"];

    for (let mi = 0; mi < monthsData.length; mi++) {
      const m = monthsData[mi];
      const monthName = monthNames[mi];
      const days = [];
      for (let i = 0; i < m.startWeekday; i++) days.push(null);
      for (let d = 1; d <= m.daysInMonth; d++) days.push(new Date(m.year, m.month, d));

      const monthCard = document.createElement("div");
      monthCard.className = "month-card";
      monthCard.innerHTML = `<div class="month-header"><h2>${monthName} ${m.year}</h2></div>`;
      const weekdaysDiv = document.createElement("div");
      weekdaysDiv.className = "weekdays";
      weekLabels.forEach(label => {
        const wd = document.createElement("div");
        wd.className = "weekday";
        wd.textContent = label;
        weekdaysDiv.appendChild(wd);
      });
      monthCard.appendChild(weekdaysDiv);
      const daysGrid = document.createElement("div");
      daysGrid.className = "days-grid";
      for (let dayObj of days) {
        const cell = document.createElement("div");
        cell.className = "day-cell";
        if (!dayObj) {
          cell.classList.add("empty-day");
          cell.innerHTML = "";
        } else {
          const dateStr = formatYMD(dayObj);
          const event = eventMap.get(dateStr);
          const dayNum = dayObj.getDate();
          const numberSpan = document.createElement("div");
          numberSpan.className = "day-number";
          numberSpan.textContent = dayNum;
          cell.appendChild(numberSpan);
          if (event) {
            let iconSrc = null;
            if (event.type === "premier_league" && event.matches && event.matches.length) {
              iconSrc = "images (14).png";
            } else if (event.competitions) {
              iconSrc = getDayCellIcon(event.competitions);
            }
            if (iconSrc) {
              const icon = document.createElement("img");
              icon.className = "event-icon";
              icon.src = iconSrc;
              icon.alt = "event";
              cell.appendChild(icon);
            }
          }
          cell.addEventListener("click", (function(d, ds) { return function() { showPopupForDate(d, ds); }; })(dayObj, dateStr));
        }
        daysGrid.appendChild(cell);
      }
      monthCard.appendChild(daysGrid);
      root.appendChild(monthCard);
    }
  }

  function showPopupForDate(date, dateStr) {
    const popup = document.getElementById("matchPopup");
    const popupDate = document.getElementById("popupDate");
    const popupMatchesDiv = document.getElementById("popupMatches");
    popupDate.textContent = date.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
    popupMatchesDiv.innerHTML = "";
    const event = eventMap.get(dateStr);
    if (event) {
      if (event.matches && event.matches.length > 0) {
        // Original Premier League matches (April 22 - May 8)
        event.matches.forEach(match => {
          const matchDiv = document.createElement("div");
          matchDiv.className = "match-item";
          const homeIcon = getTeamIconHtml(match.home, "match-icon");
          const awayIcon = getTeamIconHtml(match.away, "match-icon");
          matchDiv.innerHTML = `${homeIcon} <span class="match-text">vs</span> ${awayIcon}`;
          popupMatchesDiv.appendChild(matchDiv);
        });
      } else if (event.competitions && event.competitions.length > 0) {
        // New grouped competitions
        event.competitions.forEach(comp => {
          const compDiv = document.createElement("div");
          compDiv.className = "match-item";
          compDiv.style.flexDirection = "column";
          compDiv.style.alignItems = "flex-start";
          const headerDiv = document.createElement("div");
          headerDiv.className = "tournament-header";
          headerDiv.innerHTML = `
            <img class="competition-icon" src="${comp.icon}" alt="${comp.name}" onerror="this.style.display='none'">
            <div class="competition-details">
              <span class="competition-name">${comp.name}</span>
              <span class="competition-round">${comp.round}</span>
            </div>
          `;
          const btn = document.createElement("button");
          btn.textContent = "View Fixtures";
          btn.className = "view-fixtures-btn";
          const dropdown = document.createElement("div");
          dropdown.className = "fixtures-dropdown";
          dropdown.innerHTML = "<ul><li>Fixtures TBD</li></ul>";
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            dropdown.classList.toggle("show");
          });
          compDiv.appendChild(headerDiv);
          compDiv.appendChild(btn);
          compDiv.appendChild(dropdown);
          popupMatchesDiv.appendChild(compDiv);
        });
      } else {
        const msg = document.createElement("div");
        msg.className = "match-item";
        msg.innerHTML = `<span class="match-text">No detailed schedule</span>`;
        popupMatchesDiv.appendChild(msg);
      }
    } else {
      const msg = document.createElement("div");
      msg.className = "match-item";
      msg.innerHTML = `<span class="match-text">No matches scheduled</span>`;
      popupMatchesDiv.appendChild(msg);
    }
    popup.classList.add("active");
  }
