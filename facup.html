<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Emirates FA Cup</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --red: #b91c1c;
      --red-dark: #7f1d1d;
      --red-light: #dc2626;
      --red-hover: #991b1b;
      --white: #ffffff;
      --off-white: #fef2f2;
      --text-on-red: #ffffff;
      --text-dark: #1a0000;
      --border-red: rgba(185,28,28,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      padding-bottom: 3rem;
    }

    @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }
    @keyframes spin       { to { transform:rotate(360deg); } }
    @keyframes cardIn     { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes verticalFlip {
      0%,45%  { transform:rotateX(0deg); }
      50%,95% { transform:rotateX(180deg); }
      100%    { transform:rotateX(360deg); }
    }

    /* ── NAVBAR ── */
    .navbar {
      background: var(--red);
      height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      animation: fadeInDown 0.5s ease both;
    }
    #navbarLogoContainer img { height: 52px; max-width: 180px; object-fit: contain; cursor: pointer; transition: transform 0.3s; }
    #navbarLogoContainer img:hover { transform: scale(1.05); }
    .navbar-logo-placeholder {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: white;
      letter-spacing: 2px;
    }
    .menu-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; gap: 5px;
      cursor: pointer; transition: all 0.3s;
    }
    .menu-btn span { width: 22px; height: 3px; background: white; border-radius: 3px; }
    .menu-btn:hover { background: rgba(255,255,255,0.25); transform: rotate(90deg); }

    /* ── SIDE DRAWER ── */
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:199; display:none; backdrop-filter:blur(4px); }
    .drawer-overlay.active { display:block; }
    .side-drawer {
      position:fixed; top:0; right:-320px; width:300px; height:100%;
      background: var(--red-dark);
      border-left: 3px solid white;
      z-index:200; padding:32px 24px;
      transition: right 0.35s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
    }
    .side-drawer.active { right:0; }
    .drawer-close {
      text-align:right; font-size:2.2rem; cursor:pointer;
      color:white; margin-bottom:32px; line-height:1;
      transition: color 0.2s;
    }
    .drawer-close:hover { color: rgba(255,255,255,0.6); }
    .drawer-item {
      padding:16px 20px; margin:10px 0;
      border:1px solid rgba(255,255,255,0.25); border-radius:16px;
      cursor:pointer; font-weight:700; font-size:1.3rem;
      color:white; transition:all 0.2s;
      font-family:'Rajdhani', sans-serif;
    }
    .drawer-item:hover { background:rgba(255,255,255,0.15); transform:translateX(6px); }

    /* ── SLIDESHOW ── */
    .slideshow-wrapper {
      padding: 28px 28px 16px;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeIn 0.7s ease 0.2s both;
    }
    .slideshow-frame {
      width:100%; max-width:1100px; border-radius:28px; overflow:hidden;
      box-shadow: 0 8px 32px rgba(185,28,28,0.2);
      border: 3px solid var(--red);
      background: #000;
    }
    .slideshow-img { width:100%; height:auto; max-height:480px; object-fit:contain; display:block; transition:opacity 0.5s; }
    .dots-container { margin-top:16px; display:flex; gap:10px; }
    .dot { width:12px; height:12px; border-radius:50%; background:rgba(185,28,28,0.3); cursor:pointer; transition:all 0.25s; border:2px solid var(--red); }
    .dot.active { background:var(--red); transform:scale(1.3); }
    .dot:hover { background:var(--red-light); }

    /* ── EMIRATES FLIP ── */
    .emirates-section {
      perspective:1000px;
      margin:16px auto;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:110px;
    }
    .flip-container {
      width:200px; height:100px;
      position:relative;
      transform-style:preserve-3d;
      animation:verticalFlip 4s ease-in-out infinite;
    }
    .flip-card-face {
      position:absolute; width:100%; height:100%;
      backface-visibility:hidden;
      display:flex; align-items:center; justify-content:center;
    }
    .flip-card-front { transform:rotateX(0deg); }
    .flip-card-back  { transform:rotateX(180deg); }
    .flip-card-face img { max-width:100%; max-height:100%; object-fit:contain; }
    .flip-placeholder {
      color:var(--red); font-weight:bold; font-size:0.8rem;
      text-align:center; padding:0.5rem;
      background:var(--off-white); border-radius:8px;
      border:1px solid var(--border-red);
    }

    /* ── SEASON BAR ── */
    .season-bar { display:flex; justify-content:center; margin:20px 0 12px; flex-wrap:wrap; gap:12px; }
    .season-controls {
      display:flex; align-items:center; gap:16px;
      background:var(--red);
      border-radius:60px; padding:10px 28px;
      box-shadow: 0 4px 16px rgba(185,28,28,0.3);
    }
    .season-arrow {
      background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.5);
      width:42px; height:42px; border-radius:50%;
      font-size:1.6rem; cursor:pointer; color:white;
      font-weight:bold; transition:all 0.2s; line-height:1;
    }
    .season-arrow:hover:not(:disabled) { background:rgba(255,255,255,0.35); transform:scale(1.1); }
    .season-arrow:disabled { opacity:0.3; cursor:not-allowed; }
    .season-number {
      font-family:'Bebas Neue', sans-serif;
      font-size:1.8rem; letter-spacing:2px;
      color:white; min-width:140px; text-align:center;
    }
    .season-admin-btns { display:flex; gap:8px; }
    .season-admin-btn {
      background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.4);
      padding:8px 16px; border-radius:30px; font-weight:600;
      cursor:pointer; color:white; font-size:1rem;
      font-family:'Rajdhani',sans-serif; transition:all 0.2s;
    }
    .season-admin-btn:hover { background:rgba(255,255,255,0.3); }

    /* ── TABS ── */
    .tabs-wrapper {
      display:flex; justify-content:center;
      margin: 16px 28px 0;
      animation: fadeInUp 0.5s ease 0.3s both;
    }
    .tabs-container {
      display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
      background:var(--red);
      border-radius:60px; padding:10px 16px;
      box-shadow: 0 4px 16px rgba(185,28,28,0.3);
    }
    .tab-btn {
      background:transparent; border:none;
      font-family:'Rajdhani',sans-serif;
      font-size:1.1rem; font-weight:700;
      padding:8px 22px; cursor:pointer;
      color:rgba(255,255,255,0.65); border-radius:40px;
      letter-spacing:0.5px; transition:all 0.25s; white-space:nowrap;
    }
    .tab-btn.active { background:white; color:var(--red); }
    .tab-btn:hover:not(.active) { color:white; background:rgba(255,255,255,0.2); }

    /* ── CONTENT CARD ── */
    .content-card {
      margin: 20px 28px 40px;
      background: var(--red);
      border-radius:28px;
      padding:28px;
      min-height:200px;
      animation: fadeInUp 0.5s ease 0.4s both;
      box-shadow: 0 8px 32px rgba(185,28,28,0.2);
    }

    /* ── LOADING ── */
    .loading-spinner { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px; gap:20px; }
    .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.2); border-top-color:white; border-radius:50%; animation:spin 0.8s linear infinite; }
    .loading-spinner span { color:rgba(255,255,255,0.7); font-size:1.3rem; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align:center; padding:60px 20px; color:rgba(255,255,255,0.5); }
    .empty-state .empty-icon { font-size:4rem; margin-bottom:16px; }
    .empty-state p { font-size:1.6rem; font-weight:600; }

    /* ── TABLE SECTION ── */
    .table-actions {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:20px; flex-wrap:wrap; gap:12px;
    }
    .table-actions-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:2rem; color:white; letter-spacing:2px;
    }
    .add-btn {
      background:rgba(255,255,255,0.15); border:2px solid white;
      color:white; font-family:'Rajdhani',sans-serif;
      font-weight:700; font-size:1rem;
      padding:8px 20px; border-radius:30px; cursor:pointer; transition:all 0.2s;
    }
    .add-btn:hover { background:white; color:var(--red); }

    /* ── GROUP CARD ── */
    .group-card {
      background:rgba(255,255,255,0.1);
      border-radius:20px; margin-bottom:24px;
      overflow:hidden; border:1px solid rgba(255,255,255,0.2);
      animation:cardIn 0.4s ease both;
    }
    .group-header {
      background:rgba(0,0,0,0.2);
      padding:14px 20px;
      display:flex; justify-content:space-between; align-items:center;
      border-bottom:2px solid rgba(255,255,255,0.2);
    }
    .group-header-left { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .group-header-right { display:flex; align-items:center; gap:10px; }
    .group-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.6rem; color:white; letter-spacing:1px;
    }
    .group-corner-img { width:44px; height:44px; object-fit:contain; border-radius:6px; }

    /* ── STATS TABLE ── */
    .table-scroll-wrap { overflow-x:auto; border-radius:12px; }
    .stats-table {
      width:100%; border-collapse:collapse;
      font-family:'Rajdhani',sans-serif;
      min-width:700px;
      background:transparent;
      color:white;
    }
    .stats-table thead th {
      background:rgba(0,0,0,0.25);
      color:white; font-size:1.1rem; font-weight:800;
      text-transform:uppercase; letter-spacing:1px;
      padding:12px 14px; border-bottom:2px solid rgba(255,255,255,0.3);
      white-space:nowrap;
    }
    .stats-table th:first-child,
    .stats-table td:first-child {
      position:sticky; left:0; z-index:10;
      background:rgba(185,28,28,0.95);
      width:52px; min-width:52px;
    }
    .stats-table thead th:first-child { background:rgba(100,0,0,0.6); z-index:11; }
    .stats-table th:nth-child(2),
    .stats-table td:nth-child(2) {
      position:sticky; left:52px; z-index:9;
      background:rgba(185,28,28,0.95);
      box-shadow:4px 0 8px -2px rgba(0,0,0,0.3);
      border-right:1px solid rgba(255,255,255,0.2);
    }
    .stats-table thead th:nth-child(2) { background:rgba(100,0,0,0.6); z-index:11; }
    .stats-table tbody tr { border-bottom:1px solid rgba(255,255,255,0.1); transition:background 0.2s; }
    .stats-table tbody tr:hover { background:rgba(255,255,255,0.08); }
    .stats-table td { padding:11px 14px; color:white; font-size:1.1rem; font-weight:600; white-space:nowrap; }
    .rank-cell { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; }
    .team-cell-inner { display:flex; align-items:center; gap:10px; }
    .team-icon-sm { width:32px; height:32px; object-fit:contain; transition:transform 0.2s; }
    .team-icon-sm:hover { transform:scale(1.15); }
    .team-icon-lg { width:64px; height:64px; object-fit:contain; }
    .pos-bar-wrap { display:flex; align-items:center; gap:6px; }
    .vbar { width:5px; height:22px; border-radius:3px; }
    .vbar-blue { background:#3b82f6; }
    .vbar-red-bar { background:#ef4444; }
    .dashed-sep td { border-bottom:3px dashed rgba(59,130,246,0.6) !important; }
    .dashed-sep-red td { border-bottom:3px dashed rgba(239,68,68,0.6) !important; }
    .form-circles { display:flex; gap:4px; align-items:center; }
    .circle-result { width:26px; height:26px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:bold; }
    .cW  { background:#22c55e; color:white; }
    .cL  { background:#b91c1c; color:white; border:1px solid rgba(255,255,255,0.4); }
    .cD  { background:#6b7280; color:white; }
    .cBlank { background:rgba(255,255,255,0.15); }
    .legend-row {
      margin-top:16px; padding:12px 16px;
      background:rgba(0,0,0,0.15); border-radius:12px;
      display:flex; gap:20px; flex-wrap:wrap; justify-content:center;
    }
    .legend-item { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,0.8); font-size:1rem; font-weight:600; }

    /* ── FIXTURE CARDS ── */
    .filters-bar {
      display:flex; flex-wrap:wrap; gap:16px; align-items:flex-end;
      margin-bottom:24px; padding:16px;
      background:rgba(0,0,0,0.15); border-radius:20px;
    }
    .filter-group { display:flex; flex-direction:column; gap:6px; }
    .filter-group label { font-size:0.9rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,0.7); }
    .filter-group select, .filter-group button {
      background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.3);
      border-radius:30px; padding:10px 16px;
      font-family:'Rajdhani',sans-serif; font-size:1.1rem;
      font-weight:600; color:white; cursor:pointer; transition:all 0.2s;
    }
    .filter-group select:hover, .filter-group button:hover { background:rgba(255,255,255,0.2); }
    .filter-stats { font-size:1rem; color:rgba(255,255,255,0.6); margin-left:auto; align-self:center; }
    .fixture-date-group { margin-bottom:28px; animation:cardIn 0.4s ease both; }
    .fixture-date-label {
      font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:2px;
      color:white; margin-bottom:12px; padding:8px 18px;
      background:rgba(0,0,0,0.2); border-radius:40px;
      border-left:4px solid rgba(255,255,255,0.5);
      display:inline-block;
    }
    .fixture-card {
      background:rgba(255,255,255,0.1);
      border-radius:20px; padding:20px 28px; margin-bottom:12px;
      border:1px solid rgba(255,255,255,0.15);
      transition:all 0.25s; animation:cardIn 0.4s ease both;
    }
    .fixture-card:hover { background:rgba(255,255,255,0.18); transform:translateY(-3px); }
    .fixture-tournament-label { font-size:0.9rem; font-weight:700; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
    .fixture-match-row { display:flex; align-items:center; justify-content:space-between; gap:20px; }
    .fixture-team-side { display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; text-align:center; }
    .fixture-team-name { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1.6rem; color:white; }
    .fixture-vs { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:rgba(255,255,255,0.5); letter-spacing:3px; flex-shrink:0; }

    /* ── MATCH CARDS ── */
    .results-sub-tabs { display:flex; gap:8px; margin-bottom:20px; }
    .sub-tab-btn {
      background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.3);
      color:white; font-family:'Rajdhani',sans-serif; font-weight:700;
      font-size:1.1rem; padding:8px 20px; border-radius:30px;
      cursor:pointer; transition:all 0.2s;
    }
    .sub-tab-btn.active { background:white; color:var(--red); border-color:white; }
    .sub-tab-btn:hover:not(.active) { background:rgba(255,255,255,0.2); }
    .matches-list { display:flex; flex-direction:column; gap:20px; }
    .match-card {
      background:rgba(255,255,255,0.1);
      border-radius:24px; padding:24px 32px;
      border:1px solid rgba(255,255,255,0.15);
      transition:all 0.25s; animation:cardIn 0.4s ease both;
    }
    .match-card:hover { background:rgba(255,255,255,0.18); transform:translateY(-3px); }
    .match-group-label {
      font-size:0.9rem; font-weight:700; color:rgba(255,255,255,0.6);
      text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;
    }
    .match-row { display:flex; align-items:center; justify-content:space-between; gap:24px; }
    .team-side { display:flex; flex-direction:column; align-items:center; gap:10px; flex:1; text-align:center; }
    .team-name-big { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:2rem; color:white; }
    .match-center { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; min-width:140px; }
    .score-display {
      font-family:'Bebas Neue',sans-serif; font-size:3.5rem; color:white;
      letter-spacing:5px; background:rgba(0,0,0,0.2);
      padding:10px 32px; border-radius:60px; border:2px solid rgba(255,255,255,0.2);
    }
    .forfeit-display {
      font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:rgba(255,255,255,0.8);
      letter-spacing:3px; background:rgba(0,0,0,0.2);
      padding:8px 24px; border-radius:50px; border:2px solid rgba(255,255,255,0.2);
    }
    .forfeit-type-text { font-size:1rem; color:rgba(255,255,255,0.6); font-weight:600; }
    .match-meta { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; justify-content:center; }
    .meta-tag {
      font-size:1.1rem; color:rgba(255,255,255,0.8); font-weight:600;
      background:rgba(0,0,0,0.2); padding:6px 16px;
      border-radius:30px; border:1px solid rgba(255,255,255,0.15);
    }
    .admin-row { display:flex; gap:12px; justify-content:flex-end; margin-top:16px; }
    .btn-sm {
      font-family:'Rajdhani',sans-serif; font-weight:700;
      font-size:1.1rem; padding:8px 20px; border-radius:30px;
      border:none; cursor:pointer; transition:all 0.2s;
    }
    .btn-edit { background:rgba(255,255,255,0.15); color:white; border:1px solid rgba(255,255,255,0.3); }
    .btn-edit:hover { background:rgba(255,255,255,0.3); }
    .btn-delete { background:rgba(0,0,0,0.2); color:rgba(255,200,200,1); border:1px solid rgba(255,150,150,0.3); }
    .btn-delete:hover { background:rgba(0,0,0,0.4); }
    .add-result-btn {
      display:inline-flex; align-items:center; gap:8px;
      background:white; border:none; color:var(--red);
      font-family:'Rajdhani',sans-serif; font-weight:700;
      font-size:1.1rem; padding:10px 24px; border-radius:30px;
      cursor:pointer; transition:all 0.2s; white-space:nowrap;
    }
    .add-result-btn:hover { background:var(--off-white); transform:translateY(-2px); }

    /* ── TOP SCORERS / ASSISTANTS ── */
    .top3-container { display:flex; justify-content:center; gap:0; margin-bottom:32px; width:100%; }
    .top3-block {
      position:relative; text-align:center; flex:1;
      background:rgba(0,0,0,0.2); transition:transform 0.3s; min-width:0;
    }
    .top3-block:first-child { border-top-left-radius:24px; border-bottom-left-radius:24px; }
    .top3-block:last-child  { border-top-right-radius:24px; border-bottom-right-radius:24px; }
    .top3-block:hover { transform:translateY(-8px); z-index:5; }
    .player-image-wrapper {
      position:relative; width:100%; aspect-ratio:1/1;
      overflow:hidden; border:3px solid rgba(255,255,255,0.3);
      background:rgba(0,0,0,0.3);
    }
    .top3-block:first-child .player-image-wrapper { border-top-left-radius:24px; border-bottom-left-radius:24px; }
    .top3-block:last-child  .player-image-wrapper { border-top-right-radius:24px; border-bottom-right-radius:24px; }
    .player-img { width:100%; height:100%; object-fit:cover; }
    .medal-badge { position:absolute; top:10px; left:10px; font-size:2.4rem; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5)); z-index:2; }
    .edit-block-btn {
      position:absolute; top:10px; right:10px;
      background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.3);
      border-radius:50%; width:36px; height:36px;
      display:flex; align-items:center; justify-content:center;

// ══════════════════════════════════════════

// ══════════════════════════════════════════

function getSeasonPath(seasonNum, subPath = "") {
  return `${BASE}/seasons/season_${seasonNum}${subPath ? "/" + subPath : ""}`;
}
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
}
function getTeamIconHtml(name, cls = "team-icon-sm") {
  const url = teamIconsCache[name];
  return url ? `<img class="${cls}" src="${url}" alt="${name}" onerror="this.style.display='none';">` : '';
}
async function uploadToImgBB(file) {
  const fd = new FormData(); fd.append('image', file);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:fd });
  const data = await res.json();
  if (!data.success) throw new Error(data.error?.message || 'Upload failed');
  return data.data.url;
}
async function removeBackground(file) {
  const fd = new FormData(); fd.append('image_file', file); fd.append('size','auto');
  const res = await fetch('https://api.remove.bg/v1.0/removebg', {
    method:'POST', headers:{'X-Api-Key':RMBG_KEY}, body:fd
  });
  if (!res.ok) throw new Error('remove.bg failed');
  return await res.blob();
}
function showGenericModal(html) {
  document.getElementById('genericModalContent').innerHTML = html;
  document.getElementById('genericModal').classList.add('active');
}
function closeGenericModal() { document.getElementById('genericModal').classList.remove('active'); }

// ══════════════════════════════════════════

}

// ══════════════════════════════════════════
// TEAM ICONS
// ══════════════════════════════════════════
async function loadTeamIcons() {
  const snap = await db.ref(`${BASE}/teamIcons`).once('value');
  const data = snap.val() || {};
  for (const [team, val] of Object.entries(data)) {
    if (val.imageUrl) teamIconsCache[team] = val.imageUrl;
  }
}

// ══════════════════════════════════════════
// GROUP CORNER IMAGE
// ══════════════════════════════════════════
async function loadGroupCornerImage() {
  const snap = await db.ref(`${BASE}/group_corner_image`).once('value');
  groupCornerImageUrl = snap.val() || '';
}

// ══════════════════════════════════════════
// SLIDESHOW
// ══════════════════════════════════════════
async function loadSlideshow() {
  const [imgSnap, durSnap] = await Promise.all([
    db.ref(`${BASE}/slideshow/images`).once('value'),
    db.ref(`${BASE}/slideshow/duration`).once('value')
  ]);
  slideshowImages  = imgSnap.val() || [];
  slideshowDuration = durSnap.val() || 3000;
  if (slideInterval) clearInterval(slideInterval);
  const imgEl = document.getElementById('slideshowImg');
  if (slideshowImages.length) {
    imgEl.style.display = 'block';
    currentSlideIdx = 0; updateSlide();
    slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx+1) % slideshowImages.length; updateSlide(); }, slideshowDuration);
  } else imgEl.style.display = 'none';
}
function updateSlide() {
  const img = document.getElementById('slideshowImg');
  img.src = slideshowImages[currentSlideIdx];
  const dots = document.getElementById('dotsContainer');
  dots.innerHTML = '';
  slideshowImages.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === currentSlideIdx ? ' active' : '');
    d.onclick = () => { currentSlideIdx = i; updateSlide(); if (slideInterval) { clearInterval(slideInterval); slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx+1) % slideshowImages.length; updateSlide(); }, slideshowDuration); } };
    dots.appendChild(d);
  });
}

// ══════════════════════════════════════════
// SEASON MANAGEMENT
// ══════════════════════════════════════════
async function loadSeasonsMetadata() {
  const snap = await db.ref(`${BASE}/seasons`).once('value');
  const seasons = snap.val() || {};
  availableSeasons = [];
  for (const key in seasons) {
    if (!key.startsWith('season_')) continue;
    const id = parseInt(key.split('_')[1]);
    if (!isNaN(id)) availableSeasons.push(id);
    if (seasons[key].active === true) activeSeasonId = id;
  }
  // Ensure season 3 exists
  if (!availableSeasons.includes(3)) {
    await db.ref(getSeasonPath(3, 'groups')).set({});
    await db.ref(getSeasonPath(3, 'knockout_matches')).set({});
    await db.ref(`${BASE}/seasons/season_3/active`).set(true);
    availableSeasons.push(3); activeSeasonId = 3;
  }
  availableSeasons.sort((a,b) => a-b);
  if (!availableSeasons.includes(activeSeasonId)) activeSeasonId = availableSeasons[0];
  currentSeasonId = activeSeasonId;
  updateSeasonUI();
  await loadCurrentSeasonData();
}
function updateSeasonUI() {
  document.getElementById('seasonNumber').textContent = `Season ${currentSeasonId}`;
  const idx = availableSeasons.indexOf(currentSeasonId);
  document.getElementById('prevSeasonBtn').disabled = idx <= 0;
  document.getElementById('nextSeasonBtn').disabled = idx >= availableSeasons.length - 1;
  document.getElementById('seasonAdminPanel').style.display = isAdmin ? 'flex' : 'none';
}
async function loadCurrentSeasonData() {
  const snap = await db.ref(getSeasonPath(currentSeasonId, 'groups')).once('value');
  groupsData = snap.val() || {};
  const koSnap = await db.ref(getSeasonPath(currentSeasonId, 'knockout_matches')).once('value');
  knockoutMatches = koSnap.val() ? Object.entries(koSnap.val()).map(([k,v]) => ({key:k,...v})) : [];
}
async function switchSeason(delta) {
  const idx = availableSeasons.indexOf(currentSeasonId);
  const nIdx = idx + delta;
  if (nIdx < 0 || nIdx >= availableSeasons.length) return;
  currentSeasonId = availableSeasons[nIdx];
  updateSeasonUI(); await loadCurrentSeasonData();
  renderCurrentTab();
}
async function addNewSeason() {
  const raw = prompt("Enter new season number:"); if (!raw) return;
  const id = parseInt(raw); if (isNaN(id)) { alert("Invalid"); return; }
  if (availableSeasons.includes(id)) { alert("Already exists"); return; }
  await db.ref(getSeasonPath(id, 'groups')).set({});
  await db.ref(getSeasonPath(id, 'knockout_matches')).set({});
  availableSeasons.push(id); availableSeasons.sort((a,b)=>a-b);
  currentSeasonId = id; updateSeasonUI(); await loadCurrentSeasonData(); renderCurrentTab();
}
async function renameSeason() {
  const raw = prompt(`New number for Season ${currentSeasonId}:`); if (!raw) return;
  const id = parseInt(raw); if (isNaN(id)) return;
  if (availableSeasons.includes(id) && id !== currentSeasonId) { alert("Number taken"); return; }
  const [g, ko] = await Promise.all([
    db.ref(getSeasonPath(currentSeasonId, 'groups')).once('value'),
    db.ref(getSeasonPath(currentSeasonId, 'knockout_matches')).once('value'),
  ]);
  const wasActive = activeSeasonId === currentSeasonId;
  await db.ref(getSeasonPath(id, 'groups')).set(g.val() || {});
  await db.ref(getSeasonPath(id, 'knockout_matches')).set(ko.val() || {});
  if (wasActive) await db.ref(`${BASE}/seasons/season_${id}/active`).set(true);
  await db.ref(getSeasonPath(currentSeasonId)).remove();
  availableSeasons = availableSeasons.filter(s => s !== currentSeasonId);
  availableSeasons.push(id); availableSeasons.sort((a,b)=>a-b);
  if (activeSeasonId === currentSeasonId) activeSeasonId = id;
  currentSeasonId = id; updateSeasonUI(); await loadCurrentSeasonData(); renderCurrentTab();
}
async function setActiveSeason() {
  const updates = {};
  availableSeasons.forEach(s => { updates[`${BASE}/seasons/season_${s}/active`] = (s === currentSeasonId); });
  await db.ref().update(updates); activeSeasonId = currentSeasonId;
  alert(`Season ${currentSeasonId} set as active.`);
}

  const sortedGroups = Object.entries(groupsData).sort((a, b) => {

    const nb = b[1].name || b[0];
    return na.localeCompare(nb);
  });

  if (!sortedGroups.length) {
    card.innerHTML += `<div class="empty-state"><div class="empty-icon">⚽</div><p>No groups yet</p></div>`;
    if (isAdmin) attachTableAdminEvents();
    return;
  }

  sortedGroups.forEach(([gid, group]) => {
    const groupName = group.name || gid;
    const teamsObj  = group.teams || {};
    const teams = Object.entries(teamsObj).map(([k,v]) => ({key:k,...v}));
    const sorted = [...teams].sort((a,b) => (b.pts||0)-(a.pts||0) || (b.gd||0)-(a.gd||0));

    const cornerHtml = groupCornerImageUrl
      ? `<img src="${groupCornerImageUrl}" class="group-corner-img" alt="corner">`
      : '';

    let groupHtml = `
      <div class="group-card">
        <div class="group-header">
          <div class="group-header-left">

            ${isAdmin ? `
              <button class="add-btn" style="font-size:0.9rem;padding:5px 14px;" data-rename="${gid}">✏️ Rename</button>
              <button class="add-btn" style="font-size:0.9rem;padding:5px 14px;" data-delgroup="${gid}">🗑️</button>
            ` : ''}
          </div>
          <div class="group-header-right">
            ${cornerHtml}
            ${isAdmin ? `<button class="add-btn" style="font-size:0.9rem;padding:5px 14px;" data-addteam="${gid}">+ Add Team</button>` : ''}
          </div>
        </div>
        <div class="table-scroll-wrap">
          <table class="stats-table">
            <thead>
              <tr>
                <th>Pos</th><th style="min-width:180px;">Club</th>
                <th>P</th><th>W</th><th>D</th><th>L</th>
                <th>GS</th><th>GC</th><th>GD</th><th>Pts</th><th>Last 5</th>
                ${isAdmin ? '<th>Actions</th>' : ''}
              </tr>
            </thead>
            <tbody>`;

    sorted.forEach((team, idx) => {
      const pos = idx + 1;
      let barClass = pos <= 4 ? 'vbar-blue' : 'vbar-red-bar';
      let rowClass = pos === 4 ? 'dashed-sep' : '';
      const last5 = getTeamLast5(team.name, gid);
      const last5Html = last5.map(r => {
        if (r === 'W') return `<span class="circle-result cW">✓</span>`;
        if (r === 'L') return `<span class="circle-result cL">✗</span>`;
        if (r === 'D') return `<span class="circle-result cD">–</span>`;
        return `<span class="circle-result cBlank"></span>`;
      }).join('');
      const gd = team.gd || 0;
      const iconHtml = getTeamIconHtml(team.name);
      groupHtml += `
        <tr class="${rowClass}">
          <td class="rank-cell"><div class="pos-bar-wrap"><span class="vbar ${barClass}"></span>${pos}</div></td>
          <td><div class="team-cell-inner">${iconHtml}<span>${escapeHtml(team.name)}</span></div></td>
          <td>${team.p||0}</td><td>${team.w||0}</td><td>${team.d||0}</td><td>${team.l||0}</td>
          <td>${team.gs||0}</td><td>${team.gc||0}</td>
          <td>${gd>0?'+'+gd:gd}</td>
          <td style="font-weight:800;">${team.pts||0}</td>

  if (!isAdmin) return;

  });
  document.querySelectorAll('[data-addteam]').forEach(btn => {
    btn.addEventListener('click', () => openTeamForm(btn.dataset.addteam, null));
  });
  document.querySelectorAll('.btn-edit[data-tkey]').forEach(btn => {
    btn.addEventListener('click', () => {
      const gid = btn.dataset.gid;
      const tkey = btn.dataset.tkey;

      if (team) openTeamForm(gid, tkey, team);

      await loadCurrentSeasonData(); renderTable();

function getTeamLast5(teamName, gid) {
  const results = groupsData[gid]?.results || {};
  const arr = Object.values(results).filter(r => r.homeTeam === teamName || r.awayTeam === teamName)
    .sort((a,b) => (b.md||0)-(a.md||0)).slice(0,5);
  const last5 = arr.map(r => {
    if (r.forfeitType === 'no_contest') return null;
    const isHome = r.homeTeam === teamName;
    const hs = r.homeScore || 0, as2 = r.awayScore || 0;
    if (r.forfeitType === 'forfeit') {
      if (isHome) return hs > as2 ? 'W' : 'L';
      else return as2 > hs ? 'W' : 'L';
    }
    if (isHome) return hs > as2 ? 'W' : hs < as2 ? 'L' : 'D';
    else return as2 > hs ? 'W' : as2 < hs ? 'L' : 'D';
  }).filter(Boolean);
  while (last5.length < 5) last5.push(null);
  return last5.reverse();
}

// ══════════════════════════════════════════
// AUTO TABLE UPDATE (apply result stats)
// ══════════════════════════════════════════
async function applyResultToTable(gid, homeTeam, awayTeam, hScore, aScore, forfeitType, reverse = false) {
  const sign = reverse ? -1 : 1;
  const teamsRef = db.ref(getSeasonPath(currentSeasonId, `groups/${gid}/teams`));
  const snap = await teamsRef.once('value');
  const teamsVal = snap.val() || {};

  let homeKey = null, awayKey = null, hd = null, ad = null;
  for (const [k, v] of Object.entries(teamsVal)) {
    if (v.name === homeTeam) { homeKey = k; hd = { ...v }; }
    if (v.name === awayTeam) { awayKey = k; ad = { ...v }; }
  }
  if (!hd || !ad) return;

  if (forfeitType === 'no_contest') {
    hd.p = (hd.p || 0) + sign;
    ad.p = (ad.p || 0) + sign;
  } else if (forfeitType === 'forfeit') {
    hd.p = (hd.p || 0) + sign;
    ad.p = (ad.p || 0) + sign;
    if (hScore > aScore) {
      hd.w   = (hd.w   || 0) + sign;
      hd.pts = (hd.pts || 0) + (3 * sign);
      ad.l   = (ad.l   || 0) + sign;
      ad.gd  = (ad.gd  || 0) + (-3 * sign);
      ad.gc  = (ad.gc  || 0) + (3 * sign);
    } else {
      ad.w   = (ad.w   || 0) + sign;
      ad.pts = (ad.pts || 0) + (3 * sign);
      hd.l   = (hd.l   || 0) + sign;
      hd.gd  = (hd.gd  || 0) + (-3 * sign);
      hd.gc  = (hd.gc  || 0) + (3 * sign);
    }
  } else {
    // Normal result
    hd.p  = (hd.p  || 0) + sign;
    ad.p  = (ad.p  || 0) + sign;
    hd.gs = (hd.gs || 0) + (hScore * sign);
    hd.gc = (hd.gc || 0) + (aScore * sign);
    ad.gs = (ad.gs || 0) + (aScore * sign);
    ad.gc = (ad.gc || 0) + (hScore * sign);
    hd.gd = (hd.gd || 0) + ((hScore - aScore) * sign);
    ad.gd = (ad.gd || 0) + ((aScore - hScore) * sign);
    if (hScore > aScore) {
      hd.w   = (hd.w   || 0) + sign;
      hd.pts = (hd.pts || 0) + (3 * sign);
      ad.l   = (ad.l   || 0) + sign;
    } else if (aScore > hScore) {
      ad.w   = (ad.w   || 0) + sign;
      ad.pts = (ad.pts || 0) + (3 * sign);
      hd.l   = (hd.l   || 0) + sign;
    } else {
      hd.d   = (hd.d   || 0) + sign;
      hd.pts = (hd.pts || 0) + (1 * sign);
      ad.d   = (ad.d   || 0) + sign;
      ad.pts = (ad.pts || 0) + (1 * sign);
    }
  }

  await teamsRef.child(homeKey).set(hd);
  await teamsRef.child(awayKey).set(ad);
}

function renderResults() {
  const card = document.getElementById('contentCard');
  let html = `

      <button class="sub-tab-btn ${currentResultsView==='knockout'?'active':''}" id="subTabKo">Knockout</button>

function renderGroupResults() {
  const container = document.getElementById('resultsContent');
  const allResults = [];
  for (const [gid, group] of Object.entries(groupsData)) {
    const results = group.results || {};
    for (const [rkey, r] of Object.entries(results)) {
      allResults.push({ ...r, key: rkey, groupId: gid, groupName: group.name || gid });
    }
  }
  allResults.sort((a,b) => (b.md||0)-(a.md||0));

  if (!allResults.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No group results yet</p></div>`;
    return;
  }

  let html = '<div class="matches-list">';
  allResults.forEach((r, i) => {
    const { homeTeam, awayTeam, homeScore, awayScore, forfeitType } = r;
    const homeIcon = getTeamIconHtml(homeTeam, 'team-icon-lg');
    const awayIcon = getTeamIconHtml(awayTeam, 'team-icon-lg');
    let scoreHtml = '';
    if (forfeitType === 'no_contest') {
      scoreHtml = `<div class="forfeit-display">F — F</div><div class="forfeit-type-text">No Contest</div>`;
    } else if (forfeitType === 'forfeit') {
      scoreHtml = `<div class="score-display">${homeScore} — ${awayScore}</div><div class="forfeit-type-text">Forfeit</div>`;
    } else {
      scoreHtml = `<div class="score-display">${homeScore} — ${awayScore}</div>`;
    }
    html += `
      <div class="match-card" style="animation-delay:${i*0.04}s">
        <div class="match-group-label">📁 ${escapeHtml(r.groupName)} · MD${r.md||'?'}</div>
        <div class="match-row">
          <div class="team-side">${homeIcon}<span class="team-name-big">${escapeHtml(homeTeam)}</span></div>
          <div class="match-center">${scoreHtml}</div>
          <div class="team-side">${awayIcon}<span class="team-name-big">${escapeHtml(awayTeam)}</span></div>
        </div>
        ${isAdmin ? `<div class="admin-row">
          <button class="btn-sm btn-edit" data-rid="${r.key}" data-gid="${r.groupId}">✏️ Edit</button>
          <button class="btn-sm btn-delete" data-rid="${r.key}" data-gid="${r.groupId}">🗑️ Delete</button>
        </div>` : ''}
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;

  if (isAdmin) {
    container.querySelectorAll('.btn-edit[data-rid]').forEach(btn => {
      btn.onclick = () => {
        const r = (groupsData[btn.dataset.gid]?.results || {})[btn.dataset.rid];
        if (r) openResultForm({ ...r, key: btn.dataset.rid, groupId: btn.dataset.gid });
      };
    });
    container.querySelectorAll('.btn-delete[data-rid]').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Delete result? This will reverse the table stats.')) return;
        const gid = btn.dataset.gid;
        const rkey = btn.dataset.rid;
        const r = (groupsData[gid]?.results || {})[rkey];
        if (r) await applyResultToTable(gid, r.homeTeam, r.awayTeam, r.homeScore||0, r.awayScore||0, r.forfeitType||'none', true);
        await db.ref(getSeasonPath(currentSeasonId, `groups/${gid}/results/${rkey}`)).remove();
        await loadCurrentSeasonData(); renderResults();
      };
    });
  }
}

function renderKnockoutResults() {
  const container = document.getElementById('resultsContent');
  if (!knockoutMatches.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🏆</div><p>No knockout matches yet</p></div>`;
    return;
  }
  const rounds = ['R16','QF','SF','Final','3rd Place'];
  const grouped = {};
  knockoutMatches.forEach(m => {
    const r = m.round || 'Other';
    if (!grouped[r]) grouped[r] = [];
    grouped[r].push(m);
  });
  let html = '';
  const orderedKeys = [...rounds.filter(r => grouped[r]), ...Object.keys(grouped).filter(r => !rounds.includes(r))];
  orderedKeys.forEach(round => {
    html += `<div class="knockout-round-title">🏆 ${escapeHtml(round)}</div><div class="matches-list">`;
    grouped[round].forEach((m, i) => {
      const homeIcon = getTeamIconHtml(m.homeTeam, 'team-icon-lg');
      const awayIcon = getTeamIconHtml(m.awayTeam, 'team-icon-lg');
      let scoreHtml = m.score
        ? `<div class="score-display">${escapeHtml(m.score)}</div>`
        : `<div class="forfeit-display">TBD</div>`;
      if (m.forfeit === 'forfeit') scoreHtml += `<div class="forfeit-type-text">Forfeit</div>`;
      html += `
        <div class="match-card" style="animation-delay:${i*0.04}s">
          <div class="match-row">
            <div class="team-side">${homeIcon}<span class="team-name-big">${escapeHtml(m.homeTeam)}</span></div>
            <div class="match-center">${scoreHtml}</div>
            <div class="team-side">${awayIcon}<span class="team-name-big">${escapeHtml(m.awayTeam)}</span></div>
          </div>
          ${isAdmin ? `<div class="admin-row">
            <button class="btn-sm btn-edit" data-koid="${m.key}">✏️ Edit</button>
            <button class="btn-sm btn-delete" data-koid="${m.key}">🗑️ Delete</button>
          </div>` : ''}
        </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;

  if (isAdmin) {
    container.querySelectorAll('.btn-edit[data-koid]').forEach(btn => {
      btn.onclick = () => { const m = knockoutMatches.find(x => x.key === btn.dataset.koid); if (m) openKoForm(m); };
    });
    container.querySelectorAll('.btn-delete[data-koid]').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Delete knockout match?')) return;
        await db.ref(getSeasonPath(currentSeasonId, `knockout_matches/${btn.dataset.koid}`)).remove();
        await loadCurrentSeasonData(); renderResults();
      };
    });
  }
}

function openResultForm(r = null) {
  editingResultKey   = r?.key    || null;
  editingResultGroup = r?.groupId || null;
  document.getElementById('resultFormTitle').textContent = r ? 'Edit Group Result' : 'Add Group Result';
  populateGroupSelect();

    document.getElementById('resultHomeTeam').value    = r.homeTeam || '';
    document.getElementById('resultAwayTeam').value    = r.awayTeam || '';

  const hScore    = parseInt(document.getElementById('resultHomeScore').value) || 0;

  const forfeit   = document.getElementById('resultForfeitType').value;

  const resultObj = { homeTeam, awayTeam, homeScore: hScore, awayScore: aScore, forfeitType: forfeit, md };

  if (editingResultKey && editingResultGroup) {

      await applyResultToTable(editingResultGroup, oldResult.homeTeam, oldResult.awayTeam, oldResult.homeScore||0, oldResult.awayScore||0, oldResult.forfeitType||'none', true);

// ══════════════════════════════════════════
// FIXTURES
// ══════════════════════════════════════════
function renderFixtures() {
  const allFixtures = [];
  const today = new Date(); today.setHours(0,0,0,0);
  for (const [dateStr, eventData] of Object.entries(calendarEventsData)) {
    if (!eventData || (eventData.title || '').trim() !== 'Emirates FA Cup') continue;
    const tournaments = eventData.tournaments || [];
    for (const tourn of tournaments) {
      for (const fix of (tourn.fixtures || [])) {
        allFixtures.push({
          date: dateStr,
          tournament: tourn.name || 'FA Cup',
          home: fix.home || '', away: fix.away || '',
        });
      }
    }
  }
  allFixtures.sort((a,b) => {
    const da = new Date(a.date), db2 = new Date(b.date);
    const af = da >= today, bf = db2 >= today;
    if (af && bf) return da - db2;
    if (!af && !bf) return da - db2;
    return af ? -1 : 1;
  });

  const grouped = {};
  allFixtures.forEach(f => { if (!grouped[f.date]) grouped[f.date] = []; grouped[f.date].push(f); });
  const sortedDates = Object.keys(grouped).sort((a,b) => {
    const da = new Date(a), db2 = new Date(b);
    const af = da >= today, bf = db2 >= today;
    if (af && bf) return da - db2;
    if (!af && !bf) return da - db2;
    return af ? -1 : 1;
  });

  const monthLabels = {'01':'January','02':'February','03':'March','04':'April','05':'May','06':'June','07':'July','08':'August','09':'September','10':'October','11':'November','12':'December'};
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  let html = `<div class="table-actions" style="margin-bottom:20px;">
    <span class="table-actions-title">📅 Fixtures</span>
    <span style="color:rgba(255,255,255,0.7);font-size:1.1rem;">${allFixtures.length} fixture${allFixtures.length!==1?'s':''}</span>
  </div>`;

  if (!sortedDates.length) {
    html += `<div class="empty-state"><div class="empty-icon">📅</div><p>No fixtures found</p></div>`;
    document.getElementById('contentCard').innerHTML = html;
    return;
  }

  sortedDates.forEach(dateStr => {
    const dateObj = new Date(dateStr);
    const day = dateObj.getDate();
    const [y, mo] = dateStr.split('-');
    const isPast = dateObj < today;
    const dateLabel = `${dayNames[dateObj.getDay()]}, ${day} ${monthLabels[mo]||mo} ${y}${isPast?' · Played':''}`;
    html += `<div class="fixture-date-group"><div class="fixture-date-label">📅 ${dateLabel}</div>`;
    grouped[dateStr].forEach(fix => {
      const homeIcon = getTeamIconHtml(fix.home, 'team-icon-lg');
      const awayIcon = getTeamIconHtml(fix.away, 'team-icon-lg');
      const homeDisplay = homeIcon || `<span class="fixture-team-name" style="margin-bottom:8px;">${escapeHtml(fix.home)}</span>`;
      const awayDisplay = awayIcon || `<span class="fixture-team-name" style="margin-bottom:8px;">${escapeHtml(fix.away)}</span>`;
      html += `
        <div class="fixture-card">
          <div class="fixture-tournament-label">🏆 ${escapeHtml(fix.tournament)}</div>
          <div class="fixture-match-row">
            <div class="fixture-team-side">${homeDisplay}<span class="fixture-team-name">${escapeHtml(fix.home)}</span></div>
            <div class="fixture-vs">VS</div>
            <div class="fixture-team-side">${awayDisplay}<span class="fixture-team-name">${escapeHtml(fix.away)}</span></div>
          </div>
        </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('contentCard').innerHTML = html;
}

async function openStatModal(type, entry = null) {

  showGenericModal(`
    <h3>${entry?'Edit':'Add'} ${isScorer?'Top Scorer':'Top Assistant'}</h3>
    <label>Player Name</label>
    <input id="statName" placeholder="Player Name" value="${escapeHtml(entry?.name||'')}">
    <label>Team</label>
    <input id="statTeam" placeholder="Team" value="${escapeHtml(entry?.team||'')}">
    <label>${isScorer?'Goals':'Assists'}</label>
    <input id="statCount" type="number" value="${entry?.count||0}">
    <label>Player Photo (background will be removed automatically)</label>
    <input type="file" id="statPhoto" accept="image/*">
    <div id="photoPreview" style="margin-top:10px;">${currentImageUrl?`<img src="${currentImageUrl}" style="max-width:100px;border-radius:10px;">`:''}</div>
    <div class="modal-btns">
      <button class="modal-btn-primary" id="saveStatBtn">Save</button>
      <button class="modal-btn-cancel" id="cancelStatBtn">Cancel</button>
    </div>
  `);
  document.getElementById('cancelStatBtn').onclick = closeGenericModal;
  const fileInput = document.getElementById('statPhoto');
  const previewDiv = document.getElementById('photoPreview');
  fileInput.onchange = async () => {
    const file = fileInput.files[0]; if (!file) return;
    previewDiv.innerHTML = '<div class="status-msg status-loading">Removing background…</div>';
    try {
      let blob;
      try { blob = await removeBackground(file); } catch(e) { blob = file; }
      const url = await uploadToImgBB(blob);
      previewDiv.innerHTML = `<img src="${url}" style="max-width:100px;border-radius:10px;"><div class="status-msg status-success">Ready</div>`;
      fileInput.dataset.uploadedUrl = url;
    } catch(e) { previewDiv.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`; }
  };
  document.getElementById('saveStatBtn').onclick = async () => {
    const name  = document.getElementById('statName').value.trim();
    const team  = document.getElementById('statTeam').value.trim();
    const count = parseInt(document.getElementById('statCount').value) || 0;
    if (!name || !team) { alert('Fill all fields'); return; }
    let imageUrl = currentImageUrl;
    if (fileInput.dataset.uploadedUrl) imageUrl = fileInput.dataset.uploadedUrl;
    const data = { name, team, count, imageUrl };
    const path = isScorer ? `${BASE}/topScorer/list` : `${BASE}/topAssistant/list`;
    if (entry?.key) await db.ref(`${path}/${entry.key}`).set(data);
    else await db.ref(path).push(data);
    closeGenericModal();
    if (isScorer) { await loadTopScorerData(); renderTopScorers(); }
    else { await loadTopAssistantData(); renderTopAssistants(); }
  };
}

    navbarLogoUrl = url; await loadNavbarLogo(); closeGenericModal();
    alert('Navbar logo updated!');
  } catch(e) { alert('Error: ' + e.message); closeGenericModal(); }
}

async function uploadTeamIcon() {
  const teamName = prompt('Team name (exact):'); if (!teamName) return;
  const file = await pickFile('image/*'); if (!file) return;
  showGenericModal(`<h3>Processing…</h3><div class="loading-spinner"><div class="spinner"></div><span>Removing background…</span></div>`);
  try {
    let blob;
    try { blob = await removeBackground(file); } catch(e) { blob = file; }
    const url = await uploadToImgBB(blob);
    await db.ref(`${BASE}/teamIcons/${teamName}`).set({ imageUrl: url, updatedAt: Date.now() });
    teamIconsCache[teamName] = url;
    closeGenericModal(); alert(`Icon saved for "${teamName}"!`);
    renderCurrentTab();
  } catch(e) { alert('Error: ' + e.message); closeGenericModal(); }
}

async function uploadEmiratesImage(type) {
  const file = await pickFile('image/*'); if (!file) return;
  showGenericModal(`<h3>Uploading…</h3><div class="loading-spinner"><div class="spinner"></div></div>`);
  try {
    const url = await uploadToImgBB(file);
    if (type === 'logo') { await db.ref(`${BASE}/emirates_logo`).set(url); emiratesLogoUrl = url; }
    else { await db.ref(`${BASE}/emirates_slogan`).set(url); emiratesSloganUrl = url; }
    renderEmiratesAnimation(); closeGenericModal();
    alert(`Emirates ${type} updated!`);
  } catch(e) { alert('Error: ' + e.message); closeGenericModal(); }
}

async function uploadCornerImage() {
  const file = await pickFile('image/*'); if (!file) return;
  showGenericModal(`<h3>Uploading…</h3><div class="loading-spinner"><div class="spinner"></div></div>`);
  try {
    const url = await uploadToImgBB(file);
    await db.ref(`${BASE}/group_corner_image`).set(url);
    groupCornerImageUrl = url; closeGenericModal();
    alert('Corner image updated!');
    if (document.querySelector('.tab-btn.active')?.dataset.tab === 'table') renderTable();
  } catch(e) { alert('Error: ' + e.message); closeGenericModal(); }
}

function manageSlideshowUI() {
  const refresh = () => {
    let prevHtml = '<div class="img-preview-grid">';
    slideshowImages.forEach((url, idx) => {
      prevHtml += `<div class="preview-thumb"><img src="${url}"><button class="thumb-del" data-idx="${idx}">✕</button></div>`;
    });
    prevHtml += '</div>';
    showGenericModal(`
      <h3>Manage Slideshow</h3>
      ${prevHtml}
      <label>Add New Slide</label>
      <input type="file" id="newSlideFile" accept="image/*">
      <button class="modal-btn-primary" id="uploadSlideBtn" style="margin-top:10px;">+ Add Slide</button>
      <label style="margin-top:16px;">Duration (seconds)</label>
      <input type="number" id="slideDur" value="${slideshowDuration/1000}" step="0.5" min="1" max="10">
      <div class="modal-btns">
        <button class="modal-btn-primary" id="saveDurBtn">Save Duration</button>
        <button class="modal-btn-cancel" id="closeSlideBtn">Close</button>
      </div>
      <div id="slideStatus"></div>
    `);
    document.querySelectorAll('.thumb-del').forEach(btn => {
      btn.onclick = async () => {
        slideshowImages.splice(parseInt(btn.dataset.idx),1);
        await db.ref(`${BASE}/slideshow/images`).set(slideshowImages);
        await loadSlideshow(); refresh();
      };
    });
    document.getElementById('uploadSlideBtn').onclick = async () => {
      const file = document.getElementById('newSlideFile').files[0];
      const statusDiv = document.getElementById('slideStatus');
      if (!file) { statusDiv.innerHTML = '<div class="status-msg status-error">Select a file</div>'; return; }
      try {
        statusDiv.innerHTML = '<div class="status-msg status-loading">Uploading…</div>';
        const url = await uploadToImgBB(file);
        slideshowImages.push(url);
        await db.ref(`${BASE}/slideshow/images`).set(slideshowImages);
        await loadSlideshow(); refresh();
      } catch(e) { statusDiv.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`; }
    };
    document.getElementById('saveDurBtn').onclick = async () => {
      let sec = parseFloat(document.getElementById('slideDur').value);
      if (isNaN(sec)) sec = 3;
      sec = Math.min(10, Math.max(1, sec));
      await db.ref(`${BASE}/slideshow/duration`).set(sec * 1000);
      slideshowDuration = sec * 1000; await loadSlideshow();
      document.getElementById('slideStatus').innerHTML = '<div class="status-msg status-success">Duration saved!</div>';
    };
    document.getElementById('closeSlideBtn').onclick = closeGenericModal;
  };
  refresh();
}

function pickFile(accept) {
  return new Promise(res => {
    const inp = document.createElement('input'); inp.type = 'file'; inp.accept = accept;
    inp.onchange = e => res(e.target.files[0] || null); inp.click();
  });
}
