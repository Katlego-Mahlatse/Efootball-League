                        if (r) openResultForm({ key: btn.dataset.key, groupId: btn.dataset.gid, ...r });
                    };
                });
                document.querySelectorAll('#contentCard .btn-delete[data-key]').forEach(btn => {
                    btn.onclick = async () => {
                        if (!confirm('Delete result?')) return;
                        await db.ref(sp(currentSeasonId, `groups/${btn.dataset.gid}/results/${btn.dataset
                        .key}`)).remove();
                        renderResults();
                    };
                });
            }
        }

        // ─── CHANGE 2: Scan Modal ───
        let scanBlockCounter = 0;

        function openScanModal() {
            scanMatchBlocks = [];
            scanResults = [];
            scanBlockCounter = 0;
            renderScanModal();
        }

        function renderScanModal() {
            let blocksHtml = '';
            scanMatchBlocks.forEach((block, idx) => {
                const groupOpts = Object.entries(groupsData).map(([gid, g]) =>
                    `<option value="${gid}" ${block.groupId===gid?'selected':''}>${escapeHtml(g.name||gid)}</option>`
                ).join('');
                const imagesHtml = (block.images || []).map((img, imgIdx) =>
                    `<div class="scan-thumb"><img src="${img}"><button class="remove-scan-img" data-block="${idx}" data-img="${imgIdx}">x</button></div>`
                ).join('');
                blocksHtml += `
              <div class="scan-match-block" data-block="${idx}">
                <div class="block-header">
                  <h4>Match ${idx+1}</h4>
                  <div>
                    <button class="btn-sm btn-edit" onclick="removeScanBlock(${idx})" style="font-size:1rem;padding:6px 16px;">Remove</button>
                  </div>
                </div>
                <div class="filter-group" style="margin-bottom:12px;">
                  <label>Group</label>
                  <select class="scan-group-select" data-block="${idx}">
                    <option value="">Select Group</option>
                    ${groupOpts}
                  </select>
                </div>
                <label>Images (screenshots of match results)</label>
                <input type="file" accept="image/*" multiple class="scan-image-input" data-block="${idx}">
                <div class="scan-images-grid">${imagesHtml}</div>
              </div>
            `;
            });

            const allGroupOpts = Object.entries(groupsData).map(([gid, g]) =>
                `<option value="${gid}">${escapeHtml(g.name||gid)}</option>`
            ).join('');

            showModal(`
            <h3>📸 Multi-Match Scan</h3>
            <p style="color:rgba(255,255,255,0.6);margin-bottom:20px;">Add multiple match blocks, each with one or more images. AI will detect scores, teams, and details.</p>
            <div id="scanBlocksContainer">${blocksHtml}</div>
            <button class="add-btn" id="addScanBlockBtn" style="margin:12px 0;">+ Add Match Block</button>
            <div id="scanStatus"></div>
            <div class="modal-btns">
              <button class="modal-btn-primary" id="scanAllBtn">🔍 Scan All</button>
              <button class="modal-btn-cancel" id="cancelScanBtn">Cancel</button>
            </div>
          `);

            // Attach events
            document.getElementById('addScanBlockBtn').onclick = () => {
                scanMatchBlocks.push({ groupId: '', images: [] });
                renderScanModal();
            };

            document.getElementById('cancelScanBtn').onclick = closeModal;

            document.querySelectorAll('.scan-image-input').forEach(input => {
                input.onchange = function() {
                    const idx = parseInt(this.dataset.block);
                    const files = this.files;
                    if (!files || !files.length) return;
                    const block = scanMatchBlocks[idx];
                    if (!block) return;
                    for (const file of files) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            block.images.push(e.target.result);
                            renderScanModal();
                        };
                        reader.readAsDataURL(file);
                    }
                };
            });

            document.querySelectorAll('.scan-group-select').forEach(sel => {
                sel.onchange = function() {
                    const idx = parseInt(this.dataset.block);
                    if (scanMatchBlocks[idx]) {
                        scanMatchBlocks[idx].groupId = this.value;
                    }
                };
            });

            document.querySelectorAll('.remove-scan-img').forEach(btn => {
                btn.onclick = function() {
                    const blockIdx = parseInt(this.dataset.block);
                    const imgIdx = parseInt(this.dataset.img);
                    if (scanMatchBlocks[blockIdx]) {
                        scanMatchBlocks[blockIdx].images.splice(imgIdx, 1);
                        renderScanModal();
                    }
                };
            });

            document.getElementById('scanAllBtn').onclick = performScanAll;
        }

        window.removeScanBlock = function(idx) {
            scanMatchBlocks.splice(idx, 1);
            renderScanModal();
        };

        // ─── CHANGE 2: Perform Scan ───
        async function performScanAll() {
            // Validate
            const validBlocks = scanMatchBlocks.filter(b => b.groupId && b.images && b.images.length > 0);
            if (!validBlocks.length) {
                document.getElementById('scanStatus').innerHTML =
                    '<div class="status-msg status-error">Add at least one match block with images and a group.</div>';
                return;
            }

            const statusEl = document.getElementById('scanStatus');
            statusEl.innerHTML = '<div class="status-msg status-loading">Scanning matches with AI… Please wait.</div>';

            const allTeamNames = getAllTeamNames();

            try {
                scanResults = [];

                for (let bi = 0; bi < validBlocks.length; bi++) {
                    const block = validBlocks[bi];
                    const groupId = block.groupId;
                    const groupName = groupsData[groupId]?.name || groupId;

                    // Build prompt
                    let prompt =
                        `You are a football data extraction AI. Analyze the provided image(s) and extract match result data. Return ONLY valid JSON with this structure: { "homeTeam": "", "awayTeam": "", "homeScore": 0, "awayScore": 0, "matchday": 0, "forfeitType": "none", "date": "", "venue": "", "matchType": "Group Stage", "aggregate": "", "homeScorers": [], "awayScorers": [] }. Forfeit types: "none", "no_contest", "forfeit". If a team name is a short code or abbreviation, expand it to the full team name. Use the eFootball team name mapping.`;

                    // ─── CHANGE 6: Append logo mappings ───
                    const contentParts = [
                        { type: "text", text: prompt }
                    ];

                    // Add each image
                    for (const imgData of block.images) {
                        contentParts.push({
                            type: "image_url",
                            image_url: { url: imgData }
                        });
                    }

                    // ─── CHANGE 6: Append logo mappings as image_url parts ───
                    const logoEntries = Object.entries(teamLogoMappings);
                    if (logoEntries.length > 0) {
                        // First add a text instruction
                        contentParts.push({
                            type: "text",
                            text: "Here are reference logos for team identification:"
                        });
                        for (const [teamName, mapping] of logoEntries) {
                            if (mapping && mapping.imageUrl) {
                                contentParts.push({
                                    type: "text",
                                    text: `Logo for ${teamName}:`
                                });
                                contentParts.push({
                                    type: "image_url",
                                    image_url: { url: mapping.imageUrl }
                                });
                            }
                        }
                    }

                    const requestBody = {
                        model: "meta-llama/llama-4-scout-17b-16e-instruct",
                        messages: [
                            { role: "user", content: contentParts }
                        ]
                    };

                    const resp = await fetch('https://efootball-league.onrender.com/scan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody)
                    });

                    if (!resp.ok) {
                        const errText = await resp.text();
                        throw new Error(`Scan error (${resp.status}): ${errText}`);
                    }

                    const result = await resp.json();
                    let parsed = null;

                    try {
                        // Try to extract JSON from the response
                        let content = result.choices?.[0]?.message?.content || '';
                        // Find JSON in the content
                        const jsonMatch = content.match(/\{[\s\S]*\}/);
                        if (jsonMatch) {
                            parsed = JSON.parse(jsonMatch[0]);
                        } else {
                            parsed = JSON.parse(content);
                        }
                    } catch (e) {
                        console.warn('Failed to parse AI response:', e);
                        // Fallback: try to use the raw response
                        parsed = result;
                    }

                    if (parsed) {
                        // ─── CHANGE 5: Apply team name mapping ───
                        parsed.homeTeam = mapTeamName(parsed.homeTeam || '');
                        parsed.awayTeam = mapTeamName(parsed.awayTeam || '');
                        parsed.homeScore = parseInt(parsed.homeScore) || 0;
                        parsed.awayScore = parseInt(parsed.awayScore) || 0;
                        parsed.matchday = parseInt(parsed.matchday) || 0;
                        parsed.forfeitType = parsed.forfeitType || 'none';
                        parsed.date = parsed.date || '';
                        parsed.venue = parsed.venue || '';
                        parsed.matchType = parsed.matchType || 'Group Stage';
                        parsed.aggregate = parsed.aggregate || '';
                        parsed.homeScorers = parsed.homeScorers || [];
                        parsed.awayScorers = parsed.awayScorers || [];

                        scanResults.push({
                            groupId: groupId,
                            groupName: groupName,
                            ...parsed
                        });
                    } else {
                        scanResults.push({
                            groupId: groupId,
                            groupName: groupName,
                            homeTeam: 'Unknown',
                            awayTeam: 'Unknown',
                            homeScore: 0,
                            awayScore: 0,
                            matchday: 0,
                            forfeitType: 'none',
                            date: '',
                            venue: '',
                            matchType: 'Group Stage',
                            aggregate: '',
                            homeScorers: [],
                            awayScorers: [],
                            _error: 'Failed to parse AI response'
                        });
                    }

                    statusEl.innerHTML =
                        `<div class="status-msg status-loading">Scanned ${bi+1}/${validBlocks.length} matches…</div>`;
                }

                statusEl.innerHTML = `<div class="status-msg status-success">✅ Scanned ${scanResults.length} matches! Opening preview…</div>`;
                setTimeout(() => openScanPreviewModal(), 600);

            } catch (err) {
                statusEl.innerHTML = `<div class="status-msg status-error">❌ Scan failed: ${escapeHtml(err.message)}</div>`;
                console.error(err);
            }
        }

        async function updateGroupTeamStats(gid, homeTeam, awayTeam, hScore, aScore, forfeit) {
            const ref = db.ref(sp(currentSeasonId, `groups/${gid}/teams`));
            const snap = await ref.once('value');
            const teams = snap.val() || {};
            let hKey = null,
                aKey = null,
                hData = null,
                aData = null;
            for (const [k, v] of Object.entries(teams)) {
                if (v.name === homeTeam) { hKey = k;
                    hData = { ...v }; }
                if (v.name === awayTeam) { aKey = k;
                    aData = { ...v }; }
            }
            if (!hData) hData = { name: homeTeam, p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0 };
            if (!aData) aData = { name: awayTeam, p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0 };
            hData.p = (hData.p || 0) + 1;
            aData.p = (aData.p || 0) + 1;
            if (forfeit === 'no_contest') {
                // no stat change
            } else if (forfeit === 'forfeit') {
                if (hScore > aScore) { hData.pts += 3;
                    hData.w++;
                    aData.l++;
                    aData.gd = (aData.gd || 0) - 3;
                    aData.gc = (aData.gc || 0) + 3; } else if (aScore > hScore) { aData.pts += 3;
                    aData.w++;
                    hData.l++;
                    hData.gd = (hData.gd || 0) - 3;
                    hData.gc = (hData.gc || 0) + 3; }
            } else {
                hData.gs = (hData.gs || 0) + hScore;
                hData.gc = (hData.gc || 0) + aScore;
                aData.gs = (aData.gs || 0) + aScore;
                aData.gc = (aData.gc || 0) + hScore;
                hData.gd = hData.gs - hData.gc;
                aData.gd = aData.gs - aData.gc;
                if (hScore > aScore) { hData.pts += 3;
                    hData.w++;
                    aData.l++; } else if (aScore > hScore) { aData.pts += 3;
                    aData.w++;
                    hData.l++; } else { hData.pts += 1;
                    aData.pts += 1;
                    hData.d++;
                    aData.d++; }
            }
            if (!hKey) hKey = ref.push().key;
            if (!aKey) aKey = ref.push().key;
            await db.ref(sp(currentSeasonId, `groups/${gid}/teams/${hKey}`)).set(hData);
            await db.ref(sp(currentSeasonId, `groups/${gid}/teams/${aKey}`)).set(aData);
        }

        function openAddVideoModal() {
            showModal(`
            <h3>Add Watch Video</h3>
            <label>Title</label>
            <input id="videoTitle" placeholder="Video title" value="">
            <label>Embed Code or YouTube URL</label>
            <input id="videoEmbed" placeholder="https://www.youtube.com/watch?v=... or embed iframe src" value="">
            <p style="color:rgba(255,255,255,0.4);font-size:0.9rem;margin-top:6px;">Supports YouTube watch URLs, youtu.be URLs, and direct embed iframe src.</p>
            <div id="videoStatus"></div>
            <div class="modal-btns">
              <button class="modal-btn-primary" id="saveVideoBtn">Save Video</button>
              <button class="modal-btn-cancel" id="cancelVideoBtn">Cancel</button>
            </div>
          `);

            document.getElementById('cancelVideoBtn').onclick = closeModal;

            document.getElementById('saveVideoBtn').onclick = async () => {
                const title = document.getElementById('videoTitle').value.trim() || 'Untitled';
                let embed = document.getElementById('videoEmbed').value.trim();
                if (!embed) {
                    document.getElementById('videoStatus').innerHTML =
                        '<div class="status-msg status-error">Please enter a video URL or embed code.</div>';
                    return;
                }

                // Auto-convert YouTube URLs to embed
                const ytWatchMatch = embed.match(/youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)/);
                const ytShortMatch = embed.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
                let embedSrc = embed;
                if (ytWatchMatch) {
                    embedSrc = `https://www.youtube.com/embed/${ytWatchMatch[1]}`;
                } else if (ytShortMatch) {
                    embedSrc = `https://www.youtube.com/embed/${ytShortMatch[1]}`;
                } else if (embed.includes('youtube.com/embed/')) {
                    embedSrc = embed;
                } else if (embed.includes('youtu.be/')) {
                    const vid = embed.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
                    if (vid) embedSrc = `https://www.youtube.com/embed/${vid[1]}`;
                } else if (embed.includes('iframe') && embed.includes('src=')) {
                    const srcMatch = embed.match(/src=["']([^"']+)["']/);
                    if (srcMatch) embedSrc = srcMatch[1];
                }

                // Ensure embedSrc is a valid URL-ish thing
                if (!embedSrc.startsWith('http://') && !embedSrc.startsWith('https://')) {
                    embedSrc = `https://${embedSrc}`;
                }

                const data = { embedCode: embedSrc, title };
                await db.ref(`${basePath}/watchMatch/videos`).push(data);
                await loadWatchMatchData();
                closeModal();
                renderWatchMatch();
            };
        }

                        for (const e of entries) {
                            if (e.key !== key && e.status === 'active') {
                                await db.ref(
                                    `${basePath}/seasons/season_${e.season || currentSeasonId}/managerHistory/${team}/${e.key}/status`
                                ).set('sacked');
                            }
                        }
                        // Set this one to active
                        await db.ref(
                            `${basePath}/seasons/season_${foundSeason}/managerHistory/${team}/${key}/status`
                        ).set('active');
                        await loadManagerHistory();
                        statusEl.innerHTML = '<div class="status-msg status-success">✅ Set active!</div>';
                        setTimeout(openManagerHistoryModal, 400);
                    } catch (err) {
                        statusEl.innerHTML =
                            `<div class="status-msg status-error">❌ Error: ${escapeHtml(err.message)}</div>`;
                    }
                };
            });

            // Edit manager entry (inline editing)
            document.querySelectorAll('.mh-edit-btn').forEach(btn => {
                btn.onclick = function() {
                    const team = this.dataset.team;
                    const key = this.dataset.key;
                    const entries = managerHistory[team] || [];
                    const entry = entries.find(e => e.key === key);
                    if (!entry) return;

                    // Replace the entry with an edit form
                    const entryEl = this.closest('.manager-entry');
                    const name = entry.name;
                    const status = entry.status;
                    const joined = entry.matchdayJoined || 0;
                    const left = entry.matchdayLeft || '';

                    entryEl.innerHTML = `
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;width:100%;">
                  <input type="text" class="mh-edit-name" value="${escapeHtml(name)}" style="flex:1;min-width:100px;padding:6px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:white;font-size:1rem;">
                  <input type="number" class="mh-edit-joined" value="${joined}" style="width:80px;padding:6px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:white;font-size:1rem;">
                  <input type="number" class="mh-edit-left" value="${left}" placeholder="Left" style="width:80px;padding:6px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:white;font-size:1rem;">
                  <select class="mh-edit-status" style="padding:6px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:white;font-size:1rem;">
                    <option value="active" ${status==='active'?'selected':''}>Active</option>
                    <option value="sacked" ${status==='sacked'?'selected':''}>Sacked</option>
                    <option value="retired" ${status==='retired'?'selected':''}>Retired</option>
                  </select>
                  <button class="btn-success-sm mh-save-edit" data-team="${escapeHtml(team)}" data-key="${key}">Save</button>
                  <button class="btn-danger-sm mh-cancel-edit">Cancel</button>
                </div>
              `;

                    entryEl.querySelector('.mh-cancel-edit').onclick = function() {
                        openManagerHistoryModal();
                    };

                    entryEl.querySelector('.mh-save-edit').onclick = async function() {
                        const team2 = this.dataset.team;
                        const key2 = this.dataset.key;
                        const parent = this.closest('.manager-entry');
                        const newName = parent.querySelector('.mh-edit-name').value.trim();
                        const newJoined = parseInt(parent.querySelector('.mh-edit-joined').value) || 0;
                        const newLeft = parent.querySelector('.mh-edit-left').value;
                        const newStatus = parent.querySelector('.mh-edit-status').value;

                        if (!newName) {
                            document.getElementById('mhStatus').innerHTML =
                                '<div class="status-msg status-error">Name required.</div>';
                            return;
                        }

                        const statusEl = document.getElementById('mhStatus');
                        statusEl.innerHTML = '<div class="status-msg status-loading">Saving…</div>';

                        try {
                            // Find which season
                            let foundSeason = currentSeasonId;
                            const entries2 = managerHistory[team2] || [];
                            for (const e of entries2) {
                                if (e.key === key2) {
                                    foundSeason = e.season || currentSeasonId;
                                    break;
                                }
                            }

                            const updateData = { name: newName, status: newStatus, matchdayJoined: newJoined };
                            if (newLeft) updateData.matchdayLeft = parseInt(newLeft);

                            // If setting to active, sack others
                            if (newStatus === 'active') {
                                for (const e of entries2) {
                                    if (e.key !== key2 && e.status === 'active') {
                                        await db.ref(
                                            `${basePath}/seasons/season_${e.season || currentSeasonId}/managerHistory/${team2}/${e.key}/status`
                                        ).set('sacked');
                                    }
                                }
                            }

                            await db.ref(
                                `${basePath}/seasons/season_${foundSeason}/managerHistory/${team2}/${key2}`
                            ).update(updateData);

                            await loadManagerHistory();
                            statusEl.innerHTML = '<div class="status-msg status-success">✅ Saved!</div>';
                            setTimeout(openManagerHistoryModal, 400);
                        } catch (err) {
                            statusEl.innerHTML =
                                `<div class="status-msg status-error">❌ Error: ${escapeHtml(err.message)}</div>`;
                        }
                    };
                };
            });
        }

                    updateSeasonUI();
                    renderCurrentTab();
                    if (!document.getElementById('adminSettingsItem')) {
                        const item = document.createElement('div');
                        item.id = 'adminSettingsItem';
                        item.className = 'menu-item';
                        item.innerHTML = '⚙️ Admin Settings';
                        item.onclick = () => { openAdminSettings();
                            closeMenu(); };
                        document.getElementById('sideMenu').appendChild(item);
                    }
                    // Also add a "Manager History" item to the side menu for quick access
                    if (!document.getElementById('managerHistoryMenuItem')) {
                        const mhItem = document.createElement('div');
                        mhItem.id = 'managerHistoryMenuItem';
                        mhItem.className = 'menu-item';
                        mhItem.innerHTML = '👥 Manager History';
                        mhItem.onclick = () => { openManagerHistoryModal();
                            closeMenu(); };
                        document.getElementById('sideMenu').appendChild(mhItem);
                    }
                } else {
                    alert('❌ Incorrect key');
                }
            } catch (err) {
                statusEl.remove();
                alert('❌ Error verifying admin key: ' + err.message);
                console.error(err);
            }
        };

        // ─── Season buttons ───
        document.getElementById('prevSeasonBtn').onclick = () => switchSeason(-1);
        document.getElementById('nextSeasonBtn').onclick = () => switchSeason(1);
        document.getElementById('addSeasonBtn').onclick = () => isAdmin && addNewSeason();
        document.getElementById('renameSeasonBtn').onclick = () => isAdmin && renameSeason();
        document.getElementById('setActiveSeasonBtn').onclick = () => isAdmin && setActiveSeason();

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCurrentTab();
            });
        });

        // ─── renderCurrentTab ───
        function renderCurrentTab() {
            const tab = document.querySelector('.tab-btn.active')?.dataset.tab;
            document.getElementById('contentCard').innerHTML =
                '<div class="loading-spinner"><div class="spinner"></div><span>Loading…</span></div>';
            if (tab === 'groups') renderGroups();
            else if (tab === 'fixtures') renderFixtures();
            else if (tab === 'results') renderResults();
            else if (tab === 'topscorers') renderTopScorers();
            else if (tab === 'topassists') renderTopAssists();
            else if (tab === 'watch') renderWatchMatch();
            else renderGroups();
        }

        // ─── Init ───
        async function init() {
            await loadBgSettings();
            await loadNavbarLogo();
            await loadEmiratesAnimation();
            await loadSlideshow();
            await loadTeamIcons();
            await loadFixturesData();

            // ─── CHANGE 5: Load team name mappings ───
            await loadTeamNameMappings();

            // ─── CHANGE 6: Load team logo mappings ───
            await loadTeamLogoMappings();

            // ─── CHANGE 4: Load manager history ───
            await loadManagerHistory();

            // ─── CHANGE 3: Load watch match data ───
            await loadWatchMatchData();

            await loadSeasonsMetadata();
            await loadTopScorerData();
            await loadTopAssistantData();

            const snap = await db.ref(`${basePath}/group_corner_image`).once('value');
            groupCornerImageUrl = snap.val() || '';

            renderCurrentTab();
        }

        init();
    </script>
</body>
</html>
