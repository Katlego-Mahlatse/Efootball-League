        async function approvePendingResult(id, entry) {
            const isForfeit = entry.isForfeit || entry.forfeitType === 'forfeit_no_reply' || entry.forfeitType ===
                'forfeit_agreement';
            const homeScore = entry.homeScore || 0;
            const awayScore = entry.awayScore || 0;
            const forfeitType = entry.forfeitType || 'none';

            const resultObj = {
                matchText: entry.matchText || formatResultText(entry.homeTeam, homeScore, entry.awayTeam, awayScore,
                    forfeitType),
                homeTeam: entry.homeTeam,
                awayTeam: entry.awayTeam,
                homeScore: homeScore,
                awayScore: awayScore,
                forfeitType: forfeitType,
                md: entry.md || 0,
                date: entry.date || '',
                venue: entry.venue || '',
                matchType: entry.matchType || 'Group Stage',
                aggregate: entry.aggregate || '',
                goalScorers: entry.goalScorers || { home: [], away: [] },
                assisters: entry.assisters || { home: [], away: [] },
                _approved: true,
                _approvedAt: Date.now()
            };

            // Save to flat results path (group stage)
            const path = sp(currentSeasonId, 'results');
            await db.ref(path).push(resultObj);

            // Apply scorers and assists
            await applyScorersFromScan(entry.goalScorers?.home || [], entry.homeTeam);
            await applyScorersFromScan(entry.goalScorers?.away || [], entry.awayTeam);
            await applyAssistsFromScan(entry.assisters?.home || [], entry.homeTeam);
            await applyAssistsFromScan(entry.assisters?.away || [], entry.awayTeam);

            // Apply to group table if teams exist (group stage only)
            if (!isForfeit && forfeitType !== 'no_contest') {
                let foundGroup = null;
                for (const gid in groupsData) {
                    const teams = groupsData[gid]?.teams || {};
                    let hasHome = false,
                        hasAway = false;
                    for (const key in teams) {
                        if (teams[key]?.name === entry.homeTeam) hasHome = true;
                        if (teams[key]?.name === entry.awayTeam) hasAway = true;
                    }
                    if (hasHome && hasAway) {
                        foundGroup = gid;
                        break;
                    }
                }
                if (foundGroup) {
                    await updateGroupTeamStats(foundGroup, entry.homeTeam, entry.awayTeam, homeScore, awayScore,
                        forfeitType);
                }
            }

            await db.ref(sp(currentSeasonId, `pending_results/${id}`)).remove();

            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();
            renderResults();
        }

        async function rejectPendingResult(id) {
            await db.ref(sp(currentSeasonId, `pending_results/${id}`)).remove();
        }

        // ─── Season buttons ───
        document.getElementById('prevSeasonBtn').onclick = () => switchSeason(-1);
        document.getElementById('nextSeasonBtn').onclick = () => switchSeason(1);
        document.getElementById('addSeasonBtn').onclick = () => isAdmin && addNewSeason();
        document.getElementById('renameSeasonBtn').onclick = () => isAdmin && renameSeason();
        document.getElementById('setActiveSeasonBtn').onclick = () => isAdmin && setActiveSeason();

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCurrentTab();
            });
        });

        // ─── renderCurrentTab ───
        function renderCurrentTab() {
            const tab = document.querySelector('.tab-btn.active')?.dataset.tab;
            document.getElementById('contentCard').innerHTML =
                '<div class="loading-spinner"><div class="spinner"></div><span>Loading…</span></div>';
            if (tab === 'groups') renderGroups();
            else if (tab === 'fixtures') renderFixtures();
            else if (tab === 'results') renderResults();
            else if (tab === 'topscorers') renderTopScorers();
            else if (tab === 'topassists') renderTopAssists();
            else if (tab === 'watch') renderWatchMatch();
            else renderGroups();
        }

        // ─── Init ───
        async function init() {
            await loadBgSettings();
            await loadNavbarLogo();
            await loadEmiratesAnimation();
            await loadSlideshow();
            await loadTeamIcons();
            await loadFixturesData();
            await loadTeamNameMappings();
            await loadTeamLogoMappings();
            await loadManagerHistory();
            await loadWatchMatchData();
            await loadKnockoutBracketImage();
            await loadDefaultResultsStage();
            await loadSeasonsMetadata();
            await loadTopScorerData();
            await loadTopAssistantData();

            const snap = await db.ref(`${basePath}/group_corner_image`).once('value');
            groupCornerImageUrl = snap.val() || '';

            renderCurrentTab();
        }

        init();
    </script>
</body>
</html>
