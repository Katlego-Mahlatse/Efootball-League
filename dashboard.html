<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Dashboard · eFootball 412</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      padding: 0;
      color: #f5f0ff;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }
    .modal-content {
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 2rem;
      padding: 1.5rem;
      max-width: 350px;
      width: 90%;
      text-align: center;
    }
    .modal-content h3 {
      color: #f5d742;
      margin-bottom: 1rem;
    }
    .modal-option {
      background: rgba(106, 59, 181, 0.15);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #f5e6ff;
      font-weight: 700;
      font-size: 0.8rem;
      transition: all 0.2s;
      border: 1px solid #f5d742;
      display: block;
      margin: 0.5rem 0;
      cursor: pointer;
    }
    .modal-option:hover {
      background: #6a3bb5;
      color: #f5d742;
    }
    .close-modal {
      background: #4a1d8c;
      color: #f5d742;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .profile-section {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeIn 0.5s ease;
    }
    .profile-picture {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #f5d742;
      margin-bottom: 0.8rem;
    }
    .fallback-icon {
      width: 100px;
      height: 100px;
      background: #6a3bb5;
      border: 3px solid #f5d742;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.8rem;
    }
    .fallback-icon svg {
      width: 60px;
      height: 60px;
      fill: #f5d742;
    }
    .username {
      font-size: 1.8rem;
      font-weight: bold;
      color: #f5d742;
      background: rgba(30, 15, 55, 0.7);
      display: inline-block;
      padding: 0.3rem 1.5rem;
      border-radius: 40px;
      backdrop-filter: blur(5px);
    }
    .leagues-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .league-card {
      background: rgba(45, 25, 75, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      padding: 1rem;
      text-align: center;
      transition: transform 0.2s, background 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: #f5e6ff;
    }
    .league-card:hover {
      transform: translateY(-5px);
      background: rgba(106, 59, 181, 0.6);
      border-color: #f5d742;
    }
    .league-icon {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 0.8rem;
    }
    .league-name {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .bottom-navbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.5rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 150;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .bottom-nav-icon {
      background: #6a3bb5;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid white;
      text-decoration: none;
    }
    .bottom-nav-icon:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .bottom-nav-icon svg {
      width: 28px;
      height: 28px;
      display: block;
    }
    @media (max-width: 680px) {
      .leagues-grid {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 1rem;
      }
      .league-icon {
        width: 60px;
        height: 60px;
      }
      .profile-picture, .fallback-icon {
        width: 80px;
        height: 80px;
      }
      .fallback-icon svg {
        width: 45px;
        height: 45px;
      }
      .username {
        font-size: 1.4rem;
      }
      .bottom-nav-icon {
        width: 45px;
        height: 45px;
      }
      .bottom-nav-icon svg {
        width: 24px;
        height: 24px;
      }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal-content">
    <h3>MENU</h3>
    <div class="modal-option" id="rulesModalBtn">RULES</div>
    <div class="modal-option" id="calendarModalBtn">CALENDAR</div>
    <div class="modal-option" id="playerTitlesModalBtn">PLAYER TITLES</div>
    <div class="modal-option" id="logoutModalBtn" style="background:#ef4444; color:white;">LOGOUT</div>
    <button class="close-modal" id="closeModalBtn">CLOSE</button>
  </div>
</div>

<div class="dashboard-container">
  <div class="profile-section">
    <div id="profilePictureContainer"></div>
    <div class="username" id="usernameDisplay">Loading...</div>
  </div>
  <div class="leagues-grid" id="leaguesGrid"></div>
</div>

<div class="bottom-navbar">
  <a href="profile.html" class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/></svg></a>
  <a href="chat.html" class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="white"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z"/><circle cx="8" cy="10" r="1.5" fill="#6A3BB5"/><circle cx="12" cy="10" r="1.5" fill="#6A3BB5"/><circle cx="16" cy="10" r="1.5" fill="#6A3BB5"/></svg></a>
  <a href="calendar.html" class="bottom-nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="9" x2="21" y2="9"/><circle cx="12" cy="14" r="1.5" fill="white"/><circle cx="16" cy="14" r="1.5" fill="white"/><circle cx="8" cy="14" r="1.5" fill="white"/><circle cx="12" cy="18" r="1.5" fill="white"/><circle cx="16" cy="18" r="1.5" fill="white"/><circle cx="8" cy="18" r="1.5" fill="white"/></svg></a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const leagues = [
    { name: "Premier League", icon: "images (14).png", redirect: "newpremier.html" },
    { name: "UEFA Nations League", icon: "IMG-20260425-WA4698.jpg", redirect: "newnations.html" },
    { name: "UEFA Champions League", icon: "images (15).png", redirect: "newchampions.html" },
    { name: "FIFA Club World Cup", icon: "images - 2026-04-21T172601.589.jpeg", redirect: "newclubworldcup.html" },
    { name: "UEFA Europa League", icon: "uefa-europa-league-logo-on-transparent-background-free-vector.jpg", redirect: "neweuropa.html" },
    { name: "UEFA Conference League", icon: "images (16).png", redirect: "newconference.html" },
    { name: "UEFA Super Cup", icon: "images - 2026-04-21T172656.176.jpeg", redirect: "newsupercup.html" }
  ];

  function renderLeagues() {
    const grid = document.getElementById("leaguesGrid");
    if (!grid) return;
    grid.innerHTML = "";
    leagues.forEach(league => {
      const card = document.createElement("a");
      card.className = "league-card";
      card.href = league.redirect;
      card.innerHTML = `<img class="league-icon" src="${league.icon}" alt="${league.name}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23f5d742%22%3E%3Cpath%20d%3D%22M12%202L15%209H22L16%2014L19%2021L12%2016.5L5%2021L8%2014L2%209H9L12%202Z%22%2F%3E%3C%2Fsvg%3E';"><div class="league-name">${league.name}</div></a>`;
      grid.appendChild(card);
    });
  }

  function updateUserUI(user, userData) {
    const usernameSpan = document.getElementById("usernameDisplay");
    const container = document.getElementById("profilePictureContainer");
    if (user) {
      const displayName = userData?.username || user.displayName || user.email?.split('@')[0] || "Player";
      usernameSpan.textContent = displayName;
      const photoURL = userData?.photoURL;
      if (photoURL) {
        container.innerHTML = `<img class="profile-picture" src="${photoURL}" alt="Profile" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">`;
      } else {
        container.innerHTML = `<div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#F5D742" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/></svg></div>`;
      }
    } else {
      usernameSpan.textContent = "Not logged in";
      container.innerHTML = `<div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#F5D742" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M5 20v-2a7 7 0 0 1 14 0v2"/></svg></div>`;
    }
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }
    if (user.email) localStorage.setItem('lastLoginEmail', user.email);
    const userRef = ref(db, `users/${user.uid}`);
    const snapshot = await get(userRef);
    const userData = snapshot.val();
    updateUserUI(user, userData);
    renderLeagues();
  });

  // Modal menu
  const hamburgerBtn = document.getElementById("hamburgerBtn");
  const modalOverlay = document.getElementById("modalOverlay");
  const closeModalBtn = document.getElementById("closeModalBtn");
  function openModal() { modalOverlay.classList.add("active"); }
  function closeModalFunc() { modalOverlay.classList.remove("active"); }
  hamburgerBtn.addEventListener("click", openModal);
  closeModalBtn.addEventListener("click", closeModalFunc);
  modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModalFunc(); });
  document.getElementById('rulesModalBtn').onclick = () => window.location.href = 'rules.html';
  document.getElementById('calendarModalBtn').onclick = () => window.location.href = 'calendar.html';
  document.getElementById('playerTitlesModalBtn').onclick = () => window.location.href = 'player-titles.html';
  document.getElementById('logoutModalBtn').onclick = async () => {
    await signOut(auth);
    localStorage.removeItem('lastLoginEmail');
    localStorage.removeItem('lastLoginPassword');
    window.location.href = 'login.html';
  };
</script>
</body>
</html>
