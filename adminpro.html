<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin Profile · eFootball 412</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      color: #f5f0ff;
      min-height: 100vh;
      padding-bottom: 2rem;
    }
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }
    .container {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .card-header {
      padding: 1rem 1.5rem;
      background: rgba(30, 15, 55, 0.9);
      border-bottom: 2px solid #f5d742;
    }
    .card-header h2 {
      font-size: 1.4rem;
      color: #f5e6ff;
    }
    .form-group {
      padding: 1rem 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #f5e6ff;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: rgba(30, 15, 55, 0.9);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      color: white;
      outline: none;
    }
    .btn-primary {
      background: #6a3bb5;
      border: none;
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
      color: #f5d742;
      font-weight: bold;
      cursor: pointer;
      margin: 0.5rem 1.5rem 1.5rem;
    }
    .btn-primary:hover {
      background: #7e4acf;
    }
    .user-list {
      padding: 0 1.5rem 1.5rem;
    }
    .user-item {
      background: rgba(55, 35, 95, 0.6);
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .user-avatar {
      width: 32px;
      height: 32px;
      background: #f5d742;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #2d1b4e;
      font-weight: bold;
    }
    .team-select {
      background: rgba(30,15,55,0.8);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.3rem 0.8rem;
      color: white;
    }
    .assign-btn {
      background: #6a3bb5;
      border: none;
      border-radius: 2rem;
      padding: 0.3rem 0.8rem;
      color: #f5d742;
      cursor: pointer;
      margin-left: 0.5rem;
    }
    .assign-btn:hover {
      background: #7e4acf;
    }
    .team-badge {
      background: rgba(106, 59, 181, 0.5);
      display: inline-block;
      padding: 0.2rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.8rem;
    }
    @media (max-width: 680px) {
      .user-item { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<div class="container">
  <!-- Admin's own profile edit -->
  <div class="card">
    <div class="card-header"><h2>👑 Admin Profile</h2></div>
    <div class="form-group">
      <label>Profile Picture</label>
      <input type="file" id="profilePicture" accept="image/*">
      <div id="picturePreview" style="margin-top: 0.5rem;"><img id="avatarImg" src="" alt="Avatar" style="width:80px; height:80px; border-radius:50%; object-fit:cover; background:#6a3bb5; display:none;"></div>
      <button id="uploadPictureBtn" class="btn-primary" style="margin:0.5rem 0 0;">Upload Picture</button>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Email">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="Phone number">
    </div>
    <div class="form-group">
      <label>New Password (leave blank to keep current)</label>
      <input type="password" id="newPassword" placeholder="New password">
    </div>
    <button id="saveProfileBtn" class="btn-primary">Save Changes</button>
  </div>

  <!-- Manage all users: assign teams -->
  <div class="card">
    <div class="card-header"><h2>👥 Manage Users & Teams</h2></div>
    <div id="usersList" class="user-list">Loading users...</div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, updateProfile, updateEmail, updatePassword, onAuthStateChanged } from "firebase/auth";
  import { getDatabase, ref, get, set, update } from "firebase/database";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "firebase/storage";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  let currentUser = null;

  // Admin own profile elements
  const usernameInput = document.getElementById('username');
  const emailInput = document.getElementById('email');
  const phoneInput = document.getElementById('phone');
  const newPasswordInput = document.getElementById('newPassword');
  const saveBtn = document.getElementById('saveProfileBtn');
  const avatarImg = document.getElementById('avatarImg');
  const pictureInput = document.getElementById('profilePicture');
  const uploadPictureBtn = document.getElementById('uploadPictureBtn');

  async function loadAdminProfile(uid) {
    const userRef = ref(db, `users/${uid}`);
    const snapshot = await get(userRef);
    const data = snapshot.val() || {};
    usernameInput.value = data.username || '';
    emailInput.value = data.email || '';
    phoneInput.value = data.phone || '';
    if (data.photoURL) {
      avatarImg.src = data.photoURL;
      avatarImg.style.display = 'block';
    } else {
      avatarImg.style.display = 'none';
    }
  }

  // Load all users for team assignment
  async function loadAllUsers() {
    const usersRef = ref(db, 'users');
    const snapshot = await get(usersRef);
    const users = snapshot.val() || {};
    const userListDiv = document.getElementById('usersList');
    userListDiv.innerHTML = '';
    for (const [uid, userData] of Object.entries(users)) {
      const div = document.createElement('div');
      div.className = 'user-item';
      const displayName = userData.username || userData.email || 'Anonymous';
      const firstChar = displayName.charAt(0).toUpperCase();
      const currentTeam = userData.team || 'Not assigned';
      div.innerHTML = `
        <div class="user-info">
          <div class="user-avatar">${firstChar}</div>
          <div><strong>${escapeHtml(displayName)}</strong><br><span class="team-badge">Team: ${escapeHtml(currentTeam)}</span></div>
        </div>
        <div>
          <input type="text" id="teamInput-${uid}" class="team-select" placeholder="Team name" value="${escapeHtml(currentTeam !== 'Not assigned' ? currentTeam : '')}">
          <button class="assign-btn" data-uid="${uid}">+ Select Team</button>
        </div>
      `;
      userListDiv.appendChild(div);
    }
    // Attach assign event listeners
    document.querySelectorAll('.assign-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const targetUid = btn.getAttribute('data-uid');
        const teamInput = document.getElementById(`teamInput-${targetUid}`);
        const newTeam = teamInput.value.trim();
        if (!newTeam) {
          alert('Please enter a team name.');
          return;
        }
        try {
          await set(ref(db, `users/${targetUid}/team`), newTeam);
          alert(`Team "${newTeam}" assigned to user.`);
          // Refresh list
          loadAllUsers();
        } catch (error) {
          alert('Error: ' + error.message);
        }
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = user;
    // Verify admin role
    const userRef = ref(db, `users/${user.uid}`);
    const snapshot = await get(userRef);
    const userData = snapshot.val();
    if (!userData || userData.role !== 'admin') {
      window.location.href = 'dashboard.html';
      return;
    }
    await loadAdminProfile(user.uid);
    await loadAllUsers();
  });

  saveBtn.addEventListener('click', async () => {
    const newUsername = usernameInput.value.trim();
    const newEmail = emailInput.value.trim();
    const newPhone = phoneInput.value.trim();
    const newPassword = newPasswordInput.value.trim();
    if (!newUsername || !newEmail) {
      alert('Username and email are required.');
      return;
    }
    try {
      await updateProfile(currentUser, { displayName: newUsername });
      if (newEmail !== currentUser.email) {
        await updateEmail(currentUser, newEmail);
      }
      if (newPassword) {
        await updatePassword(currentUser, newPassword);
      }
      await update(ref(db, `users/${currentUser.uid}`), {
        username: newUsername,
        email: newEmail,
        phone: newPhone
      });
      alert('Admin profile updated!');
    } catch (error) {
      alert('Error: ' + error.message);
    }
  });

  uploadPictureBtn.addEventListener('click', async () => {
    const file = pictureInput.files[0];
    if (!file) {
      alert('Select an image first.');
      return;
    }
    const storagePath = storageRef(storage, `profile_pictures/${currentUser.uid}`);
    try {
      const snapshot = await uploadBytes(storagePath, file);
      const url = await getDownloadURL(snapshot.ref);
      await updateProfile(currentUser, { photoURL: url });
      await set(ref(db, `users/${currentUser.uid}/photoURL`), url);
      avatarImg.src = url;
      avatarImg.style.display = 'block';
      alert('Profile picture updated!');
    } catch (error) {
      alert('Upload failed: ' + error.message);
    }
  });
</script>
</body>
</html>
