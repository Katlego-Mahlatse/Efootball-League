<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--violet:#963CFF;--razzmatazz:#E90052;--valentino:#360D3A;--white:#fff;--deep-blue:#0A2B5E;--turquoise:#00CED1;--glass-bg:rgba(255,255,255,0.05);--glass-blur:blur(12px);}
    body{font-family:'Rajdhani',sans-serif;background:var(--deep-blue);min-height:100vh;overflow-x:auto;min-width:1200px;width:1200px;margin:0 auto;font-size:20px;padding-bottom:3rem;position:relative;}
    body.has-bg::before{content:'';position:fixed;inset:0;background-image:var(--bg-image);background-size:var(--bg-size,cover);background-position:var(--bg-pos,center);background-repeat:no-repeat;z-index:-2;}
    body.has-bg::after{content:'';position:fixed;inset:0;background:rgba(10,43,94,0.55);z-index:-1;}
    @keyframes fadeInDown{from{opacity:0;transform:translateY(-24px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes cardSlideIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .navbar{background:linear-gradient(90deg,var(--deep-blue) 0%,var(--violet) 50%,var(--razzmatazz) 100%);border-bottom:2px solid var(--white);padding:0 2rem;height:100px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,0.35);animation:fadeInDown 0.5s ease both;}
    .navbar-logo{height:74px;max-width:260px;object-fit:contain;cursor:pointer;transition:transform 0.3s;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2));}
    .navbar-logo:hover{transform:scale(1.05);}
    .navbar-logo-placeholder{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:var(--white);cursor:pointer;font-weight:bold;}
    .menu-btn{background:var(--deep-blue);border:2px solid var(--white);width:70px;height:70px;border-radius:20px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px;cursor:pointer;transition:all 0.3s;}
    .menu-btn span{width:32px;height:4px;background:var(--white);border-radius:4px;transition:all 0.3s;}
    .menu-btn:hover{background:var(--valentino);transform:rotate(90deg);}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:199;display:none;backdrop-filter:blur(3px);}
    .overlay.active{display:block;}
    .side-menu{position:fixed;top:0;right:-360px;width:360px;height:100%;background:rgba(54,13,58,0.98);backdrop-filter:blur(20px);border-left:2px solid var(--razzmatazz);z-index:200;padding:40px 28px;transition:right 0.35s cubic-bezier(.4,0,.2,1);}
    .side-menu.active{right:0;}
    .close-menu{text-align:right;font-size:2.8rem;cursor:pointer;color:var(--white);margin-bottom:40px;line-height:1;transition:color 0.2s;}
    .close-menu:hover{color:var(--razzmatazz);}
    .menu-item{padding:20px 28px;margin:12px 0;border:1px solid rgba(233,0,82,0.3);border-radius:20px;cursor:pointer;font-weight:600;font-size:1.5rem;color:var(--white);transition:all 0.2s;}
    .menu-item:hover{background:var(--razzmatazz);border-color:var(--white);transform:translateX(8px);}
    .slideshow-wrapper{padding:36px 36px 20px;display:flex;flex-direction:column;align-items:center;animation:fadeIn 0.7s ease 0.2s both;}
    .slideshow-frame{width:100%;max-width:1100px;border-radius:32px;overflow:hidden;box-shadow:0 8px 40px rgba(150,60,255,0.25);border:2px solid var(--razzmatazz);background:#000;display:flex;justify-content:center;align-items:center;}
    .slideshow-img{width:100%;height:auto;max-height:520px;object-fit:contain;display:block;transition:opacity 0.5s ease;}
    .dots-container{margin-top:20px;display:flex;gap:12px;}
    .dot{width:14px;height:14px;border-radius:50%;background:rgba(233,0,82,0.3);cursor:pointer;transition:all 0.25s;}
    .dot.active{background:var(--razzmatazz);transform:scale(1.4);box-shadow:0 0 12px rgba(233,0,82,0.7);}
    .season-bar{display:flex;justify-content:center;margin:24px 0 16px;}
    .season-controls{display:flex;align-items:center;gap:20px;background:var(--turquoise);padding:12px 32px;border-radius:80px;backdrop-filter:blur(8px);}
    .season-arrow{background:transparent;border:none;width:56px;height:56px;border-radius:50%;font-size:2rem;cursor:pointer;font-weight:bold;transition:all 0.2s;line-height:1;display:flex;align-items:center;justify-content:center;color:white;}
    #prevSeasonBtn{background:var(--razzmatazz);}
    #prevSeasonBtn:hover:not(:disabled){background:#b8003f;transform:scale(1.1);}
    #nextSeasonBtn{background:var(--violet);}
    #nextSeasonBtn:hover:not(:disabled){background:#7a2be0;transform:scale(1.1);}
    .season-arrow:disabled{opacity:0.3;cursor:not-allowed;}
    .season-number{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:#000;min-width:180px;text-align:center;background:rgba(255,255,255,0.8);padding:4px 16px;border-radius:40px;}
    .season-admin-btns{display:flex;gap:10px;margin-left:10px;}
    .season-admin-btn{background:rgba(150,60,255,0.15);border:1px solid var(--razzmatazz);padding:8px 20px;border-radius:40px;font-weight:600;cursor:pointer;color:var(--white);font-size:1.1rem;transition:all 0.2s;}
    .season-admin-btn:hover{background:var(--razzmatazz);}
    .tabs-container{display:flex;flex-direction:column;align-items:center;gap:10px;margin:28px 36px 0;background:linear-gradient(90deg,var(--razzmatazz),var(--violet));border:2px solid var(--white);border-radius:80px;padding:12px 20px;backdrop-filter:blur(8px);max-width:1100px;margin-left:auto;margin-right:auto;animation:fadeInUp 0.5s ease 0.3s both;}
    .tabs-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
    .tab-btn{background:transparent;border:none;font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;padding:10px 28px;cursor:pointer;color:rgba(255,255,255,0.7);border-radius:60px;letter-spacing:0.5px;transition:all 0.25s;white-space:nowrap;}
    .tab-btn.active{background:var(--violet);color:#000;}
    .tab-btn:hover:not(.active){color:var(--white);background:rgba(255,255,255,0.2);}
    .content-card{margin:24px 36px 40px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);border:1px solid rgba(150,60,255,0.25);border-radius:32px;padding:32px;min-height:200px;animation:fadeInUp 0.5s ease 0.4s both;}
    .loading-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:24px;}
    .spinner{width:60px;height:60px;border:5px solid rgba(233,0,82,0.2);border-top-color:var(--razzmatazz);border-radius:50%;animation:spin 0.8s linear infinite;}
    .loading-spinner span{color:rgba(255,255,255,0.6);font-size:1.4rem;}
    .btn-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle;}
    .empty-state{text-align:center;padding:80px 20px;color:rgba(255,255,255,0.4);}
    .empty-state .empty-icon{font-size:5rem;margin-bottom:20px;}
    .empty-state p{font-size:2rem;font-weight:500;}
    .table-scroll-wrap{overflow-x:auto;border-radius:20px;position:relative;}
    .stats-table{width:100%;border-collapse:collapse;font-family:'Rajdhani',sans-serif;min-width:900px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);color:var(--white);}
    .stats-table thead th{background:rgba(150,60,255,0.3);color:var(--white);font-size:1.3rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:16px 18px;border-bottom:2px solid var(--razzmatazz);white-space:nowrap;z-index:20;}
    .stats-table th:first-child,.stats-table td:first-child{position:sticky;left:0;z-index:25;background:var(--glass-bg);backdrop-filter:var(--glass-blur);width:64px;min-width:64px;}
    .stats-table thead th:first-child{background:rgba(150,60,255,0.3);z-index:30;}
    .stats-table th:nth-child(2),.stats-table td:nth-child(2){position:sticky;left:64px;z-index:24;background:var(--glass-bg);backdrop-filter:var(--glass-blur);box-shadow:4px 0 8px -2px rgba(0,0,0,0.45);border-right:2px solid rgba(233,0,82,0.35);}
    .stats-table thead th:nth-child(2){background:rgba(150,60,255,0.3);z-index:30;}
    .stats-table tbody tr{border-bottom:1px solid rgba(233,0,82,0.2);transition:background 0.2s;}
    .stats-table tbody tr:hover{background:rgba(150,60,255,0.15);}
    .stats-table td{padding:14px 18px;color:var(--white);font-size:1.3rem;font-weight:600;white-space:nowrap;}
    .stats-table td.stat-number{font-size:2.6rem !important;font-weight:800;line-height:1.2;}
    .team-name-text{font-weight:700;font-size:2.8rem !important;color:var(--white);}
    .pts-cell{font-weight:800;color:var(--white);font-size:1.5rem;}
    .rank-cell{font-weight:700;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:1.6rem;}
    .table-actions{display:flex;justify-content:flex-end;gap:12px;padding:14px 18px;background:rgba(150,60,255,0.3);border-radius:20px 20px 0 0;border:2px solid rgba(233,0,82,0.2);border-bottom:3px solid var(--razzmatazz);align-items:center;}
    .table-actions-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--white);letter-spacing:2px;flex:1;display:flex;align-items:center;}
    .table-header-img{max-height:60px;max-width:260px;object-fit:contain;}
    .add-btn,.btn-sm{font-family:'Rajdhani',sans-serif;font-weight:700;border-radius:40px;cursor:pointer;transition:all 0.2s;}
    .add-btn{background:rgba(255,255,255,0.15);border:2px solid var(--razzmatazz);color:var(--white);font-size:1.2rem;padding:10px 24px;}
    .add-btn:hover{background:var(--razzmatazz);}
    .three-dot-btn{background:rgba(255,255,255,0.15);border:2px solid var(--razzmatazz);color:var(--white);font-size:2.2rem;width:52px;height:52px;border-radius:50%;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
    .three-dot-btn:hover{background:var(--razzmatazz);}
    .scan-img-btn{background:rgba(0,206,209,0.2);border:2px solid var(--turquoise);color:var(--white);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.2rem;padding:10px 24px;border-radius:40px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;}
    .scan-img-btn:hover{background:var(--turquoise);color:#000;transform:translateY(-2px);}
    .stats-list{width:100%;border-collapse:collapse;font-family:'Rajdhani',sans-serif;background:var(--glass-bg);backdrop-filter:var(--glass-blur);color:var(--white);}
    .stats-list thead th{background:rgba(150,60,255,0.3);color:var(--white);font-size:1.4rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:18px 22px;border-bottom:2px solid var(--razzmatazz);}
    .stats-list tbody tr{border-bottom:1px solid rgba(233,0,82,0.2);transition:background 0.2s;}
    .stats-list tbody tr:hover{background:rgba(150,60,255,0.15);}
    .stats-list td{padding:18px 22px;color:var(--white);font-size:1.4rem;font-weight:600;}
    .stats-list td:first-child{color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:2rem;font-weight:bold;}
    .count-badge{background:rgba(0,0,0,0.5);border:1px solid var(--razzmatazz);color:var(--white);padding:6px 22px;border-radius:50px;font-weight:700;font-size:1.4rem;}
    .stat-team-cell{display:flex;align-items:center;gap:16px;color:var(--white);}
    .top3-container{display:flex;justify-content:center;gap:0;margin-bottom:40px;flex-wrap:nowrap;width:100%;}
    .top3-block{position:relative;text-align:center;flex:1;background:rgba(150,60,255,0.2);border-radius:0;padding:0;transition:transform 0.3s;margin:0;min-width:0;}
    .top3-block:first-child{border-top-left-radius:32px;border-bottom-left-radius:32px;}
    .top3-block:last-child{border-top-right-radius:32px;border-bottom-right-radius:32px;}
    .top3-block:hover{transform:translateY(-8px);z-index:5;}
    .player-image-wrapper{position:relative;width:100%;aspect-ratio:1 / 1;overflow:hidden;border:3px solid var(--razzmatazz);background:var(--deep-blue);margin:0;border-radius:0;}
    .top3-block:first-child .player-image-wrapper{border-top-left-radius:32px;border-bottom-left-radius:32px;}
    .top3-block:last-child .player-image-wrapper{border-top-right-radius:32px;border-bottom-right-radius:32px;}
    .player-img{width:100%;height:100%;object-fit:cover;}
    .medal-badge{position:absolute;top:12px;left:12px;font-size:3rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));z-index:2;}
    .edit-block-btn{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);border:1px solid var(--razzmatazz);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.6rem;color:var(--white);transition:all 0.2s;z-index:3;}
    .edit-block-btn:hover{background:var(--razzmatazz);transform:scale(1.1);}
    .player-name-overlay{position:absolute;bottom:16px;left:16px;background:linear-gradient(90deg,rgba(0,0,0,0.7),rgba(0,0,0,0.3));color:white;font-family:'Rajdhani',sans-serif;font-weight:800;font-size:1.6rem;padding:6px 16px;border-radius:40px;backdrop-filter:blur(4px);z-index:2;letter-spacing:0.5px;border-left:3px solid var(--razzmatazz);pointer-events:none;}
    .team-icon-overlay{position:absolute;bottom:12px;right:12px;width:56px;height:56px;background:rgba(0,0,0,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:6px;z-index:2;}
    .team-icon-overlay img{width:100%;height:100%;object-fit:contain;}
    .top3-count{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--razzmatazz);background:rgba(0,0,0,0.3);display:inline-block;padding:8px 20px;border-radius:60px;letter-spacing:2px;margin-top:12px;margin-bottom:16px;}
    .rest-table-wrapper{margin-top:20px;border-top:2px solid var(--razzmatazz);padding-top:24px;overflow-x:auto;}
    .filters-bar{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end;margin-bottom:30px;padding:20px;background:rgba(150,60,255,0.2);border-radius:28px;}
    .filter-group{display:flex;flex-direction:column;gap:8px;}
    .filter-group label{font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.6);}
    .filter-group select,.filter-group button{background:rgba(54,13,58,0.8);border:1px solid var(--razzmatazz);border-radius:40px;padding:12px 20px;font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:600;color:var(--white);cursor:pointer;transition:all 0.2s;}
    .filter-group select:hover,.filter-group button:hover{background:var(--razzmatazz);border-color:var(--white);}
    .clear-filters{background:rgba(233,0,82,0.2);}
    .filter-stats{font-size:1rem;color:rgba(255,255,255,0.5);margin-left:auto;align-self:center;}
    .view-calendar-btn{background:rgba(233,0,82,0.15);border:2px solid var(--razzmatazz);color:var(--white);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.2rem;padding:12px 28px;border-radius:40px;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:8px;white-space:nowrap;text-decoration:none;}
    .view-calendar-btn:hover{background:var(--razzmatazz);transform:translateY(-2px);}
    .fixture-date-group{margin-bottom:32px;animation:cardSlideIn 0.4s ease both;}
    .fixture-date-label{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;color:var(--white);margin-bottom:14px;padding:10px 20px;background:rgba(233,0,82,0.2);border-radius:50px;border-left:4px solid var(--razzmatazz);display:inline-block;}
    .fixture-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);border-radius:28px;padding:28px 40px;margin-bottom:16px;transition:all 0.25s;animation:cardSlideIn 0.4s ease both;border:1px solid rgba(150,60,255,0.3);}
    .fixture-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(233,0,82,0.35);}
    .fixture-tournament-label{font-size:1rem;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
    .fixture-match-row{display:flex;align-items:center;justify-content:space-between;gap:24px;}
    .fixture-team-side{display:flex;flex-direction:column;align-items:center;gap:12px;flex:1;text-align:center;}
    .fixture-team-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2.2rem;color:var(--white);}
    .fixture-vs{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--white);letter-spacing:4px;flex-shrink:0;opacity:0.6;}
    .matches-list{display:flex;flex-direction:column;gap:24px;}
    .match-card{background:var(--glass-bg);backdrop-filter:var(--glass-blur);border-radius:28px;padding:32px 48px;transition:all 0.25s;animation:cardSlideIn 0.4s ease both;border:1px solid rgba(150,60,255,0.3);}
    .match-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(233,0,82,0.35);}
    .match-row{display:flex;align-items:center;justify-content:space-between;gap:32px;}
    .team-side{display:flex;flex-direction:column;align-items:center;gap:16px;flex:1;text-align:center;}
    .team-name-big{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2.8rem;color:var(--white);letter-spacing:0.3px;}
    .match-center{display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;min-width:180px;}
    .score-display{font-family:'Bebas Neue',sans-serif;font-size:4.5rem;color:var(--white);letter-spacing:6px;background:rgba(0,0,0,0.3);padding:14px 42px;border-radius:80px;border:2px solid rgba(233,0,82,0.3);}
    .forfeit-display{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:#ffaaaa;letter-spacing:4px;background:rgba(0,0,0,0.5);padding:12px 28px;border-radius:60px;border:2px solid #ffaaaa;}
    .aggregate-text{font-size:1.6rem;color:rgba(255,255,255,0.7);}
    .goal-scorers{margin-top:12px;}
    .goal-scorer-item{display:inline-block;background:rgba(0,0,0,0.4);border:1px solid rgba(233,0,82,0.5);padding:5px 14px;border-radius:30px;margin:3px;font-size:1.2rem;color:var(--white);}
    .match-meta{display:flex;gap:16px;flex-wrap:wrap;margin-top:24px;justify-content:center;}
    .meta-tag{font-size:1.4rem;font-weight:500;color:var(--white);background:rgba(0,0,0,0.3);padding:10px 24px;border-radius:50px;border:1px solid rgba(233,0,82,0.3);font-family:'Inter',sans-serif;}
    .admin-row{display:flex;gap:16px;justify-content:flex-end;margin-top:24px;}
    .btn-sm{font-size:1.5rem;padding:12px 32px;border:none;letter-spacing:1px;}
    .btn-edit{background:rgba(150,60,255,0.3);color:var(--white);border:1px solid var(--razzmatazz);}
    .btn-edit:hover{background:var(--razzmatazz);}
    .btn-delete{background:rgba(100,0,0,0.3);color:#ffaaaa;border:1px solid rgba(220,50,50,0.3);}
    .btn-delete:hover{background:#cc3333;color:white;}
    .add-btn-main{display:inline-flex;align-items:center;gap:14px;background:rgba(150,60,255,0.3);border:2px solid var(--razzmatazz);color:var(--white);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2rem;padding:20px 56px;border-radius:100px;cursor:pointer;margin-top:40px;transition:all 0.2s;letter-spacing:1px;}
    .add-btn-main:hover{background:var(--razzmatazz);transform:translateY(-3px);box-shadow:0 12px 40px rgba(233,0,82,0.4);}
    .add-result-top-btn{display:inline-flex;align-items:center;gap:10px;background:var(--razzmatazz);border:2px solid var(--razzmatazz);color:var(--white);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.2rem;padding:12px 28px;border-radius:40px;cursor:pointer;transition:all 0.2s;letter-spacing:1px;white-space:nowrap;}
    .add-result-top-btn:hover{background:#b8003f;transform:translateY(-2px);}
    .inline-media{width:100%;border-radius:32px;overflow:hidden;background:#000;}
