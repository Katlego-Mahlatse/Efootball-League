<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin · Premier League</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      color: #f5f0ff;
      padding-bottom: 2rem;
    }
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .debug-btn, .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn { flex-direction: column; gap: 4px; }
    .hamburger-btn span { width: 18px; height: 2.5px; background: #f5d742; border-radius: 2px; }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
    }
    .modal-overlay.active { visibility: visible; pointer-events: auto; }
    .modal-content, .debug-modal {
      position: absolute;
      top: 60px;
      right: 20px;
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 1.2rem;
      padding: 1rem;
      min-width: 200px;
    }
    .debug-modal { left: 20px; right: auto; }
    .modal-option {
      background: rgba(106,59,181,0.3);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #f5d742;
      font-weight: 700;
      font-size: 0.8rem;
      display: block;
      margin: 0.5rem 0;
      border: 1px solid #f5d742;
      cursor: pointer;
    }
    .close-modal {
      background: #6a3bb5;
      color: #f5d742;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      cursor: pointer;
    }
    .dashboard { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
    .slideshow-container { text-align: center; margin-bottom: 2rem; }
    .slideshow-img { max-width: 100%; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .dots-container { margin-top: 0.8rem; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f5d742; margin: 0 4px; cursor: pointer; }
    .dot.active { background: #6a3bb5; }
    .card {
      background: rgba(45,25,75,0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245,215,66,0.4);
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .card-header {
      padding: 1rem 1.5rem;
      background: rgba(30,15,55,0.9);
      border-bottom: 2px solid #f5d742;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .card-header-left { display: flex; align-items: center; gap: 1rem; }
    .card-header-left h2 { font-size: 1.4rem; }
    .toggle-icon { font-size: 1.2rem; color: #f5d742; margin-left: 1rem; }
    .add-btn {
      background: #6a3bb5;
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      color: #f5d742;
      font-weight: bold;
      cursor: pointer;
    }
    .three-dot-menu {
      background: none;
      border: none;
      color: #f5d742;
      font-size: 1.8rem;
      cursor: pointer;
      padding: 0 0.5rem;
    }
    .card-content { transition: max-height 0.4s ease; max-height: 2000px; overflow: hidden; }
    .card-content.collapsed { max-height: 0; }
    .filter-container { padding: 1rem; background: rgba(30,15,55,0.6); border-bottom: 1px solid rgba(245,215,66,0.3); }
    .filter-input { background: rgba(45,25,75,0.9); border: 1px solid #f5d742; border-radius: 30px; padding: 0.5rem 1rem; color: white; width: 220px; }
    .scrollable-table { max-height: 450px; overflow-y: auto; }
    .stats-table, .inner-table { width: 100%; border-collapse: collapse; }
    .stats-table th, .inner-table th { text-align: left; padding: 0.8rem; background: rgba(55,35,95,0.7); border-bottom: 1px solid #f5d742; }
    .stats-table td, .inner-table td { padding: 0.6rem 0.8rem; border-bottom: 1px solid rgba(245,215,66,0.2); }
    .team-icon-sm { width: 30px; height: 30px; object-fit: contain; vertical-align: middle; margin-right: 8px; }
    .team-icon { width: 40px; height: 40px; object-fit: contain; vertical-align: middle; margin-right: 8px; }
    .rank-cell { font-weight: 700; width: 60px; }
    .pos-with-bar { display: flex; align-items: center; gap: 6px; }
    .vertical-bar { width: 4px; height: 18px; border-radius: 2px; }
    .blue-bar-vertical { background: #3b82f6; }
    .orange-bar-vertical { background: #f97316; }
    .green-bar-vertical { background: #22c55e; }
    .dashed-separator-gold { border-bottom: 2px dashed #d4af37 !important; }
    .dashed-separator-white { border-bottom: 2px dashed #ffffff !important; }
    .dashed-separator-red { border-bottom: 2px dashed #ef4444 !important; }
    .pts-cell { font-weight: 800; color: #f5d742; text-align: center; }
    .form-circles { display: flex; gap: 4px; align-items: center; }
    .circle-result { width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
    .circle-win { background: #22c55e; color: white; }
    .circle-loss { background: #ef4444; color: white; }
    .circle-draw { background: #6b7280; color: white; }
    .circle-forfeit-win { background: #22c55e; color: white; }
    .circle-forfeit-loss { background: #ef4444; color: white; }
    .circle-forfeit-grey { background: #6b7280; color: white; }
    .circle-blank { background: transparent; border: 1px solid #a0a0a0; }
    .arrow-up { color: #22c55e; font-size: 1.2rem; display: inline-block; width: 24px; text-align: center; }
    .arrow-down { color: #ef4444; font-size: 1.2rem; display: inline-block; width: 24px; text-align: center; }
    .arrow-side { color: #f5d742; font-size: 1.2rem; display: inline-block; width: 24px; text-align: center; }
    .legend-under-table { margin-top: 1rem; padding: 0.8rem 1.2rem; background: rgba(30,15,55,0.5); border-radius: 1rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; font-size: 0.7rem; }
    .legend-item { display: inline-flex; align-items: center; gap: 6px; }
    .legend-vertical-bar { width: 4px; height: 16px; border-radius: 2px; }
    .legend-blue { background: #3b82f6; }
    .legend-orange { background: #f97316; }
    .legend-green { background: #22c55e; }
    .legend-dashed-white { display: inline-block; width: 20px; height: 2px; border-bottom: 2px dashed #ffffff; vertical-align: middle; }
    .forfeit-text { font-size: 0.7rem; color: #f5d742; margin-top: 4px; }
    .edit-btn, .delete-btn { background: none; border: none; color: #f5d742; margin: 0 0.3rem; cursor: pointer; font-size: 1rem; }
    .form-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center; visibility: hidden; z-index: 300;
    }
    .form-overlay.active { visibility: visible; }
    .form-card { background: linear-gradient(135deg, #2d1b4e, #1f0f3a); border: 2px solid #f5d742; border-radius: 2rem; padding: 1.5rem; width: 90%; max-width: 500px; }
    .form-card input, .form-card select { width: 100%; padding: 0.5rem; margin: 0.5rem 0; background: rgba(30,15,55,0.8); border: 1px solid #f5d742; border-radius: 2rem; color: white; }
    .form-card button { background: #6a3bb5; border: none; border-radius: 2rem; padding: 0.5rem 1rem; color: white; margin-top: 1rem; cursor: pointer; }
    @media (max-width: 780px) {
      .dashboard { padding: 1rem; }
      .stats-table th, .stats-table td { padding: 0.4rem; font-size: 0.75rem; }
      .circle-result { width: 14px; height: 14px; font-size: 7px; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div style="display: flex; gap: 0.5rem;">
    <div class="debug-btn" id="debugBtn">🐞</div>
    <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
  </div>
</div>

<div id="debugModal" class="modal-overlay" style="z-index:250;"><div class="debug-modal"><h3>Debug</h3><div id="debugContent">Loading...</div><button id="closeDebugBtn">Close</button></div></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal-content"><h3>TOURNAMENTS</h3><div class="modal-option" id="rulesBtn">RULES</div><div class="modal-option" id="playerTitlesBtn">PLAYER TITLES</div><div class="modal-option" id="logoutBtn">LOGOUT</div><button class="close-modal" id="closeModalBtn">CLOSE</button></div></div>

<div class="dashboard">
  <div class="slideshow-container"><img id="slideshow-img" class="slideshow-img" src="images - 2026-04-19T121231.816.jpeg"><div class="dots-container" id="dotsContainer"></div></div>

  <div class="card">
    <div class="card-header" style="cursor:default;">
      <div class="card-header-left"><h2>🏆 PREMIER LEAGUE TABLE</h2><button class="add-btn" id="addTeamBtn">+ Add Team</button></div>
      <button class="three-dot-menu" id="threeDotBtn">⋮</button>
    </div>
    <div class="card-content">
      <div class="scrollable-table"><table class="stats-table" id="leagueTable"><thead><tr><th>Pos</th><th>Club</th><th>P</th><th>GD</th><th>Pts</th><th>Last 5</th><th>Actions</th></tr></thead><tbody id="tableBody"></tbody></table></div>
      <div class="legend-under-table"><div style="display:flex; flex-wrap:wrap; gap:1.5rem; justify-content:center;"><span class="legend-item"><span class="legend-vertical-bar legend-blue"></span><span>UCL</span></span><span class="legend-item"><span class="legend-vertical-bar legend-orange"></span><span>UEL</span></span><span class="legend-item"><span class="legend-vertical-bar legend-green"></span><span>UECL</span></span><span class="legend-item"><span class="legend-dashed-white"></span><span>FIFA CWC</span></span></div></div>
    </div>
  </div>

  <div class="card"><div class="card-header" id="fixturesHeader"><div class="card-header-left"><h2>📅 FIXTURES</h2><button class="add-btn" id="addFixtureBtn">+ Add Fixture</button></div><div class="toggle-icon" id="fixturesToggleIcon">▼</div></div>
  <div class="card-content" id="fixturesContent"><div class="filter-container"><input type="text" id="fixtureSearch" class="filter-input" placeholder="🔍 Search team..."></div><div class="scrollable-table"><table class="inner-table"><thead><tr><th>Date</th><th>Home vs Away</th><th>Matchday</th></tr></thead><tbody id="fixturesBody"></tbody></table></div></div></div>

  <div class="card"><div class="card-header" id="resultsHeader"><div class="card-header-left"><h2>📝 RESULTS</h2><button class="add-btn" id="addResultBtn">+ Add Result</button></div><div class="toggle-icon" id="resultsToggleIcon">▼</div></div>
  <div class="card-content" id="resultsContent"><div class="scrollable-table"><table class="inner-table"><thead><tr><th>Match</th><th>Match Day</th></tr></thead><tbody id="resultsBody"></tbody></table></div></div></div>
</div>

<!-- CRUD Forms (exactly as original) -->
<div id="teamForm" class="form-overlay"><div class="form-card"><h3>Add/Edit Team</h3><select id="teamNameSelect"></select><input type="number" id="teamP" placeholder="Played"><input type="number" id="teamGD" placeholder="Goal Difference"><input type="number" id="teamPts" placeholder="Points"><button id="saveTeamBtn">Save</button><button id="cancelTeamBtn">Cancel</button></div></div>
<div id="fixtureForm" class="form-overlay"><div class="form-card"><h3>Add/Edit Fixture</h3><input type="text" id="fixtureDate" placeholder="Date (e.g., Apr 28)"><select id="fixtureHome"></select><select id="fixtureAway"></select><input type="number" id="fixtureMd" placeholder="Matchday"><button id="saveFixtureBtn">Save</button><button id="cancelFixtureBtn">Cancel</button></div></div>
<div id="resultForm" class="form-overlay"><div class="form-card"><h3>Add/Edit Result</h3><input type="text" id="resultText" placeholder="Match text (e.g., Real Madrid 3 - 2 Arsenal)"><input type="number" id="resultMd" placeholder="Matchday"><button id="saveResultBtn">Save</button><button id="cancelResultBtn">Cancel</button></div></div>

<script type="importmap">
  { "imports": { "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js", "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js", "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js" } }
</script>
<script type="module">
  import { initializeApp } from "firebase/app";
  import { getDatabase, ref, set, onValue, push, remove } from "firebase/database";
  import { getAuth, signOut } from "firebase/auth";

  const firebaseConfig = { apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4", authDomain: "efootball-412.firebaseapp.com", databaseURL: "https://efootball-412-default-rtdb.firebaseio.com", projectId: "efootball-412", storageBucket: "efootball-412.firebasestorage.app", messagingSenderId: "596548424249", appId: "1:596548424249:web:4349f6e87a40a1590bf3e8" };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // Team Icons
  const teamIcons = { "Arsenal":"b688ae57-b21a-4ee9-ba6c-5027a09cc9c5.png","AC Milan":"44e0f58a-e5db-445b-9896-db22ea99b936.png","PSG":"4dea795d-a516-46ae-bd34-07a784693d80.png","Barcelona":"IMG_20260421_085117.jpg","Inter Milan":"IMG_20260421_092951.png","Atletico":"IMG_20260421_093024.png","Newcastle":"IMG_20260421_093046.png","Napoli":"IMG_20260421_100318.jpg","Chelsea":"IMG_20260421_100354.jpg","Dortmund":"01cf2986-d9d6-4a33-830d-5d12de4e21b2.jpeg","Real Madrid":"21259ea4-042f-48ff-902f-1e776d27fe58.jpeg","Man City":"9e92a100-327b-48fc-96d4-e4c89f69d7ef.jpeg","Liverpool":"269acb36-d189-45ea-860d-ea8f1cf05f05.jpeg","Juventus":"IMG_20260421_151224.jpg" };
  const teamList = Object.keys(teamIcons);
  function getTeamIconHtml(team, cls="team-icon-sm") { const src=teamIcons[team]; return src ? `<img class="${cls}" src="${src}">` : team; }

  // Last5 & arrow logic from Firebase results
  let allResultsCache = [];
  onValue(ref(db, 'premier_league/results'), (snap) => { allResultsCache = snap.val() ? Object.values(snap.val()) : []; renderLeagueTable(); });
  function getResultStatusForTeam(team, resultText) {
    const lower = resultText.toLowerCase();
    if (lower.includes("no contest") || lower.includes("f - f")) return "F";
    const isForfeit = lower.includes("forfeit") || lower.includes("forfeited");
    const parts = resultText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/);
    if (parts) {
      let home = parts[1].trim(), homeScore = parseInt(parts[2]), awayScore = parseInt(parts[3]), away = parts[4].trim();
      if (home === team && homeScore > awayScore) return isForfeit ? "WF" : "W";
      if (home === team && homeScore < awayScore) return isForfeit ? "LF" : "L";
      if (away === team && awayScore > homeScore) return isForfeit ? "WF" : "W";
      if (away === team && awayScore < homeScore) return isForfeit ? "LF" : "L";
      if ((home === team || away === team) && homeScore === awayScore) return "D";
    }
    if (resultText.includes(`${team} `) && isForfeit) {
      if (lower.includes("win")) return "WF";
      if (lower.includes("loss")) return "LF";
    }
    return null;
  }
  function getTeamLast5(team) {
    const teamResults = allResultsCache.filter(r => r.matchText.includes(team)).sort((a,b) => (b.md||0) - (a.md||0));
    const last5Status = teamResults.slice(0,5).map(r => getResultStatusForTeam(team, r.matchText)).filter(s => s);
    while(last5Status.length < 5) last5Status.push(null);
    return last5Status.reverse();
  }
  function getLatestArrow(team) {
    const teamResults = allResultsCache.filter(r => r.matchText.includes(team)).sort((a,b) => (b.md||0) - (a.md||0));
    if(teamResults.length === 0) return null;
    const status = getResultStatusForTeam(team, teamResults[0].matchText);
    if(status === "W" || status === "WF") return "↑";
    if(status === "L" || status === "LF") return "↓";
    if(status === "D") return "→";
    if(status === "F") return "⚪";
    return null;
  }

  // League Table CRUD + render
  let teamsData = [];
  let editingTeamKey = null;
  function renderLeagueTable() {
    const tbody = document.getElementById('tableBody'); if(!tbody) return;
    tbody.innerHTML = '';
    const sorted = [...teamsData].sort((a,b) => b.pts - a.pts || b.gd - a.gd);
    sorted.forEach((team, idx) => {
      const row = tbody.insertRow();
      const pos = idx+1;
      let barClass = "";
      if(pos <=4) barClass = "blue-bar-vertical";
      else if(pos <=8) barClass = "orange-bar-vertical";
      else if(pos <=12) barClass = "green-bar-vertical";
      if(pos ===1) row.classList.add("dashed-separator-gold");
      else if(pos ===8) row.classList.add("dashed-separator-white");
      else if(pos ===12) row.classList.add("dashed-separator-red");
      const posCell = row.insertCell(0);
      posCell.className = "rank-cell";
      if(barClass) posCell.innerHTML = `<div class="pos-with-bar"><span class="vertical-bar ${barClass}"></span>${pos}</div>`;
      else posCell.innerText = pos;
      const arrowSpan = document.getElementById('showFormArrows')?.checked ? `<span class="arrow-${getLatestArrow(team.name) === '↑' ? 'up' : (getLatestArrow(team.name) === '↓' ? 'down' : (getLatestArrow(team.name) === '→' ? 'side' : ''))}">${getLatestArrow(team.name) || '—'}</span> ` : '';
      const displayName = document.getElementById('showPlayerNames')?.checked ? (playerMap[team.name] || team.name) : team.name;
      row.insertCell(1).innerHTML = `<div class="team-name">${arrowSpan}${getTeamIconHtml(team.name, "team-icon")} ${displayName}</div>`;
      row.insertCell(2).innerText = team.p || 0;
      row.insertCell(3).innerText = team.gd || 0;
      row.insertCell(4).innerHTML = `<span class="pts-cell">${team.pts || 0}</span>`;
      const last5Cell = row.insertCell(5);
      if(document.getElementById('showLast5')?.checked) {
        const last5 = getTeamLast5(team.name);
        const container = document.createElement("div"); container.className = "form-circles";
        last5.forEach(res => { const circle=document.createElement("span"); circle.className="circle-result";
          if(res==="W" || res==="WF") circle.classList.add(res==="WF"?"circle-forfeit-win":"circle-win");
          else if(res==="L"||res==="LF") circle.classList.add(res==="LF"?"circle-forfeit-loss":"circle-loss");
          else if(res==="D") circle.classList.add("circle-draw");
          else if(res==="F") circle.classList.add("circle-forfeit-grey");
          else circle.classList.add("circle-blank");
          circle.innerHTML = (res==="WF"||res==="LF"||res==="F")?"F":(res==="W"?"✓":(res==="L"?"✗":(res==="D"?"–":"")));
          container.appendChild(circle);
        });
        last5Cell.appendChild(container);
      }
      const actions = row.insertCell(6);
      const editBtn = document.createElement('button'); editBtn.innerText='✏️'; editBtn.className='edit-btn'; editBtn.onclick=()=>openTeamForm(team.key,team);
      const delBtn = document.createElement('button'); delBtn.innerText='🗑️'; delBtn.className='delete-btn'; delBtn.onclick=async()=>{ await remove(ref(db,`premier_league/table/${team.key}`)); };
      actions.appendChild(editBtn); actions.appendChild(delBtn);
    });
  }
  onValue(ref(db,'premier_league/table'), (snap) => { teamsData = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : []; renderLeagueTable(); });
  function openTeamForm(key,data){ editingTeamKey=key; const sel=document.getElementById('teamNameSelect'); sel.innerHTML=teamList.map(t=>`<option value="${t}">${t}</option>`).join(''); if(data?.name) sel.value=data.name; document.getElementById('teamP').value=data?.p||''; document.getElementById('teamGD').value=data?.gd||''; document.getElementById('teamPts').value=data?.pts||''; document.getElementById('teamForm').classList.add('active'); }
  document.getElementById('addTeamBtn').onclick=()=>openTeamForm(null); document.getElementById('saveTeamBtn').onclick=async()=>{ const name=document.getElementById('teamNameSelect').value; const p=parseInt(document.getElementById('teamP').value)||0; const gd=parseInt(document.getElementById('teamGD').value)||0; const pts=parseInt(document.getElementById('teamPts').value)||0; if(!name) return; if(editingTeamKey) await set(ref(db,`premier_league/table/${editingTeamKey}`),{name,p,gd,pts}); else await set(push(ref(db,'premier_league/table')),{name,p,gd,pts}); document.getElementById('teamForm').classList.remove('active'); }; document.getElementById('cancelTeamBtn').onclick=()=>document.getElementById('teamForm').classList.remove('active');

  // Fixtures CRUD
  let fixturesData = []; let editingFixtureKey=null;
  function renderFixtures(){ const search=document.getElementById('fixtureSearch')?.value.toLowerCase()||''; const tbody=document.getElementById('fixturesBody'); tbody.innerHTML=''; fixturesData.forEach(f=>{ if(search && !f.home.toLowerCase().includes(search) && !f.away.toLowerCase().includes(search)) return; const row=tbody.insertRow(); row.insertCell(0).innerHTML=`<span class="date-badge">${f.date||''}</span>`; row.insertCell(1).innerHTML=`<div>${getTeamIconHtml(f.home)} ${f.home} vs ${getTeamIconHtml(f.away)} ${f.away}</div>`; row.insertCell(2).innerHTML=`<span style="background:#5e3a9e; padding:0.2rem 0.7rem; border-radius:30px;">MD ${f.md}</span>`; }); }
  onValue(ref(db,'premier_league/fixtures'), (snap)=>{ fixturesData = snap.val() ? Object.values(snap.val()) : []; renderFixtures(); });
  function openFixtureForm(key,data){ editingFixtureKey=key; document.getElementById('fixtureDate').value=data?.date||''; const homeSel=document.getElementById('fixtureHome'), awaySel=document.getElementById('fixtureAway'); homeSel.innerHTML=teamList.map(t=>`<option value="${t}">${t}</option>`); awaySel.innerHTML=teamList.map(t=>`<option value="${t}">${t}</option>`); if(data?.home) homeSel.value=data.home; if(data?.away) awaySel.value=data.away; document.getElementById('fixtureMd').value=data?.md||''; document.getElementById('fixtureForm').classList.add('active'); }
  document.getElementById('addFixtureBtn').onclick=()=>openFixtureForm(null); document.getElementById('saveFixtureBtn').onclick=async()=>{ const date=document.getElementById('fixtureDate').value; const home=document.getElementById('fixtureHome').value; const away=document.getElementById('fixtureAway').value; const md=parseInt(document.getElementById('fixtureMd').value); if(!date||!home||!away||!md) return; if(editingFixtureKey) await set(ref(db,`premier_league/fixtures/${editingFixtureKey}`),{date,home,away,md}); else await set(push(ref(db,'premier_league/fixtures')),{date,home,away,md}); document.getElementById('fixtureForm').classList.remove('active'); }; document.getElementById('cancelFixtureBtn').onclick=()=>document.getElementById('fixtureForm').classList.remove('active'); document.getElementById('fixtureSearch')?.addEventListener('input', renderFixtures);

  // Results CRUD
  let resultsData = []; let editingResultKey=null;
  function renderResults(){ const tbody=document.getElementById('resultsBody'); tbody.innerHTML=''; resultsData.forEach(r=>{ let processed=r.matchText; teamList.forEach(team=>{ const regex=new RegExp(`\\b${team}\\b`,'g'); processed=processed.replace(regex,`${getTeamIconHtml(team,'inline-team-icon')} ${team}`); }); const row=tbody.insertRow(); const isForfeit = r.matchText.includes("Forfeit")||r.matchText.includes("No Contest")||r.matchText.includes("F - F"); if(isForfeit){ let forfeitText="Forfeit"; if(r.matchText.includes("No Contest")) forfeitText="No Contest"; row.insertCell(0).innerHTML=`<div><strong>${processed}</strong><div class="forfeit-text">${forfeitText}</div></div>`; } else row.insertCell(0).innerHTML=`<strong>${processed}</strong>`; row.insertCell(1).innerHTML=`<span class="match-highlight">MD${r.md}</span>`; const actions=row.insertCell(2); const editBtn=document.createElement('button'); editBtn.innerText='✏️'; editBtn.className='edit-btn'; editBtn.onclick=()=>openResultForm(r.key,r); const delBtn=document.createElement('button'); delBtn.innerText='🗑️'; delBtn.className='delete-btn'; delBtn.onclick=async()=>{ await remove(ref(db,`premier_league/results/${r.key}`)); }; actions.appendChild(editBtn); actions.appendChild(delBtn); }); }
  onValue(ref(db,'premier_league/results'), (snap)=>{ resultsData = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : []; renderResults(); });
  function openResultForm(key,data){ editingResultKey=key; document.getElementById('resultText').value=data?.matchText||''; document.getElementById('resultMd').value=data?.md||''; document.getElementById('resultForm').classList.add('active'); }
  document.getElementById('addResultBtn').onclick=()=>openResultForm(null); document.getElementById('saveResultBtn').onclick=async()=>{ const text=document.getElementById('resultText').value; const md=parseInt(document.getElementById('resultMd').value); if(!text||!md) return; if(editingResultKey) await set(ref(db,`premier_league/results/${editingResultKey}`),{matchText:text,md}); else await set(push(ref(db,'premier_league/results')),{matchText:text,md}); document.getElementById('resultForm').classList.remove('active'); }; document.getElementById('cancelResultBtn').onclick=()=>document.getElementById('resultForm').classList.remove('active');

  // Three-dot menu toggles
  let popup=null; const threeDot=document.getElementById('threeDotBtn'); function closePopup(){ if(popup){ popup.remove(); popup=null; } }
  threeDot.addEventListener('click',(e)=>{ e.stopPropagation(); if(popup){ closePopup(); return; } const rect=threeDot.getBoundingClientRect(); popup=document.createElement('div'); popup.className='popup-menu'; popup.style.position='absolute'; popup.style.top=(rect.bottom+window.scrollY+5)+'px'; popup.style.left=(rect.left+window.scrollX-60)+'px'; popup.style.background='linear-gradient(135deg,#2d1b4e,#1f0f3a)'; popup.style.border='1px solid #f5d742'; popup.style.borderRadius='1rem'; popup.style.padding='0.5rem 0'; popup.style.zIndex='150';
    const playersOpt=document.createElement('div'); playersOpt.innerText='Manager names'; playersOpt.style.padding='0.5rem 1rem'; playersOpt.style.cursor='pointer'; playersOpt.onclick=()=>{ const checkbox=document.getElementById('showPlayerNames'); if(checkbox) checkbox.checked=!checkbox.checked; renderLeagueTable(); closePopup(); };
    const formOpt=document.createElement('div'); formOpt.innerText='Show Form arrows'; formOpt.style.padding='0.5rem 1rem'; formOpt.onclick=()=>{ const cb=document.getElementById('showFormArrows'); if(cb) cb.checked=!cb.checked; renderLeagueTable(); closePopup(); };
    const last5Opt=document.createElement('div'); last5Opt.innerText='Show Last 5'; last5Opt.style.padding='0.5rem 1rem'; last5Opt.onclick=()=>{ const cb=document.getElementById('showLast5'); if(cb) cb.checked=!cb.checked; renderLeagueTable(); closePopup(); };
    const calendarOpt=document.createElement('div'); calendarOpt.innerText='Calendar'; calendarOpt.style.padding='0.5rem 1rem'; calendarOpt.onclick=()=>{ window.location.href='calendar.html'; closePopup(); };
    const rulesOpt=document.createElement('div'); rulesOpt.innerText='Rules'; rulesOpt.style.padding='0.5rem 1rem'; rulesOpt.onclick=()=>{ window.location.href='rules.html'; closePopup(); };
    popup.appendChild(playersOpt); popup.appendChild(formOpt); popup.appendChild(last5Opt); popup.appendChild(calendarOpt); popup.appendChild(rulesOpt);
    document.body.appendChild(popup);
  });
  document.addEventListener('click',(e)=>{ if(popup && !popup.contains(e.target) && e.target!==threeDot) closePopup(); });
  const hiddenDiv = document.createElement('div'); hiddenDiv.style.display='none'; hiddenDiv.innerHTML=`<input type="checkbox" id="showPlayerNames" checked><input type="checkbox" id="showFormArrows" checked><input type="checkbox" id="showLast5" checked>`; document.body.appendChild(hiddenDiv);
  document.getElementById('showPlayerNames')?.addEventListener('change',()=>renderLeagueTable());
  document.getElementById('showFormArrows')?.addEventListener('change',()=>renderLeagueTable());
  document.getElementById('showLast5')?.addEventListener('change',()=>renderLeagueTable());

  // Collapsible cards
  function setupCollapse(headerId, contentId, iconId){ const h=document.getElementById(headerId), c=document.getElementById(contentId), ic=document.getElementById(iconId); if(!h||!c) return; let collapsed=c.classList.contains('collapsed'); h.addEventListener('click',()=>{ collapsed=!collapsed; if(collapsed){ c.classList.add('collapsed'); if(ic) ic.innerHTML='▶'; }else{ c.classList.remove('collapsed'); if(ic) ic.innerHTML='▼'; } }); }
  setupCollapse('fixturesHeader','fixturesContent','fixturesToggleIcon');
  setupCollapse('resultsHeader','resultsContent','resultsToggleIcon');
  document.getElementById('fixturesContent')?.classList.add('collapsed');
  document.getElementById('resultsContent')?.classList.add('collapsed');
  document.getElementById('fixturesToggleIcon').innerHTML='▶';
  document.getElementById('resultsToggleIcon').innerHTML='▶';

  // Slideshow
  const images = ["images - 2026-04-19T121231.816.jpeg","images - 2026-04-19T155746.715.jpeg","37686bb3-06ce-401b-a022-026933c165e7.jpeg","12871.jpg","1f157df7-2054-4a9d-aa14-b9941ef4a743.jpeg"];
  let idx=0; const imgEl=document.getElementById('slideshow-img'); const dots=document.getElementById('dotsContainer'); function createDots(){ dots.innerHTML=''; images.forEach((_,i)=>{ const dot=document.createElement('span'); dot.classList.add('dot'); if(i===idx) dot.classList.add('active'); dot.addEventListener('click',()=>{ idx=i; imgEl.src=images[idx]; updateDots(); }); dots.appendChild(dot); }); } function updateDots(){ document.querySelectorAll('.dot').forEach((d,i)=>{ if(i===idx) d.classList.add('active'); else d.classList.remove('active'); }); } if(imgEl){ createDots(); setInterval(()=>{ idx=(idx+1)%images.length; imgEl.src=images[idx]; updateDots(); },2000); }

  // Menu modal
  const hamburger=document.getElementById('hamburgerBtn'), modalOverlay=document.getElementById('modalOverlay'), closeModal=document.getElementById('closeModalBtn');
  hamburger.onclick=()=>modalOverlay.classList.add('active'); closeModal.onclick=()=>modalOverlay.classList.remove('active');
  document.getElementById('rulesBtn').onclick=()=>window.location.href='rules.html';
  document.getElementById('playerTitlesBtn').onclick=()=>window.location.href='player-titles.html';
  document.getElementById('logoutBtn').onclick=async()=>{ await signOut(auth); window.location.href='login.html'; };
  // Debug modal
  document.getElementById('debugBtn').onclick=()=>document.getElementById('debugModal').classList.add('active');
  document.getElementById('closeDebugBtn').onclick=()=>document.getElementById('debugModal').classList.remove('active');
  const playerMap = { "Barcelona":"~Rea🫡","Inter Milan":"Mali","Dortmund":"~Qhawe 🤍","Juventus":"Izu","Atletico":"~Stalker.","PSG":"~MJ","Napoli":"~PrettyBoy Tendancies. 👅","Real Madrid":"~Karabo","Arsenal":"Kath","AC Milan":"Tapz","Chelsea":"~Zazo","Man City":"gry","Liverpool":"🅿️","Newcastle":"~Oratile" };
