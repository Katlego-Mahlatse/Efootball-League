<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin · Premier League</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      color: #f5f0ff;
      padding-bottom: 2rem;
    }
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .debug-btn, .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .debug-btn:hover, .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
      margin: 2px 0;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }
    .modal-content, .debug-modal {
      position: absolute;
      top: 60px;
      right: 20px;
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 1.2rem;
      padding: 1rem;
      width: auto;
      min-width: 280px;
      max-width: 400px;
      color: #f5e6ff;
    }
    .debug-modal {
      left: 20px;
      right: auto;
    }
    .debug-modal pre {
      background: #1a0a2e;
      padding: 0.5rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      font-size: 0.7rem;
    }
    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .card-header {
      padding: 1rem 1.5rem;
      background: rgba(30, 15, 55, 0.9);
      border-bottom: 2px solid #f5d742;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-header h2 {
      font-size: 1.4rem;
      color: #f5e6ff;
    }
    .add-btn {
      background: #6a3bb5;
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      color: #f5d742;
      font-weight: bold;
      cursor: pointer;
    }
    .stats-table, .inner-table {
      width: 100%;
      border-collapse: collapse;
    }
    .stats-table th, .inner-table th {
      text-align: left;
      padding: 0.8rem;
      background: rgba(55, 35, 95, 0.7);
      border-bottom: 1px solid #f5d742;
    }
    .stats-table td, .inner-table td {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid rgba(245, 215, 66, 0.2);
    }
    .edit-btn, .delete-btn {
      background: none;
      border: none;
      color: #f5d742;
      margin: 0 0.3rem;
      cursor: pointer;
      font-size: 1rem;
    }
    .team-icon-sm {
      width: 30px;
      height: 30px;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 8px;
    }
    .form-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
    }
    .form-overlay.active { visibility: visible; }
    .form-card {
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 2rem;
      padding: 1.5rem;
      width: 90%;
      max-width: 500px;
    }
    .form-card input, .form-card select {
      width: 100%;
      padding: 0.5rem;
      margin: 0.5rem 0;
      background: rgba(30,15,55,0.8);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      color: white;
    }
    .form-card button {
      background: #6a3bb5;
      border: none;
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      color: white;
      margin-top: 1rem;
      cursor: pointer;
    }
    @media (max-width: 780px) {
      .dashboard { padding: 1rem; }
      .stats-table th, .stats-table td { padding: 0.4rem; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div style="display: flex; gap: 0.5rem;">
    <div class="debug-btn" id="debugBtn">🐞</div>
    <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- Debug Modal -->
<div id="debugModal" class="modal-overlay" style="z-index: 250;">
  <div class="debug-modal">
    <h3>🐞 Debug Info</h3>
    <div id="debugContent">Loading...</div>
    <button id="closeDebugBtn" class="close-modal" style="margin-top: 1rem;">Close</button>
  </div>
</div>

<!-- Main Menu Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <h3>MENU</h3>
    <div class="modal-option" id="rulesBtn">RULES</div>
    <div class="modal-option" id="playerTitlesBtn">PLAYER TITLES</div>
    <div class="modal-option" id="logoutBtn">LOGOUT</div>
    <button class="close-modal" id="closeModalBtn">CLOSE</button>
  </div>
</div>

<div class="dashboard">
  <!-- League Table Card -->
  <div class="card">
    <div class="card-header">
      <h2>🏆 PREMIER LEAGUE TABLE</h2>
      <button class="add-btn" id="addTeamBtn">+ Add Team</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="stats-table" id="leagueTable">
        <thead><tr><th>Pos</th><th>Club</th><th>P</th><th>GD</th><th>Pts</th><th>Actions</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Fixtures Card -->
  <div class="card">
    <div class="card-header">
      <h2>📅 FIXTURES</h2>
      <button class="add-btn" id="addFixtureBtn">+ Add Fixture</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="inner-table" id="fixturesTable">
        <thead><tr><th>Date</th><th>Home vs Away</th><th>Matchday</th><th>Actions</th></tr></thead>
        <tbody id="fixturesBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Results Card -->
  <div class="card">
    <div class="card-header">
      <h2>📝 RESULTS</h2>
      <button class="add-btn" id="addResultBtn">+ Add Result</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="inner-table" id="resultsTable">
        <thead><tr><th>Match</th><th>Match Day</th><th>Actions</th></tr></thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Forms -->
<div id="teamForm" class="form-overlay">
  <div class="form-card">
    <h3>Add/Edit Team</h3>
    <select id="teamNameSelect"></select>
    <input type="number" id="teamP" placeholder="Played">
    <input type="number" id="teamGD" placeholder="Goal Difference">
    <input type="number" id="teamPts" placeholder="Points">
    <button id="saveTeamBtn">Save</button>
    <button id="cancelTeamBtn">Cancel</button>
  </div>
</div>

<div id="fixtureForm" class="form-overlay">
  <div class="form-card">
    <h3>Add/Edit Fixture</h3>
    <input type="text" id="fixtureDate" placeholder="Date (e.g., Apr 28)">
    <select id="fixtureHome"></select>
    <select id="fixtureAway"></select>
    <input type="number" id="fixtureMd" placeholder="Matchday">
    <button id="saveFixtureBtn">Save</button>
    <button id="cancelFixtureBtn">Cancel</button>
  </div>
</div>

<div id="resultForm" class="form-overlay">
  <div class="form-card">
    <h3>Add/Edit Result</h3>
    <input type="text" id="resultText" placeholder="Match text (e.g., Real Madrid 3 - 2 Arsenal)">
    <input type="number" id="resultMd" placeholder="Matchday">
    <button id="saveResultBtn">Save</button>
    <button id="cancelResultBtn">Cancel</button>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getDatabase, ref, set, onValue, push, remove, get } from "firebase/database";
  import { getAuth, signOut } from "firebase/auth";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // Debug logger
  let lastError = null;
  let lastOperation = null;
  function logError(operation, error) {
    lastError = { operation, error: error.message || error, timestamp: new Date().toISOString() };
    console.error(operation, error);
  }
  function logSuccess(operation, data) {
    lastOperation = { operation, data, timestamp: new Date().toISOString() };
    console.log(operation, data);
  }

  // Debug modal update
  async function updateDebugModal() {
    const debugDiv = document.getElementById('debugContent');
    let dbStatus = "unknown";
    try {
      const testRef = ref(db, '.info/connected');
      const snapshot = await get(testRef);
      dbStatus = snapshot.exists() ? "connected" : "disconnected";
    } catch(e) { dbStatus = "error: " + e.message; }
    debugDiv.innerHTML = `
      <strong>Firebase DB:</strong> ${dbStatus}<br>
      <strong>Last operation:</strong> ${lastOperation ? JSON.stringify(lastOperation) : 'none'}<br>
      <strong>Last error:</strong> ${lastError ? JSON.stringify(lastError) : 'none'}<br>
      <strong>Auth user:</strong> ${auth.currentUser ? auth.currentUser.email : 'none'}
    `;
  }

  // Team icons mapping
  const teamIcons = {
    "Arsenal": "b688ae57-b21a-4ee9-ba6c-5027a09cc9c5.png",
    "AC Milan": "44e0f58a-e5db-445b-9896-db22ea99b936.png",
    "PSG": "4dea795d-a516-46ae-bd34-07a784693d80.png",
    "Barcelona": "IMG_20260421_085117.jpg",
    "Inter Milan": "IMG_20260421_092951.png",
    "Atletico": "IMG_20260421_093024.png",
    "Newcastle": "IMG_20260421_093046.png",
    "Napoli": "IMG_20260421_100318.jpg",
    "Chelsea": "IMG_20260421_100354.jpg",
    "Dortmund": "01cf2986-d9d6-4a33-830d-5d12de4e21b2.jpeg",
    "Real Madrid": "21259ea4-042f-48ff-902f-1e776d27fe58.jpeg",
    "Man City": "9e92a100-327b-48fc-96d4-e4c89f69d7ef.jpeg",
    "Liverpool": "269acb36-d189-45ea-860d-ea8f1cf05f05.jpeg",
    "Juventus": "IMG_20260421_151224.jpg"
  };
  const teamList = Object.keys(teamIcons);

  function getTeamIconHtml(team, size = "30px") {
    const src = teamIcons[team];
    if (src) return `<img class="team-icon-sm" src="${src}" style="width:${size}; height:${size}; object-fit:contain;">`;
    return team;
  }

  function populateSelect(selectEl, excludeCurrent = null) {
    selectEl.innerHTML = '';
    teamList.forEach(team => {
      const option = document.createElement('option');
      option.value = team;
      option.innerHTML = `${getTeamIconHtml(team, '20px')} ${team}`;
      selectEl.appendChild(option);
    });
    if (excludeCurrent && selectEl.value === excludeCurrent) selectEl.value = '';
  }

  // Table CRUD
  let editingTeamKey = null;
  function renderTable(teams) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    const teamArray = teams ? Object.entries(teams).map(([key, val]) => ({ key, ...val })) : [];
    teamArray.sort((a,b) => b.pts - a.pts || b.gd - a.gd);
    teamArray.forEach((team, idx) => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = idx+1;
      row.insertCell(1).innerHTML = `<div>${getTeamIconHtml(team.name)} ${team.name}</div>`;
      row.insertCell(2).innerText = team.p || 0;
      row.insertCell(3).innerText = team.gd || 0;
      row.insertCell(4).innerText = team.pts || 0;
      const actions = row.insertCell(5);
      const editBtn = document.createElement('button');
      editBtn.innerText = '✏️';
      editBtn.className = 'edit-btn';
      editBtn.onclick = () => openTeamForm(team.key, team);
      const delBtn = document.createElement('button');
      delBtn.innerText = '🗑️';
      delBtn.className = 'delete-btn';
      delBtn.onclick = async () => {
        try {
          await remove(ref(db, `premier_league/table/${team.key}`));
          logSuccess('deleteTeam', team.key);
        } catch(e) { logError('deleteTeam', e); }
      };
      actions.appendChild(editBtn);
      actions.appendChild(delBtn);
    });
  }
  onValue(ref(db, 'premier_league/table'), (snap) => renderTable(snap.val()));

  function openTeamForm(key, data = null) {
    editingTeamKey = key;
    const select = document.getElementById('teamNameSelect');
    populateSelect(select);
    if (data?.name) select.value = data.name;
    document.getElementById('teamP').value = data?.p || '';
    document.getElementById('teamGD').value = data?.gd || '';
    document.getElementById('teamPts').value = data?.pts || '';
    document.getElementById('teamForm').classList.add('active');
  }
  document.getElementById('addTeamBtn').onclick = () => openTeamForm(null);
  document.getElementById('saveTeamBtn').onclick = async () => {
    const name = document.getElementById('teamNameSelect').value;
    const p = parseInt(document.getElementById('teamP').value) || 0;
    const gd = parseInt(document.getElementById('teamGD').value) || 0;
    const pts = parseInt(document.getElementById('teamPts').value) || 0;
    if (!name) { alert('Select a team'); return; }
    const teamData = { name, p, gd, pts };
    try {
      if (editingTeamKey) {
        await set(ref(db, `premier_league/table/${editingTeamKey}`), teamData);
        logSuccess('updateTeam', teamData);
      } else {
        const newRef = push(ref(db, 'premier_league/table'));
        await set(newRef, teamData);
        logSuccess('addTeam', teamData);
      }
      document.getElementById('teamForm').classList.remove('active');
    } catch(e) { logError('saveTeam', e); alert('Error saving team: ' + e.message); }
  };
  document.getElementById('cancelTeamBtn').onclick = () => document.getElementById('teamForm').classList.remove('active');

  // Fixtures CRUD
  let editingFixtureKey = null;
  function renderFixtures(fixtures) {
    const tbody = document.getElementById('fixturesBody');
    tbody.innerHTML = '';
    if (!fixtures) return;
    Object.entries(fixtures).forEach(([key, f]) => {
      const row = tbody.insertRow();
      row.insertCell(0).innerHTML = `<span class="date-badge">${f.date || ''}</span>`;
      row.insertCell(1).innerHTML = `<div>${getTeamIconHtml(f.home)} ${f.home} vs ${getTeamIconHtml(f.away)} ${f.away}</div>`;
      row.insertCell(2).innerHTML = `<span style="background:#5e3a9e; padding:0.2rem 0.7rem; border-radius:30px;">MD ${f.md}</span>`;
      const actions = row.insertCell(3);
      const editBtn = document.createElement('button');
      editBtn.innerText = '✏️'; editBtn.className = 'edit-btn';
      editBtn.onclick = () => openFixtureForm(key, f);
      const delBtn = document.createElement('button');
      delBtn.innerText = '🗑️'; delBtn.className = 'delete-btn';
      delBtn.onclick = async () => {
        try {
          await remove(ref(db, `premier_league/fixtures/${key}`));
          logSuccess('deleteFixture', key);
        } catch(e) { logError('deleteFixture', e); }
      };
      actions.appendChild(editBtn); actions.appendChild(delBtn);
    });
  }
  onValue(ref(db, 'premier_league/fixtures'), (snap) => renderFixtures(snap.val()));

  function openFixtureForm(key, data = null) {
    editingFixtureKey = key;
    document.getElementById('fixtureDate').value = data?.date || '';
    populateSelect(document.getElementById('fixtureHome'));
    populateSelect(document.getElementById('fixtureAway'));
    if (data?.home) document.getElementById('fixtureHome').value = data.home;
    if (data?.away) document.getElementById('fixtureAway').value = data.away;
    document.getElementById('fixtureMd').value = data?.md || '';
    document.getElementById('fixtureForm').classList.add('active');
  }
  document.getElementById('addFixtureBtn').onclick = () => openFixtureForm(null);
  document.getElementById('saveFixtureBtn').onclick = async () => {
    const date = document.getElementById('fixtureDate').value.trim();
    const home = document.getElementById('fixtureHome').value;
    const away = document.getElementById('fixtureAway').value;
    const md = parseInt(document.getElementById('fixtureMd').value);
    if (!date || !home || !away || !md) { alert('Please fill all fields'); return; }
    if (home === away) { alert('Home and away cannot be the same'); return; }
    const fixData = { date, home, away, md };
    try {
      if (editingFixtureKey) {
        await set(ref(db, `premier_league/fixtures/${editingFixtureKey}`), fixData);
        logSuccess('updateFixture', fixData);
      } else {
        const newRef = push(ref(db, 'premier_league/fixtures'));
        await set(newRef, fixData);
        logSuccess('addFixture', fixData);
      }
      document.getElementById('fixtureForm').classList.remove('active');
    } catch(e) { logError('saveFixture', e); alert('Error saving fixture: ' + e.message); }
  };
  document.getElementById('cancelFixtureBtn').onclick = () => document.getElementById('fixtureForm').classList.remove('active');

  // Results CRUD
  let editingResultKey = null;
  function renderResults(results) {
    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';
    if (!results) return;
    Object.entries(results).forEach(([key, r]) => {
      const row = tbody.insertRow();
      let processed = r.matchText;
      teamList.forEach(team => {
        const regex = new RegExp(`\\b${team}\\b`, 'g');
        processed = processed.replace(regex, `${getTeamIconHtml(team, '24px')} ${team}`);
      });
      row.insertCell(0).innerHTML = `<strong>${processed}</strong>`;
      row.insertCell(1).innerHTML = `<span class="match-highlight">MD${r.md}</span>`;
      const actions = row.insertCell(2);
      const editBtn = document.createElement('button');
      editBtn.innerText = '✏️'; editBtn.className = 'edit-btn';
      editBtn.onclick = () => openResultForm(key, r);
      const delBtn = document.createElement('button');
      delBtn.innerText = '🗑️'; delBtn.className = 'delete-btn';
      delBtn.onclick = async () => {
        try {
          await remove(ref(db, `premier_league/results/${key}`));
          logSuccess('deleteResult', key);
        } catch(e) { logError('deleteResult', e); }
      };
      actions.appendChild(editBtn); actions.appendChild(delBtn);
    });
  }
  onValue(ref(db, 'premier_league/results'), (snap) => renderResults(snap.val()));

  function openResultForm(key, data = null) {
    editingResultKey = key;
    document.getElementById('resultText').value = data?.matchText || '';
    document.getElementById('resultMd').value = data?.md || '';
    document.getElementById('resultForm').classList.add('active');
  }
  document.getElementById('addResultBtn').onclick = () => openResultForm(null);
  document.getElementById('saveResultBtn').onclick = async () => {
    const text = document.getElementById('resultText').value.trim();
    const md = parseInt(document.getElementById('resultMd').value);
    if (!text || !md) { alert('Please fill all fields'); return; }
    const resData = { matchText: text, md };
    try {
      if (editingResultKey) {
        await set(ref(db, `premier_league/results/${editingResultKey}`), resData);
        logSuccess('updateResult', resData);
      } else {
        const newRef = push(ref(db, 'premier_league/results'));
        await set(newRef, resData);
        logSuccess('addResult', resData);
      }
      document.getElementById('resultForm').classList.remove('active');
    } catch(e) { logError('saveResult', e); alert('Error saving result: ' + e.message); }
  };
  document.getElementById('cancelResultBtn').onclick = () => document.getElementById('resultForm').classList.remove('active');

  // Menus
  const debugBtn = document.getElementById('debugBtn');
  const debugModal = document.getElementById('debugModal');
  const closeDebug = document.getElementById('closeDebugBtn');
  debugBtn.onclick = async () => { await updateDebugModal(); debugModal.classList.add('active'); };
  closeDebug.onclick = () => debugModal.classList.remove('active');

  const hamburger = document.getElementById('hamburgerBtn');
  const modalOverlay = document.getElementById('modalOverlay');
  const closeModal = document.getElementById('closeModalBtn');
  hamburger.onclick = () => modalOverlay.classList.add('active');
  closeModal.onclick = () => modalOverlay.classList.remove('active');
  document.getElementById('rulesBtn').onclick = () => window.location.href = 'rules.html';
  document.getElementById('playerTitlesBtn').onclick = () => window.location.href = 'player-titles.html';
  document.getElementById('logoutBtn').onclick = async () => {
    await signOut(auth);
    window.location.href = 'login.html';
  };

  // Initial debug update
  setTimeout(updateDebugModal, 1000);
</script>
</body>
</html>
