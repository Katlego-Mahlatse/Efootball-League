
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --electric-violet: #963CFF;
      --razzmatazz: #E90052;
      --valentino: #360D3A;
      --white: #ffffff;
      --deep-blue: #0A2B5E;
      --turquoise: #00CED1;
      --glass-bg: rgba(255,255,255,0.05);
      --glass-border: rgba(150,60,255,0.25);
      --glass-blur: blur(12px);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--deep-blue);
      min-height: 100vh;
      overflow-x: auto;
      min-width: 1200px;
      width: 1200px;
      margin: 0 auto;
      font-size: 20px;
      padding-bottom: 3rem;
      position: relative;
    }
    body.has-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: var(--bg-image);
      background-size: var(--bg-size, cover);
      background-position: var(--bg-pos, center);
      background-repeat: no-repeat;
      z-index: -2;
    }
    body.has-bg::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10,43,94,0.55);
      z-index: -1;
    }

    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes cardSlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .navbar {
      background: linear-gradient(90deg, var(--deep-blue) 0%, var(--electric-violet) 50%, var(--razzmatazz) 100%);
      border-bottom: 2px solid var(--white);
      padding: 0 2rem;
      height: 100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      animation: fadeInDown 0.5s ease both;
    }
    .navbar-logo { height: 74px; max-width: 260px; object-fit: contain; cursor: pointer; transition: transform 0.3s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .navbar-logo:hover { transform: scale(1.05); }
    .navbar-logo-placeholder { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 3px; color: var(--white); cursor: pointer; font-weight: bold; }
    .menu-btn { background: var(--deep-blue); border: 2px solid var(--white); width: 70px; height: 70px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; cursor: pointer; transition: all 0.3s; }
    .menu-btn span { width: 32px; height: 4px; background: var(--white); border-radius: 4px; transition: all 0.3s; }
    .menu-btn:hover { background: var(--valentino); transform: rotate(90deg); }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 199; display: none; backdrop-filter: blur(3px); }
    .overlay.active { display: block; }
    .side-menu { position: fixed; top: 0; right: -360px; width: 360px; height: 100%; background: rgba(54,13,58,0.98); backdrop-filter: blur(20px); border-left: 2px solid var(--razzmatazz); z-index: 200; padding: 40px 28px; transition: right 0.35s cubic-bezier(.4,0,.2,1); }
    .side-menu.active { right: 0; }
    .close-menu { text-align: right; font-size: 2.8rem; cursor: pointer; color: var(--white); margin-bottom: 40px; line-height: 1; transition: color 0.2s; }
    .close-menu:hover { color: var(--razzmatazz); }
    .menu-item { padding: 20px 28px; margin: 12px 0; border: 1px solid rgba(233,0,82,0.3); border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 1.5rem; color: var(--white); transition: all 0.2s; font-family: 'Rajdhani', sans-serif; }
    .menu-item:hover { background: var(--razzmatazz); border-color: var(--white); color: var(--white); transform: translateX(8px); }

    .slideshow-wrapper { padding: 36px 36px 20px; display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.7s ease 0.2s both; }
    .slideshow-frame { width: 100%; max-width: 1100px; border-radius: 32px; overflow: hidden; box-shadow: 0 8px 40px rgba(150,60,255,0.25); border: 2px solid var(--razzmatazz); background: #000; display: flex; justify-content: center; align-items: center; }
    .slideshow-img { width: 100%; height: auto; max-height: 520px; object-fit: contain; display: block; transition: opacity 0.5s ease; }
    .dots-container { margin-top: 20px; display: flex; gap: 12px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(233,0,82,0.3); cursor: pointer; transition: all 0.25s; }
    .dot.active { background: var(--razzmatazz); transform: scale(1.4); box-shadow: 0 0 12px rgba(233,0,82,0.7); }

    .season-bar { display: flex; justify-content: center; margin: 24px 0 16px; }
    .season-controls { display: flex; align-items: center; gap: 20px; background: var(--turquoise); border: none; padding: 12px 32px; border-radius: 80px; backdrop-filter: blur(8px); }
    .season-arrow { background: transparent; border: none; width: 56px; height: 56px; border-radius: 50%; font-size: 2rem; cursor: pointer; font-weight: bold; transition: all 0.2s; line-height: 1; display: flex; align-items: center; justify-content: center; color: white; }
    #prevSeasonBtn { background: var(--razzmatazz); }
    #prevSeasonBtn:hover:not(:disabled) { background: #b8003f; transform: scale(1.1); }
    #nextSeasonBtn { background: var(--electric-violet); }
    #nextSeasonBtn:hover:not(:disabled) { background: #7a2be0; transform: scale(1.1); }
    .season-arrow:disabled { opacity: 0.3; cursor: not-allowed; }
    .season-number { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 3px; color: #000000; min-width: 180px; text-align: center; background: rgba(255,255,255,0.8); padding: 4px 16px; border-radius: 40px; }
    .season-admin-btns { display: flex; gap: 10px; margin-left: 10px; }
    .season-admin-btn { background: rgba(150,60,255,0.15); border: 1px solid var(--razzmatazz); padding: 8px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; color: var(--white); font-size: 1.1rem; font-family: 'Rajdhani', sans-serif; transition: all 0.2s; }
    .season-admin-btn:hover { background: var(--razzmatazz); }

    .tabs-container { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 28px 36px 0; background: linear-gradient(90deg, var(--razzmatazz), var(--electric-violet)); border: 2px solid var(--white); border-radius: 80px; padding: 12px 20px; backdrop-filter: blur(8px); max-width: 1100px; margin-left: auto; margin-right: auto; animation: fadeInUp 0.5s ease 0.3s both; }
    .tabs-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .tab-btn { background: transparent; border: none; font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700; padding: 10px 28px; cursor: pointer; color: rgba(255,255,255,0.7); border-radius: 60px; letter-spacing: 0.5px; transition: all 0.25s; white-space: nowrap; }
    .tab-btn.active { background: var(--electric-violet); color: #000000; }
    .tab-btn:hover:not(.active) { color: var(--white); background: rgba(255,255,255,0.2); }

    .content-card { margin: 24px 36px 40px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 32px; padding: 32px; min-height: 200px; animation: fadeInUp 0.5s ease 0.4s both; }

    .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 24px; }
    .spinner { width: 60px; height: 60px; border: 5px solid rgba(233,0,82,0.2); border-top-color: var(--razzmatazz); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loading-spinner span { color: rgba(255,255,255,0.6); font-size: 1.4rem; font-family: 'Rajdhani', sans-serif; }
    .btn-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }

    .empty-state { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.4); }
    .empty-state .empty-icon { font-size: 5rem; margin-bottom: 20px; }
    .empty-state p { font-size: 2rem; font-weight: 500; font-family: 'Rajdhani', sans-serif; }

    .table-scroll-wrap { overflow-x: auto; border-radius: 20px; position: relative; }

    .stats-table { width: 100%; border-collapse: collapse; font-family: 'Rajdhani', sans-serif; min-width: 900px; background: var(--glass-bg); backdrop-filter: var(--glass-blur); color: var(--white); }
    .stats-table thead th { background: rgba(150,60,255,0.3); color: var(--white); font-size: 1.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 16px 18px; border-bottom: 2px solid var(--razzmatazz); white-space: nowrap; z-index: 20; }
    .stats-table th:first-child, .stats-table td:first-child { position: sticky; left: 0; z-index: 25; background: var(--glass-bg); backdrop-filter: var(--glass-blur); width: 64px; min-width: 64px; }
    .stats-table thead th:first-child { background: rgba(150,60,255,0.3); z-index: 30; }
    .stats-table th:nth-child(2), .stats-table td:nth-child(2) { position: sticky; left: 64px; z-index: 24; background: var(--glass-bg); backdrop-filter: var(--glass-blur); box-shadow: 4px 0 8px -2px rgba(0,0,0,0.45); border-right: 2px solid rgba(233,0,82,0.35); }
    .stats-table thead th:nth-child(2) { background: rgba(150,60,255,0.3); z-index: 30; }
    .stats-table tbody tr { border-bottom: 1px solid rgba(233,0,82,0.2); transition: background 0.2s; }
    .stats-table tbody tr:hover { background: rgba(150,60,255,0.15); }
    .stats-table td { padding: 14px 18px; color: var(--white); font-size: 1.3rem; font-weight: 600; white-space: nowrap; }
    .stats-table td.stat-number { font-size: 2.6rem !important; font-weight: 800; line-height: 1.2; }
    .team-name-text { font-weight: 700; font-size: 2.8rem !important; color: var(--white); }
    .pts-cell { font-weight: 800; color: var(--white); font-size: 1.5rem; }
    .rank-cell { font-weight: 700; color: var(--white); font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; }

    .table-actions { display: flex; justify-content: flex-end; gap: 12px; padding: 14px 18px; background: rgba(150,60,255,0.3); border-radius: 20px 20px 0 0; border: 2px solid rgba(233,0,82,0.2); border-bottom: 3px solid var(--razzmatazz); align-items: center; }
    .table-actions-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--white); letter-spacing: 2px; flex: 1; display: flex; align-items: center; }
    .table-header-img { max-height: 60px; max-width: 260px; object-fit: contain; }
    .add-btn { background: rgba(255,255,255,0.15); border: 2px solid var(--razzmatazz); color: var(--white); font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.2rem; padding: 10px 24px; border-radius: 40px; cursor: pointer; transition: all 0.2s; }
    .add-btn:hover { background: var(--razzmatazz); color: var(--white); transform: translateY(-2px); }
    .three-dot-btn { background: rgba(255,255,255,0.15); border: 2px solid var(--razzmatazz); color: var(--white); font-size: 2.2rem; width: 52px; height: 52px; border-radius: 50%; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .three-dot-btn:hover { background: var(--razzmatazz); color: var(--white); }

    .scan-img-btn { background: rgba(0,206,209,0.2); border: 2px solid var(--turquoise); color: var(--white); font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.2rem; padding: 10px 24px; border-radius: 40px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
    .scan-img-btn:hover { background: var(--turquoise); color: #000; transform: translateY(-2px); }

    .stats-list { width: 100%; border-collapse: collapse; font-family: 'Rajdhani', sans-serif; background: var(--glass-bg); backdrop-filter: var(--glass-blur); color: var(--white); }
    .stats-list thead th { background: rgba(150,60,255,0.3); color: var(--white); font-size: 1.4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 18px 22px; border-bottom: 2px solid var(--razzmatazz); }
    .stats-list tbody tr { border-bottom: 1px solid rgba(233,0,82,0.2); transition: background 0.2s; }
    .stats-list tbody tr:hover { background: rgba(150,60,255,0.15); }
    .stats-list td { padding: 18px 22px; color: var(--white); font-size: 1.4rem; font-weight: 600; }
    .stats-list td:first-child { color: var(--white); font-family: 'Bebas Neue', sans-serif; font-size: 2rem; font-weight: bold; }
    .count-badge { background: rgba(0,0,0,0.5); border: 1px solid var(--razzmatazz); color: var(--white); padding: 6px 22px; border-radius: 50px; font-weight: 700; font-size: 1.4rem; }
    .stat-team-cell { display: flex; align-items: center; gap: 16px; color: var(--white); }

    .top3-container { display: flex; justify-content: center; gap: 0; margin-bottom: 40px; flex-wrap: nowrap; width: 100%; }
    .top3-block { position: relative; text-align: center; flex: 1; background: rgba(150,60,255,0.2); border-radius: 0; padding: 0; transition: transform 0.3s; margin: 0; min-width: 0; }
    .top3-block:first-child { border-top-left-radius: 32px; border-bottom-left-radius: 32px; }
    .top3-block:last-child { border-top-right-radius: 32px; border-bottom-right-radius: 32px; }
    .top3-block:hover { transform: translateY(-8px); z-index: 5; }
    .player-image-wrapper { position: relative; width: 100%; aspect-ratio: 1 / 1; overflow: hidden; border: 3px solid var(--razzmatazz); background: var(--deep-blue); margin: 0; border-radius: 0; }
    .top3-block:first-child .player-image-wrapper { border-top-left-radius: 32px; border-bottom-left-radius: 32px; }
    .top3-block:last-child .player-image-wrapper { border-top-right-radius: 32px; border-bottom-right-radius: 32px; }
    .player-img { width: 100%; height: 100%; object-fit: cover; }
    .medal-badge { position: absolute; top: 12px; left: 12px; font-size: 3rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); z-index: 2; }
    .edit-block-btn { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); border: 1px solid var(--razzmatazz); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.6rem; color: var(--white); transition: all 0.2s; z-index: 3; }
    .edit-block-btn:hover { background: var(--razzmatazz); transform: scale(1.1); }
    .player-name-overlay { position: absolute; bottom: 16px; left: 16px; background: linear-gradient(90deg, rgba(0,0,0,0.7), rgba(0,0,0,0.3)); color: white; font-family: 'Rajdhani', sans-serif; font-weight: 800; font-size: 1.6rem; padding: 6px 16px; border-radius: 40px; backdrop-filter: blur(4px); z-index: 2; letter-spacing: 0.5px; border-left: 3px solid var(--razzmatazz); pointer-events: none; }
    .team-icon-overlay { position: absolute; bottom: 12px; right: 12px; width: 56px; height: 56px; background: rgba(0,0,0,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 6px; z-index: 2; }
    .team-icon-overlay img { width: 100%; height: 100%; object-fit: contain; }
    .top3-count { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--razzmatazz); background: rgba(0,0,0,0.3); display: inline-block; padding: 8px 20px; border-radius: 60px; letter-spacing: 2px; margin-top: 12px; margin-bottom: 16px; }
    .rest-table-wrapper { margin-top: 20px; border-top: 2px solid var(--razzmatazz); padding-top: 24px; overflow-x: auto; }

    .filters-bar { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; margin-bottom: 30px; padding: 20px; background: rgba(150,60,255,0.2); border-radius: 28px; }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-group label { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.6); }
    .filter-group select, .filter-group button { background: rgba(54,13,58,0.8); border: 1px solid var(--razzmatazz); border-radius: 40px; padding: 12px 20px; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 600; color: var(--white); cursor: pointer; transition: all 0.2s; }
    .filter-group select:hover, .filter-group button:hover { background: var(--razzmatazz); border-color: var(--white); }
    .clear-filters { background: rgba(233,0,82,0.2); }
    .filter-stats { font-size: 1rem; color: rgba(255,255,255,0.5); margin-left: auto; align-self: center; }

    .view-calendar-btn { background: rgba(233,0,82,0.15); border: 2px solid var(--razzmatazz); color: var(--white); font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.2rem; padding: 12px 28px; border-radius: 40px; cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 8px; white-space: nowrap; align-self: flex-end; text-decoration: none; }
    .view-calendar-btn:hover { background: var(--razzmatazz); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(233,0,82,0.4); }

    .fixture-date-group { margin-bottom: 32px; animation: cardSlideIn 0.4s ease both; }
    .fixture-date-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--white); margin-bottom: 14px; padding: 10px 20px; background: rgba(233,0,82,0.2); border-radius: 50px; border-left: 4px solid var(--razzmatazz); display: inline-block; }
    .fixture-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius: 28px; padding: 28px 40px; margin-bottom: 16px; transition: all 0.25s; animation: cardSlideIn 0.4s ease both; border: 1px solid rgba(150,60,255,0.3); }
    .fixture-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(233,0,82,0.35); }
    .fixture-tournament-label { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; font-family: 'Rajdhani', sans-serif; }
    .fixture-match-row { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .fixture-team-side { display: flex; flex-direction: column; align-items: center; gap: 12px; flex: 1; text-align: center; }
    .fixture-team-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 2.2rem; color: var(--white); }
    .fixture-vs { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--white); letter-spacing: 4px; flex-shrink: 0; opacity: 0.6; }

    .matches-list { display: flex; flex-direction: column; gap: 24px; }
    .match-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius: 28px; padding: 32px 48px; transition: all 0.25s; animation: cardSlideIn 0.4s ease both; border: 1px solid rgba(150,60,255,0.3); }
    .match-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(233,0,82,0.35); }
    .match-row { display: flex; align-items: center; justify-content: space-between; gap: 32px; }
    .team-side { display: flex; flex-direction: column; align-items: center; gap: 16px; flex: 1; text-align: center; }
    .team-name-big { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 2.8rem; color: var(--white); letter-spacing: 0.3px; }
    .match-center { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; min-width: 180px; }
    .score-display { font-family: 'Bebas Neue', sans-serif; font-size: 4.5rem; color: var(--white); letter-spacing: 6px; background: rgba(0,0,0,0.3); padding: 14px 42px; border-radius: 80px; border: 2px solid rgba(233,0,82,0.3); }
    .forfeit-display { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: #ffaaaa; letter-spacing: 4px; background: rgba(0,0,0,0.5); padding: 12px 28px; border-radius: 60px; border: 2px solid #ffaaaa; }
    .aggregate-text { font-size: 1.6rem; color: rgba(255,255,255,0.7); font-family: 'Rajdhani', sans-serif; }
    .goal-scorers { margin-top: 12px; }
    .goal-scorer-item { display: inline-block; background: rgba(0,0,0,0.4); border: 1px solid rgba(233,0,82,0.5); padding: 5px 14px; border-radius: 30px; margin: 3px; font-size: 1.2rem; color: var(--white); }
    .match-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 24px; justify-content: center; }
    .meta-tag { font-size: 1.4rem; font-weight: 500; color: var(--white); background: rgba(0,0,0,0.3); padding: 10px 24px; border-radius: 50px; border: 1px solid rgba(233,0,82,0.3); font-family: 'Inter', sans-serif; }
    .admin-row { display: flex; gap: 16px; justify-content: flex-end; margin-top: 24px; }
    .btn-sm { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.5rem; padding: 12px 32px; border-radius: 50px; border: none; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
    .btn-edit { background: rgba(150,60,255,0.3); color: var(--white); border: 1px solid var(--razzmatazz); }

<script>
// ─── DEBUG LOG SYSTEM ───
const debugLogs = [];
const MAX_DEBUG_LOGS = 500;

function addDebugLog(level, msg, stack = null) {
  const entry = {
    time: new Date().toLocaleTimeString(),
    timestamp: Date.now(),
    level: level,
    message: msg,
    stack: stack
  };
  debugLogs.push(entry);
  if (debugLogs.length > MAX_DEBUG_LOGS) debugLogs.shift();
}

// Override console methods to capture logs
const origConsoleLog = console.log;
const origConsoleError = console.error;
const origConsoleWarn = console.warn;
const origConsoleInfo = console.info;
const origConsoleDebug = console.debug;

console.log = function(...args) {
  origConsoleLog.apply(console, args);
  addDebugLog('info', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
};
console.error = function(...args) {
  origConsoleError.apply(console, args);
  const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
  const stack = args.find(a => a instanceof Error)?.stack || null;
  addDebugLog('error', msg, stack);
};
console.warn = function(...args) {
  origConsoleWarn.apply(console, args);
  addDebugLog('warn', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
};
console.info = function(...args) {
  origConsoleInfo.apply(console, args);
  addDebugLog('info', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
};
console.debug = function(...args) {
  origConsoleDebug.apply(console, args);
  addDebugLog('debug', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
};

// Global error handler
window.onerror = function(message, source, lineno, colno, error) {
  const stack = error?.stack || null;
  addDebugLog('error', `${message} at ${source}:${lineno}:${colno}`, stack);
  return false;
};

window.addEventListener('unhandledrejection', function(e) {
  const msg = e.reason?.message || String(e.reason);
  const stack = e.reason?.stack || null;
  addDebugLog('error', `Unhandled Promise Rejection: ${msg}`, stack);
});

// ─── eFootball → Real team name mapping ───
const EFOOTBALL_TEAM_MAP = {
  'manchester b': 'Man City',
  'manchester united': 'Man United',
  'inter milan': 'Inter Milan',
  'arsenal fc': 'Arsenal FC',
  'fc barcelona': 'Barcelona',
  'paris saint-germain': 'PSG',
  'piemonte bn': 'Juventus',

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function scanMatchImages(images) {
  const contentParts = [
    {
      type: 'text',
      text: `Analyze these football/soccer match screenshot(s) and extract the following information in JSON format only (no markdown, no explanation):
{
  "homeTeam": "team name as shown in image",
  "awayTeam": "team name as shown in image",
  "homeScore": 0,
  "awayScore": 0,
  "homeScorers": [{"player": "name", "goals": 1}],
  "awayScorers": [{"player": "name", "goals": 1}],
  "homeAssists": [{"player": "name", "assists": 1}],
  "awayAssists": [{"player": "name", "assists": 1}],
  "matchday": null
}
Use team names EXACTLY as shown in the image. If you cannot find scorers or assists, return empty arrays. Return ONLY the JSON object.`
    }
  ];

  for (const img of images) {
    const base64 = await fileToBase64(img.file);
    const mimeType = img.file.type || 'image/jpeg';
    contentParts.push({
      type: 'image_url',
      image_url: { url: `data:${mimeType};base64,${base64}` }
    });
  }

  // FEATURE 4: Append team logo references
  if (Object.keys(teamLogoMappings).length > 0) {
    contentParts.push({ type: 'text', text: 'These are reference team logos to help you identify teams:' });
    for (const [teamName, mapping] of Object.entries(teamLogoMappings)) {
      contentParts.push({ type: 'text', text: `This logo = "${teamName}" (also known as "${mapping.efootballName}" in eFootball)` });
      contentParts.push({ type: 'image_url', image_url: { url: mapping.imageUrl } });
    }
  }

  const response = await fetch(GROQ_API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'meta-llama/llama-4-scout-17b-16e-instruct',
      messages: [{ role: 'user', content: contentParts }],
      max_tokens: 1000,
      temperature: 0
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || 'Groq API error');
  }

  const data = await response.json();
  const text = data.choices?.[0]?.message?.content || '';
  const clean = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);

  parsed.homeTeam = mapTeamName(parsed.homeTeam);
  parsed.awayTeam = mapTeamName(parsed.awayTeam);

  return parsed;
}

async function confirmAndSaveAll() {
  const btn = document.getElementById('confirmAllScanBtn');
  const statusEl = document.getElementById('confirmSaveStatus');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Saving…'; }

  document.querySelectorAll('[data-field][data-idx]').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const field = el.dataset.field;
    if (idx >= previewMatches.length) return;
    let val = el.value;
    if (field === 'homeScore' || field === 'awayScore' || field === 'matchday') val = parseInt(val) || 0;
    previewMatches[idx][field] = val;
  });

  let savedCount = 0;
  const errors = [];

  for (const m of previewMatches) {
    if (!m.homeTeam || !m.awayTeam) { errors.push(`Match ${m.matchIdx}: teams missing`); continue; }
    if (m.homeTeam === m.awayTeam) { errors.push(`Match ${m.matchIdx}: same team on both sides`); continue; }

    try {
      const hs = m.homeScore || 0;
      const as2 = m.awayScore || 0;
      const forfeit = m.forfeitType || 'none';
      const matchText = formatResultText(m.homeTeam, hs, m.awayTeam, as2, forfeit === 'none' ? '' : forfeit);

      const resultData = {
        matchText,
        md: m.matchday || 0,
        ...(m.date && { date: m.date }),
        ...(m.venue && { venue: m.venue }),
        ...(m.matchType && { matchType: m.matchType }),
        ...(m.aggregate && { aggregate: m.aggregate }),
        goalScorers: { home: m.homeScorers || [], away: m.awayScorers || [] }
      };

      incrementPending();
      await database.ref(getSeasonPath(currentSeasonId, 'results')).push(resultData);
      await applyResultToTable(m.homeTeam, m.awayTeam, hs, as2, forfeit === 'none' ? '' : forfeit);
      await applyScorersFromScan(m.homeScorers || [], m.homeTeam);
      await applyScorersFromScan(m.awayScorers || [], m.awayTeam);
      await applyAssistsFromScan(m.homeAssists || [], m.homeTeam);
      await applyAssistsFromScan(m.awayAssists || [], m.awayTeam);
      decrementPending();

      savedCount++;
    } catch(e) {
      errors.push(`Match ${m.matchIdx}: ${e.message}`);
    }
  }

  await loadCurrentSeasonData();
  await loadTopScorerData();
  await loadTopAssistantData();

  if (errors.length) {
    if (statusEl) statusEl.innerHTML = `<div class="status-msg status-error">Saved ${savedCount} match(es). Errors: ${errors.join('; ')}</div>`;
    if (btn) { btn.disabled = false; btn.innerHTML = '✅ CONFIRM & SAVE ALL'; }
  } else {
    if (statusEl) statusEl.innerHTML = `<div class="status-msg status-success">✅ ${savedCount} match(es) saved successfully!</div>`;
    multiScanMatches = [];
    setTimeout(() => { closeModal(); renderCurrentTab(); }, 1500);
  }
}

// ─── FEATURE 6: Smart Player Merging (applies to both scorers and assists) ───
async function applyScorersFromScan(scorers, team) {
  if (!scorers || !scorers.length) return;
  const path = getSeasonPath(currentSeasonId, 'topScorers/list');
  for (const s of scorers) {
    if (!s.player) continue;
    // Search case-insensitive
    const existing = topScorerList.find(p =>
      p.name.toLowerCase() === s.player.toLowerCase() && p.team.toLowerCase() === team.toLowerCase()
    );
    if (existing && existing.key) {
      const newCount = (existing.count || 0) + (s.goals || 1);
      incrementPending();
      await database.ref(`${path}/${existing.key}/count`).set(newCount);
      decrementPending();
    } else {
      incrementPending();
      await database.ref(path).push({ name: s.player, team, count: s.goals || 1, imageUrl: '' });
      decrementPending();
    }
  }
  // Reload local list after batch
  await loadTopScorerData();
}

async function applyAssistsFromScan(assists, team) {
  if (!assists || !assists.length) return;
  const path = getSeasonPath(currentSeasonId, 'topAssistants/list');
  for (const a of assists) {
    if (!a.player) continue;
    const existing = topAssistantList.find(p =>
      p.name.toLowerCase() === a.player.toLowerCase() && p.team.toLowerCase() === team.toLowerCase()
    );
    if (existing && existing.key) {
      const newCount = (existing.count || 0) + (a.assists || 1);
      incrementPending();
      await database.ref(`${path}/${existing.key}/count`).set(newCount);
      decrementPending();
    } else {
      incrementPending();
      await database.ref(path).push({ name: a.player, team, count: a.assists || 1, imageUrl: '' });
      decrementPending();
    }
  }
  await loadTopAssistantData();
}

// Modified scanStatImage to accept array of files
async function scanStatImage(files, scanType) {
  const contentParts = [];
  let prompt = '';
  if (scanType === 'scorer') {
    prompt = `Analyze this football/soccer top scorers screenshot and extract the top scorer data in JSON format only (no markdown, no explanation):
{"players": [{"name": "player name", "team": "team name", "goals": 0}]}
Extract ALL players visible. Return ONLY the JSON object.`;
  } else {
    prompt = `Analyze this football/soccer top assists screenshot and extract the top assistants data in JSON format only (no markdown, no explanation):
{"players": [{"name": "player name", "team": "team name", "assists": 0}]}
Extract ALL players visible. Return ONLY the JSON object.`;
  }
  contentParts.push({ type: 'text', text: prompt });

  for (const file of files) {
    const base64 = await fileToBase64(file);
    const mimeType = file.type || 'image/jpeg';
    contentParts.push({
      type: 'image_url',
      image_url: { url: `data:${mimeType};base64,${base64}` }
    });
  }

  const response = await fetch(GROQ_API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'meta-llama/llama-4-scout-17b-16e-instruct',
      messages: [{ role: 'user', content: contentParts }],
      max_tokens: 1000,
      temperature: 0
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || 'Groq API error');
  }

  const data = await response.json();
  const text = data.choices?.[0]?.message?.content || '';
  const clean = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);

  if (parsed.players) {
    parsed.players = parsed.players.map(p => ({ ...p, team: mapTeamName(p.team) }));
  }
  return parsed;
}

async function loadTeamNameMappings() {

  // We'll clear and re-populate EFOOTBALL_TEAM_MAP with hardcoded first, then overwrite

  const hardcoded = {

    'inter milan': 'Inter Milan',
    'arsenal fc': 'Arsenal FC',
    'fc barcelona': 'Barcelona',

    'al nassr': 'Al Nassr',
    'newcastle wb': 'Newcastle',

    'madrid ross rb': 'Atletico',
    'galatasaray': 'Galatasaray',
    'borussia dortmund': 'Dortmund',
    'marseille': 'Marseille',

  };
  // Start with hardcoded
  Object.assign(EFOOTBALL_TEAM_MAP, hardcoded);

}

async function loadManagerHistory() {
  const snap = await database.ref(getSeasonPath(currentSeasonId, 'managerHistory')).once('value');
  managerHistory = snap.val() || {};
  // Ensure each team has an array
  for (const team in managerHistory) {
    // convert object to array if needed (it's stored as pushKey -> entry)
    const entries = managerHistory[team];
    if (!Array.isArray(entries)) {
      // Convert object to array
      const arr = [];
      for (const key in entries) {
        arr.push({ key, ...entries[key] });
      }
      managerHistory[team] = arr;
    }
  }
  console.log('[loadManagerHistory] Loaded for season', currentSeasonId);
}

function getActiveManagerName(teamName) {
  const history = managerHistory[teamName];
  if (!history || !Array.isArray(history)) return null;
  const active = history.find(entry => entry.status === 'active');
  return active ? active.name : null;
}

    // Hide any other open forms
    document.querySelectorAll('.manager-inline-form').forEach(f => f.style.display = 'none');

    const isEdit = !!entry;
    const name = entry ? entry.name : '';
    const status = entry ? entry.status : 'active';
    const matchdayJoined = entry ? entry.matchdayJoined : '';
    const matchdayLeft = entry ? entry.matchdayLeft : '';
    container.innerHTML = `
      <div class="manager-inline-form">
        <div>
          <label>Name</label>
          <input type="text" class="mgr-name-input" value="${escapeHtml(name)}" placeholder="Manager name">

          <select class="mgr-status-select">

            <option value="sacked" ${status === 'sacked' ? 'selected' : ''}>Sacked 🔴</option>
            <option value="retired" ${status === 'retired' ? 'selected' : ''}>Retired 🟡</option>
          </select>
        </div>
        <div>
          <label>Matchday Joined</label>
          <input type="number" class="mgr-md-joined" value="${matchdayJoined}" placeholder="e.g. 1">
        </div>
        <div>
          <label>Matchday Left (optional)</label>
          <input type="number" class="mgr-md-left" value="${matchdayLeft}" placeholder="e.g. 10">
        </div>
        <div>
          <button class="save-mgr-btn" data-team="${team}" data-key="${entry ? entry.key : ''}" style="margin-top:8px;">${isEdit ? 'Update' : 'Save'}</button>
          <button class="cancel-mgr-btn" style="margin-top:8px;background:transparent;border:1px solid var(--razzmatazz);color:var(--white);padding:8px 16px;border-radius:20px;cursor:pointer;">Cancel</button>
        </div>
      </div>

    // Save button
    container.querySelector('.save-mgr-btn').onclick = async () => {
      const nameInput = container.querySelector('.mgr-name-input');
      const statusSelect = container.querySelector('.mgr-status-select');
      const mdJoinedInput = container.querySelector('.mgr-md-joined');
      const mdLeftInput = container.querySelector('.mgr-md-left');
      const name = nameInput.value.trim();
      const status = statusSelect.value;
      const matchdayJoined = parseInt(mdJoinedInput.value) || 0;
      const matchdayLeft = mdLeftInput.value ? parseInt(mdLeftInput.value) : null;
      if (!name) { alert('Manager name required.'); return; }
      const key = container.querySelector('.save-mgr-btn').dataset.key;
      const teamName = team;

      // If status is 'active', set all other managers of this team to 'sacked'
      const updates = {};
      const currentHistory = managerHistory[teamName] || [];
      if (status === 'active') {
        for (const e of currentHistory) {
          if (e.status === 'active' && e.key !== key) {
            updates[`${getSeasonPath(currentSeasonId, 'managerHistory')}/${teamName}/${e.key}/status`] = 'sacked';
          }
        }
      }

      // Prepare entry data
      const entryData = { name, status, matchdayJoined, matchdayLeft };
      const path = getSeasonPath(currentSeasonId, `managerHistory/${teamName}`);
      try {
        incrementPending();
        if (key) {
          // Update existing
          await database.ref(`${path}/${key}`).update(entryData);
          // Also apply status updates
          for (const updatePath in updates) {
            await database.ref(updatePath).set(updates[updatePath]);
          }
        } else {
          // New
          const newRef = await database.ref(path).push(entryData);
          // Apply status updates (if any)
          for (const updatePath in updates) {
            await database.ref(updatePath).set(updates[updatePath]);
          }
        }
        decrementPending();
        // Reload and re-render
        await loadManagerHistory();
        render();
      } catch(e) { alert('Error: ' + e.message); }
    };

    container.querySelector('.cancel-mgr-btn').onclick = () => {
      container.style.display = 'none';
    };
  }

  render();
}

async function applyResultToTable(homeTeam, awayTeam, homeScore, awayScore, forfeitType) {
  const isNoContest = forfeitType === 'no_contest';
  if (isNoContest) return;
  const tableSnap = await database.ref(getSeasonPath(currentSeasonId, 'table')).once('value');
  const tableVal = tableSnap.val() || {};
  function findTeamEntry(name) {
    for (const [key, val] of Object.entries(tableVal)) {
      if (val.name === name) return { key, data: { ...val } };
    }
    return null;
  }
  const homeEntry = findTeamEntry(homeTeam);
  const awayEntry = findTeamEntry(awayTeam);
  if (!homeEntry || !awayEntry) return;
  const hd = homeEntry.data;
  const ad = awayEntry.data;
  const isForfeitWin = (forfeitType === 'forfeit_no_reply' || forfeitType === 'forfeit_agreement');
  if (isForfeitWin) {
    if (homeScore > awayScore) {
      hd.p = (hd.p || 0) + 1; hd.w = (hd.w || 0) + 1; hd.pts = (hd.pts || 0) + 3;
      ad.p = (ad.p || 0) + 1; ad.l = (ad.l || 0) + 1; ad.gd = (ad.gd || 0) - 3;
    } else {
      ad.p = (ad.p || 0) + 1; ad.w = (ad.w || 0) + 1; ad.pts = (ad.pts || 0) + 3;
      hd.p = (hd.p || 0) + 1; hd.l = (hd.l || 0) + 1; hd.gd = (hd.gd || 0) - 3;
    }
  } else {
    hd.p = (hd.p || 0) + 1; hd.gs = (hd.gs || 0) + homeScore; hd.gc = (hd.gc || 0) + awayScore; hd.gd = (hd.gd || 0) + (homeScore - awayScore);
    ad.p = (ad.p || 0) + 1; ad.gs = (ad.gs || 0) + awayScore; ad.gc = (ad.gc || 0) + homeScore; ad.gd = (ad.gd || 0) + (awayScore - homeScore);
    if (homeScore > awayScore) { hd.w = (hd.w || 0) + 1; hd.pts = (hd.pts || 0) + 3; ad.l = (ad.l || 0) + 1; }
    else if (homeScore < awayScore) { ad.w = (ad.w || 0) + 1; ad.pts = (ad.pts || 0) + 3; hd.l = (hd.l || 0) + 1; }
    else { hd.d = (hd.d || 0) + 1; hd.pts = (hd.pts || 0) + 1; ad.d = (ad.d || 0) + 1; ad.pts = (ad.pts || 0) + 1; }
  }
  await database.ref(getSeasonPath(currentSeasonId, `table/${homeEntry.key}`)).set(hd);
  await database.ref(getSeasonPath(currentSeasonId, `table/${awayEntry.key}`)).set(ad);
}

async function loadSeasonsMetadata() {
  const snapshot = await database.ref('seasons').once('value');
  const seasons = snapshot.val() || {};
  availableSeasons = [];
  for (const key in seasons) {
    if (!key.startsWith('season_')) continue;
    const id = parseInt(key.split('_')[1]);
    if (!isNaN(id)) availableSeasons.push(id);
    if (seasons[key].active === true) activeSeasonId = id;
  }
  const season2Exists = availableSeasons.includes(2);
  const oldTable = await database.ref('premier_league/table').once('value');
  if (!season2Exists && oldTable.exists()) {
    const oldResults = await database.ref('premier_league/results').once('value');
    await database.ref('seasons/season_2/table').set(oldTable.val() || {});
    await database.ref('seasons/season_2/results').set(oldResults.val() || {});
    await database.ref('seasons/season_2/active').set(true);
    availableSeasons.push(2); activeSeasonId = 2;
  }
  if (!availableSeasons.includes(1)) { await database.ref('seasons/season_1/table').set({}); await database.ref('seasons/season_1/results').set({}); await database.ref('seasons/season_1/active').set(false); availableSeasons.push(1); }
  const migrationFlag = await database.ref('migrationDone').once('value');
  if (!migrationFlag.val()) {
    const oldScorers = await database.ref('topScorer/list').once('value');
    const oldAssists = await database.ref('topAssistant/list').once('value');
    if (oldScorers.exists()) await database.ref('seasons/season_3/topScorers/list').set(oldScorers.val());
    if (oldAssists.exists()) await database.ref('seasons/season_3/topAssistants/list').set(oldAssists.val());
    await database.ref('migrationDone').set(true);
  }
  availableSeasons.sort((a, b) => a - b);
  if (!availableSeasons.includes(activeSeasonId) && availableSeasons.length) activeSeasonId = availableSeasons[0];
  currentSeasonId = activeSeasonId;
  updateSeasonUI();
  await loadCurrentSeasonData();
  await loadManagerNamesForSeason();
}

async function renameSeason() {
  const raw = prompt(`New number for Season ${currentSeasonId}:`); if (!raw) return;
  const id = parseInt(raw); if (isNaN(id)) return;
  if (availableSeasons.includes(id) && id !== currentSeasonId) { alert("Number taken"); return; }
  const [t, r, m, ts, ta] = await Promise.all([
    database.ref(getSeasonPath(currentSeasonId, 'table')).once('value'),
    database.ref(getSeasonPath(currentSeasonId, 'results')).once('value'),
    database.ref(getSeasonPath(currentSeasonId, 'managerMap')).once('value'),
    database.ref(getSeasonPath(currentSeasonId, 'topScorers')).once('value'),
    database.ref(getSeasonPath(currentSeasonId, 'topAssistants')).once('value'),
  ]);
  const wasActive = activeSeasonId === currentSeasonId;
  await database.ref(getSeasonPath(id, 'table')).set(t.val() || {});
  await database.ref(getSeasonPath(id, 'results')).set(r.val() || {});
  await database.ref(getSeasonPath(id, 'managerMap')).set(m.val() || {});
  await database.ref(getSeasonPath(id, 'topScorers')).set(ts.val() || {});
  await database.ref(getSeasonPath(id, 'topAssistants')).set(ta.val() || {});
  if (wasActive) await database.ref(`seasons/season_${id}/active`).set(true);
  await database.ref(getSeasonPath(currentSeasonId)).remove();
  availableSeasons = availableSeasons.filter(s => s !== currentSeasonId);
  availableSeasons.push(id); availableSeasons.sort((a, b) => a - b);
  if (activeSeasonId === currentSeasonId) activeSeasonId = id;
  currentSeasonId = id; updateSeasonUI(); await loadCurrentSeasonData(); await loadManagerNamesForSeason(); await loadTopScorerData(); await loadTopAssistantData(); await loadManagerHistory(); renderCurrentTab();
}

function getResultStatusForTeam(team, matchText) {
  const lower = matchText.toLowerCase();
  if (lower.includes("no contest") || lower.includes("f - f")) return "F";
  const isForfeit = lower.includes("forfeit") || lower.includes("forfeited");
  const parts = matchText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/);
  if (parts) {
    let home = parts[1].trim(), hs = parseInt(parts[2]), as2 = parseInt(parts[3]), away = parts[4].trim();
    if (home === team && hs > as2) return isForfeit ? "WF" : "W";
    if (home === team && hs < as2) return isForfeit ? "LF" : "L";
    if (away === team && as2 > hs) return isForfeit ? "WF" : "W";
    if (away === team && as2 < hs) return isForfeit ? "LF" : "L";
    if ((home === team || away === team) && hs === as2) return "D";
  }
  return null;
}

function getTeamLast5(team) {
  const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a, b) => (b.md || 0) - (a.md || 0));
  const last5 = sorted.slice(0, 5).map(r => getResultStatusForTeam(team, r.matchText)).filter(Boolean);
  while (last5.length < 5) last5.push(null);
  return last5.reverse();
}

function getLatestArrow(team) {
  const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a, b) => (b.md || 0) - (a.md || 0));
  if (!sorted.length) return null;
  const s = getResultStatusForTeam(team, sorted[0].matchText);
  if (s === "W" || s === "WF") return "↑";
  if (s === "L" || s === "LF") return "↓";
  if (s === "D") return "→";
  return "⚪";
}

async function loadSlideshow() {
  const [imgSnap, durSnap] = await Promise.all([
    database.ref('slideshow/images').once('value'),
    database.ref('slideshow/duration').once('value'),
  ]);
  slideshowImages = imgSnap.val() || [];
  slideshowDuration = durSnap.val() || 3000;
  if (slideInterval) clearInterval(slideInterval);
  const imgEl = document.getElementById('slideshowImg');
  if (slideshowImages.length) {
    imgEl.style.display = 'block'; currentSlideIdx = 0; updateSlide();
    slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx + 1) % slideshowImages.length; updateSlide(); }, slideshowDuration);
  } else { imgEl.style.display = 'none'; }
}

function updateSlide() {
  const img = document.getElementById('slideshowImg');
  img.src = slideshowImages[currentSlideIdx];
  const dots = document.getElementById('dotsContainer');
  dots.innerHTML = '';
  slideshowImages.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === currentSlideIdx ? ' active' : '');
    d.onclick = () => { currentSlideIdx = i; updateSlide(); if (slideInterval) { clearInterval(slideInterval); slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx + 1) % slideshowImages.length; updateSlide(); }, slideshowDuration); } };
    dots.appendChild(d);
  });
}

function renderFixtures() {
  const premierFixtures = [];
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  for (const [dateStr, eventData] of Object.entries(calendarEventsData)) {
    if (!eventData || !eventData.tournaments) continue;
    for (const tournament of eventData.tournaments) {
      let isPremier = false;
      if (tournament.name) { const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, ''); if (normalized === 'premierleague') isPremier = true; }
      if (isPremier && tournament.fixtures && Array.isArray(tournament.fixtures)) {
        for (const fix of tournament.fixtures) { premierFixtures.push({ date: dateStr, tournament: tournament.name || 'Premier League', home: fix.home || '', away: fix.away || '' }); }
      }
    }
  }
  premierFixtures.sort((a, b) => { const da = new Date(a.date), db = new Date(b.date); const aFuture = da >= today, bFuture = db >= today; if (aFuture && bFuture) return da - db; if (!aFuture && !bFuture) return da - db; return aFuture ? -1 : 1; });
  const allTeams = [...new Set(premierFixtures.flatMap(f => [f.home, f.away]).filter(Boolean))].sort();
  const allMonths = [...new Set(premierFixtures.map(f => f.date.substring(0, 7)))].sort();
  let filtered = [...premierFixtures];
  if (currentFixTeamFilter && currentFixTeamFilter !== 'all') filtered = filtered.filter(f => f.home === currentFixTeamFilter || f.away === currentFixTeamFilter);
  if (currentFixMonthFilter && currentFixMonthFilter !== 'all') filtered = filtered.filter(f => f.date.startsWith(currentFixMonthFilter));
  const grouped = {};
  for (const fix of filtered) { if (!grouped[fix.date]) grouped[fix.date] = []; grouped[fix.date].push(fix); }
  const sortedDates = Object.keys(grouped).sort((a, b) => { const da = new Date(a), db = new Date(b); const aFuture = da >= today, bFuture = db >= today; if (aFuture && bFuture) return da - db; if (!aFuture && !bFuture) return da - db; return aFuture ? -1 : 1; });
  const monthLabels = { '01': 'January', '02': 'February', '03': 'March', '04': 'April', '05': 'May', '06': 'June', '07': 'July', '08': 'August', '09': 'September', '10': 'October', '11': 'November', '12': 'December' };
  let filtersHtml = `<div class="filters-bar"><div class="filter-group"><label>Team</label><select id="fixTeamFilter"><option value="all">All Teams</option>${allTeams.map(t => `<option value="${t}" ${currentFixTeamFilter === t ? 'selected' : ''}>${t}</option>`).join('')}</select></div><div class="filter-group"><label>Month</label><select id="fixMonthFilter"><option value="all">All Months</option>${allMonths.map(m => { const [y, mo] = m.split('-'); return `<option value="${m}" ${currentFixMonthFilter === m ? 'selected' : ''}>${monthLabels[mo] || mo} ${y}</option>`; }).join('')}</select></div><div class="filter-group"><button id="clearFixFiltersBtn" class="clear-filters">Clear Filters</button></div><div class="filter-stats">${filtered.length} fixture${filtered.length !== 1 ? 's' : ''} found</div><a href="manager-calendar.html" class="view-calendar-btn">📅 View Calendar</a></div>`;
  let contentHtml = '';
  if (sortedDates.length === 0) { contentHtml = '<div class="empty-state"><div class="empty-icon">📅</div><p>No Premier League fixtures found</p></div>'; }
  else {
    for (const dateStr of sortedDates) {
      const dateObj = new Date(dateStr);
      const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const dayName = dayNames[dateObj.getDay()];
      const day = dateObj.getDate();
      const [y, mo] = dateStr.split('-');
      const monthName = monthLabels[mo] || mo;
      const isPast = dateObj < today;
      const dateLabel = `${dayName}, ${day} ${monthName} ${y}${isPast ? ' · Played' : ''}`;
      contentHtml += `<div class="fixture-date-group"><div class="fixture-date-label">📅 ${dateLabel}</div>`;
      for (const fix of grouped[dateStr]) {

function parseResultCard(r) {
  let homeTeam = '', awayTeam = '', homeScore = '', awayScore = '', isForfeit = false, forfeitType = '';
  const text = r.matchText || '';
  const lower = text.toLowerCase();
  if (lower.includes('no contest') || lower.includes('f - f')) isForfeit = true;
  else if (lower.includes('forfeit')) isForfeit = true;
  if (isForfeit && text.includes('F - F')) {
    const parts = text.split(/\s*F\s*-\s*F\s*/i);
    if (parts.length >= 2) { homeTeam = parts[0].trim().replace(/\(.*\)/g, '').trim(); awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim(); homeScore = 'F'; awayScore = 'F'; }
    if (text.includes('No Contest')) forfeitType = 'No Contest';
    else if (text.includes('Forfeited - No Reply')) forfeitType = 'Forfeited - No Reply';
    else if (text.includes('Forfeited on Agreement')) forfeitType = 'Forfeited on Agreement';
    else forfeitType = 'Forfeit';
  } else {
    const match = text.match(/(\d+)\s*-\s*(\d+)/);
    if (match) {
      homeScore = match[1]; awayScore = match[2];
      const parts = text.split(/\s+\d+\s*-\s*\d+\s+/);
      if (parts.length >= 2) { homeTeam = parts[0].trim(); awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim(); }
      if (lower.includes('forfeited - no reply')) forfeitType = 'Forfeited - No Reply';
      else if (lower.includes('forfeited on agreement')) forfeitType = 'Forfeited on Agreement';
      else if (lower.includes('forfeit')) forfeitType = 'Forfeit';
    }
  }
  return { homeTeam, awayTeam, homeScore, awayScore, isForfeit, forfeitType, md: r.md };
}

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

function renderWatchMatch() {
  let html = '';
  if (watchMatchEmbedCode) { html = `<div class="inline-media"><div class="video-wrapper">${watchMatchEmbedCode}</div></div>`; }
  else { html = `<div class="empty-state"><div class="empty-icon">🎬</div><p>No match video available yet.</p></div>`; }
  if (isAdminMode) html += `<button class="add-btn-main" id="setWatchBtn">🎥 Update Match Video</button>`;
  document.getElementById('contentCard').innerHTML = html;
  if (isAdminMode) document.getElementById('setWatchBtn')?.addEventListener('click', updateWatchMatchEmbed);
}

async function updateWatchMatchEmbed() {
  const embed = prompt("Paste YouTube embed code (iframe) or full URL:", watchMatchEmbedCode);
  if (embed === null) return;
  let finalEmbed = embed.trim();
  if (finalEmbed.includes("youtube.com/watch?v=") || finalEmbed.includes("youtu.be/")) {
    let videoId = '';
    if (finalEmbed.includes("youtu.be/")) videoId = finalEmbed.split("youtu.be/")[1].split(/[?#]/)[0];
    else { const u = new URLSearchParams(new URL(finalEmbed).search); videoId = u.get('v'); }
    if (videoId) finalEmbed = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  }
  await database.ref('premier_league/watchMatch/embedCode').set(finalEmbed);
  watchMatchEmbedCode = finalEmbed;
  alert("Watch Match updated!");
  if (document.querySelector('.tab-btn.active')?.dataset.tab === 'watch') renderWatchMatch();
}

// ─── Modified renderCurrentTab with background save awareness ───
function renderCurrentTab(tabOverride) {
  const tab = tabOverride || document.querySelector('.tab-btn.active')?.dataset.tab || 'table';
  // If there are pending saves, queue the render and don't wipe content
  if (pendingSaves > 0) {
    pendingRenderTab = tab;
    return;
  }
  // Clear pendingRenderTab if any
  pendingRenderTab = null;
  document.getElementById('contentCard').innerHTML = '<div class="loading-spinner"><div class="spinner"></div><span>Loading…</span></div>';
  if (tab === 'table') renderTable();
  else if (tab === 'fixtures') renderFixtures();
  else if (tab === 'results') renderResults();
  else if (tab === 'topscorers') renderTopScorers();
  else if (tab === 'topassists') renderTopAssistants();
  else if (tab === 'watch') renderWatchMatch();
}

function formatResultText(homeTeam, homeScore, awayTeam, awayScore, forfeitType) {
  if (forfeitType === "no_contest") return `${homeTeam} F - F ${awayTeam} (No Contest)`;
  if (forfeitType === "forfeit_no_reply") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited - No Reply)`;
  if (forfeitType === "forfeit_agreement") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited on Agreement)`;
  return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`;
}

async function openResultForm(r) {
  editingResultKey = r?.key || null;

    const venue = document.getElementById('rVenue').value.trim();
    const matchType = document.getElementById('rType').value.trim();

      statusDiv.textContent = 'Error: ' + e.message;

    }
  };
}

  showModal(`<h3>⚙️ Admin Settings</h3><div class="settings-grid">
    <button class="settings-btn" id="setLogoBtn">🖼️ Upload Navbar Logo</button>
    <button class="settings-btn" id="setTableHeaderBtn">🏆 Upload Table Header Image</button>
    <button class="settings-btn" id="setBgBtn">🌄 Set Background Image</button>
    <button class="settings-btn" id="manageSlideBtn">🎞️ Manage Main Slideshow</button>
    <button class="settings-btn" id="addIconBtn">⚽ Add Team Icon</button>
    <button class="settings-btn" id="manageHeaderBgBtn">🖼️ Table Header Background (legacy)</button>
    <button class="settings-btn" id="setWatchBtnAdmin">🎥 Set Watch Match Embed</button>
    <!-- FEATURE 3 & 4: New buttons -->
    <button class="settings-btn" id="manageTeamNameMappingsBtn">🔁 Manage Team Name Mappings</button>
    <button class="settings-btn" id="manageTeamLogoMappingsBtn">🏷️ Manage Team Logo Mappings</button>
  </div><div class="modal-btns"><button class="modal-btn-cancel" id="closeAdminBtn" style="width:100%;">Close</button></div>`);
  document.getElementById('closeAdminBtn').onclick = closeModal;
  document.getElementById('setLogoBtn').onclick = uploadNavbarLogo;
  document.getElementById('setTableHeaderBtn').onclick = uploadTableHeaderImage;
  document.getElementById('setBgBtn').onclick = openBgCropTool;
  document.getElementById('manageSlideBtn').onclick = manageSlideshowUI;
  document.getElementById('addIconBtn').onclick = uploadTeamIcon;
  document.getElementById('manageHeaderBgBtn').onclick = uploadHeaderBgImage;
  document.getElementById('setWatchBtnAdmin').onclick = () => { closeModal(); updateWatchMatchEmbed(); };
  document.getElementById('manageTeamNameMappingsBtn').onclick = () => { closeModal(); openManageTeamNameMappingsModal(); };
  document.getElementById('manageTeamLogoMappingsBtn').onclick = () => { closeModal(); openManageTeamLogoMappingsModal(); };
}

async function uploadTableHeaderImage() {
  const file = await pickFile('image/*'); if (!file) return;
  try {
    const statusDiv = document.createElement('div'); statusDiv.className = 'status-msg status-loading'; statusDiv.textContent = 'Uploading…';
    document.getElementById('modalContent').appendChild(statusDiv);
    const url = await uploadToImgBB(file); await setTableHeaderImage(url);
    statusDiv.className = 'status-msg status-success'; statusDiv.textContent = 'Table Header Image updated!';
    setTimeout(closeModal, 1500);
  } catch(e) { alert('Upload failed: ' + e.message); }
}

async function openBgCropTool() {
  const file = await pickFile('image/*'); if (!file) return;
  const objectUrl = URL.createObjectURL(file);
  showModal(`<h3>🌄 Set Background Image</h3><div class="crop-container" id="cropContainer"><img class="crop-img" id="cropImg" src="${objectUrl}" draggable="false"></div><div class="crop-controls"><label>Zoom</label><input class="crop-slider" id="zoomSlider" type="range" min="0.5" max="2" step="0.01" value="1"><label>Horizontal Position</label><input class="crop-slider" id="posXSlider" type="range" min="0" max="100" step="1" value="50"><label>Vertical Position</label><input class="crop-slider" id="posYSlider" type="range" min="0" max="100" step="1" value="50"></div><div class="modal-btns"><button class="modal-btn-primary" id="applyCropBtn">Apply Background</button><button class="modal-btn-cancel" id="cancelCropBtn">Cancel</button></div>`);
  const img = document.getElementById('cropImg');
  const zoomSlider = document.getElementById('zoomSlider');
  const posXSlider = document.getElementById('posXSlider');
  const posYSlider = document.getElementById('posYSlider');
  let zoom = 1, posX = 50, posY = 50;
  function updatePreview() { const scale = zoom; const px = (posX / 100) * (1 - 1 / scale) * 100; const py = (posY / 100) * (1 - 1 / scale) * 100; img.style.transform = `scale(${scale}) translate(${px}%, ${py}%)`; }
  zoomSlider.oninput = () => { zoom = parseFloat(zoomSlider.value); updatePreview(); };
  posXSlider.oninput = () => { posX = parseFloat(posXSlider.value); updatePreview(); };
  posYSlider.oninput = () => { posY = parseFloat(posYSlider.value); updatePreview(); };
  img.onload = () => { updatePreview(); };
  document.getElementById('cancelCropBtn').onclick = () => { URL.revokeObjectURL(objectUrl); closeModal(); };
  document.getElementById('applyCropBtn').onclick = async () => {
    const btn = document.getElementById('applyCropBtn'); btn.disabled = true; btn.innerHTML = '<span class="btn-spinner"></span> Uploading...';
    try { const url = await uploadToImgBB(file); await setBackgroundImage(url, 'cover', `${posX}% ${posY}%`); btn.innerHTML = '✓ Applied!'; setTimeout(() => { closeModal(); URL.revokeObjectURL(objectUrl); }, 1000); }
    catch(e) { alert('Failed: ' + e.message); btn.disabled = false; btn.innerHTML = 'Apply Background'; }
  };
}

async function uploadNavbarLogo() {
  const file = await pickFile('image/*'); if (!file) return;
  try { const statusDiv = document.createElement('div'); statusDiv.className = 'status-msg status-loading'; statusDiv.textContent = 'Uploading…'; document.getElementById('modalContent').appendChild(statusDiv); const url = await uploadToImgBB(file); await database.ref('premier_league_navbar_logo').set(url); navbarLogoUrl = url; await loadNavbarLogo(); statusDiv.className = 'status-msg status-success'; statusDiv.textContent = 'Logo updated!'; setTimeout(closeModal, 1500); } catch(e) { alert('Upload failed: ' + e.message); }
}

async function uploadTeamIcon() {
  const teamName = prompt("Enter team name exactly as it appears:"); if (!teamName) return;
  const file = await pickFile('image/*'); if (!file) return;
  showModal(`<h3>Processing Icon</h3><div class="loading-spinner"><div class="spinner"></div><span>Removing background…</span></div>`);
  try { let transparentBlob; try { transparentBlob = await removeBackground(file); } catch(e) { transparentBlob = file; } const url = await uploadToImgBB(transparentBlob); await database.ref(`teamIcons/${teamName}`).set({ imageUrl: url, updatedAt: Date.now() }); teamIconsCache[teamName] = url; renderCurrentTab(); closeModal(); alert(`Icon saved for "${teamName}"!`); } catch(e) { alert('Failed: ' + e.message); closeModal(); }
}

async function uploadHeaderBgImage() {
  const file = await pickFile('image/*'); if (!file) return;
  try { const url = await uploadToImgBB(file); await database.ref('premier_league_table_header_bg').set(url); tableHeaderBgImageUrl = url; closeModal(); alert('Header background updated (legacy feature)'); } catch(e) { alert('Upload failed: ' + e.message); }
}

async function manageSlideshowUI() {
  const refresh = () => {
    let preview = '<div class="img-preview-grid">';
    slideshowImages.forEach((url, idx) => { preview += `<div class="preview-thumb"><img src="${url}"><span class="thumb-del" data-idx="${idx}" style="cursor:pointer;position:absolute;top:-10px;right:-10px;background:#ef4444;color:white;border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:bold;">✕</span></div>`; });
    preview += '</div>';
    showModal(`<h3>Manage Slideshow</h3>${preview}<label>Add New Slide</label><input type="file" id="newSlideFile" accept="image/*"><button class="add-btn-main" id="uploadSlideBtn" style="margin-top:12px;">+ Add Slide</button><label style="margin-top:20px;">Duration (seconds)</label><input type="number" id="slideDur" value="${slideshowDuration / 1000}" step="0.5" min="1" max="10"><div class="modal-btns"><button class="modal-btn-primary" id="saveDurBtn">Save Duration</button><button class="modal-btn-cancel" id="closeSlideBtn">Close</button></div><div id="slideStatus"></div>`);
    document.querySelectorAll('.thumb-del').forEach(btn => { btn.onclick = async () => { const idx = parseInt(btn.dataset.idx); slideshowImages.splice(idx, 1); await database.ref('slideshow/images').set(slideshowImages); await loadSlideshow(); refresh(); }; });
    document.getElementById('uploadSlideBtn').onclick = async () => { const file = document.getElementById('newSlideFile').files[0]; const statusDiv = document.getElementById('slideStatus'); if (!file) { statusDiv.innerHTML = '<div class="status-msg status-error">Select a file first</div>'; return; } try { statusDiv.innerHTML = '<div class="status-msg status-loading">Uploading…</div>'; const url = await uploadToImgBB(file); slideshowImages.push(url); await database.ref('slideshow/images').set(slideshowImages); await loadSlideshow(); refresh(); } catch(e) { statusDiv.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`; } };
    document.getElementById('saveDurBtn').onclick = async () => { let sec = parseFloat(document.getElementById('slideDur').value); if (isNaN(sec)) sec = 3; sec = Math.min(10, Math.max(1, sec)); await database.ref('slideshow/duration').set(sec * 1000); slideshowDuration = sec * 1000; await loadSlideshow(); document.getElementById('slideStatus').innerHTML = '<div class="status-msg status-success">Duration saved!</div>'; setTimeout(closeModal, 1000); };
    document.getElementById('closeSlideBtn').onclick = closeModal;
  };
  refresh();
}

function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
function closeMenu() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }
document.getElementById('menuBtn').onclick = toggleMenu;
document.getElementById('closeMenuBtn').onclick = closeMenu;
document.getElementById('overlay').onclick = closeMenu;
document.getElementById('homeBtn').onclick = () => window.location.href = 'feed.html';
document.getElementById('adminModeBtn').onclick = () => {
  const key = prompt("Enter admin key:");
  if (key === "admin@911") {
    isAdminMode = true; alert("Admin mode activated ✅");
    document.getElementById('seasonAdminPanel').style.display = 'flex';
    renderCurrentTab();
    if (!document.getElementById('adminSettingsItem')) {
      const item = document.createElement('div'); item.id = 'adminSettingsItem'; item.className = 'menu-item'; item.innerHTML = '⚙️ Admin Settings';
      item.onclick = () => { openAdminSettings(); closeMenu(); };
      document.getElementById('sideMenu').appendChild(item);
    }
  } else alert("Incorrect key");
};
document.getElementById('debugInfoBtn').onclick = () => { openDebugInfoModal(); closeMenu(); };

document.getElementById('prevSeasonBtn').onclick = () => switchSeason(-1);
document.getElementById('nextSeasonBtn').onclick = () => switchSeason(1);
document.getElementById('addSeasonBtn').onclick = () => isAdminMode && addNewSeason();
document.getElementById('renameSeasonBtn').onclick = () => isAdminMode && renameSeason();
document.getElementById('setActiveSeasonBtn').onclick = () => isAdminMode && setActiveSeason();

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCurrentTab();
  });
});

function attachRealtimeListeners() {
  database.ref(getSeasonPath(currentSeasonId, 'table')).on('value', snap => { teamsData = snap.val() ? Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })) : []; if (document.querySelector('.tab-btn.active')?.dataset.tab === 'table') renderTable(); });
  database.ref(getSeasonPath(currentSeasonId, 'results')).on('value', snap => { resultsData = snap.val() ? Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })) : []; const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab; if (activeTab === 'results') renderResults(); if (activeTab === 'table') renderTable(); });
  database.ref(getSeasonPath(currentSeasonId, 'topScorers/list')).on('value', async () => { await loadTopScorerData(); if (document.querySelector('.tab-btn.active')?.dataset.tab === 'topscorers') renderTopScorers(); });
  database.ref(getSeasonPath(currentSeasonId, 'topAssistants/list')).on('value', async () => { await loadTopAssistantData(); if (document.querySelector('.tab-btn.active')?.dataset.tab === 'topassists') renderTopAssistants(); });
  database.ref('calendarEvents').on('value', snap => { calendarEventsData = snap.val() || {}; if (document.querySelector('.tab-btn.active')?.dataset.tab === 'fixtures') renderFixtures(); });
}

// ─── INIT ───
async function init() {
  // Load all Firebase-based settings and data
  await loadBackgroundImage();
  await loadTableHeaderImage();
  await loadSlideshow();
  await loadTeamIcons();
  await loadNavbarLogo();
  await loadTableHeaderBgImage();
  await loadWatchMatchEmbed();
  await loadCalendarEvents();
  // FEATURE 3: Load team name mappings
  await loadTeamNameMappings();
  // FEATURE 4: Load team logo mappings
  await loadTeamLogoMappings();
  // FEATURE 7: Load manager history
  await loadManagerHistory();

  await loadSeasonsMetadata();
  await loadTopScorerData();
  await loadTopAssistantData();
  attachRealtimeListeners();
  renderCurrentTab();
}

init();
</script>
