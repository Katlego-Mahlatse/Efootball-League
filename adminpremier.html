
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            var designWidth = 1200;
            var screenWidth = window.screen.width;
            var scale = screenWidth / designWidth;
            scale = Math.min(1.0, Math.max(0.3, scale));
            var viewportMeta = document.createElement('meta');
            viewportMeta.name = 'viewport';
            viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
            document.head.appendChild(viewportMeta);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --electric-violet: #963CFF;
            --razzmatazz: #E90052;
            --valentino: #360D3A;
            --white: #ffffff;
            --deep-blue: #0A2B5E;
            --turquoise: #00CED1;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(150, 60, 255, 0.25);
            --glass-blur: blur(12px);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--deep-blue);
            min-height: 100vh;
            overflow-x: auto;
            min-width: 1200px;
            width: 1200px;
            margin: 0 auto;
            font-size: 20px;
            padding-bottom: 3rem;
            position: relative;
        }
        body.has-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: var(--bg-image);
            background-size: var(--bg-size, cover);
            background-position: var(--bg-pos, center);
            background-repeat: no-repeat;
            z-index: -2;
        }
        body.has-bg::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(10, 43, 94, 0.55);
            z-index: -1;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .navbar {
            background: linear-gradient(90deg, var(--deep-blue) 0%, var(--electric-violet) 50%, var(--razzmatazz) 100%);
            border-bottom: 2px solid var(--white);
            padding: 0 2rem;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
            animation: fadeInDown 0.5s ease both;
        }
        .navbar-logo {
            height: 74px;
            max-width: 260px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }
        .navbar-logo:hover {
            transform: scale(1.05);
        }
        .navbar-logo-placeholder {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: var(--white);
            cursor: pointer;
            font-weight: bold;
        }
        .menu-btn {
            background: var(--deep-blue);
            border: 2px solid var(--white);
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .menu-btn span {
            width: 32px;
            height: 4px;
            background: var(--white);
            border-radius: 4px;
            transition: all 0.3s;
        }
        .menu-btn:hover {
            background: var(--valentino);
            transform: rotate(90deg);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 199;
            display: none;
            backdrop-filter: blur(3px);
        }
        .overlay.active {
            display: block;
        }
        .side-menu {
            position: fixed;
            top: 0;
            right: -360px;
            width: 360px;
            height: 100%;
            background: rgba(54, 13, 58, 0.98);
            backdrop-filter: blur(20px);
            border-left: 2px solid var(--razzmatazz);
            z-index: 200;
            padding: 40px 28px;
            transition: right 0.35s cubic-bezier(.4, 0, .2, 1);
        }
        .side-menu.active {
            right: 0;
        }
        .close-menu {
            text-align: right;
            font-size: 2.8rem;
            cursor: pointer;
            color: var(--white);
            margin-bottom: 40px;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-menu:hover {
            color: var(--razzmatazz);
        }
        .menu-item {
            padding: 40px 28px;
            margin: 12px 0;
            border: 1px solid rgba(233, 0, 82, 0.3);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--white);
            transition: all 0.2s;
            font-family: 'Rajdhani', sans-serif;
        }
        .menu-item:hover {
            background: var(--razzmatazz);
            border-color: var(--white);
            color: var(--white);
            transform: translateX(8px);
        }

        .slideshow-wrapper {
            padding: 36px 36px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.7s ease 0.2s both;
        }
        .slideshow-frame {
            width: 100%;
            max-width: 1100px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(150, 60, 255, 0.25);
            border: 2px solid var(--razzmatazz);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slideshow-img {
            width: 100%;
            height: auto;
            max-height: 520px;
            object-fit: contain;
            display: block;
            transition: opacity 0.5s ease;
        }
        .dots-container {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(233, 0, 82, 0.3);
            cursor: pointer;
            transition: all 0.25s;
        }
        .dot.active {
            background: var(--razzmatazz);
            transform: scale(1.4);
            box-shadow: 0 0 12px rgba(233, 0, 82, 0.7);
        }

        .season-bar {
            display: flex;
            justify-content: center;
            margin: 24px 0 16px;
        }
        .season-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--turquoise);
            border: none;
            padding: 12px 32px;
            border-radius: 80px;
            backdrop-filter: blur(8px);
        }
        .season-arrow {
            background: transparent;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        #prevSeasonBtn {
            background: var(--razzmatazz);
        }
        #prevSeasonBtn:hover:not(:disabled) {
            background: #b8003f;
            transform: scale(1.1);
        }
        #nextSeasonBtn {
            background: var(--electric-violet);
        }
        #nextSeasonBtn:hover:not(:disabled) {
            background: #7a2be0;
            transform: scale(1.1);
        }
        .season-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .season-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: #000000;
            min-width: 180px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 4px 16px;
            border-radius: 40px;
        }
        .season-admin-btns {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }
        .season-admin-btn {
            background: rgba(150, 60, 255, 0.15);
            border: 1px solid var(--razzmatazz);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: var(--white);
            font-size: 1.1rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.2s;
        }
        .season-admin-btn:hover {
            background: var(--razzmatazz);
        }

        .tabs-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 28px 36px 0;
            background: linear-gradient(90deg, var(--razzmatazz), var(--electric-violet));
            border: 2px solid var(--white);
            border-radius: 80px;
            padding: 12px 20px;
            backdrop-filter: blur(8px);
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 0.5s ease 0.3s both;
        }
        .tabs-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent;
            border: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 10px 28px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            letter-spacing: 0.5px;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--electric-violet);
            color: #000000;
        }
        .tab-btn:hover:not(.active) {
            color: var(--white);
            background: rgba(255, 255, 255, 0.2);
        }

        .content-card {
            margin: 24px 36px 40px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px;
            min-height: 200px;
            animation: fadeInUp 0.5s ease 0.4s both;
        }

        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            gap: 24px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(233, 0, 82, 0.2);
            border-top-color: var(--razzmatazz);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-spinner span {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.4rem;
            font-family: 'Rajdhani', sans-serif;
        }
        .btn-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.4);
        }
        .empty-state .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .empty-state p {
            font-size: 2rem;
            font-weight: 500;
            font-family: 'Rajdhani', sans-serif;
        }

        .table-scroll-wrap {
            overflow-x: auto;
            border-radius: 20px;
            position: relative;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rajdhani', sans-serif;
            min-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            color: var(--white);
        }
        .stats-table thead th {
            background: rgba(150, 60, 255, 0.3);
            color: var(--white);
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 18px;
            border-bottom: 2px solid var(--razzmatazz);
            white-space: nowrap;
            z-index: 20;
        }
        .stats-table th:first-child,
        .stats-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 25;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            width: 64px;
            min-width: 64px;
        }
        .stats-table thead th:first-child {
            background: rgba(150, 60, 255, 0.3);
            z-index: 30;
        }
        .stats-table th:nth-child(2),
        .stats-table td:nth-child(2) {
            position: sticky;
            left: 64px;
            z-index: 24;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            box-shadow: 4px 0 8px -2px rgba(0, 0, 0, 0.45);
            border-right: 2px solid rgba(233, 0, 82, 0.35);
        }
        .stats-table thead th:nth-child(2) {
            background: rgba(150, 60, 255, 0.3);
            z-index: 30;
        }
        .stats-table tbody tr {
            border-bottom: 1px solid rgba(233, 0, 82, 0.2);
            transition: background 0.2s;
        }
        .stats-table tbody tr:hover {
            background: rgba(150, 60, 255, 0.15);
        }
        .stats-table td {
            padding: 14px 18px;
            color: var(--white);
            font-size: 1.3rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .stats-table td.stat-number {
            font-size: 2.6rem !important;
            font-weight: 800;
            line-height: 1.2;
        }
        .team-name-text {
            font-weight: 700;
            font-size: 2.8rem !important;
            color: var(--white);
        }
        .pts-cell {
            font-weight: 800;
            color: var(--white);
            font-size: 1.5rem;
        }
        .rank-cell {
            font-weight: 700;
            color: var(--white);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
        }

        .table-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(150, 60, 255, 0.3);
            border-radius: 20px 20px 0 0;
            border: 2px solid rgba(233, 0, 82, 0.2);
            border-bottom: 3px solid var(--razzmatazz);
            align-items: center;
        }
        .table-actions-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            color: var(--white);
            letter-spacing: 2px;
            flex: 1;
            display: flex;
            align-items: center;
        }
        .table-header-img {
            max-height: 60px;
            max-width: 260px;
            object-fit: contain;
        }
        .add-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid var(--razzmatazz);
            color: var(--white);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-btn:hover {
            background: var(--razzmatazz);
            color: var(--white);
            transform: translateY(-2px);
        }
        .three-dot-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid var(--razzmatazz);
            color: var(--white);
            font-size: 2.2rem;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .three-dot-btn:hover {
            background: var(--razzmatazz);
            color: var(--white);
        }

        .scan-img-btn {
            background: rgba(0, 206, 209, 0.2);
            border: 2px solid var(--turquoise);
            color: var(--white);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .scan-img-btn:hover {
            background: var(--turquoise);
            color: #000;
            transform: translateY(-2px);
        }

        .stats-list {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rajdhani', sans-serif;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            color: var(--white);
        }
        .stats-list thead th {
            background: rgba(150, 60, 255, 0.3);
            color: var(--white);
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 18px 22px;
            border-bottom: 2px solid var(--razzmatazz);
        }
        .stats-list tbody tr {
            border-bottom: 1px solid rgba(233, 0, 82, 0.2);
            transition: background 0.2s;
        }
        .stats-list tbody tr:hover {
            background: rgba(150, 60, 255, 0.15);
        }
        .stats-list td {
            padding: 18px 22px;
            color: var(--white);
            font-size: 1.4rem;
            font-weight: 600;
        }
        .stats-list td:first-child {
            color: var(--white);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            font-weight: bold;
        }
        .count-badge {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--razzmatazz);
            color: var(--white);
            padding: 6px 22px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.4rem;
        }
        .stat-team-cell {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--white);
        }

        .top3-container {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 40px;
            flex-wrap: nowrap;
            width: 100%;
        }
        .top3-block {
            position: relative;
            text-align: center;
            flex: 1;
            background: rgba(150, 60, 255, 0.2);
            border-radius: 0;
            padding: 0;
            transition: transform 0.3s;
            margin: 0;
            min-width: 0;
        }
        .top3-block:first-child {
            border-top-left-radius: 32px;
            border-bottom-left-radius: 32px;
        }
        .top3-block:last-child {
            border-top-right-radius: 32px;
            border-bottom-right-radius: 32px;
        }
        .top3-block:hover {
            transform: translateY(-8px);
            z-index: 5;
        }
        .player-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border: 3px solid var(--razzmatazz);
            background: var(--deep-blue);
            margin: 0;
            border-radius: 0;
        }
        .top3-block:first-child .player-image-wrapper {
            border-top-left-radius: 32px;
            border-bottom-left-radius: 32px;
        }
        .top3-block:last-child .player-image-wrapper {
            border-top-right-radius: 32px;
            border-bottom-right-radius: 32px;
        }
        .player-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .medal-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            font-size: 3rem;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
            z-index: 2;
        }
        .edit-block-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--razzmatazz);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.6rem;
            color: var(--white);
            transition: all 0.2s;
            z-index: 3;
        }
        .edit-block-btn:hover {
            background: var(--razzmatazz);
            transform: scale(1.1);
        }
        .player-name-overlay {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.3));
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            padding: 6px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            z-index: 2;
            letter-spacing: 0.5px;
            border-left: 3px solid var(--razzmatazz);
            pointer-events: none;
        }
        .team-icon-overlay {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 56px;
            height: 56px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            padding: 6px;
            z-index: 2;
        }
        .team-icon-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .top3-count {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: var(--razzmatazz);
            background: rgba(0, 0, 0, 0.3);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 60px;
            letter-spacing: 2px;
            margin-top: 12px;
            margin-bottom: 16px;
        }
        .rest-table-wrapper {
            margin-top: 20px;
            border-top: 2px solid var(--razzmatazz);
            padding-top: 24px;
            overflow-x: auto;
        }

        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(150, 60, 255, 0.2);
            border-radius: 28px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;

    <script>
        const RENDER_URL = 'https://efootball-league.onrender.com';

        // ─── DEBUG LOG SYSTEM ───
        const debugLogs = [];
        const MAX_DEBUG_LOGS = 500;

        function addDebugLog(level, msg, stack = null) {
            const entry = {
                time: new Date().toLocaleTimeString(),
                timestamp: Date.now(),
                level: level,
                message: msg,
                stack: stack
            };
            debugLogs.push(entry);
            if (debugLogs.length > MAX_DEBUG_LOGS) debugLogs.shift();
        }

        const origConsoleLog = console.log;
        const origConsoleError = console.error;
        const origConsoleWarn = console.warn;
        const origConsoleInfo = console.info;
        const origConsoleDebug = console.debug;

        console.log = function(...args) {
            origConsoleLog.apply(console, args);
            addDebugLog('info', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
        };
        console.error = function(...args) {
            origConsoleError.apply(console, args);
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
            const stack = args.find(a => a instanceof Error)?.stack || null;
            addDebugLog('error', msg, stack);
        };
        console.warn = function(...args) {
            origConsoleWarn.apply(console, args);
            addDebugLog('warn', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
        };
        console.info = function(...args) {
            origConsoleInfo.apply(console, args);
            addDebugLog('info', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
        };
        console.debug = function(...args) {
            origConsoleDebug.apply(console, args);
            addDebugLog('debug', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));

        async function scanMatchImages(images, statusEl) {
            const contentParts = [{
                type: 'text',
                text: `Analyze these football/soccer match screenshot(s) and extract the following information in JSON format only (no markdown, no explanation):
          {
            "homeTeam": "team name as shown in image",
            "awayTeam": "team name as shown in image",
            "homeScore": 0,
            "awayScore": 0,
            "homeScorers": [{"player": "name", "goals": 1}],
            "awayScorers": [{"player": "name", "goals": 1}],
            "homeAssists": [{"player": "name", "assists": 1}],
            "awayAssists": [{"player": "name", "assists": 1}],
            "matchday": null
          }
          Use team names EXACTLY as shown in the image. If you cannot find scorers or assists, return empty arrays. Return ONLY the JSON object.`
            }];

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">🖼️ Preparing images for AI analysis...</div>';

            for (const img of images) {
                const base64 = await fileToBase64(img.file);
                const mimeType = img.file.type || 'image/jpeg';
                contentParts.push({
                    type: 'image_url',
                    image_url: { url: `data:${mimeType};base64,${base64}` }
                });
            }

            if (statusEl) statusEl.innerHTML =
            '<div class="status-msg status-loading">🤖 Sending images to AI (this may take a moment)...</div>';

            const response = await fetch(RENDER_URL + '/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'meta-llama/llama-4-scout-17b-16e-instruct',
                    messages: [{ role: 'user', content: contentParts }],
                    max_tokens: 1000,
                    temperature: 0
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err?.error?.message || 'Scan API error');
            }

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">📖 Reading AI response...</div>';

            const data = await response.json();
            const text = data.choices?.[0]?.message?.content || '';
            const clean = text.replace(/```json|```/g, '').trim();
            const parsed = JSON.parse(clean);

            parsed.homeTeam = mapTeamName(parsed.homeTeam);
            parsed.awayTeam = mapTeamName(parsed.awayTeam);

            if (statusEl) statusEl.innerHTML =
                `<div class="status-msg status-success">✅ Teams identified: ${parsed.homeTeam} vs ${parsed.awayTeam}</div>`;

            return parsed;
        }

        async function confirmAndSaveAll() {
            const btn = document.getElementById('confirmAllScanBtn');
            const statusEl = document.getElementById('confirmSaveStatus');
            if (btn) { btn.disabled = true;
                btn.innerHTML = '<span class="btn-spinner"></span> Saving…'; }

            document.querySelectorAll('[data-field][data-idx]').forEach(el => {
                const idx = parseInt(el.dataset.idx);
                const field = el.dataset.field;
                if (idx >= previewMatches.length) return;
                let val = el.value;
                if (field === 'homeScore' || field === 'awayScore' || field === 'matchday') val = parseInt(val) || 0;
                previewMatches[idx][field] = val;
            });

            let savedCount = 0;
            const errors = [];

            for (const m of previewMatches) {
                if (!m.homeTeam || !m.awayTeam) { errors.push(`Match ${m.matchIdx}: teams missing`); continue; }
                if (m.homeTeam === m.awayTeam) { errors.push(`Match ${m.matchIdx}: same team on both sides`); continue; }

                try {
                    const hs = m.homeScore || 0;
                    const as2 = m.awayScore || 0;
                    const forfeit = m.forfeitType || 'none';
                    const matchText = formatResultText(m.homeTeam, hs, m.awayTeam, as2, forfeit === 'none' ? '' : forfeit);

                    const resultData = {
                        matchText,
                        md: m.matchday || 0,
                        ...(m.date && { date: m.date }),
                        ...(m.venue && { venue: m.venue }),
                        ...(m.matchType && { matchType: m.matchType }),
                        ...(m.aggregate && { aggregate: m.aggregate }),
                        goalScorers: { home: m.homeScorers || [], away: m.awayScorers || [] }
                    };

                    if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">💾 Saving result to database...</div>';
                    incrementPending();
                    await database.ref(getSeasonPath(currentSeasonId, 'results')).push(resultData);
                    if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">📊 Updating league table...</div>';
                    await applyResultToTable(m.homeTeam, m.awayTeam, hs, as2, forfeit === 'none' ? '' : forfeit);
                    if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">⚽ Updating top scorers...</div>';
                    await applyScorersFromScan(m.homeScorers || [], m.homeTeam);
                    await applyScorersFromScan(m.awayScorers || [], m.awayTeam);
                    if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">🎯 Updating top assistants...</div>';
                    await applyAssistsFromScan(m.homeAssists || [], m.homeTeam);
                    await applyAssistsFromScan(m.awayAssists || [], m.awayTeam);
                    decrementPending();

                    savedCount++;
                } catch (e) {
                    errors.push(`Match ${m.matchIdx}: ${e.message}`);
                }
            }

            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();

            if (errors.length) {
                if (statusEl) statusEl.innerHTML =
                    `<div class="status-msg status-error">Saved ${savedCount} match(es). Errors: ${errors.join('; ')}</div>`;
                if (btn) { btn.disabled = false;
                    btn.innerHTML = '✅ CONFIRM & SAVE ALL'; }
            } else {
                if (statusEl) statusEl.innerHTML =
                    `<div class="status-msg status-success">✅ ${savedCount} match(es) saved successfully!</div>`;
                multiScanMatches = [];
                closeModal();
                renderCurrentTab();
            }
        }

        function normalizeName(name) {
            return (name || '').toLowerCase().replace(/\s/g, '');
        }

        function findMatchingPlayer(list, playerName, teamName) {
            const pNorm = normalizeName(playerName);
            const tNorm = normalizeName(teamName);
            for (const item of list) {
                if (normalizeName(item.name) === pNorm && normalizeName(item.team) === tNorm) {
                    return item;
                }
            }
            return null;
        }

        async function applyScorersFromScan(scorers, team) {
            if (!scorers || !scorers.length) return;
            const path = getSeasonPath(currentSeasonId, 'topScorers/list');
            for (const s of scorers) {
                if (!s.player) continue;
                const existing = findMatchingPlayer(topScorerList, s.player, team);
                if (existing && existing.key) {
                    const newCount = (existing.count || 0) + (s.goals || 1);
                    incrementPending();
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                    decrementPending();
                } else {
                    incrementPending();
                    await database.ref(path).push({ name: s.player, team, count: s.goals || 1, imageUrl: '' });
                    decrementPending();
                }
            }
            await loadTopScorerData();
        }

        async function applyAssistsFromScan(assists, team) {
            if (!assists || !assists.length) return;
            const path = getSeasonPath(currentSeasonId, 'topAssistants/list');
            for (const a of assists) {
                if (!a.player) continue;
                const existing = findMatchingPlayer(topAssistantList, a.player, team);
                if (existing && existing.key) {
                    const newCount = (existing.count || 0) + (a.assists || 1);
                    incrementPending();
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                    decrementPending();
                } else {
                    incrementPending();
                    await database.ref(path).push({ name: a.player, team, count: a.assists || 1, imageUrl: '' });
                    decrementPending();
                }
            }
            await loadTopAssistantData();
        }

        async function scanStatImage(files, scanType, statusEl) {
            const contentParts = [];
            let prompt = '';
            if (scanType === 'scorer') {
                prompt =
                    `Analyze this football/soccer top scorers screenshot and extract the top scorer data in JSON format only (no markdown, no explanation):
          {"players": [{"name": "player name", "team": "team name", "goals": 0}]}
          Extract ALL players visible. Return ONLY the JSON object.`;
            } else {
                prompt =
                    `Analyze this football/soccer top assists screenshot and extract the top assistants data in JSON format only (no markdown, no explanation):
          {"players": [{"name": "player name", "team": "team name", "assists": 0}]}
          Extract ALL players visible. Return ONLY the JSON object.`;
            }
            contentParts.push({ type: 'text', text: prompt });

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">🖼️ Preparing images for AI analysis...</div>';

            for (const file of files) {
                const base64 = await fileToBase64(file);
                const mimeType = file.type || 'image/jpeg';
                contentParts.push({
                    type: 'image_url',
                    image_url: { url: `data:${mimeType};base64,${base64}` }
                });
            }

            if (statusEl) statusEl.innerHTML =
            '<div class="status-msg status-loading">🤖 Sending images to AI (this may take a moment)...</div>';

            const response = await fetch(RENDER_URL + '/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'meta-llama/llama-4-scout-17b-16e-instruct',
                    messages: [{ role: 'user', content: contentParts }],
                    max_tokens: 1000,
                    temperature: 0
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err?.error?.message || 'Scan API error');
            }

            if (statusEl) statusEl.innerHTML = '<div class="status-msg status-loading">📖 Reading AI response...</div>';

            const data = await response.json();
            const text = data.choices?.[0]?.message?.content || '';
            const clean = text.replace(/```json|```/g, '').trim();
            const parsed = JSON.parse(clean);

            if (parsed.players) {
                parsed.players = parsed.players.map(p => ({ ...p, team: mapTeamName(p.team) }));
            }

            if (statusEl) statusEl.innerHTML =
                `<div class="status-msg status-success">✅ ${parsed.players?.length || 0} player(s) detected</div>`;
            return parsed;
        }

        async function loadWatchMatchEmbed() {
            const oldSnap = await database.ref('premier_league/watchMatch/embedCode').once('value');

            if (oldEmbedCode) {
                watchMatchVideos = [{ id: 'legacy', title: 'Match Video', embedCode: oldEmbedCode }];

            const videosSnap = await database.ref('premier_league/watchMatch/videos').once('value');
            const videosData = videosSnap.val() || {};
            const newVideos = [];
            for (const key in videosData) {
                const video = videosData[key];
                if (video && video.embedCode) {
                    newVideos.push({ id: key, title: video.title || 'Match Video', embedCode: video.embedCode });
                }
            }

            if (newVideos.length > 0) {
                if (watchMatchVideos.length > 0 && watchMatchVideos[0].id === 'legacy') {
                    const existingIds = new Set(watchMatchVideos.map(v => v.id));
                    for (const v of newVideos) {
                        if (!existingIds.has(v.id)) {
                            watchMatchVideos.push(v);
                        }
                    }
                } else {
                    watchMatchVideos = newVideos;
                }
            }
        }

        async function addWatchMatchVideo(title, embedCode) {
            let finalEmbed = embedCode.trim();
            if (finalEmbed.includes("youtube.com/watch?v=") || finalEmbed.includes("youtu.be/")) {
                let videoId = '';
                if (finalEmbed.includes("youtu.be/")) videoId = finalEmbed.split("youtu.be/")[1].split(/[?#]/)[0];
                else { const u = new URLSearchParams(new URL(finalEmbed).search);
                    videoId = u.get('v'); }
                if (videoId) finalEmbed =
                    `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            }

            const videoData = { title: title.trim() || 'Match Video', embedCode: finalEmbed };
            const newRef = await database.ref('premier_league/watchMatch/videos').push(videoData);
            watchMatchVideos.push({ id: newRef.key, title: videoData.title, embedCode: videoData.embedCode });
            if (document.querySelector('.tab-btn.active')?.dataset.tab === 'watch') renderWatchMatch();
        }

        async function deleteWatchMatchVideo(videoId) {
            if (videoId === 'legacy') {
                await database.ref('premier_league/watchMatch/embedCode').remove();
                watchMatchVideos = watchMatchVideos.filter(v => v.id !== 'legacy');
            } else {
                await database.ref(`premier_league/watchMatch/videos/${videoId}`).remove();
                watchMatchVideos = watchMatchVideos.filter(v => v.id !== videoId);

            if (document.querySelector('.tab-btn.active')?.dataset.tab === 'watch') renderWatchMatch();
        }

        async function applyResultToTable(homeTeam, awayTeam, homeScore, awayScore, forfeitType) {
            const tableSnap = await database.ref(getSeasonPath(currentSeasonId, 'table')).once('value');
            const tableVal = tableSnap.val() || {};

            function findTeamEntry(name) {
                for (const [key, val] of Object.entries(tableVal)) {
                    if (val.name === name) return { key, data: { ...val } };
                }
                return null;
            }
            const homeEntry = findTeamEntry(homeTeam);
            const awayEntry = findTeamEntry(awayTeam);
            if (!homeEntry || !awayEntry) return;
            const hd = homeEntry.data;
            const ad = awayEntry.data;

            // No Contest: only increment games played, nothing else
            const isNoContest = forfeitType === 'no_contest';
            if (isNoContest) {
                hd.p = (hd.p || 0) + 1;
                ad.p = (ad.p || 0) + 1;
                await database.ref(getSeasonPath(currentSeasonId, `table/${homeEntry.key}`)).set(hd);
                await database.ref(getSeasonPath(currentSeasonId, `table/${awayEntry.key}`)).set(ad);
                return;
            }

            const isForfeitWin = forfeitType === 'forfeit_win' || forfeitType === 'forfeit_no_reply' || forfeitType === 'forfeit_agreement';
            if (isForfeitWin) {
                if (homeScore > awayScore || forfeitType === 'forfeit_win') {
                    // Home wins forfeit
                    hd.p = (hd.p || 0) + 1;
                    hd.w = (hd.w || 0) + 1;
                    hd.pts = (hd.pts || 0) + 3;
                    ad.p = (ad.p || 0) + 1;
                    ad.l = (ad.l || 0) + 1;
                    ad.gd = (ad.gd || 0) - 3;
                } else {
                    // Away wins forfeit
                    ad.p = (ad.p || 0) + 1;
                    ad.w = (ad.w || 0) + 1;
                    ad.pts = (ad.pts || 0) + 3;
                    hd.p = (hd.p || 0) + 1;
                    hd.l = (hd.l || 0) + 1;
                    hd.gd = (hd.gd || 0) - 3;
                }
                await database.ref(getSeasonPath(currentSeasonId, `table/${homeEntry.key}`)).set(hd);
                await database.ref(getSeasonPath(currentSeasonId, `table/${awayEntry.key}`)).set(ad);
                return;
            }

            // Normal result
            hd.p = (hd.p || 0) + 1;
            hd.gs = (hd.gs || 0) + homeScore;
            hd.gc = (hd.gc || 0) + awayScore;
            hd.gd = (hd.gd || 0) + (homeScore - awayScore);
            ad.p = (ad.p || 0) + 1;
            ad.gs = (ad.gs || 0) + awayScore;
            ad.gc = (ad.gc || 0) + homeScore;
            ad.gd = (ad.gd || 0) + (awayScore - homeScore);
            if (homeScore > awayScore) {
                hd.w = (hd.w || 0) + 1;
                hd.pts = (hd.pts || 0) + 3;
                ad.l = (ad.l || 0) + 1;
            } else if (homeScore < awayScore) {
                ad.w = (ad.w || 0) + 1;
                ad.pts = (ad.pts || 0) + 3;
                hd.l = (hd.l || 0) + 1;
            } else {
                hd.d = (hd.d || 0) + 1;
                hd.pts = (hd.pts || 0) + 1;
                ad.d = (ad.d || 0) + 1;
                ad.pts = (ad.pts || 0) + 1;
            }
            await database.ref(getSeasonPath(currentSeasonId, `table/${homeEntry.key}`)).set(hd);
            await database.ref(getSeasonPath(currentSeasonId, `table/${awayEntry.key}`)).set(ad);
        }

        async function reverseResultStats(resultData) {
            const { homeTeam, awayTeam, homeScore, awayScore, forfeitType } = parseResultCard(resultData);
            const isNoContest = forfeitType === 'No Contest' || forfeitType === 'no_contest';
            if (isNoContest) return;

            const tableSnap = await database.ref(getSeasonPath(currentSeasonId, 'table')).once('value');
            const tableVal = tableSnap.val() || {};

            function findTeamEntry(name) {
                for (const [key, val] of Object.entries(tableVal)) {
                    if (val.name === name) return { key, data: { ...val } };
                }
                return null;
            }

            const homeEntry = findTeamEntry(homeTeam);
            const awayEntry = findTeamEntry(awayTeam);
            if (!homeEntry || !awayEntry) return;

            const hd = homeEntry.data;
            const ad = awayEntry.data;

            const isForfeitWin = (forfeitType === 'Forfeited - No Reply' || forfeitType === 'forfeit_no_reply' ||
                forfeitType === 'Forfeited on Agreement' || forfeitType === 'forfeit_agreement' ||
                forfeitType === 'forfeit_win');

            if (isForfeitWin) {
                if (homeScore > awayScore) {
                    hd.p = Math.max(0, (hd.p || 0) - 1);
                    hd.w = Math.max(0, (hd.w || 0) - 1);
                    hd.pts = Math.max(0, (hd.pts || 0) - 3);
                    ad.p = Math.max(0, (ad.p || 0) - 1);
                    ad.l = Math.max(0, (ad.l || 0) - 1);
                    ad.gd = (ad.gd || 0) + 3;
                } else {
                    ad.p = Math.max(0, (ad.p || 0) - 1);
                    ad.w = Math.max(0, (ad.w || 0) - 1);
                    ad.pts = Math.max(0, (ad.pts || 0) - 3);
                    hd.p = Math.max(0, (hd.p || 0) - 1);
                    hd.l = Math.max(0, (hd.l || 0) - 1);
                    hd.gd = (hd.gd || 0) + 3;
                }
            } else {
                hd.p = Math.max(0, (hd.p || 0) - 1);
                hd.gs = Math.max(0, (hd.gs || 0) - homeScore);
                hd.gc = Math.max(0, (hd.gc || 0) - awayScore);
                hd.gd = (hd.gd || 0) - (homeScore - awayScore);

                ad.p = Math.max(0, (ad.p || 0) - 1);
                ad.gs = Math.max(0, (ad.gs || 0) - awayScore);
                ad.gc = Math.max(0, (ad.gc || 0) - homeScore);
                ad.gd = (ad.gd || 0) - (awayScore - homeScore);

                if (homeScore > awayScore) {
                    hd.w = Math.max(0, (hd.w || 0) - 1);
                    hd.pts = Math.max(0, (hd.pts || 0) - 3);
                    ad.l = Math.max(0, (ad.l || 0) - 1);
                } else if (homeScore < awayScore) {
                    ad.w = Math.max(0, (ad.w || 0) - 1);
                    ad.pts = Math.max(0, (ad.pts || 0) - 3);
                    hd.l = Math.max(0, (hd.l || 0) - 1);
                } else {
                    hd.d = Math.max(0, (hd.d || 0) - 1);
                    hd.pts = Math.max(0, (hd.pts || 0) - 1);
                    ad.d = Math.max(0, (ad.d || 0) - 1);
                    ad.pts = Math.max(0, (ad.pts || 0) - 1);
                }
            }

            await database.ref(getSeasonPath(currentSeasonId, `table/${homeEntry.key}`)).set(hd);
            await database.ref(getSeasonPath(currentSeasonId, `table/${awayEntry.key}`)).set(ad);

            const scorersHome = resultData.goalScorers?.home || [];
            const scorersAway = resultData.goalScorers?.away || [];
            for (const s of scorersHome) {
                await reverseScorerCount(s.player, homeTeam, s.goals || 1);
            }
            for (const s of scorersAway) {
                await reverseScorerCount(s.player, awayTeam, s.goals || 1);
            }

            const assistsHome = resultData.userAssists?.home || [];
            const assistsAway = resultData.userAssists?.away || [];
            for (const a of assistsHome) {
                await reverseAssistCount(a.player, homeTeam, a.assists || 1);
            }
            for (const a of assistsAway) {
                await reverseAssistCount(a.player, awayTeam, a.assists || 1);
            }
        }

        async function reverseScorerCount(playerName, team, count) {
            const path = getSeasonPath(currentSeasonId, 'topScorers/list');
            const existing = findMatchingPlayer(topScorerList, playerName, team);
            if (existing && existing.key) {
                const newCount = Math.max(0, (existing.count || 0) - count);
                if (newCount === 0) {
                    await database.ref(`${path}/${existing.key}`).remove();
                } else {
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                }
            }
            await loadTopScorerData();
        }

                } else {

                }

        }

        async function loadSeasonsMetadata() {
            const snapshot = await database.ref('seasons').once('value');
            const seasons = snapshot.val() || {};
            availableSeasons = [];
            for (const key in seasons) {
                if (!key.startsWith('season_')) continue;
                const id = parseInt(key.split('_')[1]);
                if (!isNaN(id)) availableSeasons.push(id);
                if (seasons[key].active === true) activeSeasonId = id;
            }
            const season2Exists = availableSeasons.includes(2);
            const oldTable = await database.ref('premier_league/table').once('value');
            if (!season2Exists && oldTable.exists()) {
                const oldResults = await database.ref('premier_league/results').once('value');
                await database.ref('seasons/season_2/table').set(oldTable.val() || {});
                await database.ref('seasons/season_2/results').set(oldResults.val() || {});
                await database.ref('seasons/season_2/active').set(true);
                availableSeasons.push(2);
                activeSeasonId = 2;
            }
            if (!availableSeasons.includes(1)) {
                await database.ref('seasons/season_1/table').set({});
                await database.ref('seasons/season_1/results').set({});

        function getResultStatusForTeam(team, matchText) {
            const lower = matchText.toLowerCase();
            if (lower.includes("no contest") || lower.includes("f - f")) return "F";
            const isForfeit = lower.includes("forfeit") || lower.includes("forfeited");
            const parts = matchText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/);
            if (parts) {
                let home = parts[1].trim(),
                    hs = parseInt(parts[2]),
                    as2 = parseInt(parts[3]),
                    away = parts[4].trim();
                if (home === team && hs > as2) return isForfeit ? "WF" : "W";
                if (home === team && hs < as2) return isForfeit ? "LF" : "L";
                if (away === team && as2 > hs) return isForfeit ? "WF" : "W";
                if (away === team && as2 < hs) return isForfeit ? "LF" : "L";
                if ((home === team || away === team) && hs === as2) return "D";
            }
            return null;
        }

        function getTeamLast5(team) {
            const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a, b) => (b.md || 0) - (a
            .md || 0));
            const last5 = sorted.slice(0, 5).map(r => getResultStatusForTeam(team, r.matchText)).filter(Boolean);
            while (last5.length < 5) last5.push(null);
            return last5.reverse();
        }

        function getLatestArrow(team) {
            const sorted = resultsData.filter(r => r.matchText && r.matchText.includes(team)).sort((a, b) => (b.md || 0) - (a
            .md || 0));
            if (!sorted.length) return null;
            const s = getResultStatusForTeam(team, sorted[0].matchText);
            if (s === "W" || s === "WF") return "↑";
            if (s === "L" || s === "LF") return "↓";
            if (s === "D") return "→";
            return "⚪";
        }

        function renderFixtures() {
            const premierFixtures = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            for (const [dateStr, eventData] of Object.entries(calendarEventsData)) {
                if (!eventData || !eventData.tournaments) continue;
                for (const tournament of eventData.tournaments) {
                    let isPremier = false;
                    if (tournament.name) { const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, '');
                        if (normalized === 'premierleague') isPremier = true; }
                    if (isPremier && tournament.fixtures && Array.isArray(tournament.fixtures)) {
                        for (const fix of tournament.fixtures) { premierFixtures.push({ date: dateStr, tournament: tournament
                                    .name || 'Premier League', home: fix.home || '', away: fix.away || '' }); }
                    }
                }
            }
            premierFixtures.sort((a, b) => { const da = new Date(a.date),
                    db = new Date(b.date); const aFuture = da >= today,
                    bFuture = db >= today; if (aFuture && bFuture) return da - db; if (!aFuture && !bFuture) return da -
                    db; return aFuture ? -1 : 1; });
            const allTeams = [...new Set(premierFixtures.flatMap(f => [f.home, f.away]).filter(Boolean))].sort();
            const allMonths = [...new Set(premierFixtures.map(f => f.date.substring(0, 7)))].sort();
            let filtered = [...premierFixtures];
            if (currentFixTeamFilter && currentFixTeamFilter !== 'all') filtered = filtered.filter(f => f.home ===
                currentFixTeamFilter || f.away === currentFixTeamFilter);
            if (currentFixMonthFilter && currentFixMonthFilter !== 'all') filtered = filtered.filter(f => f.date.startsWith(
                currentFixMonthFilter));
            const grouped = {};
            for (const fix of filtered) { if (!grouped[fix.date]) grouped[fix.date] = [];
                grouped[fix.date].push(fix); }
            const sortedDates = Object.keys(grouped).sort((a, b) => { const da = new Date(a),
                    db = new Date(b); const aFuture = da >= today,
                    bFuture = db >= today; if (aFuture && bFuture) return da - db; if (!aFuture && !bFuture) return da -
                    db; return aFuture ? -1 : 1; });
            const monthLabels = { '01': 'January', '02': 'February', '03': 'March', '04': 'April', '05': 'May',
                '06': 'June', '07': 'July', '08': 'August', '09': 'September', '10': 'October', '11': 'November',
                '12': 'December' };
            let filtersHtml =
                `<div class="filters-bar"><div class="filter-group"><label>Team</label><select id="fixTeamFilter"><option value="all">All Teams</option>${allTeams.map(t => `<option value="${t}" ${currentFixTeamFilter === t ? 'selected' : ''}>${t}</option>`).join('')}</select></div><div class="filter-group"><label>Month</label><select id="fixMonthFilter"><option value="all">All Months</option>${allMonths.map(m => { const [y, mo] = m.split('-'); return `<option value="${m}" ${currentFixMonthFilter === m ? 'selected' : ''}>${monthLabels[mo] || mo} ${y}</option>`; }).join('')}</select></div><div class="filter-group"><button id="clearFixFiltersBtn" class="clear-filters">Clear Filters</button></div><div class="filter-stats">${filtered.length} fixture${filtered.length !== 1 ? 's' : ''} found</div><a href="manager-calendar.html" class="view-calendar-btn">📅 View Calendar</a></div>`;
            let contentHtml = '';
            if (sortedDates.length === 0) {
                contentHtml = '<div class="empty-state"><div class="empty-icon">📅</div><p>No Premier League fixtures found</p></div>';
            } else {
                for (const dateStr of sortedDates) {
                    const dateObj = new Date(dateStr);
                    const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                    const dayName = dayNames[dateObj.getDay()];
                    const day = dateObj.getDate();
                    const [y, mo] = dateStr.split('-');
                    const monthName = monthLabels[mo] || mo;
                    const isPast = dateObj < today;
                    const dateLabel =
                        `${dayName}, ${day} ${monthName} ${y}${isPast ? ' · Played' : ''}`;
                    contentHtml += `<div class="fixture-date-group"><div class="fixture-date-label">📅 ${dateLabel}</div>`;
                    for (const fix of grouped[dateStr]) {
                        const homeIconHtml = getTeamIconHtml(fix.home, 'team-icon-lg');
                        const awayIconHtml = getTeamIconHtml(fix.away, 'team-icon-lg');
                        contentHtml +=
                            `<div class="fixture-card"><div class="fixture-tournament-label">🏆 ${escapeHtml(fix.tournament)}</div><div class="fixture-match-row"><div class="fixture-team-side">${homeIconHtml}<span class="fixture-team-name">${escapeHtml(fix.home)}</span></div><div class="fixture-vs">VS</div><div class="fixture-team-side">${awayIconHtml}<span class="fixture-team-name">${escapeHtml(fix.away)}</span></div></div></div>`;
                    }
                    contentHtml += `</div>`;
                }
            }
            document.getElementById('contentCard').innerHTML = filtersHtml + contentHtml;
            document.getElementById('fixTeamFilter')?.addEventListener('change', e => { currentFixTeamFilter = e.target.value;
                renderFixtures(); });
            document.getElementById('fixMonthFilter')?.addEventListener('change', e => { currentFixMonthFilter = e.target
                    .value;
                renderFixtures(); });
            document.getElementById('clearFixFiltersBtn')?.addEventListener('click', () => { currentFixTeamFilter = '';
                currentFixMonthFilter = '';
                renderFixtures(); });
        }

        function parseResultCard(r) {
            let homeTeam = '',
                awayTeam = '',
                homeScore = '',
                awayScore = '',
                isForfeit = false,
                forfeitType = '';
            const text = r.matchText || '';
            const lower = text.toLowerCase();
            if (lower.includes('no contest') || lower.includes('f - f')) isForfeit = true;
            else if (lower.includes('forfeit')) isForfeit = true;
            if (isForfeit && text.includes('F - F')) {
                const parts = text.split(/\s*F\s*-\s*F\s*/i);
                if (parts.length >= 2) { homeTeam = parts[0].trim().replace(/\(.*\)/g, '').trim();
                    awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim();
                    homeScore = 'F';
                    awayScore = 'F'; }
                if (text.includes('No Contest')) forfeitType = 'No Contest';
                else if (text.includes('Forfeited - No Reply')) forfeitType = 'Forfeited - No Reply';
                else if (text.includes('Forfeited on Agreement')) forfeitType = 'Forfeited on Agreement';
                else forfeitType = 'Forfeit';
            } else {
                const match = text.match(/(\d+)\s*-\s*(\d+)/);
                if (match) {
                    homeScore = match[1];
                    awayScore = match[2];
                    const parts = text.split(/\s+\d+\s*-\s*\d+\s+/);
                    if (parts.length >= 2) { homeTeam = parts[0].trim();
                        awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim(); }
                    if (lower.includes('forfeited - no reply')) forfeitType = 'Forfeited - No Reply';
                    else if (lower.includes('forfeited on agreement')) forfeitType = 'Forfeited on Agreement';
                    else if (lower.includes('forfeit')) forfeitType = 'Forfeit';
                }
            }
            return { homeTeam, awayTeam, homeScore, awayScore, isForfeit, forfeitType, md: r.md };
        }

            if (forfeitType === "forfeit_agreement") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited on Agreement)`;

        // ─── 24-HOUR THROTTLE CHECK ───
        async function canUserSubmitResult(managerKey) {
            const snap = await database.ref('managerKeys').orderByChild('key').equalTo(managerKey).once('value');
            const keys = snap.val();
            if (!keys) return { allowed: false, message: 'Invalid key' };

            const keyId = Object.keys(keys)[0];
            const keyData = keys[keyId];
            const lastSubmission = keyData.lastSubmissionTimestamp || null;

            if (!lastSubmission) {
                return { allowed: true, message: null };
            }

            const now = Date.now();
            const hoursAgo = (now - lastSubmission) / (1000 * 60 * 60);

            if (hoursAgo < 24) {
                const hoursRemaining = Math.ceil(24 - hoursAgo);
                const minutesRemaining = Math.ceil((24 - hoursAgo) * 60);
                return {
                    allowed: false,
                    message: `You can submit again in ${hoursRemaining} hour${hoursRemaining > 1 ? 's' : ''} and ${minutesRemaining % 60} minute${(minutesRemaining % 60) !== 1 ? 's' : ''}`
                };
            }

            return { allowed: true, message: null };
        }

        async function findManagerKeyId(managerKey) {
            const snap = await database.ref('managerKeys').orderByChild('key').equalTo(managerKey).once('value');
            const keys = snap.val();
            if (!keys) return null;
            return Object.keys(keys)[0];
        }

        // ─── SAST DAILY SUBMISSION COUNT ───
        async function getUserDailySubmissionCount(managerKey, sastDate) {
            const snap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
            const data = snap.val() || {};
            let count = 0;
            const submittedMds = [];
            for (const key in data) {
                const entry = data[key];
                if (entry.submittedBy === managerKey && entry.submittedAt) {
                    const entryDate = new Date(entry.submittedAt);
                    const entrySAST = new Date(entryDate.getTime() + (2 * 3600000));
                    const entryDateStr = entrySAST.toISOString().split('T')[0];
                    if (entryDateStr === sastDate) {
                        count++;
                        if (entry.md) submittedMds.push(entry.md);
                    }
                }
            }
            return { count, submittedMds };
        }

        async function validateDailyMatchLimit(managerKey, proposedMatchday) {
            const sastDate = getSASTDate();
            const { count, submittedMds } = await getUserDailySubmissionCount(managerKey, sastDate);

            if (count >= 2) {
                return { allowed: false, message: "You've reached your 2-match daily limit. Try again tomorrow." };
            }

            if (count === 1) {
                const existingMd = submittedMds[0];
                if (existingMd === proposedMatchday) {
                    return { allowed: false, message: "Your daily matches must be on different matchdays (one current, one previous)." };
                }
            }

            return { allowed: true, message: null };
        }

                    if (!opponent) {
                        status.innerHTML = '<div class="status-msg status-error">Please select an opponent.</div>';
                        return;

                    if (opponent === linkedTeam) {

                        return;

        // ─── TODAY / YESTERDAY SELECTION ───
        function openTodayYesterdayPopup(linkedTeam, managerKey, matchType) {
            const todayStr = getSASTToday();
            const yesterdayStr = getSASTYesterday();

            // Check if user already submitted today/yesterday for this type
            const checkExisting = async () => {
                const snap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
                const data = snap.val() || {};
                const todaySubmissions = [];
                const yesterdaySubmissions = [];
                for (const key in data) {
                    const entry = data[key];
                    if (entry.submittedBy === managerKey && entry.submittedAt) {
                        const entryDate = new Date(entry.submittedAt);
                        const entrySAST = new Date(entryDate.getTime() + (2 * 3600000));
                        const entryDateStr = entrySAST.toISOString().split('T')[0];
                        if (entryDateStr === todayStr) todaySubmissions.push(entry);
                        if (entryDateStr === yesterdayStr) yesterdaySubmissions.push(entry);
                    }
                }
                return { todaySubmissions, yesterdaySubmissions };
            };

            const render = async () => {
                const { todaySubmissions, yesterdaySubmissions } = await checkExisting();
                const todayLabel = todaySubmissions.length > 0 ? 'Edit results for today' : 'Add results for today';
                const yesterdayLabel = yesterdaySubmissions.length > 0 ? 'Edit results for yesterday — only for players on postponed games' :
                    'Add results for yesterday — only for players on postponed games';

            const data = snap.val() || {};
            const pendingArray = Object.entries(data).map(([key, val]) => ({ id: key, ...val }));

            if (pendingArray.length === 0) {
                showModal(`
              <h3>⏳ Pending Results</h3>
              <div class="empty-state"><div class="empty-icon">✅</div><p>No pending results to review.</p></div>
              <div class="modal-btns"><button class="modal-btn-cancel" id="closePendingEmptyBtn">Close</button></div>
            `);
                document.getElementById('closePendingEmptyBtn').onclick = closeModal;
                return;
            }

            // Group duplicates: same two teams (regardless of home/away order) + same matchday
            const grouped = [];
            const used = new Set();
            for (let i = 0; i < pendingArray.length; i++) {
                if (used.has(i)) continue;
                const a = pendingArray[i];
                const group = [a];
                used.add(i);
                for (let j = i + 1; j < pendingArray.length; j++) {
                    if (used.has(j)) continue;
                    const b = pendingArray[j];
                    const sameTeams = (
                        (a.homeTeam === b.homeTeam && a.awayTeam === b.awayTeam) ||
                        (a.homeTeam === b.awayTeam && a.awayTeam === b.homeTeam)
                    );
                    const sameMd = a.md && b.md && a.md === b.md;
                    if (sameTeams && sameMd) {
                        group.push(b);
                        used.add(j);
                    }
                }
                grouped.push(group);
            }

            let listHtml = '';
            for (const group of grouped) {
                const isDuplicate = group.length > 1;
                if (isDuplicate) {
                    listHtml += `
                <div style="border:2px solid #f97316;border-radius:24px;padding:20px;margin-bottom:20px;background:rgba(249,115,22,0.08);">

                    ⚠️ DUPLICATE SUBMISSIONS — Same Match, Same Matchday (approve ONE only)
                  </div>
                `;
                }
                for (const p of group) {
                    const isForfeit = p.matchType === 'forfeit' || (p.matchText && p.matchText.toLowerCase().includes('forfeit'));
                    const homeIcon = getTeamIconHtml(p.homeTeam || '');
                    const awayIcon = getTeamIconHtml(p.awayTeam || '');
                    const scoreDisplay = isForfeit ? 'F — F' : `${p.homeScore || 0} — ${p.awayScore || 0}`;

                    listHtml += `
                <div class="pending-item" style="${isDuplicate ? 'border-color:rgba(249,115,22,0.4);margin-bottom:10px;' : ''}">
                  <div class="pi-teams">
                    ${homeIcon}

                    ${awayIcon}
                    <span>${escapeHtml(p.awayTeam || '?')}</span>
                  </div>
                  <div class="pi-score">${scoreDisplay}</div>
                  <div class="pi-md">MD ${p.md || '?'}</div>
                  ${isForfeit ? '<span class="pi-badge">🚫 Forfeit</span>' : ''}
                  <div class="pi-actions">
                    <button class="btn-sm btn-edit pending-preview-btn" data-id="${p.id}" style="padding:8px 20px;font-size:1.1rem;">👁️</button>
                    <button class="btn-sm btn-confirm pending-approve-btn" data-id="${p.id}" style="padding:8px 20px;font-size:1.1rem;">✅</button>
                    <button class="btn-sm btn-delete pending-reject-btn" data-id="${p.id}" style="padding:8px 20px;font-size:1.1rem;">🗑️</button>
                  </div>
                </div>
              `;
                }
                if (isDuplicate) {
                    listHtml += `</div>`;
                }
            }

            showModal(`
            <h3>⏳ Pending Results <span style="font-size:1.2rem;color:rgba(255,255,255,0.4);">(${pendingArray.length})</span></h3>
            <div style="max-height:500px;overflow-y:auto;margin:12px 0;">
              ${listHtml}

            <div class="modal-btns"><button class="modal-btn-cancel" id="closePendingBtn">Close</button></div>
          `, true);

            document.getElementById('closePendingBtn').onclick = closeModal;

            document.querySelectorAll('.pending-preview-btn').forEach(btn => {

                    if (result) openPendingResultPreview(id, result);
                };
            });

            document.querySelectorAll('.pending-approve-btn').forEach(btn => {
                btn.onclick = async () => {

            document.querySelectorAll('.pending-reject-btn').forEach(btn => {

                    if (!result) return;

                    }

        async function approvePendingResult(pendingResultId, resultData) {
            const isForfeit = resultData.matchType === 'forfeit' || (resultData.matchText && resultData.matchText.toLowerCase()
                .includes('forfeit'));

            // Determine the correct forfeit type
            let forfeitType = resultData.forfeitType || (isForfeit ? 'forfeit_win' : '');

            // Build the result object for the results table
            const matchText = resultData.matchText || formatResultText(
                resultData.homeTeam || '',
                resultData.homeScore || 0,
                resultData.awayTeam || '',
                resultData.awayScore || 0,
                forfeitType
            );

            const resultEntry = {
                matchText: matchText,
                md: resultData.md || 0,
                date: resultData.date || '',
                venue: resultData.venue || '',
                matchType: resultData.matchType || '',
                aggregate: resultData.aggregate || '',
                goalScorers: resultData.goalScorers || { home: [], away: [] },
                userAssists: resultData.userAssists || { home: [], away: [] },
                userSubmitted: true,
                submittedBy: resultData.submittedBy || 'admin-approved',
                submittedAt: resultData.submittedAt || Date.now(),
                flagged: false,
                approvedAt: Date.now(),
                approvedBy: 'admin'
            };

            // Save to results
            incrementPending();
            await database.ref(getSeasonPath(currentSeasonId, 'results')).push(resultEntry);

            // Update table stats
            const homeScore = resultData.homeScore || 0;
            const awayScore = resultData.awayScore || 0;
            const homeTeam = resultData.homeTeam || '';
            const awayTeam = resultData.awayTeam || '';

            if (homeTeam && awayTeam) {
                await applyResultToTable(homeTeam, awayTeam, homeScore, awayScore, forfeitType);
            }

            // Update scorers
            const scorersHome = resultData.goalScorers?.home || [];
            const scorersAway = resultData.goalScorers?.away || [];
            if (scorersHome.length) await applyScorersFromScan(scorersHome, homeTeam);
            if (scorersAway.length) await applyScorersFromScan(scorersAway, awayTeam);

            // Update assists
            const assistsHome = resultData.userAssists?.home || [];
            const assistsAway = resultData.userAssists?.away || [];
            if (assistsHome.length) await applyAssistsFromScan(assistsHome, homeTeam);
            if (assistsAway.length) await applyAssistsFromScan(assistsAway, awayTeam);

            // Delete from pending
            await database.ref(getSeasonPath(currentSeasonId, `pending_results/${pendingResultId}`)).remove();
            decrementPending();

            // Reload data
            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();
        }

        async function rejectPendingResult(pendingResultId) {
            incrementPending();
            await database.ref(getSeasonPath(currentSeasonId, `pending_results/${pendingResultId}`)).remove();
            decrementPending();
        }
