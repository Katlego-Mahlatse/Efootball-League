<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, 'Inter', 'Roboto', sans-serif;
      padding-bottom: 2rem;
      font-size: 32px;
      min-width: 1200px;
      width: 1200px;
      margin: 0 auto;
    }
    
    /* Premier League Colors: Pink (#E90052) background, Purple (#38003C) text */
    :root {
      --pl-pink: #E90052;
      --pl-pink-light: #ff1a6e;
      --pl-purple: #38003C;
      --pl-purple-dark: #1a001c;
      --pl-white: #ffffff;
    }
    
    @keyframes pinkGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(233, 0, 82, 0.3), 0 0 40px rgba(233, 0, 82, 0.2); }
      50% { box-shadow: 0 0 40px rgba(233, 0, 82, 0.5), 0 0 60px rgba(233, 0, 82, 0.3); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* Navbar - Pink */
    .gold-navbar {
      background: var(--pl-pink);
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border-bottom: 2px solid var(--pl-purple);
    }

    .navbar-logo {
      height: 80px;
      max-width: 300px;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .navbar-logo:hover {
      transform: scale(1.05);
    }

    .navbar-logo-placeholder {
      height: 80px;
      width: 240px;
      background: var(--pl-purple-dark);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pl-pink);
      font-size: 1.4rem;
      font-weight: bold;
      border: 2px solid var(--pl-purple);
    }
    
    .hamburger-btn {
      background: var(--pl-purple);
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: 3px solid var(--pl-pink);
      transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }
    
    .hamburger-btn:hover { 
      transform: scale(1.1) rotate(90deg); 
      background: var(--pl-purple-dark);
      box-shadow: 0 0 30px rgba(233, 0, 82, 0.6);
    }
    
    .hamburger-btn span { 
      width: 36px; 
      height: 5px; 
      background: var(--pl-pink); 
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    
    /* Tabs Container */
    .premier-tabs {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 2rem 1rem;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.3);
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }
    
    .tab-btn {
      background: transparent;
      border: 2px solid var(--pl-pink);
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      cursor: pointer;
      color: var(--pl-white);
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }
    
    .tab-btn.active {
      background: var(--pl-pink);
      color: var(--pl-purple-dark);
      border-color: var(--pl-pink);
      box-shadow: 0 0 20px rgba(233, 0, 82, 0.5);
    }
    
    .tab-btn:hover:not(.active) {
      background: rgba(233, 0, 82, 0.2);
      transform: translateY(-2px);
    }
    
    /* Dashboard content area */
    .dashboard { 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 1rem 2rem 3rem;
      animation: fadeIn 0.6s ease;
    }
    
    .slideshow-container { 
      text-align: center; 
      margin-bottom: 2rem; 
      position: relative;
    }
    
    .slideshow-img { 
      max-width: 90%; 
      border-radius: 2rem; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
      border: 3px solid var(--pl-pink);
      transition: transform 0.3s ease;
      max-height: 600px;
      object-fit: contain;
      width: auto;
    }
    
    .slideshow-img:hover {
      transform: scale(1.02);
    }
    
    .dots-container { margin-top: 1.5rem; }
    
    .dot { 
      display: inline-block; 
      width: 16px; 
      height: 16px; 
      border-radius: 50%; 
      background: #1a1a1a; 
      margin: 0 8px; 
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .dot.active { 
      background: var(--pl-pink);
      transform: scale(1.3);
      box-shadow: 0 0 20px rgba(233, 0, 82, 0.6);
    }
    
    .dot:hover {
      transform: scale(1.2);
    }
    
    /* Cards - pink background, purple text */
    .card {
      background: var(--pl-pink);
      border-radius: 3rem;
      border: 2px solid var(--pl-purple);
      margin-bottom: 3rem;
      overflow: hidden;
      color: var(--pl-purple);
      transition: all 0.3s ease;
      animation: slideIn 0.5s ease;
      position: relative;
    }
    
    .card:hover {
      box-shadow: 0 0 50px rgba(233, 0, 82, 0.5);
    }

    .table-corner-image {
      width: 100px;
      height: 100px;
      object-fit: contain;
      border-radius: 24px;
    }
    
    /* Table header background image container */
    .card-header {
      padding: 1.5rem 2rem;
      background: var(--pl-pink);
      border-bottom: 3px solid var(--pl-purple);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.3s ease;
      position: relative;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    /* If background image is set, overlay semi-transparent to keep text readable */
    .card-header.has-bg-image {
      background-blend-mode: overlay;
      background-color: var(--pl-pink);
    }
    
    .card-header-left { 
      display: flex; 
      align-items: center; 
      gap: 1.5rem; 
      flex-wrap: wrap; 
      flex: 1;
    }
    
    .card-header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    
    .card-header-left h2 { 
      font-size: 2.5rem; 
      color: var(--pl-purple); 
      margin-right: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 1rem;
    }
    
    .season-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(0,0,0,0.2);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      transition: all 0.3s ease;
    }
    
    .season-controls:hover {
      background: rgba(0,0,0,0.3);
      box-shadow: 0 0 20px rgba(233, 0, 82, 0.3);
    }
    
    .season-arrow {
      background: var(--pl-purple);
      color: var(--pl-pink);
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 2rem;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    .season-arrow:hover { 
      background: var(--pl-purple-dark); 
      transform: scale(1.15);
      box-shadow: 0 0 20px rgba(233, 0, 82, 0.5);
    }
    
    .season-arrow:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    
    .season-number-input {
      font-weight: bold;
      font-size: 1.6rem;
      width: 180px;
      text-align: center;
      background: var(--pl-purple);
      border: 2px solid var(--pl-pink);
      border-radius: 60px;
      color: var(--pl-pink);
      padding: 0.5rem 1rem;
      transition: all 0.3s ease;
    }
    
    .season-number-input:focus {
      outline: none;
      box-shadow: 0 0 30px rgba(233, 0, 82, 0.6);
    }
    
    .season-admin-buttons {
      display: flex;
      gap: 1rem;
      margin-left: 1rem;
    }
    
    .season-admin-btn {
      background: var(--pl-purple);
      border: 2px solid var(--pl-pink);
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      color: var(--pl-pink);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .season-admin-btn:hover {
      background: var(--pl-pink);
      color: var(--pl-purple);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(233, 0, 82, 0.4);
    }
    
    .toggle-icon { 
      font-size: 1.8rem; 
      color: var(--pl-purple); 
      margin-left: 1.5rem;
      transition: transform 0.3s ease;
    }
    
    .add-btn {
      background: var(--pl-purple);
      border: none;
      border-radius: 3rem;
      padding: 0.7rem 2rem;
      color: var(--pl-pink);
      font-weight: bold;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .add-btn:hover { 
      background: var(--pl-purple-dark); 
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(233, 0, 82, 0.5);
    }
    
    .three-dot-menu {
      background: none;
      border: none;
      color: var(--pl-purple);
      font-size: 3rem;
      cursor: pointer;
      padding: 0 1rem;
      transition: all 0.3s ease;
    }
    
    .three-dot-menu:hover {
      transform: scale(1.2);
      color: var(--pl-purple-dark);
    }
    
    .card-content { 
      transition: max-height 0.4s ease, opacity 0.3s ease; 
      max-height: 6000px; 
      overflow: hidden;
      opacity: 1;
    }
    
    .card-content.collapsed { 
      max-height: 0;
      opacity: 0;
    }
    
    .filter-container { 
      padding: 1.5rem; 
      background: rgba(0,0,0,0.1); 
      border-bottom: 2px solid var(--pl-purple); 
    }
    
    .filter-input { 
      background: var(--pl-purple); 
      border: 2px solid var(--pl-pink); 
      border-radius: 60px; 
      padding: 1rem 1.5rem; 
      color: var(--pl-pink); 
      width: 100%; 
      max-width: 560px;
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }
    
    .filter-input:focus {
      outline: none;
      box-shadow: 0 0 30px rgba(233, 0, 82, 0.5);
    }
    
    .league-table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }
    
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px;
      font-size: 1.2rem;
      background: var(--pl-pink);
    }
    
    .stats-table th:first-child,
    .stats-table td:first-child {
      position: sticky;
      left: 0;
      background: var(--pl-pink);
      z-index: 10;
      padding-right: 12px;
    }
    
    .stats-table th:nth-child(2),
    .stats-table td:nth-child(2) {
      position: sticky;
      left: 80px;
      background: var(--pl-pink);
      z-index: 10;
      padding-right: 12px;
    }
    
    .stats-table th:nth-child(2)::after,
    .stats-table td:nth-child(2)::after {
      content: '';
      position: absolute;
      right: -3px;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--pl-purple);
      z-index: 15;
    }
    
    .stats-table th, .stats-table td {
      position: relative;
      padding: 1rem 0.8rem;
      text-align: left;
      border-bottom: 2px solid rgba(56, 0, 60, 0.3);
      background-color: var(--pl-pink);
      color: var(--pl-purple);
    }
    
    .stats-table th:first-child, .stats-table td:first-child { padding-left: 1rem; width: 80px; }
    .stats-table th:last-child, .stats-table td:last-child { padding-right: 1rem; }
    .inner-table th, .inner-table td { padding: 1rem 0.8rem; font-size: 1.1rem; }
    
    .stats-table th, .inner-table th { 
      background: rgba(56, 0, 60, 0.15); 
      border-bottom: 3px solid var(--pl-purple); 
      color: var(--pl-purple);
      font-weight: 700;
      font-size: 1.2rem;
    }
    
    .stats-table td, .inner-table td { 
      border-bottom: 2px solid rgba(56, 0, 60, 0.2); 
      color: var(--pl-purple); 
      vertical-align: middle;
      transition: background 0.2s ease;
      font-size: 1.1rem;
    }
    
    .stats-table tbody tr:hover td {
      background: rgba(56, 0, 60, 0.08);
    }
    
    /* Team icons - no circle, transparent */
    .team-icon-sm, .team-icon, .inline-team-icon {
      width: 56px;
      height: 56px;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 16px;
      display: inline-block;
      transition: transform 0.3s ease;
      background: transparent;
      border-radius: 0;
      border: none;
    }
    
    .inline-team-icon {
      width: 100px;
      height: 100px;
      margin: 0 16px;
    }
    
    .team-icon-sm:hover, .team-icon:hover, .inline-team-icon:hover {
      transform: scale(1.1);
    }
    
    .rank-cell { font-weight: 700; width: 80px; font-size: 1.2rem; color: var(--pl-purple); }
    
    .pos-with-bar { display: flex; align-items: center; gap: 8px; }
    
    .vertical-bar { 
      width: 8px; 
      height: 32px; 
      border-radius: 4px;
      transition: all 0.3s ease;
    }
    
    .blue-bar-vertical { background: #3b82f6; }
    .orange-bar-vertical { background: #f97316; }
    .green-bar-vertical { background: #22c55e; }
    .red-bar-vertical { background: #ef4444; }
    
    .dashed-separator-gold { border-bottom: 4px dashed var(--pl-purple) !important; }
    .dashed-separator-white { border-bottom: 4px dashed var(--pl-purple) !important; }
    .dashed-separator-red { border-bottom: 4px dashed #ef4444 !important; }
    
    .pts-cell { font-weight: 800; color: var(--pl-purple); text-align: center; font-size: 1.3rem; }
    
    .team-name { 
      display: flex; 
      align-items: center; 
      gap: 16px; 
      font-weight: 700;
      max-width: 400px;
      word-wrap: break-word;
      white-space: normal;
      font-size: 1.2rem;
      color: var(--pl-purple);
    }
    
    .form-circles { 
      display: flex; 
      gap: 8px; 
      align-items: center; 
      flex-wrap: wrap; 
    }
    
    .circle-result { 
      width: 36px; 
      height: 36px; 
      border-radius: 50%; 
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 18px; 
      font-weight: bold;
      transition: transform 0.2s ease;
    }
    
    .circle-result:hover {
      transform: scale(1.2);
    }
    
    .circle-win { background: #22c55e; color: white; }
    .circle-loss { background: #ef4444; color: white; }
    .circle-draw { background: #6b7280; color: white; }
    .circle-forfeit-win { background: #22c55e; color: white; }
    .circle-forfeit-loss { background: #ef4444; color: white; }
    .circle-forfeit-grey { background: #6b7280; color: white; }
    .circle-blank { background: #e5e7eb; }
    
    .arrow-up { color: #22c55e; font-size: 2rem; display: inline-block; width: 40px; text-align: center; }
    .arrow-down { color: #ef4444; font-size: 2rem; display: inline-block; width: 40px; text-align: center; }
    .arrow-side { color: var(--pl-purple); font-size: 2rem; display: inline-block; width: 40px; text-align: center; }
    
    .legend-under-table { 
      margin-top: 1.5rem; 
      padding: 1.2rem 2rem; 
      background: rgba(56, 0, 60, 0.1); 
      border-radius: 2rem; 
      display: flex; 
      gap: 2rem; 
      justify-content: center; 
      flex-wrap: wrap; 
      font-size: 1rem; 
    }
    
    .legend-item { display: inline-flex; align-items: center; gap: 10px; color: var(--pl-purple); }
    .legend-vertical-bar { width: 8px; height: 24px; border-radius: 4px; display: inline-block; }
    .legend-blue { background: #3b82f6; }
    .legend-orange { background: #f97316; }
    .legend-green { background: #22c55e; }
    .legend-red { background: #ef4444; }
    .legend-dashed-white { display: inline-block; width: 30px; height: 3px; border-bottom: 3px dashed var(--pl-purple); vertical-align: middle; }
    
    .forfeit-text { 
      font-size: 1rem; 
      color: var(--pl-purple); 
      margin-top: 8px; 
      background: rgba(255,255,255,0.5); 
      display: inline-block; 
      padding: 0 0.6rem; 
      border-radius: 24px; 
    }
    
    .edit-btn, .delete-btn { 
      background: var(--pl-purple); 
      border: 1px solid var(--pl-pink); 
      color: var(--pl-pink); 
      margin: 0 0.4rem; 
      cursor: pointer; 
      font-size: 1.2rem; 
      padding: 0.5rem 1rem; 
      border-radius: 40px; 
      transition: all 0.3s ease; 
    }
    
    .edit-btn:hover, .delete-btn:hover { 
      background: var(--pl-pink); 
      color: var(--pl-purple);
      transform: scale(1.1);
      box-shadow: 0 8px 24px rgba(233, 0, 82, 0.4);
    }
    
    .form-overlay {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.9);
      display: flex; 
      align-items: center; 
      justify-content: center; 
      visibility: hidden; 
      opacity: 0;
      z-index: 300;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    
    .form-overlay.active { 
      visibility: visible;
      opacity: 1;
    }
    
    .form-card { 
      background: var(--pl-pink); 
      border: 3px solid var(--pl-purple); 
      border-radius: 3rem; 
      padding: 2rem; 
      width: 90%; 
      max-width: 800px; 
      color: var(--pl-purple);
      animation: slideIn 0.4s ease;
      box-shadow: 0 20px 80px rgba(233, 0, 82, 0.5);
    }
    
    .form-card h3 {
      margin-bottom: 1.5rem;
      font-size: 2rem;
      color: var(--pl-purple);
    }
    
    .form-card input, .form-card select { 
      width: 100%; 
      padding: 1rem; 
      margin: 1rem 0; 
      background: var(--pl-purple); 
      border: 2px solid var(--pl-pink); 
      border-radius: 3rem; 
      color: var(--pl-pink);
      font-size: 1.2rem;
      transition: all 0.3s ease;
    }
    
    .form-card input:focus, .form-card select:focus {
      outline: none;
      box-shadow: 0 0 30px rgba(233, 0, 82, 0.6);
    }
    
    .form-card button { 
      background: var(--pl-purple); 
      border: none; 
      border-radius: 3rem; 
      padding: 1rem 2rem; 
      color: var(--pl-pink); 
      margin: 1rem 1rem 0 0; 
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: bold;
      transition: all 0.3s ease;
    }
    
    .form-card button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(233, 0, 82, 0.5);
    }
    
    .popup-menu {
      background: var(--pl-pink);
      border: 2px solid var(--pl-purple);
      border-radius: 2rem;
      padding: 1rem 0;
      z-index: 150;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      animation: slideIn 0.3s ease;
      font-size: 1.2rem;
      min-width: 220px;
    }
    
    .popup-menu div { 
      padding: 1rem 1.5rem; 
      cursor: pointer; 
      color: var(--pl-purple); 
      transition: all 0.2s ease; 
      font-weight: 600;
    }
    
    .popup-menu div:hover { 
      background: rgba(56, 0, 60, 0.2);
      transform: translateX(10px);
    }
    
    .results-table-wrapper {
      overflow-x: auto;
    }
    
    .results-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .results-table th, .results-table td {
      padding: 1rem;
      text-align: center;
      border-bottom: 1px solid rgba(56, 0, 60, 0.3);
      color: var(--pl-purple);
    }
    
    .result-match-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      padding: 0.8rem 0;
    }
    
    .result-score-text {
      font-size: 2.8rem;
      font-weight: bold;
      color: var(--pl-purple);
    }
    
    .image-preview-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 1.5rem 0;
      justify-content: center;
    }
    
    .image-preview-item {
      position: relative;
      width: 200px;
      height: 200px;
    }
    
    .image-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      border: 3px solid var(--pl-purple);
    }
    
    .delete-preview-btn {
      position: absolute;
      top: -12px;
      right: -12px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",

  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  const IMGBB_API_KEY = "81c24f30884ec6dda1dbd2b39739e0c9";

  // ---------- Season Management ----------
  let currentSeasonId = 2;
  let availableSeasons = [];
  let activeSeasonId = 2;
  let isAdminMode = false;

  let teamsData = [], resultsData = [];
  let teamIconsCache = {};
  let slideshowImages = [], slideshowDuration = 3000, slideInterval = null, currentSlideIdx = 0;
  let navbarLogoUrl = '';
  let tableCornerImageUrl = '';
  let watchMatchEmbedCode = '';
  let tableHeaderBgImageUrl = ''; // background image for card-header

  // Player map per season
  let playerMap = {};

  // Top scorer & assistant data
  let topScorerList = [];
  let topAssistantList = [];
  let topScorerSlideshowImages = [], topScorerSlideshowDuration = 3000, topScorerInterval = null, topScorerSlideIdx = 0;
  let topAssistantSlideshowImages = [], topAssistantSlideshowDuration = 3000, topAssistantInterval = null, topAssistantSlideIdx = 0;

  function getSeasonPath(seasonNum, subPath = "") {
    return `seasons/season_${seasonNum}${subPath ? "/" + subPath : ""}`;
  }

  // Load navbar logo
  async function loadNavbarLogo() {
    const snap = await database.ref('premier_league_navbar_logo').once('value');
    navbarLogoUrl = snap.val() || '';
    renderNavbarLogo();
  }

  function renderNavbarLogo() {
    const container = document.getElementById('navbarLogoContainer');
    if (navbarLogoUrl) {
      container.innerHTML = `<img src="${navbarLogoUrl}" class="navbar-logo" alt="Premier League Logo">`;
    } else {
      container.innerHTML = '<div class="navbar-logo-placeholder">PL LOGO</div>';
    }
  }

  async function loadTableCornerImage() {
    const snap = await database.ref('premier_league_table_corner').once('value');
    tableCornerImageUrl = snap.val() || '';
    renderTableCornerImage();
  }

  function renderTableCornerImage() {
    const container = document.getElementById('tableCornerImageContainer');
    if (container) {
      if (tableCornerImageUrl) {
        container.innerHTML = `<img src="${tableCornerImageUrl}" class="table-corner-image" alt="Corner Image">`;
      } else {
        container.innerHTML = '';
      }
    }
  }

  // Load table header background image
  async function loadTableHeaderBgImage() {
    const snap = await database.ref('premier_league_table_header_bg').once('value');
    tableHeaderBgImageUrl = snap.val() || '';
    applyTableHeaderBg();
  }

  function applyTableHeaderBg() {
    const header = document.querySelector('.card-header');
    if (header && tableHeaderBgImageUrl) {
      header.style.backgroundImage = `url(${tableHeaderBgImageUrl})`;
      header.classList.add('has-bg-image');
    } else if (header) {
      header.style.backgroundImage = 'none';
      header.classList.remove('has-bg-image');
    }
  }

  // Watch Match embed
  async function loadWatchMatchEmbed() {
    const snap = await database.ref('premier_league/watchMatch/embedCode').once('value');
    watchMatchEmbedCode = snap.val() || '';
  }

  async function updateWatchMatchEmbed() {
    const embed = prompt("Paste YouTube embed code (iframe) or full URL:", watchMatchEmbedCode);
    if (embed === null) return;
    let finalEmbed = embed.trim();
    if (finalEmbed.includes("youtube.com/watch?v=") || finalEmbed.includes("youtu.be/")) {
      let videoId = "";
      if (finalEmbed.includes("youtu.be/")) {
        videoId = finalEmbed.split("youtu.be/")[1].split(/[?#]/)[0];
      } else {
        const urlParams = new URLSearchParams(new URL(finalEmbed).search);
        videoId = urlParams.get('v');
      }
      if (videoId) {
        finalEmbed = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
      }
    }
    await database.ref('premier_league/watchMatch/embedCode').set(finalEmbed);
    watchMatchEmbedCode = finalEmbed;
    alert("Watch Match content updated!");
    if (document.querySelector('.tab-btn.active')?.dataset.tab === 'watch') renderWatchMatchTab();
  }

  async function loadSeasonsMetadata() {
    const snapshot = await database.ref('seasons').once('value');
    const seasons = snapshot.val() || {};
    availableSeasons = [];
    for (const key in seasons) {
      if (key.startsWith('season_')) {
        const id = parseInt(key.split('_')[1]);
        if (!isNaN(id)) availableSeasons.push(id);
        if (seasons[key].active === true) activeSeasonId = id;
      }
    }
    const season2Exists = availableSeasons.includes(2);
    const oldTable = await database.ref('premier_league/table').once('value');
    if (!season2Exists && (oldTable.exists() || true)) {
      const oldResults = await database.ref('premier_league/results').once('value');
      await database.ref('seasons/season_2/table').set(oldTable.val() || {});
      await database.ref('seasons/season_2/results').set(oldResults.val() || {});
      await database.ref('seasons/season_2/active').set(true);
      if (!availableSeasons.includes(2)) availableSeasons.push(2);
      activeSeasonId = 2;
    }
    if (!availableSeasons.includes(1)) {
      await database.ref('seasons/season_1/table').set({});
      await database.ref('seasons/season_1/results').set({});
      await database.ref('seasons/season_1/active').set(false);
      availableSeasons.push(1);
    }
    availableSeasons.sort((a,b)=>a-b);
    if (availableSeasons.indexOf(activeSeasonId) === -1 && availableSeasons.length) activeSeasonId = availableSeasons[0];
    currentSeasonId = activeSeasonId;
    updateSeasonDisplay();
    await loadCurrentSeasonData();
    await loadManagerNamesForSeason();
  }

  function updateSeasonDisplay() {
    const seasonInput = document.getElementById('seasonNumberInput');
    if (seasonInput) seasonInput.value = `Season ${currentSeasonId}`;
    const prevBtn = document.getElementById('prevSeasonBtn');
    const nextBtn = document.getElementById('nextSeasonBtn');
    const idx = availableSeasons.indexOf(currentSeasonId);
    if (prevBtn) prevBtn.disabled = availableSeasons.length === 0 || idx <= 0;
    if (nextBtn) nextBtn.disabled = availableSeasons.length === 0 || idx >= availableSeasons.length-1;
    const adminDiv = document.getElementById('seasonAdminButtons');
    if (adminDiv) adminDiv.style.display = isAdminMode ? 'flex' : 'none';
  }

  async function switchSeason(delta) {
    const idx = availableSeasons.indexOf(currentSeasonId);
    const newIdx = idx + delta;
    if (newIdx >= 0 && newIdx < availableSeasons.length) {
      currentSeasonId = availableSeasons[newIdx];
      updateSeasonDisplay();
      await loadCurrentSeasonData();
      await loadManagerNamesForSeason();
      renderCurrentTab();
    }
  }

  async function goToSeason(seasonNum) {
    seasonNum = parseInt(seasonNum);
    if (isNaN(seasonNum)) return;
    if (availableSeasons.includes(seasonNum)) {
      currentSeasonId = seasonNum;
      updateSeasonDisplay();
      await loadCurrentSeasonData();
      await loadManagerNamesForSeason();
      renderCurrentTab();
    } else if (isAdminMode && confirm(`Season ${seasonNum} does not exist. Create it?`)) {
      await database.ref(`seasons/season_${seasonNum}/table`).set({});
      await database.ref(`seasons/season_${seasonNum}/results`).set({});
      await database.ref(`seasons/season_${seasonNum}/managerMap`).set({});
      availableSeasons.push(seasonNum);
      availableSeasons.sort((a,b)=>a-b);
      currentSeasonId = seasonNum;
      updateSeasonDisplay();
      await loadCurrentSeasonData();
      await loadManagerNamesForSeason();
      renderCurrentTab();
    } else {
      alert(`Season ${seasonNum} does not exist.`);
    }
  }

  async function loadCurrentSeasonData() {
    const tableSnap = await database.ref(getSeasonPath(currentSeasonId, 'table')).once('value');
    const resultsSnap = await database.ref(getSeasonPath(currentSeasonId, 'results')).once('value');
    teamsData = tableSnap.val() ? Object.entries(tableSnap.val()).map(([k,v])=>({key:k,...v})) : [];
    resultsData = resultsSnap.val() ? Object.entries(resultsSnap.val()).map(([k,v])=>({key:k,...v})) : [];
    renderLeagueTable(); 
    renderResults();
  }

  async function loadManagerNamesForSeason() {
    const snap = await database.ref(getSeasonPath(currentSeasonId, 'managerMap')).once('value');
    playerMap = snap.val() || {};
    renderLeagueTable();
  }

  async function addNewSeason() {
    let newId = prompt("Enter season number (e.g., 10):");
    if (!newId) return;
    newId = parseInt(newId);
    if (isNaN(newId)) { alert("Invalid number"); return; }
    if (availableSeasons.includes(newId)) { alert("Season already exists"); return; }
    await database.ref(`seasons/season_${newId}/table`).set({});
    await database.ref(`seasons/season_${newId}/results`).set({});
    await database.ref(`seasons/season_${newId}/managerMap`).set({});
    availableSeasons.push(newId);
    availableSeasons.sort((a,b)=>a-b);
    currentSeasonId = newId;
    updateSeasonDisplay();
    await loadCurrentSeasonData();
    await loadManagerNamesForSeason();
    renderCurrentTab();
  }

  async function renameSeason() {
    let seasonList = availableSeasons.map(s => `Season ${s}`).join(', ');
    let oldNum = prompt(`Enter current season number to rename (existing: ${seasonList}):`);
    if (!oldNum) return;
    oldNum = parseInt(oldNum);
    if (!availableSeasons.includes(oldNum)) { alert("Season not found"); return; }
    let newNum = prompt(`Enter new season number for Season ${oldNum}:`);
    if (!newNum) return;
    newNum = parseInt(newNum);
    if (isNaN(newNum)) { alert("Invalid number"); return; }
    if (availableSeasons.includes(newNum) && newNum !== oldNum) { alert("A season with that number already exists"); return; }
    const oldTable = await database.ref(getSeasonPath(oldNum, 'table')).once('value');
    const oldResults = await database.ref(getSeasonPath(oldNum, 'results')).once('value');
    const oldManager = await database.ref(getSeasonPath(oldNum, 'managerMap')).once('value');
    const wasActive = (activeSeasonId === oldNum);
    await database.ref(getSeasonPath(newNum, 'table')).set(oldTable.val() || {});
    await database.ref(getSeasonPath(newNum, 'results')).set(oldResults.val() || {});
    await database.ref(getSeasonPath(newNum, 'managerMap')).set(oldManager.val() || {});
    if (wasActive) await database.ref(`seasons/season_${newNum}/active`).set(true);
    await database.ref(getSeasonPath(oldNum)).remove();
    availableSeasons = availableSeasons.filter(s => s !== oldNum);
    availableSeasons.push(newNum);
    availableSeasons.sort((a,b)=>a-b);
    if (currentSeasonId === oldNum) currentSeasonId = newNum;
    if (activeSeasonId === oldNum) activeSeasonId = newNum;
    updateSeasonDisplay();
    await loadCurrentSeasonData();
    await loadManagerNamesForSeason();
    renderCurrentTab();
    alert(`Season renamed from ${oldNum} to ${newNum}`);
  }

  async function setActiveSeason() {
    const updates = {};
    for (let sid of availableSeasons) {
      updates[`seasons/season_${sid}/active`] = (sid === currentSeasonId);
    }
    await database.ref().update(updates);
    activeSeasonId = currentSeasonId;
    alert(`Season ${currentSeasonId} set as active.`);
  }

  async function loadTeamIcons() {
    const snapshot = await database.ref('teamIcons').once('value');
    const data = snapshot.val() || {};
    for (const [team, value] of Object.entries(data)) {
      if (value.imageUrl) teamIconsCache[team] = value.imageUrl;
    }
    renderLeagueTable(); 
    renderResults();
  }

  function getTeamIconHtml(team, className = "team-icon-sm") {
    const url = teamIconsCache[team];
    return url ? `<img class="${className}" src="${url}" alt="${team}" onerror="this.style.display='none';">` : '';
  }

  function getResultStatusForTeam(team, matchText) {
    const lower = matchText.toLowerCase();
    if (lower.includes("no contest") || lower.includes("f - f")) return "F";
    const isForfeit = lower.includes("forfeit") || lower.includes("forfeited");
    const parts = matchText.match(/([A-Za-z\s]+?)\s+(\d+)\s*[-–]\s*(\d+)\s+([A-Za-z\s]+)/);
    if (parts) {
      let home = parts[1].trim(), hScore = parseInt(parts[2]), aScore = parseInt(parts[3]), away = parts[4].trim();
      if (home === team && hScore > aScore) return isForfeit ? "WF" : "W";
      if (home === team && hScore < aScore) return isForfeit ? "LF" : "L";
      if (away === team && aScore > hScore) return isForfeit ? "WF" : "W";
      if (away === team && aScore < hScore) return isForfeit ? "LF" : "L";
      if ((home === team || away === team) && hScore === aScore) return "D";
    }
    return null;
  }

  function getTeamLast5(team) {
    const teamResults = resultsData.filter(r => r.matchText.includes(team)).sort((a,b) => (b.md||0) - (a.md||0));
    const last5 = teamResults.slice(0,5).map(r => getResultStatusForTeam(team, r.matchText)).filter(s => s);
    while(last5.length < 5) last5.push(null);
    return last5.reverse();
  }

  function getLatestArrow(team) {
    const teamResults = resultsData.filter(r => r.matchText.includes(team)).sort((a,b) => (b.md||0) - (a.md||0));
    if(!teamResults.length) return null;
    const status = getResultStatusForTeam(team, teamResults[0].matchText);
    if(status === "W" || status === "WF") return "↑";
    if(status === "L" || status === "LF") return "↓";
    if(status === "D") return "→";
    if(status === "F") return "⚪";
    return null;
  }

  let showFormArrows = false;
  let showLast5 = true;
  let currentView = "team";

  function renderLegend() {
    const container = document.getElementById('legendContainer');
    if (!container) return;
    let legendHtml = '<div style="display:flex; flex-wrap:wrap; gap:1.5rem; justify-content:center;">';
    if (currentSeasonId === 1) {
      legendHtml += '<span class="legend-item"><span class="legend-vertical-bar legend-blue"></span><span>UEFA Champions League</span></span>';
    } else if (currentSeasonId === 2) {
      legendHtml += '<span class="legend-item"><span class="legend-vertical-bar legend-blue"></span><span>UEFA Champions League</span></span>';
      legendHtml += '<span class="legend-item"><span class="legend-vertical-bar legend-orange"></span><span>Europa League</span></span>';
      legendHtml += '<span class="legend-item"><span class="legend-dashed-white"></span><span>FIFA Club World Cup</span></span>';

  function renderResults() {
    const tbody = document.getElementById('resultsBody'); 
    if(!tbody) return;
    const actionHeader = document.getElementById('resultActionHeader');
    if(actionHeader) actionHeader.style.display = isAdminMode ? 'table-cell' : 'none';
    tbody.innerHTML = '';
    const resultsTable = document.getElementById('resultsTable');
    if (resultsTable) {
      if (!isAdminMode) {
        resultsTable.classList.add('no-admin-mode');
      } else {
        resultsTable.classList.remove('no-admin-mode');
      }
    }
    const sortedResults = [...resultsData].sort((a,b) => (b.md||0) - (a.md||0));
    
    sortedResults.forEach(r => {
      let homeTeam = "", awayTeam = "", homeScore = "", awayScore = "", isForfeit = false;
      const text = r.matchText;
      const lower = text.toLowerCase();
      
      if (lower.includes("no contest") || lower.includes("f - f")) isForfeit = true;
      else if (lower.includes("forfeit")) isForfeit = true;
      
      if (isForfeit && text.includes("F - F")) {
        const forfeitParts = text.split(/\s*F\s*-\s*F\s*/i);
        if (forfeitParts.length >= 2) {
          homeTeam = forfeitParts[0].trim().replace(/\(.*\)/g, '').trim();
          awayTeam = forfeitParts[1].trim().replace(/\(.*\)/g, '').trim();
          homeScore = "F";
          awayScore = "F";
        }
      } else {
        const scoreRegex = /(\d+)\s*-\s*(\d+)/;
        const match = text.match(scoreRegex);
        if (match) {
          homeScore = match[1]; awayScore = match[2];
          const parts = text.split(/\s+\d+\s*-\s*\d+\s+/);
          if (parts.length >= 2) {
            homeTeam = parts[0].trim();
            awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim();
          }
        }
      }
      
      const homeIcon = homeTeam ? getTeamIconHtml(homeTeam, "inline-team-icon") : "";
      const awayIcon = awayTeam ? getTeamIconHtml(awayTeam, "inline-team-icon") : "";
      
      let matchHtml = `<div class="result-match-display">${homeIcon} <span class="result-score-text">${homeScore} - ${awayScore}</span> ${awayIcon}</div>`;
      
      if (isForfeit) {
        let ft = "Forfeit";
        if (text.includes("No Contest")) ft = "No Contest";
        else if (text.includes("Forfeited - No Reply")) ft = "Forfeited - No Reply";
        else if (text.includes("Forfeited on Agreement")) ft = "Forfeited on Agreement";
        matchHtml = `<div class="result-with-forfeit">${matchHtml}<div class="forfeit-text">${ft}</div></div>`;
      }
      
      const row = tbody.insertRow();
      row.insertCell(0).innerHTML = matchHtml;
      row.insertCell(1).innerHTML = `<span style="background:var(--pl-purple); padding:0.5rem 1rem; border-radius:60px; color:var(--pl-pink); font-size:1.2rem; font-weight:bold;">MD${r.md}</span>`;
      
      if(isAdminMode) {
        const actions = row.insertCell(2);
        const editBtn = document.createElement('button'); 
        editBtn.innerText='✏️'; 
        editBtn.className='edit-btn'; 
        editBtn.onclick=()=>openResultForm(r.key,r);
        const delBtn = document.createElement('button'); 
        delBtn.innerText='🗑️'; 
        delBtn.className='delete-btn'; 
        delBtn.onclick=async()=>{ 
          if(confirm('Delete this result?')) {
            await database.ref(getSeasonPath(currentSeasonId, `results/${r.key}`)).remove(); 
          }
        };
        actions.appendChild(editBtn); 
        actions.appendChild(delBtn);
      }
    });
  }

  function formatResultText(homeTeam, homeScore, awayTeam, awayScore, forfeitType) {
    if (forfeitType === "no_contest") return `${homeTeam} F - F ${awayTeam} (No Contest)`;
    else if (forfeitType === "forfeit_no_reply") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited - No Reply)`;
    else if (forfeitType === "forfeit_agreement") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited on Agreement)`;
    else return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`;
  }

  async function updateTeamStats(homeTeam, awayTeam, homeScore, awayScore, forfeitType) {
    const tableRef = database.ref(getSeasonPath(currentSeasonId, 'table'));
    const snapshot = await tableRef.once('value');
    const teams = snapshot.val() || {};
    let homeTeamKey = null, awayTeamKey = null;
    let homeTeamData = null, awayTeamData = null;
    for (const [key, data] of Object.entries(teams)) {
      if (data.name === homeTeam) { homeTeamKey = key; homeTeamData = data; }
      if (data.name === awayTeam) { awayTeamKey = key; awayTeamData = data; }
    }
    if (!homeTeamData) {
      homeTeamData = { name: homeTeam, p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0 };
      homeTeamKey = tableRef.push().key;
    }
    if (!awayTeamData) {
      awayTeamData = { name: awayTeam, p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0 };
      awayTeamKey = tableRef.push().key;
    }
    homeTeamData.p = (homeTeamData.p || 0) + 1;
    awayTeamData.p = (awayTeamData.p || 0) + 1;
    if (forfeitType === "no_contest") {
    } else if (forfeitType === "forfeit_no_reply" || forfeitType === "forfeit_agreement") {
      if (homeScore > awayScore) {
        homeTeamData.pts = (homeTeamData.pts || 0) + 3;
        homeTeamData.w = (homeTeamData.w || 0) + 1;
        awayTeamData.gd = (awayTeamData.gd || 0) - 3;
        awayTeamData.gc = (awayTeamData.gc || 0) + 3;
        awayTeamData.l = (awayTeamData.l || 0) + 1;
      } else if (awayScore > homeScore) {
        awayTeamData.pts = (awayTeamData.pts || 0) + 3;
        awayTeamData.w = (awayTeamData.w || 0) + 1;
        homeTeamData.gd = (homeTeamData.gd || 0) - 3;
        homeTeamData.gc = (homeTeamData.gc || 0) + 3;
        homeTeamData.l = (homeTeamData.l || 0) + 1;
      }
    } else {
      homeTeamData.gs = (homeTeamData.gs || 0) + homeScore;
      homeTeamData.gc = (homeTeamData.gc || 0) + awayScore;
      awayTeamData.gs = (awayTeamData.gs || 0) + awayScore;
      awayTeamData.gc = (awayTeamData.gc || 0) + homeScore;
      homeTeamData.gd = (homeTeamData.gs || 0) - (homeTeamData.gc || 0);
      awayTeamData.gd = (awayTeamData.gs || 0) - (awayTeamData.gc || 0);
      if (homeScore > awayScore) {
        homeTeamData.pts = (homeTeamData.pts || 0) + 3;
        homeTeamData.w = (homeTeamData.w || 0) + 1;
        awayTeamData.l = (awayTeamData.l || 0) + 1;
      } else if (awayScore > homeScore) {
        awayTeamData.pts = (awayTeamData.pts || 0) + 3;
        awayTeamData.w = (awayTeamData.w || 0) + 1;
        homeTeamData.l = (homeTeamData.l || 0) + 1;
      } else {
        homeTeamData.pts = (homeTeamData.pts || 0) + 1;
        awayTeamData.pts = (awayTeamData.pts || 0) + 1;
        homeTeamData.d = (homeTeamData.d || 0) + 1;
        awayTeamData.d = (awayTeamData.d || 0) + 1;
      }
    }
    await tableRef.child(homeTeamKey).set(homeTeamData);
    await tableRef.child(awayTeamKey).set(awayTeamData);
  }

    topAssistantList = listSnap.val() ? Object.entries(listSnap.val()).map(([k,v])=>({key:k,...v})) : [];
    const slidesSnap = await database.ref('topAssistant/slideshow/images').once('value');
    topAssistantSlideshowImages = slidesSnap.val() || [];
    const durSnap = await database.ref('topAssistant/slideshow/duration').once('value');
    topAssistantSlideshowDuration = durSnap.val() || 3000;
    if (topAssistantInterval) clearInterval(topAssistantInterval);
    if (topAssistantSlideshowImages.length) {
      topAssistantSlideIdx = 0;
      topAssistantInterval = setInterval(() => { topAssistantSlideIdx = (topAssistantSlideIdx+1)%topAssistantSlideshowImages.length; if (document.getElementById('statsPopupOverlay').classList.contains('active') && window.currentStatsType === 'assistant') updateStatsPopupSlideshow(); }, topAssistantSlideshowDuration);
    }
  }

  let currentStatsType = null;
  function updateStatsPopupSlideshow() {
    const slideshowImg = document.getElementById('statsPopupSlideshowImg');
    if (!slideshowImg) return;
    let images = currentStatsType === 'scorer' ? topScorerSlideshowImages : topAssistantSlideshowImages;
    let idx = currentStatsType === 'scorer' ? topScorerSlideIdx : topAssistantSlideIdx;
    if (images.length) slideshowImg.src = images[idx];
  }

  async function showStatsPopup(type) {
    currentStatsType = type;
    await loadTopScorerData();
    await loadTopAssistantData();
    const list = type === 'scorer' ? topScorerList : topAssistantList;
    const images = type === 'scorer' ? topScorerSlideshowImages : topAssistantSlideshowImages;
    const title = type === 'scorer' ? 'TOP SCORERS' : 'TOP ASSISTANTS';
    const inner = document.getElementById('statsPopupInner');
    let slideshowHtml = `<div class="stats-popup-slideshow"><img id="statsPopupSlideshowImg" src="${images[0] || ''}" style="max-width:100%; max-height:400px; border-radius:2rem;"></div><div class="dots-container" id="statsPopupDots"></div>`;
    let listHtml = `<table class="stats-list"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>${type === 'scorer' ? 'Goals' : 'Assists'}</th>${isAdminMode ? '<th>Actions</th>' : ''}</tr></thead><tbody>`;
    list.sort((a,b) => (b.count||0) - (a.count||0)).forEach((item, idx) => {
      let teamDisplay = '';
      const iconUrl = teamIconsCache[item.team];
      if (iconUrl) {
        teamDisplay = `<img src="${iconUrl}" style="width: 48px; height: 48px; object-fit: contain; vertical-align: middle;" title="${item.team}">`;
      } else {
        teamDisplay = item.team || '';
      }
      listHtml += `<tr><td style="font-size:1.1rem;">${idx+1}</td><td style="font-size:1.1rem;">${item.name || ''}</td><td style="font-size:1.1rem;">${teamDisplay}</td><td style="font-size:1.1rem;">${item.count || 0}</td>${isAdminMode ? `<td style="font-size:1.1rem;"><button class="edit-btn" data-key="${item.key}">✏️</button> <button class="delete-btn" data-key="${item.key}">🗑️</button></td>` : ''}</tr>`;
    });
    listHtml += `</tbody></table>`;
    let adminControls = '';
    if (isAdminMode) {
      adminControls = `<div class="admin-stats-controls"><button id="addStatsEntryBtn" class="add-btn">Add Entry</button>
      <button id="manageStatsSlideshowBtn" class="add-btn">Manage Slideshow</button></div>`;
    }
    inner.innerHTML = `<h2>${title}</h2>${slideshowHtml}${listHtml}${adminControls}`;
    if (images.length) {
      const dotsContainer = document.getElementById('statsPopupDots');
      if (dotsContainer) {
        dotsContainer.innerHTML = '';
        images.forEach((_, i) => {
          const dot = document.createElement('span'); dot.classList.add('dot'); if(i===0) dot.classList.add('active');
          dot.onclick = () => { if (type === 'scorer') topScorerSlideIdx = i; else topAssistantSlideIdx = i; updateStatsPopupSlideshow(); };
          dotsContainer.appendChild(dot);
        });
      }
    }
    document.getElementById('statsPopupOverlay').classList.add('active');
    if (isAdminMode) {
      document.getElementById('addStatsEntryBtn')?.addEventListener('click', () => showAddEditStatsEntry(type));
      document.getElementById('manageStatsSlideshowBtn')?.addEventListener('click', () => manageStatsSlideshow(type));
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { const key = btn.dataset.key; const item = list.find(i=>i.key===key); showAddEditStatsEntry(type, item); });
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => { if(confirm('Delete?')) { await database.ref(`${type === 'scorer' ? 'topScorer/list' : 'topAssistant/list'}/${btn.dataset.key}`).remove(); showStatsPopup(type); } });

    updateStatsPopupSlideshow();
  }

  function showAddEditStatsEntry(type, entry = null) {

    let teamSelectHtml = `<select id="entryTeam" style="width:100%; margin:0.8rem 0; padding:0.8rem; font-size:1rem;">`;
    teamSelectHtml += `<option value="">Select Team</option>`;
    teamOptions.forEach(team => {
      const selected = (entry && entry.team === team) ? 'selected' : '';
      teamSelectHtml += `<option value="${team}" ${selected}>${team}</option>`;
    });
    teamSelectHtml += `</select>`;
    content.innerHTML = `<h3>${entry ? 'Edit' : 'Add'} ${type === 'scorer' ? 'Top Scorer' : 'Top Assistant'}</h3>

      ${teamSelectHtml}
      <input type="number" id="entryCount" placeholder="${type === 'scorer' ? 'Goals' : 'Assists'}" value="${entry?.count || 0}" style="width:100%; margin:0.8rem 0; padding:0.8rem; font-size:1rem;">

      const team = document.getElementById('entryTeam').value;

      if (!name) { alert("Player name required"); return; }
      if (!team) { alert("Please select a team"); return; }

      if (entry && entry.key) {
        await database.ref(`${type === 'scorer' ? 'topScorer/list' : 'topAssistant/list'}/${entry.key}`).set(data);
      } else {
        await database.ref(`${type === 'scorer' ? 'topScorer/list' : 'topAssistant/list'}`).push(data);

  function manageStatsSlideshow(type) {
    const modal = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    let images = type === 'scorer' ? [...topScorerSlideshowImages] : [...topAssistantSlideshowImages];
    let duration = type === 'scorer' ? topScorerSlideshowDuration/1000 : topAssistantSlideshowDuration/1000;
    const renderManage = () => {
      let previewHtml = '<div class="image-preview-grid" id="slideshowPreviewGrid">';
      images.forEach((url, idx) => {
        previewHtml += `<div class="image-preview-item"><img src="${url}"><button class="delete-preview-btn" data-idx="${idx}">✕</button></div>`;
      });
      previewHtml += '</div>';
      content.innerHTML = `<h3>Manage ${type === 'scorer' ? 'Top Scorer' : 'Top Assistant'} Slideshow</h3>
        ${previewHtml}
        <input type="file" id="newSlideFile" accept="image/*" style="width:100%; margin:0.8rem 0; font-size:1rem;">
        <button id="uploadSlideBtn" class="modal-option">Add Slide</button>
        <div style="margin:15px 0;"><label style="font-size:1rem;">Duration (seconds):</label><input type="number" id="slideDurationSec" min="1" max="10" step="0.5" value="${duration}" style="width:100px; margin-left:1rem; font-size:1rem; padding:0.4rem;"></div>
        <button id="saveDurBtn" class="modal-option">Set Duration</button>
        <button id="closeSlideManager" class="close-modal">Close</button>
        <div id="slideStatus"></div>`;
      modal.classList.add('active');
      attachSlideEvents();
    };
    const attachSlideEvents = () => {
      const grid = document.getElementById('slideshowPreviewGrid');
      if (grid) {
        grid.querySelectorAll('.delete-preview-btn').forEach(btn => {
          btn.onclick = async () => {
            const idx = parseInt(btn.dataset.idx);
            images.splice(idx, 1);
            await database.ref(`${type === 'scorer' ? 'topScorer/slideshow/images' : 'topAssistant/slideshow/images'}`).set(images);
            if (type === 'scorer') topScorerSlideshowImages = images; else topAssistantSlideshowImages = images;
            renderManage();
          };
        });
      }
      document.getElementById('uploadSlideBtn').onclick = async () => {
        const file = document.getElementById('newSlideFile').files[0];
        const statusDiv = document.getElementById('slideStatus');
        if (!file) { statusDiv.innerHTML = '<div class="status-message status-error">Select file</div>'; return; }
        try {
          statusDiv.innerHTML = '<div class="status-message status-loading">Uploading...</div>';
          const fd = new FormData(); fd.append('image', file);
          const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
          const data = await resp.json();
          if (!data.success) throw new Error(data.error?.message);
          const url = data.data.url;
          images.push(url);
          await database.ref(`${type === 'scorer' ? 'topScorer/slideshow/images' : 'topAssistant/slideshow/images'}`).set(images);
          if (type === 'scorer') topScorerSlideshowImages = images; else topAssistantSlideshowImages = images;
          statusDiv.innerHTML = '<div class="status-message status-success">Added</div>';
          document.getElementById('newSlideFile').value = '';
          renderManage();
        } catch(e) { statusDiv.innerHTML = '<div class="status-message status-error">Error: '+e.message+'</div>'; }
      };
      document.getElementById('saveDurBtn').onclick = async () => {
        let sec = parseFloat(document.getElementById('slideDurationSec').value);
        if (isNaN(sec)) sec = 3;
        sec = Math.min(10, Math.max(1, sec));
        const newDur = sec * 1000;
        await database.ref(`${type === 'scorer' ? 'topScorer/slideshow/duration' : 'topAssistant/slideshow/duration'}`).set(newDur);
        if (type === 'scorer') { topScorerSlideshowDuration = newDur; if (topScorerInterval) clearInterval(topScorerInterval); if (topScorerSlideshowImages.length) { topScorerSlideIdx = 0; topScorerInterval = setInterval(() => { topScorerSlideIdx = (topScorerSlideIdx+1)%topScorerSlideshowImages.length; if (document.getElementById('statsPopupOverlay').classList.contains('active') && window.currentStatsType === 'scorer') updateStatsPopupSlideshow(); }, topScorerSlideshowDuration); } }
        else { topAssistantSlideshowDuration = newDur; if (topAssistantInterval) clearInterval(topAssistantInterval); if (topAssistantSlideshowImages.length) { topAssistantSlideIdx = 0; topAssistantInterval = setInterval(() => { topAssistantSlideIdx = (topAssistantSlideIdx+1)%topAssistantSlideshowImages.length; if (document.getElementById('statsPopupOverlay').classList.contains('active') && window.currentStatsType === 'assistant') updateStatsPopupSlideshow(); }, topAssistantSlideshowDuration); } }
        document.getElementById('slideStatus').innerHTML = '<div class="status-message status-success">Duration set to '+sec+'s</div>';
      };
      document.getElementById('closeSlideManager').onclick = () => modal.classList.remove('active');
    };
    renderManage();
  }

  // Slideshow main
  async function loadSlideshow() {
    const snap = await database.ref('slideshow/images').once('value');
    slideshowImages = snap.val() || [];
    const durSnap = await database.ref('slideshow/duration').once('value');
    slideshowDuration = durSnap.val() || 3000;
    startSlideshow();
  }
  function startSlideshow() {
    if(slideInterval) clearInterval(slideInterval);
    if(!slideshowImages.length) return;
    currentSlideIdx = 0;
    updateSlideImage();
    slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx+1)%slideshowImages.length; updateSlideImage(); }, slideshowDuration);
  }
  function updateSlideImage() { document.getElementById('slideshow-img').src = slideshowImages[currentSlideIdx] || ''; updateDots(); }
  function updateDots() {
    const container = document.getElementById('dotsContainer'); if(!container) return;
    container.innerHTML = '';
    slideshowImages.forEach((_,i) => { const dot = document.createElement('span'); dot.classList.add('dot'); if(i===currentSlideIdx) dot.classList.add('active'); dot.onclick = () => { currentSlideIdx = i; updateSlideImage(); if(slideInterval){ clearInterval(slideInterval); slideInterval = setInterval(()=>{ currentSlideIdx = (currentSlideIdx+1)%slideshowImages.length; updateSlideImage(); }, slideshowDuration); } }; container.appendChild(dot); });
  }

  async function uploadToImgBB(file) {
    const fd = new FormData(); fd.append('image', file);
    const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
    const data = await resp.json();
    if (!data.success) throw new Error(data.error?.message || 'Upload failed');
    return data.data.url;
  }

          <div class="card-header-left">
            <h2>
              PREMIER LEAGUE
              <span id="tableCornerImageContainer" style="display: inline-flex; vertical-align: middle;"></span>
            </h2>
            <div class="season-controls">
              <button class="season-arrow" id="prevSeasonBtn">‹</button>
              <input type="text" id="seasonNumberInput" class="season-number-input" value="Season ${currentSeasonId}" readonly>
              <button class="season-arrow" id="nextSeasonBtn">›</button>
            </div>
            <div id="seasonAdminButtons" class="season-admin-buttons" style="display: ${isAdminMode ? 'flex' : 'none'};">
              <button class="season-admin-btn" id="addSeasonBtn">+ New Season</button>
              <button class="season-admin-btn" id="renameSeasonBtn">Edit Season #</button>
              <button class="season-admin-btn" id="setActiveSeasonBtn">Set Active</button>
            </div>
            <button class="add-btn" id="addTeamBtn" style="display: ${isAdminMode ? 'inline-block' : 'none'};">+ Add Team</button>
          </div>
          <div class="card-header-right">
            <button class="three-dot-menu" id="threeDotBtn">⋮</button>
          </div>
        </div>
        <div class="card-content">
          <div class="league-table-wrapper">
            <table class="stats-table" id="leagueTable">
              <thead>
                <tr><th>Pos</th><th>Club</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GS</th><th>GC</th><th>GD</th><th>Pts</th><th>Last 5</th><th id="actionHeader" style="display: ${isAdminMode ? 'table-cell' : 'none'};">Actions</th></tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div class="legend-under-table" id="legendContainer"></div>
        </div>
      </div>
    `;
  }

  function renderResultsTab() {
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-header-left">
            <h2>RESULTS</h2>
            <button class="add-btn" id="addResultBtn" style="display: ${isAdminMode ? 'inline-block' : 'none'};">+ Add Result</button>
          </div>
        </div>
        <div class="card-content">
          <div class="results-table-wrapper">
            <table class="inner-table results-table" id="resultsTable">
              <thead><tr><th>Match</th><th>MD</th><th id="resultActionHeader" style="display: ${isAdminMode ? 'table-cell' : 'none'};">Actions</th></tr></thead>
              <tbody id="resultsBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  function renderWatchMatchTab() {
    if (watchMatchEmbedCode) {
      return `<div class="card"><div class="card-header"><h2>WATCH MATCH</h2></div><div class="card-content"><div class="video-wrapper">${watchMatchEmbedCode}</div></div></div>`;
    } else {
      return `<div class="card"><div class="card-header"><h2>WATCH MATCH</h2></div><div class="card-content"><div class="empty-state">No match video available yet.${isAdminMode ? ' Use menu to add.' : ''}</div></div></div>`;
    }
  }

  function renderCurrentTab() {
    const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
    const dynamicDiv = document.getElementById('dynamicContent');
    if (!dynamicDiv) return;

    if (activeTab === 'table') {
      dynamicDiv.innerHTML = renderTableTab();
      renderTableCornerImage();
      renderLeagueTable();
      applyTableHeaderBg();
      // Re-attach season controls
      document.getElementById('prevSeasonBtn')?.addEventListener('click', () => switchSeason(-1));
      document.getElementById('nextSeasonBtn')?.addEventListener('click', () => switchSeason(1));
      const seasonInputElem = document.getElementById('seasonNumberInput');
      if (seasonInputElem) {
        seasonInputElem.addEventListener('click', () => { if(isAdminMode) { const num = prompt("Enter season number:"); if(num) goToSeason(num); } });
      }
      document.getElementById('addSeasonBtn')?.addEventListener('click', () => { if(isAdminMode) addNewSeason(); });
      document.getElementById('renameSeasonBtn')?.addEventListener('click', () => { if(isAdminMode) renameSeason(); });
      document.getElementById('setActiveSeasonBtn')?.addEventListener('click', () => { if(isAdminMode) setActiveSeason(); });
      const addTeamBtn = document.getElementById('addTeamBtn');
      if (addTeamBtn) addTeamBtn.onclick = () => openTeamForm(null);
      attachThreeDotHandler();
    } else if (activeTab === 'fixtures') {
      window.location.href = 'manager-calendar.html';
      return;
    } else if (activeTab === 'results') {
      dynamicDiv.innerHTML = renderResultsTab();
      renderResults();
      document.getElementById('addResultBtn')?.addEventListener('click', () => openResultForm(null));
    } else if (activeTab === 'topscorers') {
      showStatsPopup('scorer');
      dynamicDiv.innerHTML = '<div class="card"><div class="card-header"><h2>TOP SCORERS</h2></div><div class="card-content"><div class="empty-state">Loading...</div></div></div>';
    } else if (activeTab === 'topassists') {
      showStatsPopup('assistant');
      dynamicDiv.innerHTML = '<div class="card"><div class="card-header"><h2>TOP ASSISTANTS</h2></div><div class="card-content"><div class="empty-state">Loading...</div></div></div>';
    } else if (activeTab === 'watch') {
      dynamicDiv.innerHTML = renderWatchMatchTab();
    }
  }

  // Tab switching event listeners
  function initTabs() {
    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderCurrentTab();
      });
    });
  }

  // Initialize everything
  async function init() {
    await loadSlideshow();
    await loadTeamIcons();
    await loadNavbarLogo();
    await loadTableCornerImage();
    await loadTableHeaderBgImage();
    await loadWatchMatchEmbed();
    await loadTopScorerData();
    await loadTopAssistantData();
    await loadSeasonsMetadata();
    
    // Real-time listeners
    const tableRef = database.ref(getSeasonPath(currentSeasonId, 'table'));
    const resultsRef = database.ref(getSeasonPath(currentSeasonId, 'results'));
    tableRef.on('value', snap => { teamsData = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : []; renderLeagueTable(); });
    resultsRef.on('value', snap => { resultsData = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : []; renderResults(); renderLeagueTable(); });
    
    initTabs();
    renderCurrentTab();
  }

  init();
</script>
</body>
</html>
