<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            var designWidth = 1200;
            var screenWidth = window.screen.width;
            var scale = screenWidth / designWidth;
            scale = Math.min(1.0, Math.max(0.3, scale));
            var viewportMeta = document.createElement('meta');
            viewportMeta.name = 'viewport';
            viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
            document.head.appendChild(viewportMeta);
        })();
    </script>
    <title>UEFA Nations League</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --nl-primary: #0a1628;
            --nl-accent: #00b4d8;
            --nl-accent2: #0077b6;
            --nl-gold: #f4a261;
            --nl-deep: #050d1a;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(14px);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes orbitFlags {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes counterRotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(-360deg);
            }
        }
        @keyframes pulsCenter {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(0, 180, 216, 0.4);
            }
            50% {
                box-shadow: 0 0 60px rgba(0, 180, 216, 0.7);
            }
        }
        @keyframes navStripe {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 60px 0;
            }
        }
        @keyframes starTwinkle {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(0.85);
            }
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--nl-primary);
            min-height: 100vh;
            overflow-x: auto;
            min-width: 1200px;
            width: 1200px;
            margin: 0 auto;
            font-size: 20px;
            padding-bottom: 3rem;
        }
        body.has-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }
        body.has-bg::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(5, 13, 26, 0.75);
            z-index: -1;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: relative;
            background: var(--nl-primary);
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 180, 216, 0.2);
            animation: fadeInDown 0.5s ease both;
            overflow: hidden;
        }
        .navbar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: repeating-linear-gradient(90deg,
                    #003f88 0px, #003f88 20px,
                    #ffffff 20px, #ffffff 30px,
                    #c0392b 30px, #c0392b 50px,
                    #f4a261 50px, #f4a261 60px,
                    #1db954 60px, #1db954 80px,
                    #f1c40f 80px, #f1c40f 90px,
                    #9b59b6 90px, #9b59b6 110px,
                    #00b4d8 110px, #00b4d8 130px,
                    #e74c3c 130px, #e74c3c 150px,
                    #ffffff 150px, #ffffff 160px);
            background-size: 160px 8px;
            animation: navStripe 3s linear infinite;
        }
        .navbar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: repeating-linear-gradient(90deg,
                    #f1c40f 0px, #f1c40f 20px,
                    #003f88 20px, #003f88 40px,
                    #c0392b 40px, #c0392b 60px,
                    #ffffff 60px, #ffffff 70px,
                    #1db954 70px, #1db954 90px,
                    #9b59b6 90px, #9b59b6 110px,
                    #f4a261 110px, #f4a261 130px,
                    #00b4d8 130px, #00b4d8 150px,
                    #e74c3c 150px, #e74c3c 160px);
            background-size: 160px 8px;
            animation: navStripe 3s linear infinite reverse;
        }
        .navbar-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            z-index: 1;
        }
        .navbar-logo {
            height: 70px;
            max-width: 220px;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .navbar-logo:hover {
            transform: scale(1.05);
        }
        .navbar-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 5px;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 180, 216, 0.5);
        }
        .eu-stars {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .eu-star {
            color: var(--nl-accent);
            font-size: 1rem;
            animation: starTwinkle 2s ease-in-out infinite;
        }
        .eu-star:nth-child(2) {
            animation-delay: 0.17s;
        }
        .eu-star:nth-child(3) {
            animation-delay: 0.33s;
        }
        .eu-star:nth-child(4) {
            animation-delay: 0.5s;
        }
        .eu-star:nth-child(5) {
            animation-delay: 0.67s;
        }
        .eu-star:nth-child(6) {
            animation-delay: 0.83s;
        }
        .eu-star:nth-child(7) {
            animation-delay: 1.0s;
        }
        .eu-star:nth-child(8) {
            animation-delay: 1.17s;
        }
        .eu-star:nth-child(9) {
            animation-delay: 1.33s;
        }
        .eu-star:nth-child(10) {
            animation-delay: 1.5s;
        }
        .eu-star:nth-child(11) {
            animation-delay: 1.67s;
        }
        .eu-star:nth-child(12) {
            animation-delay: 1.83s;
        }

        .menu-btn {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 180, 216, 0.15);
            border: 2px solid rgba(0, 180, 216, 0.4);
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 1;
        }
        .menu-btn span {
            width: 30px;
            height: 3px;
            background: white;
            border-radius: 3px;
        }
        .menu-btn:hover {
            background: rgba(0, 180, 216, 0.35);
            transform: translateY(-50%) rotate(90deg);
        }

        /* ── SIDE MENU ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 199;
            display: none;
            backdrop-filter: blur(3px);
        }
        .overlay.active {
            display: block;
        }
        .side-menu {
            position: fixed;
            top: 0;
            right: -360px;
            width: 360px;
            height: 100%;
            background: rgba(5, 13, 26, 0.98);
            backdrop-filter: blur(20px);
            border-left: 2px solid var(--nl-accent);
            z-index: 200;
            padding: 40px 28px;
            transition: right 0.35s cubic-bezier(.4, 0, .2, 1);
        }
        .side-menu.active {
            right: 0;
        }
        .close-menu {
            text-align: right;
            font-size: 2.8rem;
            cursor: pointer;
            color: white;
            margin-bottom: 40px;
            line-height: 1;
            transition: color 0.2s;
        }
        .close-menu:hover {
            color: var(--nl-accent);
        }
        .menu-item {
            padding: 20px 28px;
            margin: 12px 0;
            border: 1px solid rgba(0, 180, 216, 0.3);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.5rem;
            color: white;
            transition: all 0.2s;
        }
        .menu-item:hover {
            background: rgba(0, 180, 216, 0.2);
            border-color: var(--nl-accent);
            transform: translateX(8px);
        }

        /* ── ORBIT FLAGS SECTION ── */
        .orbit-section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 0 30px;
            animation: fadeIn 0.8s ease 0.2s both;
        }
        .orbit-wrapper {
            position: relative;
            width: 880px;
            height: 880px;
        }
        .orbit-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px dashed rgba(0, 180, 216, 0.25);
        }
        .orbit-spinner {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            animation: orbitFlags var(--orbit-duration, 20s) linear infinite;
        }
        .orbit-flag-item {
            position: absolute;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            top: 50%;
            left: 50%;
            transform-origin: 0 0;
            transition: border-color 0.3s;
        }
        .orbit-flag-item:hover {
            border-color: var(--nl-accent);
            z-index: 10;
        }
        .orbit-flag-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .orbit-flag-item .flag-inner {
            width: 100%;
            height: 100%;
            animation: counterRotate var(--orbit-duration, 20s) linear infinite;
        }
        /* CENTER - 600px */
        .orbit-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid rgba(0, 180, 216, 0.6);
            box-shadow: 0 0 40px rgba(0, 180, 216, 0.4);
            background: var(--nl-deep);
            animation: pulsCenter 3s ease-in-out infinite;
            z-index: 10;
        }
        .orbit-center img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }
        .orbit-center-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding: 10px;
        }
        .center-dots {
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        .center-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.25s;
        }
        .center-dot.active {
            background: var(--nl-accent);
            transform: scale(1.4);
        }

        /* ── SEASON BAR ── */
        .season-bar {
            display: flex;
            justify-content: center;
            margin: 24px 0 16px;
        }
        .season-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #ffffff;
            border: 2px solid rgba(0, 180, 216, 0.2);
            padding: 12px 32px;
            border-radius: 80px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .season-arrow {
            background: var(--nl-accent2);
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .season-arrow:hover:not(:disabled) {
            background: var(--nl-accent);
            transform: scale(1.1);
        }
        .season-arrow:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .season-number {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            color: var(--nl-accent2);
            min-width: 180px;
            text-align: center;
        }
        .season-admin-btns {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }
        .season-admin-btn {
            background: rgba(0, 119, 182, 0.1);
            border: 1px solid var(--nl-accent2);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: var(--nl-accent2);
            font-size: 1.1rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.2s;
        }
        .season-admin-btn:hover {
            background: var(--nl-accent2);
            color: white;
        }

        /* ── TABS ── */
        .tabs-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin: 28px 36px 0;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 80px;
            padding: 12px 20px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeInUp 0.5s ease 0.3s both;
        }
        .tabs-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent;
            border: none;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 10px 28px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 60px;
            letter-spacing: 0.5px;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: #ffffff;
            color: var(--nl-accent2);
        }
        .tab-btn:hover:not(.active) {
            color: white;
            background: rgba(255, 255, 255, 0.15);
        }

        /* ── SUB TABS ── */
        .sub-tabs-row {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            justify-content: center;
        }
        .sub-tab-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 8px 28px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 60px;
            letter-spacing: 0.5px;
            transition: all 0.25s;
            white-space: nowrap;
        }
        .sub-tab-btn.active {
            background: #ffffff;
            color: var(--nl-accent2);
        }
        .sub-tab-btn:hover:not(.active) {
            color: white;
            background: rgba(255, 255, 255, 0.2);
        }

        /* ── CONTENT CARD ── */
        .content-card {
            margin: 24px 36px 40px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px;
            min-height: 200px;
            animation: fadeInUp 0.5s ease 0.4s both;
        }

        /* ── LOADING / EMPTY ── */
        .loading-spinner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            gap: 24px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--nl-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-spinner span {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.4rem;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.4);
        }
        .empty-state .empty-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .empty-state p {
            font-size: 2rem;
            font-weight: 500;
        }
        .coming-soon {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.7);
        }
        .coming-soon .cs-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        .coming-soon h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 4px;
            color: white;
            margin-bottom: 12px;
        }
        .coming-soon p {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* ── TABLE ── */
        .table-scroll-wrap {
            overflow-x: auto;
            border-radius: 20px;
            position: relative;
        }
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Rajdhani', sans-serif;
            min-width: 900px;
            background: rgba(255, 255, 255, 0.06);
            color: white;
        }
        .stats-table thead th {
            background: rgba(0, 0, 0, 0.35);
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 18px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            white-space: nowrap;
        }
        .stats-table th:first-child,
        .stats-table td:first-child {
            position: sticky;
            left: 0;
            z-index: 25;
            background: rgba(5, 13, 26, 0.8);
            width: 64px;
            min-width: 64px;
        }
        .stats-table thead th:first-child {
            background: rgba(0, 0, 0, 0.5);
            z-index: 30;
        }
        .stats-table th:nth-child(2),
        .stats-table td:nth-child(2) {
            position: sticky;
            left: 64px;
            z-index: 24;
            background: rgba(5, 13, 26, 0.8);
            box-shadow: 4px 0 8px -2px rgba(0, 0, 0, 0.4);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stats-table thead th:nth-child(2) {
            background: rgba(0, 0, 0, 0.5);
            z-index: 30;
        }
        .stats-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            transition: background 0.2s;
        }
        .stats-table tbody tr:hover {
            background: rgba(0, 180, 216, 0.08);
        }
        .stats-table td {
            padding: 14px 18px;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .stats-table td.stat-number {
            font-size: 2.4rem !important;
            font-weight: 800;
            line-height: 1.2;
        }
        .team-name-text {
            font-weight: 700;
            font-size: 2.4rem !important;
            color: white;
        }
        .pts-cell {
            font-weight: 800;
            color: white;
            font-size: 1.5rem;
        }
        .rank-cell {
            font-weight: 700;
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
        }
        .table-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px 20px 0 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            align-items: center;
        }
        .table-actions-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            color: white;
            letter-spacing: 2px;
            text-align: center;
            flex: 1;
        }
        .add-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .add-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        .legend-row {
            margin-top: 24px;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 1.5rem;
            font-weight: 600;
        }
        .vbar {
            width: 6px;
            height: 28px;
            border-radius: 3px;
            display: inline-block;
        }
        .vbar-blue {
            background: #3b82f6;
        }
        .vbar-red {
            background: #ef4444;
        }
        .vbar-orange {

        // ─── Season Path ───
        function sp(seasonNum, sub = "") {
            return `${basePath}/seasons/season_${seasonNum}${sub ? "/" + sub : ""}`;
        }

        // ─── Helpers ───
        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        async function uploadToImgBB(blob) {
            const fd = new FormData();
            fd.append('image', blob);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
            const data = await res.json();
            if (!data.success) throw new Error(data.error?.message || 'ImgBB failed');
            return data.data.url;
        }
        async function removeBackground(file) {
            const fd = new FormData();
            fd.append('image_file', file);
            fd.append('size', 'auto');
            const res = await fetch('https://api.remove.bg/v1.0/removebg', { method: 'POST', headers: { 'X-Api-Key': RMBG_KEY },
                body: fd });
            if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e?.errors?.[0]?.title ||
                    'remove.bg failed'); }
            return await res.blob();
        }
        function pickFile(accept) {
            return new Promise(res => {
                const i = document.createElement('input');
                i.type = 'file';
                i.accept = accept;
                i.onchange = e => res(e.target.files[0] || null);
                i.click();
            });
        }
        function showModal(html) {
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('genericModal').classList.add('active');
        }
        function closeModal() { document.getElementById('genericModal').classList.remove('active'); }

        // Team icons with circle classes
        function getTeamIconHtml(name, cls = 'team-icon-sm') {
            const url = teamIconsCache[name];
            const circleClass = cls === 'team-icon-lg' ? 'team-icon-circle-lg' : 'team-icon-circle';
            return url ? `<img class="${circleClass}" src="${url}" alt="${name}" onerror="this.style.display='none';">` :
            '';
        }

        // ─── Background ───
        async function loadBgSettings() {
            const snap = await db.ref(`${basePath}/settings/backgroundImage`).once('value');
            const url = snap.val();
            if (url) { document.body.style.setProperty('--bg-image', `url(${url})`);
                document.body.classList.add('has-bg'); }
        }

        // ─── Navbar Logo ───
        async function loadNavbarLogo() {
            const snap = await db.ref(`${basePath}/navbar_logo`).once('value');
            const url = snap.val();
            const c = document.getElementById('logoContainer');
            if (url) c.innerHTML = `<img src="${url}" class="navbar-logo" alt="Nations League Logo">`;
            else c.innerHTML = `<div class="navbar-title">UEFA NATIONS LEAGUE</div>`;
        }

        // ─── Team Icons ───
        async function loadTeamIcons() {
            const snap = await db.ref(`${basePath}/teamIcons`).once('value');
            const data = snap.val() || {};
            for (const [team, val] of Object.entries(data)) {
                if (val && val.imageUrl) teamIconsCache[team] = val.imageUrl;
                else if (typeof val === 'string') teamIconsCache[team] = val;
            }
        }

        // ─── Calendar Events ───
        async function loadCalendarEvents() {
            const snap = await db.ref('calendarEvents').once('value');
            calendarEventsData = snap.val() || {};
        }

        // ─── ORBIT FLAGS ───
        async function loadOrbitFlags() {
            const [flagsSnap, speedSnap] = await Promise.all([
                db.ref(`${basePath}/flags`).once('value'),
                db.ref(`${basePath}/rotationspeed`).once('value'),
            ]);
            orbitFlags = flagsSnap.val() ? Object.values(flagsSnap.val()).filter(Boolean) : [];
            orbitDuration = speedSnap.val() || 20000;
            renderOrbitFlags();
        }

        function renderOrbitFlags() {
            const spinner = document.getElementById('orbitSpinner');
            spinner.innerHTML = '';
            spinner.style.setProperty('--orbit-duration', orbitDuration + 'ms');

            if (!orbitFlags.length) return;

            const count = orbitFlags.length;
            const radius = 390;
            const centerX = 440;
            const centerY = 440;

            orbitFlags.forEach((url, i) => {
                const angle = (360 / count) * i;
                const rad = (angle * Math.PI) / 180;
                const x = centerX + radius * Math.cos(rad) - 32;
                const y = centerY + radius * Math.sin(rad) - 32;

                const flagEl = document.createElement('div');
                flagEl.className = 'orbit-flag-item';
                flagEl.style.cssText =
                    `left:${x}px;top:${y}px;--orbit-duration:${orbitDuration}ms;`;
                flagEl.innerHTML =
                    `<div class="flag-inner"><img src="${url}" alt="flag" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%23444%22/></svg>'"></div>`;
                spinner.appendChild(flagEl);
            });

            spinner.style.animation = `orbitFlags ${orbitDuration}ms linear infinite`;
        }

        // ─── CENTER SLIDESHOW ───
        async function loadCenterSlideshow() {
            const [imgSnap, durSnap] = await Promise.all([
                db.ref(`${basePath}/center_slideshow/images`).once('value'),
                db.ref(`${basePath}/center_slideshow/duration`).once('value'),
            ]);
            centerImages = imgSnap.val() ? Object.values(imgSnap.val()).filter(Boolean) : [];
            centerDuration = durSnap.val() || 3000;
            startCenterSlideshow();
        }

        function startCenterSlideshow() {
            if (centerInterval) clearInterval(centerInterval);
            const center = document.getElementById('orbitCenter');
            const dotsEl = document.getElementById('centerDots');
            if (!centerImages.length) {
                center.innerHTML = '<div class="orbit-center-placeholder">NATIONS<br>LEAGUE</div>';
                dotsEl.innerHTML = '';
                return;
            }
            centerSlideIdx = 0;
            updateCenterSlide();
            centerInterval = setInterval(() => {
                centerSlideIdx = (centerSlideIdx + 1) % centerImages.length;
                updateCenterSlide();
            }, centerDuration);
        }

        function updateCenterSlide() {
            const center = document.getElementById('orbitCenter');
            const dotsEl = document.getElementById('centerDots');
            center.innerHTML =
                `<img src="${centerImages[centerSlideIdx]}" alt="Center" onerror="this.parentElement.innerHTML='<div class=\\'orbit-center-placeholder\\'>NATIONS<br>LEAGUE</div>'">`;
            dotsEl.innerHTML = '';
            if (centerImages.length > 1) {
                centerImages.forEach((_, i) => {
                    const d = document.createElement('span');
                    d.className = 'center-dot' + (i === centerSlideIdx ? ' active' : '');
                    d.onclick = () => { centerSlideIdx = i;
                        updateCenterSlide(); };
                    dotsEl.appendChild(d);
                });
            }
        }

        // ─── League Phase Settings ───
        async function loadLeaguePhaseSettings() {
            const snap = await db.ref(`${basePath}/settings/leaguePhase`).once('value');
            if (snap.val()) leaguePhaseSettings = snap.val();
        }

        function openLeaguePhaseSettingsModal() {
            showModal(
                `<h3>🏆 League Phase Settings (Season 3+)</h3> <p style="color:rgba(255,255,255,0.6);margin-bottom:20px;">Set position cutoffs for the league phase table. Positions 1 to Knockout Cutoff = Knockout (blue). Next positions to Playoff Cutoff = Playoff (orange). Rest = Eliminated (red).</p> <label>Knockout Cutoff (top N positions go to knockout)</label> <input type="number" id="knockoutCutoffInput" value="${leaguePhaseSettings.knockoutCutoff||8}" min="1"> <label>Playoff Cutoff (positions after knockout up to this go to playoff)</label> <input type="number" id="playoffCutoffInput" value="${leaguePhaseSettings.playoffCutoff||16}" min="1"> <div id="leaguePhaseStatus"></div> <div class="modal-btns"><button class="modal-btn-primary" id="saveLeaguePhaseBtn">Save</button><button class="modal-btn-cancel" id="cancelLeaguePhaseBtn">Cancel</button></div>`
                );
            document.getElementById('cancelLeaguePhaseBtn').onclick = closeModal;
            document.getElementById('saveLeaguePhaseBtn').onclick = async () => {
                const ko = parseInt(document.getElementById('knockoutCutoffInput').value) || 8;
                const po = parseInt(document.getElementById('playoffCutoffInput').value) || 16;
                leaguePhaseSettings = { knockoutCutoff: ko, playoffCutoff: po };
                await db.ref(`${basePath}/settings/leaguePhase`).set(leaguePhaseSettings);
                document.getElementById('leaguePhaseStatus').innerHTML =
                '<div class="status-msg status-success">✅ Saved!</div>';
                setTimeout(closeModal, 800);
            };
        }

        // ─── Manager Names ───
        async function loadManagerNames() {
            const snap = await db.ref(`${basePath}/managerNames`).once('value');
            managerNames = snap.val() || {};
        }

        function openManagersModal() {
            const allTeams = [];
            for (const gid in groupsData) {
                const teams = groupsData[gid]?.teams || {};
                for (const k in teams) {
                    if (teams[k]?.name) allTeams.push(teams[k].name);
                }
            }
            const uniqueTeams = [...new Set(allTeams)].sort();
            const renderManagersModal = () => {
                let teamsHtml = uniqueTeams.map(team => {
                    const manager = managerNames[team] || '';
                    return `<div style="display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.07);"> <div style="display:flex;align-items:center;gap:12px;flex:1;">${getTeamIconHtml(team,'team-icon-sm')}<span style="font-weight:700;color:white;font-size:1.4rem;">${escapeHtml(team)}</span></div> ${isAdmin ? `<input type="text" class="manager-name-input" data-team="${escapeHtml(team)}" value="${escapeHtml(manager)}" placeholder="Manager name" style="flex:1;padding:10px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);border-radius:20px;color:white;font-family:'Rajdhani',sans-serif;font-size:1.3rem;"><button class="save-manager-btn btn-sm btn-edit" data-team="${escapeHtml(team)}" style="padding:8px 20px;font-size:1.1rem;">Save</button>` : `<span style="color:rgba(255,255,255,0.6);font-size:1.3rem;">${escapeHtml(manager) || 'No manager assigned'}</span>`} </div>`;
                }).join('');
                showModal(
                    `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;"><h3 style="margin:0;">👥 Managers</h3><button onclick="closeModal()" style="background:none;border:none;color:white;font-size:2.5rem;cursor:pointer;line-height:1;">✕</button></div> <div>${teamsHtml}</div> <div id="managersSaveStatus"></div>`
                    );
                if (isAdmin) {
                    document.querySelectorAll('.save-manager-btn').forEach(btn => {
                        btn.onclick = async () => {
                            const team = btn.dataset.team;
                            const input = document.querySelector(
                                `.manager-name-input[data-team="${escapeHtml(team)}"]`);
                            const name = input?.value.trim() || '';
                            const statusEl = document.getElementById('managersSaveStatus');
                            statusEl.innerHTML = '<div class="status-msg status-loading">Saving…</div>';
                            try {
                                await db.ref(`${basePath}/managerNames/${team}`).set(name);
                                managerNames[team] = name;
                                statusEl.innerHTML = '<div class="status-msg status-success">✅ Saved!</div>';
                                setTimeout(() => { statusEl.innerHTML = ''; }, 1500);
                            } catch (err) {
                                statusEl.innerHTML =
                                    `<div class="status-msg status-error">❌ ${escapeHtml(err.message)}</div>`;
                            }
                        };
                    });
                }
            };
            renderManagersModal();
        }

        // ─── Current Matchday ───
        async function loadCurrentMatchday() {
            const snap = await db.ref(sp(currentSeasonId, 'currentMatchday')).once('value');
            currentMatchday = snap.val() || 1;
        }

        function openSetCurrentMatchdayModal() {
            const todayStr = getSASTToday();
            const fixtureDates = [];
            for (const [date, eventData] of Object.entries(calendarEventsData)) {
                const eventSeason = eventData.season;
                if (eventSeason !== undefined && eventSeason !== null && eventSeason !== currentSeasonId) continue;
                if (eventData.tournaments && Array.isArray(eventData.tournaments)) {
                    for (const tournament of eventData.tournaments) {
                        if (!tournament.name) continue;
                        const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, '');
                        if (!normalized.includes('nationsleague') && !normalized.includes('uefanations')) continue;
                        if (tournament.fixtures && Array.isArray(tournament.fixtures) && tournament.fixtures.length >
                            0) {
                            if (!fixtureDates.includes(date)) fixtureDates.push(date);
                        }
                    }
                }
            }
            fixtureDates.sort((a, b) => a.localeCompare(b));
            let filteredDates = fixtureDates.filter(d => d >= todayStr);
            if (filteredDates.length === 0 && fixtureDates.length > 0) filteredDates = [fixtureDates[fixtureDates.length -
                1]];
            const dateItems = filteredDates.map(date => ({
                date,
                currentMd: calendarEventsData[date]?.matchday || '',
                predicted: calendarEventsData[date]?.matchday || ''
            }));
            if (dateItems.length === 0) {
                showModal(
                    `<h3>📊 Set Current Matchday</h3><div class="empty-state"><div class="empty-icon">📅</div><p>No fixture dates found for this season.</p></div><div class="modal-btns"><button class="modal-btn-cancel" id="closeMatchdayEmpty">Close</button></div>`
                    );
                document.getElementById('closeMatchdayEmpty').onclick = closeModal;
                return;
            }
            const renderMatchdayModal = () => {
                const monthLabels = { '01': 'Jan', '02': 'Feb', '03': 'Mar', '04': 'Apr', '05': 'May', '06': 'Jun',
                    '07': 'Jul', '08': 'Aug', '09': 'Sep', '10': 'Oct', '11': 'Nov', '12': 'Dec' };
                let listHtml = dateItems.map(item => {
                    const dateObj = new Date(item.date);
                    const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday',
                        'Saturday'
                    ];
                    const [y, mo, d] = item.date.split('-');
                    const label =
                        `${dayNames[dateObj.getDay()]} ${parseInt(d)} ${monthLabels[mo]||mo} ${y}`;
                    const isToday = item.date === todayStr;
                    return `<div style="display:flex;align-items:center;gap:16px;padding:12px 16px;background:${isToday?'rgba(0,180,216,0.15)':'rgba(0,0,0,0.2)'};border-radius:16px;margin-bottom:10px;border-left:4px solid ${isToday?'var(--nl-accent)':'rgba(0,180,216,0.2)'};"> <span style="font-weight:600;color:white;min-width:200px;">${label}${isToday?' ⭐':''}</span> <span style="color:rgba(255,255,255,0.4);font-size:1rem;">MD</span> <input type="number" class="matchday-prediction-input" data-date="${item.date}" value="${item.predicted||''}" min="1" style="width:80px;padding:8px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(0,180,216,0.4);border-radius:14px;color:white;font-family:'Rajdhani',sans-serif;font-size:1.2rem;outline:none;text-align:center;"> <span style="color:rgba(255,255,255,0.3);font-size:0.85rem;margin-left:auto;">${item.currentMd?`(prev: ${item.currentMd})`:'(unassigned)'}</span> </div>`;
                }).join('');
                showModal(
                    `<h3>📊 Matchday Scheduling</h3> <p style="color:rgba(255,255,255,0.6);margin-bottom:16px;">Set matchday numbers for each Nations League fixture date. Predict auto-increments from today forward and backward.</p> <div style="display:flex;gap:12px;align-items:center;padding:16px 20px;background:rgba(0,0,0,0.25);border-radius:20px;margin-bottom:20px;"> <span style="color:rgba(255,255,255,0.6);font-weight:600;">Today's MD:</span> <input type="number" id="todayMatchdayInput" value="${currentMatchday||1}" min="1" style="width:100px;padding:10px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(0,180,216,0.4);border-radius:14px;color:white;font-family:'Rajdhani',sans-serif;font-size:1.4rem;outline:none;text-align:center;"> <button class="modal-btn-primary" id="predictMatchdaysBtn" style="padding:10px 28px;font-size:1.2rem;">🔮 Predict</button> </div> <div style="max-height:400px;overflow-y:auto;margin:12px 0;">${listHtml}</div> <div style="padding:16px;background:rgba(0,0,0,0.2);border-radius:16px;margin-bottom:16px;"> <p style="color:rgba(255,255,255,0.4);font-size:1rem;">📌 Predict fills today's MD forward (+1 each date) and backward (-1 each date). Edit any value manually before confirming.</p> </div> <div class="modal-btns" style="margin-top:20px;"> <button class="modal-btn-primary" id="confirmMatchdayPredictions">✅ Confirm All</button> <button class="modal-btn-cancel" id="cancelMatchdayModal">Cancel</button> </div> <div id="matchdayPredictionStatus"></div>`
                    );
                document.getElementById('cancelMatchdayModal').onclick = closeModal;
                document.getElementById('predictMatchdaysBtn').onclick = () => {
                    const todayMd = parseInt(document.getElementById('todayMatchdayInput').value);
                    if (isNaN(todayMd) || todayMd < 1) {
                        document.getElementById('matchdayPredictionStatus').innerHTML =
                            '<div class="status-msg status-error">Enter a valid matchday number.</div>';
                        return;
                    }
                    let startIdx = dateItems.findIndex(d => d.date === todayStr);
                    if (startIdx === -1) startIdx = 0;
                    let md = todayMd;
                    for (let i = startIdx; i < dateItems.length; i++) {
                        dateItems[i].predicted = md;
                        md++;
                    }
                    if (startIdx > 0) {
                        let bmd = todayMd - 1;
                        for (let i = startIdx - 1; i >= 0; i--) {
                            dateItems[i].predicted = bmd;
                            bmd--;
                        }
                    }
                    renderMatchdayModal();
                };
                document.getElementById('confirmMatchdayPredictions').onclick = async () => {
                    const statusEl = document.getElementById('matchdayPredictionStatus');
                    const btn = document.getElementById('confirmMatchdayPredictions');
                    btn.disabled = true;
                    btn.innerHTML = 'Saving...';
                    statusEl.innerHTML = '<div class="status-msg status-loading">Saving matchday assignments...</div>';
                    const inputs = document.querySelectorAll('.matchday-prediction-input');
                    const updates = [];
                    let todayMdSave = null;
                    for (const inp of inputs) {
                        const date = inp.dataset.date;
                        const val = parseInt(inp.value);
                        if (!isNaN(val) && val > 0) {
                            updates.push({ date, md: val });
                            if (date === todayStr) todayMdSave = val;
                            if (!calendarEventsData[date]) calendarEventsData[date] = {};
                            calendarEventsData[date].matchday = val;
                        }
                    }
                    if (!updates.length) {
                        statusEl.innerHTML =
                            '<div class="status-msg status-error">No valid matchday numbers entered.</div>';
                        btn.disabled = false;
                        btn.innerHTML = '✅ Confirm All';
                        return;
                    }
                    try {
                        for (const u of updates) {
                            await db.ref(`calendarEvents/${u.date}/matchday`).set(u.md);
                        }
                        if (todayMdSave !== null) {
                            await db.ref(sp(currentSeasonId, 'currentMatchday')).set(todayMdSave);
                            currentMatchday = todayMdSave;
                        } else if (updates.length > 0) {
                            const earliest = updates.reduce((a, b) => a.date < b.date ? a : b);
                            await db.ref(sp(currentSeasonId, 'currentMatchday')).set(earliest.md);
                            currentMatchday = earliest.md;
                        }
                        await loadCalendarEvents();
                        statusEl.innerHTML =
                            `<div class="status-msg status-success">✅ ${updates.length} matchday(s) saved!</div>`;
                        btn.innerHTML = '✓ Done';
                        setTimeout(() => {
                            closeModal();
                            renderCurrentTab();
                        }, 1000);
                    } catch (e) {
                        statusEl.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`;
                        btn.disabled = false;
                        btn.innerHTML = '✅ Confirm All';
                    }
                };
                document.querySelectorAll('.matchday-prediction-input').forEach(inp => {
                    inp.addEventListener('change', function() {
                        const item = dateItems.find(d => d.date === this.dataset.date);
                        if (item) item.predicted = parseInt(this.value) || 0;
                    });
                });
            };
            renderMatchdayModal();
        }

        // ─── Seasons ───
        async function loadSeasonsMetadata() {
            const snap = await db.ref(`${basePath}/seasons`).once('value');
            const seasons = snap.val() || {};
            availableSeasons = [];
            for (const key in seasons) {
                if (!key.startsWith('season_')) continue;
                const id = parseInt(key.split('_')[1]);
                if (!isNaN(id)) availableSeasons.push(id);
                if (seasons[key].active === true) activeSeasonId = id;
            }
            if (!availableSeasons.includes(1)) {
                await db.ref(sp(1, 'groups')).set({});
                await db.ref(`${basePath}/seasons/season_1/active`).set(true);
                availableSeasons.push(1);
                activeSeasonId = 1;
            }
            availableSeasons.sort((a, b) => a - b);
            if (!availableSeasons.includes(activeSeasonId) && availableSeasons.length) activeSeasonId = availableSeasons[0];
            currentSeasonId = activeSeasonId;
            await loadCurrentMatchday();
            updateSeasonUI();
            await loadCurrentSeasonData();
        }

        function updateSeasonUI() {
            document.getElementById('seasonNumber').textContent = `Season ${currentSeasonId}`;
            const idx = availableSeasons.indexOf(currentSeasonId);
            document.getElementById('prevSeasonBtn').disabled = idx <= 0;
            document.getElementById('nextSeasonBtn').disabled = idx >= availableSeasons.length - 1;
            document.getElementById('seasonAdminPanel').style.display = isAdmin ? 'flex' : 'none';
        }

        async function loadCurrentSeasonData() {
            const snap = await db.ref(sp(currentSeasonId, 'groups')).once('value');
            groupsData = snap.val() || {};
        }
        async function loadTopScorerData() {
            const snap = await db.ref(`${basePath}/topScorer/list`).once('value');
            topScorerList = snap.val() ? Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })) : [];
        }
        async function loadTopAssistantData() {
            const snap = await db.ref(`${basePath}/topAssistant/list`).once('value');
            topAssistantList = snap.val() ? Object.entries(snap.val()).map(([k, v]) => ({ key: k, ...v })) : [];
        }

        async function switchSeason(delta) {
            const idx = availableSeasons.indexOf(currentSeasonId);
            const nIdx = idx + delta;
            if (nIdx < 0 || nIdx >= availableSeasons.length) return;
            currentSeasonId = availableSeasons[nIdx];
            updateSeasonUI();
            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();
            await loadCurrentMatchday();
            renderCurrentTab();
        }
        async function addNewSeason() {
            const raw = prompt("Enter new season number:");
            if (!raw) return;
            const id = parseInt(raw);
            if (isNaN(id)) { alert("Invalid"); return; }
            if (availableSeasons.includes(id)) { alert("Already exists"); return; }
            await db.ref(sp(id, 'groups')).set({});
            await db.ref(`${basePath}/seasons/season_${id}/active`).set(false);
            availableSeasons.push(id);
            availableSeasons.sort((a, b) => a - b);
            currentSeasonId = id;
            updateSeasonUI();
            await loadCurrentSeasonData();
            renderCurrentTab();
        }
        async function renameSeason() {
            const raw = prompt(`New number for Season ${currentSeasonId}:`);
            if (!raw) return;
            const id = parseInt(raw);
            if (isNaN(id)) return;
            if (availableSeasons.includes(id) && id !== currentSeasonId) { alert("Number taken"); return; }
            const gSnap = await db.ref(sp(currentSeasonId, 'groups')).once('value');
            const wasActive = activeSeasonId === currentSeasonId;
            await db.ref(sp(id, 'groups')).set(gSnap.val() || {});
            if (wasActive) await db.ref(`${basePath}/seasons/season_${id}/active`).set(true);
            await db.ref(sp(currentSeasonId)).remove();
            availableSeasons = availableSeasons.filter(s => s !== currentSeasonId);
            availableSeasons.push(id);
            availableSeasons.sort((a, b) => a - b);
            if (activeSeasonId === currentSeasonId) activeSeasonId = id;
            currentSeasonId = id;
            updateSeasonUI();
            await loadCurrentSeasonData();
            renderCurrentTab();
        }
        async function setActiveSeason() {
            const updates = {};
            availableSeasons.forEach(s => {
                updates[`${basePath}/seasons/season_${s}/active`] = (s === currentSeasonId);
            });
            await db.ref().update(updates);
            activeSeasonId = currentSeasonId;
            alert(`Season ${currentSeasonId} set as active.`);
        }

        // ─── RENDER FIXTURES ───
        function renderFixtures() {
            const card = document.getElementById('contentCard');
            const subTabsHtml = `<div class="sub-tabs-row">
            <button class="sub-tab-btn ${activeFixtureSubTab==='group-stage'?'active':''}" data-subtab="group-stage">Group Stage</button>
            <button class="sub-tab-btn ${activeFixtureSubTab==='knockout'?'active':''}" data-subtab="knockout">Knockout</button>
          </div>`;
            if (activeFixtureSubTab === 'knockout') {
                card.innerHTML = subTabsHtml +
                    `<div class="coming-soon"><div class="cs-icon">🏆</div><h2>Knockout Round Coming Soon</h2><p>The knockout stage fixtures will be available shortly.</p></div>`;
                card.querySelectorAll('.sub-tab-btn').forEach(btn => btn.addEventListener('click', () => {
                    activeFixtureSubTab = btn.dataset.subtab;
                    renderFixtures();
                }));
                return;
            }
            const allFixtures = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            for (const [dateStr, eventData] of Object.entries(calendarEventsData)) {
                if (eventData.season !== currentSeasonId) continue;
                const tournaments = eventData.tournaments || [];
                for (const tourn of tournaments) {
                    if (!tourn.name || !tourn.name.toLowerCase().match(/uefa nations league|nations league/)) continue;
                    for (const fix of (tourn.fixtures || [])) {
                        allFixtures.push({ date: dateStr, tournament: tourn.name || 'UEFA Nations League', home: fix
                                .home || '', away: fix.away || '' });
                    }
                }
            }
            allFixtures.sort((a, b) => { const da = new Date(a.date),
                    db2 = new Date(b.date),
                    af = da >= today,
                    bf = db2 >= today; if (af && bf) return da - db2; if (!af && !bf) return da - db2; return af ? -1 :
                    1; });
            const allTeams = [...new Set(allFixtures.map(f => [f.home, f.away]).flat().filter(Boolean))].sort();
            const allMonths = [...new Set(allFixtures.map(f => f.date.substring(0, 7)))].sort();
            const ML = { '01': 'January', '02': 'February', '03': 'March', '04': 'April', '05': 'May', '06': 'June',
                '07': 'July', '08': 'August', '09': 'September', '10': 'October', '11': 'November', '12': 'December' };
            const grouped = {};
            for (const fix of allFixtures) { if (!grouped[fix.date]) grouped[fix.date] = [];
                grouped[fix.date].push(fix); }
            const sortedDates = Object.keys(grouped).sort((a, b) => { const da = new Date(a),
                    db2 = new Date(b),
                    af = da >= today,
                    bf = db2 >= today; if (af && bf) return da - db2; if (!af && !bf) return da - db2; return af ? -1 :
                    1; });
            let html = subTabsHtml + `<div class="filters-bar">
            <div class="filter-group"><label>Team</label><select id="fixTeamFilter"><option value="all">All Teams</option>${allTeams.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
            <div class="filter-group"><label>Month</label><select id="fixMonthFilter"><option value="all">All Months</option>${allMonths.map(m=>{const[y,mo]=m.split('-');return`<option value="${m}">${ML[mo]||mo} ${y}</option>`;}).join('')}</select></div>
            <div class="filter-group"><button id="clearFixBtn">Clear Filters</button></div>
            <div class="filter-stats" id="fixFilterStats">${allFixtures.length} fixture${allFixtures.length!==1?'s':''} found</div>
            <a href="manager-calendar.html" class="view-calendar-btn">📅 View Calendar</a>
          </div>`;
            if (!sortedDates.length) { html +=
                    '<div class="empty-state"><div class="empty-icon">📅</div><p>No fixtures found</p></div>'; } else {
                for (const dateStr of sortedDates) {
                    const d = new Date(dateStr);
                    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                    const [y, mo] = dateStr.split('-');
                    const isPast = d < today;
                    html +=
                        `<div class="fixture-date-group"><div class="fixture-date-label">${days[d.getDay()]}, ${d.getDate()} ${ML[mo]||mo} ${y}${isPast?' · Played':''}</div>`;
                    for (const fix of grouped[dateStr]) {

        // ─── BUG 1: Full recalc of group team stats ───
        async function recalculateGroupTeamStats(gid) {
            const teamsSnap = await db.ref(sp(currentSeasonId, `groups/${gid}/teams`)).once('value');
            const teams = teamsSnap.val() || {};
            const resetTeams = {};
            for (const [k, v] of Object.entries(teams)) {
                resetTeams[k] = {
                    name: v.name,
                    p: 0,
                    w: 0,
                    d: 0,
                    l: 0,
                    gs: 0,
                    gc: 0,
                    gd: 0,
                    pts: 0
                };
            }
            const resultsSnap = await db.ref(sp(currentSeasonId, `groups/${gid}/results`)).once('value');
            const results = resultsSnap.val() || {};
            for (const r of Object.values(results)) {
                const hKey = Object.keys(resetTeams).find(k => resetTeams[k].name === r.homeTeam);
                const aKey = Object.keys(resetTeams).find(k => resetTeams[k].name === r.awayTeam);
                if (!hKey || !aKey) continue;
                const hData = resetTeams[hKey],
                    aData = resetTeams[aKey];
                const forfeit = r.forfeitType || 'none';
                const hScore = r.homeScore || 0,
                    aScore = r.awayScore || 0;
                if (forfeit === 'no_contest') {
                    hData.p++;
                    aData.p++;
                } else if (forfeit === 'forfeit' || forfeit === 'forfeit_no_reply' || forfeit === 'forfeit_agreement') {
                    hData.p++;
                    aData.p++;
                    hData.w++;
                    hData.pts += 3;
                    aData.l++;
                    aData.gc += 3;
                    aData.gd -= 3;
                } else {
                    hData.p++;
                    aData.p++;
                    hData.gs += hScore;
                    hData.gc += aScore;
                    aData.gs += aScore;
                    aData.gc += hScore;
                    hData.gd = hData.gs - hData.gc;
                    aData.gd = aData.gs - aData.gc;
                    if (hScore > aScore) {
                        hData.w++;
                        hData.pts += 3;
                        aData.l++;
                    } else if (aScore > hScore) {
                        aData.w++;
                        aData.pts += 3;
                        hData.l++;
                    } else {
                        hData.d++;
                        aData.d++;
                        hData.pts += 1;
                        aData.pts += 1;
                    }
                }
            }
            await db.ref(sp(currentSeasonId, `groups/${gid}/teams`)).set(resetTeams);
        }

        // ─── SCORERS & ASSISTS AUTO-MERGE ───
        async function applyScorersFromScan(scorers, team) {
            if (!scorers || !scorers.length) return;
            const listRef = db.ref(`${basePath}/topScorer/list`);
            const snap = await listRef.once('value');
            const existing = snap.val() || {};

            for (const s of scorers) {
                const name = s.player?.trim();
                const goals = s.goals || 1;
                if (!name) continue;
                let foundKey = null;
                let foundData = null;
                for (const [key, val] of Object.entries(existing)) {
                    if (val.name === name && val.team === team) {
                        foundKey = key;
                        foundData = val;
                        break;
                    }
                }
                if (foundKey && foundData) {
                    const newCount = (foundData.count || 0) + goals;
                    await db.ref(`${basePath}/topScorer/list/${foundKey}`).set({
                        ...foundData,
                        count: newCount,
                        name: foundData.name,
                        team: foundData.team,
                        imageUrl: foundData.imageUrl || ''
                    });
                } else {
                    await listRef.push({
                        name: name,
                        team: team,
                        count: goals,
                        imageUrl: ''
                    });
                }
            }
        }

        async function applyAssistsFromScan(assists, team) {
            if (!assists || !assists.length) return;
            const listRef = db.ref(`${basePath}/topAssistant/list`);
            const snap = await listRef.once('value');
            const existing = snap.val() || {};

            for (const a of assists) {
                const name = a.player?.trim();
                const count = a.assists || 1;
                if (!name) continue;
                let foundKey = null;
                let foundData = null;
                for (const [key, val] of Object.entries(existing)) {
                    if (val.name === name && val.team === team) {
                        foundKey = key;
                        foundData = val;
                        break;
                    }
                }
                if (foundKey && foundData) {
                    const newCount = (foundData.count || 0) + count;
                    await db.ref(`${basePath}/topAssistant/list/${foundKey}`).set({
                        ...foundData,
                        count: newCount,
                        name: foundData.name,
                        team: foundData.team,
                        imageUrl: foundData.imageUrl || ''
                    });
                } else {
                    await listRef.push({
                        name: name,
                        team: team,
                        count: count,
                        imageUrl: ''
                    });
                }
            }
        }

        async function approveScoresheet(id, entry) {
            let targetResult = null;
            let targetGroupId = null;
            let targetKey = null;
            for (const gid in groupsData) {
                const rSnap = await db.ref(sp(currentSeasonId, `groups/${gid}/results`)).once('value');
                const rData = rSnap.val() || {};
                for (const [key, val] of Object.entries(rData)) {
                    if (val.homeTeam === entry.homeTeam && val.awayTeam === entry.awayTeam) {
                        targetResult = val;
                        targetGroupId = gid;
                        targetKey = key;
                        break;
                    }
                }
                if (targetResult) break;
            }

            if (!targetResult || !targetGroupId || !targetKey) {
                alert('Could not find the corresponding result. Please check the teams.');
                return;
            }

            const existingHome = targetResult.goalScorers?.home || [];
            const existingAway = targetResult.goalScorers?.away || [];
            const newHome = entry.goalScorers || [];
            const newAway = [];

            const mergedHome = [...existingHome];
            for (const s of newHome) {
                const existing = mergedHome.find(e => e.player === s.player);
                if (existing) {
                    existing.goals = (existing.goals || 0) + (s.goals || 1);
                } else {
                    mergedHome.push({ player: s.player, goals: s.goals || 1 });
                }
            }

            const existingAssistsHome = targetResult.userAssists?.home || [];
            const mergedAssistsHome = [...existingAssistsHome];
            const newAssists = entry.userAssists || [];
            for (const a of newAssists) {
                const existing = mergedAssistsHome.find(e => e.player === a.player);
                if (existing) {
                    existing.assists = (existing.assists || 0) + (a.assists || 1);
                } else {
                    mergedAssistsHome.push({ player: a.player, assists: a.assists || 1 });
                }
            }

            targetResult.goalScorers = { home: mergedHome, away: existingAway };
            targetResult.userAssists = { home: mergedAssistsHome, away: targetResult.userAssists?.away || [] };

            await db.ref(sp(currentSeasonId, `groups/${targetGroupId}/results/${targetKey}`)).set(targetResult);

            await applyScorersFromScan(mergedHome, entry.homeTeam);
            await applyAssistsFromScan(mergedAssistsHome, entry.homeTeam);

            await db.ref(sp(currentSeasonId, `pending_scoresheets/${id}`)).remove();

            alert('✅ Scoresheet approved and merged!');
        }

        // ─── SAST Helpers ───
        function getSASTDate() {
            const now = new Date();
            const sast = new Date(now.getTime() + (2 * 60 * 60 * 1000));
            return sast.toISOString().split('T')[0];
        }

        function getSASTYesterday() {
            const now = new Date();
            const sast = new Date(now.getTime() + (2 * 60 * 60 * 1000));
            sast.setDate(sast.getDate() - 1);
            return sast.toISOString().split('T')[0];
        }

        function getSASTToday() {
            return getSASTDate();
        }

        // ─── Manager Key System ───
        async function loadManagerKeys() {
            const snap = await db.ref('managerKeys').once('value');
            const data = snap.val() || {};
            managerKeysCache = {};
            for (const key in data) {
                const entry = data[key];
                if (entry && entry.key && entry.teamName) {
                    managerKeysCache[key] = {
                        id: key,
                        key: entry.key,
                        teamName: entry.teamName,
                        createdAt: entry.createdAt || Date.now(),
                        lastSubmissionTimestamp: entry.lastSubmissionTimestamp || 0
                    };
                }
            }
            return managerKeysCache;
        }

        async function findManagerKeyId(keyValue) {
            await loadManagerKeys();
            const upper = keyValue.toUpperCase().trim();
            for (const id in managerKeysCache) {
                if (managerKeysCache[id].key === upper) return id;
            }
            return null;
        }

        // ─── Submission Lock & Edit System ───
        async function getMyPendingEntries(managerKey) {
            const snap = await db.ref(sp(currentSeasonId, 'pending_results')).once('value');
            const data = snap.val() || {};
            return Object.entries(data).filter(([k, v]) => v.submittedBy === managerKey);
        }

                const scorersHtml = scoresheetScorers.map((s, i) =>

                <div class="scorer-list" id="ssScorerList">${scorersHtml}</div>
              </div>

                  <input type="text" id="ssAssistName" placeholder="Player" style="flex:2;">
                  <input type="number" id="ssAssistCount" value="1" style="width:70px;">
                  <button class="modal-btn-primary" id="ssAddAssist" style="padding:8px 14px;font-size:1rem;">Add</button>
                </div>
                <div class="scorer-list" id="ssAssistList">${assistsHtml}</div>
              </div>
              <div id="ssStatus"></div>

                document.getElementById('ssAddScorer').onclick = () => {

                    scoresheetAssists.push({ player: name, assists: count });

                    btn.onclick = () => {
                        const idx = parseInt(btn.dataset.sidx);
                        if (btn.dataset.sside === 'scorer') scoresheetScorers.splice(idx, 1);

                        statusEl.innerHTML =
                        '<div class="status-msg status-error">Add at least one scorer or assist.</div>';
                        return;

                    try {
                        const data = {
                            groupId: groupId,
                            resultKey: resultKey,
                            homeTeam: result.homeTeam,
                            awayTeam: result.awayTeam,
                            goalScorers: scoresheetScorers,
                            userAssists: scoresheetAssists,
                            submittedBy: rememberedManagerKey,
                            submittedAt: Date.now()
                        };

                            '<div class="status-msg status-success">✅ Scoresheet submitted for approval!</div>';

                            }

                                const found = mergedAway.find(e => e.player === s.player);

                                else mergedAway.push({ player: s.player, goals: s.goals || 1 });
                            }

                                const found = mergedAssHome.find(e => e.player === a.player);
                                if (found) found.assists = (found.assists || 0) + (a.assists || 1);
                                else mergedAssHome.push({ player: a.player, assists: a.assists || 1 });
                            }
                            const mergedAssAway = [...(existingMatch.userAssists?.away || [])];
                            for (const a of userAssistsAway) {
                                const found = mergedAssAway.find(e => e.player === a.player);
                                if (found) found.assists = (found.assists || 0) + (a.assists || 1);
                                else mergedAssAway.push({ player: a.player, assists: a.assists || 1 });
                            }

                            for (const url of imageUrls) {
                                if (!mergedImages.includes(url)) mergedImages.push(url);
                            }
                            const mergedData = {
                                ...existingMatch,
                                goalScorers: { home: mergedHome, away: mergedAway },
                                userAssists: { home: mergedAssHome, away: mergedAssAway },
                                images: mergedImages,
                                mutuallyConfirmed: true,
                                _mergedAt: Date.now()
                            };
                            await db.ref(sp(currentSeasonId, `pending_results/${existingKey}`)).set(mergedData);
                            statusEl.innerHTML =
                                '<div class="status-msg status-success">✅ Result merged with mutual submission! Both parties confirmed.</div>';
                            const keyId = await findManagerKeyId(rememberedManagerKey);
                            if (keyId) await db.ref(`managerKeys/${keyId}/lastSubmissionTimestamp`).set(Date
                            .now());
                            setTimeout(closeModal, 1500);
                            return;
                        }

                        if (editEntry && editingPendingId) {
                            await db.ref(sp(currentSeasonId, `pending_results/${editingPendingId}`)).set(

                                '<div class="status-msg status-success">✅ Result updated! Waiting for approval.</div>';

                        if (keyId) await db.ref(`managerKeys/${keyId}/lastSubmissionTimestamp`).set(Date.now());
                        statusEl.innerHTML =
                            '<div class="status-msg status-success">✅ Result submitted for approval!</div>';
                        setTimeout(closeModal, 1500);
                    } catch (err) {
                        statusEl.innerHTML =
                            `<div class="status-msg status-error">❌ Error: ${escapeHtml(err.message)}</div>`;
                    }
                };
            };
            renderForm();

                    } catch (err) {
