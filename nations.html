                            `<div class="status-msg status-error">❌ Error: ${escapeHtml(err.message)}</div>`;
                    }
                };
            };
            renderForfeitForm();
        }

        function formatResultText(homeTeam, homeScore, awayTeam, awayScore, forfeitType) {
            if (forfeitType === 'no_contest') return `${homeTeam} F - F ${awayTeam} (No Contest)`;
            if (forfeitType === 'forfeit_no_reply') return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited - No Reply)`;
            if (forfeitType === 'forfeit_agreement') return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited on Agreement)`;
            return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`;
        }

        // ─── Pending Results Admin ───
        function openPendingResultsModal() {
            showModal(
                `<h3>⏳ Pending Results</h3><div id="pendingContainer"><div class="loading-spinner"><div class="spinner"></div><span>Loading…</span></div></div><div class="modal-btns"><button class="modal-btn-cancel" id="closePendingBtn" style="width:100%;">Close</button></div>`
                );
            document.getElementById('closePendingBtn').onclick = closeModal;
            loadPendingIntoModal();
        }

        async function loadPendingIntoModal() {
            const container = document.getElementById('pendingContainer');
            if (!container) return;
            const snap = await db.ref(sp(currentSeasonId, 'pending_results')).once('value');
            const data = snap.val() || {};
            const entries = Object.entries(data);
            if (!entries.length) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><p>No pending results</p></div>';
                return;
            }
            let html = '';
            for (const [id, entry] of entries) {
                const isForfeit = entry.forfeitType && entry.forfeitType !== 'none';
                const isMutual = entry.mutuallyConfirmed === true;
                const scoreDisplay = entry.forfeitType === 'no_contest' ? 'F — F' : `${entry.homeScore||0} — ${entry.awayScore||0}`;
                const hIco = getTeamIconHtml(entry.homeTeam, 'team-icon-sm');
                const aIco = getTeamIconHtml(entry.awayTeam, 'team-icon-sm');
                const mutualBadge = isMutual ?
                    `<span class="mutual-badge">🤝 Mutual</span>` : '';
                html += `<div style="background:rgba(255,255,255,0.04);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.08);">
              <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                <div style="display:flex;align-items:center;gap:8px;">${hIco}<strong style="color:white;">${escapeHtml(entry.homeTeam||'')}</strong><span style="color:rgba(255,255,255,0.4);">vs</span><strong style="color:white;">${escapeHtml(entry.awayTeam||'')}</strong>${aIco}</div>
                <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                  <span style="font-weight:700;font-size:1.4rem;color:white;">${scoreDisplay}</span>
                  ${entry.md ? `<span class="meta-tag" style="font-size:0.9rem;padding:4px 14px;">MD ${entry.md}</span>` : ''}
                  ${isForfeit ? `<span class="meta-tag" style="background:rgba(239,68,68,0.2);color:#f87171;font-size:0.9rem;padding:4px 14px;">Forfeit</span>` : ''}
                  ${mutualBadge}
                  <span style="color:rgba(255,255,255,0.3);font-size:0.8rem;">by ${escapeHtml(entry.submittedBy||'')}</span>
                </div>
                <div style="display:flex;gap:8px;">
                  <button class="btn-sm btn-edit pending-preview-btn" data-id="${id}" style="font-size:0.9rem;padding:6px 16px;">👁️</button>
                  <button class="btn-sm" style="background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.3);font-size:0.9rem;padding:6px 16px;" class="pending-approve-btn" data-id="${id}">✅ Approve</button>
                  <button class="btn-sm btn-delete pending-reject-btn" data-id="${id}" style="font-size:0.9rem;padding:6px 16px;">🗑️ Reject</button>
                </div>
              </div>
            </div>`;
            }
            container.innerHTML = html;
            container.querySelectorAll('.pending-preview-btn').forEach(btn => {
                btn.onclick = () => openPendingPreview(btn.dataset.id, data[btn.dataset.id]);
            });
            container.querySelectorAll('[data-id]').forEach(btn => {
                if (btn.textContent.includes('Approve')) btn.onclick = async () => {
                    if (!confirm('Approve this result?')) return;
                    await approvePendingResult(btn.dataset.id, data[btn.dataset.id]);
                    loadPendingIntoModal();
                    renderCurrentTab();
                };
                if (btn.classList.contains('pending-reject-btn')) btn.onclick = async () => {
                    if (!confirm('Reject this result?')) return;
                    await db.ref(sp(currentSeasonId, `pending_results/${btn.dataset.id}`)).remove();
                    loadPendingIntoModal();
                };
            });
        }

        function openPendingPreview(id, entry) {
            const images = entry.images || [];
            const imgsHtml = images.map(url =>
                `<img src="${url}" style="max-width:200px;max-height:200px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,0.15);cursor:pointer;" onclick="window.open('${url}','_blank')">`
                ).join('');
            const hScorers = (entry.goalScorers?.home || []).map(s => `⚽ ${escapeHtml(s.player)} (${s.goals})`).join(', ');
            const aScorers = (entry.goalScorers?.away || []).map(s => `⚽ ${escapeHtml(s.player)} (${s.goals})`).join(', ');
            const hAssists = (entry.userAssists?.home || []).map(a => `🎯 ${escapeHtml(a.player)} (${a.assists})`).join(', ');
            const aAssists = (entry.userAssists?.away || []).map(a => `🎯 ${escapeHtml(a.player)} (${a.assists})`).join(', ');
            const submittedAt = entry.submittedAt ? new Date(entry.submittedAt).toLocaleString() : 'Unknown';
            const isMutual = entry.mutuallyConfirmed === true;
            showModal(`<h3>👁️ Preview Result ${isMutual ? '🤝 (Mutual)' : ''}</h3>
            <div style="background:rgba(255,255,255,0.04);border-radius:16px;padding:20px;margin-bottom:16px;">
              <div style="font-size:1.4rem;color:white;text-align:center;margin-bottom:12px;">
                <strong>${escapeHtml(entry.homeTeam||'')}</strong>
                ${entry.forfeitType==='no_contest'?'F — F':`${entry.homeScore||0} — ${entry.awayScore||0}`}
                <strong>${escapeHtml(entry.awayTeam||'')}</strong>
              </div>
              <div style="color:rgba(255,255,255,0.5);font-size:1rem;text-align:center;">
                MD ${entry.md||'?'} · ${escapeHtml(entry.date||'')} · Submitted: ${submittedAt}
                ${isMutual ? ' · 🤝 Mutual' : ''}
              </div>
              ${hScorers ? `<div style="margin-top:8px;color:rgba(255,255,255,0.7);">Home: ${hScorers}</div>` : ''}
              ${aScorers ? `<div style="color:rgba(255,255,255,0.7);">Away: ${aScorers}</div>` : ''}
              ${hAssists ? `<div style="color:rgba(255,255,255,0.7);">Home Assists: ${hAssists}</div>` : ''}
              ${aAssists ? `<div style="color:rgba(255,255,255,0.7);">Away Assists: ${aAssists}</div>` : ''}
            </div>
            ${imgsHtml ? `<div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px;">${imgsHtml}</div>` : '<p style="color:rgba(255,255,255,0.3);">No images</p>'}
            <div id="previewActionStatus"></div>
            <div class="modal-btns">
              <button class="modal-btn-primary" id="previewApproveBtn">✅ Approve</button>
              <button class="modal-btn-cancel" id="previewRejectBtn">🗑️ Reject</button>
              <button class="modal-btn-cancel" id="previewCloseBtn" style="flex:0.5;">Close</button>
            </div>`);
            document.getElementById('previewCloseBtn').onclick = closeModal;
            document.getElementById('previewApproveBtn').onclick = async () => {
                if (!confirm('Approve?')) return;
                await approvePendingResult(id, entry);
                closeModal();
                renderCurrentTab();
            };
            document.getElementById('previewRejectBtn').onclick = async () => {
                if (!confirm('Reject?')) return;
                await db.ref(sp(currentSeasonId, `pending_results/${id}`)).remove();
                closeModal();
            };
        }

        // ─── approvePendingResult ───
        async function approvePendingResult(id, entry) {
            await loadCurrentSeasonData();

            const forfeitType = entry.forfeitType || 'none';
            const homeScore = entry.homeScore || 0;
            const awayScore = entry.awayScore || 0;

            const resultObj = {
                matchText: entry.matchText || formatResultText(entry.homeTeam, homeScore, entry.awayTeam, awayScore,
                    forfeitType),
                homeTeam: entry.homeTeam,
                awayTeam: entry.awayTeam,
                homeScore,
                awayScore,
                forfeitType,
                md: entry.md || 0,
                date: entry.date || '',
                venue: entry.venue || '',
                goalScorers: entry.goalScorers || { home: [], away: [] },
                userAssists: entry.userAssists || { home: [], away: [] },
                _approved: true,
                _approvedAt: Date.now(),
                mutuallyConfirmed: entry.mutuallyConfirmed || false
            };

            // --- FIX: Read fresh groups from Firebase ---
            let groupFound = false;
            const freshGroupsSnap = await db.ref(sp(currentSeasonId, 'groups')).once('value');
            const freshGroups = freshGroupsSnap.val() || {};
            for (const gid in freshGroups) {
                const teams = freshGroups[gid]?.teams || {};
                let hasHome = false,
                    hasAway = false;
                for (const k in teams) {
                    if (teams[k]?.name === entry.homeTeam) hasHome = true;
                    if (teams[k]?.name === entry.awayTeam) hasAway = true;
                }
                if (hasHome && hasAway) {
                    await db.ref(sp(currentSeasonId, `groups/${gid}/results`)).push(resultObj);
                    // BUG 1: Use recalculateGroupTeamStats instead of updateGroupTeamStats
                    await recalculateGroupTeamStats(gid);
                    groupFound = true;
                    break;
                }
            }

            if (!groupFound) {
                await db.ref(sp(currentSeasonId, 'general_results')).push(resultObj);
            }

            const homeScorers = entry.goalScorers?.home || [];
            const awayScorers = entry.goalScorers?.away || [];
            const homeAssists = entry.userAssists?.home || [];
            const awayAssists = entry.userAssists?.away || [];

            if (homeScorers.length) await applyScorersFromScan(homeScorers, entry.homeTeam);
            if (awayScorers.length) await applyScorersFromScan(awayScorers, entry.awayTeam);
            if (homeAssists.length) await applyAssistsFromScan(homeAssists, entry.homeTeam);
            if (awayAssists.length) await applyAssistsFromScan(awayAssists, entry.awayTeam);

            await db.ref(sp(currentSeasonId, `pending_results/${id}`)).remove();
            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();
        }

        // ─── Manager Keys Admin Modal ───
        function openManagerKeysModal() {
            loadManagerKeys().then(() => {
                const allTeams = [];
                for (const gid in groupsData) {
                    const teams = groupsData[gid]?.teams || {};
                    for (const k in teams) {
                        if (teams[k]?.name) allTeams.push(teams[k].name);
                    }
                }
                const uniqueTeams = [...new Set(allTeams)].sort();
                const entries = Object.values(managerKeysCache);
                let listHtml = entries.length ? entries.map(e =>
                    `<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);"><div><span style="font-weight:700;color:white;font-family:monospace;">${escapeHtml(e.key)}</span><span style="color:rgba(255,255,255,0.4);margin-left:12px;">→ ${escapeHtml(e.teamName)}</span></div><button class="btn-sm btn-delete mk-del-btn" data-id="${e.id}" style="font-size:0.9rem;padding:6px 14px;">Delete</button></div>`
                    ).join('') :
                    '<p style="color:rgba(255,255,255,0.3);">No keys yet.</p>';
                showModal(`<h3>🔑 Manager Keys</h3>
              <div style="margin-bottom:20px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:20px;background:rgba(255,255,255,0.03);">
                <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
                  <input type="text" id="mkKeyInput" placeholder="Key value" style="flex:1;min-width:120px;">
                  <select id="mkTeamSelect" style="flex:1;min-width:140px;"><option value="">Select Team</option>${uniqueTeams.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>
                  <button class="modal-btn-primary" id="mkCreateBtn" style="padding:12px 24px;font-size:1.2rem;">+ Create</button>
                </div>
                <div id="mkStatus" style="margin-top:10px;"></div>
              </div>
              <div>${listHtml}</div>
              <div class="modal-btns"><button class="modal-btn-cancel" id="closeMkBtn" style="width:100%;">Close</button></div>`);
                document.getElementById('closeMkBtn').onclick = closeModal;
                document.getElementById('mkCreateBtn').onclick = async () => {
                    const key = document.getElementById('mkKeyInput').value.trim().toUpperCase();
                    const team = document.getElementById('mkTeamSelect').value;
                    const statusEl = document.getElementById('mkStatus');
                    if (!key || !team) { statusEl.innerHTML =
                            '<div class="status-msg status-error">Enter key and select team.</div>'; return; }
                    const existing = await findManagerKeyId(key);
                    if (existing) { statusEl.innerHTML =
                            '<div class="status-msg status-error">Key already exists.</div>'; return; }
                    statusEl.innerHTML = '<div class="status-msg status-loading">Creating…</div>';
                    try {
                        await db.ref('managerKeys').push({ key, teamName: team, createdAt: Date.now(),
                            lastSubmissionTimestamp: 0 });
                        statusEl.innerHTML = '<div class="status-msg status-success">✅ Created!</div>';
                        await loadManagerKeys();
                        setTimeout(openManagerKeysModal, 600);
                    } catch (err) {
                        statusEl.innerHTML =
                            `<div class="status-msg status-error">❌ ${escapeHtml(err.message)}</div>`;
                    }
                };
                document.querySelectorAll('.mk-del-btn').forEach(btn => {
                    btn.onclick = async () => {
                        if (!confirm('Delete this key?')) return;
                        await db.ref(`managerKeys/${btn.dataset.id}`).remove();
                        await loadManagerKeys();
                        openManagerKeysModal();
                    };
                });
            });
        }
