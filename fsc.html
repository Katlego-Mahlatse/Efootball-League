        function addDebugLog(level, msg, stack = null) {
            const entry = {
                time: new Date().toLocaleTimeString(),
                timestamp: Date.now(),
                level: level,
                message: msg,
                stack: stack
            };
            debugLogs.push(entry);
            if (debugLogs.length > MAX_DEBUG_LOGS) debugLogs.shift();
        }

        const origConsoleLog = console.log;
        const origConsoleError = console.error;
        const origConsoleWarn = console.warn;
        const origConsoleInfo = console.info;
        const origConsoleDebug = console.debug;

        console.log = function(...args) {
            origConsoleLog.apply(console, args);
            addDebugLog('info', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
        };
        console.error = function(...args) {
            origConsoleError.apply(console, args);
            const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ');
            const stack = args.find(a => a instanceof Error)?.stack || null;
            addDebugLog('error', msg, stack);
        };
        console.warn = function(...args) {
            origConsoleWarn.apply(console, args);
            addDebugLog('warn', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
        };
        console.info = function(...args) {
            origConsoleInfo.apply(console, args);
            addDebugLog('info', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
        };
        console.debug = function(...args) {
            origConsoleDebug.apply(console, args);
            addDebugLog('debug', args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' '));
        };

        window.onerror = function(message, source, lineno, colno, error) {

            addDebugLog('error', `${message} at ${source}:${lineno}:${colno}`, stack);
            return false;
        };

            return sast.toISOString().split('T')[0];
        }

        function getSASTDateObj() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (2 * 3600000));
        }

        function getSASTToday() {
            return getSASTDate();

            if (oldEmbedCode) {

            const videosData = videosSnap.val() || {};

                    newVideos.push({ id: key, title: video.title || 'Match Video', embedCode: video.embedCode });
                }
            }

            if (newVideos.length > 0) {
                if (watchMatchVideos.length > 0 && watchMatchVideos[0].id === 'legacy') {
                    const existingIds = new Set(watchMatchVideos.map(v => v.id));
                    for (const v of newVideos) {
                        if (!existingIds.has(v.id)) {

                    watchMatchVideos = newVideos;

        async function addWatchMatchVideo(title, embedCode) {
            let finalEmbed = embedCode.trim();
            if (finalEmbed.includes("youtube.com/watch?v=") || finalEmbed.includes("youtu.be/")) {
                let videoId = '';
                if (finalEmbed.includes("youtu.be/")) videoId = finalEmbed.split("youtu.be/")[1].split(/[?#]/)[0];
                else { const u = new URLSearchParams(new URL(finalEmbed).search);
                    videoId = u.get('v'); }
                if (videoId) finalEmbed =
                    `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            }

            const videoData = { title: title.trim() || 'Match Video', embedCode: finalEmbed };
            const newRef = await database.ref('fifasupercup/watchMatch/videos').push(videoData);
            watchMatchVideos.push({ id: newRef.key, title: videoData.title, embedCode: videoData.embedCode });
            if (document.querySelector('.tab-btn.active')?.dataset.tab === 'watch') renderWatchMatch();
        }

        async function deleteWatchMatchVideo(videoId) {
            if (videoId === 'legacy') {
                await database.ref('fifasupercup/watchMatch/embedCode').remove();

            } else {
                await database.ref(`fifasupercup/watchMatch/videos/${videoId}`).remove();

        }

        async function reverseScorerCount(playerName, team, count) {
            const path = getSeasonPath(currentSeasonId, 'topScorers/list');
            const existing = findMatchingPlayer(topScorerList, playerName, team);
            if (existing && existing.key) {
                const newCount = Math.max(0, (existing.count || 0) - count);
                if (newCount === 0) {
                    await database.ref(`${path}/${existing.key}`).remove();
                } else {
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                }
            }
            await loadTopScorerData();
        }

        async function addTeam(teamName) {
            if (!teamName || teamName.trim() === '') return;
            const trimmed = teamName.trim();
            // Check duplicates

                if (!key.startsWith('season_')) continue;

                if (seasons[key].active === true) activeSeasonId = id;

        // ─── 24-HOUR THROTTLE CHECK ───
        async function canUserSubmitResult(managerKey) {
            const snap = await database.ref('managerKeys').orderByChild('key').equalTo(managerKey).once('value');
            const keys = snap.val();
            if (!keys) return { allowed: false, message: 'Invalid key' };

            const keyId = Object.keys(keys)[0];
            const keyData = keys[keyId];
            const lastSubmission = keyData.lastSubmissionTimestamp || null;

            if (!lastSubmission) {
                return { allowed: true, message: null };
            }

            const now = Date.now();
            const hoursAgo = (now - lastSubmission) / (1000 * 60 * 60);

            if (hoursAgo < 24) {
                const hoursRemaining = Math.ceil(24 - hoursAgo);
                const minutesRemaining = Math.ceil((24 - hoursAgo) * 60);
                return {
                    allowed: false,
                    message: `You can submit again in ${hoursRemaining} hour${hoursRemaining > 1 ? 's' : ''} and ${minutesRemaining % 60} minute${(minutesRemaining % 60) !== 1 ? 's' : ''}`
                };
            }

            return { allowed: true, message: null };
        }

        // ─── SAST DAILY SUBMISSION COUNT ───
        async function getUserDailySubmissionCount(managerKey, sastDate) {
            const snap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
            const data = snap.val() || {};
            let count = 0;
            const submittedMds = [];
            for (const key in data) {
                const entry = data[key];
                if (entry.submittedBy === managerKey && entry.submittedAt) {
                    const entryDate = new Date(entry.submittedAt);
                    const entrySAST = new Date(entryDate.getTime() + (2 * 3600000));
                    const entryDateStr = entrySAST.toISOString().split('T')[0];
                    if (entryDateStr === sastDate) {
                        count++;
                        if (entry.md) submittedMds.push(entry.md);
                    }
                }
            }
            return { count, submittedMds };
        }

        async function validateDailyMatchLimit(managerKey, proposedMatchday) {
            const sastDate = getSASTDate();
            const { count, submittedMds } = await getUserDailySubmissionCount(managerKey, sastDate);

            if (count >= 2) {
                return { allowed: false, message: "You've reached your 2-match daily limit. Try again tomorrow." };
            }

            if (count === 1) {
                const existingMd = submittedMds[0];
                if (existingMd === proposedMatchday) {
                    return { allowed: false, message: "Your daily matches must be on different matchdays (one current, one previous)." };
                }
            }

            return { allowed: true, message: null };
        }

        // ─── SAST-based opponent auto-detection ───
        function getTeamFixturesFromCalendar(teamName) {
            const fixtures = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            for (const [dateStr, eventData] of Object.entries(calendarEventsData)) {
                if (!eventData || !eventData.tournaments) continue;
                for (const tournament of eventData.tournaments) {
                    let isPremier = false;
                    if (tournament.name) {
                        const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, '');
                        if (normalized === 'fifasupercup') isPremier = true;
                    }
                    if (isPremier && tournament.fixtures && Array.isArray(tournament.fixtures)) {
                        for (const fix of tournament.fixtures) {
                            if (fix.home === teamName || fix.away === teamName) {
                                fixtures.push({ date: dateStr, home: fix.home || '', away: fix.away || '' });
                            }
                        }
                    }
                }
            }
            fixtures.sort((a, b) => a.date.localeCompare(b.date));
            return fixtures;
        }

        function getTeamOpponentForDate(teamName, dateStr) {
            const fixtures = getTeamFixturesFromCalendar(teamName);
            const match = fixtures.find(f => f.date === dateStr);
            if (!match) return null;
            return match.home === teamName ? match.away : match.home;
        }

        function getTeamMatchdayMap(teamName) {
            const fixtures = getTeamFixturesFromCalendar(teamName);
            const map = {};
            let md = 1;
            let lastDate = null;
            for (const f of fixtures) {
                if (f.date !== lastDate) {
                    md = Object.keys(map).length + 1;
                    lastDate = f.date;
                }
                map[f.date] = md;
            }
            return map;
        }

        function getAutoMatchdayForTeamAndDate(teamName, dateStr) {
            const map = getTeamMatchdayMap(teamName);
            return map[dateStr] || null;
        }

            let history = getEditHistory(managerKey);
            const cutoff = Date.now() - 48 * 60 * 60 * 1000;
            history = history.filter(h => h.timestamp > cutoff);
            saveEditHistory(managerKey, history);
            return history;

        async function submitResultEdit(entryId, oldData, newData, isPending, linkedTeam, managerKey) {
            // Purge stale and count edits
            const history = purgeStaleEditHistory(managerKey);
            const editCount = history.filter(h => h.entryId === entryId).length;
            const delay = editCount === 0 ? 30 * 60 * 1000 : 4 * 60 * 60 * 1000;

            // Push history entry
            const historyEntry = {
                entryId,
                timestamp: Date.now(),
                oldData: JSON.stringify(oldData),
                newData: JSON.stringify(newData),
                approveAt: Date.now() + delay,
                applied: false
            };
            history.push(historyEntry);
            saveEditHistory(managerKey, history);

            // Write edited data to Firebase with pending approval flag
            const path = getSeasonPath(currentSeasonId, isPending ? 'pending_results' : 'results');
            const updatePayload = { ...newData, editApprovalPending: true, editApproveAt: Date.now() + delay };
            await database.ref(`${path}/${entryId}`).update(updatePayload);

            const msg = editCount === 0 ?
                "✏️ Edited! Your changes will be approved in 30 minutes." :
                "✏️ Edited! Your changes will be approved in 4 hours (repeated edits take longer to review).";
            showModal(`
            <div style="text-align:center;padding:30px 0;">
              <div style="font-size:4rem;">✅</div>
              <h3 style="color:var(--turquoise);font-size:2.4rem;margin:20px 0;">${msg}</h3>
              <button class="modal-btn-cancel" id="closeEditStatusBtn" style="width:100%;">Close</button>
            </div>
          `);

        }

        async function processEditApprovals() {
            const resultsPath = getSeasonPath(currentSeasonId, 'results');
            const pendingPath = getSeasonPath(currentSeasonId, 'pending_results');

            // Scan results for editApprovalPending
            const snapResults = await database.ref(resultsPath).once('value');
            const resultsDataRaw = snapResults.val() || {};
            for (const key in resultsDataRaw) {
                const entry = resultsDataRaw[key];
                if (entry.editApprovalPending === true && entry.editApproveAt && entry.editApproveAt <= Date.now()) {
                    // This is an approved edit on an already-approved result
                    // We need to reverse old stats and apply new stats.
                    // Find the corresponding history entry
                    const allHist = getEditHistory(entry.submittedBy || '');
                    const histEntry = allHist.find(h => h.entryId === key && h.applied === false);
                    if (histEntry) {
                        const oldData = JSON.parse(histEntry.oldData);
                        const newData = JSON.parse(histEntry.newData);
                        // Reverse old stats
                        await reverseResultStats(oldData);
                        // Apply new stats
                        await applyResultStats(newData);
                        // Mark as applied
                        histEntry.applied = true;
                        saveEditHistory(entry.submittedBy || '', allHist);
                        // Clear approval flags
                        await database.ref(`${resultsPath}/${key}/editApprovalPending`).remove();
                        await database.ref(`${resultsPath}/${key}/editApproveAt`).remove();
                    } else {
                        // No history entry found, just clear flags
                        await database.ref(`${resultsPath}/${key}/editApprovalPending`).remove();
                        await database.ref(`${resultsPath}/${key}/editApproveAt`).remove();
                    }
                }
            }

            // Also scan pending_results for editApprovalPending (just clear flags, no stats to reverse)
            const snapPending = await database.ref(pendingPath).once('value');
            const pendingDataRaw = snapPending.val() || {};
            for (const key in pendingDataRaw) {
                const entry = pendingDataRaw[key];
                if (entry.editApprovalPending === true && entry.editApproveAt && entry.editApproveAt <= Date.now()) {
                    await database.ref(`${pendingPath}/${key}/editApprovalPending`).remove();
                    await database.ref(`${pendingPath}/${key}/editApproveAt`).remove();
                }
            }
        }

                <td>${entry.d || 0}</td>

        // ─── Apply result stats to table ───
        async function applyResultStats(resultData) {
            const homeTeam = resultData.homeTeam;
            const awayTeam = resultData.awayTeam;
            const homeScore = resultData.homeScore || 0;
            const awayScore = resultData.awayScore || 0;

            if (!homeTeam || !awayTeam) return;
            if (resultData.matchType === 'forfeit' || (resultData.matchText && resultData.matchText.toLowerCase().includes(
                    'forfeit'))) {
                // Forfeit: apply special forfeit logic
                // For now, skip if it's a forfeit (handled separately)
                return;
            }

            const tablePath = getSeasonPath(currentSeasonId, 'table');

            // Load current table
            const snap = await database.ref(tablePath).once('value');
            const tableData = snap.val() || {};

            // Find or create home entry
            let homeKey = null;
            let homeEntry = null;
            for (const key in tableData) {
                if (tableData[key].name === homeTeam) {
                    homeKey = key;
                    homeEntry = tableData[key];
                    break;
                }
            }
            if (!homeEntry) {
                homeEntry = { name: homeTeam, p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0 };
                const newRef = await database.ref(tablePath).push(homeEntry);
                homeKey = newRef.key;
            }

            // Find or create away entry
            let awayKey = null;
            let awayEntry = null;
            for (const key in tableData) {
                if (tableData[key].name === awayTeam) {
                    awayKey = key;
                    awayEntry = tableData[key];
                    break;
                }
            }
            if (!awayEntry) {
                awayEntry = { name: awayTeam, p: 0, w: 0, d: 0, l: 0, gs: 0, gc: 0, gd: 0, pts: 0 };
                const newRef = await database.ref(tablePath).push(awayEntry);
                awayKey = newRef.key;
            }

            // Update stats
            homeEntry.p = (homeEntry.p || 0) + 1;
            awayEntry.p = (awayEntry.p || 0) + 1;
            homeEntry.gs = (homeEntry.gs || 0) + homeScore;
            homeEntry.gc = (homeEntry.gc || 0) + awayScore;
            awayEntry.gs = (awayEntry.gs || 0) + awayScore;
            awayEntry.gc = (awayEntry.gc || 0) + homeScore;

            if (homeScore > awayScore) {
                homeEntry.w = (homeEntry.w || 0) + 1;
                homeEntry.pts = (homeEntry.pts || 0) + 3;
                awayEntry.l = (awayEntry.l || 0) + 1;
            } else if (homeScore < awayScore) {
                awayEntry.w = (awayEntry.w || 0) + 1;
                awayEntry.pts = (awayEntry.pts || 0) + 3;
                homeEntry.l = (homeEntry.l || 0) + 1;
            } else {
                homeEntry.d = (homeEntry.d || 0) + 1;
                homeEntry.pts = (homeEntry.pts || 0) + 1;
                awayEntry.d = (awayEntry.d || 0) + 1;
                awayEntry.pts = (awayEntry.pts || 0) + 1;
            }

            homeEntry.gd = (homeEntry.gs || 0) - (homeEntry.gc || 0);
            awayEntry.gd = (awayEntry.gs || 0) - (awayEntry.gc || 0);

            await database.ref(`${tablePath}/${homeKey}`).set(homeEntry);
            await database.ref(`${tablePath}/${awayKey}`).set(awayEntry);
        }

        // ─── Reverse result stats from table ───
        async function reverseResultStats(resultData) {
            const homeTeam = resultData.homeTeam;
            const awayTeam = resultData.awayTeam;
            const homeScore = resultData.homeScore || 0;
            const awayScore = resultData.awayScore || 0;

            if (!homeTeam || !awayTeam) return;
            if (resultData.matchType === 'forfeit' || (resultData.matchText && resultData.matchText.toLowerCase().includes(
                    'forfeit'))) {
                return;
            }

            const tablePath = getSeasonPath(currentSeasonId, 'table');
            const snap = await database.ref(tablePath).once('value');
            const tableData = snap.val() || {};

            let homeKey = null,
                homeEntry = null;
            let awayKey = null,
                awayEntry = null;
            for (const key in tableData) {
                if (tableData[key].name === homeTeam) { homeKey = key;
                    homeEntry = tableData[key]; }
                if (tableData[key].name === awayTeam) { awayKey = key;
                    awayEntry = tableData[key]; }
            }
            if (!homeEntry || !awayEntry) return;

            homeEntry.p = Math.max(0, (homeEntry.p || 0) - 1);
            awayEntry.p = Math.max(0, (awayEntry.p || 0) - 1);
            homeEntry.gs = Math.max(0, (homeEntry.gs || 0) - homeScore);
            homeEntry.gc = Math.max(0, (homeEntry.gc || 0) - awayScore);
            awayEntry.gs = Math.max(0, (awayEntry.gs || 0) - awayScore);
            awayEntry.gc = Math.max(0, (awayEntry.gc || 0) - homeScore);

            if (homeScore > awayScore) {
                homeEntry.w = Math.max(0, (homeEntry.w || 0) - 1);
                homeEntry.pts = Math.max(0, (homeEntry.pts || 0) - 3);
                awayEntry.l = Math.max(0, (awayEntry.l || 0) - 1);
            } else if (homeScore < awayScore) {
                awayEntry.w = Math.max(0, (awayEntry.w || 0) - 1);
                awayEntry.pts = Math.max(0, (awayEntry.pts || 0) - 3);
                homeEntry.l = Math.max(0, (homeEntry.l || 0) - 1);
            } else {
                homeEntry.d = Math.max(0, (homeEntry.d || 0) - 1);
                homeEntry.pts = Math.max(0, (homeEntry.pts || 0) - 1);
                awayEntry.d = Math.max(0, (awayEntry.d || 0) - 1);
                awayEntry.pts = Math.max(0, (awayEntry.pts || 0) - 1);
            }

            homeEntry.gd = (homeEntry.gs || 0) - (homeEntry.gc || 0);
            awayEntry.gd = (awayEntry.gs || 0) - (awayEntry.gc || 0);

            await database.ref(`${tablePath}/${homeKey}`).set(homeEntry);
            await database.ref(`${tablePath}/${awayKey}`).set(awayEntry);
        }

        // ─── MERGE SCORERS/ASSISTS ───
        function mergeScorersOrAssists(listA, listB) {
            const merged = [];
            const map = {};
            const all = [...(listA || []), ...(listB || [])];
            for (const item of all) {
                const key = normalizeName(item.player || '');
                if (!key) continue;
                if (map[key]) {
                    // Keep max of goals/assists
                    const existing = map[key];
                    const countField = item.goals !== undefined ? 'goals' : 'assists';
                    const existingCount = existing[countField] || 0;
                    const newCount = item[countField] || 0;
                    if (newCount > existingCount) {
                        existing[countField] = newCount;
                    }
                } else {
                    map[key] = { ...item };
                    merged.push(map[key]);
                }
            }
            return merged;
        }

        // ─── APPROVE PENDING RESULT (modified with duplicate merging) ───
        async function approvePendingResult(pendingResultId, resultData) {
            const isForfeit = resultData.matchType === 'forfeit' || (resultData.matchText && resultData.matchText.toLowerCase()
                .includes('forfeit'));

            const matchText = resultData.matchText || formatResultText(
                resultData.homeTeam || '',
                resultData.homeScore || 0,
                resultData.awayTeam || '',
                resultData.awayScore || 0,
                resultData.forfeitType || ''
            );

            const resultEntry = {
                matchText: matchText,
                md: resultData.md || 0,
                date: resultData.date || '',
                venue: resultData.venue || '',
                matchType: resultData.matchType || '',
                aggregate: resultData.aggregate || '',
                matchNotes: resultData.matchNotes || '',
                goalScorers: resultData.goalScorers || { home: [], away: [] },
                userAssists: resultData.userAssists || { home: [], away: [] },
                userSubmitted: true,
                submittedBy: resultData.submittedBy || 'admin-approved',
                submittedAt: resultData.submittedAt || Date.now(),
                flagged: false,
                approvedAt: Date.now(),
                approvedBy: 'admin'
            };

            // Check for matching-score sibling in pending_results
            const pendingSnap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
            const pendingData = pendingSnap.val() || {};
            let siblingKey = null;
            let siblingData = null;

            for (const key in pendingData) {
                if (key === pendingResultId) continue;
                const p = pendingData[key];
                const sameTeams = (
                    (p.homeTeam === resultData.homeTeam && p.awayTeam === resultData.awayTeam) ||
                    (p.homeTeam === resultData.awayTeam && p.awayTeam === resultData.homeTeam)
                );
                const sameMd = p.md && resultData.md && p.md === resultData.md;
                if (sameTeams && sameMd) {
                    // Check if scores match when normalized
                    const pHome = p.homeTeam;
                    const pAway = p.awayTeam;
                    const rHome = resultData.homeTeam;
                    const rAway = resultData.awayTeam;
                    let pHomeScore = p.homeScore || 0;
                    let pAwayScore = p.awayScore || 0;
                    let rHomeScore = resultData.homeScore || 0;
                    let rAwayScore = resultData.awayScore || 0;
                    // Normalize to same order as resultData
                    if (pHome === rAway && pAway === rHome) {
                        // swapped
                        const tmp = pHomeScore;
                        pHomeScore = pAwayScore;
                        pAwayScore = tmp;
                    }
                    if (pHomeScore === rHomeScore && pAwayScore === rAwayScore) {
                        siblingKey = key;
                        siblingData = p;
                        break;
                    }
                }
            }

            // Merge scorers/assists from sibling if found
            if (siblingKey && siblingData) {
                const mergedHomeScorers = mergeScorersOrAssists(
                    resultData.goalScorers?.home || [],
                    siblingData.goalScorers?.home || []
                );
                const mergedAwayScorers = mergeScorersOrAssists(
                    resultData.goalScorers?.away || [],
                    siblingData.goalScorers?.away || []
                );
                const mergedHomeAssists = mergeScorersOrAssists(
                    resultData.userAssists?.home || [],
                    siblingData.userAssists?.home || []
                );
                const mergedAwayAssists = mergeScorersOrAssists(
                    resultData.userAssists?.away || [],
                    siblingData.userAssists?.away || []
                );
                resultEntry.goalScorers.home = mergedHomeScorers;
                resultEntry.goalScorers.away = mergedAwayScorers;
                resultEntry.userAssists.home = mergedHomeAssists;
                resultEntry.userAssists.away = mergedAwayAssists;
            }

            incrementPending();

            // Write to results
            await database.ref(getSeasonPath(currentSeasonId, 'results')).push(resultEntry);

            // Apply stats to table (only if not forfeit)
            if (!isForfeit) {
                await applyResultStats({
                    homeTeam: resultData.homeTeam,
                    awayTeam: resultData.awayTeam,
                    homeScore: resultData.homeScore || 0,
                    awayScore: resultData.awayScore || 0,
                    matchText: matchText,
                    matchType: resultData.matchType || ''
                });
            }

            // Update scorers
            const scorersHome = resultEntry.goalScorers?.home || [];
            const scorersAway = resultEntry.goalScorers?.away || [];
            const homeTeam = resultData.homeTeam || '';
            const awayTeam = resultData.awayTeam || '';

            await loadTopScorerData();
            await loadTopAssistantData();

            if (scorersHome.length) await applyScorersFromScan(scorersHome, homeTeam);
            if (scorersAway.length) await applyScorersFromScan(scorersAway, awayTeam);

            const assistsHome = resultEntry.userAssists?.home || [];
            const assistsAway = resultEntry.userAssists?.away || [];
            if (assistsHome.length) await applyAssistsFromScan(assistsHome, homeTeam);
            if (assistsAway.length) await applyAssistsFromScan(assistsAway, awayTeam);

            // Remove pending entry
            await database.ref(getSeasonPath(currentSeasonId, `pending_results/${pendingResultId}`)).remove();

            // Remove sibling if it exists
            if (siblingKey) {
                await database.ref(getSeasonPath(currentSeasonId, `pending_results/${siblingKey}`)).remove();
            }

            decrementPending();

            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();
        }

        async function rejectPendingResult(pendingResultId) {
            incrementPending();
            await database.ref(getSeasonPath(currentSeasonId, `pending_results/${pendingResultId}`)).remove();
            decrementPending();
        }

        // ─── applyScorersFromScan and applyAssistsFromScan ───
        function normalizeName(name) {
            return (name || '').toLowerCase().replace(/\s/g, '');
        }

        function findMatchingPlayer(list, playerName, teamName) {
            const pNorm = normalizeName(playerName);
            const tNorm = normalizeName(teamName);
            for (const item of list) {
                if (normalizeName(item.name) === pNorm && normalizeName(item.team) === tNorm) {
                    return item;
                }
            }
            return null;
        }

        async function applyScorersFromScan(scorers, team) {
            if (!scorers || !scorers.length) return;
            const path = getSeasonPath(currentSeasonId, 'topScorers/list');
            for (const s of scorers) {
                if (!s.player) continue;
                const existing = findMatchingPlayer(topScorerList, s.player, team);
                if (existing && existing.key) {
                    const newCount = (existing.count || 0) + (s.goals || 1);
                    incrementPending();
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                    decrementPending();
                } else {
                    incrementPending();
                    await database.ref(path).push({ name: s.player, team, count: s.goals || 1, imageUrl: '' });
                    decrementPending();
                }
            }
            await loadTopScorerData();
        }

        async function applyAssistsFromScan(assists, team) {
            if (!assists || !assists.length) return;
            const path = getSeasonPath(currentSeasonId, 'topAssistants/list');
            for (const a of assists) {
                if (!a.player) continue;
                const existing = findMatchingPlayer(topAssistantList, a.player, team);
                if (existing && existing.key) {
                    const newCount = (existing.count || 0) + (a.assists || 1);
                    incrementPending();
                    await database.ref(`${path}/${existing.key}/count`).set(newCount);
                    decrementPending();
                } else {
                    incrementPending();
                    await database.ref(path).push({ name: a.player, team, count: a.assists || 1, imageUrl: '' });
                    decrementPending();
                }
            }
            await loadTopAssistantData();
        }

        async function openBgCropTool() {
            const file = await pickFile('image/*');
            if (!file) return;
            const objectUrl = URL.createObjectURL(file);
            showModal(
                `<h3>🌄 Set Background Image</h3><div class="crop-container" id="cropContainer"><img class="crop-img" id="cropImg" src="${objectUrl}" draggable="false"></div><div class="crop-controls"><label>Zoom</label><input class="crop-slider" id="zoomSlider" type="range" min="0.5" max="2" step="0.01" value="1"><label>Horizontal Position</label><input class="crop-slider" id="posXSlider" type="range" min="0" max="100" step="1" value="50"><label>Vertical Position</label><input class="crop-slider" id="posYSlider" type="range" min="0" max="100" step="1" value="50"></div><div class="modal-btns"><button class="modal-btn-primary" id="applyCropBtn">Apply Background</button><button class="modal-btn-cancel" id="cancelCropBtn">Cancel</button></div>`
                );
            const img = document.getElementById('cropImg');
            const zoomSlider = document.getElementById('zoomSlider');
            const posXSlider = document.getElementById('posXSlider');
            const posYSlider = document.getElementById('posYSlider');
            let zoom = 1,
                posX = 50,
                posY = 50;

            function updatePreview() { const scale = zoom; const px = (posX / 100) * (1 - 1 / scale) * 100; const py = (posY /
                    100) * (1 - 1 / scale) * 100;
                img.style.transform = `scale(${scale}) translate(${px}%, ${py}%)`; }
            zoomSlider.oninput = () => { zoom = parseFloat(zoomSlider.value);
                updatePreview(); };
            posXSlider.oninput = () => { posX = parseFloat(posXSlider.value);
                updatePreview(); };

        // ─── FORFEIT SUBMIT FORM (modified with prefilled params and updated path) ───
        function openForfeitSubmitForm(linkedTeam, managerKey, forfeitType, prefilledOpponent, prefilledDate) {
            const teamNames = teamsData.map(t => t.name).sort();
            const otherTeams = teamNames.filter(t => t !== linkedTeam);
            let forfeitImages = [];
            let matchNotesValue = '';

            const typeLabel = forfeitType === 'no_contest' ? 'No Contest (F - F)' : 'Forfeit Win (3 - 0)';
            const typeDesc = forfeitType === 'no_contest' ?
                'Both teams will receive a game played. No points. No goal difference change.' :
                'You will receive 3 points and a win. Opponent receives a loss and -3 GD.';

            // Compute auto-matchday
            let autoMd = null;
            if (prefilledDate) {
                autoMd = getAutoMatchdayForTeamAndDate(linkedTeam, prefilledDate);
            }

            const renderForfeitForm = () => {
                const awayOpts = otherTeams.map(t =>
                    `<option value="${t}" ${prefilledOpponent === t ? 'selected' : ''}>${escapeHtml(t)}</option>`
                ).join('');

                let mdOptions = '';
                for (let i = 1; i <= currentMatchday + 2; i++) {
                    const selected = (autoMd !== null && i === autoMd) ? 'selected' : '';
                    mdOptions += `<option value="${i}" ${selected}>MD ${i}</option>`;
                }

                let imgThumbsHtml = forfeitImages.map((img, idx) => `
              <div class="preview-thumb" style="width:120px;height:120px;">
                <img src="${img.dataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;border:2px solid var(--razzmatazz);">
                <span class="thumb-del" data-fidx="${idx}" style="cursor:pointer;position:absolute;top:-10px;right:-10px;background:#ef4444;color:white;border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:bold;">✕</span>
              </div>
            `).join('');

                showModal(`
              <h3>🚫 ${typeLabel}</h3>
              <p style="color:rgba(255,255,255,0.6);font-size:1.4rem;margin-bottom:16px;">
                Your Team: <strong style="color:var(--turquoise);">${escapeHtml(linkedTeam)}</strong>
                ${prefilledOpponent ? ` · Opponent: <strong style="color:var(--razzmatazz);">${escapeHtml(prefilledOpponent)}</strong>` : ''}
                ${prefilledDate ? ` · ${escapeHtml(prefilledDate)}` : ''}
              </p>
              <div class="forfeit-desc" style="font-size:1.3rem;">${typeDesc}</div>

              <label>Opponent Team <span class="required-star">*</span></label>
              <select id="forfeitOpponent">
                <option value="">Select Opponent</option>
                ${awayOpts}
              </select>

              <label>Matchday <span class="required-star">*</span></label>
              <select id="forfeitMatchday">${mdOptions}</select>

              <label>Upload Screenshot Evidence <span class="required-star">*</span></label>
              <div class="image-upload-area" id="forfeitImageArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text" style="font-size:1.4rem;">Click to upload screenshots (${forfeitImages.length} added)</div>
                <input type="file" id="forfeitImageInput" accept="image/*" multiple style="display:none;">
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:12px;margin:12px 0;" id="forfeitImagePreview">
                ${imgThumbsHtml}
              </div>

              <label style="margin-top:20px;">Match Notes for Admin (optional)</label>
              <textarea id="forfeitMatchNotes" placeholder="Any notes for the admin reviewing this result..." style="min-height:80px;font-size:1.4rem;">${escapeHtml(matchNotesValue)}</textarea>

              <div id="forfeitStatus"></div>

              <div class="modal-btns">
                <button class="modal-btn-primary" id="submitForfeitBtn">🚫 Submit Forfeit Request</button>
                <button class="modal-btn-cancel" id="cancelForfeitBtn">Cancel</button>
              </div>
            `, true);

                document.getElementById('cancelForfeitBtn').onclick = closeModal;

                const area = document.getElementById('forfeitImageArea');
                const fileInput = document.getElementById('forfeitImageInput');

                area.onclick = () => fileInput.click();

                fileInput.onchange = async function() {
                    const files = Array.from(this.files);
                    for (const file of files) {
                        const dataUrl = await fileToDataUrl(file);
                        forfeitImages.push({ file, dataUrl });
                    }
                    renderForfeitForm();
                };

                document.querySelectorAll('[data-fidx]').forEach(el => {
                    el.onclick = () => {
                        const idx = parseInt(el.dataset.fidx);
                        forfeitImages.splice(idx, 1);
                        renderForfeitForm();
                    };
                });

                document.getElementById('forfeitMatchNotes').addEventListener('input', function() {
                    matchNotesValue = this.value;
                });

                document.getElementById('submitForfeitBtn').onclick = () => {
                    // Show fraud disclaimer first
                    showFraudDisclaimer(async () => {
                        const status = document.getElementById('forfeitStatus');
                        const btn = document.getElementById('submitForfeitBtn');
                        const opponent = document.getElementById('forfeitOpponent').value;
                        const matchNotes = document.getElementById('forfeitMatchNotes').value.trim();
                        const md = parseInt(document.getElementById('forfeitMatchday').value) || currentMatchday;

                        if (!opponent) {
                            status.innerHTML = '<div class="status-msg status-error">Please select an opponent.</div>';
                            return;
                        }
                        if (opponent === linkedTeam) {
                            status.innerHTML = '<div class="status-msg status-error">Cannot forfeit against your own team.</div>';
                            return;
                        }
                        if (forfeitImages.length === 0) {
                            status.innerHTML = '<div class="status-msg status-error">Please upload at least one screenshot.</div>';
                            return;
                        }

                        // Daily limit check for forfeit
                        const limitCheck = await validateDailyMatchLimit(managerKey, md);
                        if (!limitCheck.allowed) {
                            status.innerHTML = `<div class="status-msg status-error">⏳ ${limitCheck.message}</div>`;
                            return;
                        }

                        btn.disabled = true;
                        btn.innerHTML = '<span class="btn-spinner"></span> Submitting...';
                        status.innerHTML = '<div class="status-msg status-loading">Submitting forfeit request...</div>';

                        try {
                            const imageUrls = [];
                            for (const img of forfeitImages) {
                                const url = await uploadToImgBB(img.file);
                                imageUrls.push(url);
                            }

                            const homeTeam = linkedTeam;
                            const awayTeam = opponent;
                            let matchText = '';
                            let homeScore = 0;
                            let awayScore = 0;
                            if (forfeitType === 'no_contest') {
                                matchText = `${homeTeam} F - F ${awayTeam} (No Contest)`;
                                homeScore = 0;
                                awayScore = 0;
                            } else {
                                matchText = `${homeTeam} 3 - 0 ${awayTeam} (Forfeited - No Reply)`;
                                homeScore = 3;
                                awayScore = 0;
                            }

                            const forfeitData = {
                                matchType: 'forfeit',
                                forfeitType: forfeitType,
                                homeTeam: homeTeam,
                                awayTeam: awayTeam,
                                homeScore: homeScore,
                                awayScore: awayScore,
                                md: md,
                                date: prefilledDate || getSASTToday(),
                                images: imageUrls,
                                submittedBy: managerKey,
                                submittedAt: Date.now(),
                                matchText: matchText,
                                matchNotes: matchNotes,
                                status: 'pending'
                            };

                            incrementPending();
                            const newRef = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).push(
                            forfeitData);
                            decrementPending();

                            const keyId = await findManagerKeyId(managerKey);
                            if (keyId) {
                                await database.ref(`managerKeys/${keyId}/lastSubmissionTimestamp`).set(Date
                                .now());
                            }

                            // Auto-approve forfeit submissions immediately (they're user-submitted and auto-approved)
                            await autoApproveFreshSubmission(newRef.key, forfeitData);

                            status.innerHTML = '<div class="status-msg status-success">✅ Forfeit submitted and approved!</div>';
                            btn.innerHTML = '✓ Submitted!';
                            setTimeout(() => { closeModal(); }, 1500);
                        } catch (e) {
                            status.innerHTML = `<div class="status-msg status-error">Error: ${e.message}</div>`;
                            btn.disabled = false;
                            btn.innerHTML = '🚫 Submit Forfeit Request';
                        }
                    });
                };
            };

            renderForfeitForm();
        }

            function setupAutocomplete(inputId, dropdownId, teamSource, type) {
                const input = document.getElementById(inputId);
                const dropdown = document.getElementById(dropdownId);
                if (!input || !dropdown) return;

                input.addEventListener('input', function() {
                    const team = typeof teamSource === 'function' ? teamSource() : teamSource;
                    if (!team) { dropdown.style.display = 'none'; return; }
                    const query = this.value.trim().toLowerCase();
                    if (!query) { dropdown.style.display = 'none'; return; }

                    let list = [];
                    if (type === 'scorer') {
                        list = topScorerList.filter(p => p.team === team && p.name.toLowerCase().includes(query));

                        list = topAssistantList.filter(p => p.team === team && p.name.toLowerCase().includes(query));

                    if (list.length === 0) { dropdown.style.display = 'none'; return; }

                    dropdown.innerHTML = '';
                    list.forEach(p => {
                        const div = document.createElement('div');
                        div.textContent = p.name;
                        div.addEventListener('mousedown', (e) => {
                            e.preventDefault();
                            input.value = p.name;
                            dropdown.style.display = 'none';
                        });

                    });
                    dropdown.style.display = 'block';

                });

                    if (!query) { dropdown.style.display = 'none'; return; }
                    let list = [];

        // ─── PENDING RESULTS SYSTEM ───
        async function openPendingResultsModal() {
            const snap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
            const data = snap.val() || {};
            const pendingArray = Object.entries(data).map(([key, val]) => ({ id: key, ...val }));

            if (pendingArray.length === 0) {
                showModal(`
              <h3>⏳ Pending Results</h3>
              <div class="empty-state"><div class="empty-icon">✅</div><p>No pending results to review.</p></div>
              <div class="modal-btns"><button class="modal-btn-cancel" id="closePendingEmptyBtn">Close</button></div>
            `);
                document.getElementById('closePendingEmptyBtn').onclick = closeModal;
                return;
            }

            // Group logic: same teams + same matchday, with score matching check
            const grouped = [];
            const used = new Set();
            for (let i = 0; i < pendingArray.length; i++) {
                if (used.has(i)) continue;
                const a = pendingArray[i];
                const group = [a];
                used.add(i);
                for (let j = i + 1; j < pendingArray.length; j++) {
                    if (used.has(j)) continue;
                    const b = pendingArray[j];
                    const sameTeams = (
                        (a.homeTeam === b.homeTeam && a.awayTeam === b.awayTeam) ||
                        (a.homeTeam === b.awayTeam && a.awayTeam === b.homeTeam)
                    );
                    const sameMd = a.md && b.md && a.md === b.md;
                    if (sameTeams && sameMd) {
                        // Check if scores match when normalized
                        const aHome = a.homeTeam;
                        const aAway = a.awayTeam;
                        const bHome = b.homeTeam;
                        const bAway = b.awayTeam;
                        let aHomeScore = a.homeScore || 0;
                        let aAwayScore = a.awayScore || 0;
                        let bHomeScore = b.homeScore || 0;
                        let bAwayScore = b.awayScore || 0;
                        // Normalize to same order as a
                        if (bHome === aAway && bAway === aHome) {
                            const tmp = bHomeScore;
                            bHomeScore = bAwayScore;
                            bAwayScore = tmp;
                        }
                        if (aHomeScore === bHomeScore && aAwayScore === bAwayScore) {
                            group.push(b);
                            used.add(j);
                        }
                    }
                }
                grouped.push(group);
            }

            let listHtml = '';
            for (const group of grouped) {
                const isDuplicate = group.length > 1;
                const scoresMatch = group.length > 1; // all in group have matching scores by construction
                if (isDuplicate) {
                    listHtml += `
                <div style="border:2px solid #22c55e;border-radius:24px;padding:20px;margin-bottom:20px;background:rgba(34,197,94,0.08);">
                  <div style="color:#22c55e;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;margin-bottom:12px;">
                    ✅ Scores Match — Safe to Approve (${group.length} submissions)
                  </div>
                `;
                }
                for (const p of group) {
                    const isForfeit = p.matchType === 'forfeit' || (p.matchText && p.matchText.toLowerCase().includes(
                    'forfeit'));
                    const homeIcon = getTeamIconHtml(p.homeTeam || '');

        function openPendingResultPreview(pendingResultId, resultData) {
            const isForfeit = resultData.matchType === 'forfeit' || (resultData.matchText && resultData.matchText.toLowerCase()

                `<span class="scorer-badge" style="font-size:1.4rem;">⚽ ${escapeHtml(s.player)} (${s.goals})</span>`
            ).join('');
            const awayScorersHtml = (resultData.goalScorers?.away || []).map(s =>

                    imagesHtml += `<img src="${url}" alt="Match image" onclick="window.open('${url}','_blank')" style="aspect-ratio:4/3;object-fit:contain;width:100%;">`;
                }

            showModal(`

                try {

                    setTimeout(() => { closeModal();

        // ─── EDIT RESULTS LIST ───
        async function openEditResultsListModal(linkedTeam, managerKey) {
            processEditApprovals();

            // Query both pending and approved results
            const pendingSnap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
            const pendingData = pendingSnap.val() || {};
            const pendingEntries = Object.entries(pendingData)
                .map(([key, val]) => ({ id: key, ...val, status: 'Pending' }))
                .filter(e => e.submittedBy === managerKey);

            const approvedSnap = await database.ref(getSeasonPath(currentSeasonId, 'results')).once('value');
            const approvedData = approvedSnap.val() || {};
            const approvedEntries = Object.entries(approvedData)
                .map(([key, val]) => ({ id: key, ...val, status: 'Approved' }))
                .filter(e => e.submittedBy === managerKey);

            const allEntries = [...pendingEntries, ...approvedEntries];
            allEntries.sort((a, b) => (b.submittedAt || 0) - (a.submittedAt || 0));

            if (allEntries.length === 0) {
                showModal(`
              <h3>✏️ Edit My Results</h3>
              <div class="empty-state"><div class="empty-icon">📋</div><p>You haven't submitted any results yet.</p></div>
              <div class="modal-btns"><button class="modal-btn-cancel" id="closeEditListEmptyBtn">Close</button></div>
            `);
                document.getElementById('closeEditListEmptyBtn').onclick = closeModal;
                return;
            }

            let listHtml = '';
            for (const entry of allEntries) {
                const isPending = entry.status === 'Pending';
                const scoreDisplay = entry.matchText || `${entry.homeScore || 0} — ${entry.awayScore || 0}`;
                const statusColor = isPending ? '#f97316' : '#22c55e';
                listHtml += `
              <div class="pending-item" style="border-left:4px solid ${statusColor};">
                <div class="pi-teams">
                  <span>${escapeHtml(entry.homeTeam || '?')}</span>
                  <span style="color:var(--turquoise);font-weight:400;">vs</span>
                  <span>${escapeHtml(entry.awayTeam || '?')}</span>
                </div>
                <div class="pi-score">${escapeHtml(scoreDisplay)}</div>
                <div class="pi-md">MD ${entry.md || '?'}</div>
                <div><span style="color:${statusColor};font-weight:600;">${entry.status}</span></div>
                <div class="pi-actions">
                  <button class="btn-sm btn-edit edit-result-btn" data-id="${entry.id}" data-pending="${isPending}" style="padding:8px 20px;font-size:1.1rem;">✏️ Edit</button>
                </div>
              </div>
            `;
            }

            showModal(`
            <h3>✏️ Edit My Results</h3>
            <p style="color:rgba(255,255,255,0.5);font-size:1.2rem;margin-bottom:16px;">${allEntries.length} result${allEntries.length !== 1 ? 's' : ''} found</p>

            <div class="modal-btns"><button class="modal-btn-cancel" id="closeEditListBtn">Close</button></div>
          `);

            document.getElementById('closeEditListBtn').onclick = closeModal;

            document.querySelectorAll('.edit-result-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.dataset.id;
                    const isPending = btn.dataset.pending === 'true';
                    const entry = allEntries.find(e => e.id === id);
                    if (entry) {
                        closeModal();
                        openEditSingleResultModal(id, entry, isPending, linkedTeam, managerKey);

                function setupEditAutocomplete(inputId, dropdownId, team, type) {
                    const input = document.getElementById(inputId);
                    const dropdown = document.getElementById(dropdownId);
                    if (!input || !dropdown) return;

                    input.addEventListener('input', function() {
                        if (!team) { dropdown.style.display = 'none'; return; }
                        const query = this.value.trim().toLowerCase();
                        if (!query) { dropdown.style.display = 'none'; return; }
                        let list = [];
                        if (type === 'scorer') {
                            list = topScorerList.filter(p => p.team === team && p.name.toLowerCase().includes(
                            query));
                        } else {
                            list = topAssistantList.filter(p => p.team === team && p.name.toLowerCase().includes(
                                query));
                        }
                        if (list.length === 0) { dropdown.style.display = 'none'; return; }
                        dropdown.innerHTML = '';
                        list.forEach(p => {
                            const div = document.createElement('div');
                            div.textContent = p.name;
                            div.addEventListener('mousedown', (e) => {
                                e.preventDefault();
                                input.value = p.name;
                                dropdown.style.display = 'none';
                            });
                            dropdown.appendChild(div);
                        });
                        dropdown.style.display = 'block';
                    });
                    input.addEventListener('blur', function() {
                        setTimeout(() => { dropdown.style.display = 'none'; }, 150);
                    });
                    document.addEventListener('click', function(e) {
                        if (!dropdown.contains(e.target) && e.target !== input) {

        // ─── FIXTURES RENDER (tournament filter: 'fifasupercup') ───
        function renderFixtures() {
            const premierFixtures = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            for (const [dateStr, eventData] of Object.entries(calendarEventsData)) {
                if (!eventData || !eventData.tournaments) continue;
                for (const tournament of eventData.tournaments) {
                    let isPremier = false;
                    if (tournament.name) { const normalized = tournament.name.trim().toLowerCase().replace(/\s/g, '');
                        if (normalized === 'fifasupercup') isPremier = true; }
                    if (isPremier && tournament.fixtures && Array.isArray(tournament.fixtures)) {
                        for (const fix of tournament.fixtures) { premierFixtures.push({ date: dateStr, tournament: tournament
                                    .name || 'FIFA Super Cup', home: fix.home || '', away: fix.away || '' }); }
                    }
                }
            }
            premierFixtures.sort((a, b) => { const da = new Date(a.date),
                    db = new Date(b.date); const aFuture = da >= today,
                    bFuture = db >= today; if (aFuture && bFuture) return da - db; if (!aFuture && !bFuture) return da -
                    db; return aFuture ? -1 : 1; });
            const allTeams = [...new Set(premierFixtures.flatMap(f => [f.home, f.away]).filter(Boolean))].sort();
            const allMonths = [...new Set(premierFixtures.map(f => f.date.substring(0, 7)))].sort();
            let filtered = [...premierFixtures];
            if (currentFixTeamFilter && currentFixTeamFilter !== 'all') filtered = filtered.filter(f => f.home ===
                currentFixTeamFilter || f.away === currentFixTeamFilter);
            if (currentFixMonthFilter && currentFixMonthFilter !== 'all') filtered = filtered.filter(f => f.date.startsWith(
                currentFixMonthFilter));
            const grouped = {};
            for (const fix of filtered) { if (!grouped[fix.date]) grouped[fix.date] = [];
                grouped[fix.date].push(fix); }
            const sortedDates = Object.keys(grouped).sort((a, b) => { const da = new Date(a),
                    db = new Date(b); const aFuture = da >= today,
                    bFuture = db >= today; if (aFuture && bFuture) return da - db; if (!aFuture && !bFuture) return da -
                    db; return aFuture ? -1 : 1; });
            const monthLabels = { '01': 'January', '02': 'February', '03': 'March', '04': 'April', '05': 'May',
                '06': 'June', '07': 'July', '08': 'August', '09': 'September', '10': 'October', '11': 'November',
                '12': 'December' };
            let filtersHtml =
                `<div class="filters-bar"><div class="filter-group"><label>Team</label><select id="fixTeamFilter"><option value="all">All Teams</option>${allTeams.map(t => `<option value="${t}" ${currentFixTeamFilter === t ? 'selected' : ''}>${t}</option>`).join('')}</select></div><div class="filter-group"><label>Month</label><select id="fixMonthFilter"><option value="all">All Months</option>${allMonths.map(m => { const [y, mo] = m.split('-'); return `<option value="${m}" ${currentFixMonthFilter === m ? 'selected' : ''}>${monthLabels[mo] || mo} ${y}</option>`; }).join('')}</select></div><div class="filter-group"><button id="clearFixFiltersBtn" class="clear-filters">Clear Filters</button></div><div class="filter-stats">${filtered.length} fixture${filtered.length !== 1 ? 's' : ''} found</div><a href="manager-calendar.html" class="view-calendar-btn">📅 View Calendar</a></div>`;
            let contentHtml = '';
            if (sortedDates.length === 0) {
                contentHtml = '<div class="empty-state"><div class="empty-icon">📅</div><p>No FIFA Super Cup fixtures found</p></div>';
            } else {
                for (const dateStr of sortedDates) {
                    const dateObj = new Date(dateStr);
                    const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                    const dayName = dayNames[dateObj.getDay()];
                    const day = dateObj.getDate();
                    const [y, mo] = dateStr.split('-');
                    const monthName = monthLabels[mo] || mo;
                    const isPast = dateObj < today;
                    const matchdayNum = calendarEventsData[dateStr]?.matchday || '';
                    const matchdayBadge = matchdayNum ? ` · MD ${matchdayNum}` : '';
                    const dateLabel = `${dayName}, ${day} ${monthName} ${y}${isPast ? ' · Played' : ''}${matchdayBadge}`;
                    contentHtml += `<div class="fixture-date-group"><div class="fixture-date-label">📅 ${dateLabel}</div>`;
                    for (const fix of grouped[dateStr]) {
                        const homeIconHtml = getTeamIconHtml(fix.home, 'team-icon-lg');
                        const awayIconHtml = getTeamIconHtml(fix.away, 'team-icon-lg');
                        contentHtml +=
                            `<div class="fixture-card"><div class="fixture-tournament-label">🏆 ${escapeHtml(fix.tournament)}</div><div class="fixture-match-row"><div class="fixture-team-side">${homeIconHtml}<span class="fixture-team-name">${escapeHtml(fix.home)}</span></div><div class="fixture-vs">VS</div><div class="fixture-team-side">${awayIconHtml}<span class="fixture-team-name">${escapeHtml(fix.away)}</span></div></div></div>`;
                    }
                    contentHtml += `</div>`;
                }
            }
            document.getElementById('contentCard').innerHTML = filtersHtml + contentHtml;
            document.getElementById('fixTeamFilter')?.addEventListener('change', e => { currentFixTeamFilter = e.target.value;
                renderFixtures(); });
            document.getElementById('fixMonthFilter')?.addEventListener('change', e => { currentFixMonthFilter = e.target
                    .value;
                renderFixtures(); });
            document.getElementById('clearFixFiltersBtn')?.addEventListener('click', () => { currentFixTeamFilter = '';
                currentFixMonthFilter = '';
                renderFixtures(); });
        }

        function parseResultCard(r) {
            let homeTeam = '',
                awayTeam = '',
                homeScore = '',
                awayScore = '',
                isForfeit = false,
                forfeitType = '';
            const text = r.matchText || '';
            const lower = text.toLowerCase();
            if (lower.includes('no contest') || lower.includes('f - f')) isForfeit = true;
            else if (lower.includes('forfeit')) isForfeit = true;
            if (isForfeit && text.includes('F - F')) {
                const parts = text.split(/\s*F\s*-\s*F\s*/i);
                if (parts.length >= 2) { homeTeam = parts[0].trim().replace(/\(.*\)/g, '').trim();
                    awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim();
                    homeScore = 'F';
                    awayScore = 'F'; }
                if (text.includes('No Contest')) forfeitType = 'No Contest';
                else if (text.includes('Forfeited - No Reply')) forfeitType = 'Forfeited - No Reply';
                else if (text.includes('Forfeited on Agreement')) forfeitType = 'Forfeited on Agreement';
                else forfeitType = 'Forfeit';
            } else {
                const match = text.match(/(\d+)\s*-\s*(\d+)/);
                if (match) {
                    homeScore = match[1];
                    awayScore = match[2];
                    const parts = text.split(/\s+\d+\s*-\s*\d+\s+/);
                    if (parts.length >= 2) { homeTeam = parts[0].trim();
                        awayTeam = parts[1].trim().replace(/\(.*\)/g, '').trim(); }
                    if (lower.includes('forfeited - no reply')) forfeitType = 'Forfeited - No Reply';
                    else if (lower.includes('forfeited on agreement')) forfeitType = 'Forfeited on Agreement';
                    else if (lower.includes('forfeit')) forfeitType = 'Forfeit';
                }
            }
            return { homeTeam, awayTeam, homeScore, awayScore, isForfeit, forfeitType, md: r.md };
        }

                    const homeScorersHtml = homeScorers.map(s =>

                    const aggHtml = r.aggregate ? `<div class="aggregate-text">Agg: ${r.aggregate}</div>` : '';

                    matchesHtml += `<div class="match-card" style="animation-delay:${i * 0.05}s">
                <div class="match-row">

              </div>`;

        function renderTopAssistants() {

            const top3 = sorted.slice(0, 3);
            const rest = sorted.slice(3);
            let top3Html = '';
            if (top3.length) {
                top3Html = '<div class="top3-container">';
                top3.forEach((player, idx) => {
                    const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉';
                    const teamIconUrl = teamIconsCache[player.team] || '';
                    const playerImageUrl = player.imageUrl || '';
                    top3Html +=
                        `<div class="top3-block">${isAdminMode ? `<div class="edit-block-btn" data-key="${player.key}" data-type="assistant">✏️</div>` : ''}<div class="player-image-wrapper"><div class="medal-badge">${medal}</div><img class="player-img" src="${playerImageUrl || 'https://via.placeholder.com/320x320?text=No+Image'}" alt="${player.name}" onerror="this.src='https://via.placeholder.com/320x320?text=No+Image'"><div class="player-name-overlay">${escapeHtml(player.name || '')}</div>${teamIconUrl ? `<div class="team-icon-overlay"><img src="${teamIconUrl}" alt="${player.team}"></div>` : ''}</div><div class="top3-count">🎯 ${player.count || 0}</div></div>`;
                });
                top3Html += '</div>';
            }
            let restHtml = '';
            if (rest.length) {
                restHtml =
                    `<div class="rest-table-wrapper"><div class="table-scroll-wrap"><table class="stats-list"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Assists</th>${isAdminMode ? '<th>Actions</th>' : ''}</tr></thead><tbody>`;
                rest.forEach((p, i) => {
                    const iconHtml = getTeamIconHtml(p.team, 'team-icon-sm');
                    restHtml +=
                        `<tr><td>${i + 4}</td><td style="font-size:1.5rem;">${escapeHtml(p.name || '')}</td><td><div class="stat-team-cell">${iconHtml}<span style="font-size:1.5rem;">${escapeHtml(p.team || '')}</span></div></td><td><span class="count-badge">${p.count || 0}</span></td>${isAdminMode ? `<td><button class="btn-sm btn-edit" data-id="${p.key}">✏️</button> <button class="btn-sm btn-delete" data-id="${p.key}">🗑️</button></td>` : ''}</tr>`;
                });
                restHtml += `</tbody></table></div></div>`;
            }
            let html = top3Html + restHtml;
            if (!sorted.length) html =
                '<div class="empty-state"><div class="empty-icon">🎯</div><p>No assistants yet</p></div>';
            if (isAdminMode) html +=
                `<div style="display:flex;gap:16px;flex-wrap:wrap;"><button class="add-btn-main" id="addAssistBtn">+ Add Assistant</button></div>`;
            document.getElementById('contentCard').innerHTML = html;
            document.querySelectorAll('.edit-block-btn').forEach(btn => { btn.addEventListener('click', e => { e
                        .stopPropagation(); const player = topAssistantList.find(p => p.key === btn.dataset.key); if (
                        player) openStatModal('assistant', player); }); });
            if (isAdminMode) {
                document.getElementById('addAssistBtn')?.addEventListener('click', () => openStatModal('assistant'));
                document.querySelectorAll('.btn-edit[data-id]').forEach(btn => { const e = topAssistantList.find(x => x
                        .key === btn.dataset.id); if (e) btn.onclick = () => openStatModal('assistant', e); });
                document.querySelectorAll('.btn-delete[data-id]').forEach(btn => { btn.onclick = async () => { if (
                            confirm('Delete?')) { await database.ref(getSeasonPath(currentSeasonId,
                                `topAssistants/list/${btn.dataset.id}`)).remove(); await loadTopAssistantData();
                            renderTopAssistants(); } }; });
            }
        }

        function renderCurrentTab(tabOverride) {
            const tab = tabOverride || document.querySelector('.tab-btn.active')?.dataset.tab || 'table';
            if (pendingSaves > 0) {
                pendingRenderTab = tab;
                return;
            }
            pendingRenderTab = null;
            document.getElementById('contentCard').innerHTML =
                '<div class="loading-spinner"><div class="spinner"></div><span>Loading…</span></div>';
            if (tab === 'table') renderTable();
            else if (tab === 'fixtures') renderFixtures();
            else if (tab === 'results') renderResults();
            else if (tab === 'topscorers') renderTopScorers();

        function openResultForm(r) {
            editingResultKey = r?.key || null;
            tempScorersHome = r?.goalScorers?.home ? [...r.goalScorers.home] : [];
            tempScorersAway = r?.goalScorers?.away ? [...r.goalScorers.away] : [];
            const teamNames = teamsData.map(t => t.name).sort();
            const homeOpts = teamNames.map(t => `<option value="${t}" ${r?.homeTeam === t ? 'selected' : ''}>${t}</option>`)
                .join('');
            const awayOpts = teamNames.map(t => `<option value="${t}" ${r?.awayTeam === t ? 'selected' : ''}>${t}</option>`)
                .join('');
            let existingForfeit = 'none',
                existingHS = 0,
                existingAS = 0;
            if (r) {
                const text = r.matchText || '';
                const lower = text.toLowerCase();
                if (lower.includes('no contest')) existingForfeit = 'no_contest';
                else if (lower.includes('forfeited - no reply')) existingForfeit = 'forfeit_no_reply';
                else if (lower.includes('forfeited on agreement')) existingForfeit = 'forfeit_agreement';

                    existingAS = parseInt(match[2]); }

            showModal(`
            <h3>${r ? 'Edit Result' : 'Add Result'}</h3>
            <label>Home Team</label><select id="rHome"><option value="">Select Home Team</option>${homeOpts}</select>
            <label>Away Team</label><select id="rAway"><option value="">Select Away Team</option>${awayOpts}</select>
            <label>Home Score</label><input id="rHS" type="number" value="${existingHS}">
            <label>Away Score</label><input id="rAS" type="number" value="${existingAS}">
            <label>Forfeit Type</label><select id="rForfeit"><option value="none" ${existingForfeit === 'none' ? 'selected' : ''}>Normal Result</option><option value="no_contest" ${existingForfeit === 'no_contest' ? 'selected' : ''}>No Contest (F-F)</option><option value="forfeit_no_reply" ${existingForfeit === 'forfeit_no_reply' ? 'selected' : ''}>Forfeited – No Reply</option><option value="forfeit_agreement" ${existingForfeit === 'forfeit_agreement' ? 'selected' : ''}>Forfeited on Agreement</option></select>
            <label>Matchday</label><input id="rMd" type="number" value="${r?.md || ''}">
