            <label>Venue (optional)</label><input id="rVenue" placeholder="Venue" value="${r?.venue || ''}">
            <label>Match Type (optional)</label><input id="rType" placeholder="e.g. Matchday 5" value="${r?.matchType || ''}">
            <label>Aggregate Score (optional)</label><input id="rAgg" placeholder="e.g. 4-2" value="${r?.aggregate || ''}">
            <div class="scorer-section"><h4>⚽ Home Team Scorers</h4><div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:flex-end;"><input type="text" id="homeScorerName" placeholder="Player name" style="flex:2;min-width:120px;"><div style="display:flex;flex-direction:column;gap:4px;"><label style="font-size:0.85rem;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.5px;">Goals</label><input type="number" id="homeScorerGoals" value="1" style="width:90px;"></div><button id="addHomeScorer" class="modal-btn-primary" style="padding:10px 20px;align-self:flex-end;">Add</button></div><div id="homeScorerList" class="scorer-list"></div></div>
            <div class="scorer-section"><h4>⚽ Away Team Scorers</h4><div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:flex-end;"><input type="text" id="awayScorerName" placeholder="Player name" style="flex:2;min-width:120px;"><div style="display:flex;flex-direction:column;gap:4px;"><label style="font-size:0.85rem;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.5px;">Goals</label><input type="number" id="awayScorerGoals" value="1" style="width:90px;"></div><button id="addAwayScorer" class="modal-btn-primary" style="padding:10px 20px;align-self:flex-end;">Add</button></div><div id="awayScorerList" class="scorer-list"></div></div>
            <div class="modal-btns"><button class="modal-btn-primary" id="saveResultBtn">Save</button><button class="modal-btn-cancel" id="cancelResultBtn">Cancel</button></div>
            <div id="resultStatus"></div>
          `);
            renderScorerList('home');
            renderScorerList('away');
            document.getElementById('cancelResultBtn').onclick = closeModal;
            document.getElementById('addHomeScorer').onclick = () => { const name = document.getElementById('homeScorerName')
                    .value.trim(); const goals = parseInt(document.getElementById('homeScorerGoals').value) || 1; if (!name)
                    return;
                tempScorersHome.push({ player: name, goals });
                renderScorerList('home');
                document.getElementById('homeScorerName').value = '';
                document.getElementById('homeScorerGoals').value = '1'; };
            document.getElementById('addAwayScorer').onclick = () => { const name = document.getElementById('awayScorerName')
                    .value.trim(); const goals = parseInt(document.getElementById('awayScorerGoals').value) || 1; if (!name)
                    return;
                tempScorersAway.push({ player: name, goals });
                renderScorerList('away');
                document.getElementById('awayScorerName').value = '';
                document.getElementById('awayScorerGoals').value = '1'; };
            document.getElementById('saveResultBtn').onclick = async () => {
                const homeTeam = document.getElementById('rHome').value;
                const awayTeam = document.getElementById('rAway').value;
                let hs = parseInt(document.getElementById('rHS').value) || 0;
                let as2 = parseInt(document.getElementById('rAS').value) || 0;
                const forfeit = document.getElementById('rForfeit').value;
                const md = parseInt(document.getElementById('rMd').value) || 0;
                const date = document.getElementById('rDate').value.trim();
                const venue = document.getElementById('rVenue').value.trim();
                const matchType = document.getElementById('rType').value.trim();
                const aggregate = document.getElementById('rAgg').value.trim();
                if (!homeTeam || !awayTeam) { alert("Both teams required"); return; }
                if (homeTeam === awayTeam) { alert("Teams cannot be the same"); return; }
                const matchText = formatResultText(homeTeam, hs, awayTeam, as2, forfeit === 'none' ? '' : forfeit);
                const resultData = { matchText, md, ...(date && { date }), ...(venue && { venue }), ...(matchType && {
                        matchType }), ...(aggregate && { aggregate }), goalScorers: { home: tempScorersHome, away: tempScorersAway } };
                const path = getSeasonPath(currentSeasonId, 'results');
                const btn = document.getElementById('saveResultBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="btn-spinner"></span> Saving...';
                const statusDiv = document.getElementById('resultStatus');
                statusDiv.innerHTML = '';
                try {
                    incrementPending();
                    if (editingResultKey) await database.ref(`${path}/${editingResultKey}`).set(resultData);
                    else await database.ref(path).push(resultData);
                    decrementPending();
                    btn.innerHTML = '✓ Saved!';
                    btn.style.color = '#166534';
                    statusDiv.className = 'status-msg status-success';
                    statusDiv.textContent = 'Result saved!';
                    closeModal();
                    renderCurrentTab();
                } catch (e) {
                    decrementPending();
                    statusDiv.className = 'status-msg status-error';
                    statusDiv.textContent = 'Error: ' + e.message;
                    btn.disabled = false;
                    btn.innerHTML = 'Save';
                    btn.style.color = '';
                }
            };
        }

        let editingResultKey = null;

        function renderScorerList(side) {
            const list = side === 'home' ? tempScorersHome : tempScorersAway;
            const container = document.getElementById(`${side}ScorerList`);
            if (!container) return;
            container.innerHTML = list.map((s, idx) =>
                `<div class="scorer-badge">⚽ ${s.player} (${s.goals})<button class="remove-scorer" data-side="${side}" data-idx="${idx}">✖</button></div>`
                ).join('');
            container.querySelectorAll('.remove-scorer').forEach(btn => { btn.onclick = () => { const idx = parseInt(btn
                        .dataset.idx); if (btn.dataset.side === 'home') tempScorersHome.splice(idx, 1); else
                        tempScorersAway.splice(idx, 1);
                    renderScorerList(btn.dataset.side); }; });
        }

        function formatResultText(homeTeam, homeScore, awayTeam, awayScore, forfeitType) {
            if (forfeitType === "no_contest") return `${homeTeam} F - F ${awayTeam} (No Contest)`;
            if (forfeitType === "forfeit_no_reply") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited - No Reply)`;
            if (forfeitType === "forfeit_agreement") return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam} (Forfeited on Agreement)`;
            return `${homeTeam} ${homeScore} - ${awayScore} ${awayTeam}`;
        }

        async function openStatModal(type, entry = null) {
            const isScorer = type === 'scorer' || type === 'topscorer';
            const currentImageUrl = entry?.imageUrl || '';
            showModal(`
            <h3>${entry ? 'Edit' : 'Add'} ${isScorer ? 'Top Scorer' : 'Top Assistant'}</h3>
            <label>Player Name</label><input id="statName" placeholder="Player Name" value="${escapeHtml(entry?.name || '')}">
            <label>Team</label><input id="statTeam" placeholder="Team" value="${escapeHtml(entry?.team || '')}">
            <label>${isScorer ? 'Goals' : 'Assists'}</label><input id="statCount" type="number" value="${entry?.count || 0}">
            <label>Player Photo (upload)</label><input type="file" id="statPhoto" accept="image/*">
            <div id="photoPreview" style="margin-top:10px;">${currentImageUrl ? `<img src="${currentImageUrl}" style="max-width:120px; border-radius:12px;">` : 'No photo'}</div>

                try {
                    const url = await uploadToImgBB(file);
                    previewDiv.innerHTML =

                    fileInput.dataset.uploadedUrl = url;

            document.getElementById('saveStatBtn').onclick = async () => {

                const team = document.getElementById('statTeam').value.trim();

                if (!name || !team) { alert("Fill all fields"); return; }

                    statusDiv.textContent = 'Saved!';
                    closeModal();

                    statusDiv.className = 'status-msg status-error';
                    statusDiv.textContent = 'Error: ' + e.message;
                    btn.disabled = false;
                    btn.innerHTML = 'Save';
                    btn.style.color = '';

            };

        // ─── SWITCH SEASON ───
        async function switchSeason(delta) {
            const idx = availableSeasons.indexOf(currentSeasonId);
            const nIdx = idx + delta;
            if (nIdx < 0 || nIdx >= availableSeasons.length) return;
            currentSeasonId = availableSeasons[nIdx];
            updateSeasonUI();
            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();
            await loadCurrentMatchday();
            renderCurrentTab();
        }

        async function addNewSeason() {
            const raw = prompt("Enter new season number:");
            if (!raw) return;
            const id = parseInt(raw);
            if (isNaN(id)) { alert("Invalid number"); return; }
            if (availableSeasons.includes(id)) { alert("Season already exists"); return; }
            await database.ref(`fifasupercup_seasons/season_${id}/table`).set({});
            await database.ref(`fifasupercup_seasons/season_${id}/results`).set({});
            await database.ref(`fifasupercup_seasons/season_${id}/topScorers/list`).set({});
            await database.ref(`fifasupercup_seasons/season_${id}/topAssistants/list`).set({});
            availableSeasons.push(id);
            availableSeasons.sort((a, b) => a - b);
            currentSeasonId = id;
            updateSeasonUI();
            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();
            await loadCurrentMatchday();
            renderCurrentTab();
        }

        async function renameSeason() {
            const raw = prompt(`New number for Season ${currentSeasonId}:`);
            if (!raw) return;
            const id = parseInt(raw);
            if (isNaN(id)) return;
            if (availableSeasons.includes(id) && id !== currentSeasonId) { alert("Number taken"); return; }
            const [r, ts, ta] = await Promise.all([
                database.ref(getSeasonPath(currentSeasonId, 'results')).once('value'),
                database.ref(getSeasonPath(currentSeasonId, 'topScorers')).once('value'),
                database.ref(getSeasonPath(currentSeasonId, 'topAssistants')).once('value'),
            ]);
            const wasActive = activeSeasonId === currentSeasonId;
            await database.ref(getSeasonPath(id, 'results')).set(r.val() || {});
            await database.ref(getSeasonPath(id, 'topScorers')).set(ts.val() || {});
            await database.ref(getSeasonPath(id, 'topAssistants')).set(ta.val() || {});
            if (wasActive) await database.ref(`fifasupercup_seasons/season_${id}/active`).set(true);
            await database.ref(getSeasonPath(currentSeasonId)).remove();
            availableSeasons = availableSeasons.filter(s => s !== currentSeasonId);
            availableSeasons.push(id);
            availableSeasons.sort((a, b) => a - b);
            if (activeSeasonId === currentSeasonId) activeSeasonId = id;
            currentSeasonId = id;
            updateSeasonUI();
            await loadCurrentSeasonData();
            await loadTopScorerData();
            await loadTopAssistantData();
            await loadCurrentMatchday();
            renderCurrentTab();
        }

        async function setActiveSeason() {
            const updates = {};
            availableSeasons.forEach(s => { updates[`fifasupercup_seasons/season_${s}/active`] = (s === currentSeasonId); });
            await database.ref().update(updates);
            activeSeasonId = currentSeasonId;
            alert(`Season ${currentSeasonId} set as active.`);
        }

        async function loadSlideshow() {
            const [imgSnap, durSnap] = await Promise.all([
                database.ref('fifasupercup_slideshow/images').once('value'),
                database.ref('fifasupercup_slideshow/duration').once('value'),
            ]);
            slideshowImages = imgSnap.val() || [];
            slideshowDuration = durSnap.val() || 3000;
            if (slideInterval) clearInterval(slideInterval);
            const imgEl = document.getElementById('slideshowImg');
            if (slideshowImages.length) {
                imgEl.style.display = 'block';
                currentSlideIdx = 0;
                updateSlide();
                slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx + 1) % slideshowImages.length;
                    updateSlide(); }, slideshowDuration);
            } else { imgEl.style.display = 'none'; }
        }

        function updateSlide() {
            const img = document.getElementById('slideshowImg');
            img.src = slideshowImages[currentSlideIdx];
            const dots = document.getElementById('dotsContainer');
            dots.innerHTML = '';
            slideshowImages.forEach((_, i) => {
                const d = document.createElement('span');
                d.className = 'dot' + (i === currentSlideIdx ? ' active' : '');
                d.onclick = () => { currentSlideIdx = i;
                    updateSlide(); if (slideInterval) { clearInterval(slideInterval);
                        slideInterval = setInterval(() => { currentSlideIdx = (currentSlideIdx + 1) % slideshowImages
                                .length;
                            updateSlide(); }, slideshowDuration); } };
                dots.appendChild(d);
            });
        }

        // ─── REQUESTS HISTORY ───
        async function openRequestsHistoryModal() {
            const approvedSnap = await database.ref(getSeasonPath(currentSeasonId, 'results')).once('value');
            const approvedData = approvedSnap.val() || {};
            const approvedEntries = Object.entries(approvedData)
                .map(([key, val]) => ({ id: key, ...val }))
                .filter(r => r.userSubmitted === true);

            const pendingSnap = await database.ref(getSeasonPath(currentSeasonId, 'pending_results')).once('value');
            const pendingData = pendingSnap.val() || {};
            const pendingEntries = Object.entries(pendingData).map(([key, val]) => ({ id: key, ...val, status: 'pending' }));

            const allEntries = [...approvedEntries, ...pendingEntries];
            allEntries.sort((a, b) => (b.submittedAt || 0) - (a.submittedAt || 0));

            const teamNames = teamsData.map(t => t.name).sort();

            const renderHistory = (filterTeam = '') => {
                let filtered = allEntries;
                if (filterTeam) {
                    filtered = filtered.filter(r => (r.homeTeam === filterTeam || r.awayTeam === filterTeam));
                }

                let listHtml = '';
                if (filtered.length === 0) {
                    listHtml = '<div style="color:rgba(255,255,255,0.3);padding:30px;text-align:center;">No requests found.</div>';
                } else {
                    listHtml = '<div style="max-height:400px;overflow-y:auto;">';
                    for (const r of filtered) {
                        const statusClass = r.status === 'pending' ? 'status-loading' : 'status-success';
                        const statusText = r.status === 'pending' ? '⏳ Pending' : '✅ Approved';
                        const submittedAt = r.submittedAt ? new Date(r.submittedAt).toLocaleString() : 'N/A';
                        const scoreDisplay = r.matchText || `${r.homeScore || 0} - ${r.awayScore || 0}`;
                        listHtml += `
                            <div style="background:rgba(30,144,255,0.08);border-radius:16px;padding:14px 18px;margin-bottom:8px;display:flex;flex-wrap:wrap;align-items:center;gap:12px;border-left:4px solid ${r.status === 'pending' ? '#f97316' : '#22c55e'};">
                                <div style="flex:2;min-width:150px;font-weight:600;color:white;">${escapeHtml(r.homeTeam || '?')} vs ${escapeHtml(r.awayTeam || '?')}</div>
                                <div style="font-weight:600;color:var(--turquoise);">${escapeHtml(scoreDisplay)}</div>
                                <div style="color:rgba(255,255,255,0.5);">MD ${r.md || '?'}</div>
                                <div style="color:rgba(255,255,255,0.5);">${escapeHtml(r.submittedBy || '')}</div>
                                <div style="font-size:0.85rem;color:rgba(255,255,255,0.4);">${escapeHtml(submittedAt)}</div>
                                <div><span class="status-msg ${statusClass}" style="padding:2px 12px;font-size:0.9rem;display:inline-block;">${statusText}</span></div>
                            </div>
                        `;
                    }
                    listHtml += '</div>';
                }

                const filterOptions = `<option value="">All Teams</option>${teamNames.map(t => `<option value="${t}" ${filterTeam === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}`;

                showModal(`
                    <h3>📜 Requests History</h3>
                    <p style="color:rgba(255,255,255,0.6);margin-bottom:16px;">Showing all submitted result requests (approved and pending) for Season ${currentSeasonId}.</p>
                    <div class="filter-group" style="margin-bottom:20px;">
                        <label>Filter by Team</label>
                        <select id="historyTeamFilter">${filterOptions}</select>
                    </div>
                    <div style="margin-top:10px;">${listHtml}</div>
                    <div class="modal-btns"><button class="modal-btn-cancel" id="closeHistoryBtn">Close</button></div>
                `);

                document.getElementById('closeHistoryBtn').onclick = closeModal;
                document.getElementById('historyTeamFilter').addEventListener('change', (e) => {
                    const team = e.target.value;
                    renderHistory(team);
                });
            };

            renderHistory('');
        }

        // ─── ATTACH REALTIME LISTENERS ───
        function attachRealtimeListeners() {
            database.ref('fifasupercup/teams').on('value', async () => {

              </div>

          `;
