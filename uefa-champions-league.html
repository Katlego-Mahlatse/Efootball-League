<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>UEFA Champions League · Bracket</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      padding: 0;
      color: #f5f0ff;
      min-height: 100vh;
    }

    /* GOLD NAVBAR (same as index) */
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }

    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }

    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }

    .modal-content {
      position: absolute;
      top: 60px;
      right: 20px;
      background: linear-gradient(135deg, #f5d742, #e6c42c);
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      width: auto;
      min-width: 200px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeInDown 0.2s ease;
      border: 1px solid #6a3bb5;
    }

    @keyframes fadeInDown {
      from {
        transform: translateY(-15px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-content h3 {
      font-size: 1.1rem;
      color: #4a1d8c;
      margin-bottom: 0.8rem;
      font-weight: 800;
      border-bottom: 1px solid #6a3bb5;
      display: inline-block;
      padding-bottom: 0.2rem;
    }

    .modal-options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 0.8rem 0;
    }

    .modal-option {
      background: rgba(106, 59, 181, 0.15);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #3c1a70;
      font-weight: 700;
      font-size: 0.8rem;
      transition: all 0.2s;
      border: 1px solid #6a3bb5;
      display: block;
    }

    .modal-option:hover {
      background: #6a3bb5;
      color: #f5d742;
      transform: translateX(3px);
    }

    .close-modal {
      background: #4a1d8c;
      color: #f5d742;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
      font-size: 0.7rem;
    }

    .close-modal:hover {
      background: #2d0f5a;
    }

    /* MAIN CONTAINER */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #d4aaff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* SIMPLE BRACKET - exactly as drawn */
    .bracket {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-weight: bold;
    }

    /* Each row of the bracket */
    .bracket-row {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      line-height: 1.4;
    }

    .team-name {
      background: rgba(45, 25, 75, 0.7);
      border: 1px solid #f5d742;
      border-radius: 8px;
      padding: 6px 18px;
      font-size: 1rem;
      min-width: 120px;
      text-align: center;
      color: #f5e6ff;
    }

    .connector {
      width: 40px;
      text-align: center;
      font-size: 1.2rem;
      color: #f5d742;
    }

    .final-block {
      background: linear-gradient(135deg, #d4af37, #b8960c);
      border-radius: 12px;
      padding: 8px 20px;
      text-align: center;
      color: #2d1b4e;
      font-weight: bold;
      min-width: 140px;
    }

    .champion {
      font-size: 0.7rem;
      margin-top: 4px;
    }

    .spacer {
      height: 20px;
    }

    .info-note {
      text-align: center;
      margin-top: 3rem;
      padding: 1rem;
      background: rgba(30, 15, 55, 0.5);
      border-radius: 1rem;
      font-size: 0.8rem;
    }

    @media (max-width: 550px) {
      .team-name {
        padding: 4px 10px;
        font-size: 0.8rem;
        min-width: 90px;
      }
      .connector {
        width: 25px;
      }
      .final-block {
        padding: 6px 12px;
        min-width: 100px;
      }
    }
  </style>
</head>
<body>

  <div class="gold-navbar">
    <div class="hamburger-btn" id="hamburgerBtn">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <h3>TOURNAMENTS</h3>
      <div class="modal-options">
        <a href="fifa-club-world-cup.html" class="modal-option">FIFA CLUB WORLD CUP</a>
        <a href="uefa-champions-league.html" class="modal-option">UEFA CHAMPIONS LEAGUE</a>
        <a href="uefa-europa-league.html" class="modal-option">UEFA EUROPA LEAGUE</a>
      </div>
      <button class="close-modal" id="closeModalBtn">CLOSE</button>
    </div>
  </div>

  <div class="container">
    <div class="page-header">
      <h1>🏆 UEFA CHAMPIONS LEAGUE</h1>
    </div>

    <!-- BRACKET EXACTLY AS DRAWN -->
    <div class="bracket">
      <!-- Pos 1 -->
      <div class="bracket-row">
        <div class="team-name">Pos 1</div>
        <div class="connector">──</div>
        <div class="connector" style="visibility: hidden;"> </div>
      </div>
      <!-- Vertical line from Pos 1 down to Pos 4 -->
      <div class="bracket-row">
        <div class="connector" style="visibility: hidden;"> </div>
        <div class="connector">│</div>
      </div>
      <!-- Pos 4 -->
      <div class="bracket-row">
        <div class="team-name">Pos 4</div>
        <div class="connector">──</div>
        <div class="connector">┐</div>
      </div>
      <!-- Horizontal line to FINAL -->
      <div class="bracket-row">
        <div class="connector" style="visibility: hidden;"> </div>
        <div class="connector" style="width: 60px;">──────</div>
        <div class="final-block">FINAL<br><span class="champion">🏆 CHAMPION 🏆</span></div>
      </div>
      <!-- Pos 2 -->
      <div class="bracket-row">
        <div class="team-name">Pos 2</div>
        <div class="connector">──</div>
        <div class="connector">┘</div>
      </div>
      <!-- Vertical line from Pos 2 down to Pos 3 -->
      <div class="bracket-row">
        <div class="connector" style="visibility: hidden;"> </div>
        <div class="connector">│</div>
      </div>
      <!-- Pos 3 -->
      <div class="bracket-row">
        <div class="team-name">Pos 3</div>
        <div class="connector">──</div>
        <div class="connector" style="visibility: hidden;"> </div>
      </div>
    </div>

    <div class="info-note">
      📌 Champions League spots: <strong>Position 1, 2, 3, 4</strong><br>
      Semi-final matchups: <strong>1st vs 4th</strong> (top) · <strong>2nd vs 3rd</strong> (bottom)
    </div>
  </div>

  <script>
    const hamburger = document.getElementById("hamburgerBtn");
    const modalOverlay = document.getElementById("modalOverlay");
    const closeBtn = document.getElementById("closeModalBtn");

    function openModal() {
      modalOverlay.classList.add("active");
    }
    function closeModal() {
      modalOverlay.classList.remove("active");
    }
    if (hamburger) hamburger.addEventListener("click", openModal);
    if (closeBtn) closeBtn.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => {
      if (e.target === modalOverlay) closeModal();
    });
  </script>
</body>
</html>
