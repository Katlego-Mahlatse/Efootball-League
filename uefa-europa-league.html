<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>UEFA Europa League · Bracket</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      padding: 0;
      color: #f5f0ff;
      min-height: 100vh;
    }

    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }

    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }

    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }

    .modal-content {
      position: absolute;
      top: 60px;
      right: 20px;
      background: linear-gradient(135deg, #f5d742, #e6c42c);
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      width: auto;
      min-width: 200px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeInDown 0.2s ease;
      border: 1px solid #6a3bb5;
    }

    @keyframes fadeInDown {
      from {
        transform: translateY(-15px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-content h3 {
      font-size: 1.1rem;
      color: #4a1d8c;
      margin-bottom: 0.8rem;
      font-weight: 800;
      border-bottom: 1px solid #6a3bb5;
      display: inline-block;
      padding-bottom: 0.2rem;
    }

    .modal-options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 0.8rem 0;
    }

    .modal-option {
      background: rgba(106, 59, 181, 0.15);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #3c1a70;
      font-weight: 700;
      font-size: 0.8rem;
      transition: all 0.2s;
      border: 1px solid #6a3bb5;
      display: block;
    }

    .modal-option:hover {
      background: #6a3bb5;
      color: #f5d742;
      transform: translateX(3px);
    }

    .close-modal {
      background: #4a1d8c;
      color: #f5d742;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
      font-size: 0.7rem;
    }

    .close-modal:hover {
      background: #2d0f5a;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #d4aaff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .europa-image {
      text-align: center;
      margin-bottom: 2rem;
    }

    .europa-image img {
      max-width: 100%;
      height: auto;
      border-radius: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .bracket {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      background: rgba(30, 15, 55, 0.3);
      border-radius: 2rem;
      padding: 2rem 1rem;
    }

    .left-side {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      text-align: right;
    }

    .right-side {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      text-align: left;
    }

    .team-box {
      background: rgba(45, 25, 75, 0.8);
      border: 1px solid #f5d742;
      border-radius: 10px;
      padding: 8px 20px;
      min-width: 100px;
      font-size: 1rem;
      display: inline-block;
    }

    .connector {
      font-size: 1.5rem;
      color: #f5d742;
      letter-spacing: 2px;
    }
    .connector div {
      font-weight: bold;
      letter-spacing: 3px;
    }

    .final-box {
      background: linear-gradient(135deg, #d4af37, #b8960c);
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
      color: #2d1b4e;
      font-weight: bold;
      min-width: 120px;
    }

    .champion {
      font-size: 0.7rem;
      margin-top: 5px;
    }

    .info-note {
      text-align: center;
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(30, 15, 55, 0.5);
      border-radius: 1rem;
      font-size: 0.9rem;
      font-weight: 500;
    }

    @media (max-width: 700px) {
      .team-box {
        padding: 4px 10px;
        font-size: 0.8rem;
        min-width: 70px;
      }
      .connector {
        font-size: 1rem;
      }
      .final-box {
        padding: 8px 12px;
        min-width: 90px;
      }
    }
  </style>
</head>
<body>

  <div class="gold-navbar">
    <div class="hamburger-btn" id="hamburgerBtn">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <h3>TOURNAMENTS</h3>
      <div class="modal-options">
        <a href="fifa-club-world-cup.html" class="modal-option">FIFA CLUB WORLD CUP</a>
        <a href="uefa-champions-league.html" class="modal-option">UEFA CHAMPIONS LEAGUE</a>
        <a href="uefa-europa-league.html" class="modal-option">UEFA EUROPA LEAGUE</a>
        <a href="uefa-super-league.html" class="modal-option">UEFA SUPER LEAGUE</a>
        <a href="uefa-conference-league.html" class="modal-option">UEFA CONFERENCE LEAGUE</a>
        <a href="player-titles.html" class="modal-option">PLAYER TITLES</a>
      </div>
      <button class="close-modal" id="closeModalBtn">CLOSE</button>
    </div>
  </div>

  <div class="container">
    <div class="page-header">
      <h1>🏆 UEFA EUROPA LEAGUE</h1>
    </div>

    <div class="europa-image">
      <img src="unnamed (1).jpg" alt="UEFA Europa League">
    </div>

    <div class="bracket">
      <div class="left-side">
        <div class="team-box">Pos 5</div>
        <div class="team-box">Pos 8</div>
      </div>
      <div class="connector">
        <div>────</div>
        <div>────</div>
      </div>
      <div class="final-box">
        FINAL<br>
        <span class="champion">🏆 CHAMPION 🏆</span>
      </div>
      <div class="connector">
        <div>────</div>
        <div>────</div>
      </div>
      <div class="right-side">
        <div class="team-box">Pos 6</div>
        <div class="team-box">Pos 7</div>
      </div>
    </div>

    <div class="info-note">
      Positions 5, 6, 7, 8 in the Premier League qualify for the UEFA Europa League
    </div>
  </div>

  <script>
    const hamburger = document.getElementById("hamburgerBtn");
    const modalOverlay = document.getElementById("modalOverlay");
    const closeBtn = document.getElementById("closeModalBtn");

    function openModal() { modalOverlay.classList.add("active"); }
    function closeModal() { modalOverlay.classList.remove("active"); }
    if (hamburger) hamburger.addEventListener("click", openModal);
    if (closeBtn) closeBtn.addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModal(); });
  </script>
</body>
</html>
