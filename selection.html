<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <title>Football Hub | Team Selection</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #f5d742;
      --gold-dark: #d4af37;
      --gold-dim: rgba(245,215,66,0.15);
      --gold-border: rgba(245,215,66,0.3);
      --bg: #080808;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(245,215,66,0.2);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.5);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: auto;
      min-width: 1200px;
      width: 1200px;
      margin: 0 auto;
      padding-bottom: 60px;
    }

    body.has-bg::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: var(--bg-pos, center);
      background-repeat: no-repeat;
      z-index: -2;
    }
    body.has-bg::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(8,8,8,0.75);
      z-index: -1;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -800px 0; }
      100% { background-position: 800px 0; }
    }

    /* NAVBAR */
    .navbar {
      background: linear-gradient(90deg, #080808 0%, #1a1200 30%, #3a2800 50%, #1a1200 70%, #080808 100%);
      border-bottom: 2px solid var(--gold-dark);
      padding: 0 2rem;
      height: 100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 32px rgba(245,215,66,0.15);
      animation: fadeInDown 0.5s ease both;
    }
    .navbar-logo {
      height: 74px;
      max-width: 260px;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.3s;
      filter: drop-shadow(0 2px 8px rgba(245,215,66,0.3));
    }
    .navbar-logo:hover { transform: scale(1.05); }
    .navbar-logo-placeholder {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .menu-btn {
      background: rgba(245,215,66,0.08);
      border: 2px solid var(--gold-dark);
      width: 70px;
      height: 70px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .menu-btn span {
      width: 32px;
      height: 3px;
      background: var(--gold);
      border-radius: 4px;
      transition: all 0.3s;
    }
    .menu-btn:hover {
      background: var(--gold-dim);
      transform: scale(1.05);
      box-shadow: 0 0 16px rgba(245,215,66,0.2);
    }

    /* SIDE MENU */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 199;
      display: none;
      backdrop-filter: blur(4px);
    }
    .overlay.active { display: block; }
    .side-menu {
      position: fixed;
      top: 0;
      right: -360px;
      width: 320px;
      height: 100%;
      background: rgba(10,8,0,0.98);
      backdrop-filter: blur(20px);
      border-left: 2px solid var(--gold-dark);
      z-index: 200;
      padding: 40px 28px;
      transition: right 0.35s cubic-bezier(.4,0,.2,1);
    }
    .side-menu.active { right: 0; }
    .close-menu {
      text-align: right;
      font-size: 2.4rem;
      cursor: pointer;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1;
      transition: color 0.2s;
    }
    .close-menu:hover { color: var(--gold); }
    .menu-item {
      padding: 18px 24px;
      margin: 10px 0;
      border: 1px solid var(--gold-border);
      border-radius: 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.3rem;
      color: var(--text-muted);
      transition: all 0.2s;
      font-family: 'Rajdhani', sans-serif;
    }
    .menu-item:hover {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
      transform: translateX(6px);
    }

    /* SLIDESHOW */
    .slideshow-wrapper {
      padding: 36px 36px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.7s ease 0.2s both;
    }
    .slideshow-frame {
      width: 100%;
      max-width: 1100px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(245,215,66,0.15);
      border: 2px solid var(--gold-dark);
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .slideshow-img {
      width: 100%;
      height: auto;
      max-height: 520px;
      object-fit: contain;
      display: block;
      transition: opacity 0.5s ease;
    }
    .dots-container {
      margin-top: 18px;
      display: flex;
      gap: 10px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(245,215,66,0.25);
      cursor: pointer;
      transition: all 0.25s;
    }
    .dot.active {
      background: var(--gold);
      transform: scale(1.4);
      box-shadow: 0 0 10px rgba(245,215,66,0.6);
    }
    .dot:hover { background: var(--gold); }

    /* TABS */
    .tabs-wrapper {
      padding: 24px 36px 0;
      display: flex;
      justify-content: center;
      animation: fadeInUp 0.5s ease 0.3s both;
    }
    .tabs-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      background: linear-gradient(90deg, var(--gold-dark) 0%, #8a6a00 50%, var(--gold-dark) 100%);
      border: 2px solid var(--text);
      border-radius: 80px;
      padding: 10px 18px;
      backdrop-filter: blur(8px);
      width: 100%;
      max-width: 1100px;
    }
    .tabs-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      width: 100%;
    }
    .tab-btn {
      background: transparent;
      border: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 10px 36px;
      cursor: pointer;
      color: rgba(0,0,0,0.6);
      border-radius: 60px;
      letter-spacing: 0.5px;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: #080808;
      color: var(--gold);
    }
    .tab-btn:hover:not(.active) {
      color: #000;
      background: rgba(0,0,0,0.15);
    }

    /* CONTENT AREA */
    .content-wrapper {
      padding: 24px 36px 0;
      animation: fadeInUp 0.5s ease 0.4s both;
    }
    .content-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 32px;
      min-height: 200px;
    }

    /* ADMIN BAR */
    .admin-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 28px;
      gap: 12px;
    }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #000;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.1rem;
      font-family: 'Rajdhani', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245,215,66,0.35);
    }

    /* CARDS GRID */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* TEAM CARD */
    .team-card {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      transition: all 0.3s;
      animation: cardIn 0.4s ease both;
      min-height: 320px;
    }
    .team-card:hover {
      border-color: var(--gold-border);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    /* Team background image */
    .team-bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      padding: 24px;
      height: 100%;
    }

    /* TAKEN CARD */
    .card-taken-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      padding: 4px 16px;
      border-radius: 40px;
      margin-bottom: 16px;
    }
    .card-challenge-badge {
      display: inline-block;
      background: rgba(245,215,66,0.1);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      padding: 4px 16px;
      border-radius: 40px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .team-logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(245,215,66,0.2));
      margin-bottom: 12px;
    }
    .team-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 1.5px;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 4px;
    }

    /* TAKEN reason */
    .taken-owner {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .taken-reason {
      font-size: 1.1rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* MATCHUPS */
    .matchups-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin: 16px 0 10px;
    }
    .matchup-item {
      background: rgba(0,0,0,0.35);
      border-left: 3px solid var(--gold-dark);
      border-radius: 0 12px 12px 0;
      padding: 10px 16px;
      margin-bottom: 8px;
    }
    .matchup-round {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gold-dark);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .matchup-players {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }
    .matchup-players span {
      color: var(--gold);
    }
    .empty-matchups {
      color: var(--text-muted);
      font-size: 1rem;
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
    }

    /* ADMIN CARD ACTIONS */
    .card-admin-btns {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .btn-tiny {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-tiny:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .btn-tiny.danger:hover {
      border-color: #ef4444;
      color: #ef4444;
    }
    .btn-add-matchup {
      background: rgba(245,215,66,0.08);
      border: 1px dashed var(--gold-border);
      width: 100%;
      padding: 8px;
      border-radius: 40px;
      color: var(--gold);
      cursor: pointer;
      font-size: 0.85rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      margin-top: 8px;
      transition: all 0.2s;
    }
    .btn-add-matchup:hover {
      background: var(--gold);
      color: #000;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state p {
      font-size: 1.5rem;
      font-family: 'Rajdhani', sans-serif;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(6px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-card {
      background: rgba(12,10,0,0.98);
      border: 2px solid var(--gold-dark);
      border-radius: 32px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      animation: fadeInUp 0.3s ease both;
    }
    .modal-card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 24px;
    }
    .modal-card label {
      display: block;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      margin-top: 18px;
    }
    .modal-card input,
    .modal-card select,
    .modal-card textarea {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.2rem;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-card input:focus,
    .modal-card select:focus,
    .modal-card textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,215,66,0.1);
    }
    .modal-card textarea { min-height: 90px; resize: vertical; }
    .modal-card select option { background: #1a1200; }
    .modal-btns {
      display: flex;
      gap: 14px;
      margin-top: 28px;
    }
    .modal-btn-primary {
      flex: 1;
      padding: 14px;
      border-radius: 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 1px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #000;
      border: none;
      transition: all 0.2s;
    }
    .modal-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245,215,66,0.3);
    }
    .modal-btn-cancel {
      flex: 1;
      padding: 14px;
      border-radius: 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 1px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--gold-border);
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .modal-btn-cancel:hover { border-color: var(--gold); color: var(--gold); }

    /* icon preview */
    .icon-preview {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .icon-preview img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid var(--gold-border);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg3);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 1rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; bottom: 36px; }

    footer {
      text-align: center;
      padding: 36px;
      color: var(--text-muted);
      font-size: 1rem;
      border-top: 1px solid var(--gold-border);
      margin-top: 40px;
      font-family: 'Rajdhani', sans-serif;
    }

    /* matchup delete */
    .matchup-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .matchup-del {
      background: transparent;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .matchup-del:hover { background: rgba(239,68,68,0.15); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div id="logoContainer"></div>
  <button class="menu-btn" id="menuBtn">
    <span></span><span></span><span></span>
  </button>
</div>

<!-- OVERLAY + SIDE MENU -->
<div class="overlay" id="overlay"></div>
<div class="side-menu" id="sideMenu">
  <div class="close-menu" id="closeMenuBtn">&#x2715;</div>
  <div class="menu-item" id="homeBtn">Home</div>
  <div class="menu-item" id="adminModeBtn">Admin Mode</div>
</div>

<!-- SLIDESHOW -->
<div class="slideshow-wrapper">
  <div class="slideshow-frame">
    <img id="slideshowImg" class="slideshow-img" src="" alt="Slideshow" style="display:none;">
  </div>
  <div class="dots-container" id="dotsContainer"></div>
</div>

<!-- TABS -->
<div class="tabs-wrapper">
  <div class="tabs-container">
    <div class="tabs-row">
      <button class="tab-btn active" data-type="country">COUNTRY</button>
      <button class="tab-btn" data-type="club">CLUB</button>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="content-wrapper">
  <div class="content-card" id="contentCard">
    <div style="text-align:center;padding:60px;color:var(--text-muted);font-size:1.4rem;font-family:'Rajdhani',sans-serif;">Loading...</div>
  </div>
</div>

<footer>Football Hub &copy; 2025 | Team Selection</footer>
<div id="toast" class="toast"></div>

<!-- MODAL -->
<div id="genericModal" class="modal-overlay">
  <div class="modal-card" id="modalContent"></div>
</div>

<script>
  // Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const IMGBB = "81c24f30884ec6dda1dbd2b39739e0c9";

  // State
  let isAdmin = false;
  let currentType = 'country';
  let teamsData = { country: [], club: [] };
  let slideshowImages = [], slideInterval = null, currentSlide = 0;
  let navbarLogoUrl = '';

  // Helpers
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }
  async function uploadImgBB(file) {
    const fd = new FormData();
    fd.append('image', file);
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB}`, { method: 'POST', body: fd });
    const data = await res.json();
    if (!data.success) throw new Error('Upload failed');
    return data.data.url;
  }
  function showModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('genericModal').classList.add('active');
  }
  function closeModal() {
    document.getElementById('genericModal').classList.remove('active');
  }
  document.getElementById('genericModal').addEventListener('click', e => {
    if (e.target === document.getElementById('genericModal')) closeModal();
  });

  // Navbar logo
  async function loadNavbarLogo() {
    const snap = await db.ref('footballhub_navbar_logo').once('value');
    navbarLogoUrl = snap.val() || '';
    const c = document.getElementById('logoContainer');
    c.innerHTML = navbarLogoUrl
      ? `<img src="${navbarLogoUrl}" class="navbar-logo" alt="Logo">`
      : `<div class="navbar-logo-placeholder">FOOTBALL HUB</div>`;
  }

  // Slideshow
  async function loadSlideshow() {
    const snap = await db.ref('globalSlideshow/images').once('value');
    slideshowImages = snap.val() || [];
    const imgEl = document.getElementById('slideshowImg');
    if (slideshowImages.length) {
      imgEl.style.display = 'block';
      currentSlide = 0;
      updateSlide();
      if (slideInterval) clearInterval(slideInterval);
      slideInterval = setInterval(() => {
        currentSlide = (currentSlide + 1) % slideshowImages.length;
        updateSlide();
      }, 3000);
    } else {
      imgEl.style.display = 'none';
    }
  }
  function updateSlide() {
    const img = document.getElementById('slideshowImg');
    img.src = slideshowImages[currentSlide];
    const dots = document.getElementById('dotsContainer');
    dots.innerHTML = '';
    slideshowImages.forEach((_, i) => {
      const d = document.createElement('span');
      d.className = 'dot' + (i === currentSlide ? ' active' : '');
      d.onclick = () => {
        currentSlide = i;
        updateSlide();
        if (slideInterval) {
          clearInterval(slideInterval);
          slideInterval = setInterval(() => {
            currentSlide = (currentSlide + 1) % slideshowImages.length;
            updateSlide();
          }, 3000);
        }
      };
      dots.appendChild(d);
    });
  }

  // Load teams
  async function loadTeams() {
    const snap = await db.ref('teams').once('value');
    const data = snap.val() || { country: {}, club: {} };
    teamsData.country = Object.entries(data.country || {}).map(([id, v]) => ({ id, ...v }));
    teamsData.club = Object.entries(data.club || {}).map(([id, v]) => ({ id, ...v }));
    renderCards();
  }

  // Render cards
  function renderCards() {
    const card = document.getElementById('contentCard');
    const teams = teamsData[currentType];

    let html = '';

    if (isAdmin) {
      html += `<div class="admin-bar">
        <button class="btn-gold" id="addTeamBtn">+ Add Team</button>
        <button class="btn-gold" id="adminSettingsBtn">Settings</button>
      </div>`;
    }

    if (!teams.length) {
      html += `<div class="empty-state"><p>No teams yet${isAdmin ? '. Click Add Team to start.' : '.'}</p></div>`;
      card.innerHTML = html;
      attachAdminBarListeners();
      return;
    }

    html += `<div class="cards-grid">`;
    teams.forEach((team, idx) => {
      const isTaken = team.status === 'taken';
      const matchups = team.matchups || [];
      const delay = idx * 0.07;

      html += `<div class="team-card" style="animation-delay:${delay}s">`;

      // Background transparent image
      if (team.iconUrl) {
        html += `<img class="team-bg-img" src="${team.iconUrl}" alt="">`;
      }

      html += `<div class="card-inner">`;

      // Badge
      if (isTaken) {
        html += `<div class="card-taken-badge">TAKEN</div>`;
      } else {
        html += `<div class="card-challenge-badge">OPEN CHALLENGE</div>`;
      }

      // Header: logo + name + admin btns
      html += `<div class="card-header">`;
      html += `<div>`;
      if (team.iconUrl) {
        html += `<img class="team-logo" src="${team.iconUrl}" alt="${team.name}">`;
      }
      html += `<div class="team-name">${escapeHtml(team.name)}</div>`;
      html += `</div>`;
      if (isAdmin) {
        html += `<div style="display:flex;flex-direction:column;gap:6px;">
          <button class="btn-tiny edit-team-btn" data-id="${team.id}">Edit</button>
          <button class="btn-tiny danger delete-team-btn" data-id="${team.id}">Delete</button>
        </div>`;
      }
      html += `</div>`; // card-header

      // TAKEN content
      if (isTaken) {
        html += `<div class="taken-owner">${escapeHtml(team.owner || '')}</div>`;
        html += `<div class="taken-reason">${escapeHtml(team.reason || '')}</div>`;
      } else {
        // CHALLENGE matchups
        html += `<div class="matchups-label">Matchups</div>`;
        if (matchups.length) {
          matchups.forEach((m, mi) => {
            html += `<div class="matchup-item">
              <div class="matchup-row">
                <div>
                  <div class="matchup-round">Match ${mi + 1}</div>
                  <div class="matchup-players"><span>${escapeHtml(m.player1)}</span> vs <span>${escapeHtml(m.player2)}</span></div>
                </div>
                ${isAdmin ? `<button class="matchup-del del-matchup-btn" data-team="${team.id}" data-idx="${mi}">&#x2715;</button>` : ''}
              </div>
            </div>`;
          });
        } else {
          html += `<div class="empty-matchups">No matchups added yet</div>`;
        }
        if (isAdmin) {
          html += `<button class="btn-add-matchup add-matchup-btn" data-id="${team.id}">+ Add Matchup</button>`;
        }
      }

      html += `</div>`; // card-inner
      html += `</div>`; // team-card
    });
    html += `</div>`; // cards-grid

    card.innerHTML = html;
    attachAdminBarListeners();
    attachCardListeners();
  }

  function attachAdminBarListeners() {
    document.getElementById('addTeamBtn')?.addEventListener('click', () => openTeamModal());
    document.getElementById('adminSettingsBtn')?.addEventListener('click', () => openSettingsModal());
  }

  function attachCardListeners() {
    if (!isAdmin) return;
    document.querySelectorAll('.edit-team-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const team = teamsData[currentType].find(t => t.id === btn.dataset.id);
        if (team) openTeamModal(team);
      });
    });
    document.querySelectorAll('.delete-team-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this team and all its data?')) return;
        await db.ref(`teams/${currentType}/${btn.dataset.id}`).remove();
        await loadTeams();
        showToast('Team deleted');
      });
    });
    document.querySelectorAll('.add-matchup-btn').forEach(btn => {
      btn.addEventListener('click', () => openMatchupModal(btn.dataset.id));
    });
    document.querySelectorAll('.del-matchup-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const { team: teamId, idx } = btn.dataset;
        const team = teamsData[currentType].find(t => t.id === teamId);
        if (!team) return;
        const matchups = [...(team.matchups || [])];
        matchups.splice(parseInt(idx), 1);
        await db.ref(`teams/${currentType}/${teamId}/matchups`).set(matchups);
        await loadTeams();
        showToast('Matchup removed');
      });
    });
  }

  // Team Modal (Add / Edit)
  function openTeamModal(team = null) {
    const isEdit = !!team;
    showModal(`
      <h3>${isEdit ? 'Edit Team' : 'Add Team'}</h3>
      <label>Team Name</label>
      <input id="mTeamName" value="${team ? escapeHtml(team.name) : ''}" placeholder="e.g. Real Madrid">
      <label>Team Type (status)</label>
      <select id="mStatus">
        <option value="challenge" ${(!team || team.status === 'challenge') ? 'selected' : ''}>Open Challenge</option>
        <option value="taken" ${team?.status === 'taken' ? 'selected' : ''}>Taken</option>
      </select>
      <div id="takenFields" style="${team?.status === 'taken' ? '' : 'display:none'}">
        <label>Owner Name</label>
        <input id="mOwner" value="${team ? escapeHtml(team.owner || '') : ''}" placeholder="Player who owns this team">
        <label>Reason / Note</label>
        <textarea id="mReason">${team ? escapeHtml(team.reason || '') : ''}</textarea>
      </div>
      <label>Team Logo (transparent PNG recommended)</label>
      <input type="file" id="mIconFile" accept="image/*">
      <div class="icon-preview" id="mIconPreview">
        ${team?.iconUrl ? `<img src="${team.iconUrl}" alt=""><span style="color:var(--text-muted);font-size:0.9rem;">Current logo</span>` : ''}
      </div>
      <div class="modal-btns">
        <button class="modal-btn-cancel" id="mCancelBtn">Cancel</button>
        <button class="modal-btn-primary" id="mSaveBtn">Save Team</button>
      </div>
    `);

    let uploadedUrl = team?.iconUrl || '';

    document.getElementById('mStatus').addEventListener('change', function() {
      document.getElementById('takenFields').style.display = this.value === 'taken' ? '' : 'none';
    });
    document.getElementById('mCancelBtn').onclick = closeModal;
    document.getElementById('mIconFile').onchange = async function() {
      const file = this.files[0];
      if (!file) return;
      showToast('Uploading logo...');
      try {
        uploadedUrl = await uploadImgBB(file);
        document.getElementById('mIconPreview').innerHTML = `<img src="${uploadedUrl}" alt=""><span style="color:var(--gold);font-size:0.9rem;">Uploaded</span>`;
        showToast('Logo ready');
      } catch(e) { showToast('Upload failed'); }
    };
    document.getElementById('mSaveBtn').onclick = async function() {
      const name = document.getElementById('mTeamName').value.trim();
      if (!name) { showToast('Name required'); return; }
      const status = document.getElementById('mStatus').value;
      const owner = document.getElementById('mOwner')?.value.trim() || '';
      const reason = document.getElementById('mReason')?.value.trim() || '';
      const data = {
        name,
        status,
        iconUrl: uploadedUrl || null,
        matchups: team?.matchups || [],
        ...(status === 'taken' ? { owner, reason } : {})
      };
      if (isEdit) {
        await db.ref(`teams/${currentType}/${team.id}`).update(data);
      } else {
        await db.ref(`teams/${currentType}`).push(data);
      }
      closeModal();
      await loadTeams();
      showToast(isEdit ? 'Team updated' : 'Team added');
    };
  }

  // Matchup Modal
  function openMatchupModal(teamId) {
    const team = teamsData[currentType].find(t => t.id === teamId);
    const matchCount = (team?.matchups || []).length + 1;
    showModal(`
      <h3>Add Matchup</h3>
      <label>Match ${matchCount} - Player 1</label>
      <input id="mP1" placeholder="e.g. Player A">
      <label>Match ${matchCount} - Player 2</label>
      <input id="mP2" placeholder="e.g. Player B">
      <div class="modal-btns">
        <button class="modal-btn-cancel" id="mCancelBtn">Cancel</button>
        <button class="modal-btn-primary" id="mSaveBtn">Add Matchup</button>
      </div>
    `);
    document.getElementById('mCancelBtn').onclick = closeModal;
    document.getElementById('mSaveBtn').onclick = async function() {
      const p1 = document.getElementById('mP1').value.trim();
      const p2 = document.getElementById('mP2').value.trim();
      if (!p1 || !p2) { showToast('Both player names required'); return; }
      const matchups = [...(team?.matchups || []), { player1: p1, player2: p2 }];
      await db.ref(`teams/${currentType}/${teamId}/matchups`).set(matchups);
      closeModal();
      await loadTeams();
      showToast('Matchup added');
    };
  }

  // Admin Settings Modal
  function openSettingsModal() {
    showModal(`
      <h3>Admin Settings</h3>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:8px;">
        <button class="btn-gold" id="sLogoBtn" style="text-align:left;">Upload Navbar Logo</button>
        <button class="btn-gold" id="sSlideshowBtn" style="text-align:left;">Manage Slideshow</button>
      </div>
      <div class="modal-btns" style="margin-top:28px;">
        <button class="modal-btn-cancel" id="sCloseBtn">Close</button>
      </div>
    `);
    document.getElementById('sCloseBtn').onclick = closeModal;
    document.getElementById('sLogoBtn').onclick = async () => {
      const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
      inp.onchange = async () => {
        const file = inp.files[0]; if (!file) return;
        showToast('Uploading...');
        const url = await uploadImgBB(file);
        await db.ref('footballhub_navbar_logo').set(url);
        await loadNavbarLogo();
        showToast('Logo updated');
        closeModal();
      };
      inp.click();
    };
    document.getElementById('sSlideshowBtn').onclick = () => { closeModal(); openSlideshowModal(); };
  }

  function openSlideshowModal() {
    const render = () => {
      let preview = slideshowImages.map((url, i) =>
        `<div style="position:relative;display:inline-block;">
          <img src="${url}" style="width:120px;height:80px;object-fit:cover;border-radius:10px;border:1px solid var(--gold-border);">
          <button data-idx="${i}" class="slide-del" style="position:absolute;top:-8px;right:-8px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-weight:bold;">&#x2715;</button>
        </div>`
      ).join('');
      showModal(`
        <h3>Manage Slideshow</h3>
        <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;">${preview || '<p style="color:var(--text-muted)">No images yet</p>'}</div>
        <label>Add Image</label>
        <input type="file" id="slideFile" accept="image/*">
        <button class="btn-gold" id="slideUploadBtn" style="margin-top:10px;width:100%;">Upload Slide</button>
        <div class="modal-btns" style="margin-top:20px;">
          <button class="modal-btn-cancel" id="slideCloseBtn">Close</button>
        </div>
      `);
      document.getElementById('slideCloseBtn').onclick = closeModal;
      document.querySelectorAll('.slide-del').forEach(btn => {
        btn.onclick = async () => {
          slideshowImages.splice(parseInt(btn.dataset.idx), 1);
          await db.ref('globalSlideshow/images').set(slideshowImages);
          await loadSlideshow();
          render();
        };
      });
      document.getElementById('slideUploadBtn').onclick = async () => {
        const file = document.getElementById('slideFile').files[0];
        if (!file) { showToast('Select an image'); return; }
        showToast('Uploading...');
        const url = await uploadImgBB(file);
        slideshowImages.push(url);
        await db.ref('globalSlideshow/images').set(slideshowImages);
        await loadSlideshow();
        showToast('Slide added');
        render();
      };
    };
    render();
  }

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = btn.dataset.type;
      renderCards();
    });
  });

  // Menu
  document.getElementById('menuBtn').onclick = () => {
    document.getElementById('sideMenu').classList.toggle('active');
    document.getElementById('overlay').classList.toggle('active');
  };
  document.getElementById('closeMenuBtn').onclick = () => {
    document.getElementById('sideMenu').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
  };
  document.getElementById('overlay').onclick = () => {
    document.getElementById('sideMenu').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
  };
  document.getElementById('homeBtn').onclick = () => history.back();
  document.getElementById('adminModeBtn').onclick = () => {
    const key = prompt('Enter admin key:');
    if (key === 'admin@100') {
      isAdmin = true;
      document.getElementById('adminModeBtn').textContent = 'Admin Active';
      showToast('Admin mode on');
      renderCards();
    } else {
      showToast('Wrong key');
    }
  };

  // Realtime
  db.ref('teams').on('value', snap => {
    const data = snap.val() || {};
    teamsData.country = Object.entries(data.country || {}).map(([id, v]) => ({ id, ...v }));
    teamsData.club = Object.entries(data.club || {}).map(([id, v]) => ({ id, ...v }));
    renderCards();
  });
  db.ref('globalSlideshow/images').on('value', () => loadSlideshow());

  // Init
  async function init() {
    await loadNavbarLogo();
    await loadSlideshow();
    await loadTeams();
  }
  init();
</script>
</body>
</html>
