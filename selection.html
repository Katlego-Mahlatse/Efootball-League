
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Global Football Hub | Country vs Club</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #f5d742;
            --gold-dark: #d4af37;
            --gold-dim: rgba(245, 215, 66, 0.15);
            --bg: #080808;
            --bg2: #111111;
            --bg3: #1a1a1a;
            --bg4: #222222;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --border: rgba(255, 255, 255, 0.08);
            --border-gold: rgba(245, 215, 66, 0.3);
            --radius: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg4);
            border-radius: 3px;
        }

        /* Navbar gold */
        .navbar {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 0 1.5rem;
            height: 65px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(245, 215, 66, 0.25);
        }
        .navbar-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: #000;
            font-weight: bold;
        }
        .menu-icon {
            background: #000;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border: 1.5px solid var(--gold);
            transition: transform 0.2s;
        }
        .menu-icon span {
            display: block;
            width: 18px;
            height: 2.5px;
            background: var(--gold);
            border-radius: 3px;
        }
        .menu-icon:hover {
            transform: scale(1.05);
        }

        /* Side menu */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1999;
            display: none;
            backdrop-filter: blur(4px);
        }
        .overlay.active {
            display: block;
        }
        .side-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: var(--bg2);
            border-left: 1px solid var(--border-gold);
            z-index: 2000;
            padding: 24px 20px;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .side-menu.active {
            right: 0;
        }
        .close-menu {
            cursor: pointer;
            color: var(--text-muted);
            float: right;
            font-size: 24px;
            transition: color 0.2s;
        }
        .close-menu:hover {
            color: var(--text);
        }
        .menu-items {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .menu-item {
            padding: 14px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            border: 1px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .menu-item:hover {
            background: var(--bg3);
            color: var(--text);
            border-color: var(--border);
        }
        .menu-item.gold-item {
            color: var(--gold);
        }
        .menu-item.gold-item:hover {
            background: var(--gold-dim);
            border-color: var(--border-gold);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* Slideshow */
        .slideshow-wrapper {
            margin-bottom: 32px;
        }
        .slideshow-frame {
            border-radius: var(--radius-xl);
            overflow: hidden;
            border: 2px solid var(--border-gold);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            background: #000;
        }
        .slideshow-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }
        .dots-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--bg4);
            cursor: pointer;
            transition: all 0.2s;
        }
        .dot.active {
            background: var(--gold);
            transform: scale(1.2);
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 32px;
        }
        .tab-btn {
            background: transparent;
            border: 2px solid var(--border-gold);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            padding: 10px 36px;
            border-radius: 60px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.25s;
            letter-spacing: 1px;
        }
        .tab-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(245, 215, 66, 0.5);
        }
        .tab-btn:hover:not(.active) {
            color: var(--gold);
            border-color: var(--gold);
        }

        /* Cards grid */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .team-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 24px;
            transition: all 0.25s;
            animation: fadeUp 0.4s ease;
        }
        .team-card:hover {
            border-color: var(--border-gold);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        .team-name {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1px;
            color: var(--gold);
        }
        .card-admin-actions {
            display: flex;
            gap: 12px;
        }
        .icon-circle {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .team-icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-gold);
            background: var(--bg3);
            padding: 6px;
        }
        .matchups-section {
            margin-top: 20px;
        }
        .matchups-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .matchup-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .matchup-item {
            background: var(--bg3);
            border-radius: var(--radius);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--gold);
        }
        .matchup-players {
            font-weight: 600;
            font-size: 1rem;
        }
        .matchup-players span {
            color: var(--gold);
            font-weight: 800;
        }
        .btn-tiny {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        .btn-tiny:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        .btn-tiny.danger:hover {
            color: #f87171;
            border-color: #f87171;
        }
        .btn-add-matchup {
            background: var(--gold-dim);
            border: 1px dashed var(--border-gold);
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            color: var(--gold);
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .btn-add-matchup:hover {
            background: var(--gold);
            color: #000;
        }
        .empty-matchups {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
            padding: 20px;
            background: var(--bg3);
            border-radius: var(--radius);
        }
        .admin-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-gold:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245, 215, 66, 0.4);
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(6px);
            z-index: 3000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-backdrop.active {
            display: flex;
        }
        .modal-box {
            background: var(--bg2);
            border: 1px solid var(--border-gold);
            border-radius: var(--radius-xl);
            max-width: 520px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
        }
        .modal-close {
            background: var(--bg3);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: var(--text-muted);
            cursor: pointer;
        }
        .modal-body {
            padding: 24px;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .form-row {
            margin-bottom: 18px;
        }
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
        }
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--border-gold);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg3);
            border: 1px solid var(--border-gold);
            color: var(--gold);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 9999;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            bottom: 32px;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }
        .debug-info {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="navbar-logo">🌍 FOOTBALL HUB</div>
    <div class="menu-icon" id="menuBtn">
        <span></span><span></span><span></span>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="side-menu" id="sideMenu">
    <div class="close-menu" id="closeMenuBtn">✕</div>
    <div class="menu-items">
        <div class="menu-item" id="homeBtn">🏠 Home</div>
        <div class="menu-item gold-item" id="adminModeBtn">🔐 Admin Mode</div>
    </div>
</div>

<div class="container">
    <!-- Slideshow -->
    <div class="slideshow-wrapper">
        <div class="slideshow-frame">
            <img id="slideshowImg" class="slideshow-img" src="" alt="Slideshow">
        </div>
        <div class="dots-container" id="dotsContainer"></div>
    </div>

    <!-- Tabs -->
    <div class="tabs-container">
        <button class="tab-btn active" data-type="country">🌍 Country</button>
        <button class="tab-btn" data-type="club">⚽ Club</button>
    </div>

    <!-- Admin add button (hidden by default) -->
    <div id="adminAddWrapper" style="display: none; margin-bottom: 20px; display: flex; justify-content: flex-end;">
        <button class="btn-gold" id="addTeamBtn">+ Add Team</button>
        <button class="btn-gold" id="adminSettingsBtn" style="margin-left: 12px;">⚙️ Settings</button>
    </div>

    <div id="cardsContainer" class="cards-grid"></div>
</div>

<footer>Global Football Hub | Country vs Club Battles</footer>
<div id="toast" class="toast"></div>

<!-- Modal -->
<div id="genericModal" class="modal-backdrop">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Modal</div>
            <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer" id="modalFooter"></div>
    </div>
</div>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
        authDomain: "efootball-412.firebaseapp.com",
        databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
        projectId: "efootball-412",
        storageBucket: "efootball-412.firebasestorage.app",
        messagingSenderId: "596548424249",
        appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const IMGBB_API_KEY = "81c24f30884ec6dda1dbd2b39739e0c9";

    // State
    let isAdmin = false;
    let currentType = "country"; // 'country' or 'club'
    let teamsData = { country: [], club: [] };
    let slideshowImages = [];
    let slideInterval = null;
    let currentSlide = 0;

    // Helper functions
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    async function uploadToImgBB(file) {
        const fd = new FormData();
        fd.append('image', file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
        const data = await res.json();
        if (!data.success) throw new Error('Upload failed');
        return data.data.url;
    }

    // Slideshow
    async function loadSlideshow() {
        const snap = await database.ref('globalSlideshow/images').once('value');
        slideshowImages = snap.val() || [];
        const imgEl = document.getElementById('slideshowImg');
        const dotsContainer = document.getElementById('dotsContainer');
        if (slideshowImages.length) {
            imgEl.style.display = 'block';
            currentSlide = 0;
            updateSlide();
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                currentSlide = (currentSlide + 1) % slideshowImages.length;
                updateSlide();
            }, 3000);
        } else {
            imgEl.src = 'https://via.placeholder.com/1200x400?text=No+Slideshow+Images';
        }
        function updateSlide() {
            imgEl.src = slideshowImages[currentSlide];
            dotsContainer.innerHTML = slideshowImages.map((_, idx) =>
                `<span class="dot ${idx === currentSlide ? 'active' : ''}" data-index="${idx}"></span>`
            ).join('');
            document.querySelectorAll('.dot').forEach(dot => {
                dot.addEventListener('click', (e) => {
                    currentSlide = parseInt(e.target.dataset.index);
                    updateSlide();
                    if (slideInterval) {
                        clearInterval(slideInterval);
                        slideInterval = setInterval(() => {
                            currentSlide = (currentSlide + 1) % slideshowImages.length;
                            updateSlide();
                        }, 3000);
                    }
                });
            });
        }
    }

    // Load teams from Firebase
    async function loadTeams() {
        const snap = await database.ref('teams').once('value');
        const data = snap.val() || { country: {}, club: {} };
        teamsData.country = Object.entries(data.country || {}).map(([id, val]) => ({ id, ...val }));
        teamsData.club = Object.entries(data.club || {}).map(([id, val]) => ({ id, ...val }));
        renderCards();
    }

    // Render cards for current type
    function renderCards() {
        const container = document.getElementById('cardsContainer');
        const teams = teamsData[currentType];
        if (!teams.length) {
            container.innerHTML = `<div class="empty-matchups" style="padding:40px;">No teams added yet. ${isAdmin ? 'Click + Add Team' : 'Admin mode required'}</div>`;
            return;
        }
        container.innerHTML = teams.map(team => `
            <div class="team-card" data-id="${team.id}">
                <div class="card-header">
                    <span class="team-name">${escapeHtml(team.name)}</span>
                    ${isAdmin ? `<div class="card-admin-actions">
                        <button class="btn-tiny edit-team-btn" data-id="${team.id}">✏️ Edit</button>
                        <button class="btn-tiny danger delete-team-btn" data-id="${team.id}">🗑️ Delete</button>
                    </div>` : ''}
                </div>
                <div class="icon-circle">
                    ${team.iconUrl ? `<img class="team-icon" src="${team.iconUrl}" alt="${team.name}">` : `<div class="team-icon" style="background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:3rem;">🏆</div>`}
                </div>
                <div class="matchups-section">
                    <div class="matchups-title">
                        <span>⚡ MATCH-UPS</span>
                        ${isAdmin ? `<button class="btn-tiny add-matchup-btn" data-id="${team.id}">+ Add Matchup</button>` : ''}
                    </div>
                    <div class="matchup-list" id="matchup-list-${team.id}">
                        ${renderMatchups(team.matchups || [], team.id)}
                    </div>
                </div>
            </div>
        `).join('');

        // Attach event listeners for admin buttons
        if (isAdmin) {
            document.querySelectorAll('.edit-team-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.dataset.id;
                    const team = teamsData[currentType].find(t => t.id === id);
                    if (team) openTeamModal(team);
                });
            });
            document.querySelectorAll('.delete-team-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if (confirm('Delete this team and all its matchups?')) {
                        await database.ref(`teams/${currentType}/${btn.dataset.id}`).remove();
                        await loadTeams();
                        showToast('Team deleted');
                    }
                });
            });
            document.querySelectorAll('.add-matchup-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const teamId = btn.dataset.id;
                    openMatchupModal(teamId, null);
                });
            });
            document.querySelectorAll('.delete-matchup-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const { teamId, idx } = btn.dataset;
                    const team = teamsData[currentType].find(t => t.id === teamId);
                    if (team && team.matchups) {
                        const newMatchups = [...team.matchups];
                        newMatchups.splice(parseInt(idx), 1);
                        await database.ref(`teams/${currentType}/${teamId}/matchups`).set(newMatchups);
                        await loadTeams();
                        showToast('Matchup removed');
                    }
                });
            });
        }
    }

    function renderMatchups(matchups, teamId) {
        if (!matchups || matchups.length === 0) {
            return `<div class="empty-matchups">No match-ups yet</div>`;
        }
        return matchups.map((m, idx) => `
            <div class="matchup-item">
                <div class="matchup-players">
                    <span>${escapeHtml(m.player1)}</span> vs <span>${escapeHtml(m.player2)}</span>
                </div>
                ${isAdmin ? `<button class="btn-tiny danger delete-matchup-btn" data-team-id="${teamId}" data-idx="${idx}">✕</button>` : ''}
            </div>
        `).join('');
    }

    // Modal helpers
    let modalResolve = null;
    function openModal(title, bodyHtml, footerHtml = '') {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerHTML = bodyHtml;
        document.getElementById('modalFooter').innerHTML = footerHtml;
        document.getElementById('genericModal').classList.add('active');
        return new Promise(resolve => { modalResolve = resolve; });
    }
    function closeModal() {
        document.getElementById('genericModal').classList.remove('active');
        if (modalResolve) modalResolve(null);
    }
    document.getElementById('modalCloseBtn').onclick = closeModal;
    document.getElementById('genericModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('genericModal')) closeModal();
    });

    // Team modal (add/edit)
    async function openTeamModal(team = null) {
        const isEdit = !!team;
        const html = `
            <div class="form-row">
                <label class="form-label">Team / Country Name</label>
                <input class="form-input" id="teamName" value="${team ? escapeHtml(team.name) : ''}" placeholder="e.g. Brazil / Real Madrid">
            </div>
            <div class="form-row">
                <label class="form-label">Team Logo (Icon)</label>
                <input type="file" id="teamIconFile" accept="image/*">
                <div id="iconPreview" style="margin-top:8px;">${team?.iconUrl ? `<img src="${team.iconUrl}" style="width:60px;height:60px;border-radius:50%;">` : ''}</div>
            </div>
        `;
        const footer = `
            <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
            <button class="btn-primary" id="saveTeamBtn">Save Team</button>
        `;
        await openModal(isEdit ? 'Edit Team' : 'Add Team', html, footer);
        document.getElementById('cancelModalBtn').onclick = closeModal;
        const fileInput = document.getElementById('teamIconFile');
        let uploadedUrl = team?.iconUrl || '';
        fileInput.onchange = async () => {
            const file = fileInput.files[0];
            if (!file) return;
            showToast('Uploading icon...');
            try {
                uploadedUrl = await uploadToImgBB(file);
                document.getElementById('iconPreview').innerHTML = `<img src="${uploadedUrl}" style="width:60px;height:60px;border-radius:50%;">`;
                showToast('Icon ready');
            } catch(e) { showToast('Upload failed'); }
        };
        document.getElementById('saveTeamBtn').onclick = async () => {
            const name = document.getElementById('teamName').value.trim();
            if (!name) { showToast('Name required'); return; }
            const data = { name, iconUrl: uploadedUrl || null, matchups: team?.matchups || [] };
            if (isEdit) {
                await database.ref(`teams/${currentType}/${team.id}`).update(data);
            } else {
                await database.ref(`teams/${currentType}`).push(data);
            }
            closeModal();
            await loadTeams();
            showToast(isEdit ? 'Team updated' : 'Team added');
        };
    }

    // Matchup modal
    async function openMatchupModal(teamId, matchup = null) {
        const html = `
            <div class="form-row">
                <label class="form-label">Player 1 Name</label>
                <input class="form-input" id="player1" value="${matchup ? escapeHtml(matchup.player1) : ''}" placeholder="e.g. Neymar">
            </div>
            <div class="form-row">
                <label class="form-label">Player 2 Name</label>
                <input class="form-input" id="player2" value="${matchup ? escapeHtml(matchup.player2) : ''}" placeholder="e.g. Mbappé">
            </div>
        `;
        const footer = `
            <button class="btn-secondary" id="cancelModalBtn">Cancel</button>
            <button class="btn-primary" id="saveMatchupBtn">Save Matchup</button>
        `;
        await openModal('Add Matchup', html, footer);
        document.getElementById('cancelModalBtn').onclick = closeModal;
        document.getElementById('saveMatchupBtn').onclick = async () => {
            const p1 = document.getElementById('player1').value.trim();
            const p2 = document.getElementById('player2').value.trim();
            if (!p1 || !p2) { showToast('Both players required'); return; }
            const team = teamsData[currentType].find(t => t.id === teamId);
            const matchups = team?.matchups || [];
            const newMatchup = { player1: p1, player2: p2 };
            const updated = [...matchups, newMatchup];
            await database.ref(`teams/${currentType}/${teamId}/matchups`).set(updated);
            closeModal();
            await loadTeams();
            showToast('Matchup added');
        };
    }

    // Admin settings: slideshow & navbar logo
    function openAdminSettings() {
        const slideshowHtml = `
            <div class="form-row">
                <label class="form-label">Upload Slideshow Image</label>
                <input type="file" id="slideImage" accept="image/*">
                <button class="btn-primary" id="uploadSlideBtn" style="margin-top:8px;">Upload</button>
            </div>
            <div class="form-row">
                <label class="form-label">Current Slideshow Images</label>
                <div id="slideshowList" style="display:flex; gap:8px; flex-wrap:wrap;">
                    ${slideshowImages.map((url, idx) => `<div style="position:relative;"><img src="${url}" width="60" height="40" style="border-radius:8px;"><button class="btn-tiny danger" data-idx="${idx}" style="position:absolute; top:-8px; right:-8px;">✕</button></div>`).join('')}
                </div>
            </div>
        `;
        const footer = `<button class="btn-secondary" id="closeSettingsBtn">Close</button>`;
        openModal('Admin Settings', slideshowHtml, footer);
        document.getElementById('closeSettingsBtn').onclick = closeModal;
        document.getElementById('uploadSlideBtn').onclick = async () => {
            const file = document.getElementById('slideImage').files[0];
            if (!file) { showToast('Select an image'); return; }
            showToast('Uploading...');
            const url = await uploadToImgBB(file);
            const newList = [...slideshowImages, url];
            await database.ref('globalSlideshow/images').set(newList);
            await loadSlideshow();
            closeModal();
            showToast('Image added');
        };
        document.querySelectorAll('#slideshowList button').forEach(btn => {
            btn.onclick = async () => {
                const idx = parseInt(btn.dataset.idx);
                const newList = slideshowImages.filter((_, i) => i !== idx);
                await database.ref('globalSlideshow/images').set(newList);
                await loadSlideshow();
                closeModal();
                showToast('Image removed');
            };
        });
    }

    // Tab switching
    function setActiveTab(type) {
        currentType = type;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            if (btn.dataset.type === type) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderCards();
    }

    // Menu and admin
    function toggleMenu() {
        document.getElementById('sideMenu').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }
    function closeMenu() {
        document.getElementById('sideMenu').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }
    document.getElementById('menuBtn').onclick = toggleMenu;
    document.getElementById('closeMenuBtn').onclick = closeMenu;
    document.getElementById('overlay').onclick = closeMenu;
    document.getElementById('homeBtn').onclick = () => window.history.back();

    document.getElementById('adminModeBtn').onclick = () => {
        const key = prompt('Enter admin key:');
        if (key === 'admin@100') {
            isAdmin = true;
            document.getElementById('adminAddWrapper').style.display = 'flex';
            document.getElementById('adminModeBtn').innerHTML = '👑 Admin Active';
            showToast('Admin mode ON');
            renderCards();
        } else {
            showToast('Wrong key');
        }
    };
    document.getElementById('addTeamBtn').onclick = () => openTeamModal();
    document.getElementById('adminSettingsBtn').onclick = () => openAdminSettings();

    // Initialize
    async function init() {
        await loadSlideshow();
        await loadTeams();
        setActiveTab('country');
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => setActiveTab(btn.dataset.type));
        });
        // realtime listener
        database.ref('teams').on('value', () => loadTeams());
        database.ref('globalSlideshow/images').on('value', () => loadSlideshow());
    }
    init();
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }
</script>
</body>
</html>
