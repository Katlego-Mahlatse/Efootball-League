<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>My Profile · eFootball 412</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      color: #f5f0ff;
      min-height: 100vh;
      padding-bottom: 2rem;
    }
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      z-index: 200;
      visibility: hidden;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active {
      visibility: visible;
      pointer-events: auto;
    }
    .modal-content {
      background: linear-gradient(135deg, #2d1b4e, #1f0f3a);
      border: 2px solid #f5d742;
      border-radius: 2rem;
      padding: 1.5rem;
      max-width: 350px;
      width: 90%;
      text-align: center;
    }
    .modal-content h3 {
      color: #f5d742;
      margin-bottom: 1rem;
    }
    .modal-option {
      background: rgba(106, 59, 181, 0.15);
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      text-decoration: none;
      color: #f5e6ff;
      font-weight: 700;
      font-size: 0.8rem;
      transition: all 0.2s;
      border: 1px solid #f5d742;
      display: block;
      margin: 0.5rem 0;
      cursor: pointer;
    }
    .modal-option:hover {
      background: #6a3bb5;
      color: #f5d742;
    }
    .close-modal {
      background: #4a1d8c;
      color: #f5d742;
      border: none;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .card-header {
      padding: 1rem 1.5rem;
      background: rgba(30, 15, 55, 0.9);
      border-bottom: 2px solid #f5d742;
    }
    .card-header h2 {
      font-size: 1.4rem;
      color: #f5e6ff;
    }
    .form-group {
      padding: 1rem 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #f5e6ff;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: rgba(30, 15, 55, 0.9);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      color: white;
      outline: none;
    }
    .btn-primary {
      background: #6a3bb5;
      border: none;
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
      color: #f5d742;
      font-weight: bold;
      cursor: pointer;
      margin: 0.5rem 1.5rem 1.5rem;
    }
    .btn-primary:hover {
      background: #7e4acf;
    }
    .team-badge {
      background: rgba(106, 59, 181, 0.5);
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      margin: 0.5rem 1.5rem;
    }
    .avatar-preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      background: #6a3bb5;
      margin-top: 0.5rem;
    }
    @media (max-width: 680px) {
      .container { padding: 0 0.8rem; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal-content">
    <h3>MENU</h3>
    <div class="modal-option" id="rulesModalBtn">RULES</div>
    <div class="modal-option" id="calendarModalBtn">CALENDAR</div>
    <div class="modal-option" id="playerTitlesModalBtn">PLAYER TITLES</div>
    <div class="modal-option" id="logoutModalBtn" style="background:#ef4444; color:white;">LOGOUT</div>
    <button class="close-modal" id="closeModalBtn">CLOSE</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-header"><h2>👤 Player Profile</h2></div>
    <div class="form-group">
      <label>Profile Picture</label>
      <input type="file" id="profilePicture" accept="image/*">
      <div id="picturePreview"><img id="avatarImg" class="avatar-preview" src="" alt="Avatar" style="display:none;"></div>
      <button id="uploadPictureBtn" class="btn-primary" style="margin:0.5rem 0 0;">Upload Picture</button>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Email">
    </div>
    <div class="form-group">
      <label>Phone Number (optional)</label>
      <input type="tel" id="phone" placeholder="Phone number">
    </div>
    <div class="form-group">
      <label>New Password (leave blank to keep current)</label>
      <input type="password" id="newPassword" placeholder="New password">
    </div>
    <button id="saveProfileBtn" class="btn-primary">Save Changes</button>
    <div class="card-header" style="margin-top:0.5rem;"><h2>🏆 Teams Managed</h2></div>
    <div id="teamDisplay" class="team-badge">Loading...</div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, updateProfile, updateEmail, updatePassword, onAuthStateChanged } from "firebase/auth";
  import { getDatabase, ref, get, set, update } from "firebase/database";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const IMGBB_API_KEY = "81c24f30884ec6dda1dbd2b39739e0c9";
  let currentUser = null;
  let currentUserData = null;

  const usernameInput = document.getElementById('username');
  const emailInput = document.getElementById('email');
  const phoneInput = document.getElementById('phone');
  const newPasswordInput = document.getElementById('newPassword');
  const saveBtn = document.getElementById('saveProfileBtn');
  const teamDisplay = document.getElementById('teamDisplay');
  const avatarImg = document.getElementById('avatarImg');
  const pictureInput = document.getElementById('profilePicture');
  const uploadPictureBtn = document.getElementById('uploadPictureBtn');

  async function loadProfile(uid) {
    const userRef = ref(db, `users/${uid}`);
    const snapshot = await get(userRef);
    currentUserData = snapshot.val() || {};
    usernameInput.value = currentUserData.username || '';
    emailInput.value = currentUserData.email || '';
    phoneInput.value = currentUserData.phone || '';
    // Display teams (as array or string)
    let teams = currentUserData.teams || [];
    if (typeof teams === 'string') teams = teams ? [teams] : [];
    teamDisplay.innerText = teams.length ? teams.join(', ') : 'No teams assigned';
    // Display profile picture
    const photoURL = currentUserData.photoURL || '';
    if (photoURL) {
      avatarImg.src = photoURL;
      avatarImg.style.display = 'block';
    } else {
      avatarImg.style.display = 'none';
    }
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = user;
    await loadProfile(user.uid);
  });

  saveBtn.addEventListener('click', async () => {
    const newUsername = usernameInput.value.trim();
    const newEmail = emailInput.value.trim();
    const newPhone = phoneInput.value.trim();
    const newPassword = newPasswordInput.value.trim();
    if (!newUsername || !newEmail) {
      alert('Username and email are required.');
      return;
    }
    try {
      await updateProfile(currentUser, { displayName: newUsername });
      if (newEmail !== currentUser.email) {
        await updateEmail(currentUser, newEmail);
      }
      if (newPassword) {
        await updatePassword(currentUser, newPassword);
      }
      await update(ref(db, `users/${currentUser.uid}`), {
        username: newUsername,
        email: newEmail,
        phone: newPhone
      });
      alert('Profile updated successfully!');
    } catch (error) {
      console.error(error);
      alert('Error: ' + error.message);
    }
  });

  uploadPictureBtn.addEventListener('click', async () => {
    const file = pictureInput.files[0];
    if (!file) {
      alert('Please select an image first.');
      return;
    }
    const formData = new FormData();
    formData.append('image', file);
    try {
      console.log('Uploading to ImgBB...');
      const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
        method: 'POST',
        body: formData
      });
      const result = await response.json();
      if (!result.success) {
        throw new Error(result.error?.message || 'Upload failed');
      }
      const imageUrl = result.data.url;
      console.log('Image URL from ImgBB:', imageUrl);
      // Save to Firebase Auth
      await updateProfile(currentUser, { photoURL: imageUrl });
      // Save to Realtime Database
      await set(ref(db, `users/${currentUser.uid}/photoURL`), imageUrl);
      avatarImg.src = imageUrl;
      avatarImg.style.display = 'block';
      alert('Profile picture updated! URL: ' + imageUrl);
    } catch (error) {
      console.error(error);
      alert('Upload failed: ' + error.message);
    }
  });

  // Modal menu
  const hamburgerBtn = document.getElementById("hamburgerBtn");
  const modalOverlay = document.getElementById("modalOverlay");
  const closeModalBtn = document.getElementById("closeModalBtn");
  function openModal() { modalOverlay.classList.add("active"); }
  function closeModalFunc() { modalOverlay.classList.remove("active"); }
  hamburgerBtn.addEventListener("click", openModal);
  closeModalBtn.addEventListener("click", closeModalFunc);
  modalOverlay.addEventListener("click", (e) => { if (e.target === modalOverlay) closeModalFunc(); });
  document.getElementById('rulesModalBtn').onclick = () => window.location.href = 'rules.html';
  document.getElementById('calendarModalBtn').onclick = () => window.location.href = 'calendar.html';
  document.getElementById('playerTitlesModalBtn').onclick = () => window.location.href = 'player-titles.html';
  document.getElementById('logoutModalBtn').onclick = async () => {
    await auth.signOut();
    window.location.href = 'login.html';
  };
</script>
</body>
</html>
