<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>My Profile · eFootball 412</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      color: #f5f0ff;
      min-height: 100vh;
      padding-bottom: 2rem;
    }
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }
    .card-header {
      padding: 1rem 1.5rem;
      background: rgba(30, 15, 55, 0.9);
      border-bottom: 2px solid #f5d742;
    }
    .card-header h2 {
      font-size: 1.4rem;
      color: #f5e6ff;
    }
    .form-group {
      padding: 1rem 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #f5e6ff;
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.6rem 1rem;
      background: rgba(30, 15, 55, 0.9);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      color: white;
      outline: none;
    }
    .btn-primary {
      background: #6a3bb5;
      border: none;
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
      color: #f5d742;
      font-weight: bold;
      cursor: pointer;
      margin: 0.5rem 1.5rem 1.5rem;
    }
    .btn-primary:hover {
      background: #7e4acf;
    }
    .info-text {
      padding: 0 1.5rem 1.5rem;
      color: #c4b0ff;
      font-size: 0.9rem;
    }
    .team-badge {
      background: rgba(106, 59, 181, 0.5);
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      margin: 0.5rem 1.5rem;
    }
    @media (max-width: 680px) {
      .container { padding: 0 0.8rem; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<div class="container">
  <div class="card">
    <div class="card-header"><h2>👤 Player Profile</h2></div>
    <div class="form-group">
      <label>Profile Picture</label>
      <input type="file" id="profilePicture" accept="image/*">
      <div id="picturePreview" style="margin-top: 0.5rem;"><img id="avatarImg" src="" alt="Avatar" style="width:80px; height:80px; border-radius:50%; object-fit:cover; background:#6a3bb5; display:none;"></div>
      <button id="uploadPictureBtn" class="btn-primary" style="margin:0.5rem 0 0;">Upload Picture</button>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Email">
    </div>
    <div class="form-group">
      <label>New Password (leave blank to keep current)</label>
      <input type="password" id="newPassword" placeholder="New password">
    </div>
    <button id="saveProfileBtn" class="btn-primary">Save Changes</button>
    <div class="card-header" style="margin-top:0.5rem;"><h2>🏆 Team Managed</h2></div>
    <div id="teamDisplay" class="team-badge">Loading...</div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, updateProfile, updateEmail, updatePassword, onAuthStateChanged } from "firebase/auth";
  import { getDatabase, ref, get, set } from "firebase/database";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "firebase/storage";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  let currentUser = null;
  let currentUserData = null;

  const usernameInput = document.getElementById('username');
  const emailInput = document.getElementById('email');
  const newPasswordInput = document.getElementById('newPassword');
  const saveBtn = document.getElementById('saveProfileBtn');
  const teamDisplay = document.getElementById('teamDisplay');
  const avatarImg = document.getElementById('avatarImg');
  const pictureInput = document.getElementById('profilePicture');
  const uploadPictureBtn = document.getElementById('uploadPictureBtn');

  async function loadProfile(uid) {
    const userRef = ref(db, `users/${uid}`);
    const snapshot = await get(userRef);
    currentUserData = snapshot.val() || {};
    usernameInput.value = currentUserData.username || '';
    emailInput.value = currentUserData.email || '';
    // Load team from user's profile
    const team = currentUserData.team || 'No team assigned';
    teamDisplay.innerText = team;
    // Load profile picture URL from Firebase Storage or DB
    const photoURL = currentUserData.photoURL || '';
    if (photoURL) {
      avatarImg.src = photoURL;
      avatarImg.style.display = 'block';
    } else {
      avatarImg.style.display = 'none';
    }
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = user;
    await loadProfile(user.uid);
  });

  saveBtn.addEventListener('click', async () => {
    const newUsername = usernameInput.value.trim();
    const newEmail = emailInput.value.trim();
    const newPassword = newPasswordInput.value.trim();
    if (!newUsername || !newEmail) {
      alert('Username and email are required.');
      return;
    }
    try {
      // Update displayName in Auth
      await updateProfile(currentUser, { displayName: newUsername });
      // Update email if changed
      if (newEmail !== currentUser.email) {
        await updateEmail(currentUser, newEmail);
      }
      // Update password if provided
      if (newPassword) {
        await updatePassword(currentUser, newPassword);
      }
      // Update Realtime Database
      await set(ref(db, `users/${currentUser.uid}/username`), newUsername);
      await set(ref(db, `users/${currentUser.uid}/email`), newEmail);
      alert('Profile updated successfully!');
    } catch (error) {
      console.error(error);
      alert('Error: ' + error.message);
    }
  });

  // Upload profile picture to Firebase Storage
  uploadPictureBtn.addEventListener('click', async () => {
    const file = pictureInput.files[0];
    if (!file) {
      alert('Please select an image first.');
      return;
    }
    if (!currentUser) return;
    const storagePath = storageRef(storage, `profile_pictures/${currentUser.uid}`);
    try {
      const snapshot = await uploadBytes(storagePath, file);
      const url = await getDownloadURL(snapshot.ref);
      // Update Auth profile photoURL
      await updateProfile(currentUser, { photoURL: url });
      // Save to DB
      await set(ref(db, `users/${currentUser.uid}/photoURL`), url);
      avatarImg.src = url;
      avatarImg.style.display = 'block';
      alert('Profile picture updated!');
    } catch (error) {
      console.error(error);
      alert('Upload failed: ' + error.message);
    }
  });

  // Hamburger menu – simple modal (optional)
  const hamburger = document.getElementById('hamburgerBtn');
  // No modal overlay on this page for simplicity; you can add if needed.
</script>
</body>
</html>
