
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      var designWidth = 1200;
      var screenWidth = window.screen.width;
      var scale = screenWidth / designWidth;
      scale = Math.min(1.0, Math.max(0.3, scale));
      var viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      viewportMeta.content = 'width=1200, initial-scale=' + scale + ', user-scalable=yes';
      document.head.appendChild(viewportMeta);
    })();
  </script>
  <title>Copa del Rey | Spanish Cup</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cr-navy: #1A2B5E;
      --cr-navy-dark: #0E1A3A;
      --cr-red: #E9102E;
      --cr-red-light: #ff2a46;
      --cr-white: #ffffff;
      --glass-bg: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.1);
      --glass-blur: blur(12px);
    }

    @keyframes fadeInDown { from { opacity:0; transform:translateY(-24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInUp   { from { opacity:0; transform:translateY(24px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }
    @keyframes spin       { to { transform:rotate(360deg); } }
    @keyframes cardSlideIn{ from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes trophyGlow {
      0%,100% { filter: drop-shadow(0 0 5px var(--cr-red)); transform: scale(1); }
      50%     { filter: drop-shadow(0 0 20px var(--cr-red)); transform: scale(1.05); }
    }

    body {
      font-family:'Rajdhani',sans-serif;
      background: var(--cr-navy-dark);
      min-height:100vh;
      overflow-x:auto;
      min-width:1200px;
      width:1200px;
      margin:0 auto;
      font-size:20px;
      padding-bottom:3rem;
    }

    body.has-bg::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:var(--bg-image);
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      z-index:-2;
    }
    body.has-bg::after {
      content:'';
      position:fixed;
      inset:0;
      background:rgba(26,43,94,0.75);
      z-index:-1;
    }

    /* NAVBAR - RED */
    .navbar {
      background: var(--cr-red);
      border-bottom: 3px solid var(--cr-navy);
      padding: 0 2rem;
      height: 100px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      animation: fadeInDown 0.5s ease both;
    }
    .navbar-logo { height:74px; max-width:260px; object-fit:contain; cursor:pointer; transition:transform 0.3s; }
    .navbar-logo:hover { transform:scale(1.05); }
    .navbar-logo-placeholder {
      font-family:'Bebas Neue',sans-serif;
      font-size:2.2rem; letter-spacing:3px;
      color: var(--cr-navy); cursor:pointer; font-weight:bold;
    }
    .menu-btn {
      background: var(--cr-navy);
      border: 2px solid var(--cr-white);
      width:70px; height:70px; border-radius:20px;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center; gap:8px;
      cursor:pointer; transition:all 0.3s;
    }
    .menu-btn span { width:32px; height:4px; background:var(--cr-red); border-radius:4px; }
    .menu-btn:hover { background:var(--cr-navy-dark); transform:rotate(90deg); }

    /* SIDE MENU */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:199; display:none; backdrop-filter:blur(3px); }
    .overlay.active { display:block; }
    .side-menu {
      position:fixed; top:0; right:-360px; width:360px; height:100%;
      background:rgba(14,26,58,0.98); backdrop-filter:blur(20px);
      border-left:2px solid var(--cr-red);
      z-index:200; padding:40px 28px;
      transition:right 0.35s cubic-bezier(.4,0,.2,1);
    }
    .side-menu.active { right:0; }
    .close-menu { text-align:right; font-size:2.8rem; cursor:pointer; color:white; margin-bottom:40px; line-height:1; transition:color 0.2s; }
    .close-menu:hover { color:var(--cr-red); }
    .menu-item {
      padding:20px 28px; margin:12px 0;
      border:1px solid rgba(233,16,46,0.4); border-radius:20px;
      cursor:pointer; font-weight:600; font-size:1.5rem;
      color:white; transition:all 0.2s;
    }
    .menu-item:hover { background:var(--cr-red); border-color:white; transform:translateX(8px); }

    /* SLIDESHOW */
    .slideshow-wrapper { padding:36px 36px 20px; display:flex; flex-direction:column; align-items:center; animation:fadeIn 0.7s ease 0.2s both; }
    .slideshow-frame {
      width:100%; max-width:1100px; border-radius:32px; overflow:hidden;
      box-shadow:0 8px 40px rgba(233,16,46,0.35);
      border:1px solid rgba(255,255,255,0.2);
      background:#0a0a1a; display:flex; justify-content:center; align-items:center;
    }
    .slideshow-img { width:100%; height:auto; max-height:520px; object-fit:contain; display:block; transition:opacity 0.5s ease; }
    .dots-container { margin-top:20px; display:flex; gap:12px; }
    .dot { width:14px; height:14px; border-radius:50%; background:rgba(255,255,255,0.3); cursor:pointer; transition:all 0.25s; }
    .dot.active { background:var(--cr-red); transform:scale(1.4); }
    .dot:hover { background:rgba(255,255,255,0.7); }

    /* TROPHY ANIMATION (replaces Emirates flip) */
    .trophy-section {
      margin:1rem auto;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:120px;
    }
    .trophy-container {
      animation: trophyGlow 3s ease-in-out infinite;
      text-align:center;
    }
    .trophy-img {
      max-height:100px;
      object-fit:contain;
    }
    .trophy-placeholder {
      font-size:5rem;
      color:var(--cr-red);
    }

    /* SEASON BAR - WHITE OVAL with red text */
    .season-bar { display:flex; justify-content:center; margin:24px 0 16px; }
    .season-controls {
      display:flex; align-items:center; gap:20px;
      background:#ffffff;
      border:2px solid rgba(233,16,46,0.3);
      padding:12px 32px; border-radius:80px;
      box-shadow:0 4px 16px rgba(0,0,0,0.15);
    }
    .season-arrow {
      background: var(--cr-red);
      border: none;
      width:56px; height:56px; border-radius:50%;
      font-size:2rem; cursor:pointer; color:white;
      font-weight:bold; transition:all 0.2s; line-height:1;
      display:flex; align-items:center; justify-content:center;
    }
    .season-arrow:hover:not(:disabled) { background:var(--cr-red-light); transform:scale(1.1); }
    .season-arrow:disabled { opacity:0.3; cursor:not-allowed; }
    .season-number {
      font-family:'Bebas Neue',sans-serif;
      font-size:2.2rem; letter-spacing:3px;
      color: var(--cr-red); min-width:180px; text-align:center;
    }
    .season-admin-btns { display:flex; gap:10px; margin-left:10px; }
    .season-admin-btn {
      background:rgba(233,16,46,0.1); border:1px solid var(--cr-red);
      padding:8px 20px; border-radius:40px; font-weight:600;
      cursor:pointer; color:var(--cr-red); font-size:1.1rem;
      font-family:'Rajdhani',sans-serif; transition:all 0.2s;
    }
    .season-admin-btn:hover { background:var(--cr-red); color:white; }

    /* TABS */
    .tabs-container {
      display:flex; flex-direction:column; align-items:center; gap:10px;
      margin:28px 36px 0;
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);
      border-radius:80px; padding:12px 20px;
      max-width:1100px; margin-left:auto; margin-right:auto;
      animation:fadeInUp 0.5s ease 0.3s both;
    }
    .tabs-row { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
    .tab-btn {
      background:transparent; border:none;
      font-family:'Rajdhani',sans-serif;
      font-size:1.3rem; font-weight:700;
      padding:10px 28px; cursor:pointer;
      color:rgba(255,255,255,0.6); border-radius:60px;
      letter-spacing:0.5px; transition:all 0.25s; white-space:nowrap;
    }
    .tab-btn.active { background:var(--cr-red); color:white; }
    .tab-btn:hover:not(.active) { color:white; background:rgba(233,16,46,0.3); }

    /* SUB TABS for fixtures */
    .sub-tabs-row {
      display:flex; gap:8px; margin-bottom:24px;
      justify-content:center;
    }
    .sub-tab-btn {
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.2);
      font-family:'Rajdhani',sans-serif;
      font-size:1.2rem; font-weight:700;
      padding:8px 28px; cursor:pointer;
      color:rgba(255,255,255,0.6); border-radius:60px;
      letter-spacing:0.5px; transition:all 0.25s; white-space:nowrap;
    }
    .sub-tab-btn.active { background:var(--cr-red); color:white; border-color:var(--cr-red); }
    .sub-tab-btn:hover:not(.active) { color:white; background:rgba(233,16,46,0.2); }

    /* CONTENT CARD - GLASS */
    .content-card {
      margin:24px 36px 40px;
      background:var(--glass-bg);
      backdrop-filter:var(--glass-blur);
      border:1px solid var(--glass-border);
      border-radius:32px;
      padding:32px;
      min-height:200px;
      animation:fadeInUp 0.5s ease 0.4s both;
    }

    /* LOADING */
    .loading-spinner { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px; gap:24px; }
    .spinner { width:60px; height:60px; border:5px solid rgba(255,255,255,0.2); border-top-color:var(--cr-red); border-radius:50%; animation:spin 0.8s linear infinite; }
    .loading-spinner span { color:rgba(255,255,255,0.6); font-size:1.4rem; }

    /* EMPTY STATE & COMING SOON */
    .empty-state, .coming-soon { text-align:center; padding:80px 20px; color:rgba(255,255,255,0.4); }
    .empty-state .empty-icon, .coming-soon .cs-icon { font-size:5rem; margin-bottom:20px; }
    .coming-soon h2 { font-family:'Bebas Neue',sans-serif; font-size:3rem; letter-spacing:4px; color:white; margin-bottom:12px; }

    /* TABLE STYLES (navy/red themed) */
    .table-scroll-wrap { overflow-x:auto; border-radius:20px; position:relative; }
    .stats-table {
      width:100%; border-collapse:collapse;
      font-family:'Rajdhani',sans-serif;
      min-width:900px;
      background:rgba(255,255,255,0.05);
      color:white;
    }
    .stats-table thead th {
      background:rgba(233,16,46,0.2);
      color:white;
      font-size:1.3rem; font-weight:800;
      text-transform:uppercase; letter-spacing:1px;
      padding:16px 18px;
      border-bottom:2px solid rgba(255,255,255,0.15);
      white-space:nowrap;
    }
    .stats-table th:first-child,
    .stats-table td:first-child {
      position:sticky; left:0; z-index:25;
      background:rgba(26,43,94,0.8); width:64px; min-width:64px;
    }
    .stats-table thead th:first-child { background:rgba(233,16,46,0.3); z-index:30; }
    .stats-table th:nth-child(2),
    .stats-table td:nth-child(2) {
      position:sticky; left:64px; z-index:24;
      background:rgba(26,43,94,0.8);
      box-shadow:4px 0 8px -2px rgba(0,0,0,0.4);
      border-right:1px solid rgba(255,255,255,0.1);
    }
    .stats-table thead th:nth-child(2) { background:rgba(233,16,46,0.3); z-index:30; }
    .stats-table tbody tr { border-bottom:1px solid rgba(255,255,255,0.07); transition:background 0.2s; }
    .stats-table tbody tr:hover { background:rgba(233,16,46,0.1); }
    .stats-table td { padding:14px 18px; color:white; font-size:1.3rem; font-weight:600; white-space:nowrap; }
    .stats-table td.stat-number { font-size:2.4rem !important; font-weight:800; line-height:1.2; }
    .team-name-text { font-weight:700; font-size:2.4rem !important; color:white; }
    .pts-cell { font-weight:800; color:var(--cr-red); font-size:1.5rem; }
    .rank-cell { font-weight:700; color:white; font-family:'Bebas Neue',sans-serif; font-size:1.6rem; }

    .table-actions {
      display:flex; justify-content:center; gap:12px;
      padding:14px 18px;
      background:rgba(0,0,0,0.3);
      border-radius:20px 20px 0 0;
      border:1px solid rgba(255,255,255,0.1);
      border-bottom:2px solid rgba(233,16,46,0.5);
      align-items:center;
    }
    .table-actions-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.6rem; color:white; letter-spacing:2px;
      text-align:center; flex:1;
    }
    .add-btn, .add-btn-main, .add-result-top-btn, .view-calendar-btn, .settings-btn, .modal-btn-primary, .season-admin-btn, .btn-sm {
      transition:all 0.2s;
    }
    .add-btn {
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.3); color:white;
      font-family:'Rajdhani',sans-serif; font-weight:700;
      font-size:1.2rem; padding:10px 24px;
      border-radius:40px; cursor:pointer;
    }
    .add-btn:hover { background:rgba(233,16,46,0.5); border-color:white; }

    .team-cell-inner { display:flex; align-items:center; gap:14px; }
    .team-icon-sm { width:60px; height:60px; object-fit:contain; background:transparent; border:none; border-radius:0; transition:transform 0.25s; }
    .team-icon-sm:hover { transform:scale(1.1); }
    .team-icon-lg { width:100px; height:100px; object-fit:contain; background:transparent; border:none; border-radius:0; transition:transform 0.25s; }
    .team-icon-lg:hover { transform:scale(1.05); }

    .form-circles { display:flex; gap:6px; align-items:center; }
    .circle-result { width:30px; height:30px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:1rem; font-weight:bold; }
    .cW  { background:#22c55e; color:white; }
    .cL  { background:#ef4444; color:white; }
    .cD  { background:#6b7280; color:white; }
    .cBlank { background:rgba(255,255,255,0.15); }

    .filters-bar {
      display:flex; flex-wrap:wrap; gap:20px; align-items:flex-end;
      margin-bottom:30px; padding:20px;
      background:rgba(0,0,0,0.3); border-radius:28px;
      border:1px solid rgba(255,255,255,0.1);
    }
    .filter-group { display:flex; flex-direction:column; gap:8px; }
    .filter-group label { font-size:1rem; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,0.6); }
    .filter-group select, .filter-group button {
      background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.2);
      border-radius:40px; padding:12px 20px;
      font-family:'Rajdhani',sans-serif; font-size:1.2rem;
      font-weight:600; color:white;
      cursor:pointer;
    }
    .filter-group select:hover, .filter-group button:hover { background:rgba(233,16,46,0.3); }
    .filter-stats { font-size:1rem; color:rgba(255,255,255,0.5); margin-left:auto; align-self:center; }

    /* FIXTURE & MATCH CARDS */
    .fixture-date-group { margin-bottom:32px; animation:cardSlideIn 0.4s ease both; }
    .fixture-date-label {
      font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:3px; color:white;
      margin-bottom:14px; padding:10px 20px;
      background:rgba(233,16,46,0.2); border-radius:50px;
      border-left:4px solid var(--cr-red); display:inline-block;
    }
    .fixture-card, .match-card {
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(12px);
      border-radius:28px; padding:28px 40px; margin-bottom:16px;
      transition:all 0.25s; animation:cardSlideIn 0.4s ease both;
      border:1px solid rgba(255,255,255,0.1);
    }
    .fixture-card:hover, .match-card:hover { background:rgba(233,16,46,0.1); transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,0.3); }
    .fixture-match-row, .match-row { display:flex; align-items:center; justify-content:space-between; gap:24px; }
    .fixture-team-side, .team-side { display:flex; flex-direction:column; align-items:center; gap:12px; flex:1; text-align:center; }
    .fixture-team-name, .team-name-big { font-weight:700; font-size:2.2rem; color:white; }
    .fixture-vs { font-family:'Bebas Neue',sans-serif; font-size:3rem; color:var(--cr-red); letter-spacing:4px; flex-shrink:0; opacity:0.8; }
    .score-display {
      font-family:'Bebas Neue',sans-serif; font-size:4.5rem; color:white; letter-spacing:6px;
      background:rgba(0,0,0,0.4); padding:14px 42px;
      border-radius:80px; border:2px solid rgba(255,255,255,0.2);
    }
    .forfeit-display { font-size:3rem; background:rgba(0,0,0,0.4); padding:12px 28px; border-radius:60px; }
    .goal-scorer-item {
      display:inline-block; background:rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.2); padding:5px 14px; border-radius:30px;
      margin:3px; font-size:1.2rem; color:white;
    }
    .match-meta { display:flex; gap:16px; flex-wrap:wrap; margin-top:24px; justify-content:center; }
    .meta-tag { background:rgba(0,0,0,0.3); padding:10px 24px; border-radius:50px; font-size:1.3rem; color:white; }

    /* TOP 3 BLOCKS */
    .top3-container { display:flex; justify-content:center; gap:0; margin-bottom:40px; width:100%; }
    .top3-block {
      position:relative; text-align:center; flex:1;
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(12px);
      transition:transform 0.3s; min-width:0;
      border:1px solid rgba(255,255,255,0.1);
    }
    .top3-block:first-child { border-top-left-radius:32px; border-bottom-left-radius:32px; }
    .top3-block:last-child  { border-top-right-radius:32px; border-bottom-right-radius:32px; }
    .top3-block:hover { transform:translateY(-8px); z-index:5; background:rgba(233,16,46,0.15); }
    .player-image-wrapper { position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; background:rgba(0,0,0,0.3); }
    .player-img { width:100%; height:100%; object-fit:cover; }
    .medal-badge { position:absolute; top:12px; left:12px; font-size:3rem; filter:drop-shadow(0 2px 4px black); z-index:2; }
    .edit-block-btn {
      position:absolute; top:12px; right:12px;
      background:rgba(0,0,0,0.6); border:1px solid white;
      border-radius:50%; width:40px; height:40px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:1.6rem; color:white; transition:all 0.2s; z-index:3;
    }
    .edit-block-btn:hover { background:var(--cr-red); transform:scale(1.1); }
    .player-name-overlay {
      position:absolute; bottom:16px; left:16px;
      background:linear-gradient(90deg,rgba(0,0,0,0.7),rgba(0,0,0,0.3));
      color:white; font-weight:800; font-size:1.6rem; padding:6px 16px;
      border-radius:40px; backdrop-filter:blur(4px); border-left:3px solid var(--cr-red);
    }
    .team-icon-overlay { position:absolute; bottom:12px; right:12px; width:56px; height:56px; }
    .top3-count { font-family:'Bebas Neue',sans-serif; font-size:2rem; color:var(--cr-red); background:rgba(0,0,0,0.3); display:inline-block; padding:8px 20px; border-radius:60px; margin-top:12px; margin-bottom:16px; }
    .stats-list { width:100%; border-collapse:collapse; background:rgba(255,255,255,0.04); color:white; }
    .stats-list thead th { background:rgba(233,16,46,0.2); padding:18px 22px; }
    .count-badge { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.3); padding:6px 22px; border-radius:50px; }

    /* MODAL */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.92);
      backdrop-filter:blur(6px); display:none;
      justify-content:center; align-items:center; z-index:1000; padding:20px;
    }
    .modal-overlay.active { display:flex; }
    .modal-card {
      background:rgba(14,26,58,0.98); border:1px solid var(--cr-red);
      border-radius:40px; padding:44px;
      max-width:860px; width:100%; max-height:88vh; overflow-y:auto;
      font-family:'Rajdhani',sans-serif;
      animation:fadeInUp 0.35s ease both;
    }
    .modal-card h3 { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; color:var(--cr-red); margin-bottom:28px; }
    .modal-card label { color:rgba(255,255,255,0.6); margin-top:20px; display:block; }
    .modal-card input, .modal-card select, .modal-card textarea {
      width:100%; padding:16px 22px;
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.2);
      border-radius:28px; color:white;
      font-size:1.4rem;
    }
    .modal-btns { display:flex; gap:18px; margin-top:28px; }
    .modal-btn-primary { background:var(--cr-red); color:white; border:none; }
    .modal-btn-primary:hover { background:var(--cr-red-light); }

<script>
// FIREBASE CONFIG (same project, different root)
const firebaseConfig = {
  apiKey:"AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
  authDomain:"efootball-412.firebaseapp.com",
  databaseURL:"https://efootball-412-default-rtdb.firebaseio.com",
  projectId:"efootball-412",
  storageBucket:"efootball-412.firebasestorage.app",
  messagingSenderId:"596548424249",
  appId:"1:596548424249:web:4349f6e87a40a1590bf3e8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const basePath = "copa_del_rey";
const IMGBB_API_KEY = "81c24f30884ec6dda1dbd2b39739e0c9";
const RMBG_KEY = "zdkDj9iwQqbGNe8sJu7AEuE8";

// STATE
let isAdmin = false;
let currentSeasonId = 1;
let availableSeasons = [];
let activeSeasonId = 1;
let groupsData = {};
let teamIconsCache = {};
let slideshowImages = [], slideshowDuration = 3000, slideInterval = null, currentSlideIdx = 0;
let navbarLogoUrl = '';
let trophyImageUrl = '';
let calendarEventsData = {};
let topScorerList = [], topAssistantList = [];
let tempScorersHome = [], tempScorersAway = [];
let activeFixtureSubTab = 'group-stage';

function sp(seasonNum, sub="") { return `${basePath}/seasons/season_${seasonNum}${sub ? "/"+sub : ""}`; }
function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

async function uploadToImgBB(blob) {
  const fd = new FormData(); fd.append('image', blob);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:'POST', body:fd});
  const data = await res.json();
  if(!data.success) throw new Error(data.error?.message);
  return data.data.url;
}
async function removeBackground(file) {
  const fd = new FormData(); fd.append('image_file', file); fd.append('size', 'auto');
  const res = await fetch('https://api.remove.bg/v1.0/removebg', {method:'POST', headers:{'X-Api-Key': RMBG_KEY}, body:fd});
  if(!res.ok) throw new Error('remove.bg failed');
  return await res.blob();
}
function pickFile(accept) {
  return new Promise(res=>{ const i=document.createElement('input'); i.type='file'; i.accept=accept; i.onchange=e=>res(e.target.files[0]||null); i.click(); });
}
function showModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('genericModal').classList.add('active'); }
function closeModal() { document.getElementById('genericModal').classList.remove('active'); }
function getTeamIconHtml(name, cls='team-icon-sm') { const url = teamIconsCache[name]; return url ? `<img class="${cls}" src="${url}" alt="${name}" onerror="this.style.display='none';">` : ''; }

// LOADERS
async function loadNavbarLogo() { const snap = await db.ref(`${basePath}/navbar_logo`).once('value'); navbarLogoUrl = snap.val()||''; document.getElementById('logoContainer').innerHTML = navbarLogoUrl ? `<img src="${navbarLogoUrl}" class="navbar-logo">` : `<div class="navbar-logo-placeholder">COPA DEL REY</div>`; }
async function loadTrophyImage() { const snap = await db.ref(`${basePath}/trophy_image`).once('value'); trophyImageUrl = snap.val()||''; const img = document.getElementById('trophyImg'), place = document.getElementById('trophyPlaceholder'); if(trophyImageUrl) { img.src = trophyImageUrl; img.style.display = 'block'; place.style.display = 'none'; } else { img.style.display = 'none'; place.style.display = 'block'; } }
async function loadTeamIcons() { const snap = await db.ref(`${basePath}/teamIcons`).once('value'); const data = snap.val()||{}; for(const [k,v] of Object.entries(data)) if(v?.imageUrl) teamIconsCache[k]=v.imageUrl; }
async function loadCalendarEvents() { const snap = await db.ref('calendarEvents').once('value'); calendarEventsData = snap.val()||{}; }
async function loadSlideshow() {
  const [imgSnap, durSnap] = await Promise.all([db.ref(`${basePath}/slideshow/images`).once('value'), db.ref(`${basePath}/slideshow/duration`).once('value')]);
  slideshowImages = imgSnap.val()||[]; slideshowDuration = durSnap.val()||3000;
  if(slideInterval) clearInterval(slideInterval);
  const imgEl = document.getElementById('slideshowImg');
  if(slideshowImages.length) { imgEl.style.display='block'; currentSlideIdx=0; updateSlide(); slideInterval = setInterval(()=>{ currentSlideIdx=(currentSlideIdx+1)%slideshowImages.length; updateSlide(); }, slideshowDuration); }
  else imgEl.style.display='none';
}
function updateSlide() {
  document.getElementById('slideshowImg').src = slideshowImages[currentSlideIdx];
  const dots = document.getElementById('dotsContainer');
  dots.innerHTML = '';
  slideshowImages.forEach((_,i)=>{ const d=document.createElement('span'); d.className='dot'+(i===currentSlideIdx?' active':''); d.onclick=()=>{ currentSlideIdx=i; updateSlide(); if(slideInterval){clearInterval(slideInterval); slideInterval=setInterval(()=>{ currentSlideIdx=(currentSlideIdx+1)%slideshowImages.length; updateSlide(); },slideshowDuration);} }; dots.appendChild(d); });
}
async function loadSeasonsMetadata() {
  const snap = await db.ref(`${basePath}/seasons`).once('value');
  const seasons = snap.val()||{};
  availableSeasons = [];
  for(const key in seasons) if(key.startsWith('season_')){ const id=parseInt(key.split('_')[1]); if(!isNaN(id)) availableSeasons.push(id); if(seasons[key].active===true) activeSeasonId=id; }
  if(!availableSeasons.length) { await db.ref(`${basePath}/seasons/season_1/groups`).set({}); await db.ref(`${basePath}/seasons/season_1/active`).set(true); availableSeasons.push(1); activeSeasonId=1; }
  availableSeasons.sort((a,b)=>a-b);
  currentSeasonId = activeSeasonId;
  updateSeasonUI();
  await loadCurrentSeasonData();
}
function updateSeasonUI() { document.getElementById('seasonNumber').textContent=`Season ${currentSeasonId}`; const idx=availableSeasons.indexOf(currentSeasonId); document.getElementById('prevSeasonBtn').disabled=idx<=0; document.getElementById('nextSeasonBtn').disabled=idx>=availableSeasons.length-1; document.getElementById('seasonAdminPanel').style.display=isAdmin?'flex':'none'; }
async function loadCurrentSeasonData() { const snap = await db.ref(sp(currentSeasonId,'groups')).once('value'); groupsData = snap.val()||{}; }
async function loadTopScorerData() { const snap = await db.ref(`${basePath}/topScorer/list`).once('value'); topScorerList = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : []; }
async function loadTopAssistantData() { const snap = await db.ref(`${basePath}/topAssistant/list`).once('value'); topAssistantList = snap.val() ? Object.entries(snap.val()).map(([k,v])=>({key:k,...v})) : []; }
async function switchSeason(delta){ const idx=availableSeasons.indexOf(currentSeasonId); const nIdx=idx+delta; if(nIdx<0||nIdx>=availableSeasons.length) return; currentSeasonId=availableSeasons[nIdx]; updateSeasonUI(); await loadCurrentSeasonData(); await loadTopScorerData(); await loadTopAssistantData(); renderCurrentTab(); }
async function addNewSeason(){ const raw=prompt("New season number:"); if(!raw) return; const id=parseInt(raw); if(isNaN(id)){alert("Invalid");return;} if(availableSeasons.includes(id)){alert("Exists");return;} await db.ref(sp(id,'groups')).set({}); await db.ref(`${basePath}/seasons/season_${id}/active`).set(false); availableSeasons.push(id); availableSeasons.sort((a,b)=>a-b); currentSeasonId=id; updateSeasonUI(); await loadCurrentSeasonData(); renderCurrentTab(); }
async function renameSeason(){ const raw=prompt(`New number for Season ${currentSeasonId}:`); if(!raw) return; const id=parseInt(raw); if(isNaN(id)) return; if(availableSeasons.includes(id)&&id!==currentSeasonId){alert("Taken");return;} const gSnap=await db.ref(sp(currentSeasonId,'groups')).once('value'); const wasActive=activeSeasonId===currentSeasonId; await db.ref(sp(id,'groups')).set(gSnap.val()||{}); if(wasActive) await db.ref(`${basePath}/seasons/season_${id}/active`).set(true); await db.ref(sp(currentSeasonId)).remove(); availableSeasons=availableSeasons.filter(s=>s!==currentSeasonId); availableSeasons.push(id); availableSeasons.sort((a,b)=>a-b); if(activeSeasonId===currentSeasonId) activeSeasonId=id; currentSeasonId=id; updateSeasonUI(); await loadCurrentSeasonData(); renderCurrentTab(); }
async function setActiveSeason(){ const updates={}; availableSeasons.forEach(s=>{ updates[`${basePath}/seasons/season_${s}/active`]=(s===currentSeasonId); }); await db.ref().update(updates); activeSeasonId=currentSeasonId; alert(`Season ${currentSeasonId} active.`); }

// RENDER GROUPS
function renderGroups() {
  if(!groupsData || !Object.keys(groupsData).length){
    document.getElementById('contentCard').innerHTML = `<div class="empty-state"><div class="empty-icon">🏟️</div><p>No groups yet</p></div>${isAdmin?'<button class="add-btn-main" id="addGroupMainBtn">+ Add Group</button>':''}`;
    if(isAdmin) document.getElementById('addGroupMainBtn')?.addEventListener('click', addNewGroup);
    return;
  }
  let html = isAdmin ? `<div style="display:flex;justify-content:flex-end;margin-bottom:20px;"><button class="add-btn" id="addGroupTopBtn">+ New Group</button></div>` : '';
  for(const gid in groupsData){
    const group = groupsData[gid]; const teamsObj = group.teams||{}; const teams = Object.entries(teamsObj).map(([k,v])=>({key:k,...v}));
    const sorted = [...teams].sort((a,b)=>(b.pts||0)-(a.pts||0)||(b.gd||0)-(a.gd||0));
    const gname = group.name||gid;
    html += `<div class="group-block">
      <div class="table-actions"><span class="table-actions-title">${escapeHtml(gname)}</span>${isAdmin?`<button class="add-btn rename-group-btn" data-gid="${gid}">Rename</button><button class="add-btn add-team-btn" data-gid="${gid}">+ Team</button><button class="btn-sm btn-delete delete-group-btn" data-gid="${gid}">Delete</button>`:''}</div>
      <div class="table-scroll-wrap"><table class="stats-table"><thead><tr><th>Pos</th><th>Club</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GS</th><th>GC</th><th>GD</th><th>Pts</th><th>Last 5</th>${isAdmin?'<th>Actions</th>':''}</tr></thead><tbody>`;
    sorted.forEach((team, idx)=>{
      const pos=idx+1; const barClass=pos<=4?'vbar-blue':'vbar-red'; const rowClass=pos===4?'dashed-sep-blue':(pos===5&&sorted.length>5?'dashed-sep-red':'');
      const icon= getTeamIconHtml(team.name); const gd = team.gd||0;
      html += `<tr class="${rowClass}"><td class="rank-cell stat-number"><div class="pos-bar-wrap"><span class="vbar ${barClass}"></span>${pos}</div></td>
      <td><div class="team-cell-inner">${icon}<span class="team-name-text">${escapeHtml(team.name)}</span></div></td>
      <td class="stat-number">${team.p||0}</td><td class="stat-number">${team.w||0}</td><td class="stat-number">${team.d||0}</td><td class="stat-number">${team.l||0}</td>
      <td class="stat-number">${team.gs||0}</td><td class="stat-number">${team.gc||0}</td><td class="stat-number">${gd>0?'+'+gd:gd}</td><td class="pts-cell stat-number">${team.pts||0}</td>
      <td><div class="form-circles"><span class="circle-result cBlank"></span></div></td>${isAdmin?`<td><button class="btn-sm btn-edit edit-team-btn" data-gid="${gid}" data-key="${team.key}">Edit</button> <button class="btn-sm btn-delete del-team-btn" data-gid="${gid}" data-key="${team.key}">Del</button></td>`:''}</tr>`;
    });
    html += `</tbody></table></div><div class="legend-row"><span class="legend-item"><span class="vbar vbar-blue"></span> Top 4 → R16</span><span class="legend-item"><span class="vbar vbar-red"></span> Eliminated</span></div></div>`;
  }
  document.getElementById('contentCard').innerHTML = html;
  if(isAdmin){
    document.getElementById('addGroupTopBtn')?.addEventListener('click', addNewGroup);
    document.querySelectorAll('.rename-group-btn').forEach(btn=>btn.addEventListener('click',()=>renameGroup(btn.dataset.gid)));
    document.querySelectorAll('.delete-group-btn').forEach(btn=>btn.addEventListener('click',()=>deleteGroup(btn.dataset.gid)));
    document.querySelectorAll('.add-team-btn').forEach(btn=>btn.addEventListener('click',()=>openTeamForm(btn.dataset.gid,null)));
    document.querySelectorAll('.edit-team-btn').forEach(btn=>{ const gid=btn.dataset.gid, key=btn.dataset.key; const team=groupsData[gid]?.teams?.[key]; if(team) btn.onclick=()=>openTeamForm(gid,key,team); });
    document.querySelectorAll('.del-team-btn').forEach(btn=>{ btn.onclick=async()=>{ if(confirm('Delete team?')){ await db.ref(sp(currentSeasonId,`groups/${btn.dataset.gid}/teams/${btn.dataset.key}`)).remove(); await loadCurrentSeasonData(); renderGroups(); } }; });
  }
}
async function addNewGroup(){ const name=prompt("Group name:"); if(!name) return; await db.ref(sp(currentSeasonId,'groups')).push({name, teams:{}, results:{}}); await loadCurrentSeasonData(); renderGroups(); }
async function renameGroup(gid){ const n=prompt("New name:", groupsData[gid]?.name||gid); if(!n) return; await db.ref(sp(currentSeasonId,`groups/${gid}/name`)).set(n); await loadCurrentSeasonData(); renderGroups(); }
async function deleteGroup(gid){ if(!confirm("Delete group?")) return; await db.ref(sp(currentSeasonId,`groups/${gid}`)).remove(); await loadCurrentSeasonData(); renderGroups(); }

let editingTeamGid=null, editingTeamKey=null;
function openTeamForm(gid,key,data){ editingTeamGid=gid; editingTeamKey=key; document.getElementById('teamNameInput').value=data?.name||''; document.getElementById('teamP').value=data?.p??0; document.getElementById('teamW').value=data?.w??0; document.getElementById('teamD').value=data?.d??0; document.getElementById('teamL').value=data?.l??0; document.getElementById('teamGS').value=data?.gs??0; document.getElementById('teamGC').value=data?.gc??0; document.getElementById('teamGD').value=data?.gd??0; document.getElementById('teamPts').value=data?.pts??0; document.getElementById('teamForm').classList.add('active'); }
document.getElementById('saveTeamBtn').onclick = async()=>{ const name=document.getElementById('teamNameInput').value.trim(); if(!name){alert("Name required");return;} const data={name, p:parseInt(document.getElementById('teamP').value)||0, w:parseInt(document.getElementById('teamW').value)||0, d:parseInt(document.getElementById('teamD').value)||0, l:parseInt(document.getElementById('teamL').value)||0, gs:parseInt(document.getElementById('teamGS').value)||0, gc:parseInt(document.getElementById('teamGC').value)||0, gd:parseInt(document.getElementById('teamGD').value)||0, pts:parseInt(document.getElementById('teamPts').value)||0}; if(editingTeamKey) await db.ref(sp(currentSeasonId,`groups/${editingTeamGid}/teams/${editingTeamKey}`)).set(data); else await db.ref(sp(currentSeasonId,`groups/${editingTeamGid}/teams`)).push(data); document.getElementById('teamForm').classList.remove('active'); await loadCurrentSeasonData(); renderGroups(); };
document.getElementById('cancelTeamBtn').onclick = ()=>document.getElementById('teamForm').classList.remove('active');

// FIXTURES
function renderFixtures(){
  const card = document.getElementById('contentCard');
  const subHtml = `<div class="sub-tabs-row"><button class="sub-tab-btn ${activeFixtureSubTab==='group-stage'?'active':''}" data-subtab="group-stage">Group Stage</button><button class="sub-tab-btn ${activeFixtureSubTab==='knockout'?'active':''}" data-subtab="knockout">Knockout</button></div>`;
  if(activeFixtureSubTab==='knockout'){
    card.innerHTML = subHtml + `<div class="coming-soon"><div class="cs-icon">🏆</div><h2>Knockout Round Coming Soon</h2><p>R16, Quarter-finals, Semis and Final will appear here.</p></div>`;
    card.querySelectorAll('.sub-tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ activeFixtureSubTab=btn.dataset.subtab; renderFixtures(); }));
    return;
  }
  // Group stage fixtures from calendarEvents
  const allFixtures = []; const today = new Date(); today.setHours(0,0,0,0);
  for(const [dateStr, ev] of Object.entries(calendarEventsData)){
    if(!ev?.title || ev.title.trim()!=='Copa del Rey') continue;
    for(const tourn of (ev.tournaments||[])) for(const fix of (tourn.fixtures||[]))
      allFixtures.push({ date:dateStr, tournament:tourn.name||'Copa del Rey', home:fix.home||'', away:fix.away||'' });
  }
  allFixtures.sort((a,b)=>{ const da=new Date(a.date), db2=new Date(b.date), af=da>=today, bf=db2>=today; if(af&&bf) return da-db2; if(!af&&!bf) return da-db2; return af?-1:1; });
  const allTeams=[...new Set(allFixtures.flatMap(f=>[f.home,f.away]).filter(Boolean))].sort();
  const allMonths=[...new Set(allFixtures.map(f=>f.date.substring(0,7)))].sort();
  const ML={'01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun','07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'};
  let filtered = [...allFixtures];
  const grouped={}; for(const f of filtered){ if(!grouped[f.date]) grouped[f.date]=[]; grouped[f.date].push(f); }
  const sortedDates = Object.keys(grouped).sort((a,b)=>{ const da=new Date(a), db2=new Date(b), af=da>=today, bf=db2>=today; if(af&&bf) return da-db2; if(!af&&!bf) return da-db2; return af?-1:1; });
  let html = subHtml + `<div class="filters-bar"><div class="filter-group"><label>Team</label><select id="fixTeamFilter"><option value="all">All Teams</option>${allTeams.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div><div class="filter-group"><label>Month</label><select id="fixMonthFilter"><option value="all">All Months</option>${allMonths.map(m=>{const[y,mo]=m.split('-');return `<option value="${m}">${ML[mo]||mo} ${y}</option>`;}).join('')}</select></div><div class="filter-group"><button id="clearFixBtn">Clear</button></div><div class="filter-stats" id="fixFilterStats">${filtered.length} fixtures</div><a href="manager-calendar.html" class="view-calendar-btn">📅 Calendar</a></div>`;
  if(!sortedDates.length) html += '<div class="empty-state"><div class="empty-icon">📅</div><p>No fixtures found</p></div>';
  else for(const dateStr of sortedDates){
    const d = new Date(dateStr); const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat']; const [y,mo]=dateStr.split('-'); const isPast=d<today;
    html += `<div class="fixture-date-group"><div class="fixture-date-label">${days[d.getDay()]}, ${d.getDate()} ${ML[mo]||mo} ${y}${isPast?' · Played':''}</div>`;
    for(const fix of grouped[dateStr]){
      const hIco = getTeamIconHtml(fix.home,'team-icon-lg'), aIco = getTeamIconHtml(fix.away,'team-icon-lg');
      html += `<div class="fixture-card"><div class="fixture-tournament-label">${escapeHtml(fix.tournament)}</div><div class="fixture-match-row"><div class="fixture-team-side">${hIco}<span class="fixture-team-name">${escapeHtml(fix.home)}</span></div><div class="fixture-vs">VS</div><div class="fixture-team-side">${aIco}<span class="fixture-team-name">${escapeHtml(fix.away)}</span></div></div></div>`;
    }
    html += `</div>`;
  }
  card.innerHTML = html;

  const renderScorerList=(side)=>{ const list=side==='home'?tempScorersHome:tempScorersAway; const cont=document.getElementById(`${side}ScorerList`); if(!cont) return; cont.innerHTML=list.map((s,idx)=>`<div class="scorer-badge">${escapeHtml(s.player)} (${s.goals})<button class="remove-scorer" data-side="${side}" data-idx="${idx}">x</button></div>`).join(''); cont.querySelectorAll('.remove-scorer').forEach(btn=>{ btn.onclick=()=>{ const idx=parseInt(btn.dataset.idx); if(btn.dataset.side==='home') tempScorersHome.splice(idx,1); else tempScorersAway.splice(idx,1); renderScorerList(btn.dataset.side); }; }); };

  document.getElementById('rGroup').addEventListener('change', e=>{ const gid=e.target.value; const teams=gid&&groupsData[gid]?Object.values(groupsData[gid].teams||{}).map(t=>t.name).sort():[]; const opts='<option value="">Select</option>'+teams.map(t=>`<option value="${t}">${t}</option>`).join(''); document.getElementById('rHome').innerHTML=opts; document.getElementById('rAway').innerHTML=opts; editingResultGroupId=gid; });
  document.getElementById('saveResultBtn').onclick=async()=>{ const gid=document.getElementById('rGroup').value||editingResultGroupId; const home=document.getElementById('rHome').value, away=document.getElementById('rAway').value; const hs=parseInt(document.getElementById('rHS').value)||0, as2=parseInt(document.getElementById('rAS').value)||0; const forfeit=document.getElementById('rForfeit').value; const md=parseInt(document.getElementById('rMd').value)||0; if(!gid||!home||!away){alert("Fill all");return;} const resultObj={matchText:`${home} ${hs} - ${as2} ${away}`, homeTeam:home, awayTeam:away, homeScore:hs, awayScore:as2, forfeitType:forfeit, md, goalScorers:{home:tempScorersHome, away:tempScorersAway}}; const path=sp(currentSeasonId,`groups/${gid}/results`); if(editingResultKey) await db.ref(`${path}/${editingResultKey}`).set(resultObj); else await db.ref(path).push(resultObj); if(!editingResultKey) await updateGroupTeamStats(gid,home,away,hs,as2,forfeit); closeModal(); await loadCurrentSeasonData(); renderResults(); };

async function updateGroupTeamStats(gid,home,away,hScore,aScore,forfeit){
  const ref=db.ref(sp(currentSeasonId,`groups/${gid}/teams`)); const snap=await ref.once('value'); const teams=snap.val()||{}; let hKey=null,aKey=null,hData=null,aData=null;
  for(const [k,v] of Object.entries(teams)){ if(v.name===home){ hKey=k; hData={...v}; } if(v.name===away){ aKey=k; aData={...v}; } }
  if(!hData) hData={name:home,p:0,w:0,d:0,l:0,gs:0,gc:0,gd:0,pts:0}; if(!aData) aData={name:away,p:0,w:0,d:0,l:0,gs:0,gc:0,gd:0,pts:0};
  hData.p=(hData.p||0)+1; aData.p=(aData.p||0)+1;
  if(forfeit==='no_contest'){}
  else if(forfeit==='forfeit'){ if(hScore>aScore){ hData.pts+=3; hData.w++; aData.l++; aData.gd=(aData.gd||0)-3; } else { aData.pts+=3; aData.w++; hData.l++; hData.gd=(hData.gd||0)-3; } }
  else{ hData.gs=(hData.gs||0)+hScore; hData.gc=(hData.gc||0)+aScore; aData.gs=(aData.gs||0)+aScore; aData.gc=(aData.gc||0)+hScore; hData.gd=hData.gs-hData.gc; aData.gd=aData.gs-aData.gc; if(hScore>aScore){ hData.pts+=3; hData.w++; aData.l++; } else if(aScore>hScore){ aData.pts+=3; aData.w++; hData.l++; } else{ hData.pts+=1; aData.pts+=1; hData.d++; aData.d++; } }
  if(!hKey) hKey=ref.push().key; if(!aKey) aKey=ref.push().key;
  await db.ref(sp(currentSeasonId,`groups/${gid}/teams/${hKey}`)).set(hData); await db.ref(sp(currentSeasonId,`groups/${gid}/teams/${aKey}`)).set(aData);
}

  document.getElementById('setLogoBtn').onclick=async()=>{ const f=await pickFile('image/*'); if(!f) return; try{ const url=await uploadToImgBB(f); await db.ref(`${basePath}/navbar_logo`).set(url); await loadNavbarLogo(); closeModal(); alert('Logo updated'); }catch(e){alert(e.message);} };
  document.getElementById('setTrophyBtn').onclick=async()=>{ const f=await pickFile('image/*'); if(!f) return; try{ const url=await uploadToImgBB(f); await db.ref(`${basePath}/trophy_image`).set(url); await loadTrophyImage(); closeModal(); alert('Trophy image updated'); }catch(e){alert(e.message);} };
  document.getElementById('manageSlideBtn').onclick=async()=>{ const refresh=()=>{ let prev='<div class="img-preview-grid">'; slideshowImages.forEach((url,i)=>{ prev+=`<div class="preview-thumb"><img src="${url}"><span class="thumb-del" data-idx="${i}">x</span></div>`; }); prev+='</div>'; showModal(`<h3>Slideshow</h3>${prev}<label>Add</label><input type="file" id="newSlide" accept="image/*"><button id="uploadSlideBtn" class="add-btn-main">Upload</button><label>Duration (s)</label><input id="durSec" type="number" value="${slideshowDuration/1000}" step="0.5"><div class="modal-btns"><button id="saveDurBtn" class="modal-btn-primary">Save</button><button id="closeSlideBtn" class="modal-btn-cancel">Close</button></div><div id="slideStat"></div>`); document.querySelectorAll('.thumb-del').forEach(btn=>{ btn.onclick=async()=>{ slideshowImages.splice(parseInt(btn.dataset.idx),1); await db.ref(`${basePath}/slideshow/images`).set(slideshowImages); await loadSlideshow(); refresh(); }; }); document.getElementById('uploadSlideBtn').onclick=async()=>{ const file=document.getElementById('newSlide').files[0]; if(!file) return; const sd=document.getElementById('slideStat'); sd.innerHTML='<div class="status-msg status-loading">Uploading...</div>'; try{ const url=await uploadToImgBB(file); slideshowImages.push(url); await db.ref(`${basePath}/slideshow/images`).set(slideshowImages); await loadSlideshow(); refresh(); }catch(e){ sd.innerHTML=`<div class="status-msg status-error">${e.message}</div>`; } }; document.getElementById('saveDurBtn').onclick=async()=>{ let sec=parseFloat(document.getElementById('durSec').value); if(isNaN(sec)) sec=3; sec=Math.min(10,Math.max(1,sec)); await db.ref(`${basePath}/slideshow/duration`).set(sec*1000); slideshowDuration=sec*1000; await loadSlideshow(); document.getElementById('slideStat').innerHTML='<div class="status-msg status-success">Saved!</div>'; }; document.getElementById('closeSlideBtn').onclick=closeModal; }; refresh(); };
  document.getElementById('addIconBtn').onclick=async()=>{ const team=prompt("Team exact name:"); if(!team) return; const file=await pickFile('image/*'); if(!file) return; showModal('<div class="loading-spinner"><div class="spinner"></div><span>Processing...</span></div>'); try{ let blob; try{ blob=await removeBackground(file); }catch(e){ blob=file; } const url=await uploadToImgBB(blob); await db.ref(`${basePath}/teamIcons/${team}`).set({imageUrl:url,updatedAt:Date.now()}); teamIconsCache[team]=url; closeModal(); alert(`Icon saved for ${team}`); renderCurrentTab(); }catch(e){ closeModal(); alert('Failed: '+e.message); } };
}

// MENU & INIT
document.getElementById('menuBtn').onclick=()=>{ document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };
document.getElementById('closeMenuBtn').onclick=()=>{ document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
document.getElementById('overlay').onclick=()=>{ document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); };
document.getElementById('homeBtn').onclick=()=>window.location.href='feed.html';
document.getElementById('adminModeBtn').onclick=()=>{ const key=prompt("Admin key:"); if(key==="admin@100"){ isAdmin=true; alert("Admin mode ON"); updateSeasonUI(); renderCurrentTab(); if(!document.getElementById('adminSettingsItem')){ const it=document.createElement('div'); it.id='adminSettingsItem'; it.className='menu-item'; it.innerHTML='⚙️ Admin Settings'; it.onclick=()=>{ openAdminSettings(); closeMenu(); }; document.getElementById('sideMenu').appendChild(it); } } else alert("Wrong key"); };
document.getElementById('prevSeasonBtn').onclick=()=>switchSeason(-1);
document.getElementById('nextSeasonBtn').onclick=()=>switchSeason(1);
document.getElementById('addSeasonBtn').onclick=()=>isAdmin&&addNewSeason();
document.getElementById('renameSeasonBtn').onclick=()=>isAdmin&&renameSeason();
document.getElementById('setActiveSeasonBtn').onclick=()=>isAdmin&&setActiveSeason();
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderCurrentTab(); }));

async function init(){
  await loadNavbarLogo();
  await loadTrophyImage();
  await loadSlideshow();
  await loadTeamIcons();
  await loadCalendarEvents();
  await loadSeasonsMetadata();
  await loadTopScorerData();
  await loadTopAssistantData();
  renderCurrentTab();
}
init();
</script>
</body>
</html>
