<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login · eFootball 412</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #1a0a2e 0%, #2d1b4e 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      min-height: 100vh;
      color: #f5f0ff;
    }
    /* Navbar (same as index) */
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.4rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-area {
      font-weight: bold;
      font-size: 1.2rem;
      color: #3c1a70;
      background: rgba(255,255,255,0.2);
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .nav-icon-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
      text-decoration: none;
    }
    .nav-icon-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .chat-svg {
      width: 20px;
      height: 20px;
      display: block;
    }
    .hamburger-btn {
      background: #6a3bb5;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }
    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #7e4acf;
    }
    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }
    /* Auth card */
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 70px);
      padding: 2rem;
    }
    .auth-card {
      background: rgba(45, 25, 75, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.4);
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .auth-card h2 {
      color: #f5d742;
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
    }
    .input-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #f5e6ff;
      font-size: 0.9rem;
    }
    .password-wrapper {
      position: relative;
    }
    .auth-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(30, 15, 55, 0.9);
      border: 1px solid #f5d742;
      border-radius: 30px;
      color: #f5e6ff;
      font-size: 1rem;
      outline: none;
    }
    .auth-input:focus {
      border-color: #6a3bb5;
      box-shadow: 0 0 5px #6a3bb5;
    }
    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #f5d742;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-primary {
      width: 100%;
      padding: 0.8rem;
      background: #6a3bb5;
      border: none;
      border-radius: 30px;
      color: #f5d742;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover {
      background: #7e4acf;
    }
    .auth-footer {
      margin-top: 1.2rem;
      font-size: 0.9rem;
    }
    .auth-footer a {
      color: #f5d742;
      text-decoration: none;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .error-msg {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }
    @media (max-width: 480px) {
      .auth-card { padding: 1.5rem; }
      .logo-area { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div class="logo-area">⚽ eFootball 412</div>
  <div class="nav-right">
    <a href="chat.html" class="nav-icon-btn" id="chatBtn">
      <svg class="chat-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="#F5D742" stroke="#F5D742" stroke-width="1.5"/>
        <circle cx="8" cy="10" r="1.5" fill="#6A3BB5"/>
        <circle cx="12" cy="10" r="1.5" fill="#6A3BB5"/>
        <circle cx="16" cy="10" r="1.5" fill="#6A3BB5"/>
      </svg>
    </a>
    <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="auth-container">
  <div class="auth-card">
    <h2>LOGIN</h2>
    <form id="loginForm">
      <div class="input-group">
        <label>Email or Username</label>
        <input type="text" id="loginIdentifier" class="auth-input" placeholder="Enter your email or username" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="loginPassword" class="auth-input" placeholder="Enter password" required>
          <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">Show</button>
        </div>
      </div>
      <button type="submit" class="btn-primary">Login</button>
      <div id="loginError" class="error-msg"></div>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create account</a>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8",
    measurementId: "G-KHY86ZMPZH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const identifier = document.getElementById('loginIdentifier').value.trim();
    const password = document.getElementById('loginPassword').value;
    loginError.textContent = '';

    if (!identifier || !password) {
      loginError.textContent = 'Please fill in all fields.';
      return;
    }

    // Check if identifier looks like an email (contains @)
    let email = identifier;
    if (!identifier.includes('@')) {
      // If it's a username, we need to convert to email? Firebase requires email.
      // For this demo, we assume user used email (or we can store username in separate DB).
      // Since signup stores email, we'll tell user to use email.
      loginError.textContent = 'Please use the email address you signed up with.';
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'dashboard.html';
    } catch (error) {
      if (error.code === 'auth/user-not-found') {
        loginError.textContent = 'No account found with this email. Please create an account.';
      } else if (error.code === 'auth/wrong-password') {
        loginError.textContent = 'Incorrect password. Please try again.';
      } else {
        loginError.textContent = error.message;
      }
    }
  });

  window.togglePassword = (fieldId) => {
    const field = document.getElementById(fieldId);
    const btn = field.nextElementSibling;
    if (field.type === 'password') {
      field.type = 'text';
      btn.textContent = 'Hide';
    } else {
      field.type = 'password';
      btn.textContent = 'Show';
    }
  };
</script>
</body>
</html>
