<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login · eFootball 412</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      min-height: 100vh;
      color: #f5f0ff;
    }

    /* gold navbar – no logo text */
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.5rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .nav-icon-btn {
      background: #000;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
      text-decoration: none;
    }

    .nav-icon-btn:hover {
      transform: scale(1.05);
      background: #222;
    }

    .chat-svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .hamburger-btn {
      background: #000;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }

    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #222;
    }

    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }

    /* main container */
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 70px);
      padding: 2rem;
    }

    .auth-card {
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.5);
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(245,215,66,0.2);
    }

    /* accounts list */
    .accounts-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .account-card {
      background: rgba(20,20,30,0.7);
      border-radius: 1.2rem;
      border: 1px solid rgba(245,215,66,0.3);
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .account-card:hover {
      background: rgba(245,215,66,0.15);
      border-color: #f5d742;
      transform: translateX(5px);
    }

    .account-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      background: #222;
      border: 2px solid #f5d742;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #f5d742;
    }

    .account-info {
      flex: 1;
    }

    .account-name {
      font-weight: 700;
      font-size: 1rem;
      color: #f5d742;
    }

    .account-email {
      font-size: 0.75rem;
      color: #ccc;
    }

    .continue-badge {
      background: #f5d742;
      color: #000;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
    }

    .add-account-btn {
      background: transparent;
      border: 1px dashed #f5d742;
      border-radius: 2rem;
      padding: 0.7rem;
      text-align: center;
      font-weight: 600;
      color: #f5d742;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .add-account-btn:hover {
      background: rgba(245,215,66,0.1);
      border-style: solid;
    }

    /* role selector + login form */
    .role-selector {
      display: flex;
      gap: 1rem;
      margin: 1rem 0 1.2rem;
    }

    .role-btn {
      flex: 1;
      background: rgba(0,0,0,0.6);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.6rem;
      font-weight: bold;
      color: #f5e6ff;
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-btn.active {
      background: #f5d742;
      color: #000;
      box-shadow: 0 0 8px #f5d742;
    }

    .role-btn:hover:not(.active) {
      background: rgba(245,215,66,0.2);
    }

    .input-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #ddd;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .password-wrapper {
      position: relative;
    }

    .auth-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(0,0,0,0.7);
      border: 1px solid #f5d742;
      border-radius: 30px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: box-shadow 0.2s;
    }

    .auth-input:focus {
      border-color: #f5d742;
      box-shadow: 0 0 0 2px rgba(245,215,66,0.3);
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #f5d742;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .btn-primary {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #d4af37, #f5d742);
      border: none;
      border-radius: 30px;
      color: #000;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      filter: brightness(0.95);
      transform: translateY(-1px);
    }

    .auth-footer {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      text-align: center;
    }

    .auth-footer a {
      color: #f5d742;
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.8rem;
      text-align: center;
    }

    /* loading spinner */
    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(245,215,66,0.3);
      border-top-color: #f5d742;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #f5d742;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 520px) {
      .auth-card { padding: 1.5rem; }
      .account-avatar { width: 40px; height: 40px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div class="nav-right">
    <a href="chat.html" class="nav-icon-btn" id="chatBtn">
      <svg class="chat-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="#F5D742" stroke="#F5D742" stroke-width="1.5"/>
        <circle cx="8" cy="10" r="1.5" fill="#000"/>
        <circle cx="12" cy="10" r="1.5" fill="#000"/>
        <circle cx="16" cy="10" r="1.5" fill="#000"/>
      </svg>
    </a>
    <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
  </div>
</div>

<div class="auth-container">
  <div class="auth-card" id="authCard">
    <!-- dynamic content: accounts list or login form -->
    <div id="loadingAccounts" class="loading-text" style="padding: 2rem; justify-content: center;">
      <div class="loading-spinner"></div> Loading accounts...
    </div>
    <div id="accountsPanel" style="display: none;"></div>
    <div id="loginPanel" style="display: none;">
      <div class="role-selector">
        <div id="playerRoleBtn" class="role-btn active">👤 Player</div>
        <div id="adminRoleBtn" class="role-btn">👑 Admin</div>
      </div>
      <h2 style="color: #f5d742; text-align: center; margin-bottom: 1rem;">LOGIN</h2>
      <form id="loginForm">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="loginEmail" class="auth-input" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" class="auth-input" placeholder="Enter password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">Show</button>
          </div>
        </div>
        <div id="adminKeyGroup" class="input-group" style="display: none;">
          <label>Admin Key</label>
          <input type="password" id="adminKey" class="auth-input" placeholder="Required for admin login">
        </div>
        <button type="submit" class="btn-primary" id="loginSubmitBtn">Login</button>
        <div id="loginError" class="error-msg"></div>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create account</a>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8",
    measurementId: "G-KHY86ZMPZH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const ADMIN_KEY = "@admin#123!";
  let selectedRole = "player";

  // DOM elements
  const loadingDiv = document.getElementById("loadingAccounts");
  const accountsPanel = document.getElementById("accountsPanel");
  const loginPanel = document.getElementById("loginPanel");
  const playerRoleBtn = document.getElementById("playerRoleBtn");
  const adminRoleBtn = document.getElementById("adminRoleBtn");
  const adminKeyGroup = document.getElementById("adminKeyGroup");
  const loginForm = document.getElementById("loginForm");
  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");
  const adminKeyInput = document.getElementById("adminKey");
  const loginError = document.getElementById("loginError");

  // Helper: store accounts array
  function getStoredAccounts() {
    const raw = localStorage.getItem("efootball_accounts");
    if (!raw) return [];
    try {
      return JSON.parse(raw);
    } catch { return []; }
  }

  function saveAccounts(accounts) {
    localStorage.setItem("efootball_accounts", JSON.stringify(accounts));
  }

  // Add or update account after successful login
  async function addAccountAfterLogin(email, password, uid) {
    // fetch user profile info from DB
    const userRef = ref(db, `users/${uid}`);
    const snapshot = await get(userRef);
    const userData = snapshot.val();
    const displayName = userData?.username || auth.currentUser?.displayName || email.split('@')[0];
    const photoURL = userData?.photoURL || auth.currentUser?.photoURL || null;

    let accounts = getStoredAccounts();
    const existingIndex = accounts.findIndex(acc => acc.email === email);
    const accountEntry = {
      email,
      password,  // store for auto-login (original logic stored plain)
      displayName,
      photoURL,
      lastUsed: Date.now()
    };
    if (existingIndex !== -1) {
      accounts[existingIndex] = { ...accounts[existingIndex], ...accountEntry };
    } else {
      accounts.push(accountEntry);
    }
    // sort by lastUsed descending
    accounts.sort((a,b) => (b.lastUsed||0) - (a.lastUsed||0));
    saveAccounts(accounts);
    return accounts;
  }

  // render account selection UI
  function renderAccountsList() {
    loadingDiv.style.display = "none";
    const accounts = getStoredAccounts();
    if (accounts.length === 0) {
      // no accounts: show login panel directly
      accountsPanel.style.display = "none";
      loginPanel.style.display = "block";
      return;
    }

    accountsPanel.style.display = "block";
    loginPanel.style.display = "none";
    accountsPanel.innerHTML = `
      <div style="margin-bottom: 1.5rem; text-align: center;">
        <span style="background: linear-gradient(135deg,#d4af37,#f5d742); -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:800; font-size:1.3rem;">⚡ Continue as</span>
      </div>
      <div class="accounts-list" id="accountsListContainer"></div>
      <div class="add-account-btn" id="addNewAccountBtn">+ Add another account</div>
    `;
    const container = document.getElementById("accountsListContainer");
    accounts.forEach(acc => {
      const card = document.createElement("div");
      card.className = "account-card";
      // avatar
      const avatarDiv = document.createElement("div");
      avatarDiv.className = "account-avatar";
      if (acc.photoURL) {
        const img = document.createElement("img");
        img.src = acc.photoURL;
        img.style.width = "100%"; img.style.height = "100%"; img.style.borderRadius = "50%"; img.style.objectFit = "cover";
        avatarDiv.appendChild(img);
      } else {
        avatarDiv.textContent = acc.displayName ? acc.displayName.charAt(0).toUpperCase() : "👤";
      }
      const infoDiv = document.createElement("div");
      infoDiv.className = "account-info";
      infoDiv.innerHTML = `
        <div class="account-name">${escapeHtml(acc.displayName || acc.email.split('@')[0])}</div>
        <div class="account-email">${escapeHtml(acc.email)}</div>
      `;
      const badge = document.createElement("div");
      badge.className = "continue-badge";
      badge.textContent = "Continue";
      card.appendChild(avatarDiv);
      card.appendChild(infoDiv);
      card.appendChild(badge);
      card.addEventListener("click", async () => {
        // show loading on card (disable click)
        card.style.opacity = "0.6";
        card.style.pointerEvents = "none";
        const success = await performLogin(acc.email, acc.password, true, acc.email);
        if (!success) {
          card.style.opacity = "1";
          card.style.pointerEvents = "auto";
          // if login fails, maybe password changed: remove from accounts? show error
          loginError.textContent = "Auto-login failed. Please login manually.";
          // show login panel prefilled
          showLoginFormWithEmail(acc.email);
        }
      });
      container.appendChild(card);
    });
    document.getElementById("addNewAccountBtn").addEventListener("click", () => {
      // clear stored last login and show fresh login form
      accountsPanel.style.display = "none";
      loginPanel.style.display = "block";
      loginEmail.value = "";
      loginPassword.value = "";
      adminKeyInput.value = "";
      loginError.textContent = "";
    });
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==="&") return "&amp;"; if(m==="<") return "&lt;"; if(m===">") return "&gt;"; return m;}); }

  function showLoginFormWithEmail(email) {
    accountsPanel.style.display = "none";
    loginPanel.style.display = "block";
    loginEmail.value = email;
    loginPassword.value = "";
    adminKeyInput.value = "";
    loginError.textContent = "";
  }

  // actual login logic (reused)
  async function performLogin(email, password, redirect = true, originalEmailForUpdate = null) {
    const submitBtn = document.getElementById("loginSubmitBtn");
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;"></div> Logging in...';
    }
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const uid = userCredential.user.uid;
      const userRef = ref(db, `users/${uid}`);
      const snapshot = await get(userRef);
      const userData = snapshot.val();
      const isAdminFromDb = userData && userData.role === 'admin';

      if (selectedRole === "admin" && !isAdminFromDb) {
        loginError.textContent = "This account is not an admin account.";
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Login"; }
        return false;
      }
      if (selectedRole === "player" && isAdminFromDb) {
        loginError.textContent = "This account is an admin account. Please use admin login.";
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Login"; }
        return false;
      }

      // store/update account
      const targetEmail = originalEmailForUpdate || email;
      await addAccountAfterLogin(targetEmail, password, uid);

      if (redirect) {
        if (isAdminFromDb) {
          window.location.href = 'admindash.html';
        } else {
          window.location.href = 'dashboard.html';
        }
      }
      return true;
    } catch (error) {
      console.error(error);
      if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
        loginError.textContent = 'Invalid email or password.';
      } else {
        loginError.textContent = error.message;
      }
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Login"; }
      return false;
    }
  }

  // role switching
  if (playerRoleBtn && adminRoleBtn) {
    playerRoleBtn.addEventListener("click", () => {
      selectedRole = "player";
      playerRoleBtn.classList.add("active");
      adminRoleBtn.classList.remove("active");
      adminKeyGroup.style.display = "none";
    });
    adminRoleBtn.addEventListener("click", () => {
      selectedRole = "admin";
      adminRoleBtn.classList.add("active");
      playerRoleBtn.classList.remove("active");
      adminKeyGroup.style.display = "block";
    });
  }

  // handle manual login
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = loginEmail.value.trim();
    const password = loginPassword.value;
    const adminKeyValue = adminKeyInput.value.trim();
    loginError.textContent = "";

    if (!email || !password) {
      loginError.textContent = "Please fill in all fields.";
      return;
    }
    if (selectedRole === "admin" && adminKeyValue !== ADMIN_KEY) {
      loginError.textContent = "Invalid admin key.";
      return;
    }
    await performLogin(email, password, true);
  });

  // initial render: show loading then accounts list
  setTimeout(async () => {
    // small delay to simulate loading (or real check)
    renderAccountsList();
  }, 300);

  // global toggle password
  window.togglePassword = (fieldId) => {
    const field = document.getElementById(fieldId);
    const btn = field.nextElementSibling;
    if (field.type === 'password') {
      field.type = 'text';
      btn.textContent = 'Hide';
    } else {
      field.type = 'password';
      btn.textContent = 'Show';
    }
  };

  // hamburger modal (simple redirects for demonstration)
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  if (hamburgerBtn) {
    hamburgerBtn.addEventListener('click', () => {
      // simple alert or you can build modal, but not required for functionality
      window.location.href = 'menu.html'; // fallback; but to keep consistent, we can show a simple menu? 
      // original didn't have hamburger menu on login, but we keep basic behavior
    });
  }
  // edge: if no accounts, login panel already visible. Also ensure chat button works
  document.getElementById('chatBtn')?.addEventListener('click', (e) => { e.preventDefault(); window.location.href='chat.html'; });
</script>
</body>
</html>
