<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login · eFootball 412</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', 'Roboto', sans-serif;
      min-height: 100vh;
      color: #f5f0ff;
    }

    /* gold navbar – no logo, only hamburger */
    .gold-navbar {
      background: linear-gradient(135deg, #d4af37, #f5d742);
      padding: 0.5rem 1.2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .hamburger-btn {
      background: #000;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
      border: 1.5px solid #f5d742;
    }

    .hamburger-btn:hover {
      transform: scale(1.05);
      background: #222;
    }

    .hamburger-btn span {
      display: block;
      width: 18px;
      height: 2.5px;
      background-color: #f5d742;
      border-radius: 2px;
    }

    /* main container */
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 70px);
      padding: 2rem;
    }

    .auth-card {
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(245, 215, 66, 0.5);
      padding: 2rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(245,215,66,0.2);
    }

    /* accounts list */
    .accounts-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .account-card {
      background: rgba(20,20,30,0.7);
      border-radius: 1.5rem;
      border: 1px solid rgba(245,215,66,0.3);
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .account-card:hover {
      background: rgba(245,215,66,0.15);
      border-color: #f5d742;
      transform: translateX(5px);
    }

    .account-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      background: #222;
      border: 2px solid #f5d742;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: bold;
      color: #f5d742;
      overflow: hidden;
      flex-shrink: 0;
    }

    .account-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .account-info {
      flex: 1;
    }

    .account-name {
      font-weight: 800;
      font-size: 1.1rem;
      color: #f5d742;
    }

    .account-email {
      font-size: 0.8rem;
      color: #ccc;
    }

    .add-account-btn {
      background: transparent;
      border: 1px dashed #f5d742;
      border-radius: 2rem;
      padding: 0.8rem;
      text-align: center;
      font-weight: 700;
      color: #f5d742;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .add-account-btn:hover {
      background: rgba(245,215,66,0.1);
      border-style: solid;
    }

    /* role selector + login form */
    .role-selector {
      display: flex;
      gap: 1rem;
      margin: 1rem 0 1.2rem;
    }

    .role-btn {
      flex: 1;
      background: rgba(0,0,0,0.6);
      border: 1px solid #f5d742;
      border-radius: 2rem;
      padding: 0.6rem;
      font-weight: bold;
      color: #f5e6ff;
      cursor: pointer;
      transition: all 0.2s;
    }

    .role-btn.active {
      background: #f5d742;
      color: #000;
      box-shadow: 0 0 8px #f5d742;
    }

    .role-btn:hover:not(.active) {
      background: rgba(245,215,66,0.2);
    }

    .input-group {
      margin-bottom: 1.2rem;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #ddd;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .password-wrapper {
      position: relative;
    }

    .auth-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(0,0,0,0.7);
      border: 1px solid #f5d742;
      border-radius: 30px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: box-shadow 0.2s;
    }

    .auth-input:focus {
      border-color: #f5d742;
      box-shadow: 0 0 0 2px rgba(245,215,66,0.3);
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #f5d742;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .btn-primary {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #d4af37, #f5d742);
      border: none;
      border-radius: 30px;
      color: #000;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      filter: brightness(0.95);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-footer {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      text-align: center;
    }

    .auth-footer a {
      color: #f5d742;
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.8rem;
      text-align: center;
    }

    /* loading spinner */
    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(245,215,66,0.3);
      border-top-color: #f5d742;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #f5d742;
      padding: 2rem;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 520px) {
      .auth-card { padding: 1.5rem; }
      .account-avatar { width: 50px; height: 50px; font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="gold-navbar">
  <div class="hamburger-btn" id="hamburgerBtn"><span></span><span></span><span></span></div>
</div>

<div class="auth-container">
  <div class="auth-card" id="authCard">
    <div id="loadingAccounts" class="loading-text">
      <div class="loading-spinner"></div> Loading accounts...
    </div>
    <div id="accountsPanel" style="display: none;"></div>
    <div id="loginPanel" style="display: none;">
      <div class="role-selector">
        <div id="managerRoleBtn" class="role-btn active">👤 Manager</div>
        <div id="adminRoleBtn" class="role-btn">👑 Admin</div>
      </div>
      <h2 style="color: #f5d742; text-align: center; margin-bottom: 1rem;">LOGIN</h2>
      <form id="loginForm">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="loginEmail" class="auth-input" placeholder="Enter your email" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" class="auth-input" placeholder="Enter password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">Show</button>
          </div>
        </div>
        <div id="adminKeyGroup" class="input-group" style="display: none;">
          <label>Admin Key</label>
          <input type="password" id="adminKey" class="auth-input" placeholder="Required for admin login">
        </div>
        <button type="submit" class="btn-primary" id="loginSubmitBtn">Login</button>
        <div id="loginError" class="error-msg"></div>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create account</a>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBdo7Jg9-A6kjAfe84U1Z5r_B7a4fAGZK4",
    authDomain: "efootball-412.firebaseapp.com",
    databaseURL: "https://efootball-412-default-rtdb.firebaseio.com",
    projectId: "efootball-412",
    storageBucket: "efootball-412.firebasestorage.app",
    messagingSenderId: "596548424249",
    appId: "1:596548424249:web:4349f6e87a40a1590bf3e8",
    measurementId: "G-KHY86ZMPZH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const ADMIN_KEY = "@admin#123!";
  let selectedRole = "manager"; // 'manager' or 'admin'

  // DOM elements
  const loadingDiv = document.getElementById("loadingAccounts");
  const accountsPanel = document.getElementById("accountsPanel");
  const loginPanel = document.getElementById("loginPanel");
  const managerRoleBtn = document.getElementById("managerRoleBtn");
  const adminRoleBtn = document.getElementById("adminRoleBtn");
  const adminKeyGroup = document.getElementById("adminKeyGroup");
  const loginForm = document.getElementById("loginForm");
  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");
  const adminKeyInput = document.getElementById("adminKey");
  const loginError = document.getElementById("loginError");

  // Account storage helpers
  function getStoredAccounts() {
    const raw = localStorage.getItem("efootball_accounts");
    if (!raw) return [];
    try {
      return JSON.parse(raw);
    } catch { return []; }
  }

  function saveAccounts(accounts) {
    localStorage.setItem("efootball_accounts", JSON.stringify(accounts));
  }

  // Fetch user data from DB (role, photoURL, username) given uid
  async function fetchUserData(uid) {
    const userRef = ref(db, `users/${uid}`);
    const snapshot = await get(userRef);
    return snapshot.val() || {};
  }

  // Add/update account after successful login (stores uid, photoURL, displayName)
  async function addAccountAfterLogin(email, password, uid) {
    const userData = await fetchUserData(uid);
    const displayName = userData.username || auth.currentUser?.displayName || email.split('@')[0];
    const photoURL = userData.photoURL || auth.currentUser?.photoURL || null;
    let accounts = getStoredAccounts();
    const existingIndex = accounts.findIndex(acc => acc.email === email);
    const accountEntry = {
      email,
      password,
      uid,
      displayName,
      photoURL,
      lastUsed: Date.now()
    };
    if (existingIndex !== -1) {
      accounts[existingIndex] = { ...accounts[existingIndex], ...accountEntry };
    } else {
      accounts.push(accountEntry);
    }
    accounts.sort((a,b) => (b.lastUsed||0) - (a.lastUsed||0));
    saveAccounts(accounts);
    return accounts;
  }

  // Core login function (used by both manual and auto)
  async function performLogin(email, password, isAuto = false) {
    const submitBtn = document.getElementById("loginSubmitBtn");
    if (submitBtn && !isAuto) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="loading-spinner" style="width:20px;height:20px;"></div> Logging in...';
    }
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const uid = userCredential.user.uid;
      const userData = await fetchUserData(uid);
      const isAdminFromDb = userData && userData.role === 'admin';

      // Role validation: for manual login, respect selectedRole; for auto, we use DB role directly
      if (!isAuto) {
        if (selectedRole === "admin" && !isAdminFromDb) {
          loginError.textContent = "This account is not an admin account.";
          if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Login"; }
          return false;
        }
        if (selectedRole === "manager" && isAdminFromDb) {
          loginError.textContent = "This account is an admin account. Please use admin login.";
          if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Login"; }
          return false;
        }
      }

      // Store/update account with fresh data
      await addAccountAfterLogin(email, password, uid);

      // Redirect based on actual role
      if (isAdminFromDb) {
        window.location.href = 'admindash.html';
      } else {
        window.location.href = 'dashboard.html';
      }
      return true;
    } catch (error) {
      console.error(error);
      if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
        loginError.textContent = 'Invalid email or password.';
      } else {
        loginError.textContent = error.message;
      }
      if (submitBtn && !isAuto) {
        submitBtn.disabled = false;
        submitBtn.textContent = "Login";
      }
      return false;
    }
  }

  // Auto-login from saved account card: no admin key, just sign in and redirect
  async function autoLoginFromAccount(email, password) {
    // Show loading on card is handled by caller, but we can show global spinner maybe
    await performLogin(email, password, true);
  }

  // Render account cards with larger avatars, no "Continue" badge
  async function renderAccountsList() {
    loadingDiv.style.display = "none";
    let accounts = getStoredAccounts();
    // Refresh photoURL from DB for each account
    for (let i = 0; i < accounts.length; i++) {
      const acc = accounts[i];
      if (acc.uid) {
        const userData = await fetchUserData(acc.uid);
        if (userData.photoURL && userData.photoURL !== acc.photoURL) {
          acc.photoURL = userData.photoURL;
          let all = getStoredAccounts();
          const idx = all.findIndex(a => a.email === acc.email);
          if (idx !== -1) all[idx].photoURL = userData.photoURL;
          saveAccounts(all);
          accounts = getStoredAccounts();
        }
      }
    }

    if (accounts.length === 0) {
      accountsPanel.style.display = "none";
      loginPanel.style.display = "block";
      return;
    }

    accountsPanel.style.display = "block";
    loginPanel.style.display = "none";
    accountsPanel.innerHTML = `
      <div style="margin-bottom: 1.5rem; text-align: center;">
        <span style="background: linear-gradient(135deg,#d4af37,#f5d742); -webkit-background-clip:text; background-clip:text; color:transparent; font-weight:800; font-size:1.3rem;">⚡ Continue as</span>
      </div>
      <div class="accounts-list" id="accountsListContainer"></div>
      <div class="add-account-btn" id="addNewAccountBtn">+ Add another account</div>
    `;
    const container = document.getElementById("accountsListContainer");
    accounts.forEach(acc => {
      const card = document.createElement("div");
      card.className = "account-card";
      const avatarDiv = document.createElement("div");
      avatarDiv.className = "account-avatar";
      if (acc.photoURL) {
        const img = document.createElement("img");
        img.src = acc.photoURL;
        img.onerror = () => { avatarDiv.innerHTML = (acc.displayName ? acc.displayName.charAt(0).toUpperCase() : "👤"); };
        avatarDiv.appendChild(img);
      } else {
        avatarDiv.textContent = acc.displayName ? acc.displayName.charAt(0).toUpperCase() : "👤";
      }
      const infoDiv = document.createElement("div");
      infoDiv.className = "account-info";
      infoDiv.innerHTML = `
        <div class="account-name">${escapeHtml(acc.displayName || acc.email.split('@')[0])}</div>
        <div class="account-email">${escapeHtml(acc.email)}</div>
      `;
      card.appendChild(avatarDiv);
      card.appendChild(infoDiv);
      card.addEventListener("click", async () => {
        card.style.opacity = "0.6";
        card.style.pointerEvents = "none";
        if (!acc.email || !acc.password) {
          loginError.textContent = "Missing credentials. Please login manually.";
          showLoginFormWithEmail(acc.email);
          card.style.opacity = "1";
          card.style.pointerEvents = "auto";
          return;
        }
        await autoLoginFromAccount(acc.email, acc.password);
        // No need to reset card opacity because page will redirect
      });
      container.appendChild(card);
    });
    document.getElementById("addNewAccountBtn").addEventListener("click", () => {
      accountsPanel.style.display = "none";
      loginPanel.style.display = "block";
      loginEmail.value = "";
      loginPassword.value = "";
      adminKeyInput.value = "";
      loginError.textContent = "";
    });
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === "&") return "&amp;";
      if (m === "<") return "&lt;";
      if (m === ">") return "&gt;";
      return m;
    });
  }

  function showLoginFormWithEmail(email) {
    accountsPanel.style.display = "none";
    loginPanel.style.display = "block";
    loginEmail.value = email;
    loginPassword.value = "";
    adminKeyInput.value = "";
    loginError.textContent = "";
  }

  // Role switcher (manual login)
  if (managerRoleBtn && adminRoleBtn) {
    managerRoleBtn.addEventListener("click", () => {
      selectedRole = "manager";
      managerRoleBtn.classList.add("active");
      adminRoleBtn.classList.remove("active");
      adminKeyGroup.style.display = "none";
    });
    adminRoleBtn.addEventListener("click", () => {
      selectedRole = "admin";
      adminRoleBtn.classList.add("active");
      managerRoleBtn.classList.remove("active");
      adminKeyGroup.style.display = "block";
    });
  }

  // Manual login form handler (with admin key check only for new admin)
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = loginEmail.value.trim();
    const password = loginPassword.value;
    const adminKeyValue = adminKeyInput.value.trim();
    loginError.textContent = "";

    if (!email || !password) {
      loginError.textContent = "Please fill in all fields.";
      return;
    }
    if (selectedRole === "admin" && adminKeyValue !== ADMIN_KEY) {
      loginError.textContent = "Invalid admin key.";
      return;
    }
    await performLogin(email, password, false);
  });

  // Initial load: show spinner then render accounts list
  setTimeout(async () => {
    await renderAccountsList();
  }, 200);

  // Global toggle password visibility
  window.togglePassword = (fieldId) => {
    const field = document.getElementById(fieldId);
    const btn = field.nextElementSibling;
    if (field.type === 'password') {
      field.type = 'text';
      btn.textContent = 'Hide';
    } else {
      field.type = 'password';
      btn.textContent = 'Show';
    }
  };

  // Hamburger menu (simple navigation)
  document.getElementById("hamburgerBtn")?.addEventListener("click", () => {
    window.location.href = "menu.html";
  });
</script>
</body>
</html>
