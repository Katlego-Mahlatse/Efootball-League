<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>eFootball Fan Hub - Manager Ranks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #f5d742, #d4af37);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(245, 215, 66, 0.3);
        }

        .logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: #000;
            text-decoration: none;
        }

        .admin-badge {
            background: #000;
            color: #f5d742;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #f5d742;
            transition: all 0.2s ease;
        }

        .admin-badge:hover {
            background: #f5d742;
            color: #000;
        }

        /* Container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #f5d742;
            margin-bottom: 20px;
            font-size: 1.8rem;
            border-left: 5px solid #f5d742;
            padding-left: 15px;
        }

        /* Search & controls */
        .controls-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 25px;
            background: #111;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid #f5d742;
            background: #000;
            color: #fff;
            font-size: 14px;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #f5d742, #d4af37);
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 215, 66, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #f5d742;
            color: #f5d742;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-outline:hover {
            background: rgba(245, 215, 66, 0.1);
        }

        /* Table */
        .ranks-table {
            width: 100%;
            overflow-x: auto;
            background: #0a0a0a;
            border-radius: 20px;
            border: 1px solid #222;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid #222;
        }

        th {
            background: #111;
            color: #f5d742;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background: #1a1a1a;
        }

        tr:hover {
            background: #111;
        }

        .rank-num {
            font-weight: bold;
            font-size: 1.2rem;
            color: #f5d742;
            width: 60px;
        }

        .manager-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .manager-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f5d742;
            background: #222;
        }

        .team-logo {
            width: 35px;
            height: 35px;
            object-fit: contain;
            background: #fff;
            border-radius: 8px;
            padding: 3px;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .prev-teams {
            font-size: 11px;
            color: #aaa;
            margin-top: 4px;
        }

        .trophy-badge {
            background: #f5d74220;
            border-left: 3px solid #f5d742;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 4px;
            display: inline-block;
        }

        .empty-row {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0a0a0a;
            border: 2px solid #f5d742;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 25px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #f5d742;
        }

        .close-modal {
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #f5d742;
            font-weight: 500;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: #f5d742;
            outline: none;
        }

        .file-upload-label {
            display: inline-block;
            background: #222;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        .preview-img {
            max-width: 80px;
            margin-top: 8px;
            border-radius: 12px;
            border: 1px solid #f5d742;
        }

        .team-block, .trophy-block {
            background: #111;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-icon {
            background: #f5d74220;
            border: none;
            color: #f5d742;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .success-message {
            background: #2e7d32;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#" class="logo" onclick="window.location.href='index.html'">⚽ eFootball Hub</a>
        <div class="admin-badge" id="adminModeBtn">🔑 Admin Mode</div>
    </div>

    <div class="container">
        <h1>🏆 MANAGER RANKINGS</h1>
        <div class="controls-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by manager or team..." onkeyup="filterManagers()">
            </div>
            <div class="admin-actions" id="adminActions" style="display: none;">
                <button class="btn-gold" onclick="openAddManagerModal()">➕ Add Manager</button>
                <button class="btn-outline" onclick="refreshData()">🔄 Refresh</button>
            </div>
        </div>

        <div class="ranks-table">
            <table id="ranksTable">
                <thead>
                    <tr><th onclick="sortBy('rank')">#</th><th onclick="sortBy('manager')">Manager</th><th onclick="sortBy('team')">Team</th><th onclick="sortBy('trophyScore')">🏆 Trophy Score</th><th onclick="sortBy('wins')">Wins</th><th onclick="sortBy('goals')">Goals</th><th onclick="sortBy('winRate')">Win Rate</th><th onclick="sortBy('losses')">Losses</th></tr>
                </thead>
                <tbody id="ranksBody">
                    <tr><td colspan="8" class="empty-row">Loading managers...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Manager Modal -->
    <div id="managerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">Add Manager</h2><span class="close-modal" onclick="closeManagerModal()">✕</span></div>
            <div id="managerModalMessage"></div>
            <input type="hidden" id="editManagerId">
            <div class="form-group">
                <label>Manager Type</label>
                <select id="managerType" onchange="toggleManagerTypeFields()">
                    <option value="standalone">Standalone (no login)</option>
                    <option value="linked">Link to existing user</option>
                </select>
            </div>
            <div id="linkedUserSection" style="display:none;">
                <div class="form-group">
                    <label>Search Existing Username</label>
                    <input type="text" id="linkedUsernameSearch" placeholder="Type username..." oninput="searchExistingUsers()">
                    <div id="userSearchResults" style="background:#111; margin-top:5px; border-radius:8px; max-height:150px; overflow-y:auto;"></div>
                </div>
            </div>
            <div id="standaloneSection">
                <div class="form-group">
                    <label>Manager Name *</label>
                    <input type="text" id="standaloneName" placeholder="Enter manager name">
                </div>
            </div>
            <div class="form-group">
                <label>Current Team Name</label>
                <input type="text" id="teamName" placeholder="e.g., Arsenal FC">
            </div>
            <div class="form-group">
                <label>Team Logo (Upload via ImgBB)</label>
                <input type="file" id="teamLogoUpload" accept="image/*">
                <div id="teamLogoPreview"></div>
                <input type="hidden" id="teamLogoUrl">
            </div>
            <div class="form-group">
                <label>Previous Teams</label>
                <div id="prevTeamsList"></div>
                <button type="button" class="btn-outline" onclick="addPrevTeamField()" style="margin-top:8px;">+ Add Previous Team</button>
            </div>
            <div class="form-group">
                <label>Statistics</label>
                <div class="stats-grid">
                    <input type="number" id="statWins" placeholder="Wins" value="0">
                    <input type="number" id="statLosses" placeholder="Losses" value="0">
                    <input type="number" id="statDraws" placeholder="Draws" value="0">
                    <input type="number" id="statGoals" placeholder="Goals Scored" value="0">
                </div>
            </div>
            <div class="form-group">
                <label>Trophies Won</label>
                <div id="trophiesList"></div>
                <button type="button" class="btn-outline" onclick="openAddTrophyModal()">🏆 Add Trophy</button>
            </div>
            <div class="flex-row" style="justify-content: flex-end; margin-top:20px;">
                <button class="btn-gold" onclick="saveManager()">Save Manager</button>
                <button class="btn-outline" onclick="closeManagerModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Add Trophy Modal -->
    <div id="trophyModal" class="modal">
        <div class="modal-content" style="max-width:400px;">
            <div class="modal-header"><h2>Add Trophy</h2><span class="close-modal" onclick="closeTrophyModal()">✕</span></div>
            <div class="form-group">
                <label>Competition</label>
                <select id="trophyCompetition"></select>
            </div>
            <div class="form-group">
                <label>Year / Date</label>
                <input type="text" id="trophyDate" placeholder="2024">
            </div>
            <button class="btn-gold" onclick="addTrophyToCurrent()">Add</button>
        </div>
    </div>

    <script>
        // ---------- CONFIG ----------
        const DB_URL = 'https://efootball-412-default-rtdb.firebaseio.com';
        const IMGBB_KEY = '81c24f30884ec6dda1dbd2b39739e0c9';
        let isAdmin = false;
        let managers = [];          // array of manager objects
        let currentEditManager = null;  // for trophy adding
        let tempTeamLogoUrl = null;
        let tempPrevTeams = [];     // { name, from, to }
        let tempTrophies = [];

        // Trophy importance points
        const trophyList = [
            { id: "wc", name: "FIFA World Cup", points: 100 },
            { id: "ucl", name: "UEFA Champions League", points: 90 },
            { id: "cwc", name: "FIFA Club World Cup", points: 80 },
            { id: "uel", name: "UEFA Europa League", points: 70 },
            { id: "pl", name: "Premier League", points: 60 },
            { id: "nations", name: "UEFA Nations League", points: 55 },
            { id: "uecl", name: "UEFA Conference League", points: 50 },
            { id: "facup", name: "FA Cup", points: 45 },
            { id: "supercup", name: "UEFA Super Cup", points: 40 },
            { id: "cs", name: "Community Shield", points: 30 }
        ];

        // ---------- Helper ----------
        function calculateWinRate(wins, losses, draws) {
            let total = wins + losses + draws;
            if (total === 0) return 0;
            return (wins / total * 100).toFixed(1);
        }

        function computeTrophyScore(trophies) {
            return trophies.reduce((sum, t) => sum + (t.points || 0), 0);
        }

        // Ranking: trophyScore desc, wins desc, goals desc, winRate desc, losses asc
        function sortManagers(list) {
            return [...list].sort((a,b) => {
                if (a.trophyScore !== b.trophyScore) return b.trophyScore - a.trophyScore;
                if (a.stats.wins !== b.stats.wins) return b.stats.wins - a.stats.wins;
                if (a.stats.goalsScored !== b.stats.goalsScored) return b.stats.goalsScored - a.stats.goalsScored;
                let wrA = parseFloat(a.stats.winRate || 0);
                let wrB = parseFloat(b.stats.winRate || 0);
                if (wrA !== wrB) return wrB - wrA;
                return a.stats.losses - b.stats.losses;
            });
        }

        // Firebase REST
        async function fetchManagers() {
            const res = await fetch(`${DB_URL}/managers.json`);
            const data = await res.json();
            if (!data) return [];
            return Object.entries(data).map(([id, m]) => ({ id, ...m, trophyScore: computeTrophyScore(m.trophies || []) }));
        }

        async function fetchProfiles() {
            const res = await fetch(`${DB_URL}/profiles.json`);
            const data = await res.json();
            if (!data) return [];
            return Object.entries(data).map(([id, p]) => ({ id, username: p.username, profilePicture: p.profilePicture }));
        }

        async function loadAndRender() {
            managers = await fetchManagers();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('ranksBody');
            if (!managers.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-row">No managers found. Admin can add managers.</td></tr>';
                return;
            }
            const sorted = sortManagers(managers);
            let html = '';
            sorted.forEach((m, idx) => {
                const rank = idx+1;
                const avatar = m.profilePicture || (m.type === 'linked' ? 'https://via.placeholder.com/45/333/f5d742?text=U' : 'https://via.placeholder.com/45/222/f5d742?text=?');
                const teamLogo = m.currentTeam?.logo || '';
                const prevTeamsHtml = (m.previousTeams || []).map(pt => `${pt.name} (${pt.from || '?'}-${pt.to || '?'})`).join(', ');
                const winRate = m.stats?.winRate || calculateWinRate(m.stats?.wins||0, m.stats?.losses||0, m.stats?.draws||0);
                html += `<tr>
                    <td class="rank-num">${rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank}</td>
                    <td><div class="manager-cell"><img src="${avatar}" class="manager-avatar"><div><strong>${escapeHtml(m.username)}</strong><div class="prev-teams">${prevTeamsHtml ? 'Prev: '+escapeHtml(prevTeamsHtml) : ''}</div></div></div></td>
                    <td><div class="team-info">${teamLogo ? `<img src="${teamLogo}" class="team-logo">` : ''}<span>${escapeHtml(m.currentTeam?.name || '—')}</span></div></td>
                    <td>${m.trophyScore}</td>
                    <td>${m.stats?.wins || 0}</td>
                    <td>${m.stats?.goalsScored || 0}</td>
                    <td>${winRate}%</td>
                    <td>${m.stats?.losses || 0}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function filterManagers() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = managers.filter(m => m.username.toLowerCase().includes(term) || (m.currentTeam?.name || '').toLowerCase().includes(term));
            const sorted = sortManagers(filtered);
            const tbody = document.getElementById('ranksBody');
            if (!sorted.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty-row">No matching managers</td></tr>'; return; }
            let html = '';
            sorted.forEach((m, idx) => {
                const rank = idx+1;
                const avatar = m.profilePicture || (m.type === 'linked' ? 'https://via.placeholder.com/45/333/f5d742?text=U' : 'https://via.placeholder.com/45/222/f5d742?text=?');
                const teamLogo = m.currentTeam?.logo || '';
                const prevTeamsHtml = (m.previousTeams || []).map(pt => `${pt.name} (${pt.from || '?'}-${pt.to || '?'})`).join(', ');
                const winRate = m.stats?.winRate || calculateWinRate(m.stats?.wins||0, m.stats?.losses||0, m.stats?.draws||0);
                html += `<tr><td class="rank-num">${rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank}</td><td><div class="manager-cell"><img src="${avatar}" class="manager-avatar"><div><strong>${escapeHtml(m.username)}</strong><div class="prev-teams">${prevTeamsHtml ? 'Prev: '+escapeHtml(prevTeamsHtml) : ''}</div></div></div></td><td><div class="team-info">${teamLogo ? `<img src="${teamLogo}" class="team-logo">` : ''}<span>${escapeHtml(m.currentTeam?.name || '—')}</span></div></td><td>${m.trophyScore}</td><td>${m.stats?.wins || 0}</td><td>${m.stats?.goalsScored || 0}</td><td>${winRate}%</td><td>${m.stats?.losses || 0}</td></tr>`;
            });
            tbody.innerHTML = html;
        }

        // Admin mode
        document.getElementById('adminModeBtn').onclick = () => {
            const key = prompt("Enter Admin Key:");
            if (key === "admin@11:11") {
                isAdmin = true;
                document.getElementById('adminActions').style.display = 'flex';
                alert("Admin mode activated");
                loadAndRender();
            } else if (key) alert("Invalid key");
        };

        async function refreshData() { await loadAndRender(); }

        // Upload to ImgBB
        async function uploadToImgBB(file) {
            const fd = new FormData();
            fd.append("image", file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
            const data = await res.json();
            if (!data.success) throw new Error("Upload failed");
            return data.data.url;
        }

        // Modal manager
        function openAddManagerModal() {
            if (!isAdmin) return;
            resetModal();
            document.getElementById('modalTitle').innerText = "Add Manager";
            document.getElementById('editManagerId').value = "";
            document.getElementById('managerModal').classList.add('active');
        }

        function resetModal() {
            document.getElementById('managerType').value = "standalone";
            toggleManagerTypeFields();
            document.getElementById('standaloneName').value = "";
            document.getElementById('teamName').value = "";
            document.getElementById('teamLogoUpload').value = "";
            document.getElementById('teamLogoPreview').innerHTML = "";
            tempTeamLogoUrl = null;
            tempPrevTeams = [];
            tempTrophies = [];
            renderPrevTeams();
            renderTrophies();
            document.getElementById('statWins').value = 0;
            document.getElementById('statLosses').value = 0;
            document.getElementById('statDraws').value = 0;
            document.getElementById('statGoals').value = 0;
            document.getElementById('linkedUsernameSearch').value = "";
            document.getElementById('userSearchResults').innerHTML = "";
        }

        function toggleManagerTypeFields() {
            const type = document.getElementById('managerType').value;
            document.getElementById('linkedUserSection').style.display = type === 'linked' ? 'block' : 'none';
            document.getElementById('standaloneSection').style.display = type === 'standalone' ? 'block' : 'none';
        }

        async function searchExistingUsers() {
            const query = document.getElementById('linkedUsernameSearch').value.trim().toLowerCase();
            if (query.length < 2) return;
            const profiles = await fetchProfiles();
            const filtered = profiles.filter(p => p.username.toLowerCase().includes(query));
            const container = document.getElementById('userSearchResults');
            if (!filtered.length) { container.innerHTML = '<div style="padding:8px;">No users found</div>'; return; }
            container.innerHTML = filtered.map(u => `<div style="padding:8px; cursor:pointer; border-bottom:1px solid #333;" onclick="selectLinkedUser('${u.id}', '${escapeHtml(u.username)}', '${u.profilePicture}')">${escapeHtml(u.username)}</div>`).join('');
        }

        function selectLinkedUser(userId, username, photo) {
            document.getElementById('linkedUsernameSearch').value = username;
            document.getElementById('userSearchResults').innerHTML = '';
            window.selectedLinkedId = userId;
            window.selectedLinkedPhoto = photo;
            window.selectedLinkedName = username;
        }

        document.getElementById('teamLogoUpload').addEventListener('change', async (e) => {
            if (e.target.files[0]) {
                try {
                    const url = await uploadToImgBB(e.target.files[0]);
                    tempTeamLogoUrl = url;
                    document.getElementById('teamLogoPreview').innerHTML = `<img src="${url}" class="preview-img">`;
                } catch(err) { alert("Logo upload failed"); }
            }
        });

        function addPrevTeamField() {
            let name = prompt("Team name");
            if (!name) return;
            let from = prompt("From year (optional)");
            let to = prompt("To year (optional)");
            tempPrevTeams.push({ name, from: from||'', to: to||'' });
            renderPrevTeams();
        }
        function renderPrevTeams() {
            const container = document.getElementById('prevTeamsList');
            container.innerHTML = tempPrevTeams.map((pt, idx) => `<div class="team-block">${pt.name} (${pt.from}-${pt.to}) <button class="btn-icon" onclick="removePrevTeam(${idx})">✕</button></div>`).join('');
        }
        function removePrevTeam(idx) { tempPrevTeams.splice(idx,1); renderPrevTeams(); }

        function renderTrophies() {
            const container = document.getElementById('trophiesList');
            container.innerHTML = tempTrophies.map((t, idx) => `<div class="team-block">${t.name} (${t.date || '?'}) - ${t.points} pts <button class="btn-icon" onclick="removeTrophyTemp(${idx})">✕</button></div>`).join('');
        }
        function removeTrophyTemp(idx) { tempTrophies.splice(idx,1); renderTrophies(); }

        function openAddTrophyModal() {
            const select = document.getElementById('trophyCompetition');
            select.innerHTML = trophyList.map(t => `<option value="${t.id}" data-points="${t.points}">${t.name} (${t.points} pts)</option>`).join('');
            document.getElementById('trophyModal').classList.add('active');
        }
        function closeTrophyModal() { document.getElementById('trophyModal').classList.remove('active'); }
        function addTrophyToCurrent() {
            const select = document.getElementById('trophyCompetition');
            const id = select.value;
            const trophy = trophyList.find(t => t.id === id);
            const date = document.getElementById('trophyDate').value;
            if (trophy) {
                tempTrophies.push({ id: trophy.id, name: trophy.name, points: trophy.points, date: date });
                renderTrophies();
            }
            closeTrophyModal();
        }

        async function saveManager() {
            const type = document.getElementById('managerType').value;
            let username = "";
            let profilePicture = null;
            if (type === 'linked') {
                if (!window.selectedLinkedId) { alert("Please select a user"); return; }
                username = window.selectedLinkedName;
                profilePicture = window.selectedLinkedPhoto;
            } else {
                username = document.getElementById('standaloneName').value.trim();
                if (!username) { alert("Manager name required"); return; }
                profilePicture = null;
            }
            const teamName = document.getElementById('teamName').value.trim();
            const wins = parseInt(document.getElementById('statWins').value) || 0;
            const losses = parseInt(document.getElementById('statLosses').value) || 0;
            const draws = parseInt(document.getElementById('statDraws').value) || 0;
            const goals = parseInt(document.getElementById('statGoals').value) || 0;
            const winRate = calculateWinRate(wins, losses, draws);
            const managerData = {
                type: type,
                userId: type === 'linked' ? window.selectedLinkedId : null,
                username: username,
                profilePicture: profilePicture,
                currentTeam: { name: teamName, logo: tempTeamLogoUrl || null },
                previousTeams: tempPrevTeams,
                stats: { wins, losses, draws, goalsScored: goals, winRate: parseFloat(winRate) },
                trophies: tempTrophies,
                trophyScore: computeTrophyScore(tempTrophies)
            };
            const editId = document.getElementById('editManagerId').value;
            let url = `${DB_URL}/managers.json`;
            let method = 'POST';
            if (editId) {
                url = `${DB_URL}/managers/${editId}.json`;
                method = 'PATCH';
            }
            await fetch(url, { method, body: JSON.stringify(managerData) });
            await loadAndRender();
            closeManagerModal();
        }

        function closeManagerModal() { document.getElementById('managerModal').classList.remove('active'); }

        // Edit existing manager (admin right click? We'll add edit from table later but for MVP, we can implement by double click? Not necessary. Add separate edit button inside admin? For simplicity, admin can edit via "Add Manager" but we need edit existing. We'll add a small edit icon via admin mode on table rows.
        function enableInlineEdit() {
            // Not required now; admin can delete/re-add; but for better UX we can add edit button later. We'll implement edit via context menu? Better to add an edit column when admin mode.
        }

        // Add extra admin edit: show edit button on table when admin mode
        function renderAdminControls() {
            // We'll modify renderTable to include edit/delete if admin, but careful with performance.
        }
        // Override renderTable to include edit if admin. But we already have renderTable, let's enhance it for admin.
        const originalRender = renderTable;
        window.renderTable = function() {
            if (!isAdmin) {
                originalRender();
                return;
            }
            const tbody = document.getElementById('ranksBody');
            if (!managers.length) { tbody.innerHTML = '<tr><td colspan="9" class="empty-row">No managers. Click Add Manager.</td></tr>'; return; }
            const sorted = sortManagers(managers);
            let html = '';
            sorted.forEach((m, idx) => {
                const rank = idx+1;
                const avatar = m.profilePicture || (m.type === 'linked' ? 'https://via.placeholder.com/45/333/f5d742?text=U' : 'https://via.placeholder.com/45/222/f5d742?text=?');
                const teamLogo = m.currentTeam?.logo || '';
                const prevTeamsHtml = (m.previousTeams || []).map(pt => `${pt.name} (${pt.from || '?'}-${pt.to || '?'})`).join(', ');
                const winRate = m.stats?.winRate || calculateWinRate(m.stats?.wins||0, m.stats?.losses||0, m.stats?.draws||0);
                html += `<tr>
                    <td class="rank-num">${rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank}</td>
                    <td><div class="manager-cell"><img src="${avatar}" class="manager-avatar"><div><strong>${escapeHtml(m.username)}</strong><div class="prev-teams">${prevTeamsHtml ? 'Prev: '+escapeHtml(prevTeamsHtml) : ''}</div></div></div></td>
                    <td><div class="team-info">${teamLogo ? `<img src="${teamLogo}" class="team-logo">` : ''}<span>${escapeHtml(m.currentTeam?.name || '—')}</span></div></td>
                    <td>${m.trophyScore}</td>
                    <td>${m.stats?.wins || 0}</td>
                    <td>${m.stats?.goalsScored || 0}</td>
                    <td>${winRate}%</td>
                    <td>${m.stats?.losses || 0}</td>
                    <td><button class="btn-icon" onclick="editManager('${m.id}')">✏️</button> <button class="btn-icon" onclick="deleteManager('${m.id}')">🗑️</button></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        };
        // override original
        renderTable = window.renderTable;

        async function editManager(id) {
            const m = managers.find(x => x.id === id);
            if (!m) return;
            resetModal();
            document.getElementById('modalTitle').innerText = "Edit Manager";
            document.getElementById('editManagerId').value = id;
            document.getElementById('managerType').value = m.type;
            toggleManagerTypeFields();
            if (m.type === 'linked') {
                document.getElementById('linkedUsernameSearch').value = m.username;
                window.selectedLinkedId = m.userId;
                window.selectedLinkedPhoto = m.profilePicture;
                window.selectedLinkedName = m.username;
            } else {
                document.getElementById('standaloneName').value = m.username;
            }
            document.getElementById('teamName').value = m.currentTeam?.name || '';
            tempTeamLogoUrl = m.currentTeam?.logo || null;
            if (tempTeamLogoUrl) document.getElementById('teamLogoPreview').innerHTML = `<img src="${tempTeamLogoUrl}" class="preview-img">`;
            tempPrevTeams = m.previousTeams || [];
            renderPrevTeams();
            tempTrophies = m.trophies || [];
            renderTrophies();
            document.getElementById('statWins').value = m.stats?.wins || 0;
            document.getElementById('statLosses').value = m.stats?.losses || 0;
            document.getElementById('statDraws').value = m.stats?.draws || 0;
            document.getElementById('statGoals').value = m.stats?.goalsScored || 0;
            document.getElementById('managerModal').classList.add('active');
        }
        async function deleteManager(id) {
            if (!confirm("Delete manager permanently?")) return;
            await fetch(`${DB_URL}/managers/${id}.json`, { method: 'DELETE' });
            await loadAndRender();
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        function sortBy(column) { /* optional */ loadAndRender(); }

        // init
        loadAndRender();
    </script>
</body>
</html>
