<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>eFootball Fan Hub - Manager Ranks</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f5d742;
            --gold-dark: #d4af37;
            --gold-dim: rgba(245,215,66,0.15);
            --bg: #080808;
            --bg2: #111111;
            --bg3: #1a1a1a;
            --bg4: #222222;
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.5);
            --text-dim: rgba(255,255,255,0.3);
            --border: rgba(255,255,255,0.08);
            --border-gold: rgba(245,215,66,0.3);
            --radius: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

        .navbar {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 0 1.5rem;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(245,215,66,0.2);
        }
        .navbar-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: #000;
        }
        .menu-icon {
            background: #000;
            width: 38px; height: 38px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 5px; cursor: pointer;
            border: 1.5px solid var(--gold);
            transition: transform 0.2s;
        }
        .menu-icon span { display:block; width:16px; height:2px; background:var(--gold); border-radius:2px; }
        .menu-icon:hover { transform: scale(1.05); }

        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1999; display:none; backdrop-filter:blur(4px); }
        .overlay.active { display:block; }
        .side-menu {
            position:fixed; top:0; right:-320px; width:300px; height:100vh;
            background: var(--bg2);
            border-left: 1px solid var(--border-gold);
            z-index:2000; padding:24px 20px;
            transition: right 0.3s cubic-bezier(.4,0,.2,1);
        }
        .side-menu.active { right:0; }
        .close-menu { cursor:pointer; color:var(--text-muted); float:right; font-size:24px; font-weight:300; transition:color 0.2s; }
        .close-menu:hover { color:var(--text); }
        .menu-items { margin-top:50px; display:flex; flex-direction:column; gap:8px; }
        .menu-item {
            padding:14px 16px; border-radius:var(--radius);
            cursor:pointer; font-size:0.9rem; font-weight:500;
            color:var(--text-muted); border:1px solid transparent;
            transition:all 0.2s; display:flex; align-items:center; gap:10px;
        }
        .menu-item:hover { background:var(--bg3); color:var(--text); border-color:var(--border); }
        .menu-item.gold-item { color:var(--gold); }
        .menu-item.gold-item:hover { background:var(--gold-dim); border-color:var(--border-gold); }

        .container { max-width:900px; margin:0 auto; padding:24px 16px; }

        .header-actions {
            display:flex; gap:12px; align-items:center;
            margin-bottom:24px; flex-wrap:wrap;
        }
        .search-wrap { flex:1; min-width:200px; position:relative; }
        .search-wrap input {
            width:100%; padding:11px 16px 11px 40px;
            border-radius:40px; border:1px solid var(--border);
            background:var(--bg2); color:var(--text);
            font-size:0.875rem; transition:all 0.2s;
        }
        .search-wrap input:focus { outline:none; border-color:var(--border-gold); box-shadow:0 0 0 3px var(--gold-dim); }
        .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color:#000; border:none; padding:11px 20px;
            border-radius:40px; font-weight:600; cursor:pointer;
            font-size:0.875rem; transition:all 0.2s; white-space:nowrap;
        }
        .btn-gold:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(245,215,66,0.3); }

        .page-loader {
            position:fixed; inset:0; background:var(--bg);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:9999; gap:20px;
            transition: opacity 0.4s;
        }
        .page-loader.hidden { opacity:0; pointer-events:none; }
        .loader-spinner {
            width:44px; height:44px;
            border:3px solid var(--bg3);
            border-top-color:var(--gold);
            border-radius:50%;
            animation: spin 0.8s linear infinite;
        }
        .loader-text { color:var(--text-muted); font-size:0.875rem; font-weight:400; }
        @keyframes spin { to { transform:rotate(360deg); } }

        .cards-grid { display:flex; flex-direction:column; gap:16px; }

        .manager-card {
            background:var(--bg2);
            border:1px solid var(--border);
            border-radius:var(--radius-xl);
            padding:24px;
            transition: all 0.25s;
            animation: fadeUp 0.4s ease both;
        }
        .manager-card:hover { border-color:var(--border-gold); transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.3); }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

        .card-top { display:flex; align-items:flex-start; gap:16px; margin-bottom:20px; }
        .card-avatar-wrap { position:relative; flex-shrink:0; }
        .card-avatar {
            width:72px; height:72px; border-radius:50%;
            object-fit:cover; border:2px solid var(--border-gold);
            background:var(--bg3);
        }
        .rank-badge {
            position:absolute; bottom:-4px; left:50%; transform:translateX(-50%);
            background:var(--bg); border:1px solid var(--border-gold);
            color:var(--gold); font-size:0.7rem; font-weight:700;
            padding:2px 8px; border-radius:20px; white-space:nowrap;
        }
        .card-info { flex:1; min-width:0; }
        .card-name { font-size:1.15rem; font-weight:700; margin-bottom:4px; }
        .card-status {
            display:inline-flex; align-items:center; gap:5px;
            font-size:0.72rem; font-weight:500; padding:3px 10px;
            border-radius:20px; margin-bottom:8px;
        }
        .status-active { background:rgba(34,197,94,0.12); color:#4ade80; border:1px solid rgba(34,197,94,0.2); }
        .status-interim { background:rgba(251,191,36,0.12); color:#fbbf24; border:1px solid rgba(251,191,36,0.2); }
        .status-sacked { background:rgba(239,68,68,0.12); color:#f87171; border:1px solid rgba(239,68,68,0.2); }
        .status-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

        .card-score-row {
            background:var(--bg3); border-radius:var(--radius);
            padding:12px 16px; margin-bottom:16px;
            display:flex; align-items:center; justify-content:space-between;
        }
        .score-label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
        .score-value { font-size:1.4rem; font-weight:700; color:var(--gold); font-family:'Bebas Neue',sans-serif; letter-spacing:1px; }

        .stats-row {
            display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:16px;
        }
        .stat-box {
            background:var(--bg3); border-radius:var(--radius);
            padding:10px 8px; text-align:center;
        }
        .stat-label { font-size:0.65rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
        .stat-val { font-size:1rem; font-weight:700; }

        .card-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn-view {
            flex:1; background:transparent; border:1px solid var(--border-gold);
            color:var(--gold); padding:10px 16px; border-radius:40px;
            cursor:pointer; font-size:0.8rem; font-weight:600;
            transition:all 0.2s; min-width:140px;
        }
        .btn-view:hover { background:var(--gold-dim); }
        .btn-admin {
            background:var(--bg3); border:1px solid var(--border);
            color:var(--text-muted); padding:10px 14px; border-radius:40px;
            cursor:pointer; font-size:0.8rem; transition:all 0.2s;
        }
        .btn-admin:hover { color:var(--text); border-color:var(--border-gold); }
        .btn-admin.danger:hover { color:#f87171; border-color:rgba(239,68,68,0.3); }

        .modal-backdrop {
            position:fixed; inset:0; background:rgba(0,0,0,0.8);
            z-index:3000; display:none; align-items:center; justify-content:center;
            backdrop-filter:blur(6px); padding:16px;
        }
        .modal-backdrop.active { display:flex; }
        .modal-box {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius-xl); max-width:520px; width:100%;
            max-height:88vh; overflow-y:auto;
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(-8px); } to { opacity:1; transform:scale(1) translateY(0); } }
        .modal-header {
            padding:20px 24px 16px;
            border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; background:var(--bg2); z-index:1;
        }
        .modal-title { font-size:1rem; font-weight:700; color:var(--gold); }
        .modal-close {
            background:var(--bg3); border:none; color:var(--text-muted);
            width:32px; height:32px; border-radius:50%; cursor:pointer;
            font-size:16px; display:flex; align-items:center; justify-content:center;
            transition:all 0.2s;
        }
        .modal-close:hover { background:var(--bg4); color:var(--text); }
        .modal-body { padding:20px 24px; }
        .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }

        .form-row { margin-bottom:16px; }
        .form-label { display:block; font-size:0.75rem; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
        .form-input, .form-select, .form-textarea {
            width:100%; padding:10px 14px;
            background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius); color:var(--text);
            font-size:0.875rem; font-family:inherit; transition:all 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline:none; border-color:var(--border-gold); box-shadow:0 0 0 3px var(--gold-dim);
        }
        .form-textarea { min-height:100px; resize:vertical; }
        .form-select option { background:var(--bg3); }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color:#000; border:none; padding:10px 20px;
            border-radius:40px; font-weight:700; cursor:pointer; font-size:0.875rem;
            transition:all 0.2s;
        }
        .btn-primary:hover { transform:translateY(-1px); }
        .btn-secondary {
            background:transparent; border:1px solid var(--border);
            color:var(--text-muted); padding:10px 20px;
            border-radius:40px; cursor:pointer; font-size:0.875rem;
            transition:all 0.2s;
        }
        .btn-secondary:hover { border-color:var(--border-gold); color:var(--text); }

        .tag-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
        .tag {
            background:var(--bg3); border:1px solid var(--border);
            color:var(--text-muted); font-size:0.75rem; padding:4px 10px;
            border-radius:20px; display:flex; align-items:center; gap:6px;
        }
        .tag-remove { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:12px; padding:0; line-height:1; transition:color 0.2s; }
        .tag-remove:hover { color:#f87171; }

        .stats-popup-backdrop {
            position:fixed; inset:0; background:#000;
            z-index:4000; display:none; flex-direction:column;
            animation: fadeIn 0.3s ease;
        }
        .stats-popup-backdrop.active { display:flex; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        .stats-popup-navbar {
            height:56px; background:#000; border-bottom:1px solid var(--border);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 20px; position:sticky; top:0; z-index:10; flex-shrink:0;
        }
        .stats-popup-name { font-size:1rem; font-weight:700; color:var(--text); }
        .stats-popup-close {
            background:var(--bg3); border:1px solid var(--border);
            color:var(--text-muted); width:36px; height:36px;
            border-radius:50%; cursor:pointer; font-size:18px;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.2s;
        }
        .stats-popup-close:hover { background:var(--bg4); color:var(--text); }

        .stats-popup-body {
            flex:1; overflow-y:auto; padding:24px 20px;
            max-width:700px; margin:0 auto; width:100%;
        }

        .popup-loading {
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; padding:60px 20px; gap:16px;
        }
        .popup-loader { width:36px; height:36px; border:3px solid var(--bg3); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
        .popup-load-text { color:var(--text-muted); font-size:0.875rem; }

        .popup-section { margin-bottom:32px; }
        .popup-section-title {
            font-size:0.7rem; font-weight:700; color:var(--text-muted);
            text-transform:uppercase; letter-spacing:1.5px; margin-bottom:16px;
            padding-bottom:8px; border-bottom:1px solid var(--border);
        }

        .titles-grid { display:flex; flex-direction:column; gap:8px; }
        .title-item {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:12px 16px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .title-name { font-size:0.875rem; font-weight:600; }
        .title-season { font-size:0.75rem; color:var(--text-muted); }
        .title-pts { font-size:0.75rem; color:var(--gold); font-weight:700; background:var(--gold-dim); padding:3px 8px; border-radius:20px; }

        .trophy-slideshow { position:relative; border-radius:var(--radius-lg); overflow:hidden; margin-bottom:16px; background:var(--bg2); }
        .trophy-slideshow img { width:100%; height:240px; object-fit:contain; display:block; }
        .slide-dots { display:flex; justify-content:center; gap:6px; padding:10px 0; }
        .slide-dot { width:6px; height:6px; border-radius:50%; background:var(--bg4); cursor:pointer; transition:all 0.2s; }
        .slide-dot.active { background:var(--gold); transform:scale(1.3); }

        .description-block {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:16px;
            font-size:0.875rem; line-height:1.7; color:var(--text-muted);
            white-space:pre-wrap;
        }
        .empty-text { color:var(--text-dim); font-size:0.8rem; font-style:italic; }

        .current-club-block {
            display:flex; flex-direction:column; align-items:center;
            gap:10px; padding:20px;
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius-lg);
        }
        .club-icon-lg {
            width:64px; height:64px; border-radius:50%;
            object-fit:contain; background:var(--bg3);
            border:1px solid var(--border); padding:6px;
        }
        .club-icon-placeholder-lg {
            width:64px; height:64px; border-radius:50%;
            background:var(--bg3); border:1px solid var(--border);
            display:flex; align-items:center; justify-content:center;
            font-size:1.2rem; font-weight:700; color:var(--gold);
        }
        .club-name-lg { font-size:1rem; font-weight:700; }
        .club-meta { font-size:0.75rem; color:var(--text-muted); }
        .club-status-badge { font-size:0.7rem; padding:3px 10px; border-radius:20px; }

        .prev-clubs-list { display:flex; flex-direction:column; gap:8px; }
        .prev-club-item {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:12px 16px;
            display:flex; align-items:center; gap:12px;
        }
        .club-icon-sm {
            width:36px; height:36px; border-radius:50%;
            object-fit:contain; background:var(--bg3);
            border:1px solid var(--border); padding:4px; flex-shrink:0;
        }
        .club-icon-placeholder-sm {
            width:36px; height:36px; border-radius:50%;
            background:var(--bg3); border:1px solid var(--border);
            display:flex; align-items:center; justify-content:center;
            font-size:0.7rem; font-weight:700; color:var(--gold); flex-shrink:0;
        }
        .prev-club-info { flex:1; }
        .prev-club-name { font-size:0.875rem; font-weight:600; }
        .prev-club-meta { font-size:0.7rem; color:var(--text-muted); margin-top:2px; }

        .records-list { display:flex; flex-direction:column; gap:8px; }
        .record-item {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:12px 16px;
            display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
        }
        .record-left { flex:1; }
        .record-name { font-size:0.875rem; font-weight:600; }
        .record-desc { font-size:0.75rem; color:var(--text-muted); margin-top:2px; }
        .record-value { font-size:1rem; font-weight:700; color:var(--gold); white-space:nowrap; }
        .record-actions { display:flex; gap:6px; flex-shrink:0; }
        .btn-tiny {
            background:var(--bg3); border:1px solid var(--border);
            color:var(--text-muted); padding:4px 10px; border-radius:20px;
            cursor:pointer; font-size:0.7rem; transition:all 0.2s;
        }
        .btn-tiny:hover { color:var(--text); }
        .btn-tiny.danger:hover { color:#f87171; border-color:rgba(239,68,68,0.3); }

        .match-list { display:flex; flex-direction:column; gap:8px; }
        .match-item {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:12px 16px;
            display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center;
        }
        .match-team { display:flex; align-items:center; gap:8px; }
        .match-team.away { flex-direction:row-reverse; }
        .match-team-icon {
            width:28px; height:28px; border-radius:50%; object-fit:contain;
            background:var(--bg3); border:1px solid var(--border); padding:3px; flex-shrink:0;
        }
        .match-team-name { font-size:0.8rem; font-weight:600; }
        .match-center-block { text-align:center; }
        .match-score { font-size:1rem; font-weight:700; color:var(--gold); font-family:'Bebas Neue',sans-serif; letter-spacing:2px; }
        .match-tournament { font-size:0.65rem; color:var(--text-muted); margin-top:3px; }
        .match-md { font-size:0.65rem; color:var(--text-dim); }
        .match-forfeit { font-size:0.7rem; color:#f87171; background:rgba(239,68,68,0.1); padding:2px 8px; border-radius:20px; margin-top:3px; display:inline-block; }

        .btn-add-section {
            width:100%; background:transparent; border:1px dashed var(--border);
            color:var(--text-muted); padding:10px; border-radius:var(--radius);
            cursor:pointer; font-size:0.8rem; transition:all 0.2s; margin-top:8px;
        }
        .btn-add-section:hover { border-color:var(--border-gold); color:var(--gold); }

        .comp-picker { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .comp-option {
            background:var(--bg3); border:1px solid var(--border);
            border-radius:var(--radius); padding:12px; cursor:pointer;
            text-align:center; font-size:0.8rem; font-weight:600;
            transition:all 0.2s; color:var(--text-muted);
        }
        .comp-option:hover { border-color:var(--border-gold); color:var(--gold); }
        .comp-option.selected { background:var(--gold-dim); border-color:var(--border-gold); color:var(--gold); }
        .comp-icon { font-size:1.2rem; margin-bottom:4px; }

        .picker-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

        .medals-list { display:flex; flex-direction:column; gap:8px; }
        .medal-item {
            background:var(--bg2); border-radius:var(--radius); padding:12px 16px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .medal-gold { border-left:3px solid #FFD700; }
        .medal-silver { border-left:3px solid #C0C0C0; }
        .medal-bronze { border-left:3px solid #CD7F32; }

        .awards-list { display:flex; flex-direction:column; gap:8px; }
        .award-item {
            background:var(--bg2); border:1px solid var(--border);
            border-radius:var(--radius); padding:12px 16px;
            display:flex; justify-content:space-between; align-items:center;
        }

        .debug-box { font-family:monospace; font-size:0.75rem; line-height:1.7; color:var(--text-muted); }
        .debug-ok { color:#4ade80; }
        .debug-warn { color:#fbbf24; }
        .debug-err { color:#f87171; }
        .debug-section { margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:12px; }
        .debug-section:last-child { border-bottom:none; }

        .empty-state { text-align:center; padding:60px 20px; color:var(--text-dim); }

        @media(max-width:600px) {
            .stats-row { grid-template-columns:repeat(3,1fr); }
            .match-item { grid-template-columns:1fr; }

// ═══════════════════════════════════════════════
//  STATS CALCULATION
// ═══════════════════════════════════════════════
function isForfeit(text) { return /forfeit/i.test(text); }
function isNoContest(text) { return /no contest/i.test(text); }

function parseNationsMatch(text, teamName) {
    if(!text.includes(teamName)) return null;
    const noContest = /no contest/i.test(text) || /F\s*-\s*F/i.test(text);
    if(noContest) return {type:'nocontest'};
    const forfeit = isForfeit(text);
    const scoreMatch = text.match(/(\d+)\s*-\s*(\d+)/);
    if(!scoreMatch) return null;
    const parts = text.split(/\s+\d+\s*-\s*\d+\s*/);
    if(parts.length < 2) return null;
    const homeTeam = parts[0].trim();
    const awayTeam = parts[1].split('(')[0].trim();
    const s1 = parseInt(scoreMatch[1]);
    const s2 = parseInt(scoreMatch[2]);
    let isHome = homeTeam === teamName;
    let gs = isHome ? s1 : s2;
    let gc = isHome ? s2 : s1;
    if(forfeit) {
        const win = (isHome && s1 > s2) || (!isHome && s2 > s1);
        return { type: win ? 'forfeit_win' : 'forfeit_loss', gs:0, gc:0 };
    }
    const won = gs > gc; const drew = gs === gc;
    return { type: won ? 'win' : drew ? 'draw' : 'loss', gs, gc };
}

async function getMatchStats(teamEntry) {
    const { name, competition, season, seasonFrom, seasonTo, managerType, fromMatchday, toMatchday } = teamEntry;
    const seasons = season ? [parseInt(season)] :
        Array.from({length: parseInt(seasonTo)-parseInt(seasonFrom)+1}, (_,i)=>parseInt(seasonFrom)+i);

    let totalW=0, totalD=0, totalL=0, totalGS=0, totalGC=0, totalFW=0, totalFL=0, totalMP=0;
    const matchHistory = [];

    for(const s of seasons) {
        if(competition === 'nations_league') {
            if(s !== 2) continue;
            const results = [...NATIONS_RESULTS_S2, ...NATIONS_KNOCKOUT_S2];
            for(const r of results) {
                const md = typeof r.md === 'number' ? r.md : 999;
                if(managerType === 'interim' && fromMatchday && md < parseInt(fromMatchday)) continue;
                if(managerType === 'sacked' && toMatchday && md > parseInt(toMatchday)) continue;
                const parsed = parseNationsMatch(r.matchText, name);
                if(!parsed) continue;
                totalMP++;
                if(parsed.type === 'nocontest') continue;
                if(parsed.type === 'forfeit_win') { totalW++; totalFW++; }
                else if(parsed.type === 'forfeit_loss') { totalL++; totalFL++; totalGC+=3; }
                else if(parsed.type === 'win') { totalW++; totalGS+=parsed.gs; totalGC+=parsed.gc; }
                else if(parsed.type === 'draw') { totalD++; totalGS+=parsed.gs; totalGC+=parsed.gc; }
                else { totalL++; totalGS+=parsed.gs; totalGC+=parsed.gc; }
                matchHistory.push({
                    home: r.matchText.split(/\s+\d+/)[0].trim(),
                    away: r.matchText.split(/\s*-\s*\d+/)[1]?.split('(')[0]?.trim() || '',
                    homeScore: parseInt(r.matchText.match(/(\d+)\s*-\s*(\d+)/)?.[1]||0),
                    awayScore: parseInt(r.matchText.match(/(\d+)\s*-\s*(\d+)/)?.[2]||0),
                    tournament: 'UEFA Nations League', md: r.md, season: s,
                    isForfeit: isForfeit(r.matchText), isNoContest: isNoContest(r.matchText)
                });
            }
            continue;
        }

        // Removed the season skip condition for Premier League and FA Cup
        // Now all seasons are processed regardless of number

        let resultsPath = '';
        if(competition === 'premier_league') resultsPath = `seasons/season_${s}/results`;
        else if(competition === 'fa_cup') resultsPath = `fa_cup/seasons/season_${s}/groups`;
        else if(competition === 'champions_league') resultsPath = `champions_league/seasons/season_${s}/results`;
        else if(competition === 'europa_league') resultsPath = `europa_league/seasons/season_${s}/results`;
        else if(competition === 'conference_league') resultsPath = `conference_league/seasons/season_${s}/results`;
        else continue;

        if(competition === 'fa_cup') {
            const snap = await database.ref(resultsPath).once('value');
            const groups = snap.val() || {};
            for(const gId in groups) {
                const gResults = groups[gId].results || {};
                for(const rId in gResults) {
                    const r = gResults[rId];
                    const md = r.md || 0;
                    if(managerType === 'interim' && fromMatchday && md < parseInt(fromMatchday)) continue;
                    if(managerType === 'sacked' && toMatchday && md > parseInt(toMatchday)) continue;
                    const {homeTeam, awayTeam, homeScore, awayScore} = r;
                    if(homeTeam !== name && awayTeam !== name) continue;
                    const nc = r.forfeit && isNoContest(r.forfeit);
                    totalMP++;
                    if(nc) continue;
                    const forf = r.forfeit && isForfeit(r.forfeit);
                    const isHome = homeTeam === name;
                    const ms = isHome ? homeScore : awayScore;
                    const mc = isHome ? awayScore : homeScore;
                    if(forf) {
                        if(ms > mc) { totalW++; totalFW++; }
                        else { totalL++; totalFL++; totalGC+=3; }
                    } else {
                        totalGS+=ms; totalGC+=mc;
                        if(ms>mc) totalW++; else if(ms===mc) totalD++; else totalL++;
                    }
                    matchHistory.push({
                        home: homeTeam, away: awayTeam, homeScore, awayScore,
                        tournament: 'FA Cup', md, season: s,
                        isForfeit: !!forf, isNoContest: !!nc
                    });
                }
            }
        } else {
            const snap = await database.ref(resultsPath).once('value');
            const data = snap.val() || {};
            const compName = competition === 'premier_league' ? 'Premier League' :
                competition === 'champions_league' ? 'UEFA Champions League' :
                competition === 'europa_league' ? 'UEFA Europa League' :
                'UEFA Conference League';
            for(const rId in data) {
                const r = data[rId];
                if(competition === 'premier_league') {
                    const mt = r.matchText || '';
                    if(!mt.includes(name)) continue;
                    const md = r.md || 0;
                    if(managerType === 'interim' && fromMatchday && md < parseInt(fromMatchday)) continue;
                    if(managerType === 'sacked' && toMatchday && md > parseInt(toMatchday)) continue;
                    const nc = isNoContest(mt); totalMP++;
                    if(nc) continue;
                    const forf = isForfeit(mt);
                    const sm = mt.match(/(\d+)\s*-\s*(\d+)/);
                    if(!sm) continue;
                    const parts = mt.split(/\s+\d+\s*-\s*\d+\s+/);
                    if(parts.length < 2) continue;
                    const ht = parts[0].trim(), at = parts[1].trim().replace(/\(.*\)/g,'').trim();
                    const s1=parseInt(sm[1]), s2=parseInt(sm[2]);
                    const isHome = ht === name;
                    const ms = isHome ? s1 : s2, mc = isHome ? s2 : s1;
                    if(forf) { if(ms>mc){totalW++;totalFW++;}else{totalL++;totalFL++;totalGC+=3;} }
                    else { totalGS+=ms; totalGC+=mc; if(ms>mc) totalW++; else if(ms===mc) totalD++; else totalL++; }
                    matchHistory.push({ home:ht, away:at, homeScore:s1, awayScore:s2, tournament:'Premier League', md, season:s, isForfeit:forf, isNoContest:nc });
                } else {
                    const {homeTeam, awayTeam, homeScore, awayScore, md, resultType, forfeitTeam} = r;
                    if(homeTeam !== name && awayTeam !== name) continue;
                    if(managerType === 'interim' && fromMatchday && (md||0) < parseInt(fromMatchday)) continue;
                    if(managerType === 'sacked' && toMatchday && (md||0) > parseInt(toMatchday)) continue;
                    const nc = false; totalMP++;
                    const forf = resultType === 'forfeit';
                    const isHome = homeTeam === name;
                    const ms = isHome ? homeScore : awayScore, mc = isHome ? awayScore : homeScore;
                    if(forf) { if(ms>mc){totalW++;totalFW++;}else{totalL++;totalFL++;totalGC+=3;} }
                    else { totalGS+=ms||0; totalGC+=mc||0; if(ms>mc)totalW++; else if(ms===mc)totalD++; else totalL++; }
                    matchHistory.push({ home:homeTeam, away:awayTeam, homeScore:homeScore||0, awayScore:awayScore||0, tournament:compName, md:md||0, season:s, isForfeit:forf, isNoContest:nc });
                }
            }
        }
    }

    const gd = totalGS - totalGC;
    const games = totalW + totalD + totalL;
    const winRate = games > 0 ? ((totalW/games)*100).toFixed(1) : '0.0';
    return { w:totalW, d:totalD, l:totalL, gs:totalGS, gc:totalGC, gd, fw:totalFW, fl:totalFL, mp:totalMP, winRate:parseFloat(winRate), matchHistory };
}

async function calculateManagerStats(currentTeams, previousTeams, manualStats) {
    if(manualStats) return { ...manualStats, matchHistory:[] };
    let totals = { w:0, d:0, l:0, gs:0, gc:0, fw:0, fl:0, mp:0, matchHistory:[] };
    const allTeams = [
        ...(currentTeams||[]),
        ...(previousTeams||[])
    ];
    for(const team of allTeams) {
        try {
            const s = await getMatchStats(team);
            totals.w += s.w; totals.d += s.d; totals.l += s.l;
            totals.gs += s.gs; totals.gc += s.gc;
            totals.fw += s.fw; totals.fl += s.fl; totals.mp += s.mp;
            totals.matchHistory.push(...s.matchHistory);
        } catch(e) {
            debugLog.errors.push(`Stats error for ${team.name} (${team.competition}): ${e.message}`);
        }
    }
    totals.gd = totals.gs - totals.gc;
    const games = totals.w + totals.d + totals.l;
    totals.winRate = games > 0 ? parseFloat(((totals.w/games)*100).toFixed(1)) : 0;
    totals.matchHistory.sort((a,b)=>(b.season*1000+(b.md||0))-(a.season*1000+(a.md||0)));
    return totals;
}

function calculateScores(manager) {
    const trophyPts = (manager.trophies||[]).reduce((s,t)=>s+(t.points||0),0);
    const medalPts = (manager.medals||[]).reduce((s,m)=>s+(m.points||0),0);
    const awardPts = (manager.individualAwards||[]).reduce((s,a)=>s+(a.points||0),0);
    const winPts = (manager.stats?.w||0)*1;
    return { trophyPts, medalPts, awardPts, winPts, totalScore: trophyPts+medalPts+awardPts+winPts };
}

async function fetchManagers() {
    setLoader('Loading manager profiles...');
    const snap = await database.ref('ranks').once('value');
    const data = snap.val() || {};
    const arr = [];
    const keys = Object.keys(data);
    for(let i=0; i<keys.length; i++) {
        const id = keys[i]; const m = data[id];
        setLoader(`Calculating stats for manager ${i+1} of ${keys.length}...`);
        const stats = await calculateManagerStats(m.currentTeams, m.previousTeams, m.manualStats);
        const scores = calculateScores({...m, stats});
        arr.push({id, ...m, stats, scores});
        debugLog.managers.push({name:m.username, score:scores.totalScore, ok:true});
    }
    return arr;
}

function sortManagers(list) {
    return [...list].sort((a,b)=>{
        if(a.scores.totalScore !== b.scores.totalScore) return b.scores.totalScore - a.scores.totalScore;
        if((a.trophies||[]).length !== (b.trophies||[]).length) return (b.trophies||[]).length - (a.trophies||[]).length;
        if(a.stats.w !== b.stats.w) return b.stats.w - a.stats.w;
        return (b.stats.gd||0) - (a.stats.gd||0);
    });
}

function getStatusBadge(manager) {
    const teams = manager.currentTeams || [];
    if(!teams.length) return '';
    const statuses = teams.map(t => t.managerType || 'manager');
    let statusType = 'manager';
    if(statuses.some(s=>s==='sacked')) statusType = 'sacked';
    else if(statuses.some(s=>s==='interim')) statusType = 'interim';

    if(manager.overrideStatus) statusType = manager.overrideStatus;

    const labels = { manager:'Active Manager', interim:'Interim Manager', sacked:'Sacked' };
    const classes = { manager:'status-active', interim:'status-interim', sacked:'status-sacked' };
    return `<div class="card-status ${classes[statusType]}"><span class="status-dot"></span>${labels[statusType]}</div>`;
}

function renderCards() {
    const container = document.getElementById('cardsContainer');
    const search = document.getElementById('searchInput').value.toLowerCase();
    let filtered = managers.filter(m=>{
        const nameMatch = (m.username||'').toLowerCase().includes(search);
        const teamMatch = (m.currentTeams||[]).some(t=>(t.name||'').toLowerCase().includes(search));
        return nameMatch || teamMatch;
    });
    const sorted = sortManagers(filtered);

    if(!sorted.length) {
        container.innerHTML = '<div class="empty-state">No managers found</div>';
        return;
    }

    container.innerHTML = sorted.map((m, idx) => {
        const rank = idx+1;
        const rankLabel = rank===1?'🥇 #1':rank===2?'🥈 #2':rank===3?'🥉 #3':`#${rank}`;
        const avatar = m.customProfilePhoto || m.profilePicture || '';
        const avatarHtml = avatar
            ? `<img class="card-avatar" src="${avatar}" alt="${m.username}">`
            : `<div style="width:72px;height:72px;border-radius:50%;background:var(--bg3);border:2px solid var(--border-gold);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--gold);">${(m.username||'?')[0].toUpperCase()}</div>`;
        const stats = m.stats || {};
        const scores = m.scores || {};
        const adminBtns = isAdmin ? `
            <button class="btn-admin" onclick="editManager('${m.id}')">✏️ Edit</button>
            <button class="btn-admin danger" onclick="deleteManager('${m.id}')">🗑️</button>
        ` : '';

        return `<div class="manager-card" style="animation-delay:${idx*0.05}s">
            <div class="card-top">
                <div class="card-avatar-wrap">
                    ${avatarHtml}
                    <div class="rank-badge">${rankLabel}</div>
                </div>
                <div class="card-info">
                    <div class="card-name">${escapeHtml(m.username)}</div>
                    ${getStatusBadge(m)}
                    <div style="font-size:0.75rem;color:var(--text-muted);">
                        ${(m.currentTeams||[]).map(t=>`${t.name} (Season ${t.season})`).join(' · ')||'No current team'}
                    </div>
                </div>
            </div>
            <div class="card-score-row">
                <span class="score-label">🏆 Total Score</span>
                <span class="score-value">${scores.totalScore.toFixed(1)}</span>
            </div>
            <div class="stats-row">
                <div class="stat-box"><div class="stat-label">Wins</div><div class="stat-val">${stats.w||0}</div></div>
                <div class="stat-box"><div class="stat-label">Draws</div><div class="stat-val">${stats.d||0}</div></div>
                <div class="stat-box"><div class="stat-label">Losses</div><div class="stat-val">${stats.l||0}</div></div>
                <div class="stat-box"><div class="stat-label">GD</div><div class="stat-val" style="color:${(stats.gd||0)>=0?'#4ade80':'#f87171'}">${stats.gd>=0?'+':''}${stats.gd||0}</div></div>
                <div class="stat-box"><div class="stat-label">Win %</div><div class="stat-val">${stats.winRate||0}%</div></div>
            </div>
            <div class="card-actions">
                <button class="btn-view" onclick="openStatsPopup('${m.id}')">📊 View More Statistics</button>
                ${adminBtns}
            </div>
        </div>`;
    }).join('');
}

function closeStatsPopup() {

    if(trophyCabinetInterval) clearInterval(trophyCabinetInterval);

function startTrophySlideshow(images, duration) {
    if(trophyCabinetInterval) clearInterval(trophyCabinetInterval);
    trophySlideIdx = 0;
    updateTrophySlide(images);
    trophyCabinetInterval = setInterval(()=>{
        trophySlideIdx = (trophySlideIdx+1) % images.length;
        updateTrophySlide(images);
    }, duration);
}
function updateTrophySlide(images) {
    const img = document.getElementById('trophySlideshowImg');
    if(img) img.src = images[trophySlideIdx];
    renderSlideDots(images, trophySlideIdx);
}
function renderSlideDots(images, active) {
    const el = document.getElementById('trophySlideshowDots');
    if(!el) return;
    el.innerHTML = images.map((_, i)=>`<span class="slide-dot ${i===active?'active':''}" onclick="jumpToSlide(${i})"></span>`).join('');
}
function jumpToSlide(i) {
    const m = managers.find(m=>m.id===currentStatsManagerId);
    if(!m) return;
    const images = m.trophyCabinet?.slideshow?.images || [];
    trophySlideIdx = i;
    updateTrophySlide(images);
}

async function saveManager() {

    const data = {
        username,
        customProfilePhoto: tempProfilePhotoUrl || null,
        currentTeams: tempCurrentTeams,
        previousTeams: tempPrevTeams,
        trophies: tempTrophies,
        medals: tempMedals,
        individualAwards: tempAwards,
        records: editingManagerId ? (managers.find(m=>m.id===editingManagerId)?.records||[]) : [],
        description: editingManagerId ? (managers.find(m=>m.id===editingManagerId)?.description||'') : '',
        trophyCabinet: editingManagerId ? (managers.find(m=>m.id===editingManagerId)?.trophyCabinet||{}) : {}
    };
    if(editingManagerId) {
        await database.ref(`ranks/${editingManagerId}`).update(data);
    } else {
        await database.ref('ranks').push(data);
    }
    closeGenericModal();
    showToast('Manager saved!');
    await refreshData();
}

                return `<div class="form-row"><label class="form-label">${label}</label><input class="form-input" id="ms_${k}" type="number" min="0" value="${s[k]||0}"></div>`;

async function saveManualStats() {
    const keys = ['w','d','l','mp','gs','gc','fw','fl'];
    const ms = {};
    keys.forEach(k=>ms[k]=parseInt(document.getElementById(`ms_${k}`).value)||0);
    ms.gd = ms.gs - ms.gc;
    ms.winRate = (ms.w+ms.d+ms.l)>0 ? parseFloat(((ms.w/(ms.w+ms.d+ms.l))*100).toFixed(1)) : 0;
    await database.ref(`ranks/${currentStatsManagerId}/manualStats`).set(ms);
    await refreshData();
    closeGenericModal();
    openStatsPopup(currentStatsManagerId);
    showToast('Stats saved');
}

    closeMenu();
    openGenericModal('Ranking Method',
        `<div class="ranking-info">
            <p><strong style="color:var(--gold)">Total Score</strong> = Trophy Points + Medal Points + Award Points + Win Points</p>
            <h4>Trophy Points</h4>
            <ul>${trophyList.map(t=>`<li>${t.name}: ${t.points} pts</li>`).join('')}</ul>
            <h4>Medal Points</h4>
            <ul>
                <li>🥇 Gold = Trophy Points ÷ 2</li>
                <li>🥈 Silver = Gold ÷ 2</li>
                <li>🥉 Bronze = Silver ÷ 2</li>
            </ul>
            <h4>Individual Awards</h4>
            <ul>
                <li>⚽ Golden Boot = Trophy Points ÷ 4</li>
                <li>🧤 Golden Glove = Trophy Points ÷ 2</li>
                <li>🌟 Ballon d'Or = 80 pts</li>
                <li>🏅 Yashin Trophy = 80 pts</li>
            </ul>
            <h4>Win Points</h4>
            <p>Each win = 1 point (including forfeit wins)</p>
            <h4>Tiebreaker</h4>
            <ol style="padding-left:20px;"><li>Total Score</li><li>Most Trophies</li><li>Most Wins</li><li>Best Goal Difference</li></ol>
        </div>`,
        `<button class="btn-primary" onclick="closeGenericModal()">Got it</button>`
    );
}

function openDebug() {
    closeMenu();
    const mgrRows = debugLog.managers.map(m=>
        `<div class="${m.ok?'debug-ok':'debug-err'}">✓ ${m.name} — Score: ${m.score?.toFixed(1)||'?'}</div>`
    ).join('');
    const errRows = debugLog.errors.map(e=>`<div class="debug-err">✗ ${e}</div>`).join('');
    const compRows = Object.entries(debugLog.competitions).map(([c,v])=>
        `<div class="${v==='ok'?'debug-ok':'debug-err'}">${v==='ok'?'✓':'✗'} ${c}</div>`
    ).join('');
    openGenericModal('Debug Information',
        `<div class="debug-box">
            <div class="debug-section">
                <div style="font-weight:700;color:var(--gold);margin-bottom:6px;">Firebase Connection</div>
                <div class="debug-ok">✓ Connected successfully</div>
            </div>
            <div class="debug-section">
                <div style="font-weight:700;color:var(--gold);margin-bottom:6px;">Icons Loaded</div>
                <div>Team Icons: ${debugLog.icons.teams}</div>
                <div>Tournament Icons: ${debugLog.icons.tournaments}</div>
            </div>
            <div class="debug-section">
                <div style="font-weight:700;color:var(--gold);margin-bottom:6px;">Managers (${debugLog.managers.length})</div>
                ${mgrRows||'<span class="debug-warn">No managers loaded</span>'}
            </div>
            ${errRows ? `<div class="debug-section">
                <div style="font-weight:700;color:var(--gold);margin-bottom:6px;">Errors</div>
                ${errRows}
            </div>` : ''}
        </div>`,
        `<button class="btn-primary" onclick="closeGenericModal()">Close</button>`
    );
}

async function refreshData() {
    managers = await fetchManagers();
    renderCards();
}

async function init() {
    try {
        debugLog.firebase = 'connected';
        setLoader('Loading icons...');
        await loadGlobalIcons();
        setLoader('Loading manager data...');
        managers = await fetchManagers();
        setLoader('Rendering...');
        renderCards();
        debugLog.firebase = 'ok';
    } catch(e) {
        debugLog.errors.push('Init error: ' + e.message);
        document.getElementById('cardsContainer').innerHTML = '<div class="empty-state">Failed to load data. Please refresh.</div>';
    } finally {
        hideLoader();
    }
}

document.getElementById('genericModal').addEventListener('click', function(e) {
    if(e.target === this) closeGenericModal();
});

init();
</script>
</body>
</html>
