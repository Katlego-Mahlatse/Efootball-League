<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>eFootball Fan Hub - Manager Ranks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navbar - matches feed page style */
        .navbar {
            background: linear-gradient(135deg, #f5d742, #d4af37);
            padding: 0.5rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(245, 215, 66, 0.3);
        }

        .menu-icon {
            background: #1a1a1a;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1.5px solid #f5d742;
        }

        .menu-icon span {
            display: block;
            width: 18px;
            height: 2.5px;
            background-color: #f5d742;
            border-radius: 2px;
        }

        .menu-icon:hover {
            transform: scale(1.05);
            background: #0a0a0a;
        }

        /* Overlay & Side Menu */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1999;
            display: none;
        }
        .overlay.active { display: block; }

        .side-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100vh;
            background: linear-gradient(135deg, #f5d742 0%, #d4af37 100%);
            z-index: 2000;
            padding: 30px;
            transition: right 0.3s ease;
            overflow-y: auto;
        }
        .side-menu.active { right: 0; }
        .close-menu {
            cursor: pointer;
            color: #000;
            float: right;
            font-size: 32px;
            font-weight: bold;
        }
        .menu-items { margin-top: 60px; }
        .menu-item {
            padding: 18px 20px;
            margin: 12px 0;
            background: #000;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: 500;
            color: #FFD700;
            text-align: center;
        }
        .menu-item:hover {
            transform: translateX(10px);
            background: #1a1a1a;
        }

        /* Main container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .search-box {
            flex: 1;
            min-width: 180px;
        }
        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #f5d742;
            background: #111;
            color: #fff;
            font-size: 14px;
        }
        .btn-gold {
            background: linear-gradient(135deg, #f5d742, #d4af37);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245,215,66,0.4); }
        .btn-outline {
            background: transparent;
            border: 1px solid #f5d742;
            color: #f5d742;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Card grid - no horizontal scroll */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Gold Card */
        .manager-card {
            background: linear-gradient(135deg, #f5d742, #d4af37);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            color: #000;
        }
        .manager-card:hover { transform: translateY(-4px); }

        /* Centered top */
        .card-rank {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .card-avatar {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }
        .card-avatar img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #000;
            background: #222;
        }
        .manager-name {
            text-align: center;
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 16px;
            color: #000;
        }
        .current-team {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .team-logo-sm {
            width: 36px;
            height: 36px;
            object-fit: contain;
            background: #fff;
            border-radius: 8px;
            padding: 4px;
        }
        .prev-teams {
            font-size: 12px;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 16px;
            word-break: break-word;
        }
        .manager-points {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            background: rgba(0,0,0,0.1);
            padding: 8px;
            border-radius: 40px;
            margin-bottom: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
            background: rgba(0,0,0,0.1);
            padding: 12px;
            border-radius: 20px;
        }
        .stat-item {
            text-align: center;
            font-weight: bold;
        }
        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }
        .admin-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
        }
        .admin-buttons button {
            background: #000;
            border: none;
            color: #f5d742;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            backdrop-filter: blur(8px);
            padding: 16px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0a0a0a;
            border: 2px solid #f5d742;
            border-radius: 28px;
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            color: #fff;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #f5d742;
        }
        .close-modal {
            font-size: 28px;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #f5d742;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            border-radius: 16px;
            color: #fff;
        }
        .file-upload-label {
            background: #222;
            display: inline-block;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        .preview-img {
            max-width: 80px;
            margin-top: 8px;
            border-radius: 12px;
        }
        .flex-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .stats-mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .team-block {
            background: #111;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .empty-row { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="navbar">
        <div></div> <!-- empty left -->
        <div class="menu-icon" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="closeMenu()"></div>
    <div class="side-menu" id="sideMenu">
        <span class="close-menu" onclick="closeMenu()">✕</span>
        <div class="menu-items">
            <div class="menu-item" onclick="window.location.href='feed.html'">🏠 Home</div>
            <div class="menu-item" id="adminModeMenuItem" onclick="promptAdminKey()">🔑 Admin Mode</div>
        </div>
    </div>

    <div class="container">
        <div class="header-actions">
            <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Search manager or team..." onkeyup="filterManagers()"></div>
            <div id="adminTopBtn" style="display: none;"><button class="btn-gold" onclick="openAddManagerModal()">➕ Add Manager</button></div>
        </div>
        <div id="cardsContainer" class="cards-grid"></div>
    </div>

    <!-- Manager Modal -->
    <div id="managerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">Add Manager</h2><span class="close-modal" onclick="closeManagerModal()">✕</span></div>
            <input type="hidden" id="editManagerId">
            <div class="form-group">
                <label>Type</label>
                <select id="managerType" onchange="toggleTypeFields()">
                    <option value="standalone">Standalone (no login)</option>
                    <option value="linked">Link to existing user</option>
                </select>
            </div>
            <div id="linkedSection" style="display:none;">
                <div class="form-group"><label>Search User</label><input type="text" id="linkedSearch" placeholder="Username" oninput="searchUsers()"><div id="userResults"></div></div>
            </div>
            <div id="standaloneSection">
                <div class="form-group"><label>Manager Name</label><input type="text" id="standaloneName" placeholder="Full name"></div>
            </div>
            <div class="form-group"><label>Current Team Name</label><input type="text" id="teamName"></div>
            <div class="form-group"><label>Team Logo</label><input type="file" id="teamLogoFile" accept="image/*"><div id="teamLogoPreview"></div><input type="hidden" id="teamLogoUrl"></div>
            <div class="form-group"><label>Previous Teams (Season format: S23/24)</label><div id="prevTeamsList"></div><button type="button" class="btn-outline" onclick="addPrevTeamField()">+ Add Previous Team</button></div>
            <div class="form-group"><label>Statistics</label><div class="stats-mini-grid"><input type="number" id="statWins" placeholder="Wins"><input type="number" id="statDraws" placeholder="Draws"><input type="number" id="statLosses" placeholder="Losses"><input type="number" id="statGoals" placeholder="Goals Scored"><input type="number" id="statCleanSheets" placeholder="Clean Sheets"></div></div>
            <div class="form-group"><label>Trophies</label><div id="trophiesList"></div><button type="button" class="btn-outline" onclick="openTrophyModal()">🏆 Add Trophy</button></div>
            <div class="flex-row"><button class="btn-gold" onclick="saveManager()">Save</button><button class="btn-outline" onclick="closeManagerModal()">Cancel</button></div>
        </div>
    </div>

    <!-- Trophy Modal -->
    <div id="trophyModal" class="modal">
        <div class="modal-content"><div class="modal-header"><h2>Add Trophy</h2><span class="close-modal" onclick="closeTrophyModal()">✕</span></div>
        <div class="form-group"><label>Competition</label><select id="trophyComp"></select></div>
        <div class="form-group"><label>Season (e.g., 2023/24)</label><input type="text" id="trophySeason" placeholder="2023/24"></div>
        <button class="btn-gold" onclick="addTrophyItem()">Add</button></div>
    </div>

    <!-- Default Avatar Modal (admin only) -->
    <div id="defaultAvatarModal" class="modal">
        <div class="modal-content"><div class="modal-header"><h2>Set Default Profile Picture</h2><span class="close-modal" onclick="closeDefaultAvatarModal()">✕</span></div>
        <div class="form-group"><label>Upload default avatar</label><input type="file" id="defaultAvatarFile" accept="image/*"><div id="defaultAvatarPreview"></div></div>
        <button class="btn-gold" onclick="saveDefaultAvatar()">Save</button></div>
    </div>

    <script>
        // ---------- CONFIG ----------
        const DB_URL = 'https://efootball-412-default-rtdb.firebaseio.com';
        const IMGBB_KEY = '81c24f30884ec6dda1dbd2b39739e0c9';
        let isAdmin = false;
        let managers = [];
        let allProfiles = [];
        let selectedLinkedUser = null;
        let tempTeamLogo = null;
        let tempPrevTeams = [];
        let tempTrophies = [];
        let defaultAvatarUrl = 'https://via.placeholder.com/90/333/f5d742?text=⚽';

        // Trophy hierarchy
        const trophyList = [
            { id: "wc", name: "FIFA World Cup", points: 100 },
            { id: "ucl", name: "UEFA Champions League", points: 90 },
            { id: "cwc", name: "FIFA Club World Cup", points: 80 },
            { id: "uel", name: "UEFA Europa League", points: 70 },
            { id: "pl", name: "Premier League", points: 60 },
            { id: "nations", name: "UEFA Nations League", points: 55 },
            { id: "uecl", name: "UEFA Conference League", points: 50 },
            { id: "facup", name: "FA Cup", points: 45 },
            { id: "supercup", name: "UEFA Super Cup", points: 40 },
            { id: "cs", name: "Community Shield", points: 30 }
        ];

        // Helper: upload imgBB
        async function uploadToImgBB(file) {
            const fd = new FormData(); fd.append("image", file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: fd });
            const data = await res.json();
            if (!data.success) throw new Error("Upload failed");
            return data.data.url;
        }

        // Calculate manager points
        function calcManagerPoints(stats) {
            let base = (stats.wins * 3) + (stats.draws * 1) - (stats.losses * 1);
            let goalBonus = 0;
            if (stats.goalsScored >= 5) goalBonus = 4;
            else if (stats.goalsScored === 4) goalBonus = 3;
            else if (stats.goalsScored === 3) goalBonus = 2;
            else if (stats.goalsScored === 2) goalBonus = 1;
            let cleanBonus = stats.cleanSheets * 1;
            return base + goalBonus + cleanBonus;
        }
        function calcWinRate(w,d,l) { let total = w+d+l; if(total===0) return 0; return (w/total*100).toFixed(1); }

        // Load default avatar
        async function loadDefaultAvatar() {
            try {
                const res = await fetch(`${DB_URL}/settings/defaultAvatar.json`);
                const data = await res.json();
                if (data && data.url) defaultAvatarUrl = data.url;
            } catch(e) {}
        }

        // Load all managers
        async function fetchManagers() {
            const res = await fetch(`${DB_URL}/managers.json`);
            const data = await res.json();
            if(!data) return [];
            return Object.entries(data).map(([id, m]) => {
                let stats = m.stats || { wins:0, draws:0, losses:0, goalsScored:0, cleanSheets:0 };
                stats.managerPoints = calcManagerPoints(stats);
                stats.winRate = calcWinRate(stats.wins, stats.draws, stats.losses);
                return { id, ...m, stats, trophyScore: (m.trophies||[]).reduce((sum,t)=>sum+(t.points||0),0) };
            });
        }
        async function fetchProfiles() {
            const res = await fetch(`${DB_URL}/profiles.json`);
            const data = await res.json();
            if(!data) return [];
            return Object.entries(data).map(([id,p]) => ({ id, username: p.username, profilePicture: p.profilePicture }));
        }

        // Ranking sort
        function sortManagers(list) {
            return [...list].sort((a,b) => {
                if(a.stats.managerPoints !== b.stats.managerPoints) return b.stats.managerPoints - a.stats.managerPoints;
                if(a.stats.wins !== b.stats.wins) return b.stats.wins - a.stats.wins;
                if(a.stats.goalsScored !== b.stats.goalsScored) return b.stats.goalsScored - a.stats.goalsScored;
                if(a.stats.winRate !== b.stats.winRate) return b.stats.winRate - a.stats.winRate;
                return a.stats.losses - b.stats.losses;
            });
        }

        // Render cards
        async function renderCards() {
            const container = document.getElementById('cardsContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = managers.filter(m => m.username.toLowerCase().includes(searchTerm) || (m.currentTeam?.name || '').toLowerCase().includes(searchTerm));
            const sorted = sortManagers(filtered);
            if(sorted.length === 0) { container.innerHTML = '<div class="empty-row">No managers found</div>'; return; }
            let html = '';
            sorted.forEach((m, idx) => {
                const rank = idx+1;
                const rankDisplay = rank === 1 ? '🥇 #1' : rank === 2 ? '🥈 #2' : rank === 3 ? '🥉 #3' : `#${rank}`;
                let avatar = m.profilePicture;
                if(!avatar) avatar = defaultAvatarUrl;
                const teamLogo = m.currentTeam?.logo || '';
                const prevHtml = (m.previousTeams || []).map(p => `${p.name} (${p.seasonFrom || '?'} - ${p.seasonTo || '?'})`).join(', ');
                const stats = m.stats;
                const pts = stats.managerPoints || 0;
                const winRate = stats.winRate || 0;
                const adminBtns = isAdmin ? `<div class="admin-buttons"><button onclick="editManager('${m.id}')">✏️ Edit</button><button onclick="deleteManager('${m.id}')">🗑️ Delete</button></div>` : '';
                html += `
                    <div class="manager-card">
                        <div class="card-rank">${rankDisplay}</div>
                        <div class="card-avatar"><img src="${avatar}" alt="avatar"></div>
                        <div class="manager-name">${escapeHtml(m.username)}</div>
                        <div class="current-team">${teamLogo ? `<img src="${teamLogo}" class="team-logo-sm">` : ''}<span>${escapeHtml(m.currentTeam?.name || '—')}</span></div>
                        ${prevHtml ? `<div class="prev-teams">📋 ${escapeHtml(prevHtml)}</div>` : ''}
                        <div class="manager-points">📊 MANAGER POINTS: ${pts}</div>
                        <div class="stats-grid">
                            <div class="stat-item"><div class="stat-label">WINS</div><div class="stat-value">${stats.wins}</div></div>
                            <div class="stat-item"><div class="stat-label">DRAWS</div><div class="stat-value">${stats.draws}</div></div>
                            <div class="stat-item"><div class="stat-label">LOSSES</div><div class="stat-value">${stats.losses}</div></div>
                            <div class="stat-item"><div class="stat-label">GOALS</div><div class="stat-value">${stats.goalsScored}</div></div>
                            <div class="stat-item"><div class="stat-label">CLEAN</div><div class="stat-value">${stats.cleanSheets}</div></div>
                            <div class="stat-item"><div class="stat-label">WIN RATE</div><div class="stat-value">${winRate}%</div></div>
                        </div>
                        ${adminBtns}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function filterManagers() { renderCards(); }

        // Admin mode
        function promptAdminKey() {
            const key = prompt("Enter Admin Key:");
            if(key === "admin@11:11") {
                isAdmin = true;
                document.getElementById('adminTopBtn').style.display = 'block';
                // Also show set default avatar button
                let btn = document.createElement('button');
                btn.className = 'btn-outline';
                btn.innerHTML = '🖼️ Set Default Avatar';
                btn.onclick = () => openDefaultAvatarModal();
                document.querySelector('.header-actions').appendChild(btn);
                renderCards();
                alert("Admin mode active");
            } else if(key) alert("Invalid key");
            closeMenu();
        }

        // Modal helpers
        function openAddManagerModal() {
            if(!isAdmin) return;
            resetModalForm();
            document.getElementById('modalTitle').innerText = "Add Manager";
            document.getElementById('editManagerId').value = '';
            document.getElementById('managerModal').classList.add('active');
        }
        function closeManagerModal() { document.getElementById('managerModal').classList.remove('active'); }
        function toggleTypeFields() {
            let type = document.getElementById('managerType').value;
            document.getElementById('linkedSection').style.display = type === 'linked' ? 'block' : 'none';
            document.getElementById('standaloneSection').style.display = type === 'standalone' ? 'block' : 'none';
        }
        async function searchUsers() {
            let query = document.getElementById('linkedSearch').value.trim().toLowerCase();
            if(query.length < 2) return;
            if(allProfiles.length === 0) allProfiles = await fetchProfiles();
            let matches = allProfiles.filter(p => p.username.toLowerCase().includes(query));
            let resultsDiv = document.getElementById('userResults');
            resultsDiv.innerHTML = matches.map(u => `<div style="padding:8px; cursor:pointer; border-bottom:1px solid #333;" onclick="selectUser('${u.id}','${escapeHtml(u.username)}','${u.profilePicture}')">${escapeHtml(u.username)}</div>`).join('');
        }
        function selectUser(id, name, pic) {
            selectedLinkedUser = { id, username: name, profilePicture: pic };
            document.getElementById('linkedSearch').value = name;
            document.getElementById('userResults').innerHTML = '';
        }
        function resetModalForm() {
            document.getElementById('managerType').value = 'standalone';
            toggleTypeFields();
            document.getElementById('standaloneName').value = '';
            document.getElementById('teamName').value = '';
            document.getElementById('teamLogoFile').value = '';
            document.getElementById('teamLogoPreview').innerHTML = '';
            tempTeamLogo = null;
            tempPrevTeams = [];
            tempTrophies = [];
            renderPrevTeamsUI();
            renderTrophiesUI();
            document.getElementById('statWins').value = 0;
            document.getElementById('statDraws').value = 0;
            document.getElementById('statLosses').value = 0;
            document.getElementById('statGoals').value = 0;
            document.getElementById('statCleanSheets').value = 0;
            selectedLinkedUser = null;
            document.getElementById('linkedSearch').value = '';
        }
        document.getElementById('teamLogoFile').addEventListener('change', async(e) => {
            if(e.target.files[0]) { try { tempTeamLogo = await uploadToImgBB(e.target.files[0]); document.getElementById('teamLogoPreview').innerHTML = `<img src="${tempTeamLogo}" class="preview-img">`; } catch(err){ alert("Upload failed"); } }
        });
        function addPrevTeamField() {
            let name = prompt("Team name");
            if(!name) return;
            let seasonFrom = prompt("Season from (e.g., 2022/23)");
            let seasonTo = prompt("Season to (e.g., 2023/24)");
            tempPrevTeams.push({ name, seasonFrom, seasonTo });
            renderPrevTeamsUI();
        }
        function renderPrevTeamsUI() {
            let container = document.getElementById('prevTeamsList');
            container.innerHTML = tempPrevTeams.map((t,i) => `<div class="team-block">${t.name} (${t.seasonFrom} - ${t.seasonTo}) <button onclick="removePrevTeam(${i})">✕</button></div>`).join('');
        }
        function removePrevTeam(i) { tempPrevTeams.splice(i,1); renderPrevTeamsUI(); }
        function renderTrophiesUI() {
            let container = document.getElementById('trophiesList');
            container.innerHTML = tempTrophies.map((t,i) => `<div class="team-block">${t.name} (${t.season}) ${t.points} pts <button onclick="removeTrophyTemp(${i})">✕</button></div>`).join('');
        }
        function removeTrophyTemp(i) { tempTrophies.splice(i,1); renderTrophiesUI(); }
        function openTrophyModal() {
            let select = document.getElementById('trophyComp');
            select.innerHTML = trophyList.map(t => `<option value="${t.id}" data-points="${t.points}">${t.name} (${t.points} pts)</option>`).join('');
            document.getElementById('trophyModal').classList.add('active');
        }
        function closeTrophyModal() { document.getElementById('trophyModal').classList.remove('active'); }
        function addTrophyItem() {
            let compId = document.getElementById('trophyComp').value;
            let trophy = trophyList.find(t => t.id === compId);
            let season = document.getElementById('trophySeason').value.trim();
            if(trophy) { tempTrophies.push({ id: trophy.id, name: trophy.name, points: trophy.points, season }); renderTrophiesUI(); }
            closeTrophyModal();
        }
        async function saveManager() {
            let type = document.getElementById('managerType').value;
            let username = '', profilePicture = null;
            if(type === 'linked') {
                if(!selectedLinkedUser) { alert("Select a linked user"); return; }
                username = selectedLinkedUser.username;
                profilePicture = selectedLinkedUser.profilePicture;
            } else {
                username = document.getElementById('standaloneName').value.trim();
                if(!username) { alert("Enter manager name"); return; }
                profilePicture = null;
            }
            let teamName = document.getElementById('teamName').value.trim();
            let stats = {
                wins: parseInt(document.getElementById('statWins').value)||0,
                draws: parseInt(document.getElementById('statDraws').value)||0,
                losses: parseInt(document.getElementById('statLosses').value)||0,
                goalsScored: parseInt(document.getElementById('statGoals').value)||0,
                cleanSheets: parseInt(document.getElementById('statCleanSheets').value)||0
            };
            stats.managerPoints = calcManagerPoints(stats);
            stats.winRate = calcWinRate(stats.wins, stats.draws, stats.losses);
            let managerData = {
                type, userId: type==='linked' ? selectedLinkedUser.id : null,
                username, profilePicture,
                currentTeam: { name: teamName, logo: tempTeamLogo || null },
                previousTeams: tempPrevTeams,
                stats,
                trophies: tempTrophies,
                trophyScore: tempTrophies.reduce((s,t)=>s+t.points,0)
            };
            let editId = document.getElementById('editManagerId').value;
            let url = editId ? `${DB_URL}/managers/${editId}.json` : `${DB_URL}/managers.json`;
            let method = editId ? 'PATCH' : 'POST';
            await fetch(url, { method, body: JSON.stringify(managerData) });
            await refreshData();
            closeManagerModal();
        }
        async function editManager(id) {
            let m = managers.find(x=>x.id===id);
            if(!m) return;
            resetModalForm();
            document.getElementById('modalTitle').innerText = "Edit Manager";
            document.getElementById('editManagerId').value = id;
            document.getElementById('managerType').value = m.type;
            toggleTypeFields();
            if(m.type === 'linked') {
                selectedLinkedUser = { id: m.userId, username: m.username, profilePicture: m.profilePicture };
                document.getElementById('linkedSearch').value = m.username;
            } else {
                document.getElementById('standaloneName').value = m.username;
            }
            document.getElementById('teamName').value = m.currentTeam?.name || '';
            tempTeamLogo = m.currentTeam?.logo || null;
            if(tempTeamLogo) document.getElementById('teamLogoPreview').innerHTML = `<img src="${tempTeamLogo}" class="preview-img">`;
            tempPrevTeams = m.previousTeams || [];
            renderPrevTeamsUI();
            tempTrophies = m.trophies || [];
            renderTrophiesUI();
            document.getElementById('statWins').value = m.stats.wins;
            document.getElementById('statDraws').value = m.stats.draws;
            document.getElementById('statLosses').value = m.stats.losses;
            document.getElementById('statGoals').value = m.stats.goalsScored;
            document.getElementById('statCleanSheets').value = m.stats.cleanSheets;
            document.getElementById('managerModal').classList.add('active');
        }
        async function deleteManager(id) {
            if(!confirm("Delete permanently?")) return;
            await fetch(`${DB_URL}/managers/${id}.json`, { method: 'DELETE' });
            await refreshData();
        }
        async function refreshData() {
            managers = await fetchManagers();
            renderCards();
        }

        // Default avatar
        function openDefaultAvatarModal() {
            if(!isAdmin) return;
            document.getElementById('defaultAvatarModal').classList.add('active');
        }
        function closeDefaultAvatarModal() { document.getElementById('defaultAvatarModal').classList.remove('active'); }
        document.getElementById('defaultAvatarFile').addEventListener('change', async(e) => {
            if(e.target.files[0]) {
                try {
                    let url = await uploadToImgBB(e.target.files[0]);
                    document.getElementById('defaultAvatarPreview').innerHTML = `<img src="${url}" style="width:80px; border-radius:50%;">`;
                    window.tempDefaultAvatar = url;
                } catch(err){ alert("Upload failed"); }
            }
        });
        async function saveDefaultAvatar() {
            if(window.tempDefaultAvatar) {
                await fetch(`${DB_URL}/settings/defaultAvatar.json`, { method: 'PUT', body: JSON.stringify({ url: window.tempDefaultAvatar }) });
                defaultAvatarUrl = window.tempDefaultAvatar;
                alert("Default avatar updated");
                closeDefaultAvatarModal();
                renderCards();
            }
        }

        // Menu
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function closeMenu() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

        async function init() {
            await loadDefaultAvatar();
            await refreshData();
        }
        init();
    </script>
</body>
</html>
